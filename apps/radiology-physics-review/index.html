<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Radiology Physics Review</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <button id="settingsBtn" class="gear-btn" type="button" aria-label="Settings" aria-expanded="false" aria-controls="settingsPanel" title="Settings">&#9881;</button>
    </header>

    <div id="settingsBackdrop" class="settings-backdrop" hidden></div>
    <aside id="settingsPanel" class="settings-panel" hidden>
      <div class="settings-header">
        <div>
          <p class="eyebrow">Question Bank</p>
          <h1>Radiology Physics Review</h1>
        </div>
        <button id="closeSettingsBtn" class="small-btn" type="button" title="Close settings">Close</button>
      </div>

      <section class="controls" aria-label="Review controls">
        <label>
          <span>Scope</span>
          <select id="scopeSelect">
            <option value="all">All questions</option>
          </select>
        </label>
        <label>
          <span>Order</span>
          <select id="orderSelect">
            <option value="sequential">Sequential</option>
            <option value="random">Random</option>
          </select>
        </label>
        <button id="resetBtn" class="secondary" type="button">Reset</button>
      </section>

      <section class="stats" aria-label="Progress">
        <div><strong id="answeredCount">0</strong><span>Answered</span></div>
        <div><strong id="correctPct">0%</strong><span>Correct</span></div>
        <div><strong id="missedCount">0</strong><span>Missed</span></div>
        <div><strong id="remainingCount">0</strong><span>Left</span></div>
      </section>
    </aside>

    <section id="loading" class="message">Loading questions...</section>

    <article id="questionCard" class="question-card" hidden>
      <div class="question-meta">
        <span id="positionLabel">Question 1 of 1</span>
        <span id="blockLabel">Block</span>
      </div>
      <h2 id="questionTitle"></h2>
      <div id="questionText" class="question-text"></div>
      <div id="imageStrip" class="image-strip"></div>
      <div id="choices" class="choices"></div>
      <section id="feedback" class="feedback" hidden>
        <div id="feedbackTitle" class="feedback-title"></div>
        <div id="explanation" class="explanation"></div>
      </section>
    </article>

    <nav class="bottom-actions" aria-label="Question navigation">
      <button id="prevBtn" class="secondary" type="button">Previous</button>
      <button id="copyBtn" class="secondary" type="button">Copy</button>
      <button id="nextBtn" class="primary" type="button">Next</button>
    </nav>
  </main>
  <script src="app.js?v=66d1c2d" defer></script>
</body>
</html>
