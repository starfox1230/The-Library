<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSK Normal/Normal Variants Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>MSK Normal/Normal Variants Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":1,"appId":"msk-normal-variants-quiz-ch2",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "What is the most common location for the imaged finding?", "options": [{"letter": "A", "text": "Posterior horn of the lateral meniscus"}, {"letter": "B", "text": "Anterior horn of the lateral meniscus"}, {"letter": "C", "text": "Posterior horn of the medial meniscus"}, {"letter": "D", "text": "Anterior horn of the medial meniscus X-ray Sagittal proton density"}], "images": ["assets/q1_p058_01.jpg", "assets/q1_p059_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Along with the fabella and cyamella, meniscal ossicle is one of the three most common sesamoid bones and ossicles of the knee. It is most commonly seen in the posterior horn of the medial meniscus. It usually presents in young men. It is seen in <1% of knee examinations. On radiographs, it presents as a triangular opacity at the periphery of the meniscus. MR, CT, and ultrasound will demonstrate an intrameniscal location.\n\nReferences: Blakenbaker DG, Davis KW, Sonin A, et al. Diagnostic Imaging: Musculoskeletal: Trauma. 2nd ed. Manitoba, Canada: Amirsys; 2016:795. Yochum T, Rowe L. Essentials of Skeletal Radiology. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2005:332."}, {"number": "2", "stem": "A patient presents with a torn Achilles tendon. Which normal structure, if present, can cause a full- thickness Achilles tear falsely appear as a partial-thickness tear.", "options": [{"letter": "A", "text": "Plantaris"}, {"letter": "B", "text": "Popliteus"}, {"letter": "C", "text": "Peroneus brevis"}, {"letter": "D", "text": "Peroneus longus"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The plantaris tendon is present in 90% of the population. When present, it traverses adjacent to the medial portion of the Achilles tendon. In the setting of full-thickness Achilles tendon tears, the normal plantaris tendon must be acknowledged as a separate structure to avoid confusing the plantaris tendon for residual fibers of the medial portion of the Achilles tendon. Plantaris tendon tears are also a common cause of calf pain and are frequently referred to as \"tennis leg.\"\n\nReferences: Blakenbaker DG, Davis KW, Sonin A, et al. Diagnostic Imaging: Musculoskeletal: Trauma. 2nd ed. Manitoba, Canada: Amirsys; 2016:850-853, 986-991."}, {"number": "3", "stem": "A 62-year-old female presents with a radial head fracture. What is noted by the arrow on the images below?", "options": [{"letter": "A", "text": "Nondisplaced fracture"}, {"letter": "B", "text": "Nutrient channel"}, {"letter": "C", "text": "Origin of flexor digitorum profundus muscle"}, {"letter": "D", "text": "Groove for the medial nerve"}], "images": ["assets/q3_p060_01.jpg", "assets/q3_p061_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The lucency in the cortex of the radius is the classic location for the nutrient channel. It is important to know this normal structure to avoid describing a fracture for this finding.\n\nReferences: Keats TE, Anderson MW. Atlas of Normal Roentgen Variants That May Simulate Disease. 8th ed. Philadelphia, PA: Mosby; 2007:558."}, {"number": "4", "stem": "Regarding the lucency in the humeral head, what is the next most appropriate imaging study?", "options": [{"letter": "A", "text": "Additional radiographs"}, {"letter": "B", "text": "CT"}, {"letter": "C", "text": "MRI"}, {"letter": "D", "text": "Nuclear medicine bone scan"}], "images": ["assets/q4_p062_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The lucency in the humeral head has a cyst-like appearance; however, this is the classic location for the pseudolesion of the humeral head, which is typically noted on internal rotation views of the shoulder. Additional radiographic views, such as an external rotation view, will not demonstrate a similar finding, indicating this finding is not a true lesion.\n\nReferences: Keats TE, Anderson MW. Atlas of Normal Roentgen Variants That May Simulate Disease. 8th ed. Philadelphia, PA: Mosby; 2007:512."}, {"number": "5", "stem": "An 11-year-old male presents with knee pain. A periosteal desmoid is incidentally noted. Which option below correctly describes the classic location for this finding? Axial T2 fat saturation Sagittal T2 fat saturation Sagittal proton density", "options": [{"letter": "A", "text": "Insertion of the semitendinosus tendon"}, {"letter": "B", "text": "Origin of the popliteus tendon"}, {"letter": "C", "text": "Insertion of the semimembranosus tendon"}, {"letter": "D", "text": "Origin of the medial head of the gastrocnemius tendon"}], "images": ["assets/q5_p063_01.jpg", "assets/q5_p064_01.jpg", "assets/q5_p065_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Periosteal desmoid has many other names including avulsive cortical irregularity, distal metaphyseal femoral defect, cortical desmoid, and medial supracondylar defect of the femur. The finding is characteristically seen in the posteromedial cortex of the distal end of the femur, adjacent to the medial femoral condyle. It is located at the insertion of the adductor magnus aponeurosis or the origin of the medial head of the gastrocnemius tendon. It is typically seen in patients aged 15 to 20 years and may be a reaction to trauma. On radiographs, it demonstrates a saucer-like lucent defect. It is typically hypointense on T1-weighted MR images and hyperintense on T2-weighted MR images. It is a benign finding, and no further imaging is needed.\n\nReferences: Greenspan A, Gernot J, Wolfgang R. Differential Diagnosis in Orthopaedic Oncology. 2nd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2007:267-270. Manaster BJ, May DA, Disler DG. The Requisites: Musculoskeletal Imaging. 4th ed. Philadelphia, PA: Elsevier; 2013:207-209."}, {"number": "6a", "stem": "What structure is noted by the arrows on the images below? Axial proton density Sagittal T1 weighted Sagittal T1 weighted", "options": [{"letter": "A", "text": "Peroneus quartus muscle"}, {"letter": "B", "text": "Accessory soleus muscle"}, {"letter": "C", "text": "Accessory flexor digitorum longus muscle"}, {"letter": "D", "text": "Plantaris muscle"}], "images": ["assets/q6a_p066_01.jpg", "assets/q6a_p067_01.jpg", "assets/q6a_p068_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The arrow points to the accessory flexor digitorum longus. The three normal tendons of the medial ankle are visualized separate from this structure, indicating this is an accessory muscle. There are three accessory muscles, which can be seen in the medial ankle: the accessory flexor digitorum longus, accessory soleus, and accessory flexor hallucis longus. Of these, only the accessory soleus is located superficial to the flexor retinaculum outside of the tarsal tunnel. The most common accessory muscle seen in the lateral ankle is the peroneus quartus.\n\nReferences: Blakenbaker DG, Davis KW, Sonin A, et al. Diagnostic Imaging: Musculoskeletal: Trauma. 2nd ed. Manitoba, Canada: Amirsys; 2016:982-985. Resnick D, Kang HS, Pretterklieber ML. Internal Derangements of Joints. 2nd ed. Philadelphia, PA: Saunders; 2007:523-524."}, {"number": "6b", "stem": "What is the most common accessory muscle of the ankle?", "options": [{"letter": "A", "text": "Peroneus quartus"}, {"letter": "B", "text": "Accessory soleus"}, {"letter": "C", "text": "Accessory flexor digitorum longus"}, {"letter": "D", "text": "Peroneocalcaneus internus"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The most common accessory muscle is the peroneus quartus, occurring in up to 10% to 22% of the population. The accessory flexor digitorum longus occurs in 2% to 8% of the population. The accessory soleus occurs in 1% to 6% of the population, while the peroneocalcaneus internus occurs in 1% of the population.\n\nReferences: Blakenbaker DG, Davis KW, Sonin A, et al. Diagnostic Imaging: Musculoskeletal: Trauma. 2nd ed. Manitoba, Canada: Amirsys; 2016:982-985. Resnick D, Kang HS, Pretterklieber ML. Internal Derangements of Joints. 2nd ed. Philadelphia, PA: Saunders; 2007:523-524."}, {"number": "7", "stem": "A 14-year-old male presents with pain in his knee after a sports-related injury. What is noted by the arrows on the image below?", "options": [{"letter": "A", "text": "Stress fracture"}, {"letter": "B", "text": "Lead lines"}, {"letter": "C", "text": "Transverse growth lines"}, {"letter": "D", "text": "Metaphyseal lines"}], "images": ["assets/q7_p070_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The lines are thin, sclerotic bands in the proximal metaphysis of the tibia. They are transverse growth lines and typically reflect prior osteoblastic activity during the recovery phase after an illness. Metaphyseal lines, on the other hand, are dense lines at the zone of provisional calcification immediately adjacent to the physis and do not extend into the proximal metaphysis. Stress fractures are seen as a lucency in the cortex of the bone, while lead lines are dense metaphyseal lines, often seen in the knee and wrist.\n\nReferences: Siegel MJ, Coley BD. The Core Curriculum: Pediatric Imaging. Philadelphia, PA: Lippincott Williams & Wilkins; 2006:409-410."}, {"number": "8", "stem": "A 15-year-old male pitcher presents with pain in the pitching elbow. What is the most likely cause of the finding noted?", "options": [{"letter": "A", "text": "Medial epicondylitis at the common flexor tendon origin"}, {"letter": "B", "text": "Avulsion of the medial epicondyle at the ulnar collateral ligament attachment"}, {"letter": "C", "text": "Avulsion of the sublime tubercle at the ulnar collateral ligament attachment"}, {"letter": "D", "text": "Incompletely fused medial epicondyle"}], "images": ["assets/q8_p071_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The order of ossification of the elbow begins with the capitellum at approximately 1 to 2 years of age, radius at 3 years, medial epicondyle at 4 years, trochlea at 8 years, and lateral epicondyle at 10 years. This patient is 15 years old; therefore, the elbow should be ossified. There is a lucency noted in the medial epicondyle, which given the history of a throwing athlete, is most consistent with an avulsion of the medial epicondyle at the ulnar collateral ligament attachment. In younger patients, before there is complete ossification of the elbow, a similar injury can be caused by avulsion from excessive pull of the common flexor tendon. The ulnar attachment of the ulnar collateral ligament is the sublime tubercle; however, no radiographic abnormality is noted in this location. Medial epicondylitis is related to tendinosis of the common flexor tendon and would not cause the finding noted in this patient.\n\nReferences: Resnick D, Kang HS, Pretterklieber ML. Internal Derangements of Joints. 2nd ed. Philadelphia, PA: Saunders; 2007:1189-1193. Siegel MJ, Coley BD. The Core Curriculum: Pediatric Imaging. Philadelphia, PA: Lippincott Williams & Wilkins; 2006:510-513. Answers and Explanations"}, {"number": "9", "stem": "A 62-year-old female presents with trauma to her right arm. What is the most likely cause for the alignment of the radius and ulna?", "options": [{"letter": "A", "text": "Physiologic bowing"}, {"letter": "B", "text": "Dislocation of the radial head"}, {"letter": "C", "text": "Dislocation of the distal ulna"}, {"letter": "D", "text": "Greenstick fracture of the radius and ulna"}], "images": ["assets/q9_p076_01.jpg", "assets/q9_p077_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The alignment of the radius and ulna is associated with physiologic bowing. This finding is often seen in the setting of negative ulnar variance, which this patient has but is somewhat difficult to detect on the provided images.\n\nReferences: Keats TE, Anderson MW. Atlas of Normal Roentgen Variants That May Simulate Disease. 8th ed. Philadelphia, PA: Mosby; 2007:559."}];
    const APP_ID = "msk-normal-variants-quiz-ch2";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
