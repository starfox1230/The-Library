<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Pediatric GI Imaging Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-list { display: grid; gap: 12px; margin-top: 12px; }
    .review-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel-2);
    }
    .review-item h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      letter-spacing: 0;
    }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>

  <script>
    const QUESTIONS = [{"number": 1, "stem": "A radiograph of a 2-day-old patient with bilious vomiting is shown below. What is the next appropriate step in management?", "options": [{"letter": "A", "text": "Contrast enema."}, {"letter": "B", "text": "Emergent upper GI series."}, {"letter": "C", "text": "Abdominal ultrasound."}, {"letter": "D", "text": "No further workup is needed."}], "images": ["assets/q01_p010_1.jpeg"], "answer": "B", "explanation": "Bilious vomiting in a neonate is an emergency as it raises concern for malrotation of the bowel alongwith midgut volvulus. A delay in diagnosis and treatment of this entity may result in small bowel necrosis, short gutsyndrome, and dependence on total parenteral nutrition (TPN). Mortality in affected newborns with malrotation andmidgut volvulus ranges between 3% to 5%. Abdominal radiographs may be normal in appearance or show distention of the stomach and proximal duodenumby air, with little distal bowel gas. The radiograph of the patient in this case does not demonstrate the abnormalfindings which have been associated with volvulus or evidence of an obstruction. However, malrotation and midgutvolvulus still must be excluded. The most sensitive test for the diagnosis of malrotation is an upper GI series withsensitivities ranging from 93% to 100%. However, the sensitivity of this exam for midgut volvulus has been reportedat 54%. A contrast enema is often used to evaluate for the cause of a distal bowel obstruction but is not the most sensitivetest to evaluate for malrotation and midgut volvulus which can cause a proximal bowel obstruction. This exam can behelpful in assessing the location of the cecum, which is normally located in the right lower quadrant. Eighty percentof patients with malrotation have an abnormal cecal position, which a contrast enema can help demonstrate. An abdominal ultrasound is also not the most sensitive test to evaluate for malrotation or midgut volvulus. However, in cases of malrotation with midgut volvulus, the \"whirlpool sign\" can be seen when the bowel wrapsaround the superior mesenteric artery (SMA), and the intestinal tract and the mesenteric vessels become twisted,resulting in secondary venous engorgement.\n\nReferences: Applegate KE, Anderson JM, Klatte EC. Intestinal malrotation in children: a problem-solving approach to the uppergastrointestinal series. Radiographics 2006;26(5):1485–1500. Epelman M. The whirlpool sign. Radiology 2006;241(1):83–94."}, {"number": 2, "stem": "An image from an upper GI series that was subsequently performed on the same patient in Question 1 is shownbelow. Which of the following would be the next most appropriate step in management?", "options": [{"letter": "A", "text": "Abdominal ultrasound"}, {"letter": "B", "text": "Contrast enema"}, {"letter": "C", "text": "Stat surgical consult"}, {"letter": "D", "text": "CT scan of the abdomen and pelvis"}], "images": ["assets/q02_p012_1.jpeg"], "answer": "C", "explanation": "The study demonstrates a \"beaked\" appearance of the third portion of the duodenum and only a smallamount of contrast distal to the location of the beaking or obstruction (arrow). This appearance is consistent withmalrotation with midgut volvulus. Other appearances of volvulus include the \"corkscrew sign,\" which describes thespiral appearance of the distal duodenum and proximal jejunum seen in midgut volvulus. In patients with malrotationwith midgut volvulus who exhibit these findings, the duodenum and proximal jejunum do not cross the midline andinstead take an inferior direction. The loops twist on a shortened small bowel mesentery resulting in a corkscrewappearance. The normal position of the duodenojejunal junction is to the left of the left-sided pedicle of the vertebral body atthe level of the duodenal bulb on frontal views. If the duodenojejunal junction is located inferior or to the right of thislevel, malrotation should be considered. Note however that inferior displacement of the duodenojejunal junction is acommon variant seen on frontal views in infants. This finding may be due to displacement of the relatively mobileligament of Treitz by the adjacent distended stomach or bowel. In cases where malrotation is in question, a posterior location of the duodenojejunal junction on a true lateralview, as expected for a retropritoneal structure, is reassuring. In children with malrotation, the distal course of theduodenum on the lateral view often does not reach the level of the duodenal bulb an instead turns in an anteriordirection into the peritoneal cavity. Given that the study performed in the question demonstrates findings consistent with malrotation with midgutvolvulus, the patient needs to go to the operating room for further treatment. Therefore, none of the other choices arecorrect.\n\nReferences: Applegate KE, Anderson JM, Klatte EC. Intestinal malrotation in children: a problem-solving approach to the uppergastrointestinal series. Radiographics 2006;26(5):1485–1500. Ortiz-neira CL. The corkscrew sign: midgut volvulus. Radiology 2007;242(1):315–316."}, {"number": 3, "stem": "Regarding malrotation, which of the following is true?", "options": [{"letter": "A", "text": "This entity is usually diagnosed after the first year of life."}, {"letter": "B", "text": "Malrotation is a predisposing risk factor for the development of midgut volvulus."}, {"letter": "C", "text": "The cecum is usually normally located in the right lower quadrant in patients who are malrotated."}, {"letter": "D", "text": "The anatomic relationship between the SMA and SMV is usually normal in patients who are malrotated."}], "images": [], "answer": "B", "explanation": "Malrotation of the bowel is a predisposing risk factor for midgut volvulus. In individuals withmalrotation, the mesenteric attachment of the midgut, particularly the portion from the duodenojejunal junction to thececum, is abnormally short. The gut is therefore prone to twist counterclockwise around the superior mesentericartery and vein creating a volvulus. As stated above, 80% of patients with malrotation have an abnormal cecalposition, which a contrast enema can help demonstrate. The superior mesenteric vein is normally located to the rightof and anterior to the superior mesenteric artery on axial imaging studies, but the relative positions of the vein andartery are reversed in 60% of individuals with malrotation. Malrotation is usually diagnosed in newborns and younginfants; up to 75% of symptomatic cases occur in newborns, and up to 90% of symptomatic cases occur within thefirst year of life. The classic clinical manifestation of malrotation in newborns is bilious vomiting with or withoutabdominal distention associated with either duodenal obstructive bands or midgut volvulus. However, malrotationwith midgut volvulus can occur at any age.\n\nReferences: Applegate KE, Anderson JM, Klatte EC. Intestinal malrotation in children: a problem-solving approach to the uppergastrointestinal series. Radiographics 2006;26(5):1485–1500."}, {"number": 4, "stem": "A 6-week-old male presents to the emergency department with nonbilious projectile vomiting. Plain abdominalradiographs were obtained and are shown below. What is the next appropriate step in management?", "options": [{"letter": "A", "text": "Stat surgical consultation"}, {"letter": "B", "text": "Nonemergent abdominal sonogram"}, {"letter": "C", "text": "Contrast enema"}, {"letter": "D", "text": "CT scan of the abdomen and pelvis"}], "images": ["assets/q04_p013_1.jpeg", "assets/q04_p014_1.jpeg"], "answer": "B", "explanation": "The clinical history and imaging findings presented in this case are concerning for hypertrophic pyloricstenosis, a common entity in young infants characterized by hypertrophy of the circular muscle and narrowing of theantropyloric canal (channel), partially caused by crowded and edematous mucosa within the lumen. This leads to agastric outlet obstruction, which causes intractable nonbilious projectile vomiting. The age of the child at diagnosis isusually 3 weeks to 3 months of age. The male-to-female ratio is approximately 4:1, and firstborn children are moreoften affected than their younger siblings. Other causes of nonbilious vomiting in children are pylorospasm andgastroesophageal reflux. The radiographs of the patient demonstrate gaseous distention of the stomach with an air–fluid level on the leftlateral decubitus view. There is a paucity of bowel gas beyond the stomach. These findings are suggestive of a gastricoutlet obstruction as can be seen in pyloric stenosis. The next best step in management would be to perform a nonemergent abdominal ultrasound to confirm thediagnosis of pyloric stenosis which is not a true medical emergency. Therefore, an emergent surgical consultation isnot required. Ultrasound allows direct visualization of the pyloric muscle. A contrast enema of the colon would notbe helpful in making the diagnosis. A CT scan of the abdomen and pelvis would also not be helpful in making thediagnosis as real-time visualization of the pylorus over an extended period is required to make the diagnosis andwould expose the child unnecessarily to ionizing radiation.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009. Hernanz-Schulman M. Infantile hypertrophic stenosis. Radiology 2003;227(2):319–331."}, {"number": 5, "stem": "A nonemergent abdominal sonogram was subsequently performed on the same patient in Question 4, and imagesfrom the study are shown below. These images did not change over time. Regarding the entity demonstrated, whichof the following is true? 17", "options": [{"letter": "A", "text": "This condition often occurs in firstborn females."}, {"letter": "B", "text": "The treatment of choice is medical."}, {"letter": "C", "text": "The \"double-track sign\" and mucosal heaping may be seen in ultrasound exams performed for thiscondition."}, {"letter": "D", "text": "Gastric contents often readily empty into the pylorus during exams performed on patients with thiscondition."}], "images": ["assets/q05_p015_1.jpeg", "assets/q05_p015_2.jpeg"], "answer": "C", "explanation": "The ultrasound images shown demonstrate a thickened pyloric muscle and elongated pyloric channel,which did not change over time. These findings are consistent with hypertrophic pyloric stenosis (HPS). As statedabove, this condition often occurs in firstborn males. The treatment for this condition is a surgical pyloromyotomy. Itis important to distinguish HPS from pylorospasm as the latter is treated medically. On ultrasound examinations, the pyloric wall thickness should normally be <3 mm and the length of the pyloricchannel should not exceed 15 mm. In the images from this case, the pyloric wall thickness measures up to 5 mm onthe transverse view and the pyloric channel length measures up to 15. 2 mm on the long-axis view. However, thepublished criteria for both of these measurements have varied. Most importantly, the pylorus should not open duringthe ultrasound examination. In pylorospasm, there is transient thickening of the pyloric muscle and elongation of thechannel length. However, the pylorus does eventually open in cases of pylorospasm. If the ultrasound examination demonstrates aclosed pylorus with abnormal measurements of muscular thickness and channel length, it is important to extend thelength of the examination by an extra 3 to 5 minutes to confirm that the pylorus remains closed and excludepylorospasm. In addition to the findings above, there are ancillary or secondary signs of pyloric stenosis on ultrasoundincluding the \"double-track sign.\" This sign is created by the abnormally thickened muscle mass that compresses the pyloric channel into two smaller channels or tracks. In addition, thickened pyloric mucosa may indent into the antrumconsistent with antral or mucosal heaping.\n\nReferences: Blumer SL, Zucconi WB, Cohen HL, et al. The vomiting neonate: a review of the ACR appropriateness criteria andultrasound's role in the work-up of such patients. Ultrasound Q 2004;20(3):79–89. Cohen HL, Blumer SL, Zucconi WB. The sonographic double-track sign: not pathognomonic for hypertrophic pyloric stenosis;can be seen in pylorospasm. J Ultrasound Med 2004;23(5):641–646. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 6, "stem": "A patient presents for an MR exam of the abdomen and pelvis. Representative images from the study are shownbelow. Concerning the images, which of the following are true?", "options": [{"letter": "A", "text": "This lesion is the most common type of choledochal cyst."}, {"letter": "B", "text": "This lesion is consistent with a choldeochocele."}, {"letter": "C", "text": "This lesion is consistent with Caroli disease."}, {"letter": "D", "text": "This lesion is consistent with a type IVA choledochal cyst."}], "images": ["assets/q06_p016_1.jpeg", "assets/q06_p017_1.jpeg"], "answer": "A", "explanation": "The images demonstrate fusiform dilatation of the common bile duct. This is best visualized on thesecond image to the right of the first image. The Todani classification system has been used to classify choledochalcysts. The imaging findings depicted on the MRI are consistent with a type I choledochal cyst. Note that on Figure A,the gallbladder (short arrow) is seen to the left (patient's right) of the common bile duct (long arrow). Type Icholedochal cysts are seen in 80% to 90% of patients with choledochal cysts. Note that type I cysts can be furtherdivided into type IA, IB, and IC cysts depending upon their morphologic characteristics. A choledochocele is a type III cyst and involves only the intraduodenal portion of the common bile duct. Caroli disease or a type V cyst involvesdilatation of one or several segments of the intrahepatic bile ducts. A type IVA cyst involves dilatation of theintrahepatic and extrahepatic biliary ducts. 63 Todani Classification of Choledochal Cysts\n\nReferences: Kim OH, Chung HJ, Choi BG. Imaging of the choledochal cyst. Radiographics 1995;15(1):69–88. Mortelé KJ, Rocha TC, Streeter JL, et al. Multimodality imaging of pancreatic and biliary congenital anomalies. Radiographics2006;26(3):715–31."}, {"number": 7, "stem": "A radiograph from a well-appearing neonate with a distended abdomen and failure to pass meconium is shownbelow. Which of the following is the next most appropriate step in management?", "options": [{"letter": "A", "text": "Upper GI series"}, {"letter": "B", "text": "Abdominal ultrasound"}, {"letter": "C", "text": "CT scan"}, {"letter": "D", "text": "Contrast enema"}], "images": ["assets/q07_p018_1.jpeg"], "answer": "D", "explanation": "The image shown in the figure demonstrates diffusely dilated loops of bowel without definite rectalbowel gas. These findings along with the patient's clinical history are concerning for an obstruction of the distal orlower GI tract. The best way to evaluate for the etiology of such lower GI tract obstructions is to perform a contrastenema. Common causes of lower tract obstructions include Hirschprung disease, meconium plug syndrome (smallleft colon syndrome) (functional immaturity of the colon), ileal atresia, meconium ileus and anal atresia or anorectalmalformations. An upper GI series is the test of choice to evaluate for a suspected upper or high obstruction inneonates. Common causes of upper tract obstructions include midgut volvulus/malrotation, duodenal atresia/stenosis,duodenal web, annular pancreas and jejunal atresia. A CT scan is not the appropriate initial method to evaluatesuspected distal obstructions and would needlessly expose the child to ionizing radiation. An abdominal ultrasound isnot an appropriate way to evaluate a neonate with a suspected distal bowel obstruction.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 8, "stem": "A contrast enema was subsequently performed on the patient described in Question 7. Images from the study areshown below (A & B). Which of the following is the most likely diagnosis? 21", "options": [{"letter": "A", "text": "Hirschsprung disease"}, {"letter": "B", "text": "Functional immaturity of the colon"}, {"letter": "C", "text": "High ileal atresia"}, {"letter": "D", "text": "Low ileal atresia"}], "images": ["assets/q08_p019_1.jpeg", "assets/q08_p020_1.jpeg"], "answer": "B", "explanation": "Figures A and B demonstrate a contrast enema examination. In contrast enemas, it is important toevaluate the rectosigmoid ratio. The rectum should have a diameter equal to or larger than the sigmoid, which is anormal rectosigmoid ratio. Patients who have Hirschsprung disease have an abnormal rectosigmoid ratio in which thesigmoid has a larger diameter than the rectum. The study in this case demonstrates a normal rectosigmoid ratio. In addition, the left side of the colon appearssmall and ahaustral. The transverse and ascending colon are dilated. There are scattered filling defects seenthroughout the colon likely due to meconium plugs. These findings are consistent with functional immaturity of thecolon. Patients who have a high intestinal obstruction, or an obstruction that occurs proximal to the midileum, such as ahigh ileal atresia, will have a normal caliber colon. This is because there is ample proximal bowel to producesecretions that migrate distally and nourish the colon. Patients who have a low intestinal obstruction or an obstructionthat occurs in the distal ileum or colon will have a microcolon or unused colon because there is not enough proximalsmall bowel to produce secretions to nourish the colon.\n\nReferences: Berrocal T, Lamas M, Gutieerrez J, et al. Congenital anomalies of the small intestine, colon and rectum. Radiographics1999;19(5):1219–1236."}, {"number": 9, "stem": "Regarding the most likely diagnosis of the patient in Question 8, which of the following is true?", "options": [{"letter": "A", "text": "The initial treatment of choice is surgical."}, {"letter": "B", "text": "Repeated enemas with water-soluble contrast do not alleviate this condition."}, {"letter": "C", "text": "This entity is often seen in the offspring of diabetic mothers or mothers treated with magnesium sulfate."}, {"letter": "D", "text": "This entity is caused by a jejunal atresia."}], "images": [], "answer": "C", "explanation": "The initial treatment of choice for patients with functional immaturity of the colon is a contrast enemawith water-soluble contrast. Sometimes, repeated enemas are needed to flush out the meconium plugs. This conditionis often seen in offspring of diabetic mothers or mothers treated with magnesium sulfate for preeclampsia. Patientswho have a jejunal atresia will have a normal-appearing colon as explained in the explanation for Question 8.\n\nReferences: Berrocal T, Lamas M, Gutieerrez J, et al. Congenital anomalies of the small intestine, colon and rectum. Radiographics1999;19(5):1219–1236."}, {"number": 10, "stem": "Which of the following entities only occurs in patients with cystic fibrosis?", "options": [{"letter": "A", "text": "Functional immaturity of the colon"}, {"letter": "B", "text": "Meconium ileus"}, {"letter": "C", "text": "Ileal atresia"}, {"letter": "D", "text": "Jejunal atresia"}], "images": [], "answer": "B", "explanation": "Meconium ileus occurs secondary to obstruction of the distal ileum due to the accumulation ofabnormally tenacious meconium. It occurs exclusively in patients with cystic fibrosis and is the earliest clinicalpresentation of the disease.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 11, "stem": "Regarding microcolons, which of the following is true?", "options": [{"letter": "A", "text": "They are commonly seen in cases of jejunal atresia."}, {"letter": "B", "text": "They are not seen in patients with low ileal atresia."}, {"letter": "C", "text": "They are not often seen in meconium ileus."}, {"letter": "D", "text": "They are seen in conditions in which there is an unused colon."}], "images": [], "answer": "D", "explanation": "Microcolons are seen in conditions in which there is an unused colon such as distal bowel obstructionsincluding low ileal atresia and meconium ileus. Jejunal atresias are high bowel obstructions, and there is enoughproximal bowel to produce secretions to nourish the colon. Thus, a normal-caliber colon would be seen in contrastenemas performed in patients with a jejunal atresia or other proximal bowel obstructions.\n\nReferences: Berrocal T, Lamas M, Gutieerrez J et al. Congenital anomalies of the small intestine, colon and rectum. Radiographics 1999;19(5):1219–1236. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 12, "stem": "A CT scan is performed on a 5-year-old patient with no known medical history, and an image is shown below. Concerning the finding, which of the following is true?", "options": [{"letter": "A", "text": "Nonaccidental trauma should be suspected as an etiology."}, {"letter": "B", "text": "This is a rare complication of pediatric pancreatitis."}, {"letter": "C", "text": "This is a known early complication of pediatric pancreatitis."}, {"letter": "D", "text": "There are no more than two known causes of pediatric pancreatitis."}], "images": ["assets/q12_p021_1.jpeg"], "answer": "A", "explanation": "The CT scan demonstrates a pancreatic pseudocyst, which is a known common late complication ofacute pancreatitis, typically occurring 4 weeks after the development of a peripancreatic fluid collection. Pancreaticpseudocysts are the most common complication of pediatric pancreatitis. Pancreatitis in a young child should besuspected to be abuse related. However, there are other known causes of pediatric pancreatitis including pancreatitissecondary to trauma, biliary anomalies, and medication-related and autoimmune etiologies.\n\nReferences: Restrepo R, Hegerott HE, Kulkarni S, et al. Acute pancreatitis in pediatric patients: demographics, etiology anddiagnostic imaging. Am J Roentgenol 2016;206(3):632–644."}, {"number": 13, "stem": "A babygram obtained from a neonate is shown below. Concerning the findings, which of the following is true?", "options": [{"letter": "A", "text": "There is an association with oligohydramnios."}, {"letter": "B", "text": "The prognosis is generally poor."}, {"letter": "C", "text": "The findings are the result of an antenatal bowel perforation."}, {"letter": "D", "text": "The findings are likely secondary to bowel obstruction after birth."}], "images": ["assets/q13_p022_1.jpeg"], "answer": "C", "explanation": "The radiograph demonstrates a nonspecific bowel gas pattern with multiple calcifications throughoutthe abdomen (arrows). These findings are most consistent with meconium peritonitis. This entity is a result of asterile chemical peritonitis that occurs after antenatal bowel perforation, which usually occurs after the 3rd month ofgestation. The bowel perforation is a result of a bowel atresia, in utero volvulus, or meconium ileus. There is anassociation with polyhydramnios and not oligohydramnios. The prognosis is generally good.\n\nReferences: Dähnert W. Radiology review manual, 6th ed. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams &Wilkins, 2007. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Saunders Elsevier, 2009."}, {"number": 14, "stem": "An abdominal ultrasound examination is performed in a patient who presents with neonatal jaundice andconjugated hyperbilirubinemia. A representative figure is shown below. Which of the following is the nextappropriate step in management?", "options": [{"letter": "A", "text": "Upper GI series."}, {"letter": "B", "text": "Tc-99m HIDA scan."}, {"letter": "C", "text": "CT scan of the abdomen and pelvis."}, {"letter": "D", "text": "No further imaging is indicated."}], "images": ["assets/q14_p023_1.jpeg"], "answer": "B", "explanation": "The ultrasound image of the patient in the region of the gallbladder fossa fails to demonstrate thegallbladder. The clinical presentation of neonatal jaundice and absence of the gallbladder raises concern for biliaryatresia. The best way to demonstrate biliary atresia is with a Tc-99m HIDA scan. None of the other tests are helpfulto make the diagnosis of biliary atresia and in the case of an upper GI series and CT scan, will needlessly expose thepatient to ionizing radiation.\n\nReferences: Kirks DR, Coleman RE, et al. An imaging approach to persistent neonatal jaundice. Am J Roentgenol1984;142(3):461–465."}, {"number": 15, "stem": "Static images from a Tc-99m HIDA scan that was subsequently performed on the patient described in Question14 are shown below. These images were obtained after 6 hours of imaging. Which of the following is the nextappropriate step in management?", "options": [{"letter": "A", "text": "The study is normal and should be ended."}, {"letter": "B", "text": "Surgery should be immediately consulted as the findings are consistent with chronic cholecystitis."}, {"letter": "C", "text": "Delayed 24-hour images should be obtained."}, {"letter": "D", "text": "SPECT imaging should be performed to better delineate the focus of radiotracer activity in the pelvis."}], "images": ["assets/q15_p024_1.jpeg"], "answer": "C", "explanation": "The images fail to demonstrate bowel activity after 6 hours. A delayed image should then be obtainedafter 24 hours to evaluate for possible radiotracer excretion into bowel as biliary atresia cannot be excluded at thispoint in the study. This patient did not appear to have a gallbladder on the ultrasound exam as can be seen in thesetting of biliary atresia. Note, however, that while some patients with biliary atresia do not have a gallbladder, someaffected patients have a small gallbladder and other affected patients have a normal gallbladder. This patient,however, did not have a gallbladder and therefore could not have cholecystitis. The focus of radiotracer in the pelvisis excreted radiotracer within the urinary bladder, an expected finding.\n\nReferences: Dähnert W. Radiology review manual, 6th ed. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams &Wilkins, 2007."}, {"number": 16, "stem": "The decision was then made to obtain a delayed image at 24 hours after radiotracer injection on the patientdescribed in Questions 14 and 15. The delayed image is shown below. Concerning the findings, which of thefollowing is true?", "options": [{"letter": "A", "text": "Neonatal hepatitis has been excluded."}, {"letter": "B", "text": "A Kasai procedure is the treatment of choice."}, {"letter": "C", "text": "The findings are not consistent with biliary atresia."}, {"letter": "D", "text": "It is unlikely that this patient will need a liver transplant."}], "images": ["assets/q16_p025_1.jpeg"], "answer": "B", "explanation": "The image fails to demonstrate radiotracer excretion into bowel after 24 hours. Radiotracer activity isagain seen in the urinary bladder, and the activity inferior to the bladder is excreted radiotracer within the diaper. Given the clinical history, the imaging findings are consistent with biliary atresia. However, these findings can alsobe seen in the setting of severe hepatocellular dysfunction from neonatal hepatitis, and a liver biopsy is sometimesnecessary to distinguish between these two entities. The Kasai procedure (portoenterostomy) is performed in amajority of the patients with biliary atresia and has a greater success rate when performed in children <60 days old. This is why it is imperative to make the diagnosis of biliary atresia as early as possible. Note that the Kasai procedureis often a palliative procedure as most patients will eventually need a liver transplant.\n\nReferences: Bijl EJ, Bharwani KD, Houwen RHJ, et al. The long-term outcome of the Kasai operation in patients with biliaryatresia: a systematic review. Neth J Med 2013;71(4):170–173. Dähnert W. Radiology review manual, 6th ed. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams & Wilkins, 2007."}, {"number": 17, "stem": "Before performing the exam depicted in Questions 15 and 16, pretreatment with which of the following agentscan be used to enhance the specificity of the test?", "options": [{"letter": "A", "text": "Phenobarbital"}, {"letter": "B", "text": "CCKC. Cimetidine"}, {"letter": "D", "text": "Morphine"}], "images": [], "answer": "A", "explanation": "In jaundiced infants in whom biliary atresia is suspected, pretreatment with phenobarbital, 5 mg/kg/d,may be given orally in two divided doses daily for a minimum of 3 to 5 days before a Tc-99m HIDA scan to enhancebiliary excretion of the radiotracer and increase the specificity of the test. Phenobarbital stimulates biliary secretionby inducing hepatic enzymes, which increases conjugation and excretion of bilirubin. Morphine is given during HIDA scans to shorten the study time if there is nonvisualization of the gallbladder. This is typically injected 45 to 60minutes after injection of radiotracer if activity is seen in the bowel. It causes contraction of the sphincter of Oddi,which raises intrabiliary pressure and can cause retrograde filling of the gallbladder. Cimetidine can be given before Meckel scans to decrease gastric secretions. CCK is a synthetic hormone that causes gallbladder contraction, butmany patients with biliary atresia do not have a gallbladder.\n\nReferences: Dähnert W. Radiology review manual, 6th ed. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams &Wilkins, 2007. Majd M, Reba RC, Altman RP. Hepatobiliary scintigraphy with 99m Tc-PIPIDA in the evaluation of neonatal jaundice. Pediatrics1981;67:140–145."}, {"number": 18, "stem": "Images from an ultrasound and CT scan performed in an infant with a history of GI bleeding are shown below. Regarding the findings, which of the following is true?", "options": [{"letter": "A", "text": "A Meckel (Tc-99m Pertechnetate) scan can be helpful in making the diagnosis."}, {"letter": "B", "text": "The lesion is likely pancreatic in origin."}, {"letter": "C", "text": "These findings represent the most common type of choledochal cyst."}, {"letter": "D", "text": "The findings are suggestive of an exophytic cystic Wilms tumor."}], "images": ["assets/q18_p026_1.jpeg", "assets/q18_p027_1.jpeg"], "answer": "A", "explanation": "The lesion depicted on the ultrasound images demonstrates an anechoic cystic lesion with a wallcomposed of multiple layers resembling a normal bowel wall. This is characteristic of enteric duplication cysts where the cyst wall \"reduplicates\" the normal enteric wall. These lesions are usually attached to normal bowel butoccasionally migrate into the mesentery and become a type of mesenteric cyst. Thus, these lesions are not pancreaticor renal in origin. In addition, this lesion also appears separate from the kidney and pancreas on the CT scan as thereis no claw sign. Because enteric duplication cysts can contain ectopic gastric mucosa, a Meckel (Tc-99mpertechnetate) scan can be helpful in making the diagnosis.\n\nReferences: Kumar R, Tripathi M, Chandrashekar N, et al. Diagnosis of ectopic gastric mucosa using 99Tcm-pertechnetate:spectrum of scintigraphic findings. Br J Radiol 2005;78(932):714–720. Stoupis C, Ros PR, Abbit PL, et al. Bubbles in the belly: imaging of cystic mesenteric or omental masses. Radiographics1994;14(4):729–737."}, {"number": 19, "stem": "An incidental abnormality is noted in the visualized portions of the abdomen on a portable chest radiographobtained from a 3-year-old patient shown below. Which of the following would be the next appropriate step inmanagement?", "options": [{"letter": "A", "text": "Notify the referring clinician of the unexpected finding, and recommend an abdominal ultrasound."}, {"letter": "B", "text": "No further workup is needed."}, {"letter": "C", "text": "Notify the referring clinician of the unexpected finding, and recommend a stat upper GI series."}, {"letter": "D", "text": "Notify the referring clinician of the unexpected finding, and recommend an IR consult to check appropriatepositioning of the gastrojejunostomy tube."}], "images": ["assets/q19_p028_1.jpeg"], "answer": "A", "explanation": "Although the image presented below is a chest radiograph, there is a coarse calcification seen in theright upper quadrant (arrow). Although this calcification can be caused by multiple etiologies, a liver mass remainson the differential, and further evaluation with an ultrasound examination is indicated. An upper GI examinationwould not help to elucidate the etiology of a suspected hepatic calcification. Although there is a gastrojejunostomytube seen on the radiograph, the tip has been excluded from the film, and therefore, it cannot be determined whetheror not the tube is in its appropriate position. The next most appropriate step to determine whether or not the tube is inappropriate position would be to get an abdominal plain radiograph. Furthermore, the etiology of the suspectedhepatic calcification cannot be determined with either an IR consult or abdominal radiograph.\n\nReferences: Blickman JG, Parker BR, Barnes PD. Pediatric radiology: the requisites, 3rd ed. Philadelphia, PA: Elsevier/Saunders,2009. Chung EM, Lattin GE Jr, Cube R, et al. From the archives of the AFIP: Pediatric liver masses: radiologic-pathologic correlationpart 2. Malignant tumors. Radiographics 2011;31(2):483–507."}, {"number": 20, "stem": "Instead of an abdominal ultrasound, further evaluation of the patient in Question 19 was performed with a CTscan (Figure A) and MR examination (Figure B). Images from those studies are shown below. Which of thefollowing is the most likely diagnosis? 31", "options": [{"letter": "A", "text": "Mesenchymal hamartoma of the liver"}, {"letter": "B", "text": "Hepatocellular carcinoma"}, {"letter": "C", "text": "Hepatoblastoma"}, {"letter": "D", "text": "Focal nodular hyperplasia"}], "images": ["assets/q20_p029_1.jpeg", "assets/q20_p030_1.jpeg"], "answer": "C", "explanation": "Figure A is an axial image from a contrast-enhanced CT scan of the abdomen demonstrating a largeheterogeneous solid mass in the liver with a large calcification (long arrow), which may represent the calcificationseen on the plain film of the abdomen seen in Question 19. There are smaller satellite lesions in the periphery of theliver (short arrows). Figure B is an axial T1 fat-saturated image after contrast enhancement, which also demonstratesa heterogeneous solid enhancing mass with smaller satellite lesions in the periphery of the liver. Given the age groupand constellation of imaging findings, the most likely diagnosis is hepatoblastoma, a malignant liver mass. Ninety percent of cases of hepatoblastoma occur in children younger than 5 years of age. Hepatocellular carcinoma, which isalso a malignant solid tumor, rarely occurs in children under 5 years of age. Mesenchymal hamartoma of the liver is abenign liver lesion, which often appears as a complex cystic mass and primarily affects children under 5 years of age. Focal nodular hyperplasia (FNH) is most often seen in adult women but uncommonly occurs in young children andadolescents. Because FNH is composed predominantly of hepatocytes, it appears similar to normal liver, and thelesion may be difficult to visualize. Sometimes the only clue of the presence of this lesion is its mass effect onadjacent structures. The presence of a central scar may aid identification of this lesion.\n\nReferences: Chung EM, Cube R, Hall GJ, et al. From the archives of the AFIP: Pediatric liver masses: radiologic-pathologiccorrelation part 1. Benign tumors. Radiographics 2010;30(3):801–826. Chung EM, Lattin GE Jr, Cube R, et al. From the archives of the AFIP: Pediatric liver masses: radiologic-pathologic correlationpart 2. Malignant tumors. Radiographics 2011;31(2):483–507. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 21, "stem": "Concerning hepatoblastoma, which of the following is true?", "options": [{"letter": "A", "text": "AFP is not typically elevated in affected patients."}, {"letter": "B", "text": "There is a known association with Beckwith-Wiedemann syndrome."}, {"letter": "C", "text": "There is no known association with other congenital abnormalities."}, {"letter": "D", "text": "Most tumors are unresectable at diagnosis even with neoadjuvant chemotherapy."}], "images": [], "answer": "B", "explanation": "Hepatoblastoma has been associated with several syndromes, including Beckwith-Wiedemannsyndrome, Gardner syndrome, familial adenomatous polyposis, type 1A glycogen storage disease, and trisomy 18. Approximately 5% of cases occur in conjunction with other congenital anomalies, commonly of the genitourinaryand gastrointestinal systems. The most useful laboratory marker for hepatoblastoma is AFP. At least 90% of patientswith hepatoblastoma show abnormal elevation of AFP levels. Surgical resection is the mainstay of treatment forhepatoblastoma, and the prognosis depends on the resectability of the tumor. About 40% to 60% of hepatoblastomasare unresectable at diagnosis; however, with the use of neoadjuvant chemotherapy, up to 85% of these becomeresectable.\n\nReferences: Chung EM, Lattin GE Jr, Cube R, et al. From the archives of the AFIP: Pediatric liver masses: radiologic-pathologiccorrelation part 2. Malignant tumors. Radiographics 2011;31(2):483–507."}, {"number": 22, "stem": "An adolescent patient who is status post recent motor vehicle accident (MVA) is noted to have recurrentvomiting. An upper GI series is subsequently performed and images obtained after waiting a significant amount oftime after administration of oral contrast are shown below. Which of the following would be the next mostappropriate step in management? 33", "options": [{"letter": "A", "text": "Abdominal plain films"}, {"letter": "B", "text": "Small bowel follow-through"}, {"letter": "C", "text": "Gastric emptying study"}, {"letter": "D", "text": "Cross-sectional imaging"}], "images": ["assets/q22_p031_1.jpeg", "assets/q22_p032_1.jpeg"], "answer": "D", "explanation": "The images provided from an upper GI series demonstrate obstruction of the proximal duodenum. In apatient, involved in recent blunt trauma, a duodenal hematoma should be suspected. The next best step inmanagement would be an additional cross-sectional imaging study to see if the cause of the duodenal obstruction isdue to a duodenal hematoma or other lesion. Abdominal radiographs would not yield any further information aboutthe cause of the obstruction. A small bowel follow-through would not help if there is a duodenal obstruction. Agastric emptying study is used to evaluate the rate of gastric emptying into the duodenum. It would not help elucidatethe cause of a duodenal obstruction.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009. Swischuk LE. Emergency imaging of the acutely ill or injured child, 4th ed. Philadelphia, PA: Lippincott, Williams and Wilkins,2000."}, {"number": 23, "stem": "A CT scan with intravenous contrast but without oral contrast was subsequently performed on the patient in Question 22. Representative images are shown below. Intravenous contrast was administered but oral contrast wasnot administered. Regarding the findings, which of the following is true? 35", "options": [{"letter": "A", "text": "These lesions are often the result of penetrating abdominal trauma."}, {"letter": "B", "text": "In small children, these lesions are not commonly associated with nonaccidental trauma."}, {"letter": "C", "text": "Anticoagulation can often prevent these lesions from occurring."}, {"letter": "D", "text": "These lesions can sometimes be caused by endoscopic biopsies."}], "images": ["assets/q23_p033_1.jpeg", "assets/q23_p034_1.jpeg"], "answer": "D", "explanation": "The axial images from a contrast-enhanced CT examination demonstrate an intramural lesion ofheterogeneous fluid attenuation, which is likely secondary to a hematoma within the duodenum (arrows). Thehematoma causes luminal narrowing. Intramural duodenal hematomas are often the result of blunt trauma that can becaused by accidental trauma as well as nonaccidental trauma. Anticoagulation can also be a cause of spontaneousintramural duodenal hematomas. These lesions are also known to occur after endoscopic biopsy.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009. Ghersin E, Gaitini D, Willis O, et al. Intramural duodenal hematoma mimicking an intestinal mass on sonography. J Ultrasound Med 2002;21(6):693–695."}, {"number": 24, "stem": "An axial image from a CT scan is shown below. What is the most likely etiology of the appearance of thepancreas?", "options": [{"letter": "A", "text": "Tuberous sclerosis"}, {"letter": "B", "text": "von-Hippel–Lindau syndrome"}, {"letter": "C", "text": "Sturge-Weber syndrome"}, {"letter": "D", "text": "Cystic fibrosis"}], "images": ["assets/q24_p035_1.jpeg"], "answer": "D", "explanation": "The axial CT image demonstrates extensive low attenuation in the region of the pancreas so much sothat it is difficult to see normal pancreatic parenchyma. These findings are compatible with fatty infiltration of thepancreas. In children, cystic fibrosis is the most common etiology of fatty replacement of the pancreas. None of theother answer choices are known causes of fatty replacement of the pancreas.\n\nReferences: Vaughn DD, Jabra AA, Fishman EK. Pancreatic disease in children and young adults: evaluation with CT. Radiographics 1998;18(5):1171–1187."}, {"number": 25, "stem": "Regarding the most likely etiology of the appearance of the pancreas in the patient described in Question 24,which of the following is true?", "options": [{"letter": "A", "text": "This entity is often suspected with the presence of echogenic bowel seen on fetal ultrasounds."}, {"letter": "B", "text": "A sweat test is not helpful in making the diagnosis."}, {"letter": "C", "text": "Bronchiectasis is rare in these patients."}, {"letter": "D", "text": "Diagnosis usually occurs in adulthood."}], "images": [], "answer": "A", "explanation": "Echogenic bowel is seen in up to 60% to 70% of patients affected with cystic fibrosis. A sweat test isused to help make the diagnosis of cystic fibrosis, and affected patients have elevated concentrations of sodium andchloride in their sweat. There is progressive cystic and cylindrical bronchiectasis in these patients, which affects up to100% of patients after 6 months of age. The mean age of diagnosis of cystic fibrosis is 2. 9 years of age, and 90% ofpatients are diagnosed by 12 years of age.\n\nReferences: Dähnert W. Radiology review manual, 6th ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007."}, {"number": 26, "stem": "An image from an ultrasound exam performed on a young child with a history of cervical lymphadenopathy,fever, a red-colored \"strawberry-\"appearing tongue, rash, and conjunctival injection is shown below. Regarding themost likely etiology, which of the following is true?", "options": [{"letter": "A", "text": "EKG patterns of affected patients are almost always normal."}, {"letter": "B", "text": "Myocarditis in these patients is extremely rare."}, {"letter": "C", "text": "There is no known therapy for this entity."}, {"letter": "D", "text": "There is an association with coronary artery aneurysms."}], "images": ["assets/q26_p036_1.jpeg"], "answer": "D", "explanation": "The image from the ultrasound examination demonstrates hydropic distension of the gallbladder,which along with the patient's symptoms suggests Kawasaki syndrome. This entity often leads to the development ofcoronary artery aneurysms. Myocarditis occurs in 25% of these patients and when severe can cause congestive heartfailure. Atrioventricular conduction disturbances have been reported, which can cause abnormal EKG tracings. Treatment with gamma globulins can decrease the severity of the illness and can decrease the likelihood of delayedcomplications such as coronary aneurysms.\n\nReferences: Dähnert W. Radiology review manual, 6th ed. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams &Wilkins, 2007. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 27, "stem": "Images obtained after a patient's nasogastric tube was injected with 10 cc of air are shown below. Regarding thefindings, which of the following is true? 39", "options": [{"letter": "A", "text": "Further evaluation with an upper GI series is recommended."}, {"letter": "B", "text": "The treatment of choice for this condition is medical."}, {"letter": "C", "text": "The findings are caused by extrinsic and intrinsic conditions that lead to duodenal obstruction."}, {"letter": "D", "text": "These findings are only seen on plain film radiographs."}], "images": ["assets/q27_p037_1.jpeg", "assets/q27_p038_1.jpeg"], "answer": "C", "explanation": "The radiographs demonstrate the \"double-bubble\" sign, which is seen in cases of duodenal obstructioncaused by intrinsic as well as extrinsic causes. The intrinsic causes are duodenal atresia, duodenal stenosis, andduodenal webs; the extrinsic causes include annular pancreas, malrotation of the gut with obstruction produced bymidgut volvulus or by Ladd bands, and preduodenal position of the portal vein. The two air-filled bubbles representthe stomach and proximal duodenum. The most common cause of this finding among the causes of duodenalobstruction is duodenal atresia, which is reproducible with a variety of other imaging modalities, including uppergastrointestinal studies and sonography. For the neonate with the classic appearance of a double bubble, additionalradiologic investigation is unnecessary, and the surgeon is alerted to plan for surgery, because all congenital causes ofduodenal obstruction require surgery.\n\nReferences: Traubici J. The double bubble sign. Radiology 2001;220(2):463–464."}, {"number": 28, "stem": "Regarding duodenal atresia, which of the following is true?", "options": [{"letter": "A", "text": "The \"double-bubble\" sign is pathognomonic for this entity."}, {"letter": "B", "text": "This entity usually presents with nonbilious vomiting."}, {"letter": "C", "text": "There is a strong association with Down syndrome."}, {"letter": "D", "text": "The atretic segment is usually just proximal to the ampulla of Vater."}], "images": [], "answer": "C", "explanation": "Duodenal atresia is associated with many congenital syndromes, the foremost being Down syndrome. Approximately 30% of children with duodenal atresia have trisomy 21. There is also an association with anomalies ofthe VACTERL (vertebral, anorectal, cardiac, tracheoesophageal, renal, and limb anomalies) spectrum. The atreticsegment is most often just beyond or distal to the ampulla of Vater. Therefore, patients usually present with biliousvomiting. However, the atretic segment can sometimes be proximal to the ampulla of Vater, and therefore, somepatients can present with nonbilious vomiting. As stated above, the \"double-bubble\" sign is seen in cases of duodenalobstruction, which can be caused by a variety of intrinsic and extrinsic causes, and therefore, this sign is not onlyseen in duodenal atresia.\n\nReferences: Traubici J. The double bubble sign. Radiology 2001;220(2):463–464."}, {"number": 29, "stem": "Images from a fetal MRI are shown below. Regarding the most likely diagnosis, which of the following is true?", "options": [{"letter": "A", "text": "Other associated anomalies are uncommon."}, {"letter": "B", "text": "The defect is not usually covered by a membrane."}, {"letter": "C", "text": "The mortality rates of this condition are low even with associated defects."}, {"letter": "D", "text": "The umbilical cord usually inserts into the defect."}], "images": ["assets/q29_p039_1.jpeg", "assets/q29_p040_1.jpeg"], "answer": "D", "explanation": "The fetal MR images demonstrate a midline anterior abdominal wall defect. There is herniation of theliver and bowel through the defect. The umbilical cord can be seen inserting in the defect (arrow). These arehallmarks of an omphalocele. Omphaloceles are also usually covered by a membrane. Omphaloceles are commonly(54. 2%) found to be associated with other anomalies, which determines prognosis. The mortality rate is 80% whenany associated defect is present and increases to near 100% when chromosomal or cardiovascular anomalies exist. 76\n\nReferences: Daltro P, Fricke BL, Kline-Fath BM, et al. Prenatal MRI of congenital abdominal and chest wall defects. Am JRoentgenol 2005;184(3):1010–1016."}, {"number": 30, "stem": "Regarding gastroschisis, which of the following is true?", "options": [{"letter": "A", "text": "There is usually a midline defect."}, {"letter": "B", "text": "There is a high association with associated anomalies."}, {"letter": "C", "text": "The umbilical cord usually inserts into the defect."}, {"letter": "D", "text": "The intrauterine mortality rate is low."}], "images": [], "answer": "D", "explanation": "Gastroschisis is the herniation of fetal bowel loops into the amniotic cavity usually through a right-sided paraumbilical abdominal wall defect. A midline defect is seen in cases of omphalocele. This anomaly does nothave a surrounding membrane as is seen in cases of omphalocele. Associated anomalies are rare in gastroschisis. Thisis in contrast to cases of omphalocele, which is commonly associated with other defects. The intrauterine mortalityrate of gastroschisis is 10% to 15%, which is relatively low. Comparing Gastroschisis and Omphalocele\n\nReferences: Daltro P, Fricke BL, Kline-Fath BM, et al. Prenatal MRI of congenital abdominal and chest wall defects. AJR Am JRoentgenol 2005;184(3):1010–1016. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 31, "stem": "An abdominal radiograph from a 3-day-old premature infant with bloody stools is shown below. Which of thefollowing would be the next most appropriate step in management?", "options": [{"letter": "A", "text": "Stat upper GI series"}, {"letter": "B", "text": "Contrast enema"}, {"letter": "C", "text": "Emergent surgical consult"}, {"letter": "D", "text": "Bowel rest, antibiotics, and serial abdominal radiographs"}], "images": ["assets/q31_p041_1.jpeg"], "answer": "D", "explanation": "The clinical history of a premature infant who is in the first week of life presenting with bloody stoolsis suggestive of necrotizing enterocolitis (NEC). The abdominal radiograph demonstrates an abnormal bowel gaspattern with gaseous distension of the bowel and right lower quadrant pneumatosis intestinalis (arrow), which arefindings consistent with the clinical history of NEC. On the radiographs, there is no evidence of free peritoneal air orbowel perforation to indicate an emergent surgical consult. Bowel perforation is the main indication for surgicalintervention in patients with NEC. A stat upper GI series would not be indicated in this situation as the history is notconsistent with an upper gastrointestinal obstruction. A contrast enema may eventually be performed in this patientlater on to evaluate for colonic strictures, which can develop from NEC. However, it is not indicated at this time. Thenext best appropriate step in management is for the patient to be made n.p.o. and for antibiotics to be initiated alongwith serial abdominal radiographs to monitor disease progression.\n\nReferences: Epelman M, Daneman A, Navarro OM, et al. Necrotizing enterocolitis: review of state-of-the-art imaging findings withpathologic correlation. Radiographics 2007;27(2):285–305."}, {"number": 32, "stem": "Regarding necrotizing enterocolitis (NEC), which of the following is true?", "options": [{"letter": "A", "text": "The development of large bowel strictures is a known complication."}, {"letter": "B", "text": "The disease is only treated medically."}, {"letter": "C", "text": "It affects only premature patients."}, {"letter": "D", "text": "Pneumatosis is an indication for surgical management."}], "images": [], "answer": "A", "explanation": "Approximately 10% of neonates with NEC are born at term, and congenital heart disease is the mainrisk factor in this group. However, the incidence of NEC is inversely proportional to the gestational age. Infants of 28weeks or less gestational age and those of extremely low birth weight (<1,000 g) are at a greater risk for NEC. NEC is treated surgically as well as medically. Bowel perforation and free air is the main indication for surgicalinstead of medical therapy for NEC. Pneumatosis is not an indication for surgical treatment. In the clinical setting of NEC, the presence of intramural gas confirms the diagnosis of NEC—if not present, the patient may still have NEC,and treatment should be commenced if the clinical findings are suggestive of NEC. The amount of intramural gaspresent does not always relate to the clinical severity of NEC in any particular patient, and disappearance ofintramural gas does not always correlate with clinical improvement. Portal venous gas has also been reported on plainabdominal radiographs in up to 30% of neonates with NEC, and these are usually, but not always, the more severely affected cases. Portal venous gas is not always associated with a fatal outcome. As stated above, colonic stricturescan develop from NEC, and contrast enemas are often performed to evaluate the colon in patients with a history of NEC.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009. Epelman M, Daneman A, Navarro OM, et al. Necrotizing enterocolitis: review of state-of-the-art imaging findings with pathologiccorrelation. Radiographics 2007;27(2):285–305."}, {"number": 33, "stem": "Images from a study performed on a child with recurrent gastrointestinal bleeding are shown below. Regardingthe abnormality, which of the following is true?", "options": [{"letter": "A", "text": "The finding represents a false diverticulum."}, {"letter": "B", "text": "The abnormality is most commonly found in the right side of the colon."}, {"letter": "C", "text": "These structures are most often lined by heterotopic gastric and pancreatic mucosa."}, {"letter": "D", "text": "No known complications of this entity have been reported."}], "images": ["assets/q33_p042_1.jpeg", "assets/q33_p042_2.jpeg"], "answer": "C", "explanation": "The images shown are from a Meckel (Tc-99m pertechnetate) scan. The study demonstrates a tinyfocus of increased radiotracer uptake in the right lower quadrant with activity in the stomach appearing at the sametime which is best seen on Figure B. After intravenous injection of Tc-99m pertechnetate, a Meckel diverticulumcontaining gastric mucosa will manifest as a small rounded area of increased activity in the right lower quadrant. AMeckel diverticulum is a true diverticulum, composed of all layers of the intestinal wall, and is lined by normal smallintestinal mucosa. It frequently contains heterotopic gastric and pancreatic mucosa and less commonly, duodenal,colonic, or biliary mucosa. They commonly occur in the distal ileum. Clinical symptoms arise from complications ofthe diverticulum such as peptic ulceration with hemorrhage; diverticulitis; intestinal obstruction from diverticularinversion, intussusception, volvulus, torsion, or inclusion of the diverticulum in a hernia; formation of enteroliths;and development of neoplasia within the diverticulum.\n\nReferences: Levy AD, Hobbs CM. From the archives of the AFIP. Meckel diverticulum: radiologic features with pathologiccorrelation. Radiographics 2004;24(2):565–587."}, {"number": 34, "stem": "Pretreating the patient before the examination performed in Question 33 with which of the following medicationsmay help improve the sensitivity of the exam?", "options": [{"letter": "A", "text": "Cimetidine"}, {"letter": "B", "text": "Phenobarbital"}, {"letter": "C", "text": "CCKD. Morphine"}], "images": [], "answer": "A", "explanation": "Histamine H2 blockers (cimetidine, ranitidine, famotidine) inhibit acid secretion by the parietal cells, thus limiting release of Tc-99m pertechnetate by the mucosal cells and improving the sensitivity of the Meckel scan. Phenobarbital stimulates biliary secretion by inducing hepatic enzymes, which increases conjugation and excretion ofbilirubin. It is given prior to HIDA scans to evaluate for biliary atresia to increase the specificity of the test. Morphineis given during HIDA scans to shorten the study time if there is nonvisualization of the gallbladder. Morphine is typically injected 45 to 60 minutes after injection of radiotracer if activity is seen in the bowel. It causes contractionof the sphincter of Oddi, which raises intrabiliary pressure and can cause retrograde filling of the gallbladder. CCK isa synthetic hormone that causes gallbladder contraction and can be used to pretreat patients who have been fasting>24 hours prior to Tc-99m HIDA scans.\n\nReferences: Dähnert W. Radiology review manual, 6th edition. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams &Wilkins, 2007. Majd M, Reba RC, Altman RP. Hepatobiliary scintigraphy with 99m Tc-PIPIDA in the evaluation of neonatal jaundice. Pediatrics1981;67:140–145. Spottswood SE, Pfluger T, Bartold SP, et al. SNMMI and EANM practice guideline for meckel diverticulum scintigraphy 2. 0. JNucl Med Technol 2014;42(3):163–169."}, {"number": 35, "stem": "An abdominal radiograph obtained from a neonate in the NICU is shown below. Which of the following lines isnot in correct position?", "options": [{"letter": "A", "text": "UA line"}, {"letter": "B", "text": "UV line"}, {"letter": "C", "text": "Bladder catheter"}, {"letter": "D", "text": "NG tube"}], "images": ["assets/q35_p044_1.jpeg"], "answer": "B", "explanation": "Note that on a single AP radiograph, it is difficult to say with certainty whether lines and tubes areactually within certain anatomical structures, and therefore, it is preferable to say that lines and tubes project over orwithin anatomical structures. The tip of the UV line projects in the right upper quadrant presumably within the portalvenous system (long arrow) and is clearly in an inferior position to the inferior cavoatrial junction, which is its properposition. The UV line should not be placed within the right atrium to prevent the development of cardiac arrhythmias. The tip of the UA line projects over the T8/T9 intervertebral disc space (short arrow), which is an acceptableposition. The UA line should be placed in the abdominal aorta either in a high position at the T6 to T10 level or in alow position at the L3 to L5 level. If placed in either of these positions, it should avoid the mesenteric branches of theabdominal aorta where it could potentially cause end-organ damage secondary to dissections or thrombus formation. The distal tip and side ports of the nasogastric tube project over the stomach. The side port and tip of the bladdercatheter are in normal position and project over the urinary bladder.\n\nReferences: Hunter TB, Taljanovic MS. Medical devices of the abdomen and pelvis. Radiographics 2005;25(2):503–523."}, {"number": 36, "stem": "Which of the following is the correct position for the tip of an umbilical venous catheter?", "options": [{"letter": "A", "text": "Superior cavoatrial junction"}, {"letter": "B", "text": "Inferior cavoatrial junction"}, {"letter": "C", "text": "L3 or below"}, {"letter": "D", "text": "Over the sacrum"}], "images": [], "answer": "B", "explanation": "As stated above, the correct placement for an umbilical venous catheter is over the inferior cavoatrialjunction. The correct placement for the other major lines and tubes often used in neonates can be found in theexplanation for Question 35.\n\nReferences: Hunter TB, Taljanovic MS. Medical devices of the abdomen and pelvis. Radiographics 2005;25(2):503–523."}, {"number": 37, "stem": "An otherwise healthy 10-year-old thin patient presents with a recent onset of fever and right lower quadrantabdominal pain with guarding and rebound on physical examination. Lab results reveal an elevated white blood cellcount with a left shift. A plain film of the abdomen was ordered and was unremarkable. Which of the followingwould be the next most appropriate step in management?", "options": [{"letter": "A", "text": "Contrast enema"}, {"letter": "B", "text": "Upper GI series and small bowel follow-through"}, {"letter": "C", "text": "Ultrasound of the right lower quadrant"}, {"letter": "D", "text": "CT scan of the abdomen and pelvis with IV contrast"}], "images": [], "answer": "C", "explanation": "The clinical picture is concerning for appendicitis. Of the exams listed, an ultrasound of the rightlower quadrant would be the next most appropriate test to evaluate for appendicitis in this clinical setting. Ultrasoundis the initial imaging modality of choice for diagnosing acute appendicitis in children primarily because of its lack ofionizing radiation.\n\nReferences: Larson DB, Trout AT, Fierke SR, et al. Improvement in diagnostic accuracy of ultrasound of the pediatric appendixthrough the use of equivocal interpretive categories. Am J Roentgenol 2015;204(4):849–856."}, {"number": 38, "stem": "A right lower quadrant ultrasound was performed on the patient from Question 37, and a representative image isshown below. Despite the findings, the clinical staff is still highly suspicious for appendicitis. Which of the followingwould be the next most appropriate step in management?", "options": [{"letter": "A", "text": "Meckel (Tc-99m Pertechnetate) scan"}, {"letter": "B", "text": "MRI of the abdomen and pelvis"}, {"letter": "C", "text": "Upper GI and small bowel follow-through"}, {"letter": "D", "text": "CT scan of the abdomen and pelvis with intravenous contrast"}], "images": ["assets/q38_p045_1.jpeg"], "answer": "B", "explanation": "The ultrasound exam fails to visualize the appendix. In addition, there are no secondary signs ofappendicitis such as echogenic fat, abscesses, or abnormal-appearing loops of bowel. However, appendicitis is stillclinically suspected. Of the exams listed, an MR examination of the abdomen and pelvis is the most appropriate nexttest in this clinical scenario. MRI has a sensitivity of 100% and specificity of 96% for appendicitis in pediatricpatients after inconclusive appendix sonography. These results are similar to published sensitivity and specificityrates of CT for appendicitis, which historically has been the preferred way to evaluate for appendicitis after aninconclusive ultrasound. However, unlike MR, CT utilizes ionizing radiation. CT is still often the preferred way toevaluate for appendicitis in younger patients or those patients who would need sedation to complete an MRexamination, which is significantly longer than a CT examination and requires greater patient cooperation.\n\nReferences: Dillman JR, Gadepalli S, Sroufe NS, et al. Equivocal pediatric appendicitis: unenhanced MR imaging protocol fornonsedated children—a clinical effectiveness study. Radiology 2016;279(1):216–225. Herliczek TW, Swenson DW, Mayo-Smith WW. Utility of MRI after inconclusive ultrasound in pediatric patients with suspectedappendicitis: retrospective review of 60 consecutive patients. Am J Roentgenol 2013;200(5):969–973."}, {"number": 39, "stem": "Regarding the abnormality demonstrated in the images below from an MR of the abdomen and pelvis performedon the same patient in Questions 37 and 38, which of the following is true? 48", "options": [{"letter": "A", "text": "CT is more sensitive than MR in detecting this abnormality."}, {"letter": "B", "text": "MR is more sensitive than CT in detecting this abnormality."}, {"letter": "C", "text": "CT is as sensitive as MR in detecting this abnormality."}, {"letter": "D", "text": "Ultrasound is more sensitive than CT in detecting this abnormality."}], "images": ["assets/q39_p046_1.jpeg", "assets/q39_p047_1.jpeg"], "answer": "C", "explanation": "The images shown are two axial ultrafast spin echo fat-saturated sequences images from an MR of theabdomen and pelvis. They demonstrate a fluid-filled, tubular structure (arrows) with surrounding edema andinflammatory changes of the adjacent fat planes. These findings are consistent with acute appendicitis. The reported sensitivities of MR and CT for the detection of appendicitis in children has been found to be similarin multiple publications and is preferred to CT in patients who do not require sedation due to its lack of ionizingradiation. CT is more sensitive than ultrasound for the detection of appendicitis in children. However, ultrasound isoften utilized prior to CT or MR because it is cheaper and does not utilize ionizing radiation as in the case of CT. 84\n\nReferences: Dillman JR, Gadepalli S, Sroufe NS, et al. Equivocal pediatric appendicitis: unenhanced MR imaging protocol fornonsedated children—a clinical effectiveness study. Radiology 2016;279(1):216–225. Herliczek TW, Swenson DW, Mayo-Smith WW. Utility of MRI after inconclusive ultrasound in pediatric patients with suspectedappendicitis: retrospective review of 60 consecutive patients. Am J Roentgenol 2013;200(5):969–973. Strouse PJ. Pediatric appendicitis: an argument for US. Radiology 2010;255(1):8–13."}, {"number": 40, "stem": "Images are shown below from a study performed on a 6-month-old child who has a history of wheezing. Regarding the study shown below, which is the most likely diagnosis?", "options": [{"letter": "A", "text": "Normal study"}, {"letter": "B", "text": "Gastroesophageal reflux"}, {"letter": "C", "text": "Malrotation with midgut volvulus"}, {"letter": "D", "text": "Duodenal atresia"}], "images": ["assets/q40_p048_1.jpeg", "assets/q40_p048_2.jpeg"], "answer": "B", "explanation": "Figure A shows sequential images from a liquid gastric emptying exam, which demonstrates reflux ofradiotracer from the stomach to the esophagus on several images (arrows). Therefore, the study is not normal. Inthese studies, Tc-99m sulfur colloid is mixed with milk or formula. Duodenal atresia is best diagnosed on a plain filmwith the \"double-bubble\" sign. Malrotation and midgut volvulus is best diagnosed on an upper GI series.\n\nReferences: Applegate KE, Anderson JM, Klatte EC. Intestinal malrotation in children: a problem-solving approach to the uppergastrointestinal series. Radiographics 2006;26(5): 1485–1500. Reyhan M, Yapar AF, Aydin M, et al. Gastroesophageal scintigraphy in children: a comparison of posterior and anterior imaging. Ann Nucl Med 2005;19(1):17–21. Traubici J. The double bubble sign. Radiology 2001;220(2):463–464."}, {"number": 41, "stem": "Regarding the exam performed on the patient in Question 40, which of the following is true?", "options": [{"letter": "A", "text": "The patient has rapid gastric emptying."}, {"letter": "B", "text": "The patient has delayed gastric emptying."}, {"letter": "C", "text": "The gastric emptying rate is normal."}, {"letter": "D", "text": "The patient likely has bilious vomiting."}], "images": [], "answer": "B", "explanation": "Figure B reports the percent of gastric emptying after 62 minutes is 1%. Although the publishednormative values for gastric emptying of liquids vary by age, 1% is definitely delayed based on published studies. Insmall children <2 years of age, the published normal gastric emptying rate is 32% or greater. In children older than 2years of age, the normal reported range is 44% or higher. Memorizing these numbers is not as important as realizingthat 1% would be markedly low by these standards. Based on these standards, the gastric emptying rate is not normal,and the patient has markedly delayed gastric emptying, not rapid gastric emptying. Delayed gastric emptying is not acause of bilious vomiting. Note that nonbilious vomiting as opposed to bilious vomiting is associated withgastroesophageal reflux.\n\nReferences: Heyman S. Gastric emptying in children. J Nucl Med 1998;39(5):865–869."}, {"number": 42, "stem": "A plain abdominal radiograph obtained from a 16-year-old patient is shown below. Regarding the patient, whichof the following is true?", "options": [{"letter": "A", "text": "The radiograph is normal."}, {"letter": "B", "text": "A pelvic ultrasound should be ordered for further evaluation."}, {"letter": "C", "text": "The patient likely presented with abdominal pain and diarrhea."}, {"letter": "D", "text": "An emergent upper GI should be performed."}], "images": ["assets/q42_p049_1.jpeg"], "answer": "C", "explanation": "The plain abdominal radiograph demonstrates thickening of the haustral folds consistent with colonic\"thumbprinting\" (arrows). This sign is usually indicative of submucosal edema. Classically described with ischemiccolitis, it is also noted in other forms of colitis, including ulcerative and infectious colitis. Thus, the radiograph isabnormal. Abdominal pain and diarrhea are often signs of a colitis. Both an upper GI series and pelvic ultrasoundwould not be helpful in evaluating the colon.\n\nReferences: Cutinha AH, De Nazareth AG, Alla VM, et al. Clues to colitis: tracking the prints. West J Emerg Med 2011;11(1):112–113."}, {"number": 43, "stem": "A young child presents to the emergency room with abdominal pain. Abdominal radiographs obtained with the patient placed in the supine and left lateral decubitus position are shown below. What is the next most appropriatestep in management?", "options": [{"letter": "A", "text": "Emergent upper GI series"}, {"letter": "B", "text": "Abdominal ultrasound"}, {"letter": "C", "text": "Stat surgical consult"}, {"letter": "D", "text": "Treatment for pneumonia"}], "images": ["assets/q43_p050_1.jpeg", "assets/q43_p051_1.jpeg"], "answer": "D", "explanation": "There is a nonobstructive bowel gas pattern seen on the abdominal radiographs. However, there isextensive air-space opacity at the right lung base on the left lateral decubitus view, which likely represents pneumonia. Therefore, this patient should be treated for pneumonia. Abdominal pain can be a presentation of anoccult pneumonia in children and that is why it is important to always look at the lung bases on pediatric abdominalradiographs. Once the diagnosis of pneumonia is made, an upper GI series, surgical consult, or abdominal ultrasoundis not necessary.\n\nReferences: Kanegaye JT, Harley JR. Pneumonia in unexpected locations: an occult cause of pediatric abdominal pain. J Emerg Med 1995;13(6):773–779."}, {"number": 44, "stem": "An MR examination was performed on a teenage patient with a long-standing history of abdominal pain anddiarrhea. Images are shown below. Which of the following is the most likely diagnosis?", "options": [{"letter": "A", "text": "Crohn disease"}, {"letter": "B", "text": "Ulcerative colitis"}, {"letter": "C", "text": "Typhlitis"}, {"letter": "D", "text": "Pseudomembranous colitis"}], "images": ["assets/q44_p052_1.jpeg", "assets/q44_p053_1.jpeg"], "answer": "A", "explanation": "Figure A is a coronal T1 fat-saturated contrast-enhanced MRI image, which demonstrates contrastenhancement of the terminal ileum (arrow). Figure B is an axial DWI image that shows restricted diffusion of theterminal ileum (arrow). Although high signal on a DWI image should correspond with low signal on an ADC map ifthere is true restricted diffusion, the combination of the contrast enhancement and high signal on the DWI sequencein the terminal ileum is suggestive of a terminal ileitis. Note that the remainder of the bowel including the colonappears normal on both images. Therefore, typhlitis or neutropenic colitis, which usually affects the right colon, isunlikely as is pseudomembranous colitis, which usually manifests as a pancolitis. Although there can be a \"backwashileitis\" in ulce
