<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSK Imaging Techniques/Physics/Quality and Safety Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>MSK Imaging Techniques/Physics/Quality and Safety Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":1,"appId":"msk-imaging-techniques-quiz-ch1",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "What MRI parameter change can result in decreased metallic susceptibility artifact?", "options": [{"letter": "A", "text": "Increase receiver bandwidth"}, {"letter": "B", "text": "Increase field strength"}, {"letter": "C", "text": "Increase voxel size"}, {"letter": "D", "text": "Increase slice thickness"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Increasing the receiver bandwidth tends to decrease magnetic susceptibility artifact by restricting geometric distortion to a smaller space and overall allowing shorter echo spacing. Increased field strength, increased voxel size, and increased slice thickness would all tend to increase geometric distortion and thus worsen susceptibility artifact from metal.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:474-486."}, {"number": "2a", "stem": "A patient presents for an arthrogram of the left shoulder. What is the preferred needle placement for a rotator interval approach?", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "D"}], "images": ["assets/q2a_p015_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The needle is placed on the superomedial humeral head in the rotator interval technique. This position allows the needle tip to be in the region of the rotator interval; therefore, it is superior to the subscapularis tendon and medial and inferior to the supraspinatus tendon. This location allows the needle tip to avoid piercing either tendon. If the needle tip was placed at position D, it may pierce the supraspinatus tendon. The needle is not placed on the glenoid side of the joint. In addition to the rotator cuff interval approach, the needle may be placed into the glenohumeral articulation via an anterior or posterior approach. The junction of the middle and inferior two-thirds of the glenohumeral joint is targeted in this technique.\n\nReferences: Crim J, Morrison WB. Specialty Imaging: Arthrography: Principles and Practice in Radiology. Salt Lake City, UT: Amirsys; 2009:24-27. Peterson JJ, Fenton DS, Czervinoke LF. Image-Guided Musculoskeletal Intervention. Philadelphia, PA: Saunders; 2008:27-31."}, {"number": "2b", "stem": "The patient is scheduled for an arthrogram followed by a CT examination of the left shoulder. What is the most appropriate mixture for the arthrogram?", "options": [{"letter": "A", "text": "Iodinated contrast 1:1 saline and/or anesthetic"}, {"letter": "B", "text": "Iodinated contrast 1:10 saline and/or anesthetic"}, {"letter": "C", "text": "Iodinated contrast 1:100 saline and/or anesthetic"}, {"letter": "D", "text": "Iodinated contrast 1:1,000 saline and/or anesthetic"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The most appropriate choice of contrast mixture is iodinated contrast 1:1 with saline and/or anesthetic. If considerably less iodinated contrast is used, the mixture may not be well visualized on either the arthrogram or on the following CT examination, rendering the study essentially an anesthetic/saline injection without the benefit of iodinated contrast.\n\nReferences: Crim J, Morrison WB. Specialty Imaging: Arthrography: Principles and Practice in Radiology. Salt Lake City, UT: Amirsys; 2009:2-3. Peterson JJ, Fenton DS, Czervinoke LF. Image-Guided Musculoskeletal Intervention. Philadelphia, PA: Saunders; 2008:27."}, {"number": "2c", "stem": "What is the most appropriate reason for performing a CT rather than MR arthrogram?", "options": [{"letter": "A", "text": "Lack of joint mobility"}, {"letter": "B", "text": "Anticoagulation"}, {"letter": "C", "text": "Infection at injection site"}, {"letter": "D", "text": "Metallic hardware near the joint"}], "images": ["assets/q2c_p016_01.jpg", "assets/q2c_p017_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Reasons for performing a CT arthrogram instead of an MRI arthrogram include contraindications to MRI, such as metal near the joint in question. Postoperative rotator cuff evaluation can be performed with either MRI or CT. Anticoagulation and infection at the joint are contraindications for arthrography in general regardless of whether it is followed by CT or MRI. Lack of joint mobility does not necessarily negate the ability to perform a shoulder MRI; however, certain sequences such as the ABER (abduction, external rotation) view may not be possible. In this case, a posterior superior labral tear is noted.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:60-66."}, {"number": "3a", "stem": "A patient presents for a left hip arthrogram. What is the preferred needle location to avoid complications with nerve, vessel, and bursa injections?", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "D"}], "images": ["assets/q3a_p018_01.jpg", "assets/q3a_p019_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Three approaches have been described for entering the hip joint: direct vertical, oblique (lateral to medial) vertical, and lateral, which target the lateral margin of the femoral head. The most commonly performed approaches are the direct vertical and oblique vertical. The advantage of the direct vertical is that the needle remains parallel to the fluoroscopic beam, thus allowing for simple and straight-forward entry into the joint. The preferred location for needle placement in the direct vertical approach is on the superior lateral head-neck junction of the femur. This is denoted by D on the image. B is another possible location, but this location is close to the vessels and femoral nerve and may lead to an iliopsoas injection. The needle is not placed into the femoroacetabular joint or on the acetabular side of the joint; therefore, A and C are incorrect.\n\nReferences: Crim J, Morrison WB. Specialty Imaging: Arthrography: Principles and Practice in Radiology. Salt Lake City, UT: Amirsys; 2009:130-133. Peterson JJ, Fenton DS, Czervinoke LF. Image-Guided Musculoskeletal Intervention. Philadelphia, PA: Saunders; 2008:95-98."}, {"number": "3b", "stem": "The patient is scheduled for an arthrogram followed by an MRI examination of the left hip. What is the appropriate mixture for the arthrogram?", "options": [{"letter": "A", "text": "0.01 mL gadolinium per 20 mL of iodinated contrast, saline, and/or anesthetic mixture"}, {"letter": "B", "text": "0.1 mL gadolinium per 20 mL of iodinated contrast, saline, and/or anesthetic mixture"}, {"letter": "C", "text": "1 mL gadolinium per 20 mL of iodinated contrast, saline, and/or anesthetic mixture"}, {"letter": "D", "text": "10 mL gadolinium per 20 mL of iodinated contrast, saline, and/or anesthetic mixture"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The correct mixture is 0.1 to 0.2 mL gadolinium per 20 mL of iodinated contrast, saline, and/or anesthetic. Gadolinium is therefore diluted to a 1/100 to 1/200 concentration. If the gadolinium is not dilute enough, it appears as a low signal fluid collection obscuring the relevant findings. If the gadolinium is too dilute, the appearance is more comparable to a saline arthrogram.\n\nReferences: Crim J, Morrison WB. Specialty Imaging: Arthrography: Principles and Practice in Radiology. Salt Lake City, UT: Amirsys; 2009:2-3. Peterson JJ, Fenton DS, Czervinoke LF. Image-Guided Musculoskeletal Intervention. Philadelphia, PA: Saunders; 2008:1-5."}, {"number": "3c", "stem": "For which scenario is MR preferred over CT after arthrography? Sagittal oblique T1-weighted fat saturated Axial T2-weighted fat saturated", "options": [{"letter": "A", "text": "Claustrophobic patient"}, {"letter": "B", "text": "Potential cartilage defects"}, {"letter": "C", "text": "Obese patients"}, {"letter": "D", "text": "Prior labral surgery"}], "images": ["assets/q3c_p021_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. MRI arthrography is advantageous for evaluation of labral tears, cartilage defects, osteochondral bodies, ligamentum teres injuries, and monitoring hip dysplasias. CT arthrography may be beneficial in large or obese patients, postoperative evaluation of labral tears to avoid the metallic artifact seen in labral repair on MRI, and in patients who cannot undergo MRI evaluation. In this case, an anterior-superior labral tear is seen with an associated paralabral cyst.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:62-68."}, {"number": "4", "stem": "The following image shows an artifact. From the list below, select the best protocol change to eliminate this artifact.", "options": [{"letter": "A", "text": "Double the image matrix."}, {"letter": "B", "text": "Double the image oversampling in the phase-encoded direction."}, {"letter": "C", "text": "Double the receiver bandwidth."}, {"letter": "D", "text": "Double the FOV."}], "images": ["assets/q4_p022_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The artifact shown is aliasing in the phase-encoding direction resulting in the subject's left leg being superimposed on the anatomy of the right leg. By doubling the image oversampling in the phase-encoded direction, this artifact will be eliminated.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:474-486."}, {"number": "5", "stem": "What artifact is noted on the sagittal T2-weighted MR image below?", "options": [{"letter": "A", "text": "Gibbs phenomenon"}, {"letter": "B", "text": "Chemical shift"}, {"letter": "C", "text": "Motion"}, {"letter": "D", "text": "Wraparound"}], "images": ["assets/q5_p023_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Gibbs phenomenon, also known as ringing artifact, has the appearance of multiple, regularly spaced bands, which are parallel to one another. They typically present as alternating bright and dark signal bands, which slowly fade as the distance from the source of the artifact increases. They often occur at sharp boundaries, which have high contrast transitions in the image. This artifact is caused by insufficient sampling of high frequencies, which may occur at sharp discontinuities in signal.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:483-484."}, {"number": "6", "stem": "Placing an MRI receiver coil farther than normal from the area of interest will result in", "options": [{"letter": "A", "text": "increased signal-to-noise ratio."}, {"letter": "B", "text": "decreased receiver bandwidth."}, {"letter": "C", "text": "decreased spatial resolution."}, {"letter": "D", "text": "decreased signal-to-noise ratio."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The farther a coil is from the area of interest, the lower the signal and thus the lower the overall signal-to-noise ratio since noise is constant. Receiver bandwidth and spatial resolution parameters are independent of the signal-to-noise ratio.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:460-464."}, {"number": "7", "stem": "Which group of gadolinium-based contrast agents are determined to be safest for dialysis patients?", "options": [{"letter": "A", "text": "Group 1"}, {"letter": "B", "text": "Group 2"}, {"letter": "C", "text": "Group 3"}, {"letter": "D", "text": "Group 4"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Gadolinium-based contrast agents are divided into three groups for the purposes of discussion of risk assessment. The group 2 agents are considered to have very low, if any, risk for developing nephrogenic systemic sclerosis (NSF) and are therefore recommended in patients at risk for developing NSF, such as patients on dialysis or various renal diseases. The group 2 agents include gadobenate dimeglumine (MultiHance-Bracco Diagnostics), gadobutrol (Gadavist-Bayer HealthCare Pharmaceuticals), gadoterate acid (Dotarem-Guerbet), and gadoteridol (ProHance- Bracco Diagnostics). Groups 1 and 3 are not recommended in these patients. There is no group 4.\n\nReferences: American College of Radiology (ACR). ACR Manual on Contrast Media. Version 10.3. Reston, VA: American College of Radiology; 2018:81-89."}, {"number": "8", "stem": "In which scenario would an ultrasound contrast agent be contraindicated?", "options": [{"letter": "A", "text": "Breast-feeding patient"}, {"letter": "B", "text": "Pregnant patient"}, {"letter": "C", "text": "Patient with right to left shunt"}, {"letter": "D", "text": "Injecting through an arterial line"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The only current contraindication for ultrasound-guided contrast agents is injection through an arterial line. At this time, the other scenarios listed are considered safe or at least have no known contraindications.\n\nReferences: American College of Radiology (ACR). ACR Manual on Contrast Media. Version 10.3. Reston, VA: American College of Radiology; 2018:90-92."}, {"number": "9", "stem": "A patient with severe stage IV renal disease needs a contrast-enhanced CT. How long should the patient's metformin be withheld after the completion of the CT?", "options": [{"letter": "A", "text": "It does not need to be withheld."}, {"letter": "B", "text": "12 hours."}, {"letter": "C", "text": "24 hours."}, {"letter": "D", "text": "48 hours."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Patients with severe stage IV or V (eGFR < 30 mL/min/1.73 m2) kidney disease, have acute kidney injury, or are undergoing arterial catheter studies, which could result in emboli to the renal arteries, are recommended to have their metformin held immediately before the study and for 48 hours after the study. Metformin can be resumed after 48 hours and also it has been determined that the renal function is normal.\n\nReferences: American College of Radiology (ACR). ACR Manual on Contrast Media. Version 10.3. Reston, VA: American College of Radiology; 2018:45-47."}, {"number": "10", "stem": "Which technique will achieve high-resolution imaging of small MSK structures?", "options": [{"letter": "A", "text": "2D imaging with thin slices"}, {"letter": "B", "text": "3D imaging with thin slices"}, {"letter": "C", "text": "2D imaging with a large number of averages"}, {"letter": "D", "text": "Proton density imaging"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Imaging at high resolution requires thin slices; however, when you use thin slices in a 2D acquisition, the signal-to-noise tends to decrease too much for the images to be useful. This decrease can be overcome using 3D, which achieves thin slices but regains SNR through averaging.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:459-460."}, {"number": "11", "stem": "What is the best method to achieve quality T2-weighted images in a patient with difficulty remaining still during imaging?", "options": [{"letter": "A", "text": "Single echo spin echo imaging"}, {"letter": "B", "text": "Gradient echo imaging"}, {"letter": "C", "text": "Radial imaging such as BLADE (MRI acronym, Siemens) or PROPELLER (MRI acronym, GE)"}, {"letter": "D", "text": "Use of the body coil instead of a surface coil"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. The radial imaging techniques such as BLADE (MRI acronym, Siemens) or PROPELLER (MRI acronym, GE) sample the center of k-space more frequently than standard rectilinear techniques. As a result, they can tolerate more movement of patients during the image acquisition without significantly degrading the image quality.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:456-457."}, {"number": "12", "stem": "What is an appropriate volume of triamcinolone acetonide (40 mg/mL) for a hip injection?", "options": [{"letter": "A", "text": "0.01 mL"}, {"letter": "B", "text": "0.1 mL"}, {"letter": "C", "text": "1 mL"}, {"letter": "D", "text": "10 mL"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. The appropriate volume of triamcinolone acetonide (40 mg/mL) or dexamethasone sodium phosphate (10 mg/mL) is 1 mL for a hip injection. This may be mixed with an analgesic such as lidocaine.\n\nReferences: Blaichman JI, Chan BY, Michelin P, et al. US-guided musculoskeletal interventions in the hip with MRI and US correlation. Radiographics. 2020;40:181-199."}, {"number": "13", "stem": "What parameter can be altered without changing the total scan time?", "options": [{"letter": "A", "text": "Number of excitations (NEX)"}, {"letter": "B", "text": "Number of phase-encoding steps"}, {"letter": "C", "text": "Number of frequency-encoding steps"}, {"letter": "D", "text": "Time of repetition (TR)"}, {"letter": "E", "text": "Echo train length (ETL)"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Total scan time is directly proportional to time of repetition (TR), number of excitations (NEX), and number of phase-encoding steps. Total scan time is inversely proportional to the echo train length (ETL). The number of frequency-encoding steps does not alter acquisition time.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:450."}, {"number": "14", "stem": "Which change can lower the signal-to-noise ratio on a T2-weighted image?", "options": [{"letter": "A", "text": "Increase the number of averages."}, {"letter": "B", "text": "Increase the bandwidth."}, {"letter": "C", "text": "Decrease the echo time (TE)."}, {"letter": "D", "text": "Decrease the echo train interval."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The signal-to-noise ratio is proportional to the inverse square root of the frequency- encoded bandwidth. Thus, increasing the bandwidth increases the amount of noise collected and will decrease the signal-to-noise ratio.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:440-441."}, {"number": "15", "stem": "The following image of a pelvis has an artifact. What is the most likely cause?", "options": [{"letter": "A", "text": "Aliasing of signal from posterior soft tissues"}, {"letter": "B", "text": "Metal-induced field distortion"}, {"letter": "C", "text": "Poor fat suppression"}, {"letter": "D", "text": "Patient movement"}], "images": ["assets/q15_p025_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The artifact in the image results from the metal on the patient's lower abdomen, such as a pants zipper.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:474-486."}, {"number": "16", "stem": "A patient has a large, dark-colored tattoo over the area which needs to undergo an MRI examination. What is a possible safety concern?", "options": [{"letter": "A", "text": "Interference with scan"}, {"letter": "B", "text": "Susceptibility distortion"}, {"letter": "C", "text": "Heating of the tattoo by radio waves"}, {"letter": "D", "text": "Heating of the tattoo by gradients"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. The safety concern would be heating of the tattoo by absorption of radiofrequency waves because the tattoo may contain small fragments of metal. This contamination is more common in older tattoos but is uncommon in the newer inks used in tattooing over the last 20 years.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:495-499."}, {"number": "17", "stem": "Why is fluid surrounding the joint hyperintense on this T1-weighted image?", "options": [{"letter": "A", "text": "Saline was injected into the joint."}, {"letter": "B", "text": "Omnipaque was injected into the joint."}, {"letter": "C", "text": "Gadolinium was injected into the joint."}, {"letter": "D", "text": "It is an inflow artifact."}], "images": ["assets/q17_p026_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. T1 relaxation time is long in water molecules, and thus, fluid is hypointense on T1. This T1-weighted image represents an arthrogram where gadolinium contrast has been injected into the joint. The fluid surrounding the joint is hyperintense on this T1-weighted image, because gadolinium causes T1 shortening. Saline and Omnipaque would appear as increased signal on a T2-weighted image but not on a T1-weighted image.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:423-426."}, {"number": "18", "stem": "This MR arm image was acquired on a subject with metal in the same arm. What could exacerbate the artifact?", "options": [{"letter": "A", "text": "Long echo time (TE) gradient echo sequence"}, {"letter": "B", "text": "Fast/turbo spin echo sequence"}, {"letter": "C", "text": "Short echo time (TE) spin echo sequence"}, {"letter": "D", "text": "Increasing the bandwidth"}], "images": ["assets/q18_p027_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The presence of the metal induces substantial inhomogeneity in the magnetic field. Gradient echo images are particularly sensitive to magnetic field inhomogeneities because they do not have a 180-degree pulse to refocus the magnetization. This effect is exacerbated with longer echo times.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:431-437."}, {"number": "19", "stem": "What is an appropriate volume of total fluid injected for a shoulder arthrogram?", "options": [{"letter": "A", "text": "5 mL"}, {"letter": "B", "text": "10 mL"}, {"letter": "C", "text": "20 mL"}, {"letter": "D", "text": "30 mL"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The appropriate volume for injected fluid for a shoulder arthrogram is approximately 10 mL. This would include saline, analgesics, and contrast solutions. Similar size joints, such as the hip, would also be injected with a similar volume.\n\nReferences: Peterson JJ, Fenton DS, Czervinoke LF. Image-Guided Musculoskeletal Intervention. Philadelphia, PA: Saunders; 2008:27."}, {"number": "20", "stem": "What is an appropriate volume of total fluid injected for a wrist arthrogram?", "options": [{"letter": "A", "text": "4 mL"}, {"letter": "B", "text": "8 mL"}, {"letter": "C", "text": "12 mL"}, {"letter": "D", "text": "16 mL"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The appropriate volume for injected fluid for a wrist arthrogram is approximately 3 to 5 mL. This would include saline, analgesics, and contrast solutions. Similar size joints, such as the ankle, would also be injected with a similar volume.\n\nReferences: Peterson JJ, Fenton DS, Czervinoke LF. Image-Guided Musculoskeletal Intervention. Philadelphia, PA: Saunders; 2008:72-73."}, {"number": "21", "stem": "A 35-year-old female undergoes a CT examination with contrast and develops severe bronchospasm. What should you administer?", "options": [{"letter": "A", "text": "0.1 mL/kg of 1/10,000 dilution of epinephrine IM"}, {"letter": "B", "text": "0.1 mL/kg of 1/10,000 dilution of epinephrine IV"}, {"letter": "C", "text": "0.3 mL of 1/10,000 dilution of epinephrine IM"}, {"letter": "D", "text": "0.3 mL/kg of 1/10,000 dilution of epinephrine IV"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Reactions to iodinated contrast for which epinephrine treatment should be considered include diffuse erythema with hypotension, moderate or severe bronchospasm, all forms of laryngeal edema, persistent hypotension, and those who are unresponsive and pulseless. The correct dose of epinephrine is either 0.1 mL/kg of 1/10,000 dilution IV or 0.01 mL/kg of 1/1,000 dilution IM.\n\nReferences: American College of Radiology (ACR). ACR Manual on Contrast Media. Version 10.3. Reston, VA: American College of Radiology; 2018:103-109."}, {"number": "22", "stem": "What is an advantage of performing a biopsy of a soft tissue mass under ultrasound guidance?", "options": [{"letter": "A", "text": "Allows for the shortest passage of the needle to the target"}, {"letter": "B", "text": "Eliminates the need for conscious sedation"}, {"letter": "C", "text": "Areas of vascularity and viable tissue can be assessed throughout the procedure"}, {"letter": "D", "text": "Allows for use of a smaller-gauge biopsy needle"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Many factors are similar when performing a biopsy under ultrasound guidance as compared to another modality, such as CT guidance. The need for conscious sedation, the type of needle used, and the path to the target may all be similar whether using ultrasound or CT guidance. An advantage of ultrasound is the ability to use color Doppler throughout a procedure to detect vessels as well as areas of a mass, which are more vascular. IV contrast may be given prior to or during a CT-guided procedure to identify vessels and enhancing areas of tumor, but the contrast will dissipate and is contraindicated in some patients. The vascular area of the tumor represents viable tissue and should be targeted, as opposed to the areas without vascularization, which may represent necrosis. Other advantages of US include the lack of radiation, potential improved patient satisfaction with positioning, real-time visualization of the needle, and potential increased speed of the biopsy. As with any biopsy in musculoskeletal radiology, discussion with the orthopedic surgeon to determine the approach prior to biopsy is recommended to avoid inappropriate tissue contamination and more aggressive surgery. Needles for ultrasound-guided sampling may include a 22 gauge for fine needle aspiration or 14 to 18 gauge for core biopsy.\n\nReferences: Bianchi S, Martinoli C. Ultrasound of the Musculoskeletal System. Berlin, Germany: Springer; 2007:896-897."}, {"number": "23", "stem": "What is an absolute contraindication for a hip steroid injection?", "options": [{"letter": "A", "text": "Daily aspirin therapy"}, {"letter": "B", "text": "Diabetes"}, {"letter": "C", "text": "Hypertension"}, {"letter": "D", "text": "Local infection"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Local infections, such as overlying cellulitis or a septic hip joint, is a contraindication for a hip injection. Steroid injections are elective procedures; therefore, the infection should be resolved before placing a needle into and through an area of infection, which will potentially seed the joint with the infection. Hyperglycemia and hypertension are known transient side effects of corticosteroid; however, this is self-limiting, and a history of diabetes and hypertension are not absolute contraindications for the procedure. The risk of bleeding is minimal; therefore, the patient is not required to hold the daily aspirin therapy for the procedure.\n\nReferences: Blaichman JI, Chan BY, Michelin P, et al. US-guided musculoskeletal interventions in the Hip with MRI and US correlation. Radiographics. 2020;40:181-199."}, {"number": "24", "stem": "A 26-year-old male with bacterial endocarditis develops hip pain while in the hospital. A hip aspiration is ordered to evaluate for a septic hip. Which location is the most appropriate needle placement for the aspiration?", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "D"}], "images": ["assets/q24_p029_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The image presented is a long axis, or sagittal, image of the left hip using a curvilinear transducer. A marks the acetabulum, B marks the labrum, and D marks the proximal femur inferior to the joint capsule. The needle should not be placed onto the acetabular side of the joint, within the labrum, or inferior to the joint capsule on the proximal femur. C marks the anterior recess of the femoral head-neck junction and represents the most appropriate position to place the needle for a hip aspiration or injection under ultrasound guidance.\n\nReferences: Bianchi S, Martinoli C. Ultrasound of the Musculoskeletal System. Berlin, Germany: Springer; 2007:908-909."}, {"number": "25", "stem": "A 20-year-old male endures a wrist injury after a fall. What study would offer the best spatial resolution to detect a subtle fracture of the scaphoid cortex?", "options": [{"letter": "A", "text": "STIR axial images"}, {"letter": "B", "text": "Thin section CT"}, {"letter": "C", "text": "T1-weighted axial images"}, {"letter": "D", "text": "Bone scan"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The cortical surfaces of the scaphoid traverse many planes and multiple angles making detection of a subtle fracture of the scaphoid difficult with radiographs. Spatial resolution is the ability to differentiate between two high-contrast objects. Currently, CT offers the best spatial resolution for detection of subtle fractures of the cortex.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:3-6."}, {"number": "26", "stem": "A 75-year-old female with osteoporosis injures her hip after a fall. What study would offer the best contrast resolution to evaluate for a nondisplaced fracture of the hip?", "options": [{"letter": "A", "text": "Radiographs"}, {"letter": "B", "text": "CT"}, {"letter": "C", "text": "MRI"}, {"letter": "D", "text": "Ultrasound"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. MRI offers the best contrast resolution for detection of nondisplaced hip fractures. Contrast resolution is the ability to detect differences in intensities in adjacent regions on an image. In the hip, this would allow the detection of a nondisplaced fracture line, bone marrow edema, and hemorrhage.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:3-6."}, {"number": "27", "stem": "A 45-year-old male presents with shoulder pain after sustaining an injury playing tennis. What study would offer the best spatial resolution of the rotator cuff tendons?", "options": [{"letter": "A", "text": "Bone scan"}, {"letter": "B", "text": "CT"}, {"letter": "C", "text": "MRI"}, {"letter": "D", "text": "Ultrasound"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. With the aid of high-resolution transducers, ultrasound currently offers the best spatial resolution for evaluation of superficial structures such as many ligaments and tendons. In the shoulder, the rotator cuff is well visualized in most patients with the use of ultrasound utilizing transducers ranging from 7.5 to 20 MHz. The resolving power of current ultrasound units is <0.1 mm, which is better than either CT or MRI.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:90."}, {"number": "28a", "stem": "A 60-year-old female presents with the dual x-ray absorptiometry study of the hip presented below. Based on the results of this study, what diagnosis would this patient receive?", "options": [{"letter": "A", "text": "Normal"}, {"letter": "B", "text": "Osteomalacia"}, {"letter": "C", "text": "Osteopenia"}, {"letter": "D", "text": "Osteoporosis"}], "images": ["assets/q28a_p030_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The T-score is most commonly used for diagnosis. According to the World Health Organization Criteria, a normal bone mineral density has a T-score ≥−1.0, osteopenia is between −1.0 and −2.5, and osteoporosis is ≤−2.5. In this case, the T-score is in the range of osteopenia. When diagnosing osteoporosis, the lower of the T-scores between the PA spine (not shown in this case) and the hip is used. When evaluating the hip for fracture risk, the lower of the T-scores of the hip should be used.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:81-88."}, {"number": "28b", "stem": "What is the difference between the T-score and the Z-score?", "options": [{"letter": "A", "text": "The T-score is the absolute bone mineral density score."}, {"letter": "B", "text": "The T-score is calculated by comparing the patient to a young-normal reference population."}, {"letter": "C", "text": "The Z-score is the absolute bone mineral density score."}, {"letter": "D", "text": "The Z-score is calculated by comparing the patient to a young-normal reference population."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Absolute bone mineral density (BMD) measurements are not used for the diagnosis of osteoporosis. Instead, T-score values are used for diagnosis. The T-score is a standardized score calculated by subtracting the BMD of a young-normal reference population from the patient's measured BMD and dividing by the standard deviation of a young-normal reference population. A Z- score is calculated similar to a T-score, except the patient is compared against an age-matched reference population instead of a young-normal reference population.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:81-88."}, {"number": "29", "stem": "What is the most appropriate use of 18F-FDG PET/CT in evaluation of soft tissue tumors?", "options": [{"letter": "A", "text": "Evaluation of treatment response"}, {"letter": "B", "text": "Biopsy needle placement planning"}, {"letter": "C", "text": "Initial formation of a differential diagnosis"}, {"letter": "D", "text": "Screening of at-risk family members"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. 18F-FDG PET/CT imaging has several potential uses in malignant soft tissue tumors including primary staging, metastatic evaluation, and evaluation of tumor response to treatment. It does not currently have a role in biopsy needle placement planning or as a screening exam. Although it has shown promise in distinguishing high-grade sarcomas, it is not currently routine clinical practice to use FDG PET in the initial formation of a differential diagnosis.\n\nReferences: Beaman FD, Jelinek JS, Priebat DA. Current imaging and therapy of malignant soft tissue tumors and tumor-like lesions. Semin Musculoskelet Radiol. 2013;17:168-176. Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:30-32."}, {"number": "30", "stem": "A 45-year-old male presents with clinical concern for vertebral osteomyelitis. The patient has an MRI incompatible implanted device. Which study should be suggested for evaluation of vertebral osteomyelitis?", "options": [{"letter": "A", "text": "Tc-99m MDP"}, {"letter": "B", "text": "Tc-99m HMPAO"}, {"letter": "C", "text": "FDG PET/CT"}, {"letter": "D", "text": "In-111 WBC"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. In the setting of chronic osteomyelitis, FDG PET/CT has excellent accuracy. Studies have shown similar sensitivity and specificity to MRI in the evaluation of vertebral osteomyelitis. Labeled leukocytes have poor sensitivity in the diagnosis of vertebral osteomyelitis, and this evaluation is not recommended.\n\nReferences: Demirev A, Weijers R, Geurts J, et al. Comparison of [18F]FDG PET/CT and MRI in the diagnosis of active osteomyelitis. Skeletal Radiol. 2014;43:665-672. Sethi I, Baum YS, Grady EE. Current status of molecular imaging of infection: a primer. AJR Am J Roentgenol. 2019;213(2):300-308."}, {"number": "31", "stem": "Typically no grid is used when acquiring extremity radiographs. What is the best explanation for this technique?", "options": [{"letter": "A", "text": "The use of the grid will block primary x-rays."}, {"letter": "B", "text": "The use of the grid will degrade image quality."}, {"letter": "C", "text": "Scatter radiation is not significant in imaging the hand and foot."}, {"letter": "D", "text": "The use of the grid will decrease patient dose."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Scatter radiation depends on the size of the imaging area and the patient's size. For small body regions, less radiation is generated.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:231-235."}, {"number": "32", "stem": "Which represents a serious complication from a steroid injection?", "options": [{"letter": "A", "text": "Vomiting"}, {"letter": "B", "text": "Headache"}, {"letter": "C", "text": "Facial flushing"}, {"letter": "D", "text": "Tendon rupture"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Serious complications from steroid injections include tendon rupture, chondrotoxicity, septic joint, and cutaneous atrophy and depigmentation. Less serious, transient complications include corticosteroid flares, facial flushing, headache, nausea and vomiting, upset stomach, hyperglycemia, hypertension, and chest fluttering.\n\nReferences: Blaichman JI, Chan BY, Michelin P, et al. US-guided musculoskeletal interventions in the hip with MRI and US correlation. Radiographics. 2020;40:181-199."}, {"number": "33", "stem": "In x-ray imaging of the pelvis, which osseous edge will be the sharpest that has the least blurring (unsharpness)?", "options": [{"letter": "A", "text": "A, since it has the longest object to detector distance"}, {"letter": "B", "text": "B, since it is located at the center of the x-ray beam"}, {"letter": "C", "text": "C, since it has the shortest object to detector distance"}, {"letter": "D", "text": "The same, since the focal spot blurring is independent of the location"}], "images": ["assets/q33_p032_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Focal spot blurring depends on geometric structure. It is directly proportional to the object to detector distance and inversely proportional to the x-ray source to object distance. C has the shortest object to detector distance and the longest source to object distance, compared to A and B.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:207-209."}, {"number": "34", "stem": "In radiographic imaging, what is the result of increasing the x-ray source to detector distance (SID)?", "options": [{"letter": "A", "text": "Increased focal spot blurring"}, {"letter": "B", "text": "Decreased focal spot blurring"}, {"letter": "C", "text": "Increased patient dose"}, {"letter": "D", "text": "Focal spot blurring is independent of SID"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Focal spot blurring depends on geometric structure. It is directly proportional to object to detector distance and inversely proportional to x-ray source to object distance. Increasing SID will increase x-ray to object distance while object to detector distance remains the same.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:207-209."}, {"number": "35", "stem": "The following image demonstrates metal streak artifact. Changing what acquisition parameter will most efficiently minimize this artifact?", "options": [{"letter": "A", "text": "Increase kV"}, {"letter": "B", "text": "Decrease kV"}, {"letter": "C", "text": "Increase mAs"}, {"letter": "D", "text": "Decrease mAs"}], "images": ["assets/q35_p033_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The presence of metal objects in the scan field can lead to severe streak artifact. This artifact is due to incomplete attenuation profiles where the density of the metal is beyond the normal range. Increasing kV can help penetrate the object, thereby decreasing the streak artifact.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:367-370."}, {"number": "36", "stem": "The following radiographic image of the chest was obtained with dual-energy subtraction. Dual- energy subtraction is based on the attenuation coefficient changes of bone and soft tissue with x-ray energy allowing for improved conspicuity of bone abnormalities compared to conventional x-ray images. Regarding the attenuation of bone and soft tissues as well as the attenuation difference between the two, which is true when there is an increase in x-ray energy?", "options": [{"letter": "A", "text": "Attenuation of bone and tissue both decreases while the attenuation difference decreases."}, {"letter": "B", "text": "Attenuation of bone and tissue both decreases while the attenuation difference increases."}, {"letter": "C", "text": "Attenuation of bone and tissue both increases while the attenuation difference decreases."}, {"letter": "D", "text": "Attenuation of bone and tissue both increases while the attenuation difference increases."}], "images": ["assets/q36_p034_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. With the increase of x-ray energy, attenuation always decreases, and the attenuation difference between different materials will also decrease.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:228-230."}, {"number": "37", "stem": "The following images are from a patient with a right hip replacement. The images were acquired with the same technical parameters (kV, mAs, pitch) and are shown with same window level and window width. What is the most likely reason why the first image has less metal hardware artifact than the second?", "options": [{"letter": "A", "text": "Utilization of metal artifact removal software"}, {"letter": "B", "text": "Utilization of different reconstruction kernels"}, {"letter": "C", "text": "Utilization of thicker slices"}, {"letter": "D", "text": "Utilization of thinner slices"}], "images": ["assets/q37_p035_01.jpg", "assets/q37_p035_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Increasing reconstruction slice thickness helps reduce metal artifact. In general, the use of metal artifact removal software changes the artifact pattern. In this question, the images show the same metal artifact pattern; therefore, metal artifact removal software was not used. The use of a smooth reconstruction kernel may also help reduce artifacts but will not change the partial volume effect. Here, the first image shows greater partial volume effect compared to the second image.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:367-370."}, {"number": "38", "stem": "In the following sagittal image from a cervical spine CT, why is the image quality worse in the lower cervical spine as compared to the upper cervical spine?", "options": [{"letter": "A", "text": "Photon starvation at the shoulder area"}, {"letter": "B", "text": "Reconstruction algorithm for sagittal image"}, {"letter": "C", "text": "Larger size vertebral bodies in the lower cervical spine"}, {"letter": "D", "text": "Patient motion due to breathing during CT acquisition"}], "images": ["assets/q38_p037_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Insufficient x-ray photons arrive at the detector at the lower cervical levels because of the patient's large shoulders, which is known as photon starvation.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:367-370."}, {"number": "39", "stem": "Patient positioning helps improve image quality. Which position produces the best radiographic image of the foot?", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "D"}], "images": ["assets/q39_p038_01.jpg", "assets/q39_p039_01.jpg", "assets/q39_p040_01.jpg", "assets/q39_p041_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The heel effect: x-ray intensity on the cathode side of the x-ray field is higher than that on the anode side. The difference in radiation intensity across the useful beam of an x-ray field can vary by as much as 45%. The heel effect is important when imaging anatomic structures that differ greatly in thickness or mass density. In general, positioning the cathode side over the thicker part of the anatomy provides more uniform exposure to the detector. Therefore, the calcaneus should be on the cathode side.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:184-185."}, {"number": "40", "stem": "A 50-year-old female presents with clinical concern for an infected right knee prosthesis. What scenario would be diagnostic for infection?", "options": [{"letter": "A", "text": "Tc-99m sulfur colloid uptake exceeds In-111 WBC uptake."}, {"letter": "B", "text": "In-111 WBC uptake exceeds Tc-99m sulfur colloid uptake."}, {"letter": "C", "text": "Tc-99m sulfur colloid uptake equals In-111 WBC uptake."}, {"letter": "D", "text": "In-111 WBC has increased uptake without comparison to Tc-99m sulfur colloid."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Diagnosing infection in prosthesis patients can be performed with a Tc-99m sulfur colloid and In-111 WBC combined study. In this study, the Tc-99m sulfur colloid uptake is subtracted, either visually or with the aid of a computer, from the In-111 WBC uptake. If the In-111 WBC uptake exceeds the Tc-99m sulfur colloid uptake, the study is considered positive for infection. An In-111 WBC scan is not performed alone because false-positive results may occur due to physiologic uptake from the marrow. By performing the combined study, this physiologic uptake is corrected as it will be present on both studies and will therefore be subtracted out.\n\nReferences: Lee YJ, Sadigh S, Mankad K, et al. The imaging of osteomyelitis. Quant Imaging Med Surg. 2016;6(2):184-198. Sethi I, Baum YS, Grady EE. Current status of molecular imaging of infection: a primer. AJR Am J Roentgenol. 2019;213(2):300-308."}, {"number": "41", "stem": "The Gemstone Spectral Imaging technique allows the production of monochromatic spectral images at various voltage levels from dual-energy CT imaging. Why would monochromatic spectral images at high energy be useful in reducing metal artifacts?", "options": [{"letter": "A", "text": "Monochromatic x-ray photons can substantially reduce beam hardening."}, {"letter": "B", "text": "Monochromatic x-ray photons can substantially increase beam hardening."}, {"letter": "C", "text": "Monochromatic x-ray photons can substantially reduce photon starvation."}, {"letter": "D", "text": "Monochromatic x-ray photons can substantially increase photon starvation."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. In general, the beam is composed of individual photons with a range of energies. As the beam passes through an object, it becomes \"harder,\" meaning the energy increases, because the lower energy photons are absorbed more rapidly, leaving behind only the high-energy photons. For a monochromatic beam, no energy change is involved.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:367-370. 60 kV, 130 mAs 75 kV, 40 mAs 120 kV, 10 mAs A. A B. B C. C D. All deliver the same entrance skin exposure"}, {"number": "42", "stem": "You are called to evaluate a patient following inadvertent IV contrast infiltration. The technologist informs you that approximately 100 mL of iodinated contrast extravasated into the antecubital fossa. What is the primary clinical concern?", "options": [{"letter": "A", "text": "Compartment syndrome"}, {"letter": "B", "text": "Nephrogenic systemic fibrosis"}, {"letter": "C", "text": "Contrast-related renal dysfunction"}, {"letter": "D", "text": "Vasospasm"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Compartment syndrome would be the primary clinical concern following infiltration of a large volume of IV contrast. NSF is a chronic adverse reaction to gadolinium. Renal dysfunction can occur following IV administration of iodinated contrast, typically occurring several days following the contrast dose.\n\nReferences: American College of Radiology (ACR). ACR Manual on Contrast Media. Version 10.3. Reston, VA: American College of Radiology; 2018:18-22."}, {"number": "43", "stem": "What percentage of bone mineralization must be lost to be detected by radiographs?", "options": [{"letter": "A", "text": "10% to 20%"}, {"letter": "B", "text": "30% to 40%"}, {"letter": "C", "text": "50% to 60%"}, {"letter": "D", "text": "70% to 80%"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. 30% to 40% of the bone mineralization must be lost to be visualized by radiographs. Radiographs are insensitive in detecting early bone loss.\n\nReferences: Weissman BN. Imaging of Arthritis and Metabolic Bone Disease. Philadelphia, PA: Saunders; 2009:608."}, {"number": "44", "stem": "Fluid appears as increased signal on a T2-weighted image because it has what property?", "options": [{"letter": "A", "text": "Short T2 relaxation time"}, {"letter": "B", "text": "Short T1 relaxation time"}, {"letter": "C", "text": "Long T2 relaxation time"}, {"letter": "D", "text": "Long T1 relaxation time"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Fluid has long T2 relaxation times, whereas solids generally have short T2 relaxation. Tissues with a long T2 relaxation time will be bright on T2-weighted images, whereas tissues with a short T1 relaxation time will be bright on T1-weighted imaging.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:425-427."}, {"number": "45", "stem": "Injecting a gadolinium contrast agent most commonly causes a sarcoma to:", "options": [{"letter": "A", "text": "appear bright on T1-weighted images."}, {"letter": "B", "text": "appear dark on T2-weighted images."}, {"letter": "C", "text": "appear isointense to skeletal muscle on T1-weighted images."}, {"letter": "D", "text": "appear bright on proton density weighted images."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. A circulating gadolinium contrast agent will accumulate in the sarcoma and cause a decrease in the T1 relaxation time. This decrease will result in the sarcoma appearing bright on the T1-weighted image. Tissues with a short T1 relaxation time will be bright on T1-weighted imaging, whereas tissues with a long T2 relaxation time will be bright on T2-weighted images.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:423-424."}, {"number": "46", "stem": "In the image below, what is the best description of the bright signal surrounding the distal tibial fracture?", "options": [{"letter": "A", "text": "Increased T1 signal"}, {"letter": "B", "text": "Increased T2 signal"}, {"letter": "C", "text": "Decreased T1 signal"}, {"letter": "D", "text": "Decreased T2 signal"}], "images": ["assets/q46_p052_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The image is T2 weighted with fat saturation. The bright signal surrounding the fracture results from increased bone edema and thus increased T2 signal.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:425-427."}, {"number": "47", "stem": "A 50-year-old male on dialysis presents with findings concerning for osteomyelitis of the foot, and an MRI has been ordered for further characterization. What dose of a group 1 gadolinium contrast agent is recommended?", "options": [{"letter": "A", "text": "0.1 mmol/kg"}, {"letter": "B", "text": "0.05 mmol/kg"}, {"letter": "C", "text": "0.01 mmol/kg"}, {"letter": "D", "text": "0 mmol/kg"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. There are some contrast agents that may be considered in dialysis patients. However, the gadolinium contrast agents in groups 1 and 3 are to be avoided in dialysis patients due to the fear of causing nephrogenic systemic sclerosis (NSF). This is particularly true in the case of osteomyelitis, in which the diagnosis may be reached without the use of contrast.\n\nReferences: American College of Radiology (ACR). ACR Manual on Contrast Media. Version 10.3. Reston, VA: American College of Radiology; 2018:81-89."}, {"number": "48", "stem": "Which tumor location should be biopsied under CT guidance without consideration for ultrasound guidance?", "options": [{"letter": "A", "text": "Intramedullary"}, {"letter": "B", "text": "Subperiosteal"}, {"letter": "C", "text": "Cortical"}, {"letter": "D", "text": "Soft tissue"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Many masses can be biopsied under ultrasound guidance. Soft tissue masses are often easily targeted with ultrasound guidance. Cortical or subperiosteal lesions are potentially visible with ultrasound guidance as well, particularly if the cortex is broken. Intramedullary lesions are best approached utilizing CT guidance.\n\nReferences: Bianchi S, Martinoli C. Ultrasound of the Musculoskeletal System. Berlin, Germany: Springer; 2007:896-897."}, {"number": "49", "stem": "The following images were acquired from the same radiography imaging system. Assuming all other parameters are the same, which technique will deliver the highest entrance skin exposure to patients? 60 kV, 130 mAs 75 kV, 40 mAs 120 kV, 10 mAs", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "All deliver the same entrance skin exposure"}], "images": ["assets/q49_p054_01.jpg", "assets/q49_p055_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. X-ray intensity (measured by exposure) is proportional to the square of kV and proportional to mAs. Increasing kV and increasing mAs both increase radiation dose. In the answers provided, increasing the kV while decreasing mAs reduces the radiation dose. Therefore, answer A with the lowest kV and the highest mAs will have the highest skin entrance exposure or dose.\n\nReferences: Bushberg JT, Seibert JA, Leidholdt EM, et al. The Essential Physics of Medical Imaging. 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins; 2012:202-206."}];
    const APP_ID = "msk-imaging-techniques-quiz-ch1";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {"1": "A", "2a": "C", "2b": "A", "2c": "D", "3a": "D", "3b": "B", "3c": "B", "4": "B", "5": "A", "6": "D", "7": "B", "8": "D", "9": "D", "10": "B", "11": "C", "12": "C", "13": "C", "14": "B", "15": "B", "16": "C", "17": "C", "18": "A", "19": "B", "20": "A", "21": "B", "22": "C", "23": "D", "24": "C", "25": "B", "26": "C", "27": "D", "28a": "C", "28b": "B", "29": "A", "30": "C", "31": "C", "32": "D", "33": "C", "34": "B", "35": "A", "36": "A", "37": "C", "38": "A", "39": "A", "40": "B", "41": "A"};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
