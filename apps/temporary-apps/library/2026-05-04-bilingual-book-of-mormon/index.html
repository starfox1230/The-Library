<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilingual Book of Mormon Reader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --ink: #182230;
      --muted: #667085;
      --panel: #ffffff;
      --panel-2: #eef2f7;
      --line: #d7dde8;
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --accent-soft: rgba(37, 99, 235, 0.1);
      --shadow: 0 18px 48px rgba(31, 41, 55, 0.1);
      --header-bg: rgba(247, 248, 251, 0.92);
      --field-bg: #ffffff;
      --verse-hover: #f8fbff;
      --mark-bg: rgba(124, 58, 237, 0.14);
      --verse-shadow: 0 10px 30px rgba(31, 41, 55, 0.07);
      --button-bg: #ffffff;
      --button-hover: #eef4ff;
      --vocab-bg: rgba(250, 204, 21, 0.34);
      --vocab-line: rgba(234, 179, 8, 0.62);
      --vocab-ink: #5f3d00;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0b1020;
      --ink: #eef4ff;
      --muted: #9da8c5;
      --panel: #121a2e;
      --panel-2: #1a2540;
      --line: #2a3758;
      --accent: #8b5cf6;
      --accent-2: #38bdf8;
      --accent-soft: rgba(139, 92, 246, 0.16);
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
      --header-bg: rgba(11, 16, 32, 0.9);
      --field-bg: #0f172a;
      --verse-hover: #16213a;
      --mark-bg: rgba(56, 189, 248, 0.18);
      --verse-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      --button-bg: #18223a;
      --button-hover: #22304f;
      --vocab-bg: rgba(56, 189, 248, 0.24);
      --vocab-line: rgba(125, 211, 252, 0.8);
      --vocab-ink: #e0f7ff;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, var(--accent-soft), transparent 34rem),
        var(--bg);
      color: var(--ink);
    }

    button, select, input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header-bg);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .top-actions {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
      position: relative;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 3px;
      min-width: 170px;
    }

    .place-button {
      margin-right: auto;
      max-width: min(48vw, 320px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .segmented button {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      cursor: pointer;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-weight: 750;
    }

    .segmented button.active {
      background: var(--accent);
      color: white;
    }

    .theme-toggle, .icon-button {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--button-bg);
      color: var(--ink);
      padding: 8px 10px;
      cursor: pointer;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-weight: 750;
      white-space: nowrap;
      margin: 0;
    }

    .theme-toggle:hover, .icon-button:hover, .nav-button:hover {
      background: var(--button-hover);
    }

    .icon-button {
      width: 42px;
      justify-content: center;
      padding: 8px;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch-track {
      width: 40px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 2px;
      display: inline-flex;
      align-items: center;
      transition: background 150ms ease, border-color 150ms ease;
    }

    .switch-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted);
      transform: translateX(0);
      transition: transform 150ms ease, background 150ms ease;
    }

    .theme-toggle input:checked + .switch-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .theme-toggle input:checked + .switch-track .switch-thumb {
      background: white;
      transform: translateX(18px);
    }

    .settings-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      width: min(330px, 90vw);
      max-height: min(660px, calc(100vh - 96px));
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: none;
      z-index: 20;
    }

    .picker-panel {
      position: fixed;
      inset: 72px 16px auto 16px;
      max-width: 760px;
      max-height: calc(100vh - 96px);
      margin: 0 auto;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: none;
      z-index: 18;
    }

    .picker-panel.open {
      display: block;
    }

    .picker-title {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.9rem;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .picker-grid {
      display: grid;
      grid-template-columns: minmax(130px, 0.8fr) minmax(0, 1.2fr);
      gap: 12px;
    }

    .book-list, .chapter-list {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .book-option, .chapter-option {
      border: 1px solid var(--line);
      background: var(--button-bg);
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 11px;
      cursor: pointer;
      text-align: left;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-weight: 740;
    }

    .book-option.active, .chapter-option.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .chapter-list {
      grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
    }

    .chapter-option {
      text-align: center;
    }

    .settings-panel.open {
      display: block;
    }

    .settings-title {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.9rem;
      font-weight: 850;
      margin-bottom: 10px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .setting-row:first-of-type {
      border-top: 0;
    }

    .setting-copy {
      min-width: 0;
    }

    .setting-label {
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.9rem;
      font-weight: 760;
      margin: 0;
    }

    .setting-help {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.78rem;
      line-height: 1.35;
      margin-top: 2px;
    }

    main {
      width: min(1180px, 94vw);
      margin: 18px auto 42px;
      display: block;
    }

    label {
      display: block;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.78rem;
      margin-bottom: 5px;
      font-weight: 700;
    }

    select, input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--field-bg);
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 11px;
      min-height: 42px;
    }

    .meta {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .reader {
      min-width: 0;
    }

    .chapter-head {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .chapter-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin: 0 0 14px;
    }

    .chapter-nav.bottom {
      margin: 16px 0 0;
    }

    .nav-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--button-bg);
      color: var(--ink);
      min-height: 44px;
      padding: 10px 14px;
      cursor: pointer;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-weight: 800;
    }

    .nav-button.prev {
      justify-self: start;
    }

    .nav-button.next {
      justify-self: end;
    }

    .nav-button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .nav-current {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.84rem;
      text-align: center;
      white-space: nowrap;
    }

    .chapter-title {
      font-size: 1.45rem;
      font-weight: 800;
    }

    .chapter-count {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .verse-list {
      display: grid;
      gap: 10px;
    }

    .verse {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px 20px;
      box-shadow: var(--verse-shadow);
      cursor: pointer;
      user-select: text;
      transition: border-color 150ms ease, transform 150ms ease, background 150ms ease;
      touch-action: manipulation;
    }

    .verse:hover, .verse.focused {
      border-color: var(--accent);
      transform: translateY(-1px);
      background: var(--verse-hover);
    }

    .ref {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.15rem;
      height: 2.15rem;
      margin: 0 0 10px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-weight: 850;
      font-size: 0.86rem;
    }

    .verse-toggle {
      position: absolute;
      right: 14px;
      top: 14px;
      width: 42px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      padding: 2px;
      cursor: pointer;
    }

    .verse-toggle::after {
      content: "";
      display: block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--muted);
      transform: translateX(0);
      transition: transform 150ms ease, background 150ms ease;
    }

    .verse-toggle[data-language="en"] {
      background: var(--accent);
      border-color: var(--accent);
    }

    .verse-toggle[data-language="en"]::after {
      background: white;
      transform: translateX(18px);
    }

    .text {
      font-size: 1.18rem;
      line-height: 1.72;
      -webkit-touch-callout: none;
    }

    .translation {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .translation.hidden {
      display: none;
    }

    .selection-popover {
      position: fixed;
      display: none;
      z-index: 30;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 6px;
    }

    .selection-popover.open {
      display: block;
    }

    .selection-popover button, .copy-button {
      border: 1px solid var(--line);
      background: var(--button-bg);
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      font-weight: 760;
    }

    .vocab-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .vocab-panel {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 10px;
    }

    .vocab-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .vocab-title, .vocab-word, .vocab-ref, .vocab-empty {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .vocab-title {
      font-size: 0.84rem;
      font-weight: 820;
    }

    .vocab-list {
      display: grid;
      gap: 6px;
      max-height: 190px;
      overflow: auto;
    }

    .vocab-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 9px;
      background: var(--field-bg);
    }

    .vocab-word {
      font-weight: 800;
      font-size: 0.88rem;
    }

    .vocab-ref, .vocab-empty {
      color: var(--muted);
      font-size: 0.74rem;
      margin-top: 2px;
    }

    .vocab-empty {
      font-size: 0.82rem;
      padding: 8px 0;
    }

    .vocab-more {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .vocab-more.open {
      display: block;
    }

    .vocab-view-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .days-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .days-control input {
      width: 72px;
      min-height: 36px;
      padding: 6px 8px;
    }

    mark {
      background: var(--mark-bg);
      color: inherit;
      border-radius: 4px;
      padding: 0 2px;
    }

    .vocab-mark {
      background: var(--vocab-bg);
      color: var(--vocab-ink);
      box-shadow: inset 0 -2px 0 var(--vocab-line);
      border-radius: 5px;
      padding: 0 2px;
    }

    @media (max-width: 840px) {
      main {
        width: min(100% - 20px, 1180px);
        margin-top: 12px;
      }

      .chapter-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .chapter-nav {
        grid-template-columns: 1fr 1fr;
      }

      .nav-current {
        grid-column: 1 / -1;
        grid-row: 1;
      }

      .nav-button.prev {
        grid-column: 1;
      }

      .nav-button.next {
        grid-column: 2;
      }

      .topbar {
        width: min(100% - 20px, 1180px);
        padding: 10px 0;
      }

      .top-actions {
        gap: 7px;
      }

      .segmented {
        min-width: 132px;
      }

      .segmented button {
        padding: 8px 9px;
      }

      .place-button {
        max-width: 100%;
        order: 2;
        width: 100%;
        justify-content: center;
      }

      .picker-panel {
        inset: 112px 10px auto 10px;
      }

      .picker-grid {
        grid-template-columns: 1fr;
      }

      .book-list {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }

      .settings-panel {
        right: -4px;
        width: min(330px, calc(100vw - 20px));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <div class="top-actions">
          <button id="placeBtn" class="theme-toggle place-button" type="button" aria-expanded="false">Choose chapter</button>
          <div class="segmented" aria-label="Reading language">
            <button id="spanishBtn" type="button" class="active">Spanish</button>
            <button id="englishBtn" type="button">English</button>
          </div>
          <label class="theme-toggle" for="themeToggle">
            <input id="themeToggle" type="checkbox" />
            <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
            <span>Night</span>
          </label>
          <button id="settingsBtn" class="icon-button" type="button" aria-label="Settings" aria-expanded="false">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.37a1.7 1.7 0 0 0-1 .6V20a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.63 15a1.7 1.7 0 0 0-.6-1H4a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.63a1.7 1.7 0 0 0 1-.6V4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.37 9c.2.34.4.67.6 1H20a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-.51 1Z"></path>
            </svg>
          </button>
          <div id="settingsPanel" class="settings-panel" role="dialog" aria-label="Reader settings">
            <div class="settings-title">Settings</div>
            <div class="setting-row">
              <div class="setting-copy">
                <div class="setting-label">Vocabulary list</div>
                <div class="setting-help">Saved words are highlighted in the text.</div>
              </div>
            </div>
            <div class="vocab-panel">
              <div class="vocab-head">
                <div class="vocab-title" id="vocabViewTitle">This chapter</div>
                <button id="copyCurrentVocabBtn" class="copy-button" type="button">Copy</button>
              </div>
              <div id="vocabList" class="vocab-list"></div>
              <button id="viewMoreVocabBtn" class="copy-button" type="button">View more</button>
              <div id="vocabMore" class="vocab-more">
                <div class="vocab-view-row">
                  <button class="copy-button" type="button" data-vocab-view="all">View all</button>
                  <button class="copy-button" type="button" data-vocab-copy="all">Copy</button>
                </div>
                <div class="vocab-view-row">
                  <button class="copy-button" type="button" data-vocab-view="today">View today</button>
                  <button class="copy-button" type="button" data-vocab-copy="today">Copy</button>
                </div>
                <div class="vocab-view-row">
                  <button class="copy-button" type="button" data-vocab-view="yesterday">View yesterday</button>
                  <button class="copy-button" type="button" data-vocab-copy="yesterday">Copy</button>
                </div>
                <div class="vocab-view-row">
                  <button class="copy-button" type="button" data-vocab-view="recent">View recent</button>
                  <button class="copy-button" type="button" data-vocab-copy="recent">Copy</button>
                </div>
              </div>
            </div>
            <div class="days-control">
              <label for="recentDaysInput">Days</label>
              <input id="recentDaysInput" type="number" min="1" max="365" value="7" />
            </div>
          </div>
        </div>
      </div>
    </header>
    <div id="pickerPanel" class="picker-panel" role="dialog" aria-label="Choose chapter">
      <div class="picker-title">Choose a chapter</div>
      <div class="picker-grid">
        <div id="bookList" class="book-list"></div>
        <div id="chapterList" class="chapter-list"></div>
      </div>
    </div>

    <main>
      <section class="reader" aria-live="polite">
        <div class="chapter-nav top" id="chapterNavTop"></div>
        <div class="chapter-head">
          <div class="chapter-title" id="chapterTitle">Loading</div>
          <div class="chapter-count" id="chapterCount"></div>
        </div>
        <div class="verse-list" id="verseList"></div>
        <div class="chapter-nav bottom" id="chapterNavBottom"></div>
      </section>
    </main>
    <div id="selectionPopover" class="selection-popover">
      <button id="addVocabBtn" type="button">Add to vocab</button>
    </div>
  </div>

  <script>
    const state = {
      data: null,
      language: "es",
      book: "1 Nephi",
      chapter: 1,
      focusedVerse: 1,
      pickerBook: "1 Nephi",
      verseLanguages: {},
      vocab: [],
      selectedText: "",
      selectedReference: "",
      selectedLanguage: "es",
      vocabView: "chapter",
    };

    const els = {
      placeBtn: document.getElementById("placeBtn"),
      spanishBtn: document.getElementById("spanishBtn"),
      englishBtn: document.getElementById("englishBtn"),
      themeToggle: document.getElementById("themeToggle"),
      settingsBtn: document.getElementById("settingsBtn"),
      settingsPanel: document.getElementById("settingsPanel"),
      pickerPanel: document.getElementById("pickerPanel"),
      bookList: document.getElementById("bookList"),
      chapterList: document.getElementById("chapterList"),
      copyCurrentVocabBtn: document.getElementById("copyCurrentVocabBtn"),
      viewMoreVocabBtn: document.getElementById("viewMoreVocabBtn"),
      vocabMore: document.getElementById("vocabMore"),
      vocabViewTitle: document.getElementById("vocabViewTitle"),
      vocabList: document.getElementById("vocabList"),
      recentDaysInput: document.getElementById("recentDaysInput"),
      chapterTitle: document.getElementById("chapterTitle"),
      chapterCount: document.getElementById("chapterCount"),
      chapterNavTop: document.getElementById("chapterNavTop"),
      chapterNavBottom: document.getElementById("chapterNavBottom"),
      verseList: document.getElementById("verseList"),
      selectionPopover: document.getElementById("selectionPopover"),
      addVocabBtn: document.getElementById("addVocabBtn"),
    };

    const languageLabel = { es: "Spanish", en: "English" };
    const savedTheme = localStorage.getItem("bofmReaderTheme");
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    const initialTheme = savedTheme || (prefersDark ? "dark" : "light");
    document.body.dataset.theme = initialTheme;
    els.themeToggle.checked = initialTheme === "dark";

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[char]));
    }

    function currentVerses() {
      return state.data.verses.filter(v => v.book === state.book && v.chapter === state.chapter);
    }

    function setLanguage(language) {
      state.language = language;
      state.verseLanguages = {};
      els.spanishBtn.classList.toggle("active", language === "es");
      els.englishBtn.classList.toggle("active", language === "en");
      savePosition();
      renderVerses();
    }

    function setTheme(theme) {
      document.body.dataset.theme = theme;
      els.themeToggle.checked = theme === "dark";
      localStorage.setItem("bofmReaderTheme", theme);
    }

    function chapterLocation(bookName = state.book, chapterNumber = state.chapter) {
      const bookIndex = state.data.books.findIndex(book => book.name === bookName);
      return { bookIndex, book: state.data.books[bookIndex], chapter: Number(chapterNumber) };
    }

    function adjacentChapter(direction) {
      const current = chapterLocation();
      if (direction < 0) {
        if (current.chapter > 1) {
          return { book: current.book.name, chapter: current.chapter - 1 };
        }
        const previousBook = state.data.books[current.bookIndex - 1];
        if (!previousBook) return null;
        return { book: previousBook.name, chapter: previousBook.chapters };
      }

      if (current.chapter < current.book.chapters) {
        return { book: current.book.name, chapter: current.chapter + 1 };
      }
      const nextBook = state.data.books[current.bookIndex + 1];
      if (!nextBook) return null;
      return { book: nextBook.name, chapter: 1 };
    }

    function navLabel(target) {
      return target ? `${target.book} ${target.chapter}` : "";
    }

    function renderChapterNav() {
      const previous = adjacentChapter(-1);
      const next = adjacentChapter(1);
      const html = `
        <button class="nav-button prev" type="button" data-nav="prev" ${previous ? "" : "disabled"}>${previous ? `Previous: ${escapeHtml(navLabel(previous))}` : "Previous"}</button>
        <div class="nav-current">${escapeHtml(state.book)} ${state.chapter}</div>
        <button class="nav-button next" type="button" data-nav="next" ${next ? "" : "disabled"}>${next ? `Next: ${escapeHtml(navLabel(next))}` : "Next"}</button>
      `;
      els.chapterNavTop.innerHTML = html;
      els.chapterNavBottom.innerHTML = html;
    }

    function renderPicker() {
      els.bookList.innerHTML = state.data.books.map(book => `
        <button class="book-option ${book.name === state.pickerBook ? "active" : ""}" type="button" data-book="${escapeHtml(book.name)}">${escapeHtml(book.name)}</button>
      `).join("");
      const book = state.data.books.find(item => item.name === state.pickerBook);
      els.chapterList.innerHTML = Array.from({ length: book.chapters }, (_, index) => {
        const chapter = index + 1;
        const active = book.name === state.book && chapter === state.chapter;
        return `<button class="chapter-option ${active ? "active" : ""}" type="button" data-book="${escapeHtml(book.name)}" data-chapter="${chapter}">${chapter}</button>`;
      }).join("");
    }

    function setPickerOpen(open) {
      els.pickerPanel.classList.toggle("open", open);
      els.placeBtn.setAttribute("aria-expanded", String(open));
      if (open) renderPicker();
    }

    function verseLanguage(verse) {
      return state.verseLanguages[verse.id] || state.language;
    }

    function vocabItemsForScope(scope) {
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const startOfYesterday = startOfToday - 24 * 60 * 60 * 1000;
      const days = Math.max(1, Number(els.recentDaysInput.value) || 7);
      const cutoff = now.getTime() - days * 24 * 60 * 60 * 1000;
      if (scope === "chapter") {
        return state.vocab.filter(item => item.book === state.book && Number(item.chapter) === state.chapter);
      }
      if (scope === "today") {
        return state.vocab.filter(item => new Date(item.addedAt).getTime() >= startOfToday);
      }
      if (scope === "yesterday") {
        return state.vocab.filter(item => {
          const time = new Date(item.addedAt).getTime();
          return time >= startOfYesterday && time < startOfToday;
        });
      }
      if (scope === "recent") {
        return state.vocab.filter(item => new Date(item.addedAt).getTime() >= cutoff);
      }
      return state.vocab;
    }

    function renderVocabList() {
      const labels = {
        chapter: "This chapter",
        all: "All vocabulary",
        today: "Today",
        yesterday: "Yesterday",
        recent: `Past ${Math.max(1, Number(els.recentDaysInput.value) || 7)} days`,
      };
      const items = vocabItemsForScope(state.vocabView);
      els.vocabViewTitle.textContent = `${labels[state.vocabView]} (${items.length})`;
      els.vocabList.innerHTML = items.length
        ? items.slice().reverse().map(item => `
            <div class="vocab-item">
              <div class="vocab-word">${escapeHtml(item.text)}</div>
              <div class="vocab-ref">${escapeHtml(item.reference)} · ${escapeHtml(item.language.toUpperCase())} · ${escapeHtml(item.addedAt.slice(0, 10))}</div>
            </div>
          `).join("")
        : `<div class="vocab-empty">No saved vocabulary in this view.</div>`;
    }

    function highlightVocab(text, verse, language) {
      const terms = state.vocab
        .filter(item => item.book === verse.book && Number(item.chapter) === verse.chapter && item.reference === verse.reference && item.language === language)
        .map(item => item.text.trim())
        .filter(Boolean)
        .sort((a, b) => b.length - a.length);
      if (!terms.length) return escapeHtml(text);
      const pattern = terms.map(term => term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
      return escapeHtml(text).replace(new RegExp(`(${pattern})`, "gi"), `<span class="vocab-mark">$1</span>`);
    }

    function renderVerses() {
      const verses = currentVerses();
      els.placeBtn.textContent = `${state.book} ${state.chapter}`;
      els.chapterTitle.textContent = `${state.book} ${state.chapter}`;
      els.chapterCount.textContent = `${verses.length} verses`;
      renderChapterNav();

      els.verseList.innerHTML = verses.map(verse => {
        const language = verseLanguage(verse);
        return `
          <article class="verse ${verse.verse === state.focusedVerse ? "focused" : ""}"
            data-id="${verse.id}"
            data-verse="${verse.verse}"
            tabindex="0"
            aria-label="${escapeHtml(verse.reference)}">
            <button class="verse-toggle" type="button" data-verse-language="${language}" data-language="${language}" aria-label="Toggle verse language"></button>
            <div class="ref">${verse.verse}</div>
            <div class="text">${highlightVocab(verse[language], verse, language)}</div>
          </article>
        `;
      }).join("");
      renderVocabList();
    }

    function chooseChapter(book, chapter, verse = 1, scrollMode = "verse") {
      state.book = book;
      state.chapter = Number(chapter);
      state.focusedVerse = Number(verse);
      state.pickerBook = book;
      state.verseLanguages = {};
      state.vocabView = "chapter";
      savePosition();
      renderPicker();
      renderVerses();
      requestAnimationFrame(() => {
        const target = scrollMode === "top"
          ? document.querySelector(".reader")
          : document.querySelector(`.verse[data-verse="${state.focusedVerse}"]`);
        if (target) target.scrollIntoView({ behavior: "smooth", block: scrollMode === "top" ? "start" : "center" });
      });
    }

    function goToAdjacentChapter(direction) {
      const target = adjacentChapter(direction);
      if (!target) return;
      chooseChapter(target.book, target.chapter, 1, "top");
    }

    function savePosition() {
      localStorage.setItem("bofmReaderPosition", JSON.stringify({
        book: state.book,
        chapter: state.chapter,
        language: state.language,
      }));
    }

    function restorePosition() {
      try {
        const saved = JSON.parse(localStorage.getItem("bofmReaderPosition") || "null");
        if (!saved) return;
        const book = state.data.books.find(item => item.name === saved.book);
        if (!book) return;
        state.book = saved.book;
        state.chapter = Math.min(Math.max(Number(saved.chapter) || 1, 1), book.chapters);
        state.pickerBook = state.book;
        if (saved.language === "en" || saved.language === "es") state.language = saved.language;
      } catch {}
    }

    function loadVocab() {
      try {
        state.vocab = JSON.parse(localStorage.getItem("bofmReaderVocab") || "[]");
      } catch {
        state.vocab = [];
      }
    }

    function saveVocab() {
      localStorage.setItem("bofmReaderVocab", JSON.stringify(state.vocab));
    }

    function addSelectedVocab() {
      const text = state.selectedText.trim();
      if (!text) return;
      state.vocab.push({
        text,
        reference: state.selectedReference,
        book: state.book,
        chapter: state.chapter,
        language: state.selectedLanguage,
        addedAt: new Date().toISOString(),
      });
      saveVocab();
      hideSelectionPopover();
      window.getSelection()?.removeAllRanges();
      renderVerses();
    }

    function vocabLines(items) {
      return items.map(item => `${item.text}\t${item.reference}\t${item.language}\t${item.addedAt.slice(0, 10)}`).join("\n");
    }

    function copyVocab(scope) {
      const items = vocabItemsForScope(scope);
      navigator.clipboard?.writeText(vocabLines(items));
    }

    function hideSelectionPopover() {
      els.selectionPopover.classList.remove("open");
    }

    function showSelectionPopover() {
      const selection = window.getSelection();
      const text = selection ? selection.toString().trim() : "";
      if (!text || !selection.rangeCount) {
        hideSelectionPopover();
        return;
      }
      const anchorElement = selection.anchorNode?.nodeType === Node.TEXT_NODE
        ? selection.anchorNode.parentElement
        : selection.anchorNode;
      const verse = anchorElement?.closest?.(".verse");
      if (!verse) {
        hideSelectionPopover();
        return;
      }
      const verseData = currentVerses().find(item => item.id === verse.dataset.id);
      const range = selection.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      state.selectedText = text;
      state.selectedReference = `${state.book} ${state.chapter}:${verse.dataset.verse}`;
      state.selectedLanguage = verseData ? verseLanguage(verseData) : state.language;
      els.selectionPopover.style.left = `${Math.min(rect.left, window.innerWidth - 150)}px`;
      els.selectionPopover.style.top = `${Math.max(8, rect.top - 50)}px`;
      els.selectionPopover.classList.add("open");
    }

    // Preserved for later: chapter-scoped search/filtering can be reintroduced without rebuilding the data model.
    function searchCurrentChapter(query) {
      const needle = query.trim().toLowerCase();
      if (!needle) return currentVerses();
      return currentVerses().filter(verse =>
        verse.es.toLowerCase().includes(needle) ||
        verse.en.toLowerCase().includes(needle) ||
        verse.reference.toLowerCase().includes(needle)
      );
    }

    function bindEvents() {
      els.spanishBtn.addEventListener("click", () => setLanguage("es"));
      els.englishBtn.addEventListener("click", () => setLanguage("en"));
      els.themeToggle.addEventListener("change", event => {
        setTheme(event.target.checked ? "dark" : "light");
      });
      els.placeBtn.addEventListener("click", event => {
        event.stopPropagation();
        setPickerOpen(!els.pickerPanel.classList.contains("open"));
      });
      els.bookList.addEventListener("click", event => {
        const button = event.target.closest("[data-book]");
        if (!button) return;
        state.pickerBook = button.dataset.book;
        chooseChapter(button.dataset.book, 1, 1, "top");
        setPickerOpen(true);
      });
      els.chapterList.addEventListener("click", event => {
        const button = event.target.closest("[data-chapter]");
        if (!button) return;
        setPickerOpen(false);
        chooseChapter(button.dataset.book, button.dataset.chapter, 1, "top");
      });
      els.settingsBtn.addEventListener("click", event => {
        event.stopPropagation();
        const isOpen = !els.settingsPanel.classList.contains("open");
        els.settingsPanel.classList.toggle("open", isOpen);
        els.settingsBtn.setAttribute("aria-expanded", String(isOpen));
        if (isOpen) renderVocabList();
      });
      document.addEventListener("click", event => {
        if (!els.settingsPanel.classList.contains("open")) return;
        if (els.settingsPanel.contains(event.target) || els.settingsBtn.contains(event.target)) return;
        els.settingsPanel.classList.remove("open");
        els.settingsBtn.setAttribute("aria-expanded", "false");
      });
      document.addEventListener("click", event => {
        if (!els.pickerPanel.classList.contains("open")) return;
        if (els.pickerPanel.contains(event.target) || els.placeBtn.contains(event.target)) return;
        setPickerOpen(false);
      });
      [els.chapterNavTop, els.chapterNavBottom].forEach(nav => {
        nav.addEventListener("click", event => {
          const button = event.target.closest("[data-nav]");
          if (!button || button.disabled) return;
          goToAdjacentChapter(button.dataset.nav === "next" ? 1 : -1);
        });
      });

      els.verseList.addEventListener("click", event => {
        const toggle = event.target.closest(".verse-toggle");
        if (toggle) {
          const verse = toggle.closest(".verse");
          const verseData = currentVerses().find(item => item.id === verse.dataset.id);
          const current = verseLanguage(verseData);
          state.verseLanguages[verseData.id] = current === "es" ? "en" : "es";
          renderVerses();
          return;
        }
        const verse = event.target.closest(".verse");
        if (!verse) return;
        state.focusedVerse = Number(verse.dataset.verse);
        localStorage.setItem("bofmReaderLastVerse", String(state.focusedVerse));
        renderVerses();
      });
      document.addEventListener("selectionchange", () => {
        clearTimeout(window.__bofmSelectionTimer);
        window.__bofmSelectionTimer = setTimeout(showSelectionPopover, 180);
      });
      els.addVocabBtn.addEventListener("click", addSelectedVocab);
      els.copyCurrentVocabBtn.addEventListener("click", () => copyVocab(state.vocabView));
      els.viewMoreVocabBtn.addEventListener("click", () => {
        els.vocabMore.classList.toggle("open");
      });
      els.vocabMore.addEventListener("click", event => {
        const viewButton = event.target.closest("[data-vocab-view]");
        const copyButton = event.target.closest("[data-vocab-copy]");
        if (viewButton) {
          state.vocabView = viewButton.dataset.vocabView;
          renderVocabList();
        }
        if (copyButton) {
          copyVocab(copyButton.dataset.vocabCopy);
        }
      });
      els.recentDaysInput.addEventListener("change", renderVocabList);
    }

    fetch("scriptures.json")
      .then(response => response.json())
      .then(data => {
        state.data = data;
        loadVocab();
        restorePosition();
        els.spanishBtn.classList.toggle("active", state.language === "es");
        els.englishBtn.classList.toggle("active", state.language === "en");
        renderPicker();
        bindEvents();
        renderVerses();
      })
      .catch(error => {
        els.chapterTitle.textContent = "Unable to load scripture text";
        els.chapterCount.textContent = error.message;
      });
  </script>
</body>
</html>
