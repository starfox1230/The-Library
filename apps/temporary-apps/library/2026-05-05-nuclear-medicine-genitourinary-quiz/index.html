  <style>
    :root {

      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }

  <script>
    const QUESTIONS = [{"number": "1", "stem": "A 35-year-old potential renal transplant donor presents for the evaluation of glomerular filtration rate (GFR) as a part of the preoperative workup. Which of the following radiopharmaceuticals would be most appropriate to use in this situation?", "options": [{"letter": "A", "text": "MAG3"}, {"letter": "B", "text": "DTPA"}, {"letter": "C", "text": "DMSA"}, {"letter": "D", "text": "Glucoheptonate"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Diethylenetriamine pentaacetic acid (DTPA) is filtered through the glomeruli and can, therefore, be used to estimate GFR. Approximately 5% to 10% of DTPA is bound to plasma protein, resulting in a slight underestimation of GFR. Twenty percent of renal plasma flow is cleared by glomerular filtration, and 80% is cleared by the tubular secretion. Mercaptoacetyltriglycine (MAG3) is cleared predominantly via proximal tubular secretion with minimal filtration. Higher extraction efficiency and plasma protein binding of MAG3 make it a better agent for evaluation of renal flow and function, but it cannot measure GFR (although complicated camera based techniques can be used to estimate GFR). In the setting of obstruction, GFR typically declines before tubular secretion. Additionally, the extraction fraction of MAG3 is 40% to 50%, more than twice that of DTPA. As such, MAG3 is preferred over DTPA in patients with suspected obstruction and impaired renal function. MAG3 is also the preferred radiopharmaceutical for renal function evaluation in the pediatric population because glomerular filtration is incompletely developed in the neonates. The alternative path of MAG3 excretion is by the hepatobiliary system. So, bowel activity may be visualized on the delayed images in patients with severely diminished renal function. Dimercaptosuccinic acid (DMSA) is a renal cortical imaging agent, which is primarily used in the pediatric population for evaluation of pyelonephritis, renal cortical scarring, and differential renal function. DMSA is cortically bound and demonstrates very little renal excretion compared to the other renal agents. For this reason, it is the best agent to determine differential renal function. This lack of significant renal excretion is particularly useful for differential function evaluation in the setting of hydronephrosis. Glucoheptonate is cleared via both glomerular filtration and renal tubule secretion and cannot be used to calculate GFR. The measured GFR is used as a confirmatory test for the estimated GFR in certain clinical situations such as severe malnutrition or obesity or diseases of skeletal muscle, or in the evaluation of donor renal function prior to transplantation.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:28. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:18, 258."}, {"number": "2", "stem": "In the following diagram of the renal nephron, where does DMSA localize on the 2- to 4-hour images acquired for the renal cortical imaging?", "options": [{"letter": "A", "text": "Structure A"}, {"letter": "B", "text": "Structure B"}, {"letter": "C", "text": "Structure C"}, {"letter": "D", "text": "Structure D"}], "images": ["assets/q2_p324_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. DMSA is a renal cortical imaging agent that localizes in the renal cortex by binding to the sulfhydryl groups in the proximal renal tubules. Glomerular filtration followed by tubular reabsorption is the predominant route of DMSA uptake by the kidney. MAG3 is primarily removed from the plasma by active transport in the proximal renal tubules (choice B). DTPA is filtered through the glomerulus (choice A). Tc-99m glucoheptonate (GH) is both filtered by the glomerulus and secreted by the renal tubules, allowing for evaluation of renal function and collecting system. Approximately 10% to 15% of the injected GH dose remains bound to the renal tubules at 1 to 2 hours after the injection, and thus, it can also be used for renal cortical imaging. Loop diuretics (i.e., furosemide and bumetanide) block the Na+/K+/2Cl− cotransporter that is present in the loop of Henle. The following diagram shows the location of the localization of different radiopharmaceuticals in the renal nephron.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:288. Taylor AT. Radionuclides in nephrology, part 1: radiopharmaceuticals, quality control, and quantitative indices. J Nucl Med 2014;55(4):608-615."}, {"number": "3", "stem": "Based on the following renal function images and accompanying time-activity curve (renogram) from a MAG3 dynamic renography, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Normal renal function"}, {"letter": "B", "text": "Mildly impaired renal function"}, {"letter": "C", "text": "Moderately impaired renal function"}, {"letter": "D", "text": "Severely impaired renal function"}, {"letter": "E", "text": "Bilateral renal artery stenosis"}, {"letter": "F", "text": "Bilateral obstructive hydronephrosis"}], "images": ["assets/q3_p325_01.jpg", "assets/q3_p325_02.jpg"], "explanationImages": ["assets/a3_p343_01.jpg"], "answer": "C", "explanation": "Answer C. A normal MAG3 time-activity curve (renogram) demonstrates prompt tubular extraction (time to peak 3 to 5 minutes) with good renal clearance/excretion (time to half peak 6 to 10 minutes or 20 minutes to peak ratio of <0.3) as shown in the image below. Mild renal function impairment demonstrates normal tubular extraction with normal time to peak and slightly prolonged renal clearance (slightly prolonged 20 minutes to peak ratio), which would manifest as mild retention of radiotracer in the renal parenchyma at the end of 30 minutes. With moderate renal function impairment, there is tubular dysfunction (prolonged time to peak) and moderate cortical retention (prolonged 20 minutes to peak ratio). With severe renal function impairment, there is poor uptake with progressive accumulation and no significant clearance of the radiopharmaceutical (markedly prolonged time to peak). While renal scintigraphy and renogram are good in determining the degree of renal dysfunction, the exact cause of dysfunction (i.e., ATN, pyelonephritis, drug toxicity, or chronic medical renal disease) depends on the patient's medical history. Of note, the patient should be well hydrated for dynamic renography. While blood flow and radiopharmaceutical uptake are not altered by dehydration, excretion and washout may be delayed, simulating poor function or obstruction. Renogram curves must be interpreted in conjunction with the images as they can be affected by numerous factors, including hydronephrosis.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:293-299. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:258-270."}, {"number": "4", "stem": "The following Tc-99m MAG3 functional renal scintigraphy images, as well as time-activity curves, are from a 60-year-old who was admitted with dehydration and elevated creatine kinase levels. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Acute tubular necrosis"}, {"letter": "B", "text": "Severe chronic renal disease"}, {"letter": "C", "text": "Bilateral hydronephrosis"}, {"letter": "D", "text": "Bilateral renal artery stenosis"}], "images": ["assets/q4_p326_01.jpg", "assets/q4_p326_02.jpg"], "explanationImages": ["assets/a4_p344_01.jpg"], "answer": "A", "explanation": "Answer A. Dynamic posterior images acquired after the IV administration of MAG3 demonstrate brisk uptake of the radiopharmaceutical within both kidneys. However, there is minimal excretion. Findings are most compatible with acute tubular necrosis in this patient with dehydration and rhabdomyolysis. In severe chronic renal disease, due to chronic tubular dysfunction, the rate of radiopharmaceutical concentration would be lower with gradual upslope instead of brisk upstroke (see renograms below). There is no evidence of a dilated renal collecting system on the supplied images to suggest hydronephrosis. Since captopril was not given for the examination, renal artery stenosis is not a possibility. Of note, a small area of photopenia within the upper pole of the left kidney (arrow on images below) corresponded to a renal cyst. Since the peak uptake in normal kidney occurs between 2 and 5 minutes, nonfunctioning renal tissue or photopenic defects (i.e., cyst, renal cell carcinoma, or metastasis) are best appreciated during this time period.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:293-310. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:274-277."}, {"number": "5", "stem": "In the setting of renal artery stenosis, how does the renin-angiotensin axis maintain the glomerular filtration rate (GFR)?", "options": [{"letter": "A", "text": "Afferent arteriolar vasoconstriction"}, {"letter": "B", "text": "Afferent arteriolar vasodilatation"}, {"letter": "C", "text": "Efferent arteriolar vasoconstriction"}, {"letter": "D", "text": "Efferent arteriolar vasodilatation"}, {"letter": "E", "text": "Diffuse dilation throughout the capillary bed"}, {"letter": "F", "text": "Diffuse constriction throughout the capillary bed"}], "images": [], "explanationImages": ["assets/a5_6_p345_01.jpg", "assets/a5_6_p345_02.jpg"], "answer": "C", "explanation": "Answer C. In the setting of renal artery stenosis, the juxtaglomerular apparatus of the kidneys produce renin, which converts angiotensinogen to angiotensin in the liver. Angiotensin I gets converted to angiotensin II by the angiotensin-converting enzyme (ACE) in the lung parenchyma. One of the actions of angiotensin II is efferent arteriolar constriction. This increases the net gradient pressure across the glomerulus and helps maintain the GFR. ACE inhibitors block the conversion of angiotensin I to angiotensin II in the lung parenchyma. The resultant inhibition of efferent arterial constriction causes a decrease in the GFR with resultant renal function impairment.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:301-306. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:268-271. Saha GB. Fundamentals of nuclear pharmacy, 6th ed. New York, NY: Springer, 2010:296."}, {"number": "6", "stem": "What is the most appropriate management in this patient with the following renal scintigraphy findings?", "options": [{"letter": "A", "text": "Nephrectomy"}, {"letter": "B", "text": "Pyeloplasty"}, {"letter": "C", "text": "Ureteral reimplantation"}, {"letter": "D", "text": "Cystectomy"}, {"letter": "E", "text": "Ileal conduit"}], "images": ["assets/q6_p327_01.jpg", "assets/q6_p327_02.jpg"], "explanationImages": ["assets/a5_6_p345_01.jpg", "assets/a5_6_p345_02.jpg"], "answer": "B", "explanation": "Answer B. Posterior dynamic MAG3 renal scintigraphy images demonstrate an enlarged right kidney with a large central area of photopenia, which fills in with the radiotracer on the delayed images. There is no significant emptying of radiotracer after administration of Lasix. Findings represent hydronephrosis with right ureteropelvic junction (UPJ) obstruction. The left kidney appears normal. Pyeloplasty is typically the initial management in patients with UPJ obstruction. If corrected promptly, renal function can recover fully. Nephrectomy is reserved for cases with minimal residual renal function; in this case, the function may be mildly impaired. Ureteral reimplantation, cystectomy, and ileal conduit would not help in the management of a UPJ obstruction. Diuretic renography can help distinguish obstructive from nonobstructive hydronephrosis. An increase in the urine flow caused by Lasix administration in a dilated but nonobstructed system would lead to washout of the accumulated radiopharmaceutical. In obstructive hydronephrosis, there would be progressive filling of the dilated collecting system, which does not empty after Lasix administration. This can be quantified using the time-activity curve by measuring the amount of time it takes to reach half the level of the activity, known as the diuretic T1/2 time. Diuretic T1/2 time of <10 minutes suggests nonobstructive hydronephrosis, while that >20 minutes suggests obstructive hydronephrosis. Diuretic T1/2 time of 10 to 20 minutes is indeterminate for obstruction.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:295-301. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:265-268."}, {"number": "7", "stem": "A 45-year-old lady with hypertension and back pain was found to have an abnormality on a recent contrast-enhanced CT scan. Based on the supplied images, which of the following is the most likely diagnosis?", "options": [{"letter": "A", "text": "Right-sided renal artery stenosis"}, {"letter": "B", "text": "Right-sided hydronephrosis without obstruction"}, {"letter": "C", "text": "Right-sided high-grade obstruction"}, {"letter": "D", "text": "Left-sided renal artery stenosis"}, {"letter": "E", "text": "Left-sided hydronephrosis with obstruction"}, {"letter": "F", "text": "Left-sided high-grade obstruction"}], "images": ["assets/q7_p328_01.jpg", "assets/q7_p329_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Thirty-minute posterior dynamic images demonstrate a central area of photopenia within the right kidney (arrowheads), which is secondary to a dilated pelvicalyceal system filled with nonradiolabeled urine. The right kidney is slightly enlarged compared to the left kidney. There is progressive tubular extraction by the right kidney without excretion into the renal collecting system, representing severely impaired right renal function. Findings are likely secondary to a high-grade obstruction with resultant renal dysfunction. Normally functioning left kidney is seen with the accumulation of the radiopharmaceutical in the dilated left pelvicalyceal system and ureter. This empties promptly after the administration of Lasix, indicating left hydroureteronephrosis without obstruction. Prolonged high-grade obstruction, if left untreated, can result in progressive loss of nephrons, causing diminished renal function and eventual atrophy. If corrected, a significant portion of the function can recover. As such, renal scintigraphy is helpful not only in the diagnosis of obstruction but also in the assessment of the functional significance of the obstruction and in the evaluation of recovered residual function after proper treatment of the obstruction. Serial examinations may also be performed to monitor patients with partial obstruction or patients at risk for worsening obstruction.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:293-299. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:263-270."}, {"number": "8", "stem": "A 3-year-old male presents for further workup of left-sided hydronephrosis. Based on the following post-Lasix images and time-activity curve, what is the most appropriate next step?", "options": [{"letter": "A", "text": "Do nothing; the study is diagnostic for hydronephrosis with obstruction."}, {"letter": "B", "text": "Do nothing; the study is diagnostic for hydronephrosis without obstruction."}, {"letter": "C", "text": "Do nothing; the study is indeterminate for obstruction."}, {"letter": "D", "text": "Ask the technologist to reprocess the images."}, {"letter": "E", "text": "Recommend correlation with a VCUG."}, {"letter": "F", "text": "Recommend correlation with a contrast-enhanced CT."}], "images": ["assets/q8_p330_01.jpg", "assets/q8_p330_02.jpg"], "explanationImages": ["assets/a8_p347_01.jpg"], "answer": "D", "explanation": "Answer D. Post-Lasix posterior dynamic images demonstrate marked left hydroureteronephrosis. The Lasix renogram suggests partial emptying of the renal collecting system. However, the left kidney region of interest (ROI) only includes the renal pelvicalyceal system, which is inaccurate. The data were reprocessed including the dilated ureter and the pelvicalyceal system in the region of interest. The generated time-activity curve demonstrated no emptying with Lasix (image below). Findings represent hydroureteronephrosis in the setting of left ureterovesical junction obstruction. Quantitative values and time-activity curves should always be interpreted in conjunction with the images of the renal function. Attention should be paid to the regions of interest drawn around the kidney and the collecting system, especially if there is evidence of dilatation. In the case of UVJ obstruction, ureter should be included in the collecting system ROI.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:293-299. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:258-270. Taylor AT, Brandon DC, de Palma D, et al. SNMMI Procedure Standard/EANM Practice Guideline for Diuretic Renal Scintigraphy in Adults With Suspected Upper Urinary Tract Obstruction 1.0. Semin Nucl Med 2018;48(4):377-390."}, {"number": "9", "stem": "Which of the following sets of renogram curves represent a positive study for renovascular hypertension using MAG3 or DTPA? The dotted line (− − −) represents the baseline, while the solid line represents the captopril study.", "options": [{"letter": "A", "text": "Curve set A"}, {"letter": "B", "text": "Curve set B"}, {"letter": "C", "text": "Curve set C"}, {"letter": "D", "text": "Curve set D"}, {"letter": "E", "text": "Curve set E"}], "images": ["assets/q9_p331_01.jpg"], "explanationImages": ["assets/a9_p348_01.jpg"], "answer": "B", "explanation": "Answer B. If a patient has renovascular hypertension, then the administration of captopril will cause a decrease in the GFR. This will manifest as an overall decrease in the renal accumulation and excretion of the agent that is filtered by the glomerulus, that is, DTPA. On the other hand, the rate of tubular extraction is not significantly affected. As such, the rate of accumulation of the tubular agent, that is, MAG3 will be slightly delayed but not decreased. However, due to the decrease in GFR, this tubular accumulated agent will not demonstrate washout. As such, the correct pair of renogram curves for DTPA and MAG3 is identified by the choice B.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:301-306. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:268-271."}, {"number": "10", "stem": "What is the most likely diagnosis in this patient with the following Tc-99m MAG3 captopril (top) and baseline (bottom) renography?", "options": [{"letter": "A", "text": "Severe hydronephrosis"}, {"letter": "B", "text": "Ca channel blocker intake"}, {"letter": "C", "text": "Beta-blocker intake"}, {"letter": "E", "text": "Alpha-blocker intake"}], "images": ["assets/q10_p332_01.jpg"], "explanationImages": ["assets/a10_p349_01.jpg"], "answer": "B", "explanation": "Answer B. The supplied images demonstrate severe captopril-induced renal dysfunction bilaterally. Captopril renogram is a noninvasive screening test of choice for the diagnosis of renovascular hypertension. It is highly sensitive (93%) and specific (95%). However, when bilateral captopril-induced renal dysfunction is seen, artifactual causes of false-positive captopril renography should be considered as they are more common than bilateral renal artery stenosis. These artifactual causes of bilateral false-positive study include dehydration, captopril-induced hypotension, and calcium channel blockers. If possible, the patient should stop Ca channel blockers prior to captopril renogram. If artifactual causes for false-positive captopril renography are excluded, then bilateral renal artery stenosis should be presumed as a bilateral involvement may be present in approximately 30% of patients greater than 55 years of age. Alpha- and beta- blockers do not interfere with ACE inhibitor renography.\n\nReferences: Claveau-Tremblay R, Turpin S, De Braekeleer M, et al. False-positive captopril renography in patients taking calcium antagonists. J Nucl Med 1998;39(9):1621-1626. Ludwig V, Martin WH, Delbeke D. Calcium channel blockers: a potential cause of false-positive captopril renography. Clin Nucl Med 2003;28(2):108-112."}, {"number": "11", "stem": "The following images are from a 53-year-old who underwent renal scintigraphy to rule out obstruction. What is the most appropriate next step?", "options": [{"letter": "A", "text": "Administer Lasix."}, {"letter": "B", "text": "Ask the technologist to reprocess the images."}, {"letter": "C", "text": "Ask the technologist to provide anterior images."}, {"letter": "D", "text": "Recommend ultrasound."}], "images": ["assets/q11_p333_01.jpg", "assets/q11_p334_01.jpg"], "explanationImages": ["assets/a11_12_p350_01.jpg"], "answer": "D", "explanation": "Answer D. The sequential dynamic posterior images demonstrate an enlarged right kidney with a large area of relative photopenia occupying its lower pole. Nonfunctioning renal tissue will not concentrate the radiopharmaceutical and appear as a photopenic, space-occupying lesion. Since the peak uptake in a normal kidney occurs between 2 and 5 minutes, photopenic lesions are usually best visualized during this time. While the most common photopenic lesions are renal cysts, renal cell carcinoma and other malignancies may appear similarly. As such, correlation with anatomic imaging such as ultrasound, CT, or MRI should be considered for further evaluation. Since there is no evidence of obstruction, the administration of Lasix is not necessary. There are no processing errors, and providing anterior images would not change the management in this patient. This patient had a large renal cell carcinoma involving the lower pole of the right kidney.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:292-293. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:260-263."}, {"number": "12", "stem": "The following examination was performed on a 57-year-old who underwent renal transplantation a few days ago. What is your interpretation?", "options": [{"letter": "A", "text": "Left lower extremity deep venous thrombosis"}, {"letter": "B", "text": "Vasomotor nephropathy"}, {"letter": "C", "text": "Acute transplant rejection"}, {"letter": "D", "text": "Vascular occlusion"}, {"letter": "E", "text": "Hydronephrosis"}, {"letter": "F", "text": "Lymphocele"}, {"letter": "G", "text": "Hematoma"}], "images": ["assets/q12_p335_01.jpg", "assets/q12_p336_01.jpg"], "explanationImages": ["assets/a11_12_p350_01.jpg"], "answer": "D", "explanation": "Answer D. Anterior flow images acquired after the IV administration of Tc-99m MAG3 for the evaluation of transplant renal function demonstrate no significant flow through the left common iliac artery (arrow). The functional images show absent perfusion to the transplanted kidney in the left hemipelvis with a round area of photopenia (arrowheads). Findings are most compatible with a nonviable transplant from acute arterial occlusion. Since there is no collateral venous drainage in the transplanted kidney, renal vein thrombosis will also demonstrate a similar appearance with a lack of perfusion and function owing to the absence of venous collaterals in the transplanted kidney; however, flow through the left common iliac artery would be visualized.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:308-309. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:271-277, 280."}, {"number": "13", "stem": "Two days after renal transplantation, a 45-year-old female presents with decreased urine output. What is the most likely diagnosis based on the following images?", "options": [{"letter": "A", "text": "Urine leak"}, {"letter": "B", "text": "Lymphocele"}, {"letter": "C", "text": "Hydronephrosis"}, {"letter": "D", "text": "Vascular occlusion"}, {"letter": "E", "text": "Vasomotor nephropathy"}, {"letter": "F", "text": "Acute transplant rejection"}], "images": ["assets/q13_p337_01.jpg", "assets/q13_p338_01.jpg"], "explanationImages": ["assets/a13_14_p351_01.jpg"], "answer": "E", "explanation": "Answer E. Anterior dynamic images acquired after the IV administration of Tc-99m MAG3 demonstrates brisk but progressive uptake of the radiopharmaceutical without significant excretion into the renal collecting system. Time-activity curve from the renal flow (perfusion) images demonstrates good flow to the transplanted kidney with the slope of the renal flow similar to that of the aorta/iliac artery at that level (arrow). The functional time-activity curve (renogram) demonstrates a progressive increase in activity without significant excretion. Findings are compatible with vasomotor nephropathy, also known as ischemic nephropathy, delayed graft function, or acute tubular necrosis. Transplant renogram must be interpreted in the context of clinical history. Renal dysfunction in the early posttransplant period is due to either vasomotor nephropathy or acute rejection. Vasomotor nephropathy occurs immediately after surgery and should recover during the first 2 weeks. On the other hand, acute rejection does not typically occur until after a few weeks and is most common in the first three months. While severe renal dysfunction from obstruction could have a similar appearance, there would typically be photopenia related to the dilated collecting system and some excretion into the collecting system. Renal artery or renal vein occlusion would present with absent renal flow and function of the allograft. Urine leak would demonstrate activity outside the kidney or bladder that layers on decubitus images.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:308-309. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:274-276."}, {"number": "14", "stem": "The following renal scintigraphy images are from a 37-year-old woman with abdominal pain and decreased urine output. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Normal"}, {"letter": "B", "text": "Urine leak"}, {"letter": "C", "text": "Lymphocele"}, {"letter": "D", "text": "Bowel uptake"}, {"letter": "E", "text": "Hydronephrosis"}, {"letter": "F", "text": "Vasomotor nephropathy"}, {"letter": "G", "text": "Acute transplant rejection"}], "images": ["assets/q14_p339_01.jpg", "assets/q14_p340_01.jpg"], "explanationImages": ["assets/a13_14_p351_01.jpg"], "answer": "B", "explanation": "Answer B. The anterior Tc-99m MAG3 renogram images of renal transplant in the right iliac fossa show good uptake and excretion by the transplanted kidney. However, the decubitus images demonstrate activity external to the kidney and renal collecting system (arrowheads). This is most compatible with a urine leak. If there is a clinical suspicion of a possible urine leak, decubitus imaging as well as delayed 1- to 2-hour imaging should be considered. At some institutions, decubitus images are routinely done to demonstrate the shifting of the activity and to increase the sensitivity of the examination for urine leak. If needed, SPECT/CT images would also help with the confirmation. A postoperative urine leak may occur at the anastomotic site or result from the rupture of an obstructed allograft. The pattern of the shown uptake does not conform to the bowel and, as such, is not of GI origin. Renal scintigraphy is a simple, sensitive, and reliable way of diagnosing and following patients with a urinary leak. Other fluid collections associated with renal transplant include hematoma and lymphocele. Both of these would demonstrate photopenia on renal scintigraphy. Hematoma is typically seen in the early postoperative period, and lymphocele is typically seen 2 to 3 months after the transplant due to a lack of lymphatic drainage from the transplanted kidney.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:300, 308-309. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:271-277. Schillaci O, Danieli R, Manni C, et al. Technetium-99m-labelled red blood cell imaging in the diagnosis of hepatic haemangiomas: the role of SPECT/CT with a hybrid camera. Eur J Nucl Med Mol Imaging 2004;31(7):1011-1015. PubMed PMID: 15057491."}, {"number": "15", "stem": "The following patient with a recently diagnosed enhancing soft tissue renal lesion on a recent CT undergoes evaluation with a Tc-99m sestamibi scan. What is the most likely diagnosis based on the provided SPECT/CT images?", "options": [{"letter": "A", "text": "Renal cell carcinoma"}, {"letter": "B", "text": "Renal cyst"}, {"letter": "C", "text": "Lymphoma"}, {"letter": "D", "text": "Oncocytoma"}], "images": ["assets/q15_p341_01.jpg"], "explanationImages": ["assets/a15_p352_01.jpg"], "answer": "A", "explanation": "Answer A. Fused SPECT/CT and CT images demonstrate a soft tissue lesion emanating from the posteromedial aspect of the left kidney (arrows below), which demonstrates no significant Tc- 99m sestamibi uptake (arrow on the fused image below). Tc-99m sestamibi is used for the differentiation of oncocytoma from renal cell carcinoma. Tc-99m sestamibi is a lipophilic cation that localizes in the cells based on their mitochondrial content. Renal oncocytomas have large numbers of mitochondria, especially in comparison to renal cell carcinoma (RCC), which has a relative paucity of mitochondria. RCCs also often possess multidrug-resistant (MDR) pumps. These pumps eliminate Tc-99m sestamibi out of the cells. Renal parenchyma has high physiologic uptake of Tc-99m sestamibi. RCCs generally show a distinct decrease in uptake relative to adjacent normal parenchyma. In contrast, oncocytomas display uptake that is similar to or above that of the adjacent renal parenchyma. Masses displaying variable uptake (uptake similar to or higher than the adjacent renal parenchyma) are likely to be of benign etiology, such as oncocytoma. This patient had a partial nephrectomy, which showed clear cell renal carcinoma. Increased utilization of cross-sectional imaging has led to an increase in the diagnosis of incidental renal masses on conventional imaging. While most of the incidental soft tissue renal masses represent RCC, of the benign solid masses, oncocytoma is the most common (up to 15% of all renal masses). Tc-99m sestamibi scan is used to allow for differentiation of RCC from oncocytoma when conventional imaging is not conclusive.\n\nReferences: Rowe SP, Gorin MA, Gordetsky J, et al. Initial experience using 99mTc-MIBI SPECT/CT for the differentiation of oncocytoma from renal cell carcinoma. Clin Nucl Med 2015;40(4):309-313. A. Normal transplant B. En bloc transplant with ATN C. Normal transplant with adjacent urinoma D. Infarcted upper pole with normal lower pole"}, {"number": "16", "stem": "What percent of renal plasma flow is usually cleared by glomerular filtration?", "options": [{"letter": "A", "text": "10%"}, {"letter": "B", "text": "20%"}, {"letter": "C", "text": "40%"}, {"letter": "D", "text": "80%"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Twenty percent of renal plasma flow is cleared by glomerular filtration, and 80% is cleared by the tubular secretion.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:287."}, {"number": "17", "stem": "The following pediatric patient presents for evaluation of renal function and possible obstruction. Renal scintigraphy using which of the following radiopharmaceuticals is MOST appropriate in this situation?", "options": [{"letter": "A", "text": "DTPA"}, {"letter": "B", "text": "MAG3"}, {"letter": "C", "text": "DMSA"}, {"letter": "D", "text": "Hippuran"}], "images": ["assets/q17_p354_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The renal sonogram demonstrates moderate-to-severe hydronephrosis. In the setting of obstruction, GFR typically declines before tubular secretion. Additionally, the extraction fraction of MAG3 is 40% to 50%, more than twice that of DTPA. As such, MAG3 is preferred over DTPA in patients with suspected obstruction and impaired renal function. MAG3 is also the preferred radiopharmaceutical for renal function evaluation in the pediatric population because glomerular filtration is incompletely developed in the neonates. It is currently the most commonly used renal radiopharmaceutical. While DMSA would be useful in the evaluation of differential renal function, it would not allow assessment of obstruction as it remains predominantly fixed in the renal tubule and not excreted into the renal collecting system. Hippuran required labeling with I- 131 or I-123 and produced poor imaging quality images; it has been replaced by Tc-99m MAG3.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:288-289, 293-299. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:263-268."}, {"number": "18", "stem": "Which of the following is the preferred radiopharmaceutical in the determination of the differential renal function?", "options": [{"letter": "A", "text": "DTPA"}, {"letter": "B", "text": "MAG3"}, {"letter": "C", "text": "DMSA"}, {"letter": "D", "text": "Glucoheptonate"}, {"letter": "E", "text": "Hippuran"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. DMSA is cortically bound and demonstrates very little renal excretion compared to the other renal agents. For this reason, it is the best agent to determine differential renal function. This lack of significant renal excretion is particularly useful in the setting of hydronephrosis. The differential renal function provided by Tc-99m MAG3 is also accurate in the absence of hydronephrosis. It is calculated by measuring the counts in each renal region of interest at peak cortical activity (1 to 3 minutes after the injection) before the radiopharmaceutical is excreted into the collecting system. When the main concern is the determination of the differential renal function, DMSA is the radiopharmaceutical of choice.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:288-289. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:260-282."}, {"number": "19", "stem": "The following renal scintigraphy was performed on a 2-year-old with decreased urine output. What is your interpretation of the findings?", "options": [{"letter": "A", "text": "Normal"}, {"letter": "B", "text": "Urine leak"}, {"letter": "C", "text": "Renal-colic fistula"}, {"letter": "D", "text": "Severe renal dysfunction"}, {"letter": "E", "text": "Bilateral hydronephrosis"}], "images": ["assets/q19_p355_01.jpg", "assets/q19_p356_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Initial images demonstrate no significant radiotracer excretion; therefore, delayed images were acquired. On delayed images, there is persistent renal activity at 16.5 hours compatible with severe renal dysfunction. Activity is also noted within the bowel. The alternative path of the technetium-99m MAG3 excretion is by the hepatobiliary system. So, bowel activity may be visualized on the delayed images in patients with severely diminished renal function. A renal-colic fistula typically develops after a procedure such as renal ablation, and if this was the case, activity should have been present in the bowel on the initial images.\n\nReferences: Shea TE, Pfister RC. Opacification of the gallbladder by urographic contrast media reflection of an alternate excretory pathway. Am J Roentgenol Radium Ther Nucl Med 1969;107(4):763-768."}, {"number": "20", "stem": "Based on the provided pre- and post-Lasix images and the Lasix renogram curve, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Right hydronephrosis with obstruction"}, {"letter": "B", "text": "Right hydronephrosis without obstruction"}, {"letter": "C", "text": "Right hydronephrosis indeterminate for obstruction"}, {"letter": "D", "text": "Poorly functioning right kidney"}, {"letter": "E", "text": "Poorly functioning left kidney"}, {"letter": "F", "text": "Left hydronephrosis with obstruction"}, {"letter": "G", "text": "Left hydronephrosis without obstruction"}, {"letter": "H", "text": "Left hydronephrosis indeterminate for obstruction"}], "images": ["assets/q20_p357_01.jpg", "assets/q20_p357_02.jpg", "assets/q20_p357_03.jpg", "assets/q20_p358_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Posterior dynamic Tc-99m MAG3 functional images demonstrate a central area of photopenia in the right kidney from pelvicaliectasis with abnormal rotation on the functional images. Brisk uptake and excretion indicate good bilateral renal function. There is progressive accumulation of radiopharmaceutical in the right pelvicalyceal system indicating marked right hydronephrosis. After Lasix administration, there is some emptying of the radiopharmaceutical from the hydronephrotic right collecting system with an indeterminate diuretic T1/2 emptying time of 14 minutes. This slow partial clearance may be a result of an extremely distended system with large capacitance, and obstruction may not be present; however, since obstruction cannot be entirely excluded, Lasix T1/2-time values between 10- and 20-minute obstructions are assigned an indeterminate for obstruction category. In addition to increased capacitance, indeterminate Lasix T one-half emptying time can also be caused by dehydration and poor diuretic response in a patient with severe chronic kidney disease.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:293-299. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:258-270."}, {"number": "21", "stem": "A 59-year-old gets the following renal study after renal transplant secondary to decreased urine output. What is your interpretation?", "options": [{"letter": "A", "text": "Normal transplant"}, {"letter": "B", "text": "En bloc transplant with ATN"}, {"letter": "C", "text": "Normal transplant with adjacent urinoma"}, {"letter": "D", "text": "Infarcted upper pole with normal lower pole"}], "images": ["assets/q21_p359_01.jpg"], "explanationImages": ["assets/a21_p361_01.jpg"], "answer": "B", "explanation": "Answer B. Dynamic anterior images acquired after the IV administration of Tc-99m MAG3 demonstrate prompt uptake and excretion from the renal moiety on the right (arrowhead). However, the more inferior left renal moiety shows prompt uptake with progressive accumulation (arrow), a pattern typically seen with vasomotor nephropathy (ATN). This is a case of an en bloc renal transplant in which two pediatric kidneys are transplanted into an adult. The right superior renal transplant is functioning properly with vasomotor nephropathy of the left inferior transplant. This case does not demonstrate a urinoma as it would be expected to shift position on decubitus images.\n\nReferences: Memel DS, Dodd GD III, Shah AN, et al. Imaging of en bloc renal transplants: normal and abnormal postoperative findings. AJR Am J Roentgenol 1993;160(1):75-81. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:308-309. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:271-277."}];
    const APP_ID = "nuclear-medicine-genitourinary-quiz-ch9";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
