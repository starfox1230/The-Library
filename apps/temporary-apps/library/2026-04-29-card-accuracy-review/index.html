<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Card Accuracy Review - Fixed Sortable Table</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #111827;
    --panel-2: #1f2937;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --border: #374151;
    --bad-bg: #7f1d1d;
    --bad-text: #fecaca;
    --warn-bg: #713f12;
    --warn-text: #fde68a;
    --ok-bg: #064e3b;
    --ok-text: #bbf7d0;
    --focus: #93c5fd;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.45;
    color: var(--text);
    background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
  }
  .wrap {
    max-width: 1500px;
    margin: 0 auto;
    padding: 18px 20px;
  }
  header {
    background: rgba(15, 23, 42, 0.98);
    border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 1.35rem;
    margin: 0 0 8px 0;
    letter-spacing: 0.01em;
  }
  .subtitle {
    color: var(--muted);
    margin: 0 0 14px 0;
    font-size: 0.95rem;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(4, minmax(160px, 1fr));
    gap: 10px;
    align-items: end;
  }
  label {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 4px;
  }
  select, input, button {
    width: 100%;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.95rem;
  }
  button {
    cursor: pointer;
  }
  button:hover, select:focus, input:focus {
    outline: 2px solid var(--focus);
    outline-offset: 1px;
  }
  .summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 16px 0 0 0;
  }
  .pill {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 0.85rem;
    color: var(--muted);
    background: rgba(17, 24, 39, 0.8);
  }
  main {
    max-width: 1500px;
    margin: 0 auto;
    padding: 18px 20px 60px;
  }
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: rgba(17, 24, 39, 0.85);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1100px;
  }
  thead {
    display: table-header-group;
  }
  thead th {
    position: static;
    background: #111827;
    color: #f3f4f6;
    text-align: left;
    font-weight: 700;
    font-size: 0.86rem;
    border-bottom: 2px solid var(--border);
    padding: 12px;
    white-space: nowrap;
  }
  thead th.sortable {
    cursor: pointer;
    user-select: none;
  }
  thead th.sortable:hover {
    color: var(--focus);
  }
  thead th.sorted::after {
    content: " " attr(data-arrow);
    color: var(--focus);
  }
  tbody td {
    vertical-align: top;
    border-bottom: 1px solid rgba(55, 65, 81, 0.7);
    padding: 12px;
    font-size: 0.93rem;
  }
  tbody tr:hover {
    background: rgba(55, 65, 81, 0.22);
  }
  .num {
    width: 80px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .original {
    width: 42%;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .verdict {
    width: 225px;
  }
  .fix {
    width: 40%;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .tag {
    display: inline-block;
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 0.78rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .tag.bad {
    color: var(--bad-text);
    background: var(--bad-bg);
  }
  .tag.warn {
    color: var(--warn-text);
    background: var(--warn-bg);
  }
  .tag.ok {
    color: var(--ok-text);
    background: var(--ok-bg);
  }
  @media (max-width: 900px) {
    .controls {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Card Accuracy Review</h1>
    <p class="subtitle">Sortable table with original wording, verdict category, and suggested fix/revision. The table header row is fixed so it appears above all card rows.</p>

    <div class="controls">
      <div>
        <label for="sortMode">Sort by</label>
        <select id="sortMode">
          <option value="number">Card number</option>
          <option value="verdict">Verdict category, then card number</option>
          <option value="original">Original wording</option>
        </select>
      </div>
      <div>
        <label for="filterMode">Filter verdict</label>
        <select id="filterMode">
          <option value="all">All verdicts</option>
          <option value="Clearly incorrect">Clearly incorrect</option>
          <option value="Needs revision / key nuance">Needs revision / key nuance</option>
          <option value="No problem">No problem</option>
        </select>
      </div>
      <div>
        <label for="searchBox">Search text</label>
        <input id="searchBox" type="search" placeholder="Search original wording or fix">
      </div>
      <div>
        <label>&nbsp;</label>
        <button id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="summary" id="summary"></div>
  </div>
</header>

<main>
  <div class="table-wrap">
    <table id="reviewTable">
      <thead>
        <tr>
          <th class="sortable num" data-sort="number">Card #</th>
          <th class="sortable original" data-sort="original">Original wording</th>
          <th class="sortable verdict" data-sort="verdict">Verdict</th>
          <th class="fix">Fix / note</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>

ic age range for idiopathic intussusception is {{c1::3 months to 3 years}}.", "verdict": "No problem", "priority": 3, "fix": "No change needed."}, {"num": 22, "original": "Intussusception outside the 3 months to 3 years age range should raise concern for a {{c1::lead point}}.", "verdict": "No problem", "priority": 3, "fix": "No change needed."}, {"num": 23, "original": "Gastroschisis is classically on the {{c1::right}} side of the umbilicus.", "verdict": "No problem", "priority": 3, "fix": "No change needed."}, {"num": 24, "original": "Omphalocele is associated with {{c1::congenital anomalies}} more than gastroschisis is.", "verdict": "No problem", "priority": 3, "fix": "No change needed."}, {"num": 25, "original": "Physiologic gut herniation is normal at {{c1::6 to 8 weeks}} of gestation.", "verdict": "Needs revision / key nuance", "priority": 2, "fix": "Incomplete. Physiologic midgut herniation is usually described around 6 to 10 weeks and returns by about 11 to 12 weeks."}, {"num": 26, "original": "Hepatoblastoma is associated with elevated {{c1::AFP}}.", "verdict": "No problem", "priority": 3, "fix": "No change needed."}, {"num": 27, "original": "Infantile hepatic hemangioendothelioma is associated with elevated {{c1::endothelial growth factor::what laboratory finding}}", "verdict": "Clearly incorrect", "priority": 1, "fix": "Replace with: Infantile hepatic hemangiomas may be associated with high-output cardiac failure, consumptive hypothyroidism, and sometimes elevated AFP. AFP elevation has been reported in proliferating infantile hemangioma/hepatic hemangioma."}, {"num": 28, "original": "The most common cause of pancreatitis in a child is {{c1::trauma}}.", "verdict": "Needs revision / key nuance", "priority": 2, "fix": "Oversimplified. Trauma is an important pediatric cause and seatbelt/handlebar injury is classic, but pediatric pancreatitis has many etiologies including biliary, medication, systemic illness, anatomic, infection, trauma, and idiopathic causes let currentSort = "number";
let sortAscending = true;
const sortMode = document.getElementById("sortMode");
const filterMode = document.getElementById("filterMode");
const searchBox = document.getElementById("searchBox");
const resetBtn = document.getElementById("resetBtn");
const tbody = document.getElementById("tbody");
const summary = document.getElementById("summary");
const sortHeaders = document.querySelectorAll("th.sortable");

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function tagClass(verdict) {
  if (verdict === "Clearly incorrect") return "bad";
  if (verdict === "Needs revision / key nuance") return "warn";
  return "ok";
}

function compareRows(a, b) {
  let result = 0;
  if (currentSort === "number") {
    result = a.num - b.num;
  } else if (currentSort === "original") {
    result = a.original.localeCompare(b.original, undefined, { numeric: true, sensitivity: "base" });
    if (result === 0) result = a.num - b.num;
  } else if (currentSort === "verdict") {
    result = a.priority - b.priority;
    if (result === 0) result = a.num - b.num;
  }
  return sortAscending ? result : -result;
}

function getVisibleRows() {
  const filter = filterMode.value;
  const q = searchBox.value.trim().toLowerCase();

  return DATA.filter(row => {
    const matchesFilter = filter === "all" || row.verdict === filter;
    const matchesSearch = !q ||
      row.original.toLowerCase().includes(q) ||
      row.verdict.toLowerCase().includes(q) ||
      row.fix.toLowerCase().includes(q) ||
      String(row.num).includes(q);
    return matchesFilter && matchesSearch;
  }).sort(compareRows);
}

function updateHeaderIndicators() {
  sortHeaders.forEach(th => {
    const isCurrent = th.dataset.sort === currentSort;
    th.classList.toggle("sorted", isCurrent);
    th.setAttribute("data-arrow", isCurrent ? (sortAscending ? "▲" : "▼") : "");
  });
}

function render() {
  const visible = getVisibleRows();

  tbody.innerHTML = visible.map(row => `
    <tr data-verdict="${escapeHtml(row.verdict)}">
      <td class="num">${row.num}</td>
      <td class="original">${escapeHtml(row.original)}</td>
      <td class="verdict"><span class="tag ${tagClass(row.verdict)}">${escapeHtml(row.verdict)}</span></td>
      <td class="fix">${escapeHtml(row.fix)}</td>
    </tr>
  `).join("");

  const counts = DATA.reduce((acc, row) => {
    acc[row.verdict] = (acc[row.verdict] || 0) + 1;
    return acc;
  }, {});
  summary.innerHTML = `
    <span class="pill">Showing ${visible.length} of ${DATA.length}</span>
    <span class="pill">Clearly incorrect: ${counts["Clearly incorrect"] || 0}</span>
    <span class="pill">Needs revision / key nuance: ${counts["Needs revision / key nuance"] || 0}</span>
    <span class="pill">No problem: ${counts["No problem"] || 0}</span>
  `;

  updateHeaderIndicators();
}

sortHeaders.forEach(th => {
  th.addEventListener("click", () => {
    const requestedSort = th.dataset.sort;
    if (currentSort === requestedSort) {
      sortAscending = !sortAscending;
    } else {
      currentSort = requestedSort;
      sortAscending = true;
    }
    sortMode.value = currentSort === "number" ? "number" : currentSort;
    render();
  });
});

sortMode.addEventListener("change", () => {
  currentSort = sortMode.value;
  sortAscending = true;
  render();
});

filterMode.addEventListener("change", render);
searchBox.addEventListener("input", render);
resetBtn.addEventListener("click", () => {
  currentSort = "number";
  sortAscending = true;
  sortMode.value = "number";
  filterMode.value = "all";
  searchBox.value = "";
  render();
});

render();
</script>
