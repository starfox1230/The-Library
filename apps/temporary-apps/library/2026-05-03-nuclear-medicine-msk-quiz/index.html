  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;

    * { box-sizing: border-box; }
    body {

      background: #111721;
      position: sticky;

    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;

      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }

    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);

    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;

    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;

    }

      background: var(--accent);

    }

      font-size: 1.12rem;

      display: grid;

      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);

      object-fit: contain;

    .choices { display: grid; gap: 8px; margin: 14px 0; }

    .notice {
      color: var(--muted);

    }

    .feedback-head {

    .lightbox img {

      display: block;
    }

      justify-content: space-between;
      align-items: center;
      gap: 12px;

    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }

      border-radius: 8px;

      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }

  <script>
    const QUESTIONS = [{"number": "1", "stem": "Excessive aluminum in the technetium generator eluate during the preparation of Tc-99m MDP will result in localization of the radiopharmaceutical in which of the following organs?", "options": [{"letter": "A", "text": "Brain"}, {"letter": "B", "text": "Stomach"}, {"letter": "C", "text": "Lungs"}, {"letter": "D", "text": "Liver"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Excessive aluminum from the generator elution causes colloid formation, which can accumulate in the liver. Causes of diffuse abnormal hepatic activity on bone scan include the following: excessive aluminum in elution from the generator, residual activity from a previous sulfur colloid scan, excessive serum aluminum, hepatic necrosis, hepatic metastases, amyloidosis, and metastatic calcifications. On the other hand, excessive air in the mixing vial will result in the oxidation of tin from stannous ion (Sn II) to stannous hydroxide (Sn IV). This will cause poor tagging of the radiopharmaceutical and will result in excessive free pertechnetate. Free pertechnetate can also be visualized if the radiopharmaceutical injection is delayed for more than 4 hours after its preparation. Free pertechnetate localizes within the salivary glands, thyroid gland, and stomach and increases the background soft tissue activity. As such, quality control with chromatography should be routinely performed before the injection of the radiopharmaceutical to ensure >95% binding.\n\nReferences: MacDonald J. Idiopathic hepatic uptake of 99mTc methylene diphosphonate: a case report. J Nucl Med Technol 2001;29(1):32-36. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:55, 75-76."}, {"number": "2", "stem": "Given the following 3-hour delayed Tc-99m MDP images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Renal failure"}, {"letter": "B", "text": "Normal study"}, {"letter": "C", "text": "Diffuse metastasis"}, {"letter": "D", "text": "Hypertrophic osteoarthropathy"}], "images": ["assets/q2_p086_01.jpg", "assets/q2_p087_01.jpg"], "explanationImages": ["assets/a2_p116_01.jpg"], "answer": "C", "explanation": "Answer C. The supplied images demonstrate diffusely increased radiotracer uptake throughout the spine, pelvis, ribs, and the proximal appendicular skeleton with absent visualization of the kidneys. The findings are most compatible with a superscan. Normal physiologic distribution of the radiotracer on the bone scan includes the GU system, and attention to the kidneys should be paid on the bone scan. The kidneys are not visualized on the superscan due to intense uptake within the osseous structures. If these images were windowed down, renal parenchyma would be more evident. Superscan is most commonly secondary to osseous metastatic disease; however, it can also be seen with metabolic disorders such as primary hyperparathyroidism, renal osteodystrophy, myelofibrosis, mastocytosis, and hypervitaminosis D. A patient with renal failure would demonstrate more background soft tissue uptake on 3-hour delayed images secondary to decreased clearance of the radiotracer. An 18- to 24-hour delayed \"fourth-phase\" scan in patients with renal failure/dialysis may produce a similar appearance and is often referred to as a \"beautiful scan.\" Superscan or beautiful scan associated with primary hyperparathyroidism and renal osteodystrophy (secondary hyperparathyroidism) often demonstrates increased radiotracer uptake within an enlarged mandible, which is referred to as the \"Lincoln sign\" (see image below) as well as increased uptake within periarticular bones. Hypertrophic osteoarthropathy typically demonstrates increased radiotracer uptake within the periosteum of long bones, which is often referred to as \"tram tracking.\"\n\nReferences: Habibian MR. Nuclear medicine imaging: a teaching file, 2nd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2009:326-328. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:249. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:77, 90-91."}, {"number": "3", "stem": "A 13-year-old presents with right lower extremity pain. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Paget disease"}, {"letter": "B", "text": "Osteosarcoma"}, {"letter": "C", "text": "Osteomyelitis"}, {"letter": "D", "text": "Fibrous dysplasia"}, {"letter": "E", "text": "Ewing sarcoma"}, {"letter": "F", "text": "Severely comminuted fracture"}], "images": ["assets/q3_p088_01.jpg"], "explanationImages": ["assets/a3_p117_01.jpg"], "answer": "B", "explanation": "Answer B. Delayed anterior and posterior whole-body images demonstrate a large focus of intense radiotracer uptake within the right femoral diaphysis. Multiple small foci of intense radiotracer uptake are seen within the right and left chest, which do not correspond to the locations of the ribs (arrow below). The findings are most compatible with uptake within lung metastasis, typically seen with osteosarcoma. In questionable cases, SPECT-CT may be performed to confirm the location of metastasis in the lungs. Lung metastasis from osteosarcoma demonstrates intense bisphosphonate radiotracer uptake due to the presence of ossification within the metastasis. While the diaphyseal location is typically associated with Ewing sarcoma, lung metastasis from Ewing sarcoma would not be expected to demonstrate intense Tc-99m MDP uptake. Osteosarcoma commonly arises from the distal femoral metaphysis and demonstrates heterogeneous uptake containing areas of photopenia (see the image from a different patient below). While osteomyelitis may occur in the femoral diaphysis, it will typically demonstrate a well-defined homogeneous increase in radiotracer uptake (see an example case in the pediatrics nuclear medicine chapter). Both osteomyelitis and osteosarcoma would be positive on three-phase bone scintigraphy.\n\nReferences: Mebarki M, Medjahedi A, Menemani A, et al. Osteosarcoma pulmonary metastasis mimicking abnormal skeletal uptake in bone scan: utility of SPECT/CT. Clin Nucl Med 2013;38(10):e392-e394. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:253. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:96."}, {"number": "4", "stem": "A 12-year-old boy presents with severe right knee pain that is worse at night. Based on the following scintigraphic and CT findings, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Stress fracture"}, {"letter": "B", "text": "Bone island"}, {"letter": "C", "text": "Osteosarcoma"}, {"letter": "D", "text": "Osteoid osteoma"}, {"letter": "E", "text": "Metastatic neuroblastoma"}], "images": ["assets/q4_p089_01.jpg", "assets/q4_p089_02.jpg", "assets/q4_p090_01.jpg"], "explanationImages": ["assets/a4_p118_01.jpg"], "answer": "D", "explanation": "Answer D. A small round focus of intense uptake (arrow) in the posteromedial aspect of the proximal tibia is surrounded by a more diffuse mild uptake in the proximal tibial metaphysis (arrowheads). The radiograph demonstrates diffuse sclerosis within the proximal tibial metadiaphysis with solid (nonaggressive) periosteal reaction laterally. CT demonstrates a well- defined round low-attenuation nidus (black arrowheads) with a central area of high attenuation/mineralization (white arrow) within the posteromedial tibial cortex. The combination of these findings is most compatible with an osteoid osteoma. Osteoid osteoma is more common in the femur and tibia (>50%), with less common sites, including the spine, hands, and feet (30%). The least common locations include the skull, scapula, ribs, pelvis, mandible, and patella. Osteomyelitis would have a more homogenous appearance on bone scintigraphy and lack a hyperintense nidus. Stress fracture would demonstrate linear/fusiform-shaped, focal intense uptake without the surrounding mild uptake. Bone islands rarely accumulate MDP. Osteosarcoma would appear more diffuse as well and would be expected to have an aggressive periosteal reaction (sunburst appearance) on radiograph and CT. This is the wrong age group for metastatic neuroblastoma. Patients with osteoid osteoma are often adolescents and young adults with the clinical presentation of severe pain that is worse at night.\n\nReferences: Chai JW, Hong SH, Choi JY, et al. Radiologic diagnosis of osteoid osteoma: from simple to challenging findings. Radiographics 2010;30(3):737-749. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:253-254. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:97."}, {"number": "5", "stem": "A 56-year-old male with a history of prostate cancer presents for further evaluation with bone scintigraphy in the setting of elevated alkaline phosphatase levels. Based on the bone scan and pelvic radiograph images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Metastasis"}, {"letter": "B", "text": "Fibrous dysplasia"}, {"letter": "C", "text": "Paget disease"}, {"letter": "D", "text": "Osteosarcoma"}], "images": ["assets/q5_p091_01.jpg", "assets/q5_p092_01.jpg"], "explanationImages": ["assets/a5_p119_01.jpg"], "answer": "C", "explanation": "Answer C. Anterior and posterior delayed whole-body images demonstrate intense radiotracer uptake within the left hemipelvis involving the left ilium, ischium, and pubic bone in a contiguous fashion. The correlating radiograph demonstrates asymmetric bone expansion, cortical (iliopectineal and ilioischial lines) thickening (arrows below), and coarsened trabeculae. The findings are most compatible with Paget disease. Frequent sites of Paget involvement include pelvis (30% to 75%), spine (30% to 75%), skull (25% to 65%), and proximal long bones (25% to 30%). Less commonly affected sites include the shoulder girdle and forearm. Polyostotic disease (65% to 90%) is more frequent than the monostotic disease (10% to 35%). Pelvic involvement is more often asymmetric than symmetric. Three phases of Paget's are described. The early resorptive phase is characterized by lysis and thinned cortex. Descriptors such as \"blade of grass\" and \"osteoporosis circumscripta\" are seen in this phase. The lytic phase is followed by the mixed phase characterized by coarsening and thickening of trabeculae and cortex. The majority of the cases seen by radiologists are in the mixed phase. The mixed phase later progresses to the final blastic phase at a variable rate. Due to increased blood flow and bone turnover, lytic and mixed phases are typically characterized by intense uptake on bone scintigraphy. The more quiescent late blastic phase may show normal radionuclide uptake. Sarcomatous transformation of Paget's is rare, occurring in approximately 1% of cases, and is seen as focal bone destruction extending through the cortex with an associated soft tissue mass. Fibrous dysplasia may also demonstrate a similar degree of intense radiopharmaceutical uptake. However, it is typically seen in young patients (75% present by age 30) and can be distinguished from Paget disease based on the pattern of involvement and radiographic findings. While Paget disease involves the end of the bone, fibrous dysplasia typically does not involve the epiphysis. Contiguous involvement of the hemipelvis would be atypical for metastasis. The supplied radiograph also excludes metastasis and osteosarcoma as possibilities.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:272,276. Smith SE, Murphey MD, Motamedi K, et al. From the archives of the AFIP. Radiographics 2002;22(5):1191-1216."}, {"number": "6", "stem": "Which of the following statements is LEAST accurate regarding nuclear medicine imaging of complications related to hip replacement?", "options": [{"letter": "A", "text": "Activity surrounding a cemented prosthesis resolves within 1 year."}, {"letter": "B", "text": "A diffuse increase in activity surrounding the stem suggests hardware infection."}, {"letter": "C", "text": "A focal increase in activity at the tip and intertrochanteric regions suggests hardware loosening."}, {"letter": "D", "text": "F-18 FDG-PET imaging is the method of choice for the evaluation of suspected prosthetic infection."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Activity surrounding a cemented prosthesis usually returns to normal within 12 months after surgery. On the other hand, generalized increased activity may be seen for more than 2 years after surgery with a noncemented, porous-coated prosthesis. Persistent activity at the tip of the femoral shaft component and at the trochanter may represent hardware loosening, while a generalized increase in activity around a hip prosthesis, especially the stem, may indicate osteomyelitis. Combined labeled leukocyte-marrow imaging is the radionuclide study of choice for diagnosing prosthetic joint infection. Accuracy of F-18 FDG-PET is lower than that of the combined labeled leukocyte-marrow imaging.\n\nReferences: Kwee TC, Kwee RM, Alavi A. FDG-PET for diagnosing prosthetic joint infection: systematic review and metaanalysis. Eur J Nucl Med Mol Imaging 2008;35(11):2122-2132. Love C, Marwin SE, Palestro CJ. Nuclear medicine and the infected joint replacement. Semin Nucl Med 2009;39(1):66-78."}, {"number": "7", "stem": "A 21-year-old patient with a history of hyperthyroidism presents with bone pain. Based on the supplied images below, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "McCune-Albright syndrome"}, {"letter": "B", "text": "Fanconi syndrome"}, {"letter": "C", "text": "Polyostotic Paget disease"}, {"letter": "D", "text": "WAGR syndrome"}, {"letter": "E", "text": "Ollier disease"}], "images": ["assets/q7_p093_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Supplied anterior and posterior whole-body images demonstrate multiple areas of moderate to severely increased uptake with associated osseous deformities. In a young patient, these findings are characteristic of polyostotic fibrous dysplasia. Fibrous dysplasia (FD) is a benign osseous neoplasm in which the osteoblasts fail to differentiate normally, leading to osteolytic lesions. Frequently, FD occurs in only one bone (monostotic). Typical sites of involvement include the skull, femur, tibia, and humerus. Bone scans are useful in determining the extent of skeletal involvement, especially in polyostotic lesions. Patients with extensive bone disease may present with fractures and deformities of the long bones in early childhood. When these patients suffer femoral involvement, a bowed appearance, referred to as a \"shepherd's crook deformity,\" can be seen. McCune-Albright is a genetic syndrome characterized by cafe au lait spots, polyostotic fibrous dysplasia, and hyperfunctioning endocrinopathies such as hyperthyroidism or precocious puberty. Mazabraud syndrome is a rare combination of fibrous dysplasia and soft tissue myxomas. Fanconi syndrome describes a defect of proximal renal tubules leading to malabsorption of various electrolytes and substances that are usually absorbed by the proximal tubule. WAGR syndrome stands for Wilms tumors, Aniridia, Genital anomalies, and intellectual Retardation. Ollier disease is a skeletal disorder characterized by multiple enchondromas, which are noncancerous (benign) growths of cartilage that develop within the bones.\n\nReferences: Kairemo KJ, Verho S, Dunkel L. Imaging of McCune-Albright syndrome using bone single photon emission computed tomography. Eur J Pediatr 1999;158(2):123-126."}, {"number": "8", "stem": "Which of the following statements is MOST accurate regarding the measurement of bone mineral density (BMD) using dual x-ray absorptiometry (DEXA) scan?", "options": [{"letter": "A", "text": "T-score represents the standard deviation by which the patient's BMD differs from the mean BMD of a healthy population of the same age, gender, and ethnicity."}, {"letter": "B", "text": "Z-score represents the standard deviation by which the patient's BMD differs from the mean BMD of a young adult reference population of the same gender and ethnicity."}, {"letter": "C", "text": "The hip (including total hip and proximal femur) is not a reliable site for measurement in children."}, {"letter": "D", "text": "When the spine or hips cannot be evaluated, the distal one-third (33% radius) of the dominant forearm is the region of choice in the assessment of osteoporosis."}, {"letter": "E", "text": "The femoral neck is the most reproducible measurement of the hip."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Dual-energy x-ray absorptiometry (DEXA) is the technique of choice for the assessment of bone mineral density (BMD). BMD is the average concentration of mineral in a defined section of bone and is measured in grams per square centimeter. A reference database is used to obtain T-score and Z-score. T-score represents the standard deviation by which the patient's BMD differs from the mean BMD of a young adult reference population of the same sex and ethnicity. Z-score represents the standard deviation by which the BMD differs from the mean BMD of a healthy population of the same sex, ethnicity, and age as the person undergoing DEXA. The posteroanterior (PA) spine and total body less head (TBLH) are the most accurate and reproducible skeletal sites for performing BMD in children. The hip (including total hip and proximal femur) is not a reliable site for measurement in growing children due to the fact that there is significant variability in femoral maturation, which results in the lack of reproducibility in the hip region. Vertebral bodies are regarded as the optimal site for monitoring response to treatment. However, when vertebral body BMD is compromised, total hip BMD should be used for comparison as it is the most reproducible measurement of the hip. BMD of the forearm is acquired in the following three scenarios: when two regions from the hip and spine cannot be measured, for patients with hyperparathyroidism, and for patients whose weight exceeds the limit for the table. According to the International Society for Clinical Dosimetry, the distal one-third (33% radius) of the nondominant forearm is the region of choice in the assessment of osteoporosis.\n\nReferences: Baim S, Binkley N, Bilezikian JP, et al. Official Positions of the International Society for Clinical Densitometry and executive summary of the 2007 ISCD Position Development Conference. J Clin Densitom 2008;11(1):75-91. Baim S, Leonard MB, Bianchi ML, et al. Official Positions of the International Society for Clinical Densitometry and executive summary of the 2007 ISCD Pediatric Position Development Conference. J Clin Densitom 2008;11(1):6-21. Kanis JA; on behalf of the World Health Organization Scientific Group. Assessment of osteoporosis at the primary health-care level (WHO Collaborating Centre, UK) Technical Report. University of Sheffield, 2007, 2008."}, {"number": "9", "stem": "A 60-year-old male presents with diffuse bone pain and the following bone scintigraphy. What is the most appropriate next step?", "options": [{"letter": "A", "text": "Venous duplex sonogram of bilateral lower extremities"}, {"letter": "B", "text": "Radiographs of bilateral lower extremities"}, {"letter": "C", "text": "Computed tomography of the chest"}, {"letter": "D", "text": "MRI of the thoracolumbar spine"}, {"letter": "E", "text": "MRI of bilateral lower extremities"}], "images": ["assets/q9_p095_01.jpg"], "explanationImages": ["assets/a9_p121_01.jpg"], "answer": "C", "explanation": "Answer C. The delayed whole-body bone scintigraphy demonstrates distinct parallel lines of increased cortical/periosteal uptake in bilateral lower extremities (tibiae and femora). The findings are most compatible with hypertrophic osteoarthropathy. It is most commonly seen with lung cancer. As such, correlation with computed tomography of the chest or chest x-ray should be considered to evaluate for a possible malignancy. Other causes of hypertrophic osteoarthropathy include chest infections, COPD, inflammatory bowel disease, liver disease, and congestive heart failure. Shin splints are usually confined to tibiae and often involve only the posteromedial diaphyseal region. The knee radiograph in this patient demonstrated the characteristic thick wavy periosteal reaction in the distal femur (arrowheads). Chest CT was recommended based on the bone scintigraphy findings, which demonstrated a left upper lobe mass (arrows). The changes seen on bone scintigraphy often resolve after the treatment of the underlying disease.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:276. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:93, 95. Uchisako H, Suga K, Tanaka N, et al. Bone scintigraphy in growth hormone-secreting pulmonary cancer and hypertrophic osteoarthropathy. J Nucl Med 1995;36(5):822-825."}, {"number": "10", "stem": "What particle emission is responsible for the relief of painful osseous metastasis in a patient treated with radium-223 chloride?", "options": [{"letter": "A", "text": "Alpha"}, {"letter": "B", "text": "Beta"}, {"letter": "C", "text": "Gamma"}, {"letter": "D", "text": "Positron"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Radium-223 is a bone-seeking, calcium-mimetic alpha-emitting agent with a half-life of 11.4 days that accumulates in areas of increased bone turnover. It is used to treat diffuse painful osseous metastatic disease not responsive to analgesics. The range of the alpha particles (<100 μm) is shorter than 7 mm for Sr-89 or 3.3 mm for Sm-153 beta particles. Also, high-linear energy transfer of alpha radiation results in greater biologic effectiveness than that of beta radiation. Ra- 223 is primarily eliminated through feces, and diarrhea is the most common side effect reported with Ra-223 therapy. Of the molecular bone treatment agents available, Ra-223 is the only one that is reported to not only decrease bone pain but increase survival time (4 months). Ra-223 (Xofigo) is currently the only approved agent for the treatment of prostate cancer metastasis.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:284-285. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:117. Pandit-Taskar N, Larson SM, Carrasquillo JA. Bone-seeking radiopharmaceuticals for treatment of osseous metastases, part 1: alpha therapy with 223Ra-dichloride. J Nucl Med 2014;55(2):268-274."}, {"number": "11", "stem": "A 67-year-old gentleman presents for the second dose of treatment with Xofigo (radium-223) for metastatic prostate cancer. Which of the following lab values is a contraindication for the second dose administration?", "options": [{"letter": "A", "text": "Hemoglobin 9 g/dL"}, {"letter": "B", "text": "Platelets 40 × 109"}, {"letter": "C", "text": "ANC 1.5 × 109"}, {"letter": "D", "text": "PSA 40 ng/mL"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Xofigo (Radium 223) is used in patients with castrate-resistant prostate cancer and symptomatic bone metastasis without known visceral metastasis. This treatment has been shown to improve life quality by decreasing the pain associated with osseous metastasis and prolonged patient survival. The patients typically receive 1.49 microcurie/kg of Xofigo IV every 4 weeks for a total of 6 cycles. Because of the proximity of the red marrow to the osteogenic cells, patients develop marrow suppression. Nadir in blood counts typically occurs 2 to 3 weeks after the Xofigo administration, and most patients recover approximately 6 to 8 weeks after administration. As such, hematologic evaluation is a prerequisite at baseline and before every dose of Xofigo therapy. Before the first administration of Xofigo, the absolute neutrophil count (ANC) should be ≥1.5 × 109/L, the platelet count ≥100 × 109/L, and hemoglobin ≥10 g/dL. Prior to subsequent administrations, the ANC should be ≥1 × 109/L and the platelet count ≥50 × 109/L. The patients should receive blood transfusion for anemia, but a minimum hemoglobin level is not required for the subsequent treatments. There is no PSA requirement before treatments at any time. Xofigo is not recommended for use in combination with abiraterone acetate plus prednisone/prednisolone due to increased risk of fractures and mortality.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:284-285. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:117. Pandit-Taskar N, Larson SM, Carrasquillo JA. Bone-seeking radiopharmaceuticals for treatment of osseous metastases, part 1: alpha therapy with 223Ra-dichloride. J Nucl Med 2014;55(2):268-274. Xofigo prescribing information: https://hcp.xofigo-us.com/prescribe-xofigo/overview/"}, {"number": "12", "stem": "The following patient presents with fatigue, bone pain, hypoalbuminemia, and renal insufficiency. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Free pertechnetate"}, {"letter": "B", "text": "Metastatic calcification"}, {"letter": "C", "text": "Hypertrophic osteoarthropathy"}, {"letter": "D", "text": "Metastatic lung cancer"}, {"letter": "E", "text": "Nephrogenic systemic fibrosis"}], "images": ["assets/q12_p097_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Delayed anterior and posterior whole-body images demonstrate increased radiopharmaceutical uptake in the periarticular regions. There is soft tissue radiopharmaceutical uptake within the thyroid, lungs, stomach, liver, and kidneys. These findings are most compatible with metastatic calcification. Relative photopenia about the left knee is secondary to arthroplasty. Metastatic calcification is calcium deposition caused by abnormal calcium and phosphate metabolism. Increased serum calcium phosphonate product is believed to result in the soft tissue uptake. Thyroid, lungs, heart, stomach, kidneys, and liver are common sites of involvement. It is typically seen in patients with severe hypercalcemia resulting from chronic renal disease, parathyroid tumor, malignancy (i.e., multiple myeloma), and hypervitaminosis D. While free technetium would demonstrate radiopharmaceutical uptake within the thyroid and stomach, it would not be present in the lungs or liver. The findings seen are not typical for hypertrophic osteoarthropathy, metastatic lung cancer, or nephrogenic systemic fibrosis.\n\nReferences: Imanishi Y, Kishiro M, Miyazaki O, et al. Multiple metastatic calcifications detected by bone scintigraphy and demonstrated by CT. Clin Nucl Med 1992;17(2):114-118. Reitz MD, Vasinrapee P, Mishkin FS. Myocardial, pulmonary, and gastric uptake of technetium-99m MDP in a patient with multiple myeloma and hypercalcemia. Clin Nucl Med 1986;11(10):730."}, {"number": "13", "stem": "A 52-year-old postmenopausal female undergoes a dual x-ray absorptiometry (DEXA) scan that reveals a T-score of −1. Based on this result, which is the most appropriate conclusion?", "options": [{"letter": "A", "text": "Normal"}, {"letter": "B", "text": "Osteopenia"}, {"letter": "C", "text": "Osteoporosis"}, {"letter": "D", "text": "Osteopetrosis"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The primary osteoporosis can be divided into postmenopausal osteoporosis (type I) or senile osteoporosis (type II). According to the World Health Organization, postmenopausal women and men 50 years or older are assigned a diagnosis based on T-score. The World Health Organization defines osteoporosis and osteopenia as follows: normal = T-score at or above −1.0 SD; osteopenia or low bone mass = T-score less than −1 and greater than −2.5 SD; and osteoporosis = T-score at or below −2.5 SD. As such, a T-score of −1 is normal. Z-scores are used in the evaluation of premenopausal women, men younger than 50 years, and children younger than 20 years. In these patients, osteoporosis should not be diagnosed on the basis of densitometric criteria. Instead, a Z-score less than −2 indicates bone mineral density (BMD) below the expected range for age in adults or low density for chronologic age in children. Although the reference standard for the description of osteoporosis is BMD at the femoral neck, other central sites (i.e., lumbar spine, total hip) can be used for diagnosis in clinical practice. Either hip may be used for DEXA of the proximal femur. Lowest level data of the femoral neck or total hip are used for the diagnosis. BMD measurement of the hip bone (neck or total) is optimal for predicting the risk of hip fracture, whereas BMD measurement of the spine is optimal for monitoring response to treatment.\n\nReferences: Baim S, Binkley N, Bilezikian JP, et al. Official Positions of the International Society for Clinical Densitometry and executive summary of the 2007 ISCD Position Development Conference. J Clin Densitom 2008;11(1):75-91. Baim S, Leonard MB, Bianchi ML, et al. Official Positions of the International Society for Clinical Densitometry and executive summary of the 2007 ISCD Pediatric Position Development Conference. J Clin Densitom 2008;11(1):6-21. Kanis JA; on behalf of the World Health Organization Scientific Group. Assessment of osteoporosis at the primary health-care level (WHO Collaborating Centre, UK) Technical Report. University of Sheffield, 2007, 2008. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:281-282."}, {"number": "14", "stem": "The following 3-hour delayed images were acquired after intravenous administration of Tc-99m MDP. Which of the following is most likely associated with this patient?", "options": [{"letter": "A", "text": "End-stage renal disease with exposure to gadolinium-based contrast agents"}, {"letter": "B", "text": "Elevated creatine phosphokinase levels and renal failure"}, {"letter": "C", "text": "Wrong radiopharmaceutical administration"}, {"letter": "D", "text": "Markedly elevated serum calcium levels"}], "images": ["assets/q14_p099_01.jpg", "assets/q14_p100_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The anterior and posterior whole-body images demonstrate intense uptake of radiopharmaceutical within the musculature as well as relatively reduced renal uptake. Mild radiopharmaceutical uptake is visualized within the osseous skeleton, suggesting that the correct radiopharmaceutical was injected. These findings are most compatible with severe rhabdomyolysis. Calcium deposition in damaged myocytes is thought to result in radionuclide deposition when combined with phosphate. In rhabdomyolysis, the amount of radiopharmaceutical uptake within the musculature is proportional to the extent of muscle injury. Bone scintigraphy is invariably positive during the acute phase, with the greatest uptake occurring in the first 24 to 48 hours, which gradually resolves over a week. As such, it provides a good way of estimating the extent of involvement and allows for following recovery. Patients with rhabdomyolysis typically present with myoglobinuria, elevated creatine phosphokinase levels, and renal failure. Patients with nephrogenic systemic fibrosis (end-stage renal disease with exposure to gadolinium-based contrast agents) would demonstrate more heterogeneous muscular uptake accompanied by increased radiopharmaceutical uptake in the skin and superficial soft tissues, which is not seen in this patient. Metastatic calcifications (markedly elevated calcium levels) would have soft tissue uptake in the thyroid, lungs, heart, stomach, liver, and kidneys.\n\nReferences: Habibian MR. Nuclear medicine imaging: a teaching file, 2nd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2009:395-396. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:257. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:107. Answer B. The anterior, posterior, and left lateral delayed scintigraphic images of the tibia and 15 fibula demonstrate a moderate-sized, oval focus of mild to moderately increased activity along the anterolateral aspect of the tibia. On CT scan, there is an oval region of ossification within the musculature of the anterolateral shin with mature peripheral calcifications, characteristic of myositis ossificans. Myositis ossificans, more correctly known as heterotopic ossification, is development of bone in soft tissues such as muscle, tendon, ligaments, or subcutaneous fat. The pathogenesis is felt to be secondary to the metaplasia of pluripotent mesenchymal cells into the osteoblasts. The majority of the cases of focal myositis ossificans/heterotopic bone formation are secondary to direct trauma. Other causes include joint replacement, spinal cord injury, and burn. Postsurgical heterotopic bone formation is commonly visualized around the hip joint. Three-phase bone scintigraphy is the most sensitive modality for the early detection of heterotopic ossification. In acute stages, three- phase bone scintigraphy of heterotopic ossification demonstrates hyperperfusion, increased blood pool, and increased uptake on the delayed images. As the lesion matures, the degree of radiotracer uptake decreases. Heterotopic ossification is differentiated from bone-forming malignancies such as parosteal or periosteal osteosarcoma by the presence of more mature calcifications along its periphery rather than in the center. With osteosarcoma, the bone formation would be more organized and denser centrally and less organized and less dense along the outer edge. Early heterotopic ossification may be intensely FDG avid on PET-CT, and close attention to CT characteristics is paramount in differentiation from tumor recurrence.\n\nReferences: Habibian MR. Nuclear medicine imaging: a teaching file, 2nd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2009:397-398. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:257, 263. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:107, 112."}, {"number": "15", "stem": "What is the most likely diagnosis in this patient with the following bone scintigraphic and CT findings?", "options": [{"letter": "A", "text": "Rhabdomyolysis"}, {"letter": "B", "text": "Myositis ossificans"}, {"letter": "C", "text": "Tibial stress fracture"}, {"letter": "D", "text": "Parosteal osteosarcoma"}, {"letter": "E", "text": "Periosteal osteosarcoma"}], "images": ["assets/q15_p101_01.jpg"], "explanationImages": ["assets/a15_p126_01.jpg"], "answer": "B", "explanation": "Answer B. See source explanation."}, {"number": "16", "stem": "A 29-year athlete presents with bilateral lower extremity pain. Based on the following blood pool and delayed images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Hypertrophic pulmonary osteoarthropathy"}, {"letter": "B", "text": "Metastatic disease"}, {"letter": "C", "text": "Shin splints"}, {"letter": "D", "text": "Stress fractures"}], "images": ["assets/q16_p102_01.jpg", "assets/q16_p102_02.jpg"], "explanationImages": ["assets/a16_p127_01.jpg"], "answer": "C", "explanation": "Answer C. Anterior, and right and left lateral spot view images of the lower extremities demonstrate irregular linear areas of increased activity tracking along the posteromedial and anterolateral aspects of the tibiae bilaterally. The findings are in keeping with shin splints, also known as medial tibial stress syndrome. Three-phase bone scintigraphy is often used to diagnose and differentiate shin splints from tibial stress fractures. Three-phase bone scintigraphy of shin splints demonstrates normal blood flow and normal blood pool with irregular linear areas of increased activity along the one-third or more of the tibial diaphyseal cortex on the delayed images. On the other hand, tibial stress fractures tend to be more focal and fusiform on the delayed images and show increased activity on the blood flow (hyperemia) and blood pool phases (hyperperfusion). Because both shin splints and stress fractures are secondary to abnormal stress on normal bone, such as that from running, they are often seen concomitantly; the image below shows shin splints (arrowheads) accompanied by a stress fracture (arrow). Shin splints is a stress-induced periosteal reaction at the insertion of the soleus and tibialis muscles onto the tibia, which commonly occurs from repetitive long-distance running on hard surfaces. Patients with shin splints usually present with pain on the medial aspect of the tibia, which is aggravated while running and relieved with rest. Radiographs are often unrevealing, and bone scans are diagnostic. Conservative treatment with rest, analgesics, and orthotics are usually sufficient in the management of shin splints. The uptake in hypertrophic pulmonary osteoarthropathy (HPOA) is more intense than that in the shin splints and is not confined to the tibiae. Also, HPOA would be seen in an older population than that of shin splints. The appearance of areas of increased activity seen in this case is not typical for that of metastatic disease, which tends to present as a focal area of increased activity.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:265, 285. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:107. Rupani HD, Holder LE, Espinola DA, et al. Three-phase radionuclide bone imaging in sports medicine. Radiology 1985;156(1):187-196."}, {"number": "17", "stem": "A 36-year-old lady undergoes whole-body bone scintigraphy secondary to diffuse bone pain. Based on the findings, what is the most appropriate next step?", "options": [{"letter": "A", "text": "Chest radiograph"}, {"letter": "B", "text": "Mammogram"}, {"letter": "C", "text": "Lumbar spine radiographs"}, {"letter": "D", "text": "DEXA scan"}, {"letter": "E", "text": "Serum parathyroid hormone level"}], "images": ["assets/q17_p103_01.jpg"], "explanationImages": ["assets/a17_18_p128_01.jpg"], "answer": "B", "explanation": "Answer B. Delayed anterior, and posterior whole-body scintigraphy images demonstrate asymmetrically increased radiopharmaceutical uptake within an enlarged right breast (arrowheads). The findings are highly suspicious for primary breast malignancy. As such, further correlation with mammography should be considered. Increased activity within the left axilla (black arrow) is likely secondary to the combination of physiologic breast uptake and overlap of radiopharmaceutical uptake within the soft tissues. A subsequent contrast-enhanced CT of this patient demonstrated the presence of a large necrotic mass within the right breast (asterisk). The contour abnormality of the bladder seen on the anterior images was secondary to an enlarged uterus from leiomyomata (#). Differential considerations of increased breast activity on bone scintigraphy include mastitis and trauma.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:257. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:83."}, {"number": "18", "stem": "What is the most likely diagnosis in this 2-year-old with the following bone scintigraphy?", "options": [{"letter": "A", "text": "Nonaccidental trauma"}, {"letter": "B", "text": "Rhabdomyosarcoma"}, {"letter": "C", "text": "Fibrous dysplasia"}, {"letter": "D", "text": "Wilms tumor"}, {"letter": "E", "text": "Neuroblastoma"}, {"letter": "F", "text": "Paget disease"}], "images": ["assets/q18_p104_01.jpg"], "explanationImages": ["assets/a17_18_p128_01.jpg"], "answer": "E", "explanation": "Answer E. The supplied anterior and posterior delayed whole-body images and spot views of the skull demonstrate increased activity within the skull base and periorbital regions as well as diffusely increased marrow activity within the axial and appendicular skeleton suspicious for bone marrow involvement. A large mass with intense activity is present within the right upper quadrant. The findings are most compatible with neuroblastoma with diffuse marrow involvement. Because they contain microcalcifications, approximately 30% to 50% of primary neuroblastomata demonstrate avidity on bone scintigraphy. The findings seen are not typical of nonaccidental trauma, fibrous dysplasia, or Paget disease. Soft tissue lesions of Wilms tumor and rhabdomyosarcoma are not typically avid on bone scintigraphy. I-123 metaiodobenzylguanidine (MIBG) scan is more sensitive than bone scintigraphy for the evaluation of neuroblastoma metastasis. The combination of both MIBG and bone scintigraphy gives the highest sensitivity. Since there is no physiologic activity of MIBG in the osseous skeleton, any abnormal osseous uptake should be presumed to be metastatic. The osseous involvement is easier to appreciate on the MIBG scan from the same child shown below. Since early metastasis typically involves physeal and metaphyseal regions, it is difficult to diagnose on bone scan owing to normal intense activity in the growth plates. A subtle increase in metaphyseal activity is often the only clue for marrow involvement on the bone scan.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:251, 260. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:94."}, {"number": "19", "stem": "Based on the imaging findings shown below, what is the most likely etiology of this patient's lower back pain?", "options": [{"letter": "A", "text": "Primary bone malignancy"}, {"letter": "B", "text": "Osteoporosis"}, {"letter": "C", "text": "Metastatic disease"}, {"letter": "D", "text": "Benign metabolic bone disease"}], "images": ["assets/q19_p105_01.jpg", "assets/q19_p106_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The anterior and posterior delayed whole-body bone scintigraphy images demonstrate the presence of intense uptake in bilateral sacral alae forming two vertical lines with a joining intense horizontal line of uptake extending across the sacral body. This so-called H pattern or \"Honda\" sign is characteristic of sacral insufficiency fracture (SIF). However, this pattern of radiopharmaceutical uptake is seen in only 20% to 40% of patients with SIF. Sacral insufficiency fractures are a type of stress fractures that are the result of normal stresses on abnormal bone. SIF is most frequently seen in the setting of osteoporosis. Long-term bisphosphonate use has also been associated with insufficiency fractures. Bone scintigraphy and MR imaging are the most sensitive examinations and can be diagnostic of SIFs in the right clinical settings. Bone scintigraphy has a reported sensitivity of 96% and a positive predictive value of 92% for the detection of SIFs. However, correlation with the patient's presentation is essential as occasionally metastatic disease to the sacrum may mimic insufficiency fractures.\n\nReferences: Fujii M, Abe K, Hayashi K, et al. Honda sign and variants in patients suspected of having a sacral insufficiency fracture. Clin Nucl Med 2005;30(3):165-169. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:257, 266. Ries T. Detection of osteoporotic sacral fractures with radionuclides. Radiology 1983;146(3):783-785."}, {"number": "20", "stem": "Which FDA-approved bone targeting radiopharmaceutical used in the treatment of refractory painful metastasis can also provide images similar to bone scintigraphy?", "options": [{"letter": "A", "text": "Radium-223 chloride"}, {"letter": "B", "text": "Strontium-89 chloride"}, {"letter": "C", "text": "Phosphorus-32 sodium orthophosphate"}, {"letter": "D", "text": "Samarium-153 EDTMP"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Samarium-153 EDTMP emits a beta particle with a maximum energy of 0.81 MeV and a 28% abundant gamma emission with a photopeak of 0.103 MeV. This gamma emission allows for imaging, which can be usually done at 6 hours after administration. Strontium-89 is a calcium- mimetic agent that accumulates in the areas of increased bone turnover. Unlike radium-223, it is a beta-emitting agent with a maximum tissue range of 7.2 mm. It is primarily excreted through urine. Like Sr-89, bone marrow toxicity is common with Ra-223 and Sm-153 EDTMP. These agents have been used in patients with metabolically active metastases from breast cancer, prostate cancer, and osteogenic sarcoma.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:284. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:117. Pandit-Taskar N, Larson SM, Carrasquillo JA. Bone-seeking radiopharmaceuticals for treatment of osseous metastases, part 1: alpha therapy with 223Ra-dichloride. J Nucl Med 2014;55(2):268-274."}, {"number": "21", "stem": "A 58-year-old male underwent the following dual x-ray absorptiometry scan for the evaluation of bone mineral density. Which of the following statements is most accurate?", "options": [{"letter": "A", "text": "The patient should be initiated on bisphosphonate therapy."}, {"letter": "B", "text": "No therapy is necessary; a follow-up is recommended in 1 year."}, {"letter": "C", "text": "No therapy is necessary; a follow-up is recommended in 3 years."}, {"letter": "D", "text": "No therapy is necessary; correlation with radiograph should be considered."}, {"letter": "E", "text": "No therapy or follow-up is necessary."}, {"letter": "F", "text": "The patient should be initiated on calcium and vitamin D."}], "images": ["assets/q21_p107_01.jpg", "assets/q21_p107_02.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The PA lumbar spine and bilateral hip DEXA images demonstrate diffusely increased bone mineral density. Close attention to the images reveals heterogeneously distributed areas of increased bone mineral density, which are highly suspicious for osseous metastasis. As such, correlation with either radiograph or PSA levels should be considered. Other causes of increased bone mineral density include renal osteodystrophy, hypervitaminosis D, lymphoma, and leukemia.\n\nReferences: Lorente-Ramos R, Azpeitia-Armán J, Muñoz-Hernández A, et al. Dual-energy x-ray absorptiometry in the diagnosis of osteoporosis: a practical guide. Am J Roentgenol 2011;196(4):897-904."}, {"number": "22", "stem": "A 22-year-old female with a clinical history of a prior car accident presents with continuing pain in the right lower extremity. Based on the following three-phase bone scintigraphy images, which of the following is the most likely diagnosis?", "options": [{"letter": "A", "text": "Right lower extremity deep venous thrombosis"}, {"letter": "B", "text": "Right lower extremity cellulitis"}, {"letter": "C", "text": "Right lower extremity complex regional pain syndrome"}, {"letter": "D", "text": "Right lower extremity Charcot arthropathy"}], "images": ["assets/q22_p108_01.jpg"], "explanationImages": ["assets/a22_p130_01.jpg"], "answer": "C", "explanation": "Answer C. The radionuclide angiographic images demonstrate markedly increased blood flow through the right anterior and posterior tibial arteries. The blood pool images demonstrate marked hyperperfusion throughout the visualized right lower extremity. On the delayed images, increased activity is seen in periarticular distribution within the right ankle, hindfoot, and midfoot. These findings are classic for complex regional pain syndrome or reflex sympathetic dystrophy. The image below is from a different patient with a left-hand involvement. Scintigraphic findings are variable and depend on the stage of the disease. This classic pattern is seen in <50% of the patients but has the highest diagnostic accuracy. Later in the course of the disease, the blood flow may be normal or decreased in the affected limb. Periarticular increase in uptake on the delayed images is the most sensitive finding (>95%) but has lower specificity as it can be seen with arthritis or infection. Charcot arthropathy would demonstrate regional hyperemia and hyperperfusion, but diffuse involvement, such as in this case, would be atypical. Similarly, diffuse involvement by cellulitis with increased periarticular uptake would be atypical; also, the patient's history is atypical for cellulitis.\n\nReferences: Fournier RS, Holder LE. Reflex sympathetic dystrophy: diagnostic controversies. Semin Nucl Med 1998;28(1):116-123. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:278."}, {"number": "23", "stem": "Based on the findings on the following whole-body bone scan, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Port infection"}, {"letter": "B", "text": "Sickle cell anemia"}, {"letter": "C", "text": "Renal obstruction"}, {"letter": "D", "text": "Adrenal metastasis"}], "images": ["assets/q23_p109_01.jpg"], "explanationImages": ["assets/a23_p131_01.jpg"], "answer": "B", "explanation": "Answer B. Anterior and posterior delayed whole-body bone images demonstrate enlarged kidneys with diffusely increased uptake within the renal cortex. A small focus of moderate activity in the left upper quadrant above the left kidney on the posterior images corresponds to activity in the atrophic spleen (arrow on the image below). Also, mild heterogeneity of radiotracer is seen in the long bones, related to prior infarcts. Photopenia about the right hip is secondary to prior hip arthroplasty. The constellation of these findings is typically seen with sickle cell anemia. Uptake superior to the left kidney is related to infarcted splenic uptake and not related to adrenal metastasis. The port was used for injection of the radiotracer, explaining the uptake in the associated vascular territory. Port infection alone would not have uptake on a bone scan.\n\nReferences: Cerci SS, Suslu H, Cerci C, et al. Different findings in Tc-99m MDP bone scintigraphy of patients with sickle cell disease: report of three cases. Ann Nucl Med 2007;21(5):311-314."}, {"number": "24", "stem": "Which of the following is an advantage of F-18 sodium fluoride PET/CT scan over the whole- body bone scan?", "options": [{"letter": "A", "text": "Shorter uptake time"}, {"letter": "B", "text": "Decreased radiation dose"}, {"letter": "C", "text": "Increased sensitivity for lesions in the extremities"}, {"letter": "D", "text": "Lack of uptake in degenerative changes"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Desirable characteristics of F-18 sodium fluoride (NaF) PET/CT include shorter uptake time (secondary to rapid bone uptake and very rapid blood clearance), better sensitivity, and better specificity. F-18 NaF PET scan is better than Tc-99m MDP in spatial and anatomical resolution. However, F-18 NaF PET is more expensive and delivers more radiation dose to the patient (~7 times compared to that of Tc 99m MDP). NaF PET/CT scans are performed 45 to 60 minutes after the intravenous injection of the agent, while bone scans are typically performed approximately 3 hours postinjection. Compared to the whole-body bone scan, NaF PET scans have increased sensitivity for the detection of lesions within the axial skeleton, while sensitivity to lesions within the extremity is comparable. Both NaF PET scans and planar bone scans demonstrate uptake in degenerative changes and fractures.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 6th ed. Philadelphia, PA: Saunders, 2012:272,273. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:243-244. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:78-80. Schirrmeister H, et al. Early detection and accurate description of extent of metastatic bone disease in breast cancer with fluoride ion and positron emission tomography. J Clin Oncol 1999;17:2381-2389. Schirrmeister H, et al. Sensitivity in detecting osseous lesions depends on anatomic localization: planar bone scintigraphy versus 18F PET. J Nucl Med 1999;40:1623-1629. Schirrmeister H, et al. Prospective evaluation of the clinical value of planar bone scans, SPECT, and 18F-labeled NaF PET in newly diagnosed lung cancer. J Nucl Med 2001;42:1800-1804. Segall GM. PET/CT with sodium 18F-fluoride for management of patients with prostate cancer. J Nucl Med 2014;55(4):531-533."}, {"number": "25", "stem": "Which of the following is the most likely diagnosis in the following 58-year-old patient who presents for evaluation of metastatic prostate cancer with bone scintigraphy?", "options": [{"letter": "A", "text": "SVC obstruction"}, {"letter": "B", "text": "IVC obstruction"}, {"letter": "C", "text": "Cellulitis"}, {"letter": "D", "text": "Rhabdomyolysis"}], "images": ["assets/q25_p111_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Anterior and posterior delayed whole-body images demonstrate foci of markedly increased activity including right scapula, left acetabulum, and left femoral head in keeping with prostate cancer metastases. Additionally, there is diffusely increased soft tissue retention of the radiotracer below the thorax with normal soft tissue clearance above that level. This finding is likely secondary to soft tissue edema and decreased tracer clearance from an inferior vena cava (IVC) obstruction. This appearance on bone scan is also referred to as the \"Wader sign\" as it resembles a pair of fisherman's waders. When present, a CT scan of the abdomen and pelvis should be obtained to ascertain the cause of IVC obstruction. This patient had IVC obstruction secondary to retroperitoneal lymphadenopathy. In superior vena caval obstruction, the distribution would be reversed with increased radiotracer retention in the soft tissues of the head and neck, upper extremities, and thorax. Cellulitis is unlikely to give this pattern of distribution. Rhabdomyolysis presents with increased uptake in the involved skeletal muscles and not in the soft tissues.\n\nReferences: Chu YK, Hu LH. Waders sign on bone scan: a manifestation of portal hypertension. Clin Nucl Med 2012;37(4):385-386. Rodman DJ, Atkinson LK, Maxwell DD, et al. Bone scan in inferior vena cava obstruction. Clin Nucl Med 1990;15(10):740-741."}, {"number": "26", "stem": "The following bone scintigraphy was done on a 75-year-old female with a history of breast cancer. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Osseous metastasis"}, {"letter": "B", "text": "Renal cell carcinoma"}, {"letter": "C", "text": "Periodontal disease"}, {"letter": "D", "text": "Osteonecrosis"}], "images": ["assets/q26_p113_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Anterior and posterior whole-body bone scan images demonstrate intense radiotracer uptake in the body of the mandible, which extends to involve the left mandibular ramus. The extent and degree of abnormal activity are highly suspicious for osteonecrosis of the mandible. Patients who receive bisphosphonate therapy to reduce the risk of pathologic fractures are often at the risk of developing osteonecrosis. Bone scintigraphy is highly sensitive and can detect early cases of osteonecrosis, which can be missed on conventional imaging secondary to the subtle nature of findings in the early stages. The typical appearance of an area of photopenia surrounded by increased activity is a rare finding in cases of jaw osteonecrosis, and diffusely increased activity is more common. Osteonecrosis of the jaw can be seen with dental extraction, after radiation, or with drugs such as steroids and bisphosphonate. While periodontal disease can have increased uptake in the mandible, it tends to be more focal, surrounding the tooth involved, and not diffuse, as shown in this image. Asymmetric uptake in the left pelvicalyceal system is suggestive of left- sided hydronephrosis, which can be related to any obstructive causes such as renal stone (in most of the cases) or underlying obstructive lesion. Further workup should be obtained with a diagnostic CT or ultrasound. There are no areas of reduced radioactivity in the kidneys to suggest a space-occupying mass indicative of renal cell carcinoma. Asymmetrically increased uptake in the left breast is related to the known breast cancer.\n\nReferences: Dore F, Filippi L, Biasotto M, et al. Bone scintigraphy and SPECT CT of bisphosphonate induced osteonecrosis of the jaw. J Nucl Med 2009;50:30-35. Morag Y, Morag-Hezroni M, Jamadar D, et al. Bisphosphonaterelated osteonecrosis of the jaw: a pictorial review. RadioGraphics 2009;29:1971-1986."}, {"number": "27", "stem": "A 73-year-old male who is status post partial glossectomy with segmental mandibulectomy and left radial forearm free flap undergoes a three-phase bone scan. Based on the supplied anterior blood flow, blood pool, delayed planar, and axial SPECT images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Osteonecrosis"}, {"letter": "B", "text": "Osteomyelitis"}, {"letter": "C", "text": "Viable flap"}, {"letter": "D", "text": "Nonviable flap"}], "images": ["assets/q27_p114_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Blood flow, blood pool, and delayed images demonstrate an area of absent radiotracer uptake in the mandible, which is better seen on the SPECT image. The finding is in keeping with a nonviable flap. Osteocutaneous flaps are commonly used for the reconstruction of bone defects after oncologic surgery. The success of surgery depends on the viability of the bone flap, and the bone scan is often used to evaluate the viability of the flap. Absent uptake in the flap is suggestive of a nonviable flap, while a viable flap would show uptake on all three phases. Osteomyelitis and osteonecrosis would show increased uptake.\n\nReferences: Srivastava MK, Penumadu P, Kumar D, et al. Role of (99m) Tc-methylene diphosphonate bone scan in the evaluation of the viability of the bone flap in mandibular reconstruction in patients with oromaxillofacial malignancies. Indian J Nucl Med 2015;30(3):280-282. A. Biopsy of the largest pulmonary nodule B. Initiation of chemotherapy C. Initiation of antibiotic therapy D. CT of the head and neck"}, {"number": "28", "stem": "Where does Tc-99m MDP localize within the bone?", "options": [{"letter": "A", "text": "Osteoblast"}, {"letter": "B", "text": "Osteoclast"}, {"letter": "C", "text": "Osteoid matrix"}, {"letter": "D", "text": "Calcium hydroxyapatite"}], "images": [], "explanationImages": ["assets/a28_29_p144_01.jpg"], "answer": "D", "explanation": "Answer D. Bone composition can be divided into mineralized and unmineralized portions. The mineralized portion of the bone is composed of two-thirds crystalline hydroxyapatite and one- third noncrystalline calcium phosphate. Derivatives of bisphosphonates such as Tc-99m MDP and Tc-99m HDP, as well as F-18 NaF, localize within the hydroxyapatite portion of the bony matrix by chemical adsorption (chemisorption) and differences in regional perfusion; extraosseous uptake of these radiopharmaceuticals such as that in myositis ossificans may occur in the calcium phosphate portion of the matrix. Radiochemicals such as P-32 mainly localize within the noncrystalline calcium phosphate portion of the bony matrix. The unmineralized portion of the bone is composed of osteoid (the organic portion of the bone matrix that forms prior to maturation of bone tissue, i.e., collagen, etc.) and cellular components such as osteoblast, osteoclast, and marrow.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:243-244. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:75-76."}, {"number": "29", "stem": "Injection of excessive air into the mixing vial during the preparation of Tc-99m MDP will result in radiopharmaceutical localization in which of the following organs?", "options": [{"letter": "A", "text": "Brain"}, {"letter": "B", "text": "Stomach"}, {"letter": "C", "text": "Lungs"}, {"letter": "D", "text": "Liver"}], "images": [], "explanationImages": ["assets/a28_29_p144_01.jpg"], "answer": "B", "explanation": "Answer B. Excessive air in the mixing vial will result in the oxidation of tin from stannous ion (Sn II) to stannous hydroxide (Sn IV). This will cause poor tagging of the radiopharmaceutical and will result in excessive free pertechnetate. Free pertechnetate can also be visualized if the radiopharmaceutical injection is delayed for more than 4 hours after its preparation. Free pertechnetate localizes within the salivary glands, thyroid gland, and stomach and increases the background soft tissue activity. As such, quality control with chromatography should be routinely performed before the injection of the radiopharmaceutical to ensure >95% binding.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:243-244. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:75-76."}, {"number": "30", "stem": "A \"four-phase bone scintigraphy\" typically involves additional imaging at what time point?", "options": [{"letter": "A", "text": "2 to 3 hours"}, {"letter": "B", "text": "4 to 10 hours"}, {"letter": "C", "text": "6 to 12 hours"}, {"letter": "D", "text": "18 to 24 hours"}, {"letter": "E", "text": "22 to 28 hours"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Sometimes, 18- to 24-hour images are performed after intravenous administration of Tc-99m-labeled bisphosphonate in a patient with renal failure or in a patient who has poor soft tissue clearance. This is termed the fourth phase. In a \"three-phase\" study, the images are acquired during an angiogram phase (first), soft tissue perfusion/blood pool phase (second) and delayed 2- to 3-hour phase (third). Three-phase imaging is typically utilized in differentiating osteomyelitis from cellulitis or soft tissue infection. It is also positive in fracture or malignancy. Other indications for three-phase bone scintigraphy include evaluation of painful joint prosthesis and complex regional pain syndrome (reflex sympathetic dystrophy).\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:24-245. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:78."}, {"number": "31", "stem": "Which of the following primary osseous lesions usually demonstrates normal activity on bone scintigraphy?", "options": [{"letter": "A", "text": "Osteoblastoma"}, {"letter": "B", "text": "Osteoid osteoma"}, {"letter": "C", "text": "Fibrous dysplasia"}, {"letter": "D", "text": "Giant cell tumor"}, {"letter": "E", "text": "Cortical desmoid"}], "images": [], "explanationImages": [], "answer": "E", "explanation": "Answer E. Osteoblastomas, osteoid osteoma, fibrous dysplasia, and giant cell tumors usually demonstrate intense activity on delayed bone scintigraphy. Chondroblastomas may demonstrate moderate or intense activity. Enchondromas can demonstrate mild to moderate activity. Fibrous cortical defects and nonossifying fibromas typically demonstrate normal or mild uptake. Cortical desmoid tumors, bone island, and hemangioma usually demonstrate normal activity on the bone scan. It is important to recognize that benign primary bone neoplasms may demonstrate abnormal uptake as they are usually incidentally found on the bone scintigraphy. The specific diagnosis of benign primary bone tumors is usually dependent on their radiographic appearance.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:253-254."}, {"number": "32", "stem": "A 65-year-old male with newly diagnosed high-risk prostate cancer (Gleason score 7 + 8) presents for initial staging with bone scintigraphy. The patient denies any history of pain and denies a history of recent or remote trauma. Based on the supplied images, what is the most appropriate next step?", "options": [{"letter": "A", "text": "Correlation with PSA level"}, {"letter": "B", "text": "Correlation with chest x-ray"}, {"letter": "C", "text": "Correlation with CT"}, {"letter": "D", "text": "Correlation with MRI"}], "images": ["assets/q32_p135_01.jpg"], "explanationImages": ["assets/a32_p146_01.jpg"], "answer": "C", "explanation": "Answer C. A single focus of intense radiopharmaceutical uptake is noted within the left seventh rib. An isolated rib lesion is rarely attributable to metastasis (according to Wang and Shen, only 1.2%). However, in the absence of any clinical history of recent or remote trauma, further correlation with additional imaging should be considered. CT scan would be the most appropriate test to characterize this lesion. Chest x-rays are not sensitive in the evaluation of suspected rib metastasis. While serum PSA may or may not be elevated, it will not be able to answer the cause of abnormal rib uptake. Correlation with this patient's CT scan of the abdomen and pelvis done earlier on the same day demonstrated the presence of a sclerotic lesion within the anterolateral aspect of the left seventh rib (arrow below). The absence of callus formation, lack of cortical discontinuation, or lack of history of trauma suggested that this was less likely to be a sequela of fracture. Since it was the only site of involvement, this was later biopsied and confirmed to be metastatic prostate cancer. A positive finding on bone scintigraphy is nonspecific and may represent a sequela of malignancy, trauma, or infection. Careful correlation with clinical history and appropriate anatomic imaging is crucial for an accurate diagnosis. Of note, a typical rib metastasis is oblong and tracks along the rib as seen in a bone scan from a different patient below. Fractures are typically seen as vertically aligned foci of increased uptake in several successive ribs. In diagnosing metastatic disease to the ribs, it is important to recognize scintigraphic pattern suggestive of metastasis: 1. Location: Generally, first and second rib uptake is most likely from malignancy rather than trauma as the fracture of the first two ribs requires massive trauma like a major accident, etc. 2. Number: Two foci of abnormal uptake in the same rib are least likely related to trauma. 3. Shape: Elongated uptake in the rib is most likely to suggest malignancy.\n\nReferences: Wang C, Shen Y. Study on the distribution features of bone metastases in prostate cancer. Nucl Med Commun 2012;33(4):379-383."}, {"number": "33", "stem": "The following bone scan is from a 76-year-old male with castration-resistant prostate cancer and rising PSA. What is the most likely explanation for the findings in the skull?", "options": [{"letter": "A", "text": "Metastasis"}, {"letter": "B", "text": "Meningioma"}, {"letter": "C", "text": "Paget disease"}, {"letter": "D", "text": "Fibrous dysplasia"}, {"letter": "E", "text": "Hyperostosis frontalis"}], "images": ["assets/q33_p136_01.jpg", "assets/q33_p137_01.jpg", "assets/q33_p138_01.jpg"], "explanationImages": ["assets/a33_p147_01.jpg"], "answer": "E", "explanation": "Answer E. Delayed anterior, and posterior whole-body images demonstrate increased uptake in the head, which localizes to the frontal bone on the lateral spot views. Single axial CT scan demonstrates symmetric overgrowth of the inner table of frontal bones. These findings are most compatible with hyperostosis frontalis. This is a benign process and should not be confused with malignancy. Paget disease would be evidenced by focal lysis (osteoporosis circumscripta) during the lytic phase or sclerotic diploic expansion, and thickened cortices during mixed/blastic phase with an appearance likened to \"cotton wool.\" Metastasis or \"en plaque\" meningioma-related hyperostosis would not be symmetric. Fibrous dysplasia would be seen in the younger population and would demonstrate medullary expansion with a \"ground-glass\" matrix on a CT scan. While this case was in a man, hyperostosis frontalis is far more common in women.\n\nReferences: Novetsky GJ, Berlin L. Bone scintigraphy in hyperostosis frontalis interna. Clin Nucl Med 1982;7(6):265-266."}, {"number": "34", "stem": "The following 65-year-old female presents with bilateral feet pain. Based on the three-phase scintigraphy images of the feet, what is your conclusion?", "options": [{"letter": "A", "text": "Complex regional pain syndrome"}, {"letter": "B", "text": "Multifocal osteomyelitis"}, {"letter": "C", "text": "Insufficiency fractures"}, {"letter": "D", "text": "Plantar fasciitis"}, {"letter": "E", "text": "Normal study"}, {"letter": "F", "text": "Cellulitis"}], "images": ["assets/q34_p139_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The anterior blood flow and blood pool images show focal areas of hyperemia and hyperperfusion in the region of the right distal second and left distal third metatarsals. Delayed images show further localization of the radiopharmaceutical in those locations. These findings are most compatible with multiple acute fractures. Given that there is no history of trauma, they likely represent insufficiency fractures related to osteopenia or alendronate-induced pathologic metatarsal fractures. Insufficiency fractures are secondary to normal stress on the abnormal bone, while fatigue stress fractures are a result of abnormal stress on a normal bone. Focally increased activity in the left first metatarsophalangeal joint on the delayed image is consistent with osteoarthritis. Plantar fasciitis would demonstrate increased activity at the insertion of the plantar fascia along the anterior inferior calcaneus. Complex regional pain syndrome would demonstrate increased blood flow and blood pool to the affected extremity with increased periarticular radiotracer uptake on the delayed phase. Cellulitis would only be positive on the first two phases, and uptake associated with osteomyelitis would be less focal.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:278."}, {"number": "35", "stem": "Which of the following studies or combination of studies is most appropriate in the evaluation of a suspected hip joint replacement infection?", "options": [{"letter": "A", "text": "Three-phase bone scintigraphy"}, {"letter": "B", "text": "Labeled leukocyte imaging alone"}, {"letter": "C", "text": "Three-phase bone scintigraphy and sulfur colloid marrow imaging"}, {"letter": "D", "text": "Labeled leukocyte and sulfur colloid marrow imaging"}, {"letter": "E", "text": "F-18 FDG-PET/CT"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Radionuclide imaging is currently the imaging method of choice for evaluation of suspected joint replacement infection, and combined labeled leukocyte-marrow imaging is the radionuclide study of choice. It has an accuracy of about 90% for diagnosing prosthetic joint infection. In contrast, according to a meta-analysis by Kwee et al., FDG-PET has pooled sensitivity of 87% and specificity of 82% for diagnosing lower extremity prosthetic joint infection. Both WBCs and sulfur colloid accumulate in bone marrow regardless of location. On the other hand, WBCs accumulate in infection, but sulfur colloid does not. As such, when there is incongruent increase in periprosthetic leukocyte accumulation without a corresponding increase in marrow activity on colloid imaging, the study is positive for infection. When there is a congruent increase in activity on leukocyte and colloid imaging, the findings likely represent marrow expansion/compaction, and infection is unlikely.\n\nReferences: Kwee TC, Kwee RM, Alavi A. FDG-PET for diagnosing prosthetic joint infection: systematic review and metaanalysis. Eur J Nucl Med Mol Imaging 2008;35(11):2122-2132. Love C, Marwin SE, Palestro CJ. Nuclear medicine and the infected joint replacement. Semin Nucl Med 2009;39(1):66-78."}, {"number": "36", "stem": "Which of the following malignancies is LEAST likely to present as a photopenic lesion or \"cold\" defect on Tc-99m MDP bone scintigraphy?", "options": [{"letter": "A", "text": "Lymphoma"}, {"letter": "B", "text": "Multiple myeloma"}, {"letter": "C", "text": "Metastatic breast carcinoma"}, {"letter": "D", "text": "Metastatic thyroid carcinoma"}, {"letter": "E", "text": "Metastatic renal cell carcinoma"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Since purely lytic lesions do not demonstrate any increase in bony turnover, they may present as photopenic lesions or \"cold\" defects on bone scintigraphy. As such, sensitivity of bone scintigraphy to detect these lesions is poor. Lesions with purely lytic osseous involvement include multiple myeloma, metastatic renal cell carcinoma, and metastatic thyroid carcinoma. Marrow involvement by lymphoma may also result in the \"cold\" defects. Of the supplied options, breast cancer is the least likely malignancy to present as a photopenic defect on bone scintigraphy. While statistically, cold bone metastases are most often due to breast carcinoma, they are commonly accompanied by blastic lesions. FDG-PET is more sensitive in detecting the lytic lesions, while bone scintigraphy is more sensitive in detecting the blastic lesions. Nonmalignant causes of \"cold\" lesions include infarction (sickle cell anemia) and avascular necrosis. Changes associated with radiation therapy would result in decreased radiotracer uptake in multiple adjacent bones. This is secondary to a combination of microvascular injury resulting in decreased delivery of the radiotracer, injury to the osteoclast/osteoblast resulting in a decreased bony turnover, and fatty replacement of the bone marrow.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:250-251. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:88,92."}, {"number": "37", "stem": "What is the most likely cause of increased liver uptake on Tc-99m MDP bone scintigraphy in a patient with a history of colon cancer?", "options": [{"letter": "A", "text": "Common bile duct obstruction"}, {"letter": "B", "text": "Introduction of air into the mixing vial during preparation"}, {"letter": "C", "text": "Hepatic cirrhosis"}, {"l
