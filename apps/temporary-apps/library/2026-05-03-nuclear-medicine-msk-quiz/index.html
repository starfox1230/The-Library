etter": "D", "text": "Hepatic metastases"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Liver should not be visualized on normal bone scintigraphy. The differential considerations for liver uptake on bone scintigraphy include hepatic metastases, hepatic necrosis, amyloidosis, metastatic calcifications, and excessive aluminum breakthrough from the generator. In a patient with a clinical history of colon cancer, abnormal liver uptake on bone scintigraphy is highly suspicious for liver metastases. Metastasis from other mucin-producing tumors from breast and ovarian primaries, lung cancer, lymphoma, and neuroblastoma may also demonstrate increased liver uptake on bone scan. The introduction of air into the mixing vial during preparation would result in free pertechnetate and cause visualization of the thyroid gland and stomach. No abnormal hepatic uptake would be seen in cirrhosis or common bile duct obstruction.\n\nReferences: MacDonald J. Idiopathic hepatic uptake of 99mTc methylene diphosphonate: a case report. J Nucl Med Technol 2001;29(1):32-36. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:83,88."}, {"number": "38", "stem": "The following 3-hour delayed posterior whole-body Tc-99m MDP images are from a 65-year-old male with a clinical history of malignancy. Which of the following is the LEAST likely cause of increased renal uptake?", "options": [{"letter": "A", "text": "Iron overload"}, {"letter": "B", "text": "Hypercalcemia"}, {"letter": "C", "text": "Sickle cell disease"}, {"letter": "D", "text": "Acute tubular necrosis"}, {"letter": "E", "text": "High-grade bilateral obstruction"}, {"letter": "F", "text": "Chemotherapy-induced nephrotoxicity"}], "images": ["assets/q38_p140_01.jpg", "assets/q38_p141_01.jpg"], "explanationImages": [], "answer": "E", "explanation": "Answer E. Renal uptake is abnormally increased on bone scintigraphy if the degree of radionuclide uptake is greater than that of the lumbar spine on the posterior projection. While rare (~1%), it is important to know the etiologies of abnormally increased renal radiopharmaceutical uptake. It is commonly secondary to chemotherapy-induced nephrotoxicity and acute tubular necrosis; local tissue damage or necrosis with resultant excess in tissue calcium is felt to be the cause of increased renal uptake of bone agents in these cases. Elevated calcium phosphate product is likely the cause of increased renal uptake of bone agents in hyperparathyroidism and hypercalcemia. Iron overload is another etiology of increased renal uptake; increased iron alters the biodistribution of bone agents by converting them into the renal agent and results in increased renal uptake. This mechanism is probably implicated in sickle cell anemia and thalassemia. While high-grade bilateral renal obstruction may demonstrate increased renal uptake, the presence of activity in the bladder and normal soft tissue background makes this the least likely possibility. In the setting of high-grade bilateral obstruction, one would expect to see markedly increased soft tissue background at 3 hours due to lack of renal excretion as well as decreased or absent bladder activity from lack of urine within it.\n\nReferences: http://skeletalscintigraphy.com/content/increased-renal-uptake O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:87. Watanabe N, Shimizu M, Kageyama M, et al. Diffuse increased renal uptake on bone scintigraphy in acute tubular necrosis. Clin Nucl Med 1994;19(1):19-21."}, {"number": "39", "stem": "How do F-18 sodium fluoride PET/CT scans compare to the Tc-99m MDP bone scans?", "options": [{"letter": "A", "text": "Sodium fluoride PET/CT scans have decreased sensitivity."}, {"letter": "B", "text": "Sodium fluoride PET/CT scans have decreased specificity."}, {"letter": "C", "text": "Sodium fluoride PET/CT scans have decreased scan time."}, {"letter": "D", "text": "Sodium fluoride PET/CT scans have decreased resolution."}, {"letter": "E", "text": "Sodium fluoride PET/CT scans have decreased radiation."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Desirable characteristics of F-18 sodium fluoride (NaF) PET include decreased uptake time (secondary to rapid bone uptake and very rapid blood clearance), better sensitivity, and better specificity. F-18 NaF PET scan is better than Tc-99m MDP in spatial and anatomical resolution. However, F-18 NaF PET is more expensive and delivers more radiation dose to the patient (~7 times compared to that of Tc 99m MDP). It is currently uncertain if there is a significant impact on intended management by doing F-18 NaF PET/CT compared to the bone scintigraphy.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:243-244. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:78-80. Segall GM. PET/CT with sodium 18F-fluoride for management of patients with prostate cancer. J Nucl Med 2014;55(4):531-533."}, {"number": "40", "stem": "Based on the following Tc-99m MDP scintigraphy, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Lung cancer"}, {"letter": "B", "text": "Prostate cancer"}, {"letter": "C", "text": "Colon cancer"}, {"letter": "D", "text": "Normal"}, {"letter": "E", "text": "Renal cell carcinoma"}], "images": ["assets/q40_42_p142_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Delayed posterior whole-body image demonstrates diffusely increased activity within the left hemithorax. No focal areas of abnormally increased or decreased activity are noted within the osseous skeleton. The findings likely reflect malignant pleural effusion. Malignant pleural effusions and malignant ascites may demonstrate increased radiotracer uptake on bone scintigraphy. The mechanism by which this occurs is not well understood. The most common malignancies with Tc-99m MDP uptake in pleural effusions include lung and breast carcinoma. Malignancies causing increased Tc-99m MDP uptake in malignant ascites include colon cancer, hepatocellular carcinoma, and ovarian carcinoma.\n\nReferences: Cole TJ, Balseiro J, Lippman HR. Technetium-99m-methylene diphosphonate (MDP) uptake in a sympathetic effusion: an index of malignancy and a review of the literature. J Nucl Med 1991;32(2):325-327."}, {"number": "41", "stem": "What particle emission is responsible for the relief of painful osseous metastasis in a patient treated with strontium-89 chloride?", "options": [{"letter": "A", "text": "Alpha"}, {"letter": "B", "text": "Beta"}, {"letter": "C", "text": "Gamma"}, {"letter": "D", "text": "Positron"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Strontium-89 is a calcium-mimetic agent that accumulates in the areas of increased bone turnover. Unlike radium-223, it is a beta-emitting agent with a maximum tissue range of 7.2 mm. It is primarily excreted through urine.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:283-284. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:117-118. Pandit-Taskar N, Larson SM, Carrasquillo JA. Bone-seeking radiopharmaceuticals for treatment of osseous metastases, part 1: alpha therapy with 223Ra-dichloride. J Nucl Med 2014;55(2):268-274."}, {"number": "42", "stem": "Which one of the following options best represents the findings on three-phase bone scintigraphy in a patient with shin splints?", "options": [{"letter": "A", "text": "Image A"}, {"letter": "B", "text": "Image B"}, {"letter": "C", "text": "Image C"}, {"letter": "D", "text": "Image D"}], "images": ["assets/q40_42_p142_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Bone scintigraphy is often used to differentiate shin splints (medial tibial stress syndrome) from tibial stress fractures. Three-phase bone scintigraphy of shin splints demonstrates normal blood flow and normal blood pool. There are irregular linear areas of increased activity along one-third or more of the posteromedial tibial diaphyseal cortex on the delayed images. On the other hand, tibial stress fractures tend to be more focal and fusiform on delayed images and show increased activity on the blood flow (hyperemia) and blood pool phases (hyperperfusion). Shin splints is a stress-induced periosteal reaction at the insertion of the soleus and tibialis muscles onto the tibia, which commonly occurs from repetitive long-distance running on hard surfaces. Patients with shin splints usually present with pain on the medial aspect of the tibia, which is aggravated while running and relieved with rest. Radiographs are often unrevealing, and bone scans are diagnostic. Conservative treatment with rest, analgesics, and orthotics is usually sufficient in the management of shin splints. The uptake in hypertrophic pulmonary osteoarthropathy (HPOA) is more intense than that in the shin splints and is not confined to the tibiae. Also, HPOA would be seen in the older population than that of shin splints.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:265, 285. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:107. Rupani HD, Holder LE, Espinola DA, et al. Three-phase radionuclide bone imaging in sports medicine. Radiology 1985;156(1):187-196."}, {"number": "43", "stem": "When interpreting the following lumbar spine dual x-ray absorptiometry (DEXA) scan, bone mineral density at which level(s) should be used for evaluation?", "options": [{"letter": "A", "text": "L1"}, {"letter": "B", "text": "L2"}, {"letter": "C", "text": "L3"}, {"letter": "D", "text": "L4"}, {"letter": "E", "text": "L1-L2"}, {"letter": "F", "text": "L1-L3"}, {"letter": "G", "text": "L1-L4"}, {"letter": "H", "text": "L2-L3"}, {"letter": "I", "text": "L2-L4"}, {"letter": "J", "text": "L3-L4"}], "images": ["assets/q43_p143_01.jpg"], "explanationImages": ["assets/a43_p151_01.jpg"], "answer": "H", "explanation": "Answer H. Posteroanterior (PA) lumbar spine images acquired for DEXA measurements demonstrate decreased vertebral height of the L1 vertebral body secondary to compression fracture with the associated increase in bone mineral density (BMD) along the superior endplate. Hypertrophic degenerative disease within the inferior aspect of L4 causes a false elevation in BMD. As such, these vertebral body levels should be excluded from the evaluation of BMD. It is crucial to evaluate the images accompanied with the DEXA measurements to ensure appropriate placement of regions of interest (ROI) as well as to evaluate for any abnormality that may falsely increase or decrease the measured BMD. Regions containing sclerotic changes associated with hypertrophic degenerative disease, compression fractures, focal sclerotic bone lesions, and vertebroplasty cement result in falsely increased BMD. While postsurgical changes of laminectomy (image below), a lytic metastasis or vertebral hemangioma would falsely decrease the bone mineral density at those levels. These areas should be excluded from calculations. Most agree that the classification should be based on 2 consecutive vertebrae, and the use of a single vertebra is not recommended.\n\nReferences: Binkley S, Bilezikian N, Bianchi JP, et al. Official Positions of the International Society for Clinical Densitometry and executive summary of the 2007 ISCD Position Development Conference. J Clin Densitom 2008;11(1):75-91. Kanis JA; on behalf of the World Health Organization Scientific Group. Assessment of osteoporosis at the primary health-care level (WHO Collaborating Centre, UK) Technical Report. University of Sheffield. 2007, 2008. Lorente-Ramos R, Azpeitia-Armán J, Muñoz-Hernández A, et al. Dual-energy x-ray absorptiometry in the diagnosis of osteoporosis: a practical guide. Am J Roentgenol 2011;196(4):897-904."}, {"number": "44", "stem": "A 57-year-old male presents with back pain and suspected vertebral osteomyelitis. The patient cannot undergo MRI due to a prosthetic heart valve. Which one of the following modalities is most appropriate in the evaluation of vertebral osteomyelitis in this patient?", "options": [{"letter": "A", "text": "Three-phase whole-body bone scintigraphy"}, {"letter": "B", "text": "In-111 WBC scan"}, {"letter": "C", "text": "Ga-67 scan"}, {"letter": "D", "text": "F-18 FDG-PET/CT"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. While bone scintigraphy and gallium imaging are the most frequently performed radionuclide procedures in patients suspected of having spinal osteomyelitis, neither of them are ideal by themselves. Bone scans alone may be false negative secondary to regional ischemia and may remain abnormal even after the infection has resolved due to ongoing bony remodeling. In- 111 WBC scans have poor sensitivity in diagnosing spinal osteomyelitis, likely due to regional ischemia. Because of the longer half-life, polyenergetic photons, and normal biodistribution, the quality of imaging performed with Ga-67 is not ideal and requires 24 to 48 hours of imaging time. Also, Ga-67 is a nonspecific tracer with accumulation in aseptic inflammation, trauma, and tumor in addition to the discitis/osteomyelitis. Gratz et al. demonstrated that F-18 FDG-PET was superior to MRI for detecting low-grade spondylitis or discitis, was superior to Ga-67 imaging for the identification of paraspinal soft tissue infection, and was superior to bone scintigraphy for differentiating advanced degenerative arthritis from infection. A recent meta-analysis demonstrated that FDG-PET had pooled sensitivity, specificity, PPV, and NPV of 97%, 88%, 96%, and 85% for vertebral osteomyelitis even when MR was equivocal. Even though not as specific, F-18 FDG-PET/CT is sensitive and can be completed in a matter of hours rather than days, as would be the case with In-111 WBC and Ga-67 scans.\n\nReferences: Gratz S, Dorner J, Fischer U, et al. 18F-FDG hybrid PET in patients with suspected spondylitis. Eur J Nucl Med Mol Imaging 2002;29(4):516-524. Palestro CJ, Torres MA. Radionuclide imaging in orthopedic infections. Semin Nucl Med 1997;27(4):334-345. Prodromou ML, Ziakas PD, Poulou LS, et al. FDG PET is a robust tool for the diagnosis of spondylodiscitis: a metaanalysis of diagnostic data. Clin Nucl Med 2014;39(4):330-335."}, {"number": "45", "stem": "A 53-year-old male with a clinical history of chest pain underwent FDG PET/CT for evaluation of multiple bilateral pulmonary nodules seen on the CT pulmonary angiogram, some of which demonstrated central cavitation. Based on the supplied images, what is the most appropriate next step?", "options": [{"letter": "A", "text": "Biopsy of the largest pulmonary nodule"}, {"letter": "B", "text": "Initiation of chemotherapy"}, {"letter": "C", "text": "Initiation of antibiotic therapy"}, {"letter": "D", "text": "CT of the head and neck"}], "images": ["assets/q45_p144_01.jpg"], "explanationImages": ["assets/a45_p152_01.jpg"], "answer": "C", "explanation": "Answer C. Anterior MIP image of the PET, sagittal fused FDG-PET/CT, and axial CT images demonstrate the presence of intense activity centered around the sternomanubrial joint (arrowheads). Intense FDG uptake is also seen corresponding to multiple small pulmonary nodules bilaterally, some of which demonstrate central cavitation (arrows). This constellation of findings is most compatible with sternomanubrial joint septic arthritis with septic pulmonary emboli in this patient without a history of known malignancy. As such, the most appropriate next step would be the initiation of antibiotic therapy after drawing blood cultures or sampling the sternomanubrial space for the identification of the organism and antibiotic sensitivity. Differential considerations for small cavitary lung lesions include septic emboli, rheumatoid nodules, metastatic squamous cell carcinoma, or Wegener granulomatosis.\n\nReferences: Palestro CJ. FDG-PET in musculoskeletal infections. Semin Nucl Med 2013;43(5):367-376."}];
    const APP_ID = "nuclear-medicine-msk-quiz-ch3-v2";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
