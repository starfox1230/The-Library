 irregularity of the cortex of the lower pole of the left kidney (short arrow). The right kidney is normal.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 40, "stem": "A 16-year-old stable female presents with a 2-hour history of acute sharp right lower quadrant pain. The patienthad a negative pregnancy test. A pelvic ultrasound was performed, which was equivocal for the diagnosis of rightovarian torsion. The appendix was normal. What other examination would be the next most appropriate step inimaging?", "options": [{"letter": "A", "text": "Abdominal plain film"}, {"letter": "B", "text": "Emergent MRI of the pelvis with and without IV contrast"}, {"letter": "C", "text": "Repeat ultrasound in 4 hours."}, {"letter": "D", "text": "No other imaging studies would be helpful."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Ultrasound sensitivities for the diagnosis of adnexal torsion range from 46% to 74%. Investigatorshave evaluated the value of CT in the diagnosis of ovarian torsion because of its accessibility in emergent situations. However, exposure to pelvic irradiation makes this a less favorable imaging method in young women. MR has beenfound to be accurate in the diagnosis of adnexal torsion in the context of acute pelvic pain that presents rapidly over<4 hours with accuracies higher than 80%. A repeat ultrasound in 4 hours would not be indicated because this wouldcause a potential delay in the diagnosis of ovarian torsion, which is a surgical emergency. An abdominal radiographwould not be helpful in the diagnosis of ovarian torsion and would expose the patient to needless radiation.\n\nReferences: Béranger-Gibert S, Sakly H, Ballester M, et al. Diagnostic value of MR imaging in the diagnosis of adnexal torsion. Radiology 2016;279(2):461–470."}, {"number": 41, "stem": "An MRI of the pelvis was performed on the patient described in Question 40. Representative images are shownbelow. Which of the following is TRUE?", "options": [{"letter": "A", "text": "The right ovary is torsed and likely viable."}, {"letter": "B", "text": "The left ovary is torsed and likely nonviable."}, {"letter": "C", "text": "The right ovary is torsed and likely nonviable."}, {"letter": "D", "text": "The left ovary is torsed and likely viable."}], "images": ["assets/q41_p127_1.jpeg", "assets/q41_p128_1.jpeg"], "explanationImages": [], "answer": "C", "explanation": "Figure A is an axial T2-weighted image and Figure B is an axial T1 fat-saturated image obtained afterthe administration of intravenous contrast. The right ovary is asymmetrically enlarged when compared to the leftovary on both images. There is a lack of internal T2-weighted signal within the right ovary on the T2-weighted imageand lack of internal contrast enhancement on the second image. The follicles within the right ovary are in a peripheraldistribution. These features can be compared with the normal size, internal T2 signal, uniform follicle distribution,and internal contrast enhancement of the normal left ovary. The most common but fairly nonspecific finding of atorsed ovary is an enlarged ovary (>4. 0 cm in maximal dimension), which is reliably seen both on CT and MRI. Anenlarged ovary with a central afollicular stroma (resulting from hemorrhage and edema) and peripherally displacedfollicles is a more specific feature of ovarian torsion and can sometimes be identified on contrast-enhanced CT or onfast spin-echo T2-weighted MRI. The torsed ovary is characterized by disrupted blood flow, which is seen asabnormal enhancement after IV contrast agent administration. Heterogeneous minimal or absent enhancementindicates the evolution of ovarian torsion from ischemia to infarction. However, the presence of enhancement doesnot exclude torsion because a twisted ovary, with its redundant blood supply, can appear to enhance normally,presumably because the torsion is intermittent or of recent onset.\n\nReferences: Duigenan S, Oliva E, Lee SI. Ovarian torsion: diagnostic features on CT and MRI with pathologic correlation. Am JRoentgenol 2012;198(2):W122–W131."}, {"number": 42, "stem": "In ovarian torsion, what is the proper order of vascular compromise from the first affected vascular supply to thelast?", "options": [{"letter": "A", "text": "Venous, lymphatic, arterial"}, {"letter": "B", "text": "Lymphatic, venous, arterial"}, {"letter": "C", "text": "Arterial, venous, lymphatic"}, {"letter": "D", "text": "Venous, arterial, lymphatic"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Twisting of the adnexal pedicle as occurs in ovarian torsion obstructs the lymphatic drainage causingenlargement of the ovary. This is followed by obstruction of the venous drainage resulting in hemorrhagic infarction. Finally, the arterial supply is obstructed resulting in necrosis. This order of vascular compromise explains whyvascular flow, especially arterial flow, may be present and detected by pelvic Doppler ultrasound examinations intorsed ovaries if the torsion is intermittent or early or partial torsion.\n\nReferences: Reid JR, Paladin A, Davros W, et al. Rotations in radiology pediatric radiology. New York, NY: Oxford University Press, 2013."}, {"number": 43, "stem": "A renal ultrasound examination was performed on a 10-year-old patient, and representative images are shownbelow. Concerning the study, which of the following is TRUE?", "options": [{"letter": "A", "text": "This condition is usually associated with proximal renal tubular acidosis."}, {"letter": "B", "text": "This entity is uncommon among immobilized patients."}, {"letter": "C", "text": "Most causes of this condition are associated with hypercalciuria."}, {"letter": "D", "text": "The renal pyramids are normal appearing for the patient's age group."}], "images": ["assets/q43_p129_1.jpeg", "assets/q43_p129_2.jpeg"], "explanationImages": [], "answer": "C", "explanation": "The ultrasound images of the kidneys demonstrate diffusely increased echogenicity of the medullarypyramids bilaterally consistent with medullary nephrocalcinosis. The most common metabolic abnormalityresponsible for histologic changes in the pyramids that may be depicted as increased echogenicity at sonography isnephrocalcinosis. Nephrocalcinosis primarily affects the renal pyramids, but it can occasionally be appreciated in thecortex as well. Although nephrocalcinosis may eventually progress to involve most of the pyramid, acousticshadowing is rarely seen. The lack of shadowing may reflect the way in which the calcium is laid down within thepyramid. Acoustic shadowing may be appreciated only in rare cases of extreme involvement of the pyramids or ifthere is development of associated calculi in the adjacent calices. There are numerous causes for medullary nephrocalcinosis in children. The majority of these conditions areassociated with hypercalciuria and include distal renal tubular acidosis and prolonged immobilization.\n\nReferences: Dähnert W. Radiology review manual, 6th ed. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams &Wilkins, 2007. Daneman A, Navarro OM, Somers GR, et al. Renal pyramids: focused sonography of normal and pathologic processes. Radiographics 2010;30(5):1287–1307."}, {"number": 44, "stem": "Concerning the differences in size between the kidneys in the exam performed on the patient in Question 43,which of the following is TRUE?", "options": [{"letter": "A", "text": "The difference in sizes of the kidneys is too large."}, {"letter": "B", "text": "The difference in sizes of the kidneys is too small."}, {"letter": "C", "text": "The difference in size of the kidneys is within normal limits."}, {"letter": "D", "text": "There is compensatory hypertrophy of the left kidney."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "In children, the left and right kidney should generally measure within 1 cm of each other. If there is adiscrepancy of more than 1 cm, an underlying abnormality should be suspected. Such discrepancies may result from adisorder that causes one of the kidneys to be too small, such as global scarring, or from a process that causes one ofthe kidneys to be too large, such as renal duplication or acute pyelonephritis. In every case, it is important to comparethe patient's renal length with tables that plot normal renal length against age.\n\nReferences: Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 45, "stem": "A teenage male presents with acute right-side testicular pain. A scrotal ultrasound was performed, and arepresentative image is shown below. What is the next appropriate step in management?", "options": [{"letter": "A", "text": "Antibiotics"}, {"letter": "B", "text": "Conservative treatment"}, {"letter": "C", "text": "Stat urologic consult"}, {"letter": "D", "text": "No further treatment is indicated."}], "images": ["assets/q45_p130_1.jpeg"], "explanationImages": [], "answer": "C", "explanation": "The transverse ultrasound image shown demonstrates a normal echotexture of both testes, but there isa lack of color Doppler flow in the right testis. These findings are consistent with acute right-sided testicular torsion, and the patient will require prompt diagnosis and treatment. In the early phases of torsion (1 to 3 hours), testicularechogenicity appears normal. With progression, enlargement of the affected testis and increased or heterogeneousechogenicity are common findings. Testicular viability can be suggested from gray-scale and color Doppler findings. Normal echogenicity with mild testicular enlargement is a good sign of viability, whereas marked enlargement,heterogeneous echotexture, and scrotal wall hypervascularity are signs of testicular infarction and necrosis. Note that demonstration of flow within a normal testis is more difficult in children <2 years of age. Gray-scaleultrasound may demonstrate asymmetric enlargement and slightly decreased echogenicity of the affected testis. Advanced findings in young children that occur with progressive ischemia and infarction are similar to those forolder patients. These include hemorrhage and necrosis, which may cause increasing asymmetric heterogeneity\n\nReferences: Aso C, Enríquez G, Fité M, et al. Gray-scale and color Doppler sonography of scrotal disorders in children: an update. Radiographics 2005;25(5):1197–1214. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}, {"number": 46, "stem": "A 1-month-old male with fluid draining from his umbilicus presents for a renal and bladder ultrasound, and arepresentative image is shown below. Concerning the entity demonstrated, which of the following is TRUE?", "options": [{"letter": "A", "text": "This entity is more common in women."}, {"letter": "B", "text": "The majority of patients with this entity are symptomatic."}, {"letter": "C", "text": "Later on in life, these lesions can give rise to adenocarcinoma."}, {"letter": "D", "text": "There are only two types of this entity. 1 Answer B. The images demonstrate dilatation of the left renal pelvis and calyces without ureterectasis. The rightkidney is normal. These findings are often seen in a UPJ obstruction. However, vesicoureteral reflux should beexcluded as the cause of the left-sided pelvicaliectasis, which is why a VCUG would be the next best step inmanagement. Note that in a male, a VCUG would also help exclude a posterior urethral valve, which can causebladder outlet obstruction and pelvicaliectasis. Plain radiographs of the abdomen will not be helpful in determiningthe cause of the pelvicaliectasis, and a CT scan of the abdomen and pelvis will also not be helpful in determiningwhether vesicoureteral reflux is the cause of the pelvicaliectasis. Both of these exams would needlessly expose thechild to ionizing radiation. Although a testicular ultrasound does not utilize ionizing information, it would not give usany information about the cause for the pelvicaliectasis. References: Blickman JG, Parker BR, Barnes P D. Pediatric radiology: the requisites, 3rd ed. Philadelphia, PA: Elsevier/Saunders,2009. Donnelly LF. Pediatric imaging the fundamentals. Philadelphia, PA: Elsevier/Saunders, 2009."}], "images": ["assets/q46_p131_1.jpeg"], "explanationImages": ["assets/a46_p158_1.jpeg"], "answer": "C", "explanation": "The ultrasound image demonstrates an anechoic fluid tract extending from the anterosuperior aspect ofthe urinary bladder (arrow). This is consistent with a urachal remnant. The urachus, or median umbilical ligament, isa midline tubular structure that extends upward from the anterior dome of the bladder toward the umbilicus. It is avestigial remnant of at least two embryonic structures: the cloaca, which is the cephalic extension of the urogenitalsinus (a precursor of the fetal bladder), and the allantois, which is a derivative of the yolk sac. The tubular urachusnormally involutes before birth, remaining as a fibrous band with no known function. However, persistence of anembryonic urachal remnant can give rise to various clinical problems, not only in infants and children but also inadults. Congenital urachal anomalies are twice as common in men as in women. There are four types of congenitalurachal anomalies: patent urachus, umbilical–urachal sinus, vesicourachal diverticulum, and urachal cyst. A patenturachus is purely congenital and accounts for about 50% of all cases of congenital anomalies. An umbilical–urachalsinus (15% of cases), vesicourachal diverticulum (3% to 5% of cases), or urachal cyst (about 30% of cases) mayclose normally after birth but then reopen in association with pathologic conditions that are often categorized asacquired diseases. The majority of patients with urachal abnormalities (except those with a patent urachus) are asymptomatic. However, they may become symptomatic if these abnormalities are associated with infection. If a persistentcommunication exists between the bladder lumen and the umbilicus, urine leakage is usually noted during theneonatal period. Although the normal urachus is most commonly lined by the transitional epithelium, urachalcarcinoma predominantly manifests as adenocarcinoma (90% of cases), probably because of the metaplasia of theurachal mucosa into columnar epithelium followed by malignant transformation; conversely, 34% of bladderadenocarcinomas are of urachal origin. These tumors are most commonly seen in patients 40 to 70 years of age, two-thirds of whom are men.\n\nReferences: Yu JS, Kim KW, Lee HJ, et al. Urachal remnant diseases: spectrum of CT and US findings. Radiographics2001;21(2):451–461."}];
    const APP_ID = "pediatric-gu-imaging-quiz-ch2";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function promptText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      return `You are tutoring pediatric radiology. Explain this multiple-choice question in detail. The user chose ${chosen} and the correct answer is ${q.answer}; the attempt was ${result}. Explain why the correct answer is right, why each wrong answer is wrong, and emphasize the selected wrong answer if one was missed.\n\n${questionText(q)}\n\nPDF explanation:\n${q.explanation}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyPrompt").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestion").addEventListener("click", () => copy(questionText(QUESTIONS[state.index])));
    el("copyPrompt").addEventListener("click", () => copy(promptText(QUESTIONS[state.index])));
    render();
  </script>
</body>
</html>
