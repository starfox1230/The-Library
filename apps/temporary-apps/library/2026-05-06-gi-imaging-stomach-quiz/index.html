  <title>Gastrointestinal Imaging Stomach Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }

  <script>
    const QUESTIONS = [{"number": "1", "stem": "A 78-year-old female with epigastric discomfort undergoes an upper GI study. What does the mucosal pattern represent?", "options": [{"letter": "A", "text": "Areae gastricae"}, {"letter": "B", "text": "Hypertrophic sessile polyps"}, {"letter": "C", "text": "Atrophic gastritis"}, {"letter": "D", "text": "Ménétrier gastropathy"}], "images": ["assets/q1_p114_01.jpg"], "explanationImages": ["assets/a1_p156_01.jpg"], "answer": "A", "explanation": "Answer A. The upper GI study demonstrates a confluent reticular appearance of the gastric mucosa with the intersecting furrows outlining regular ovoid or polygonal structures 1 to 5 mm in size, known as areae gastricae. The other conditions listed result in a different mucosal appearance: hypertrophic polyps are seen on a background of flatter mucosa; atrophic gastritis has smooth featureless mucosa; and Ménétrier gastropathy results in a thickened wall and rugal folds. When involvement is limited, areae gastricae are considered a normal finding and an indication of good mucosal coating using double-contrast technique. They are more commonly demonstrated in older patients, and when enlarged or more extensive (as in this case), they are thought to indicate thinning of the mucus coating of the stomach lining and are associated with gastric hypersecretion. Areae gastricae on radiographic studies correspond to a mosaic mucosal pattern on endoscopy which is associated with H. pylori infection.\n\nReferences: Charagundla SR, Levine MS, Langlotz CP, et al. Visualization of areae gastricae on double-contrast upper gastrointestinal radiography: relationship to age of patients. AJR Am J Roentgenol 2001;177(1):61-63. Watanabe H, Magota S, Shiiba S, et al. Coarse areae gastricae in the proximal body and fundus: a sign of gastric hypersecretion. Radiological and endoscopic correlation. Radiology 1983;146(2):303-306."}, {"number": "2", "stem": "A 69-year-old female with a history of breast cancer presents for evaluation of nausea, vomiting, and poor oral intake. An upper GI study and contrast-enhanced CT scan were performed. What is the correct diagnosis?", "options": [{"letter": "A", "text": "Chemotherapy toxicity"}, {"letter": "B", "text": "Gastric ulcer"}, {"letter": "C", "text": "Linitis plastica"}, {"letter": "D", "text": "Gastric varices"}], "images": ["assets/q2_p115_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Fluoroscopic spot image from a double-contrast upper GI demonstrates nodular pattern of the wall and diffuse narrowing of the stomach lumen. Axial contrast-enhanced CT image demonstrates diffuse wall thickening and enhancement. No ulceration is demonstrated, and gastritis from chemotherapy or other causes would involve fold thickening but not the nodularity demonstrated in this case. Varices are usually found in the proximal stomach and would not cause the diffuse luminal restriction. The imaging features are most compatible with linitis plastica, in this case from metastatic breast carcinoma. Linitis plastica is characterized by loss of normal gastric distensibility as a result of infiltrative tumor, leading to a \"leather bottle\" appearance of the stomach. The degree of gastric distensibility is variable, ranging from a quite subtle limitation to severe rigidity. This may occur in the setting of advanced scirrhous gastric carcinoma as in this case below from a different patient. Note the invariant gastric contours on the AP (left) and RAO (right) images. A linitis plastica appearance can also be seen with lymphoma or metastatic disease (most commonly of breast and lung origin). Imaging plays an important role in diagnosis, as up to 30% of cases may have a false-negative endoscopic biopsy due to the tumor's deep and infiltrative behavior.\n\nReferences: Levine MS. Stomach. In: Levine MS, Ramchandani P, Rubesin SE, eds. Practical fluoroscopy of the GI and GU tracts. New York, NY: Cambridge University Press; 2012:73-104. Taal BG, Peterse H, Boot H. Clinical presentation, endoscopic features, and treatment of gastric metastases from breast carcinoma. Cancer 2000;89(11):2214-2221."}, {"number": "3", "stem": "A 67-year-old patient presents with hematemesis. Endoscopic evaluation demonstrates marked fold thickening with ulcerations, and biopsy is consistent with lymphoma. The CT and PET scan obtained for staging is shown below. Regarding primary gastric lymphoma, which of the following statements is TRUE?", "options": [{"letter": "A", "text": "Most primary gastric lymphomas are Hodgkin lymphoma."}, {"letter": "B", "text": "Lymphoma is the most common type of gastric malignancy."}, {"letter": "C", "text": "Transpyloric spread of a gastric mass favors the diagnosis of lymphoma over adenocarcinoma."}, {"letter": "D", "text": "Eradication of H. pylori infection may cause regression of low-grade MALT lymphoma."}], "images": ["assets/q3_p116_01.jpg", "assets/q3_p117_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Primary gastric lymphoma is the most common type of extranodal lymphoma, accounting for 50% to 70% of all primary gastrointestinal lymphomas. Gastrointestinal lymphoma is nearly always of the non-Hodgkin type. Lymphoma is much less common than adenocarcinoma in the stomach, accounting for only 1% to 5% of all gastric malignancies. Adenocarcinoma and lymphoma may present with similar radiographic features, including fold thickening, polypoid masses, and ulceration. Severe infiltration with lymphoma may even produce a linitis plastica appearance, although in distinction from adenocarcinoma, gastric distention is usually relatively preserved. Note that while transpyloric spread is more common in lymphoma than adenocarcinoma, a tumor showing such transpyloric spread is still more likely to be adenocarcinoma, given its much higher prevalence. Of the primary gastric lymphomas, a large proportion (50% to 72%) are mucosa-associated lymphoid tissue (MALT)-type lymphomas. MALT-type lymphomas are associated with chronic H. pylori infection and are classified into low-grade and high-grade histologic categories. Eradication of H. pylori infection with antibiotics and proton pump inhibitors is the first line of therapy for low-grade tumors and may cause complete tumor regression. Radiographically most low-grade MALT lymphomas may show superficial spreading lesions with mucosal nodularity, shallow ulcerations, and mild fold thickening on barium studies, whereas high-grade tumors are associated with formation of masses or marked wall thickening.\n\nReferences: Choi D, Lim HK, Lee SJ, et al. Gastric mucosa-associated lymphoid tissue lymphoma: helical CT findings and pathologic correlation. AJR Am J Roentgenol 2002;178(5):1117-1122. Ghai S, Pattison J, Ghai S, et al. Primary gastrointestinal lymphoma: spectrum of imaging findings with pathologic correlation. Radiographics 2007;27(5):1371-1388."}, {"number": "4", "stem": "An upper GI is performed on a 72-year-old male with epigastric pain. What is the appropriate next step in management?", "options": [{"letter": "A", "text": "Examination should be repeated with double-contrast technique to better characterize the polyps."}, {"letter": "B", "text": "Polyps have definitive benign features and need no further workup."}, {"letter": "C", "text": "Endoscopy is required for diagnosis and potential treatment."}, {"letter": "D", "text": "Polyps have malignant features and as endoscopic biopsy may be prone to sampling error and false-negative results, surgical consultation is needed."}], "images": ["assets/q4_p118_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. There are multiple polyps in the gastric antrum, incompletely characterized with regard to morphology on this single-contrast study. Gastric polyps are common findings on endoscopy and upper gastrointestinal fluoroscopic studies. 90% are asymptomatic and do not have malignant potential, but some do require intervention. Detection of polyps on radiographic studies should prompt endoscopic evaluation. Certain morphologic features are associated with different rates of malignancy. Pedunculated or larger polyps are more commonly adenomatous, which are considered premalignant, and small sessile polyps are more likely hyperplastic and benign. Morphologic features are not sufficient however to determine management; therefore characterization on imaging studies with optimized technique (e.g., double-contrast) will not preclude the need for endoscopy. Hyperplastic polyps are a response to chronic inflammation, and there is an increased risk for a synchronous gastric cancer when atrophic gastritis is present. For this reason, even though small sessile polyps are themselves likely benign, endoscopy is still warranted to evaluate for separate cancers. Polypectomy is indicated for larger (≥1 cm) polyps; smaller solitary polyps may be resected or biopsied. In addition, the surrounding mucosa is sampled to rule out dysplasia, underlying atrophic gastritis, and to assess for Helicobacter pylori. Polyps may be classified by their tissue type of origin: epithelial, hamartomatous, or mesenchymal. Epithelial polyps include hyperplastic polyps, fundic gland polyps, and adenomatous polyps. Hyperplastic polyps are seen in the setting of chronic inflammation (such as atrophic gastritis), H. pylori infection, pernicious anemia, and adjacent to ulcers. They are generally benign but have some risk for malignant potential (between 1 and 20%, with increased risk for polyps >1 cm). Fundic gland polyps are the most common type in Western countries where H. pylori infection rates are lower. These are sporadic or may be associated with polyposis syndromes. Long-term proton pump inhibitor (PPI) use is associated with an increased risk of fundic gland polyps. Fundic gland polyps that are sporadic or associated with PPI use have no significant malignant potential. In patients with familial adenomatous polyposis (FAP), there is a greater incidence of dysplasia present in the fundic gland polyps (usually low grade with progression to malignancy rare). Adenomas are seen typically in a background of chronic atrophic gastritis with intestinal metaplasia. Eight to fifty-nine percent of adenomas are associated with a synchronous gastric carcinoma. Increased risk of invasive carcinoma in an adenoma is correlated with larger size, villous morphology, and the degree of dysplasia. Hamartomatous polyps are seen in Peutz-Jeghers syndrome, juvenile polyposis, and Cowden disease. Mesenchymal tissues may give rise to a number of polyp types. Inflammatory fibroid polyps are rare mesenchymal tumors that arise in the submucosa and mucosa and are considered nonneoplastic. Other mesenchymal origin polyps include gastrointestinal or gut stroma tumors (GST), leiomyomas, and granular cell tumors.\n\nReferences: Carmack SW, Genta RM, Schuler CM, et al. The current spectrum of gastric polyps: a 1-year national study of over 120,000 patients. Am J Gastroenterol 2009;104(6):1524-1532. Feczko PJ, Halpert RD, Ackerman LV. Gastric polyps: radiological evaluation and clinical significance. Radiology 1985;155(3):581-584."}, {"number": "5a", "stem": "A 45-year-old male presents with left upper quadrant pain, melena, and a hematocrit of 30. An endoscopy reveals an ulcerated gastric mass. Immunohistochemistry of the biopsy is strongly positive for CD117. A CT scan is performed for staging purposes. What type of tumor is this most likely?", "options": [{"letter": "A", "text": "Leiomyosarcoma"}, {"letter": "B", "text": "Adenocarcinoma"}, {"letter": "C", "text": "Lymphoma"}, {"letter": "D", "text": "Gastrointestinal stromal tumor (GST)"}], "images": ["assets/q5a_p118_02.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The CT scan demonstrates a mass centered in the gastric body wall with an endoluminal component that has a large ulceration, likely the cause of the bleeding. The mass also has a large exophytic component extending inferiorly. These morphologic features favor a gastrointestinal stromal tumor over the other choices. Gastrointestinal stromal tumors (GSTs) also called gut stroma tumors are the most common mesenchymal tumor of the gastrointestinal tract. They are defined by the positive immunoreactivity to CD117 (KIT), a tyrosine kinase growth factor receptor. Other mesenchymal tumors are negative or only weakly positive for CD117. Ulcerations are common, seen in 50% of GSTs. The exophytic growth pattern is also common. The tumors have a tendency to hemorrhage. Enhancement tends to be heterogeneous, but more pronounced peripherally. Aside from the immunohistochemistry marker, no lymphadenopathy is seen that might be associated with lymphoma or adenocarcinoma."}, {"number": "5b", "stem": "A factor which determines for malignant potential of gastric GSTs is", "options": [{"letter": "A", "text": "Size"}, {"letter": "B", "text": "Ulceration"}, {"letter": "C", "text": "Degree of enhancement"}, {"letter": "D", "text": "Adjacent mesenteric fat stranding"}], "images": ["assets/q5a_p118_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The malignant potential for GSTs is based upon size and mitotic rate. Tumors <5 cm in diameter with five or fewer mitoses per 50 consecutive high power fields (HPFs) have a very low risk for malignant behavior. Tumors >10 cm with more than five mitoses per HPF are considered to be at high risk. Tumors that fall in between these categories are of uncertain or intermediate risk. The risk of malignant potential is also related to location. In the small intestine, a GST may have a more aggressive behavior compared to a tumor of the same size in the stomach."}, {"number": "5c", "stem": "Where is this tumor most likely to metastasize?", "options": [{"letter": "A", "text": "Liver"}, {"letter": "B", "text": "Lungs"}, {"letter": "C", "text": "Lymph nodes"}, {"letter": "D", "text": "Brain"}], "images": ["assets/q5a_p118_02.jpg"], "explanationImages": ["assets/a5c_p159_01.jpg"], "answer": "A", "explanation": "Answer A. GSTs most commonly metastasize to liver and intraabdominally within the peritoneal cavity. Lymph node metastases are rare, and lymph node dissections are not performed routinely at resection. Lung and brain metastases are unusual as well. With tyrosine kinase inhibitor therapy, liver metastases may become almost completely cystic.\n\nReferences: Kim HC, Lee JM, Kim KW, et al. Gastrointestinal stromal tumors of the stomach: CT findings and prediction of malignancy. AJR Am J Roentgenol 2004;183(4):893-898. Sandrasegaran K, Rajesh A, Rydberg J, et al. Gastrointestinal stromal tumors: clinical, radiologic, and pathologic features. AJR Am J Roentgenol 2005;184(3):803-811."}, {"number": "6", "stem": "A 45-year-old female presents with epigastric pain. She undergoes a single-contrast barium UGI examination. Based upon the finding, which of the following statements is most accurate?", "options": [{"letter": "A", "text": "The ulcer appears benign because it extends beyond the expected lumen of the stomach."}, {"letter": "B", "text": "The ulcer appears malignant because it is associated with a mass."}, {"letter": "C", "text": "The ulcer appears malignant because it is located in the body of the stomach."}, {"letter": "D", "text": "The ulcer is indeterminate and has no features suggestive of a benign or malignant nature."}], "images": ["assets/q6_p120_01.jpg", "assets/q6_p121_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The UGI study demonstrates an ulcer crater along the lesser curvature of the stomach. This ulcer extends beyond the expected lumen of the stomach, has no associated mass, and is consistent with a 0 ulcer. Additional features favoring a benign nature include its regular ovoid shape, folds radiating to the edge of the crater, and smooth ulcer collar. Benign ulcers are more common in the antrum and lesser curvature, but location in the stomach is not a reliable indicator of benignity versus malignancy. Duodenal ulcers are almost invariably benign. Malignant ulcer in a gastric mass. Benign duodenal ulcer. Helicobacter pylori infection is a major etiologic cause of duodenal and gastric ulcers. One current approach to evaluating patients with initial presentation of dyspepsia is to screen for H. pylori infection with noninvasive tests (stool antigen and urea breath test) or to try empiric proton pump inhibitor (PPI) therapy. For patients who are older than age 55 or have alarm features (such as unintended weight loss, GI bleeding, family history of GI malignancy), endoscopy is usually recommended. Barium studies have been supplanted by endoscopy in the past 30 years, partly due to early reports of relative lack of sensitivity and specificity for detection of gastric malignancy. These data were based on comparison of endoscopy with single-contrast barium technique, and although double-contrast technique has been since shown to have comparable sensitivity and specificity to endoscopy for detection and characterization of most ulcers, the bias toward endoscopy remains. Nevertheless, as some patients may not tolerate endoscopy, the ability to characterize ulcers by barium radiography remains important.\n\nReferences: Gore RM, Levine MS. Textbook of gastrointestinal radiology. 4th ed. Philadelphia, PA: Elsevier/Saunders, 2015. Talley NJ, American Gastroenterological Association. American Gastroenterological Association medical position statement: evaluation of dyspepsia. Gastroenterology 2005;129(5):1753-1755."}, {"number": "7", "stem": "A radiologist is performing an UGI study and sees a possible small ulceration in the stomach. The finding is subtle and she chooses a smaller field of view (FOV) to better visualize the finding. As a consequence of this magnification, which of the following statements is TRUE?", "options": [{"letter": "A", "text": "The spatial resolution is decreased."}, {"letter": "B", "text": "The dose to the patient is increased."}, {"letter": "C", "text": "The magnification gain is higher."}, {"letter": "D", "text": "There is a decrease in the kVp."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. When a smaller field of view is chosen by the fluoroscopist, the image intensifier electronically alters the size of the input radiation field of view while keeping the output field fixed. This will increase the spatial resolution performance. The minification gain is defined as the input phosphor area/output phosphor area, thus decreasing the input area will decrease the minification gain. As the input field of view is decreased, a smaller area of the input phosphor is being irradiated. This decreases the brightness gain, so in compensation the automatic brightness control feedback circuit increases the exposure rate to maintain the brightness at the output phosphor. The dose to the patient is increased, and as a rule of thumb, the dose generally increases as the square of the ratios of the image intensifier diameters. Use of magnification modes in fluoroscopy is usually accompanied by an increase in kVp in order to reduce the entrance skin air kerma. In addition, the kVp increases in order to keep the tube current low and not overheat the x-ray tube.\n\nReferences: Bushberg JT. The essential physics of medical imaging, 3rd ed. Philadelphia, PA: Wolters Kluwer Health/Lippincott Williams & Wilkins, 2012. Mahesh M. Fluoroscopy: patient radiation exposure issues. Radiographics 2001;21(4):1033-1045."}, {"number": "8", "stem": "A 22-year-old male with vague upper abdominal pain undergoes an upper GI examination. No additional lesions were seen. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Metastatic melanoma"}, {"letter": "B", "text": "Gastrointestinal stromal tumor (GIST)"}, {"letter": "C", "text": "Lymphoma"}, {"letter": "D", "text": "Ectopic pancreatic rest"}], "images": ["assets/q8_p122_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The finding on the upper GI examination is an approximately 2 cm smooth submucosal mass in the gastric antrum containing a central collection of barium. This lesion with a target appearance is most likely an ectopic pancreatic rest. As a solitary lesion in a young patient, lymphoma and metastases would be unlikely. While a solitary GIST is a more common submucosal mass, lesions of this size do not typically ulcerate. Pancreatic rests are uncommon, reported as present in up to 0.21% at autopsy. They are most commonly located in the gastric antrum within 6 cm of the pylorus, with the duodenum the next most common site. A rudimentary duct forms a central umbilication in 50% of lesions. Pancreatic rests are usually asymptomatic, but they can develop pancreatitis and consequent gastric outlet obstruction, and there are rare reports of carcinoma arising from the rest.\n\nReferences: Jeong HY, Yang HW, Seo SW, et al. Adenocarcinoma arising from an ectopic pancreas in the stomach. Endoscopy 2002;34(12):1014-1017. Kilman WJ, Berk RN. The spectrum of radiographic features of aberrant pancreatic rests involving the stomach. Radiology 1977;123(2):291-296. Yuan Z, Chen J, Zheng Q, et al. Heterotopic pancreas in the gastrointestinal tract. World J Gastroenterol 2009;15(29):3701-3703."}, {"number": "9", "stem": "A 56-year-old male with a history of abdominal discomfort has a CT. A urea breath test is reported as abnormal. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Helicobacter pylori gastritis"}, {"letter": "B", "text": "Ménétrier disease"}, {"letter": "C", "text": "Gastric lymphoma"}, {"letter": "D", "text": "Zollinger-Ellison syndrome"}], "images": ["assets/q9_p123_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Contrast-enhanced CT images through the stomach demonstrate marked gastric fold thickening, which predominantly involves the gastric fundus and body. The gastric antrum appears relatively spared. Gastric fold thickening is nonspecific and differential includes H. pylori gastritis, Ménétrier disease, gastric lymphoma, and Zollinger-Ellison syndrome. The urea breath test is a simple and highly accurate method for clinical assessment of H. pylori infection. Ingested urea that is labeled with carbon isotopes is rapidly converted to carbon dioxide due to the presence of urease in H. pylori species, which is subsequently exhaled by the patient in their breath and easily detected. Reported sensitivity and specificity values for the urea breath test both exceed 95%. H. pylori is a common gram-negative bacillus in westernized populations, estimated to occur in >50% of patients over the age of 50 years. It is the most common cause of chronic gastritis, and its presence can be documented in most cases of gastric and duodenal ulcers. H. pylori gastritis is the number one cause of gastric fold thickening which can be either diffuse or localized. The degree of gastric fold thickening is often mild to moderate. However, marked fold thickening can be seen, and overlaps with other entities that result in giant gastric folds such as Ménétrier disease and Zollinger-Ellison syndrome. While H. pylori gastritis can result in localized symptoms of epigastric pain and dyspepsia, it is also an important causative factor in the development of gastric carcinoma and gastric lymphoma.\n\nReferences: Levine MS. Stomach. In: Levine MS, Ramchandani P, Rubesin SE, eds. Practical fluoroscopy of the GI and GU tracts. New York, NY: Cambridge University Press; 2012:73-104. Rubesin SE, Levine MS, Laufer I. Double-contrast upper gastrointestinal radiography: a pattern approach for diseases of the stomach. Radiology 2008;246(1):33-48."}, {"number": "10a", "stem": "A 41-year-old female presents with a history of chronic abdominal pain. A contrast-enhanced CT scan was obtained, followed by an In-111 Octreotide SPECT study. What is the best diagnosis?", "options": [{"letter": "A", "text": "H. pylori gastritis"}, {"letter": "B", "text": "Ménétrier disease"}, {"letter": "C", "text": "Gastric lymphoma"}, {"letter": "D", "text": "Zollinger-Ellison syndrome"}], "images": ["assets/q10a_p124_01.jpg", "assets/q10a_p125_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Axial and sagittal contrast-enhanced CT images (top left and right) demonstrate marked gastric fold thickening in the gastric fundus and body. There is an enlarged node near the pancreatic head (arrow, bottom left). Axial SPECT image from the In-111 Octreotide scan demonstrates a focus of avid tracer uptake in the right abdomen, corresponding to the enlarged node. The imaging features are compatible with Zollinger-Ellison syndrome (ZES). ZES is a rare condition associated with an autonomous gastrin-producing neuroendocrine tumor, typically found in the pancreas or duodenum. They are frequently multiple and often extrapancreatic in location. Laboratory tests often reveal elevated serum gastrin levels. This results in gastric hyperchlorhydria and can lead to ulcer disease in affected patients. Gastrinomas are malignant in over 50% of cases. Approximately 25% of patients will have multiple endocrine neoplasia type I. From an imaging standpoint, traditional cross-sectional techniques such as CT and MRI are less effective than somatostatin receptor scintigraphy for identification of the primary tumor and metastatic foci.\n\nReferences: Ellison EC, Johnson JA. The Zollinger-Ellison syndrome: a comprehensive review of historical, scientific, and clinical considerations. Curr Probl Surg 2009;46(1):13-106. Metz DC, Jensen RT. Gastrointestinal neuroendocrine tumors: pancreatic endocrine tumors. Gastroenterology 2008;135(5):1469-1492."}, {"number": "10b", "stem": "The mass identified in this patient is located in the gastrinoma triangle, which is bounded medially by the junction of the pancreatic neck-body and inferiorly by the junction of the second- third portions of the duodenum. What comprises the superior margin of the gastrinoma triangle?", "options": [{"letter": "A", "text": "Falciform ligament"}, {"letter": "B", "text": "Junction of common hepatic artery and gastroduodenal artery"}, {"letter": "C", "text": "Junction of cystic duct and common bile duct"}, {"letter": "D", "text": "Right portal vein"}], "images": ["assets/q10a_p124_01.jpg", "assets/q10a_p125_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The gastrinoma triangle is an important surgical space for patients with suspected gastrinomas, as most surgically apparent and visually occult gastrin-producing neoplasms occur in this space. The triangle is bounded medially by the pancreatic neck and body junction. The inferior margin is bounded by the junction of the second and third portions of the duodenal sweep. The superior margin is bounded by the junction of the cystic duct and common bile duct.\n\nReferences: Howard TJ, Zinner MJ, Stabile BE, et al. Gastrinoma excision for cure. A prospective analysis. Ann Surg 1990;211(1):9-14. Stabile BE, Morrow DJ, Passaro E Jr. The gastrinoma triangle: operative implications. Am J Surg 1984;147(1):25-31."}, {"number": "11a", "stem": "A 53-year-old male presented with epigastric discomfort. An endoscopy reveals a gastric mass. An MRI of the abdomen is performed with the following T1-weighted sequences post contrast. What is the most likely etiology for the findings?", "options": [{"letter": "A", "text": "Lymphoma"}, {"letter": "B", "text": "Gastrointestinal stromal tumor"}, {"letter": "C", "text": "Gastric adenocarcinoma"}, {"letter": "D", "text": "Gastric carcinoid"}], "images": ["assets/q11a_p126_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. There is a mass arising from the posterior gastric body wall, which demonstrates avid arterial enhancement. Multiple liver lesions consistent with metastases also demonstrate intense arterial enhancement, which diminishes on venous phase imaging, features typical for a carcinoid tumor. The other entities are not characterized by the same degree of arterial enhancement. Carcinoids are well-differentiated neuroendocrine tumors that arise from amine precursor uptake and decarboxylation (APUD) cells. Gastrointestinal carcinoids account for the majority of all carcinoids (66.9%), followed by the tracheobronchial system (24.5%). Gastrointestinal carcinoids are a diverse group of tumors that may arise from a variety of endocrine cells throughout the gastrointestinal tract. Their biologic behavior and malignant potential depend upon the anatomic site of origin and cell type. The stomach is a relatively uncommon location, accounting for 8.7% of all gastrointestinal carcinoids. Gastric carcinoids are divided into three subtypes: Type I associated with autoimmune chronic atrophic gastritis; Type II, associated with Zollinger-Ellison syndrome in patients with multiple endocrine neoplasia type 1 (MEN-1); and Type III, a sporadic type without the association with atrophic gastritis or hypergastrinemia. Type I and II carcinoids are multifocal, smaller (1 to 2 cm) with a tendency toward benign behavior, whereas Type III is solitary, large (>2 cm), with more aggressive behavior including a tendency to metastasize (as in this case)."}, {"number": "11b", "stem": "Following a partial gastrectomy, later staging studies included a gallium-68 DOTATATE PET-CT. What receptor is bound by this radiotracer?", "options": [{"letter": "A", "text": "Somatostatin"}, {"letter": "B", "text": "Gastrin"}, {"letter": "C", "text": "Vasoactive intestinal peptide (VIP)"}, {"letter": "D", "text": "Glucagon-like peptide 1 (GLP-1)"}], "images": ["assets/q11a_p126_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Somatostatin is an endogenous peptide secreted by neuroendocrine cells. Imaging of neuroendocrine tumors (NET) takes advantage of the high expression of somatostatin receptors (SSTRs) on cell membranes of NETs. Previously, the most common imaging study used forms of an indium-111-labeled octreotide, a synthetic somatostatin analog, combined with single photo emission computed tomography (SPECT). This has largely been replaced by imaging using Gallium-68 DOTATATE, a radiotracer with much higher affinity for the somatostatin receptor subtype 2 (SSTR2), in conjunction with the higher spatial resolution positron emission computed tomography (PET-CT).\n\nReferences: Binstock AJ, Johnson CD, Stephens DH, et al. Carcinoid tumors of the stomach: a clinical and radiographic study. AJR Am J Roentgenol. 2001;176(4):947-951. Hofman MS, Lau WF, Hicks RJ. Somatostatin receptor imaging with 68Ga DOTATATE PET/CT: clinical utility, normal patterns, pearls, and pitfalls in interpretation. Radiographics 2015;35(2):500-516. Levy AD, Sobin LH. From the archives of the AFIP: gastrointestinal carcinoids: imaging features with clinicopathologic comparison. Radiographics 2007;27(1):237-257. 12 Answers: Patient 1: D Patient 2: B Patient 3: A Patient 4: C In the adult, gastric outlet obstruction may be caused by a variety of neoplastic, inflammatory, posttraumatic conditions. Congenital abnormalities, not included here such as duodenal atresia and annular pancreas, are additional causes that may present earlier in life. Patient 1: The CT demonstrates gastric distention and an ovoid circumscribed structure adjacent to the horizontal portion of the duodenum with mildly hyperdense contents consistent with a hematoma. These may be due to lap-belt injuries or other iatrogenic causes, as in this case with an ERCP. Patient 2: The upper GI and CT demonstrate gastric distention and long smooth narrowing of the pylorus with smooth muscular hypertrophy seen as a hypodense parallel structures on the CT, suggesting adult hypertrophic pyloric stenosis. This condition is rare, and the etiology is controversial with possible causes that include postinflammatory changes related to prior peptic ulcer disease, Crohn's, or other inflammatory conditions, and a persistence of the juvenile form into adult life. Patient 3: The CT demonstrates gastric distention and a large amount of retained food not mixing with oral contrast. The antrum, pylorus, and bulb demonstrate irregular enhancing wall thickening and soft tissue infiltration around adjacent vessels highly suspicious for neoplasm. The wall thickening is more abrupt and the enhancement pattern more nodular than is seen in benign senile antral muscular hypertrophy. The most common malignant cause of gastric outlet obstruction is peripancreatic malignancy. Patient 4: The CT demonstrates gastric distention, intraperitoneal free air, and retroperitoneal fluid consistent with an inflammatory process in the setting of a perforated ulcer. The duodenal ulcer crater is identified (arrow) in this case, although it may seal off and not be detectable in many cases. Peptic ulcer disease is the most common cause of gastric outlet obstruction in the adult.\n\nReferences: Gibson JB, Behrman SW, Fabian TC, et al. Gastric outlet obstruction resulting from peptic ulcer disease requiring surgical intervention is infrequently associated with Helicobacter pylori infection. J Am Coll Surg 2000;191(1):32-37. Horton KM, Fishman EK. Current role of CT in imaging of the stomach. Radiographics 2003;23(1):75-87. Zarineh A, Leon ME, Saad RS, et al. Idiopathic hypertrophic pyloric stenosis in an adult, a potential mimic of gastric carcinoma. Patholog Res Int 2010;2010:614280. 13 Answer: 1-C; 2-A; 3-B; 4-D Bariatric surgery is currently the most effective treatment for morbid obesity. The most commonly performed procedures are the Roux-en-Y gastric bypass (RYGB), sleeve gastrectomy, adjustable gastric banding, and biliopancreatic diversion with duodenal switch. Example 1 demonstrates the adjustable gastric band performed laparoscopically (more commonly called the lap band), which involves placement of an inflatable band around the proximal stomach creating a small gastric pouch above the band. Advantages include easy reversibility with no resection of the stomach or intestine and lowest rate of early complications compared to all procedures. Later complications may be related to band slippage or erosion and less effective weight loss compared to other procedures. Example 2 is the Roux-en-Y gastric bypass (RYGB) also called gastric bypass. This procedure involves division of the proximal stomach with creation of a small gastric pouch (~30 cc). The proximal jejunum is divided, and a roux limb is attached to the gastric pouch. The roux (alimentary) limb is anastomosed to the jejunal limb draining the excluded stomach and duodenum (pancreaticobiliary limb) with both limbs draining into a common channel. This commonly performed procedure is effective for both weight loss and metabolic changes (amelioration of type II diabetes) and has been until recently considered the standard for bariatric surgical procedures. It is technically more difficult than some of the other procedures and disrupts the normal access to the biliopancreatic ducts for endoscopic evaluation. Example 3 shows a sleeve gastrectomy which involves a partial gastrectomy (~80% removed) with creation of a tubular stomach. This increasingly popular procedure is technically easier than some of the other procedures. It maintains the normal outlet anatomy, with preservation of access to the biliopancreatic ducts. Disadvantages are that it is nonreversible and has a longer staple line for potential disruption. It may be associated with increased gastroesophageal reflux. Example 4 shows staples associated with a sleeve gastrectomy and oral contrast in the duodenum and distal small bowel, but not in the intervening small bowel which is bypassed. This is a biliopancreatic diversion (now most commonly performed with duodenal switch), which involves a sleeve gastrectomy and anastomosis of a short (250 cm) roux limb to the proximal duodenum, bypassing a long segment of the small intestine. The pancreaticobiliary limb is anastomosed approximately 50 cm proximal to the ileocecal valve. This procedure involves both restrictive and significant malabsorptive effects. It promotes the greatest weight loss but has a higher complication rate than the other procedures and is also associated with greater potential for nutritional deficiencies.\n\nReferences: American Society for Metabolic and Bariatric Surgery. Bariatric Surgery Procedures. Available at: https://asmbs.org/patients/bariatric-surgery-procedures. Accessed June 4, 2020. Levine MS, Carucci LR. Imaging of bariatric surgery: normal anatomy and postoperative complications. Radiology 2014;270(2):327-341."}, {"number": "12a", "stem": "In these cases of gastric outlet obstruction, match the following images with the best diagnosis. Each answer may be used once only. Patient 1: A 39-year-old male with a history of vomiting after an ERCP. Patient 2: A 31-year-old male recently begun on a proton pump inhibitor with postprandial bloating. Patient 3: A 78-year-old female with early satiety. Patient 4: A 40-year-old male with severe acute abdominal pain. Select the best diagnosis for Patient 1.", "options": [{"letter": "A", "text": "Gastric carcinoma involving the antrum and duodenal bulb"}, {"letter": "B", "text": "Adult hypertrophic pyloric stenosis"}, {"letter": "C", "text": "Perforated duodenal ulcer"}, {"letter": "D", "text": "Duodenal hematoma"}], "images": ["assets/q12a_12b_12c_12d_p127_01.jpg", "assets/q12a_12b_12c_12d_p128_01.jpg", "assets/q12a_12b_12c_12d_p129_01.jpg", "assets/q12a_12b_12c_12d_p130_01.jpg", "assets/q12a_12b_12c_12d_p131_01.jpg", "assets/q12a_12b_12c_12d_p132_01.jpg", "assets/q12a_12b_12c_12d_p133_01.jpg", "assets/q12a_12b_12c_12d_p134_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "12 Answers: Patient 1: D Patient 2: B Patient 3: A Patient 4: C In the adult, gastric outlet obstruction may be caused by a variety of neoplastic, inflammatory, posttraumatic conditions. Congenital abnormalities, not included here such as duodenal atresia and annular pancreas, are additional causes that may present earlier in life. Patient 1: The CT demonstrates gastric distention and an ovoid circumscribed structure adjacent to the horizontal portion of the duodenum with mildly hyperdense contents consistent with a hematoma. These may be due to lap-belt injuries or other iatrogenic causes, as in this case with an ERCP. Patient 2: The upper GI and CT demonstrate gastric distention and long smooth narrowing of the pylorus with smooth muscular hypertrophy seen as a hypodense parallel structures on the CT, suggesting adult hypertrophic pyloric stenosis. This condition is rare, and the etiology is controversial with possible causes that include postinflammatory changes related to prior peptic ulcer disease, Crohn's, or other inflammatory conditions, and a persistence of the juvenile form into adult life. Patient 3: The CT demonstrates gastric distention and a large amount of retained food not mixing with oral contrast. The antrum, pylorus, and bulb demonstrate irregular enhancing wall thickening and soft tissue infiltration around adjacent vessels highly suspicious for neoplasm. The wall thickening is more abrupt and the enhancement pattern more nodular than is seen in benign senile antral muscular hypertrophy. The most common malignant cause of gastric outlet obstruction is peripancreatic malignancy. Patient 4: The CT demonstrates gastric distention, intraperitoneal free air, and retroperitoneal fluid consistent with an inflammatory process in the setting of a perforated ulcer. The duodenal ulcer crater is identified (arrow) in this case, although it may seal off and not be detectable in many cases. Peptic ulcer disease is the most common cause of gastric outlet obstruction in the adult. References: Gibson JB, Behrman SW, Fabian TC, et al. Gastric outlet obstruction resulting from peptic ulcer disease requiring surgical intervention is infrequently associated with Helicobacter pylori infection. J Am Coll Surg 2000;191(1):32-37. Horton KM, Fishman EK. Current role of CT in imaging of the stomach. Radiographics 2003;23(1):75-87. Zarineh A, Leon ME, Saad RS, et al. Idiopathic hypertrophic pyloric stenosis in an adult, a potential mimic of gastric carcinoma. Patholog Res Int 2010;2010:614280."}, {"number": "12b", "stem": "In these cases of gastric outlet obstruction, match the following images with the best diagnosis. Each answer may be used once only. Patient 1: A 39-year-old male with a history of vomiting after an ERCP. Patient 2: A 31-year-old male recently begun on a proton pump inhibitor with postprandial bloating. Patient 3: A 78-year-old female with early satiety. Patient 4: A 40-year-old male with severe acute abdominal pain. Select the best diagnosis for Patient 2.", "options": [{"letter": "A", "text": "Gastric carcinoma involving the antrum and duodenal bulb"}, {"letter": "B", "text": "Adult hypertrophic pyloric stenosis"}, {"letter": "C", "text": "Perforated duodenal ulcer"}, {"letter": "D", "text": "Duodenal hematoma"}], "images": ["assets/q12a_12b_12c_12d_p127_01.jpg", "assets/q12a_12b_12c_12d_p128_01.jpg", "assets/q12a_12b_12c_12d_p129_01.jpg", "assets/q12a_12b_12c_12d_p130_01.jpg", "assets/q12a_12b_12c_12d_p131_01.jpg", "assets/q12a_12b_12c_12d_p132_01.jpg", "assets/q12a_12b_12c_12d_p133_01.jpg", "assets/q12a_12b_12c_12d_p134_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "12 Answers: Patient 1: D Patient 2: B Patient 3: A Patient 4: C In the adult, gastric outlet obstruction may be caused by a variety of neoplastic, inflammatory, posttraumatic conditions. Congenital abnormalities, not included here such as duodenal atresia and annular pancreas, are additional causes that may present earlier in life. Patient 1: The CT demonstrates gastric distention and an ovoid circumscribed structure adjacent to the horizontal portion of the duodenum with mildly hyperdense contents consistent with a hematoma. These may be due to lap-belt injuries or other iatrogenic causes, as in this case with an ERCP. Patient 2: The upper GI and CT demonstrate gastric distention and long smooth narrowing of the pylorus with smooth muscular hypertrophy seen as a hypodense parallel structures on the CT, suggesting adult hypertrophic pyloric stenosis. This condition is rare, and the etiology is controversial with possible causes that include postinflammatory changes related to prior peptic ulcer disease, Crohn's, or other inflammatory conditions, and a persistence of the juvenile form into adult life. Patient 3: The CT demonstrates gastric distention and a large amount of retained food not mixing with oral contrast. The antrum, pylorus, and bulb demonstrate irregular enhancing wall thickening and soft tissue infiltration around adjacent vessels highly suspicious for neoplasm. The wall thickening is more abrupt and the enhancement pattern more nodular than is seen in benign senile antral muscular hypertrophy. The most common malignant cause of gastric outlet obstruction is peripancreatic malignancy. Patient 4: The CT demonstrates gastric distention, intraperitoneal free air, and retroperitoneal fluid consistent with an inflammatory process in the setting of a perforated ulcer. The duodenal ulcer crater is identified (arrow) in this case, although it may seal off and not be detectable in many cases. Peptic ulcer disease is the most common cause of gastric outlet obstruction in the adult. References: Gibson JB, Behrman SW, Fabian TC, et al. Gastric outlet obstruction resulting from peptic ulcer disease requiring surgical intervention is infrequently associated with Helicobacter pylori infection. J Am Coll Surg 2000;191(1):32-37. Horton KM, Fishman EK. Current role of CT in imaging of the stomach. Radiographics 2003;23(1):75-87. Zarineh A, Leon ME, Saad RS, et al. Idiopathic hypertrophic pyloric stenosis in an adult, a potential mimic of gastric carcinoma. Patholog Res Int 2010;2010:614280."}, {"number": "12c", "stem": "In these cases of gastric outlet obstruction, match the following images with the best diagnosis. Each answer may be used once only. Patient 1: A 39-year-old male with a history of vomiting after an ERCP. Patient 2: A 31-year-old male recently begun on a proton pump inhibitor with postprandial bloating. Patient 3: A 78-year-old female with early satiety. Patient 4: A 40-year-old male with severe acute abdominal pain. Select the best diagnosis for Patient 3.", "options": [{"letter": "A", "text": "Gastric carcinoma involving the antrum and duodenal bulb"}, {"letter": "B", "text": "Adult hypertrophic pyloric stenosis"}, {"letter": "C", "text": "Perforated duodenal ulcer"}, {"letter": "D", "text": "Duodenal hematoma"}], "images": ["assets/q12a_12b_12c_12d_p127_01.jpg", "assets/q12a_12b_12c_12d_p128_01.jpg", "assets/q12a_12b_12c_12d_p129_01.jpg", "assets/q12a_12b_12c_12d_p130_01.jpg", "assets/q12a_12b_12c_12d_p131_01.jpg", "assets/q12a_12b_12c_12d_p132_01.jpg", "assets/q12a_12b_12c_12d_p133_01.jpg", "assets/q12a_12b_12c_12d_p134_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "12 Answers: Patient 1: D Patient 2: B Patient 3: A Patient 4: C In the adult, gastric outlet obstruction may be caused by a variety of neoplastic, inflammatory, posttraumatic conditions. Congenital abnormalities, not included here such as duodenal atresia and annular pancreas, are additional causes that may present earlier in life. Patient 1: The CT demonstrates gastric distention and an ovoid circumscribed structure adjacent to the horizontal portion of the duodenum with mildly hyperdense contents consistent with a hematoma. These may be due to lap-belt injuries or other iatrogenic causes, as in this case with an ERCP. Patient 2: The upper GI and CT demonstrate gastric distention and long smooth narrowing of the pylorus with smooth muscular hyp r an ERCP. Patient 2: A 31-year-old male recently begun on a proton pump inhibitor with postprandial bloating. Patient 3: A 78-year-old female with early satiety. Patient 4: A 40-year-old male with severe acute abdominal pain. Select the best diagnosis for Patient 4.", "options": [{"letter": "A", "text": "Gastric carcinoma involving the antrum and duodenal bulb"}, {"letter": "B", "text": "Adult hypertrophic pyloric stenosis"}, {"letter": "C", "text": "Perforated duodenal ulcer"}, {"letter": "D", "text": "Duodenal hematoma"}], "images": ["assets/q12a_12b_12c_12d_p127_01.jpg", "assets/q12a_12b_12c_12d_p128_01.jpg", "assets/q12a_12b_12c_12d_p129_01.jpg", "assets/q12a_12b_12c_12d_p130_01.jpg", "assets/q12a_12b_12c_12d_p131_01.jpg", "assets/q12a_12b_12c_12d_p132_01.jpg", "assets/q12a_12b_12c_12d_p133_01.jpg", "assets/q12a_12b_12c_12d_p134_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "12 Answers: Patient 1: D Patient 2: B Patient 3: A Patient 4: C In the adult, gastric outlet obstruction may be caused by a variety of neoplastic, inflammatory, posttraumatic conditions. Congenital abnormalities, not included here such as duodenal atresia and annular pancreas, are additional causes that may present earlier in life. Patient 1: The CT demonstrates gastric distention and an ovoid circumscribed structure adjacent to the horizontal portion of the duodenum with mildly hyperdense contents consistent with a hematoma. These may be due to lap-belt injuries or other iatrogenic causes, as in this case with an ERCP. Patient 2: The upper GI and CT demonstrate gastric distention and long smooth narrowing of the pylorus with smooth muscular hypertrophy seen as a hypodense parallel structures on the CT, suggesting adult hypertrophic pyloric stenosis. This condition is rare, and the etiology is controversial with possible causes that include postinflammatory changes related to prior peptic ulcer disease, Crohn's, or other inflammatory conditions, and a persistence of the juvenile form into adult life. Patient 3: The CT demonstrates gastric distention and a large amount of retained food not mixing with oral contrast. The antrum, pylorus, and bulb demonstrate irregular enhancing wall thickening and soft tissue infiltration around adjacent vessels highly suspicious for neoplasm. The wall thickening is more abrupt and the enhancement pattern more nodular than is seen in benign senile antral muscular hypertrophy. The most common malignant cause of gastric outlet obstruction is peripancreatic malignancy. Patient 4: The CT demonstrates gastric distention, intraperitoneal free air, and retroperitoneal fluid consistent with an inflammatory process in the setting of a perforated ulcer. The duodenal ulcer crater is identified (arrow) in this case, although it may seal off and not be detectable in many cases. Peptic ulcer disease is the most common cause of gastric outlet obstruction in the adult. References: Gibson JB, Behrman SW, Fabian TC, et al. Gastric outlet obstruction resulting from peptic ulcer disease requiring surgical intervention is infrequently associated with Helicobacter pylori infection. J Am Coll Surg 2000;191(1):32-37. Horton KM, Fishman EK. Current role of CT in imaging of the stomach. Radiographics 2003;23(1):75-87. Zarineh A, Leon ME, Saad RS, et al. Idiopathic hypertrophic pyloric stenosis in an adult, a potential mimic of gastric carcinoma. Patholog Res Int 2010;2010:614280."}, {"number": "13a", "stem": "Identify the following bariatric surgical procedures: Identify Example 1.", "options": [{"letter": "A", "text": "Roux-en-Y gastric bypass"}, {"letter": "B", "text": "Sleeve gastrectomy"}, {"letter": "C", "text": "Adjustable gastric band (lap band)"}, {"letter": "D", "text": "Biliopancreatic diversion with duodenal switch"}], "images": ["assets/q13a_13b_13c_13d_p135_01.jpg", "assets/q13a_13b_13c_13d_p136_01.jpg", "assets/q13a_13b_13c_13d_p136_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "13 Answer: 1-C; 2-A; 3-B; 4-D Bariatric surgery is currently the most effective treatment for morbid obesity. The most commonly performed procedures are the Roux-en-Y gastric bypass (RYGB), sleeve gastrectomy, adjustable gastric banding, and biliopancreatic diversion with duodenal switch. Example 1 demonstrates the adjustable gastric band performed laparoscopically (more commonly called the lap band), which involves placement of an inflatable band around the proximal stomach creating a small gastric pouch above the band. Advantages include easy reversibility with no resection of the stomach or intestine and lowest rate of early complications compared to all procedures. Later complications may be related to band slippage or erosion and less effective weight loss compared to other procedures. Example 2 is the Roux-en-Y gastric bypass (RYGB) also called gastric bypass. This procedure involves division of the proximal stomach with creation of a small gastric pouch (~30 cc). The proximal jejunum is divided, and a roux limb is attached to the gastric pouch. The roux (alimentary) limb is anastomosed to the jejunal limb draining the excluded stomach and duodenum (pancreaticobiliary limb) with both limbs draining into a common channel. This commonly performed procedure is effective for both weight loss and metabolic changes (amelioration of type II diabetes) and has been until recently considered the standard for bariatric surgical procedures. It is technically more difficult than some of the other procedures and disrupts the normal access to the biliopancreatic ducts for endoscopic evaluation. Example 3 shows a sleeve gastrectomy which involves a partial gastrectomy (~80% removed) with creation of a tubular stomach. This increasingly popular procedure is technically easier than some of the other procedures. It maintains the normal outlet anatomy, with preservation of access to the biliopancreatic ducts. Disadvantages are that it is nonreversible and has a longer staple line for potential disruption. It may be associated with increased gastroesophageal reflux. Example 4 shows staples associated with a sleeve gastrectomy and oral contrast in the duodenum and distal small bowel, but not in the intervening small bowel which is bypassed. This is a biliopancreatic diversion (now most commonly performed with duodenal switch), which involves a sleeve gastrectomy and anastomosis of a short (250 cm) roux limb to the proximal duodenum, bypassing a long segment of the small intestine. The pancreaticobiliary limb is anastomosed approximately 50 cm proximal to the ileocecal valve. This procedure involves both restrictive and significant malabsorptive effects. It promotes the greatest weight loss but has a higher complication rate than the other procedures and is also associated with greater potential for nutritional deficiencies. References: American Society for Metabolic and Bariatric Surgery. Bariatric Surgery Procedures. Available at: https://asmbs.org/patients/bariatric-surgery-procedures. Accessed June 4, 2020. Levine MS, Carucci LR. Imaging of bariatric surgery: normal anatomy and postoperative complications. Radiology 2014;270(2):327-341."}, {"number": "13b", "stem": "Identify the following bariatric surgical procedures: Identify Example 2.", "options": [{"letter": "A", "text": "Roux-en-Y gastric bypass"}, {"letter": "B", "text": "Sleeve gastrectomy"}, {"letter": "C", "text": "Adjustable gastric band (lap band)"}, {"letter": "D", "text": "Biliopancreatic diversion with duodenal switch"}], "images": ["assets/q13a_13b_13c_13d_p135_01.jpg", "assets/q13a_13b_13c_13d_p136_01.jpg", "assets/q13a_13b_13c_13d_p136_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "13 Answer: 1-C; 2-A; 3-B; 4-D Bariatric surgery is currently the most effective treatment for morbid obesity. The most commonly performed procedures are the Roux-en-Y gastric bypass (RYGB), sleeve gastrectomy, adjustable gastric banding, and biliopancreatic diversion with duodenal switch. E 50 cm proximal to the ileocecal valve. This procedure involves both restrictive and significant malabsorptive effects. It promotes the greatest weight loss but has a higher complication rate than the other procedures and is also associated with greater potential for nutritional deficiencies. References: American Society for Metabolic and Bariatric Surgery. Bariatric Surgery Procedures. Available at: https://asmbs.org/patients/bariatric-surgery-procedures. Accessed June 4, 2020. Levine MS, Carucci LR. Imaging of bariatric surgery: normal anatomy and postoperative complications. Radiology 2014;270(2):327-341."}, {"number": "13d", "stem": "Identify the following bariatric surgical procedures: Identify Example 4.", "options": [{"letter": "A", "text": "Roux-en-Y gastric bypass"}, {"letter": "B", "text": "Sleeve gastrectomy"}, {"letter": "C", "text": "Adjustable gastric band (lap band)"}, {"letter": "D", "text": "Biliopancreatic diversion with duodenal switch"}], "images": ["assets/q13a_13b_13c_13d_p135_01.jpg", "assets/q13a_13b_13c_13d_p136_01.jpg", "assets/q13a_13b_13c_13d_p136_02.jpg"], "explanationImages": [], "answer": "D", "explanation": "13 Answer: 1-C; 2-A; 3-B; 4-D Bariatric surgery is currently the most effective treatment for morbid obesity. The most commonly performed procedures are the Roux-en-Y gastric bypass (RYGB), sleeve gastrectomy, adjustable gastric banding, and biliopancreatic diversion with duodenal switch. Example 1 demonstrates the adjustable gastric band performed laparoscopically (more commonly called the lap band), which involves placement of an inflatable band around the proximal stomach creating a small gastric pouch above the band. Advantages include easy reversibility with no resection of the stomach or intestine and lowest rate of early complications compared to all procedures. Later complications may be related to band slippage or erosion and less effective weight loss compared to other procedures. Example 2 is the Roux-en-Y gastric bypass
