Small bowel Crohn disease at CT and MR enterography: imaging atlas and glossary of terms. Radiographics 2020;40(2):354-375."}, {"number": "1e", "stem": "Match the following images of patients with small bowel Crohn disease with the findings on MR enterography or CT enterography (each choice may be used only once): Patient 1 T1 post contrast. T2 fast spin echo. Patient 2 Patient 3 Patient 4 Patient 5 Patient 6 Patient 7 Select the finding for Patient 5.", "options": [{"letter": "A", "text": "Pseudosacculations"}, {"letter": "B", "text": "Engorgement of vasa recta"}, {"letter": "C", "text": "Penetrating disease with fistulae and abscess"}, {"letter": "D", "text": "Intramural ulceration"}, {"letter": "E", "text": "Stricture"}, {"letter": "F", "text": "Mural enhancement"}, {"letter": "G", "text": "Fat halo and creeping fat"}], "images": ["assets/q1a_p188_01.jpg", "assets/q1b_p189_01.jpg", "assets/q1c_p190_01.jpg", "assets/q1d_p191_01.jpg", "assets/q1e_p192_01.jpg", "assets/q1f_p193_01.jpg", "assets/q1g_p194_01.jpg"], "explanationImages": [], "answer": "G", "explanation": "1 Answers: Patient 1: F. Mural enhancement. MR enterography demonstrates wall thickening of the terminal ileum on T2-weighted images. Postcontrast T1-weighted images demonstrate segmental mural wall hyperenhancement, which indicates active disease. The enhancement in this case is symmetric, but when asymmetric along the mesenteric border is even more specific for Crohn disease. Patient 2: E. Stricture. Dilated small bowel loops with segmental stricture is seen. Small bowel stool sign indicates chronic obstruction. The term \"luminal narrowing\" is used when the luminal diameter is reduced at least 50% compared to normal adjacent bowel. The term \"stricture\" should be reserved for when luminal narrowing is accompanied by upstream luminal dilation (â‰¥3 cm). Patient 3: D. Intramural ulceration. In addition to the stratified mural wall thickening, there is a focal ulceration in the wall noted at the arro n other conditions (postinfectious or ischemic disease for example). Prominent fibrofatty proliferation of the mesentery adjacent to inflamed bowel loops is known as \"creeping fat.\" Patient 6: C. Penetrating disease with fistula and abscess. Extraluminal soft tissue tracts extending into the mesentery with a localized collection of oral contrast and gas is demonstrated. Penetrating disease associated with Crohn's includes fistulae, sinus tracts, inflammatory masses, and abscesses. Patient 7: A. Pseudosacculations. Smooth wall thickening along the mesenteric border is seen with redundant wall on the antimesenteric border, resulting in a ruffled appearance, known as pseudosacculations. The redundant wall is the normal wall. References: Bruining DH, Zimmermann EM, Loftus EV Jr, et al. Consensus recommendations for evaluation, interpretation, and utilization of computed tomography and magnetic resonance enterography in patients with small bowel Crohn's Disease. Radiology 2018;286(3):776-799. Guglielmo FF, Anupindi SA, Fletcher JG, et al. Small bowel Crohn disease at CT and MR enterography: imaging atlas and glossary of terms. Radiographics 2020;40(2):354-375."}, {"number": "1g", "stem": "Match the following images of patients with small bowel Crohn disease with the findings on MR enterography or CT enterography (each choice may be used only once): Patient 1 T1 post contrast. T2 fast spin echo. Patient 2 Patient 3 Patient 4 Patient 5 Patient 6 Patient 7 Select the finding for Patient 7.", "options": [{"letter": "A", "text": "Pseudosacculations"}, {"letter": "B", "text": "Engorgement of vasa recta"}, {"letter": "C", "text": "Penetrating disease with fistulae and abscess"}, {"letter": "D", "text": "Intramural ulceration"}, {"letter": "E", "text": "Stricture"}, {"letter": "F", "text": "Mural enhancement"}, {"letter": "G", "text": "Fat halo and creeping fat"}], "images": ["assets/q1a_p188_01.jpg", "assets/q1b_p189_01.jpg", "assets/q1c_p190_01.jpg", "assets/q1d_p191_01.jpg", "assets/q1e_p192_01.jpg", "assets/q1f_p193_01.jpg", "assets/q1g_p194_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "1 Answers: Patient 1: F. Mural enhancement. MR enterography demonstrates wall thickening of the terminal ileum on T2-weighted images. Postcontrast T1-weighted images demonstrate segmental mural wall hyperenhancement, which indicates active disease. The enhancement in this case is symmetric, but when asymmetric along the mesenteric border is even more specific for Crohn disease. Patient 2: E. Stricture. Dilated small bowel loops with segmental stricture is seen. Small bowel stool sign indicates chronic obstruction. The term \"luminal narrowing\" is used when the luminal diameter is reduced at least 50% compared to normal adjacent bowel. The term \"stricture\" should be reserved for when luminal narrowing is accompanied by upstream luminal dilation (â‰¥3 cm). Patient 3: D. Intramural ulceration. In addition to the stratified mural wall thickening, there is a focal ulceration in the wall noted at the arrow. Patient 4: B. Engorgement of vasa recta. Prominent mesenteric vessels supplying and draining a segment of inflamed bowel is also known as the \"comb\" sign. Patient 5: G. Fat halo and creeping fat. Intramural fat deposition may be seen in chronic inflammatory conditions involving the gastrointestinal tract. It is common in inflammatory bowel disease involving the small bowel and colon, also called a \"fat halo\" appearance, though it is not specific and can be seen in other conditions (postinfectious or ischemic disease for example). Prominent fibrofatty proliferation of the mesentery adjacent to inflamed bowel loops is known as \"creeping fat.\" Patient 6: C. Penetrating disease with fistula and abscess. Extraluminal soft tissue tracts extending into the mesentery with a localized collection of oral contrast and gas is demonstrated. Penetrating disease associated with Crohn's includes fistulae, sinus tracts, inflammatory masses, and abscesses. Patient 7: A. Pseudosacculations. Smooth wall thickening along the mesenteric border is seen with redundant wall on the antimesenteric border, resulting in a ruffled appearance, known as pseudosacculations. The redundant wall is the normal wall. References: Bruining DH, Zimmermann EM, Loftus EV Jr, et al. Consensus recommendations for evaluation, interpretation, and utilization of computed tomography and magnetic resonance enterography in patients with small bowel Crohn's Disease. Radiology 2018;286(3):776-799. Guglielmo FF, Anupindi SA, Fletcher JG, et al. Small bowel Crohn disease at CT and MR enterography: imaging atlas and glossary of terms. Radiographics 2020;40(2):354-375."}, {"number": "2a", "stem": "A 23-year-old female has a 5-year history of cramping abdominal pain and occasional diarrhea. Stool tests demonstrate increased fat. She undergoes a small bowel follow-through. What diagnosis is suggested by the findings?", "options": [{"letter": "A", "text": "Celiac disease"}, {"letter": "B", "text": "Crohn disease"}, {"letter": "C", "text": "Zollinger-Ellison syndrome"}, {"letter": "D", "text": "Giardiasis"}], "images": ["assets/q2a_p195_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The findings on this small bowel follow-through (SBFT) demonstrate dilated loops of jejunum with thin but relatively widely spaced folds (normal fold density is 4 to 6 per inch). A coiled-spring filling defect in a loop of jejunum is also present consistent with an intussusception. The findings are consistent with findings of celiac sprue. The other conditions listed, Crohn disease, Zollinger-Ellison syndrome, and giardiasis, are all associated with thickened folds. Celiac sprue is an autoimmune disease resulting from a genetically based reaction to a protein component of gluten found in wheat, barley, and rye. Patients may present in early childhood or as young adults. Diagnosis is made with jejunal biopsy and serologic testing. Despite the relatively high prevalence of celiac disease in the US population (1 in 200), presentation is nonspecific, and diagnosis is often delayed. Inflammation caused by the reaction to the protein leads to villous atrophy and malabsorption, especially to fats. The classic findings on barium studies include dilution, dilatation, reversal of the normal fold pattern with decreased jejunal and increased ileal fold density (jejunization of the ileum), and transient jejunal intussusception. As current practice has evolved, most patients presenting with abdominal pain will undergo a CT rather than a SBFT. Findings of small bowel dilatation, jejunization of the ileum, and intussusceptions may be recognized on CT. Other findings associated with celiac disease include prominent mesenteric lymph nodes and intramural fat deposition observed in the duodenum, jejunum, and colon, as seen with other chronic inflammatory conditions. Jejunization of the ileum."}, {"number": "2b", "stem": "The most common malignancy associated with untreated celiac disease is", "options": [{"letter": "A", "text": "Squamous cell carcinoma of the esophagus"}, {"letter": "B", "text": "T-cell lymphoma of the small bowel"}, {"letter": "C", "text": "Adenocarcinoma of the small bowel"}, {"letter": "D", "text": "Ovarian carcinoma"}], "images": ["assets/q2a_p195_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Patients with untreated celiac disease have an increased risk of developing malignancy, most commonly lymphoma (T-cell) and less commonly adenocarcinoma or squamous cell carcinoma. Other malignancies that are less commonly associated include oropharyngeal, ovarian, thyroid, breast, and lung cancers."}, {"number": "3", "stem": "A 33-year-old male presents with malaise, right lower quadrant pain, and high fever of 2 day's duration. He has a significant leukocytosis. He has been previously very healthy. An abdominal CT is performed. The most likely diagnosis is:", "options": [{"letter": "A", "text": "Ulcerative colitis with backwash ileitis"}, {"letter": "B", "text": "Infectious enterocolitis"}, {"letter": "C", "text": "Crohn disease"}, {"letter": "D", "text": "Lymphoma"}], "images": ["assets/q3_p196_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. On the CT, the terminal ileum and to a lesser extent the cecum demonstrate wall thickening. The acute onset of findings and the patient's age do not favor a malignancy. Backwash ileitis in the setting of ulcerative colitis most commonly results in a patulous terminal ileum, not a narrowed lumen as seen in this case. Although Crohn disease may present with the same imaging findings in a young patient, a history of chronic symptoms would be expected. The relatively acute onset is consistent with an infectious etiology. In the developed world, Campylobacter jejuni is the most common cause of bacterial gastroenteritis, with other pathogens including Escherichia coli, Salmonella (nontyphoidal), and Shigella species. Viral gastroenteritis pathogens include rotavirus, norovirus, and adenovirus. These diseases are self- limited but may be more serious and even life-threatening in children, older patients, pregnant patients, or people with immunodeficiency. In this case, the patient was admitted to the hospital due to the severity of his symptoms, and blood cultures were positive for Salmonella enterica serotype typhi. Additional history obtained included recent travel to a developing country. The typhoidal type of Salmonella infection is usually caused by fecally contaminated food or water causing a systemic illness with little or no diarrhea. Typhoid fever is uncommon in the United States but is still endemic in areas of the world with poor sanitation.\n\nReferences: Hennedige T, Bindl DS, Bhasin A, et al. Spectrum of imaging findings in Salmonella infections. AJR Am J Roentgenol 2012;198(6):W534-W539. Parry CM, Hien TT, Dougan G, et al. Typhoid fever. N Engl J Med 2002;347(22):1770-1782."}, {"number": "4", "stem": "A 33-year-old male with a history of asthma and multiple food allergies (but not to gluten) presents for evaluation of chronic intermittent abdominal pain. A small bowel follow-through and a CT scan are performed. What diagnosis may best fit this clinical presentation?", "options": [{"letter": "A", "text": "Zollinger-Ellison syndrome"}, {"letter": "B", "text": "Celiac sprue"}, {"letter": "C", "text": "Giardiasis"}, {"letter": "D", "text": "Eosinophilic enteritis"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The small bowel follow-through demonstrates mild fold thickening of the duodenum and jejunum with the CT demonstrating even more pronounced wall thickening of multiple loops of proximal and mid small bowel. Although such small bowel fold thickening is nonspecific, with the atopic history of this patient, the possibility of eosinophilic enteritis is suggested. Celiac sprue is excluded given the absence of a wheat product intolerance, and the other causes of small bowel fold thickening do not have the same association with allergies. Eosinophilic enteritis is a rare condition with eosinophilic infiltration of the gastrointestinal tract. It can be primary or associated with other hypereosinophilic conditions such as Churg-Strauss, helminthic infection, hypereosinophilic syndrome, or drugs. The condition has a high association with atopy, with peripheral eosinophilia present in 75% to 100% of patients. Increased production of interleukin-5 and activated eosinophils are present. It can involve many segments of the gastrointestinal tract from the esophagus to the rectum but is most common in the stomach and small bowel. It can involve variable layers of the gut wall from the mucosa to the serosa; with the more severe serosal involvement, ascites and pleural effusions may be seen. Treatment is with corticosteroids or other immunosuppressives and dietary restriction.\n\nReferences: Shanbhogue AK, Prasad SR, Jagirdar J, et al. Comprehensive update on select immune-mediated gastroenterocolitis syndromes: implications for diagnosis and management. Radiographics 2010;30(6):1465-1487. Triantafillidis JK, Parasi A, Cherakakis P, et al. Eosinophilic gastroenteritis: current aspects on etiology, pathogenesis, diagnosis and treatment. Ann Gastroenterol 2005;15(2):106-115."}, {"number": "5", "stem": "A 68-year-old female with a history of total abdominal hysterectomy and bilateral salpingo- oophorectomy for cervical cancer with positive nodes presents 3 years later with cramping abdominal pain. A CT is obtained. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Graft versus host disease"}, {"letter": "B", "text": "Late-stage chemotherapy enteritis"}, {"letter": "C", "text": "Recurrent tumor"}, {"letter": "D", "text": "Chronic radiation enteritis"}], "images": ["assets/q5_p199_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The CT demonstrates diffuse wall thickening of multiple loops of bowel in the pelvis with sparing of bowel loops in the upper abdomen. This patient with node-positive cervical cancer is likely to have had adjuvant radiation (brachytherapy or combined external beam radiation and brachytherapy). Chronic radiation enteritis develops between 6 months and 7 years after radiotherapy. This condition may develop in 20% or more of patients who undergo abdominopelvic radiotherapy. Increased risk for development of radiation enteritis is seen in patients with a history of prior surgery or peritonitis, which may cause fixation of bowel loops and with superimposed small vessel disease such as with diabetes. The gastrointestinal tract is sensitive to radiation, and most patients will develop some diarrhea in the acute phase of radiation enteritis. The bowel segments that are most susceptible are those that are fixed, typically the terminal ileum and rectosigmoid in cases of pelvic radiation. On a small bowel follow-through, radiation changes manifest as fold thickening or effacement with tethering and fixed angulation of bowel loops best appreciated with directed palpation. Graft versus host disease is typically seen in the setting of bone marrow transplantation for leukemia. Chemotherapy-related enteritis would be seen in the acute setting and would be diffuse, not isolated to the pelvis. Likewise, while recurrent tumor from carcinomatosis may cause bowel wall thickening from serosal implants, it would be unlikely to be so extensive in the pelvis without some involvement of the upper abdominal bowel loops.\n\nReferences: Addley HC, Vargas HA, Moyle PL, et al. Pelvic imaging following chemotherapy and radiation therapy for gynecologic malignancies. Radiographics 2010;30(7):1843-1856. Rha SE, Ha HK, Lee SH, et al. CT and MR imaging findings of bowel ischemia from various primary causes. Radiographics 2000;20(1):29-42."}, {"number": "6", "stem": "A 39-year-old female with a history of bloating and postprandial abdominal pain has a CT scan. A capsule endoscopy was originally planned, but based upon the CT findings, a small bowel follow- through was performed. What is a likely etiology for the findings?", "options": [{"letter": "A", "text": "Adenocarcinoma"}, {"letter": "B", "text": "Congenital atresia"}, {"letter": "C", "text": "Crohn disease"}, {"letter": "D", "text": "Nonsteroidal anti-inflammatory drug (NSAID)"}], "images": ["assets/q6_p201_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The initial CT demonstrates dilatation of a loop of jejunum with a fold that appears to extend significantly into the lumen. This is confirmed on the small bowel follow-through as a smooth circumferential web with a narrow aperture (\"diaphragm disease \"). Webs may be due to congenital atresia, but these present in the pediatric age group. The web is too short and smooth to be associated with a neoplasm or a Crohn stricture. Nonsteroidal anti-inflammatory drugs (NSAIDs) are associated with small bowel injuries in up to two-thirds of all patients who have used the drugs on a long-term basis. These injuries include erosions and ulcers, which may bleed or rarely perforate. They can also cause thin, diaphragm-like strictures, which are thought to be due to local ischemic effects caused by the prostaglandin inhibitory properties of the NSAIDs. These webs may be difficult to diagnose on imaging if they are nonobstructive due to their resemblance to normal plicae. Although the increased use of capsule endoscopy has been instrumental in documenting the high prevalence of small bowel injuries from NSAIDs, a capsule endoscopy should not be performed in this patient due to likelihood of capsular retention.\n\nReferences: Fortun PJ, Hawkey CJ. Nonsteroidal antiinflammatory drugs and the small intestine. Curr Opin Gastroenterol 2007;23(2):134-141. Higuchi K, Umegaki E, Watanabe T, et al. Present status and strategy of NSAIDs-induced small bowel injury. J Gastroenterol 2009;44(9):879-888."}, {"number": "7", "stem": "A 56-year-old male presented to the emergency department with a history of 2-day acute onset of severe abdominal pain and nausea. He is afebrile, in normal sinus rhythm, but has a mild leukocytosis. An abdominopelvic CT is performed. Images revealed no vascular occlusions. His medication list is reviewed. Which medication is most likely related to the findings on CT?", "options": [{"letter": "A", "text": "Aspirin"}, {"letter": "B", "text": "Propranolol (beta-blocker)"}, {"letter": "C", "text": "Lisinopril (angiotensin-converting enzyme inhibitor)"}, {"letter": "D", "text": "Omeprazole (proton pump inhibitor)"}], "images": ["assets/q7_p202_01.jpg", "assets/q7_p202_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Findings on the CT are of marked wall thickening of loops of small bowel without evidence of luminal dilatation to suggest obstruction. These findings are described with angioedema of the intestine. Angioedema is a rare side effect reported with the use of angiotensin-converting-enzyme inhibitors (ACEI), a commonly used antihypertensive medication. Up to 0.5% of patients receiving these ACEI medications may experience angioedema episodes. This condition is thought to be due to elevated levels of bradykinin, a potent vasodilator and cause of increased capillary permeability. ACEI cause delayed breakdown of bradykinin. There may be a single or recurrent episodes of edema involving the skin, upper airways, or the gastrointestinal tract. The onset of the initial angioedema episode may be within several days of initiation of the medication or may occur years after the initiation of therapy. The clinical presentation is with abdominal pain, nausea, vomiting, and diarrhea. Both the severe pain and the CT appearance may be mistaken for bowel ischemia. The episodes are self-limited and improvement is not related to cessation of the medication. Serum measurements of C4 and C1- esterase inhibitor may be helpful in confirming the diagnosis. On CT, bowel wall edema is seen which may lead to a target appearance. Due to the edema, the bowel may be straightened in appearance. There is no obstruction or delay in transit time. A small amount of ascites is often seen. These findings overlap with those that may be seen with intestinal ischemia, Crohn disease, and severe enteritis. Due to the severity of the pain and concern for ischemia, a number of patients with this condition have been taken for emergency exploratory laparotomy. History of ACEI medication, absence of patient risk factors for occlusive vascular disease, as well as a possible history of prior episodes with abrupt onset and remission, may help lead to this diagnosis.\n\nReferences: De Backer AI, De Schepper AM, Vandevenne JE, et al. CT of angioedema of the small bowel. AJR Am J Roentgenol 2001;176(3):649-652. Scheirey CD, Scholz FJ, Shortsleeve MJ, et al. Angiotensin-converting enzyme inhibitor-induced small-bowel angioedema: clinical and imaging findings in 20 patients. AJR Am J Roentgenol 2011;197(2):393-398."}, {"number": "8", "stem": "A 16-year-old male presents with chronic cramping abdominal pain. What is the diagnosis?", "options": [{"letter": "A", "text": "Anisakis"}, {"letter": "B", "text": "Ascaris"}, {"letter": "C", "text": "Hookworm"}, {"letter": "D", "text": "Trichuris"}], "images": ["assets/q8_p203_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The finding shows a tubular filling defect in the small bowel with a central tract also containing barium. All of the listed parasites are nematodes (roundworms). This example illustrates a large roundworm consistent with an ascarid. Soil-transmitted helminth infections infect >1.5 billion people worldwide or about 24% of the world's population. Infections occur in the tropical and subtropical regions of the world. In the United States, infections are most commonly seen in the southeastern region. These infections are transmitted by eggs present in human feces which contaminate soil in areas with poor sanitation. The main species that infect people are the roundworm (Ascaris lumbricoides), the whipworm (Trichuris trichiura), and the hookworms (Necator americanus and Ancylostoma duodenale). Ascaris lumbricoides is the largest nematode involving the human GI tract. In the United States, ascariasis is the third most frequent helminthic infection, following hookworm and Trichuris (whipworm). Ascaris infection may be asymptomatic, but a large worm burden can cause bowel obstruction. The ascarid may obstruct the biliary and pancreatic ducts causing cholangitis and pancreatitis. The worm's intestinal tract may be visible when it ingests the barium.\n\nReferences: Khuroo MS. Ascariasis. Gastroenterol Clin North Am 1996;25(3):553-577. Ortega CD, Ogawa NY, Rocha MS, et al. Helminthic diseases in the abdomen: an epidemiologic and radiologic overview. Radiographics 2010;30(1):253-267."}, {"number": "9", "stem": "A 27-year-old female with a suspected Crohn disease underwent a video capsule endoscopy. An abdominal film was obtained 1 week later (Day 7) at which time the patient's symptoms were mild and stable. After another 2 weeks (Day 21), she is seen by her gastroenterologist with increasing cramping abdominal pain, new nausea and vomiting, and another abdominal film is obtained. What is the next best step in management?", "options": [{"letter": "A", "text": "Repeat abdominal film in one more week"}, {"letter": "B", "text": "Standard CT abdomen and pelvis"}, {"letter": "C", "text": "MR enterography"}, {"letter": "D", "text": "Barium small bowel follow-through"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The abdominal film a week (Day 7) post ingestion of a capsule for video capsule endoscopy (VCE) demonstrates the capsule in the right abdomen. Another 2 weeks later (Day 21), the capsule has not changed in position. With the development of obstructive symptoms, further urgent definitive imaging is indicated, and a standard CT is the most appropriate choice. Ingestion of large volume of contrast with an enterography is likely to be poorly tolerated given her obstructive symptoms, and the CT is more expeditious than a small bowel follow-through. In addition, MR is contraindicated for theoretical risk of causing capsule movement that might result in bowel obstruction or perforation. The following CT images were obtained, located just adjacent to the level of the retained capsule, demonstrating a long distal ileal stricture consistent with Crohn disease. With double-balloon enteroscopy, the stricture was dilated and the capsule recovered. VCE is useful for direct visualization of segments of bowel (especially small bowel) that cannot be reached with standard endoscopic techniques. Most capsules will reach the colon within 8 hours of ingestion, but reduced motility may significantly delay passage of the capsule. Capsular retention is suspected if not excreted within 15 days of ingestion in an asymptomatic patient, or in patients with symptoms of obstruction or perforation, regardless of time since capsule ingestion. Capsule retention is reported in approximately 2% of patients undergoing VCE. The most common causes of capsule retention are strictures associated with Crohn disease, nonsteroidal anti-inflammatory drugs (NSAIDS), small bowel tumors, radiation enteritis, or surgical anastomoses. Relative contraindications to VCE include known obstructive causes of any kind, small bowel diverticula, fistulae, and severe motility disorders. If strictures are suspected, a self-dissolving patency capsule may be administered to assess for the presence of strictures that may limit the passage of the video capsule.\n\nReferences: Bandorski D, Kurniawan N, Baltes P, et al. Contraindications for video capsule endoscopy. World J Gastroenterol 2016;22(45):9898-9908. Pasha SF, Pennazio M, Rondonotti E, et al. Capsule retention in Crohn's disease: a meta-analysis. Inflamm Bowel Dis 2020;26(1):33- 42. Rondonotti E. Capsule retention: prevention, diagnosis and management. Ann Transl Med 2017;5(9):198."}, {"number": "10a", "stem": "A 50-year-old patient with a history of intermittent diarrhea and hot flushes undergoes a CT of the abdomen. No other abnormalities of the GI tract were present on other images. The patient denies any significant travel history. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Tuberculosis of distal ileum and associated nodal enlargement"}, {"letter": "B", "text": "Small bowel lymphoma"}, {"letter": "C", "text": "Ileal carcinoid and calcified nodal metastasis"}, {"letter": "D", "text": "Crohn disease"}], "images": ["assets/q10a_p204_01.jpg", "assets/q10a_p204_02.jpg"], "explanationImages": ["assets/a10a_p246_01.jpg"], "answer": "C", "explanation": "Answer C. A partially calcified mesenteric mass in close vicinity to an ileal mass would be most compatible with a carcinoid tumor with nodal metastases. This diagnosis is supported by the patient's symptomatology. Tuberculosis is highly unlikely in this patient with no travel history, and this described symptomatology and a single mass with single nodal enlargement on CT examination. Calcifications are rare in lymphoma, unless it has been at least partially treated. The patient's clinical presentation and presence of calcifications in the nodal mass with normal appearance of remaining bowel wall is less suggestive Crohn disease. Carcinoids are neuroendocrine tumors in the category of APUD (amine precursor uptake decarboxylase) tumors. The majority (70%) of all carcinoids occur in the gastrointestinal tract, although they can occur in any organ. The most common site for gastrointestinal involvement is the rectum (34%), followed by the small bowel (26%), stomach (12%), and appendix (6%). Tumors are submucosal and tend to be well-circumscribed. The diagnosis and management hinge on a combination of biochemical analysis, imaging, and endoscopy. Of the small bowel sites for carcinoid tumor, the ileum is the most common. On CT, the classic appearance of a mesenteric metastasis is of a soft tissue mass-like process with radiating projections extending toward the small bowel, often causing angulation and tethering of the bowe l. This desmoplastic reaction occurs due to the effect of serotonin and other vasoactive peptides produced by the tumor on the local vasculature. The mesenteric mass commonly calcifies. Unlike this case, the detection of the primary tumor may be challenging in patients presenting with metastatic disease, as the tumors tend to be small. Standard CT and somatostatin receptor scintigraphy (formerly 111I octreotide scan and now Ga-68 DOTATATE) have relatively low sensitivity for detection of the primary tumors (up to 6% and 23%, respectively). CT or MR enterography may increase the sensitivity for detection of the primary intestinal tumor when good bowel distention is achieved."}, {"number": "10b", "stem": "What do the patient's presenting symptoms likely indicate?", "options": [{"letter": "A", "text": "The tumor is metastatic to the liver."}, {"letter": "B", "text": "The tumor is metastatic to the lungs."}, {"letter": "C", "text": "The tumor is unresectable."}, {"letter": "D", "text": "The tumor is likely multifocal."}], "images": ["assets/q10b_p205_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Carcinoid syndrome is characterized by a constellation of symptoms which may include flushing, diarrhea, abdominal pain, wheezing, and palpitations. Most patients with carcinoid syndrome have extensive liver metastases, and the symptoms occur when the monoamine oxidase in the liver and lung are unable to metabolize serotonin. Uncommonly, an extraintestinal carcinoid may have the syndrome when the enterohepatic circulation is bypassed. Metastatic disease is relatively common at the time of diagnosis, with 19% of patients having nodal disease and 21% distant metastases. Liver metastases tend to be hypervascular, and multiphase imaging should be performed as 15% of masses may only be present on the arterial phase. MRI is probably slightly more sensitive than the CT or 111I octreotide scan for detection of liver metastases.\n\nReferences: Ganeshan D, Bhosale P, Yang T, et al. Imaging features of carcinoid tumors of the gastrointestinal tract. AJR Am J Roentgenol 2013;201(4):773-786. Levy AD, Sobin LH. From the archives of the AFIP: gastrointestinal carcinoids: imaging features with clinicopathologic comparison. Radiographics 2007;27(1):237-257."}, {"number": "11", "stem": "A 49-year-old male with abdominal pain, diarrhea, and weight loss has a CT showing a large mass involving the jejunum. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Adenocarcinoma"}, {"letter": "B", "text": "Gastrointestinal stromal tumor"}, {"letter": "C", "text": "Non-Hodgkin lymphoma"}, {"letter": "D", "text": "Carcinoid"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. The CT demonstrates a large mass in the abdomen with a central cavity containing oral contrast. Adjacent small bowel loops are not dilated, indicating no significant obstruction. This pattern of bowel wall involvement by tumor and expansion of the lumen is known as aneurysmal dilatation. Although it can be seen in other tumors including gastrointestinal stromal tumor, metastases, and rarely adenocarcinoma, the most common cause is non-Hodgkin lymphoma. Aneurysmal dilatation of the bowel is caused by invasion of the muscularis propria and damage to autonomic nerve plexus. The gastrointestinal tract is the most frequent extranodal site of involvement by lymphoma. Risk factors include Helicobacter pylori infection, immunosuppression due to HIV infection or with organ transplantation, inflammatory bowel disease, or celiac disease. Lymphoma is the most common primary malignancy of the small intestine. Primary non-Hodgkin lymphoma (B-cell and T-cell type), Burkitt lymphoma, MALT lymphoma, and very rarely Hodgkin lymphoma have been described in the small bowel. Lymphoma has many morphologic variants including focal polypoid masses without wall thickening, multiple polypoid lesions, long segmental infiltrating lesion, ulcerative segmental lesions, and tumor locally infiltrative into adjacent tissue. The tumor does not commonly cause obstruction. Associated bulky lymphadenopathy can suggest the diagnosis. Polypoid lymphoma of the ileum. Long segment of jejunal involvement by lymphoma.\n\nReferences: Buckley JA, Fishman EK. CT evaluation of small bowel neoplasms: spectrum of disease. Radiographics 1998;18(2):379-392. Ghai S, Pattison J, Ghai S, et al. Primary gastrointestinal lymphoma: spectrum of imaging findings with pathologic correlation. Radiographics 2007;27(5):1371-1388."}, {"number": "12", "stem": "A 53-year-old male with weight loss and worsening nausea and vomiting underwent a CT scan. The most likely diagnosis is", "options": [{"letter": "A", "text": "Duodenal atresia"}, {"letter": "B", "text": "Duodenal adenocarcinoma"}, {"letter": "C", "text": "Duodenal lymphoma"}, {"letter": "D", "text": "Stenosis associated with nonsteroidal anti-inflammatory agents"}], "images": ["assets/q12_p206_01.jpg"], "explanationImages": ["assets/a12_p249_01.jpg"], "answer": "B", "explanation": "Answer B. There is an annular mass in the distal duodenum with luminal narrowing and obstruction of the stomach and duodenum. Duodenal adenocarcinoma typically presents as a napkin-ring lesion or a polypoid mass. Adenocarcinoma distribution in the duodenum are as follows: 45% horizontal and distal (D3 and D4); 40% descending (D2); and 15% in the bulb (D1). Duodenal carcinoma is rare, accounting for 0.3% of all GI malignancies. Of all small bowel adenocarcinomas however, the duodenum is the most common location accounting for 50% to 75%. Presentation may be secondary to obstruction, bleeding, or abdominal pain. Increased incidence of duodenal adenocarcinomas are found in patients with familial adenomatosis polyposis syndrome or Gardner syndrome. Congenital duodenal atresia is usually found in the descending segment, just distal to the ampulla of Vater. The diagnosis is typically made in the antenatal or neonatal period due to obstructive presentation (\"double bubble\" seen on ultrasound). Duodenal lymphoma tends to have longer segment involvement and may demonstrate aneurysmal dilatation (which would be rare for adenocarcinoma). Because fibroblastic reaction is less pronounced in lymphoma and duodenal cells are spared, obstruction in lymphoma is rare. Nonsteroidal anti-inflammatory agents (NSAIDs) may be associated with obstruction of the small bowel, but the appearance is typically a thin web-like abnormality.\n\nReferences: Barat M, Dohan A, Dautry R, et al. Mass-forming lesions of the duodenum: a pictorial review. Diagn Interv Imaging 2017;98(10):663-675. Liu Z, Zheng G, Liu J, et al. Clinicopathological features, surgical strategy and prognosis of duodenal gastrointestinal stromal tumors: a series of 300 patients. BMC Cancer 2018;18(1):563. Traubici J. The double bubble sign. Radiology 2001;220(2):463-464."}, {"number": "13", "stem": "A 58-year-old male with a history of intermittent gastrointestinal bleeding has a CT enterography study. What is the finding?", "options": [{"letter": "A", "text": "Annular mass"}, {"letter": "B", "text": "Polypoid mass"}, {"letter": "C", "text": "Small bowel obstruction without mass"}, {"letter": "D", "text": "Normal appearance"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. There is a large polypoid mass in the jejunum causing a partial obstruction of the small bowel. Although a noncontrast phase is not included with this study, the hyperdensity of the mass suggests enhancement. Appearance of the mass is nonspecific. Differential for a benign polypoid mass includes an adenoma (although these are considered premalignant), hamartoma (isolated or associated with polyposis syndrome such as Peutz- Jeghers), and other tumors of mesenchymal origin such as a lipoma or leiomyoma. Possibilities for a malignant polypoid mass of the small bowel includes carcinoma (more commonly annular), carcinoid, lymphoma, sarcoma, or a metastasis. Gastrointestinal stromal tumors demonstrate a range of malignant potential and may be polypoid. In this case, this mass was found to be a gastrointestinal stromal tumor, also called a gut stromal tumor (GST). A GST is the most common gastrointestinal tumor of mesenchymal origin. It is defined by the presence of a tyrosine growth factor receptor (KIT receptor or CD117), which differentiates it from other mesenchymal tumors. The tumor arises from the muscularis propria of the intestinal wall and often has an exophytic growth pattern with masses extending out of the involved organ. This polypoid manifestation is less common.\n\nReferences: Levy AD, Remotti HE, Thompson WM, et al. Gastrointestinal stromal tumors: radiologic features with pathologic correlation. Radiographics 2003;23(2):283-304, 456; quiz 532. Sandrasegaran K, Rajesh A, Rydberg J, et al. Gastrointestinal stromal tumors: clinical, radiologic, and pathologic features. AJR Am J Roentgenol 2005;184(3):803-811. 14 Answers. 1. B 2. C 3. D 4. A 1. Heterotopic gastric mucosa represents congenital gastric rests. These are present at the base of the duodenal bulb (juxtapyloric), have a characteristic polygonal shape, and are 1 to 5 mm in size. These are differentiated from lymphoid hyperplasia, which nodules similar in size but round and distributed throughout the bulb. 2. When the angle of the postbulbar duodenum with the apex of the bulb is acute, redundant folds may mimic a mass, known as a duodenal flexural pseudotumor. This changes in shape with peristalsis and does not persist with filling. 3. Prolapsing gastric mucosa represents redundant gastric antral mucosa that extends into the base of the duodenal bulb. It has a characteristic mushroom shape and changes during different phases of gastric peristalsis. It is likely of no clinical significance. 4. Brunner glands are mucosal and submucosal alkaline-secreting glands most common in the first part of the duodenum. Brunner gland hyperplasia may present as smooth submucosal nodules 5 mm or smaller. When larger than 5 mm (more commonly solitary, although multiple in this case), this may be referred to as a hamartoma. A \"Swiss cheese\" appearance has been described when nodules are multiple. These may be seen in symptomatic patients or as incidental findings.\n\nReferences: Eisenberg RL. Gastrointestinal radiology: a pattern approach, 2nd ed. Philadelphia, PA: Lippincott, 1990. Patel ND, Levy AD, Mehrotra AK, et al. Brunner's gland hyperplasia and hamartoma: imaging features with clinicopathologic correlation. AJR Am J Roentgenol 2006;187(3):715-722."}, {"number": "14a", "stem": "Matc ces: Eisenberg RL. Gastrointestinal radiology: a pattern approach, 2nd ed. Philadelphia, PA: Lippincott, 1990. Patel ND, Levy AD, Mehrotra AK, et al. Brunner's gland hyperplasia and hamartoma: imaging features with clinicopathologic correlation. AJR Am J Roentgenol 2006;187(3):715-722."}, {"number": "14d", "stem": "Match these duodenal filling defects with their diagnosis. Each choice may be used only once: Select the diagnosis for Defect 4.", "options": [{"letter": "A", "text": "Brunner gland hamartomas"}, {"letter": "B", "text": "Heterotopic gastric mucosa"}, {"letter": "C", "text": "Flexural pseudotumor"}, {"letter": "D", "text": "Prolapsing gastric mucosa"}], "images": ["assets/q14a_14b_14c_14d_p207_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "14 Answers. 1. B 2. C 3. D 4. A 1. Heterotopic gastric mucosa represents congenital gastric rests. These are present at the base of the duodenal bulb (juxtapyloric), have a characteristic polygonal shape, and are 1 to 5 mm in size. These are differentiated from lymphoid hyperplasia, which nodules similar in size but round and distributed throughout the bulb. 2. When the angle of the postbulbar duodenum with the apex of the bulb is acute, redundant folds may mimic a mass, known as a duodenal flexural pseudotumor. This changes in shape with peristalsis and does not persist with filling. 3. Prolapsing gastric mucosa represents redundant gastric antral mucosa that extends into the base of the duodenal bulb. It has a characteristic mushroom shape and changes during different phases of gastric peristalsis. It is likely of no clinical significance. 4. Brunner glands are mucosal and submucosal alkaline-secreting glands most common in the first part of the duodenum. Brunner gland hyperplasia may present as smooth submucosal nodules 5 mm or smaller. When larger than 5 mm (more commonly solitary, although multiple in this case), this may be referred to as a hamartoma. A \"Swiss cheese\" appearance has been described when nodules are multiple. These may be seen in symptomatic patients or as incidental findings. References: Eisenberg RL. Gastrointestinal radiology: a pattern approach, 2nd ed. Philadelphia, PA: Lippincott, 1990. Patel ND, Levy AD, Mehrotra AK, et al. Brunner's gland hyperplasia and hamartoma: imaging features with clinicopathologic correlation. AJR Am J Roentgenol 2006;187(3):715-722."}, {"number": "15", "stem": "A 41-year-old male presents with abdominal pain and fever. What is the likely diagnosis?", "options": [{"letter": "A", "text": "Gastrointestinal stromal tumor"}, {"letter": "B", "text": "Carcinoid"}, {"letter": "C", "text": "Lymphoma"}, {"letter": "D", "text": "Adenocarcinoma"}], "images": ["assets/q15_p209_01.jpg", "assets/q15_p209_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The CT demonstrates atrophic native kidneys and a left pelvic renal allograft. There is a large mass with central cavitation in the upper abdomen communicating with the bowel lumen. In the setting of a renal transplant and immunosuppressive therapy, this mass likely represents a lymphoma. Carcinoid and adenocarcinoma do not manifest with this morphology. Gastrointestinal stromal tumor may have a similar appearance with aneurysmal dilatation but is not associated with immunosuppression. Posttransplant lymphoproliferative disorder (PTLD) encompasses a spectrum of conditions that may occur as an uncommon complication following organ transplantation. There are four major types of PTLD: hyperplastic, polymorphic, monomorphic (lymphomatous), or other (e.g., Hodgkin disease). Biopsy is needed to diagnose the subtype and is important for therapy planning. PTLD is most common in multiorgan transplants, followed in order by bowel, heart and lung, and lung transplants. The incidence of PTLD in renal transplant recipients is 1%. PTLD has a strong association with Epstein-Barr virus (EBV) infection. PTLD can involve any organ, and in the abdomen most commonly involves the gastrointestinal tract and liver. The gastrointestinal involvement is similar in appearance to that of non-Hodgkin lymphoma. The distal jejunum and ileum are the most common GI sites involved, followed by proximal colon, stomach, duodenum, and esophagus. Most posttransplant lymphomas are diagnosed in the first year post transplant.\n\nReferences: Borhani AA, Hosseinzadeh K, Almusa O, et al. Imaging of posttransplantation lymphoproliferative disorder after solid organ transplantation. Radiographics 2009;29(4):981-1000; discussion 1000-1002. Opelz G, Dohler B. Lymphomas after solid organ transplantation: a collaborative transplant study report. Am J Transplant 2004;4(2):222-230."}, {"number": "16a", "stem": "The most common type of malignancy involving the small bowel is", "options": [{"letter": "A", "text": "Gastrointestinal stromal tumor"}, {"letter": "B", "text": "Lymphoma"}, {"letter": "C", "text": "Carcinoid"}, {"letter": "D", "text": "Metastases"}], "images": ["assets/q16a_p211_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Metastases are the most common type of tumor involving small bowel. Most commonly, metastatic involvement is seen with intraperitoneal spread such as from ovarian, colonic, or appendiceal primary neoplasms. Hematogenous involvement may be seen, most commonly from lung, breast, melanoma, and renal cell. Local extension of tumor from other primaries is another route of involvement."}, {"number": "16b", "stem": "A 48-year-old male presents with abdominal pain of 3 month's duration and has a CT scan. Which of the following cancers would be most likely to result in the finding?", "options": [{"letter": "A", "text": "Small bowel adenocarcinoma"}, {"letter": "B", "text": "Metastatic melanoma"}, {"letter": "C", "text": "Metastatic appendiceal cancer"}, {"letter": "D", "text": "Metastatic gastric cancer"}], "images": ["assets/q16b_p212_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. A jejunal mass is present with a long segment of marked wall thickening as well as luminal dilatation. A small bowel adenocarcinoma would more commonly present as a short napkin-ring mass. Metastases to the small bowel are more common than primary small bowel neoplasms which are rare. Melanoma is the most frequent primary source of small bowel metastases and are hematogenous. Metastatic appendiceal or gastric cancer involving the small bowel would more commonly manifest as direct (peritoneal) spread, which is not the pattern demonstrated in this case. Melanoma has a high propensity to metastasize, and gastrointestinal metastases are common (60% in one series) although these do not always present clinically. The small bowel is the most common site, followed by the stomach, then the colon. The esophagus is the least common site of hollow viscus involvement, and interestingly, melanoma in the esophagus is more likely to be a primary than a metastasis. Morphologic patterns of melanoma small bowel metastases are variable and include polypoid intraluminal masses (most common), intramural circumferential (as seen here), or exoenteric involvement. Necrosis and ulceration may occur as the masses enlarge. Aneurysmal dilatation (present in this case and also seen with other malignancies such as lymphoma) occurs when infiltrative tumor invades the muscularis and destroys the autonomic nerve plexus.\n\nReferences: Bender GN, Maglinte DD, McLarney JH, et al. Malignant melanoma: patterns of metastasis to the small bowel, reliability of imaging studies, and clinical relevance. Am J Gastroenterol 2001;96(8):2392-2400. Buckley JA, Fishman EK. CT evaluation of small bowel neoplasms: spectrum of disease. Radiographics 1998;18(2):379-392. Leshchinskiy S, Ali N, D'Agostino R. The small bowel \"aneurysm\". Abdom Radiol (NY) 2018;43(12):3503-3504."}, {"number": "17a", "stem": "A 78-year-old male develops nausea, vomiting, and increased abdominal pain 2 days after a cystectomy. Supine and upright abdominal films are performed. The most appropriate test to order next would be", "options": [{"letter": "A", "text": "No further test needed, the examination is diagnostic"}, {"letter": "B", "text": "CT"}, {"letter": "C", "text": "Small bowel follow-through"}, {"letter": "D", "text": "MRI"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The plain films demonstrate multiple dilated loops of small bowel with fluid levels on the upright film (right). A paralytic ileus would be the most common cause for the small bowel distention in the immediate postoperative period, but relative lack of colonic gas raises concern for small bowel obstruction (SBO) as well. A CT scan would be the best next step to evaluate for a potential transition point. CT may also evaluate the bowel wall for signs of ischemia. In patients who are not perioperative, CT evaluates for signs of perforation with free fluid and air. In this patient, the CT demonstrated a transition point adjacent to the surgical drain. Small bowel follow-through (SBFT) examinations are often requested by clinicians in this setting but should be discouraged, as the prolonged transit time in both obstruction and ileus and preexisting fluid often yield indeterminate results. In addition, the presence of retained contrast interferes with subsequent CT examinations for several days. Patients with a high-grade obstruction may tolerate the oral contrast poorly. A SBFT is illustrated in another patient with a small bowel obstruction below; the transition point cannot be determined due to overlapping loops of bowel. SBFT 6 hours delay. SBFT 12 hours delay. An MRI is an acceptable alternate choice for evaluation in a patient who is not recently postoperative and for whom minimizing radiation exposure is a priority. Disadvantages of MRI include the longer scan time and lower spatial resolution."}, {"number": "17b", "stem": "The most common cause for small bowel obstruction in the United States is", "options": [{"letter": "A", "text": "Adhesions"}, {"letter": "B", "text": "Hernias"}, {"letter": "C", "text": "Neoplasm"}, {"letter": "D", "text": "Crohn disease"}], "images": ["assets/q17b_p213_01.jpg"], "explanationImages": ["assets/a17b_p256_01.jpg"], "answer": "A", "explanation": "Answer A. Adhesions account for up to 70% of small bowel obstructions (SBO) in the developed countries. Most patients will have a history of prior surgery; prior episodes of peritonitis may also result in adhesions. Adhesions are usually not directly visualized on imaging but are implied by a sharp transition in bowel caliber from dilated to nondilated without a mass or other cause for obstruction identified. Hernias were formerly the most common cause of SBO in the United States and remain so in many foreign countries. As more cross-sectional imaging is being performed, more hernias are being identified and electively repaired. When neoplasm causes an SBO, it is most commonly due to metastatic disease and peritoneal carcinomatosis. Crohn disease may present acutely as an SBO due to transmural inflammation and extrinsic serosal disease causing obstruction, or may be due to chronic cicatricial fibrosing strictures.\n\nReferences: Mullan CP, Siewert B, Eisenberg RL. Small bowel obstruction. AJR Am J Roentgenol 2012;198(2):W105-W117. Silva AC, Pimenta M, Guimaraes LS. Small bowel obstruction: what to look for. Radiographics 2009;29(2):423-439."}, {"number": "18a", "stem": "A 78-year-old female has a history of intermittent episodes of abdominal pain. An esophagogastroduodenoscopy (EGD) is negative. She undergoes a small bowel follow-through (SBFT). What description best fits the findings?", "options": [{"letter": "A", "text": "Small bowel folds are nodular and irregularly thickened."}, {"letter": "B", "text": "Small bowel folds are thickened and closely spaced."}, {"letter": "C", "text": "Small bowel folds are thin and widely spaced."}, {"letter": "D", "text": "Small bowel folds are normal in thickness."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B."}, {"number": "18b", "stem": "Which of the following is the most likely cause?", "options": [{"letter": "A", "text": "Intramural hemorrhage"}, {"letter": "B", "text": "Crohn disease"}, {"letter": "C", "text": "Eosinophilic enteritis"}, {"letter": "D", "text": "Progressive systemic sclerosis"}], "images": ["assets/q18b_p214_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The small bowel follow-through demonstrates a segment of small bowel with folds that are thickened in a uniform fashion and closely spaced together. Normal small bowel fold thickness is 2 to 3 mm in the jejunum and 1 to 2 mm in the ileum, and the number of folds is 4 to 7 per inch in the jejunum. This pattern has been called a \"stacked coin\" or \"picket fence \" appearance. This pattern typically results from edema or hemorrhage from ischemia, anticoagulant therapy, radiation, or vasculitis. Crohn disease tends to produce irregular thickening. Eosinophilic enteritis may have straight or irregular fold thickening but tends to be more diffuse. Progressive systemic sclerosis (scleroderma) demonstrates normal or thinned folds. Many entities are known to cause small bowel fold abnormalities. Clinical information is paramount in forming the differential. While a specific diagnosis may be elusive, radiographic studies (small bowel follow-through and CT or MR enterography) indicate presence and location of disease for directed endoscopic evaluation and biopsy. A suggested approach to small bowel fold pattern analysis is offered below.\n\nReferences: Eisenberg RL. Thickening of small bowel folds. AJR Am J Roentgenol 2009;193(1):W1-W6. Levine MS, Rubesin SE, Laufer I. Pattern approach for diseases of mesenteric small bowel on barium studies. Radiology 2008;249(2):445-460. Answer G. Establishing the diagnosis of mesenteric ischemia may be extremely challenging for 19 radiologists and clinicians. Bowel ischemia can have a number of different appearances, several of which are illustrated in the images A-F. Due to the highly variable radiographic manifestations of mesenteric ischemia, the clinical presentation must factor heavily when making the diagnosis. Case A illustrates a target appearance of the ischemic small bowel wall with wall thickening, enhancing mucosa and edematous submucosa. This appearance is nonspecific and may be seen in other enteritides. Case B demonstrates hypoenhancing bowel wall in the left abdomen (short arrows) and mild mesenteric edema in this case of vascular obstruction due to an omental band. This sign is highly specific for ischemia but uncommon. Case C shows bowel wall thickening and free fluid in a patient with paraneoplastic hypercoagulability and superior mesenteric vein thrombus. Wall thickening is most pronounced with venous occlusion. Case D demonstrates small bowel distention and ileus with normal wall thickness and an infarcted right kidney. This patient had embolization of cardiac thrombus to the right renal artery and superior mesenteric artery. In a pure arterial occlusion, the bowel wall is often normal or may be paper-thin. Case E demonstrates extensive pneumatosis intestinalis and portal venous gas, which is consistent with transmural infarction in the setting of clinically suspected mesenteric ischemia.\n\nReferences: Furukawa A, Kanasaki S, Kono N, et al. CT diagnosis of acute mesenteric ischemia from various causes. AJR Am J Roentgenol 2009;192(2):408-416. Wiesner W, Khurana B, Ji H, et al. CT of acute bowel ischemia. Radiology 2003;226(3): 635-650. 20a Answer: D. The CT images show Rigler's triad with pneumobilia, small bowel obstruction, and ectopic gallstone (in this case in the distal ileum), diagnostic for gallstone ileus. Gallstone ileus represents a bowel obstruction related to fistulization of a gallstone from the biliary tract into the gastrointestinal tract, typically in elderly women. Mortality has been reported as high as 33% in the past, although it has more recently decreased, possibly due to the development of nonsurgical endoscopic interventions. In one large series, gallstone ileus accounted for 1% to 4% of all cases of small bowel obstruction but up to 25% of nonstrangulated small bowel obstructions in patients over 65. CT is helpful for finding the point of obstruction, assessing the size of the stone, and for the presence of multiple stones. In most cases, the ectopic stone obstructs at the level of the ileocecal valve, which is the narrowest part of the gastrointestinal tract, but it can be seen in the stomach, duodenum, elsewhere in the small bowel, or the colon. 20b Answer: B. Gallstone ileus implies a biliary enteric fistula. A biliary enteric fistula complicates 2% to 3% of all cases of cholelithiasis with associated cholecystitis. The fistula is most often between the gallbladder and duodenum in the setting of chronic cholecystitis, although any communication between the biliary tree and the gastrointestinal tract can result in a similar presentation. Of note, biliogastric fistulization with obstruction at the pylorus or duodenum is also known as Bouveret syndrome. Bouveret syndrome.\n\nReferences: Brennan GB, Rosenberg RD, Arora S. Bouveret syndrome. Radiographics 2004;24(4): 1171-1175. Lassandro F, Gagliardi N, Scuderi M, et al. Gallstone ileus analysis of radiological findings in 27 patients. Eur J Radiol 2004;50(1):23-29. Lassandro F, Romano S, Ragozzino A, et al. Role of helical CT in diagnosis of gallstone ileus and related conditions. AJR Am J Roentgenol 2005;185(5):1159-1165. Reisner RM, Cohen JR. Gallstone ileus: a review of 1001 reported cases. Am Surg 1994;60(6):441-446. van Hillo M, van der Vliet JA, Wiggers T, et al. Gallstone obstruction of the intestine: an analysis of ten patients and a review of the literature. Surgery 1987;101(3):273-276."}, {"number": "19", "stem": "Which of the following cases represents small bowel ischemia?", "options": [{"letter": "A", "text": "A 52-year-old male with severe abdominal pain after prolonged hypotension."}, {"letter": "B", "text": "A 75-year-old male with abdominal pain."}, {"letter": "C", "text": "Case C shown in the supplied images."}, {"letter": "D", "text": "A 66-year-old female with breast cancer and abdominal pain."}, {"letter": "E", "text": "A 82-year-old male with sudden-onset abdominal and flank pain following cardiac catheterization."}, {"letter": "F", "text": "A 52-year-old female with hypotesion."}, {"letter": "G", "text": "All of the above."}], "images": [], "explanationImages": ["assets/a19_p259_01.jpg"], "answer": "G", "explanation": "No extracted explanation found."}, {"number": "20a", "stem": "A 65-year-old female presents with intermittent right upper quadrant colicky pain, nausea, vomiting, and abdominal distension. A CT scan is performed. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Adynamic ileus"}, {"letter": "B", "text": "Bezoar-induced small bowel obstruction"}, {"letter": "C", "text": "Small bowel intussusception"}, {"letter": "D", "text": "Gallstone ileus"}], "images": ["assets/q20a_p218_01.jpg", "assets/q20a_p218_02.jpg"], "explanationImages": [], "answer": "D", "explanation": "20a Answer: D. The CT images show Rigler's triad with pneumobilia, small bowel obstruction, and ectopic gallstone (in this case in the distal ileum), diagnostic for gallstone ileus. Gallstone ileus represents a bowel obstruction related to fistulization of a gallstone from the biliary tract into the gastrointestinal tract, typically in elderly women. Mortality has been reported as high as 33% in the past, although it has more recently decreased, possibly due to the development of nonsurgical endoscopic interventions. In one large series, gallstone ileus accounted for 1% to 4% of all cases of small bowel obstruction but up to 25% of nonstrangulated small bowel obstructions in patients over 65. CT is helpful for finding the point of obstruction, assessing the size of the stone, and for the presence of multiple stones. In most cases, the ectopic stone obstructs at the level of the ileocecal valve, which is the narrowest part of the gastrointestinal tract, but it can be seen in the stomach, duodenum, elsewhere in the small bowel, or the colon."}, {"number": "20b", "stem": "Which of the following findings is not illustrated in the images shown but is still likely to be present?", "options": [{"letter": "A", "text": "A distal ileal stricture"}, {"letter": "B", "text": "A biliary enteric fistula"}, {"letter": "C", "text": "A mesenteric arterial thrombus"}, {"letter": "D", "text": "A distal ileal mass"}], "images": ["assets/q20b_p220_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "20b Answer: B. Gallstone ileus implies a biliary enteric fistula. A biliary enteric fistula complicates 2% to 3% of all cases of cholelithiasis with associated cholecystitis. The fistula is most often between the gallbladder and duodenum in the setting of chronic cholecystitis, although any communication between the biliary tree and the gastrointestinal tract can result in a similar presentation. Of note, biliogastric fistulization with obstruction at the pylorus or duodenum is also known as Bouveret syndrome. Bouveret syndrome. References: Brennan GB, Rosenberg RD, Arora S. Bouveret syndrome. Radiographics 2004;24(4): 1171-1175. Lassandro F, Gagliardi N, Scuderi M, et al. Gallstone ileus analysis of radiological findings in 27 patients. Eur J Radiol 2004;50(1):23-29. Lassandro F, Romano S, Ragozzino A, et al. Role of helical CT in diagnosis of gallstone ileus and related conditions. AJR Am J Roentgenol 2005;185(5):1159-1165. Reisner RM, Cohen JR. Gallstone ileus: a review of 1001 reported cases. Am Surg 1994;60(6):441-446. van Hillo M, van der Vliet JA, Wiggers T, et al. Gallstone obstruction of the intestine: an analysis of ten patients and a review of the literature. Surgery 1987;101(3):273-276."}, {"number": "21a", "stem": "A 48-year-old male underwent a CT scan after a motor vehicle collision. The incidental abnormality indicated by the arrows occurs via", "options": [{"letter": "A", "text": "The fossa of Landzert"}, {"letter": "B", "text": "The fossa of Waldeyer"}, {"letter": "C", "text": "The foramen of Winslow"}, {"letter": "D", "text": "The mesocolic window"}], "images": [], "explanationImages": ["assets/a21a_p261_01.jpg"], "answer": "B", "explanation": "Answer B. Axial and coronal images demonstrate a cluster of small bowel in the right upper quadrant, representing a right paraduodenal hernia (PDH). These occur through the fossa of Waldeyer, a defect in the first part of the jejunal mesentery. The herniated bowel extends behind the superior mesenteric artery, which is displaced anteriorly and inferior to the transverse portion of the duodenum. The hernia contents are located in the right half of the transverse mesocolon and posterior to the ascending mesocolon. This type of hernia occurs more frequently in the setting of nonrotated small bowel. Internal hernias are protrusions of bowel that occur through congenital or acquired defects in the mesentery but remain within the peritoneal cavity in contrast to external hernias. They may be asymptomatic or present with symptoms of bowel obstruction or abdominal pain. Internal hernias may be difficult to diagnose, resulting in significant morbidity and mortality. Paraduodenal hernias extend through congenital defects that occur due to anomalous rotation and fusion of mesentery and peritoneum during embryogenesis. Classically, paraduodenal hernias (PDHs) were recognized as the most common type of internal hernia accounting for approximately 50% of cases. However, the incidence of transmesenteric hernias is increasing due to the proliferation of abdominal surgery, in particular Roux-en-Y procedures."}, {"number": "21b", "stem": "Right paraduodenal hernias account for what percentage of all paraduodenal hernias?", "options": [{"letter": "A", "text": "25"}, {"letter": "B", "text": "50"}, {"letter": "C", "text": "75"}, {"letter": "D", "text": "90"}], "images": ["assets/q21b_p221_01.jpg", "assets/q21b_p221_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Right PDH accounts for 25% of PDHs. Left PDH accounts for 75% of PDHs. It is more common in men (3:1) and occurs via the fossa of Landzert. The herniated contents lie between the pancreas and stomach to the left of the ligament of Treitz with mass effect on the posterior wall of the stomach and transverse colon. The bowel loops extend into the left portion of the transverse mesocolon and descending mesocolon. The inferior mesenteric vein (IMV) is displaced superiorly and anteriorly. The foramen of Winslow is the passage between the greater and lesser sacs of the peritoneum, and hernias through this foramen are less common. The mesocolic window is created for a retrocolic Roux limb and can be the site of postoperative obstruction due to constriction or transmesenteric internal hernia.\n\nReferences: Martin LC, Merkle EM, Thompson WM. Review of internal hernias: radiographic and clinical findings. AJR Am J Roentgenol 2006;186(3):703-717. Takeyama N, Gokan T, Ohgiya Y, et al. CT of internal hernias. Radiographics 2005;25(4): 997-1015."}, {"number": "22", "stem": "A 64-year-old male presents with bloody stools and a hematocrit of 22. He has no prior surgical history. He undergoes a CT of the abdomen and pelvis. What possible bleeding source is suggested by the findings?", "options": [{"letter": "A", "text": "Aortoenteric fistula"}, {"letter": "B", "text": "Gastrointestinal stromal tumor"}, {"letter": "C", "text": "Jejunal vascular malformation"}, {"letter": "D", "text": "Small bowel lymphoma"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The CT demonstrates an infrarenal fusiform aortic aneurysm, which closely apposes a jejunal loop. The axial image demonstrates that the low-density material adjacent to the opacified aortic lumen is mural thrombus, not a small bowel mass. On the second coronal image, the arrow denotes a small gas bubble located in the periphery of the aneurysm, suggesting a fistulous communication with the bowel. Aortoenteric fistulas are uncommon causes of gastrointestinal bleeding and are associated nearly 100% mortality if not treated promptly. These fistulas may be primary or secondary. Primary aortoenteric fistulas are almost always associated with an aortic aneurysm, as in this case. Secondary aortoenteric fistulas are complications of aortic reconstruction, either via an open surgical or an endovascular procedure. Secondary aortoenteric fistulas are commonly caused by perigraft infection. CT angiography is the best single modality for evaluation of a suspected aortoenteric fistula. The CT assesses for the presence of an aneurysm, the location of any prior surgical vascular or endovascular procedures, and the relationship of the aneurysm or surgical site to the bowel. The most common finding in a primary aortoenteric fistula is ectopic gas located adjacent to or within the aorta. The fat plane between the aortal and the involved segment of bowel is obliterated. A retroperitoneal hematoma may be seen. In the case of a secondary aortoenteric fistula, perigraft infection may occur without fistulization, so the presence of ectopic gas is less specific. Active extravasation of intravascular contrast into the bowel lumen is diagnostic, but very rarely encountered.\n\nReferences: Cumpa EA, Stevens R, Hodgson K, et al. Primary aortoenteric fistula. South Med J 2002;95(9):1071-1073. Vu QD, Menias CO, Bhalla S, et al. Aortoenteric fistulas: CT features and potential mimics. Radiographics 2009;29(1):197-209."}, {"number": "23", "stem": "A 90-year-old female developed nausea and vomiting 2 days after lifting a heavy box. On examination, she has a tender palpable mass in her right inguinal region. A CT scan is obtained. What is the diagnosis? (FV = femoral vein; IEV = inferior epigastric vessels; H = loop extending into hernia)", "options": [{"letter": "A", "text": "Indirect inguinal hernia"}, {"letter": "B", "text": "Direct inguinal hernia"}, {"letter": "C", "text": "Spigelian hernia"}, {"letter": "D", "text": "Femoral hernia"}], "images": ["assets/q23_p222_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The CT scan demonstrates herniation of a small bowel loop in the right groin. The small bowel loop extending into the hernia (H) is medial to the inferior epigastric vessels (IEV) (top right). The neck of the hernia is narrow (bottom, arrow) and the right femoral vein is compressed (top left). These findings are compatible with a femoral hernia. Inguinal region hernias can be divided into inguinal hernias (direct and indirect) and femoral hernias. Direct inguinal hernias pass medial to the inferior epigastric vessels above the inguinal ligament through a defect in Hesselbach triangle (bordered by the inguinal ligament inferiorly, the IEV superolaterally, and the conjoined tendon medially). These have a relatively low risk for incarceration. Indirect hernias are 5Ã— more common than direct hernias, originating at the deep inguinal ring lateral to the IEV and following the inguinal canal inferomedially. In males, these may extend anterior to the spermatic cord into the scrotum. These hernias are at moderate risk for incarceration. Indirect hernia lateral to IEV (arrows). Indirect hernia adjacent to spermatic cord. Femoral hernias are uncommon, representing 5% of abdominal hernias. They exit below the inguinal ligament into the femoral canal medial to the femoral vein and inferior to the course of the IEV. Venous compression of the femoral vein and collateral vein engorgement may be seen. They typically have a narrow neck; 40% of femoral hernias present with incarceration. A Spigelian hernia is located in the lower abdominal wall, extending through the spigelian fascia, lateral to the rectus muscle. Spigelian hernia.\n\nReferences: Burkhardt JH, Arshanskiy Y, Munson JL, et al. Diagnosis of inguinal region hernias with axial CT: the lateral crescent sign and other key findings. Radiographics 2011;31(2):E1-E12. Shadbolt CL, Heinze SB, Dietrich RB. Imaging of groin masses: inguinal anatomy and pathologic conditions revisited. Radiographics 2001;21 Spec No:S261-S271."}, {"number": "24", "stem": "A 53-year-old female with a history of a Whipple procedure for pancreatic cancer presents at routine follow-up visit 2 years later with nausea, mild upper abdominal pain, and an elevated bilirubin and alkaline phosphatase. Her Ca 19-9 is normal. What is the likely diagnosis?", "options": [{"letter": "A", "text": "Hepaticojejunostomy stricture"}, {"letter": "B", "text": "Contained bile leak"}, {"letter": "C", "text": "Afferent limb syndrome"}, {"letter": "D", "text": "Pancreatitis with pseudocyst"}], "images": ["assets/q24_p224_01.jpg"], "explanationImages": ["assets/a24_p265_01.jpg"], "answer": "C", "explanation": "Answer C. There is a fluid-filled structure, which represents a dilated loop of bowel in the periportal region. The hepaticojejunostomy is well visualized without stricture on the coronal image. The afferent (pancreaticobiliary) limb is obstructed in this patient leading to the secondary obstruction of the bile duct. Afferent limb obstruction may be due to adhesions, internal hernias, radiation enteropathy, or recurrent tumor, depending upon the preexisting conditions. The syndrome was first described with Billroth II procedures, which are seldom performed now due to improved medical treatment of peptic ulcer disease. The two most common current clinical settings in which the afferent limb syndrome may be seen are with Roux-en-Y gastric bypass procedures and pancreaticoduodenectomy (Whipple procedures). Complications include perforation of the obstructed afferent limb, bleeding, pancreatitis, or cholangitis. Treatment may be with stenting or surgical correction.\n\nReferences: Pannala R, Brandabur JJ, Gan SI, et al. Afferent limb syndrome and delayed GI problems after pancreaticoduodenectomy for pancreatic cancer: single-center, 14-year experience. Gastrointest Endosc 2011;74(2):295-302. Sandrasegaran K, Maglinte DD, Rajesh A, et al. CT of acute biliopancreatic limb obstruction. AJR Am J Roentgenol 2006;186(1):104-109. Wise SW. Case 24: afferent loop syndrome. Radiology 2000;216(1):142-145."}, {"number": "25", "stem": "During a basketball game, a 17-year-old male receives a direct blow to the abdomen from another player's knee. He presents with abdominal pain and undergoes a series of imaging studies. Regarding the most likely diagnosis, which of the following statements is true?", "options": [{"letter": "A", "text": "It indicates need for immediate surgical exploration."}, {"letter": "B", "text": "It is more likely in elderly patients following blunt trauma."}, {"letter": "C", "text": "It is due to congenitally abnormal rotation of the pancreas."}, {"letter": "D", "text": "The duodenum is the most common location for this entity in the GI tract."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The duodenum is the most common location in trauma involving the GI tract. The images demonstrate a duodenal hematoma, which initially would be heterogeneous due to active hemorrhage (not shown), becoming more homogenous and hypodense on the follow-up CT. The CT and UGI images show extrinsic compression of the second portion of the duodenum, but oral contrast does pass distal to the level of the hematoma, excluding high-grade obstruction. A stricture similar in location to that seen on the UGI may be caused by an annular pancreas (answer choice C), but the MRI and CT findings do not support that entity. Duodenal hematomas are more common in the pediatric population, and absent signs of perforation can usually be treated conservatively.\n\nReferences: Kunin JR, Korobkin M, Ellis JH, et al. Duodenal injuries caused by blunt abdominal trauma: value of CT in differentiating perforation from hematoma. AJR Am J Roentgenol 1993;160:1221-1223. Niehues SM, Denecke T, Bassir C, et al. Intramural duodenal hematoma: clinical course and imaging findings. Acta Radiologica Open 2019;8:1-8."}, {"number": "26", "stem": "A 39-year-old female with a history of Roux-en-Y gastric bypass surgery presents with increasing abdominal pain. A CT scan was performed, and coronal reformatted images were generated. What finding is demonstrated?", "options": [{"letter": "A", "text": "Small bowel obstruction with dilated alimentary/Roux limb"}, {"letter": "B", "text": "Small bowel obstruction with dilated biliopancreatic limb"}, {"letter": "C", "text": "Small bowel obstruction with dilated common enteric channel"}, {"letter": "D", "text": "Adynamic ileus"}], "images": ["assets/q26_p225_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Coronal reformatted images from contrast-enhanced CT demonstrate marked distention of the excluded stomach, duodenal C-loop, and proximal small bowel. The dilation extends to a staple line in the left lower quadrant in the figure on the right. The gastric pouch, Roux limb, and distal small bowel are all nondilated, with oral contrast material seen in these segments. The imaging features are compatible with small bowel obstruction involving the biliopancreatic limb. Small bowel obstructions (SBO) can affect various segments of the bowel after Roux-en-Y gastric bypass surgery, including the alimentary limb (Roux limb exiting the gastrojejunostomy); the biliopancreatic limb that drains the gastric remnant along with pancreatic and biliary systems; and the common enteric channel downstream from the Roux-en-Y jejunojejunostomy. An SBO with involvement of the biliopancreatic limb is a closed loop obstruction that occurs in close proximity to the jejunojejunostomy. Although the incidence of these types of SBO is low (estimated to be 0.3% to 2.3%), such obstructions are at increased risk for perforation and merit prompt surgical intervention. The diagnosis is more easily made by CT than by fluoroscopy as the biliopancreatic limb will be dilated and fluid filled, contrasting with the normal sized and contrast-opacified alimentary limb and common channel.\n\nReferences: Levine MS, Carucci LR. Imaging of bariatric surgery: normal anatomy and postoperative complications. Radiology 2014;270(2):327-341. Sandrasegaran K, Maglinte DD, Rajesh A, et al. CT of acute biliopancreatic limb obstruction. AJR Am J Roentgenol 2006;186(1):104-109."}, {"number": "27", "stem": "A 45-year-old female with a history of diarrhea undergoes a barium small bowel examination with the findings below. Which of the following statements is correct?", "options": [{"letter": "A", "text": "The findings are congenital and more commonly present in the pediatric population."}, {"letter": "B", "text": "Treatment involves surgical resection of the involved segments."}, {"letter": "C", "text": "CT would have been a better initial examination if this entity were suspected clinically."}, {"letter": "D", "text": "This finding can be associated with malabsorption, bowel perforation, obstruction, or GI bleeding."}], "images": ["assets/q27_p226_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Multiple wide-mouthed diverticula are present throughout the small bowel, mostly in the jejunum. Jejunal diverticulosis is present in about 1.3% of autopsy and 2.3% of barium small bowel examinations. The diverticula are acquired, and jejunal diverticulosis is more common in the older population, with 80% to 90% affecting patients over 40 years old. A gut motility disorder is present, leading to increased transit time. The subsequent increased intraluminal pressure is felt to be the cause of the diverticula. The delayed transit time leads to stasis and bacterial overgrowth, which can cause diarrhea and malabsorption. Treatment of bacterial overgrowth syndrome is with antibiotics (not surgery). Serious complication such as diverticulitis, perforation, bleeding, and intestinal obstruction can occur in 10% to 30% of patients. CT is less sensitive for detection of jejunal diverticula when compared to small bowel follow-through examinations, as the diverticula can mimic normal bowel loops in cross section. These diverticula are better appreciated on CT when scrolling through images and observing the relationship to the small bowel loops.\n\nReferences: Fintelmann F, Levine MS, Rubesin SE. Jejunal diverticulosis: findings on CT in 28 patients. AJR Am J Roentgenol 2008;190(5):1286-1290."}, {"number": "28", "stem": "A 66-year-old female presents with nausea and epigastric pain of 1 day's duration. She was found to have a mild leukocytosis. A CT scan is obtained. Available for comparison is an upper GI study performed 1 year earlier. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Perforated duodenal ulcer"}, {"letter": "B", "text": "Infected peripancreatic walled-off necrosis"}, {"letter": "C", "text": "Bezoar in duodenal diverticulum with perforation"}, {"letter": "D", "text": "Infected gut duplication cyst"}], "images": ["assets/q28_p227_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. An ovoid structure associated with the third portion of the duodenum contains solid matter and gas. There is inflammatory stranding in the periduodenal fat. This likely represents the duodenal diverticulum seen in the same location on the earlier upper GI study. This diverticulum appears larger and now contains trapped contents, which are not freely draining into the lumen. Duodenal ulcers are more common in the bulb and postbulbar duodenum. Although a walled-off necrotic collection associated with pancreatitis might have a similar appearance, the time course of presenting symptoms does not fit. A gut d
