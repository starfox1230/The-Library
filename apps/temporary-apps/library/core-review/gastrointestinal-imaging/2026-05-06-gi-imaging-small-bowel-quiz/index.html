uplication cyst may become infected, but these are much less common than diverticula. Duodenal diverticula are very common and are typically asymptomatic incidental findings. The majority are in the second portion of the duodenum, with most of the remainder found in the third portion of the duodenum. Multiple diverticula are common. The diverticula in the second portion of the duodenum are most commonly located in the medial wall around the ampulla. Periampullary diverticula often increase the technical difficulty of cannulating the biliary system for endoscopists. Duodenal diverticula are typically acquired pulsion-type diverticula and are pseudodiverticula, which contain only the mucosal and submucosal layers. Congenital diverticula are rare and may be extraluminal, containing all bowel wall layers, or intraluminal. On CT, the duodenal diverticula often contain large amounts of air and may have air-fluid levels. When completely fluid filled, they may mimic pancreatic pseudocysts or cystic neoplasms. A narrow neck of the diverticulum predisposes to stasis and perforation, as does the presence of foreign bodies such as gallstones or enteroliths. CT findings of duodenal diverticulitis include wall thickening and inflammatory stranding in adjacent tissue. Extraluminal gas may be present but is more commonly contained than free. Although the duodenal diverticula are most commonly asymptomatic, they may become impacted with food and can perforate or hemorrhage. Antibiotic treatment is usually sufficient if perforation is contained, but in some cases, surgery may be indicated.\n\nReferences: Bittle MM, Gunn ML, Gross JA, et al. Imaging of duodenal diverticula and their complications. Curr Probl Diagn Radiol 2012;41(1):20-29. Pearl MS, Hill MC, Zeman RK. CT findings in duodenal diverticulitis. AJR Am J Roentgenol 2006;187(4):W392-W395."}, {"number": "29a", "stem": "What is the entrance exposure limit for standard operation of a fluoroscope?", "options": [{"letter": "A", "text": "1 R/min"}, {"letter": "B", "text": "5 R/min"}, {"letter": "C", "text": "10 R/min"}, {"letter": "D", "text": "20 R/min"}], "images": ["assets/q29a_p228_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Dose rate to the patient is greatest at the skin where the x-ray beam enters. The entrance exposure limit for standard fluoroscopy is 10 R/min (100 mGy/min). Some fluoroscopic units are capable of a high-output \"boost\" mode, for which the limit is 20R/min (200 mGy/min). A typical fluoroscopic entrance exposure rate for a man of average build is approximately 30 mGy/min, and the dose for a standard gastrointestinal fluoroscopy procedure is typically in the 100 mGy range.\n\nReferences: Parry RA, Glaze SA, Archer BR. The AAPM/RSNA physics tutorial for residents. Typical patient radiation doses in diagnostic radiology. Radiographics 1999;19(5):1289-1302."}, {"number": "29b", "stem": "Which of the following maneuvers will decrease the patient dose during fluoroscopy?", "options": [{"letter": "A", "text": "Increasing the distance of the image intensifier from the patient"}, {"letter": "B", "text": "Removing the grid"}, {"letter": "C", "text": "Increasing the pulse rate using pulsed fluoroscopy"}, {"letter": "D", "text": "Selecting a lower kilovolt peak"}], "images": ["assets/q29a_p228_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Grids are utilized to improve image contrast by removing scattered radiation, but this is achieved at the cost of an increase in dosage. Removal of the grid will reduce the dose to about one-third to one-half. The other maneuvers all result in an increase in dosage. Increasing the distance of the image intensifier from the patient (widening the air gap) leads to an increased source-to-image receptor distance and an increased dose. Utilizing pulsed fluoroscopy instead of continuous fluoroscopy results in a dose reduction. The faster pulse rates result in greater x-ray exposure over a given unit of time, and the slower pulse rates will reduce the x-ray exposure. Selecting a higher kilovolt peak increases average beam energy (beam hardening) resulting in a greater percentage of x-rays penetrating the patient to reach the image intensifier. This leads to a decrease in tube current and decreased dosage. Conversely, the lower kilovolt peak will result in fewer penetrating beams and an increase in the milliamperage.\n\nReferences: Hernanz-Schulman M, Goske MJ, Bercha IH, et al. Pause and pulse: ten steps that help manage radiation dose during pediatric fluoroscopy. AJR Am J Roentgenol 2011;197(2):475-481. Mahesh M. Fluoroscopy: patient radiation exposure issues. Radiographics 2001;21(4): 1033-1045."}, {"number": "29c", "stem": "Reduction of the frame rate using pulse fluoroscopy from 30 frames per second to 15 frames per second", "options": [{"letter": "A", "text": "Results in no dosage change"}, {"letter": "B", "text": "Reduces the dosage by about 25%"}, {"letter": "C", "text": "Reduces the dosage by about 50%"}, {"letter": "D", "text": "Increases the dosage by about 50%"}], "images": ["assets/q29a_p228_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Most current fluoroscopic systems have the pulse fluoroscopy feature, which utilizes short pulses of the x-ray beam rather than continuous emission. Although it may seem that reducing the pulse rate by half should result in a commensurate reduction of dosage by half, most fluoroscopic systems are designed to increase milliamperage with pulse fluoroscopy in order to maintain acceptable image quality without excessive noise. This blunts the dose reduction effect such that changing the frame rate from 30 per second to 15 per second reduces the dosage by about 25%.\n\nReferences: Aufrichtig R, Xue P, Thomas CW, et al. Perceptual comparison of pulsed and continuous fluoroscopy. Med Phys 1994;21(2):245-256. Mahesh M. Fluoroscopy: patient radiation exposure issues. Radiographics 2001;21(4): 1033-1045."}, {"number": "30", "stem": "A 17-year-old female with a history of cramping abdominal pain undergoes a small bowel follow- through. A spot film of the ileocecal region is taken. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Crohn disease"}, {"letter": "B", "text": "Lymphoid nodular hyperplasia"}, {"letter": "C", "text": "Non-Hodgkin lymphoma"}, {"letter": "D", "text": "Carcinoid"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The small bowel follow-through spot image demonstrates multiple well-defined nodules in the terminal ileum, uniform in appearance and measuring 2 to 3 mm in size. These are typical in appearance for lymphoid nodular hyperplasia. These may be seen as a normal finding in young adults. When numerous or unusually prominent, they may be associated with infection, food hypersensitivity, or immunodeficiency states. There is no luminal narrowing to suggest Crohn disease. Carcinoid tumors may be multiple but are typically larger and fewer in number. Lymphoma may manifest as nodular abnormalities, but these would also be larger than seen in this case.\n\nReferences: Levine MS, Rubesin SE, Laufer I. Pattern approach for diseases of mesenteric small bowel on barium studies. Radiology 2008;249(2):445-460. Mansueto P, Iacono G, Seidita A, et al. Review article: intestinal lymphoid nodular hyperplasia in children-the relationship to food hypersensitivity. Aliment Pharmacol Ther 2012;35(9):1000-1009."}, {"number": "31", "stem": "A 45-year-old female presents for evaluation of chronic abdominal pain, which she states has been waxing and waning for 10 to 15 years and is exacerbated by meals. A small bowel follow- through was obtained. What finding is demonstrated? Early. Later.", "options": [{"letter": "A", "text": "Small bowel obstruction"}, {"letter": "B", "text": "Intestinal malrotation"}, {"letter": "C", "text": "Increased number of small bowel folds"}, {"letter": "D", "text": "Multiple tiny colonic polyps"}], "images": ["assets/q31_p229_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Early radiograph obtained during a small bowel follow-through study demonstrates failure of the duodenal C-loop to cross the midline, with multiple jejunal/proximal small bowel segments located in the right abdomen. A radiograph obtained later in the study demonstrates opacification of the cecum which is located in the left pelvis. The imaging features are compatible with intestinal malrotation. During embryogenesis, the midgut rotates around a central vascular pedicle before anchoring with the mesentery. Normal rotation and fixation allows the duodenal C- loop to cross the midline and locates the jejunum in left upper quadrant and cecum in the right lower quadrant. A failure of gut rotation can result in abnormal location and poor fixation of the bowel. These congenital anomalies can be clinically significant in infants and children, manifesting as bilious vomiting, duodenal obstruction, or small bowel volvulus. The prevalence in adults is less clear, estimated to occur in 0.2% to 0.5% of the population, with most being asymptomatic. Those with clinically significant symptoms, including postprandial pain or cramping, may benefit from surgery such as the Ladd procedure.\n\nReferences: Burke MS, Glick PL. Gastrointestinal malrotation with volvulus in an adult. Am J Surg 2008;195(4):501-503. Gamblin TC, Stephens RE Jr, Johnson RK, et al. Adult malrotation: a case report and review of the literature. Curr Surg 2003;60(5):517-520."}, {"number": "32a", "stem": "A 78-year-old female presents with abdominal pain and has a CT scan. What is the most likely etiology for the structure denoted by the arrow?", "options": [{"letter": "A", "text": "Gallbladder duplication"}, {"letter": "B", "text": "Teratoma"}, {"letter": "C", "text": "Meckel diverticulum"}, {"letter": "D", "text": "Appendicoliths in a dilated appendix"}], "images": ["assets/q32a_p231_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. An ovoid structure containing fluid and layering calculi is seen in the right abdomen associated with the ileum as indicated in this case, which identifies this as a Meckel diverticulum. Meckel diverticulum is the most common congenital anomaly of the gastrointestinal tract, occurring in 2% of the population. This diverticulum is a remnant of the omphalomesenteric (vitelline) duct, which connects the yolk sac to the midgut. This embryologic duct typically closes between the 5th and 8th weeks of gestation. Incomplete duct closure may result in a diverticulum, fistula, cyst, or fibrous band. A Meckel diverticulum is usually found in the distal small bowel 40 to 100 cm from the ileocecal valve along the antimesenteric side of the ileum. These diverticula or cysts are lined with heterotopic mucosa, usually gastric and less commonly pancreatic, small bowel, or a combination of different types. Meckel diverticula may be difficult to distinguish from other small bowel loops on barium studies, especially when similar in diameter to adjacent loops due to problems delineating the ostium and active emptying with peristalsis. Most patients with a Meckel diverticulum never develop symptoms. Bowel obstruction, bleeding, and diverticulitis account for most cases of symptomatic Meckel diverticula. Bowel obstruction may occur due to trapping of a bowel loop by a meso-diverticular band, volvulus around the band, or intussusception. Heterotopic gastric mucosa within the diverticula may bleed or secrete acid and cause inflammation or perforation. Neoplasms are uncommon (3% of symptomatic diverticula) and include a variety of histologic types, carcinoid being the most common.\n\nReferences: Elsayes KM, Menias CO, Harvin HJ, et al. Imaging manifestations of Meckel's diverticulum. AJR Am J Roentgenol 2007;189(1):81-88. Levy AD, Hobbs CM. From the archives of the AFIP. Meckel diverticulum: radiologic features with pathologic Correlation. Radiographics 2004;24(2):565-587."}, {"number": "32b", "stem": "A 57-year-old male presented with GI bleeding. Upper endoscopy was negative, and colonoscopy demonstrated a pool of blood in the ileum without a clear source. A Technetium- 99m red blood cell (99mTc RBC) scan followed by a CT enteroclysis are performed. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Gut duplication cyst"}, {"letter": "B", "text": "Meckel diverticulum with active bleeding"}, {"letter": "C", "text": "Meckel diverticulum without active bleeding"}, {"letter": "D", "text": "Appendiceal mucocele"}], "images": ["assets/q32b_p232_01.jpg", "assets/q32b_p232_02.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The 99mTc RBC scan demonstrated gradual accumulation of radiotracer in the right lower quadrant, which later moves into the right mid abdomen. The CT enteroclysis shows a cystic lesion in the right anterior pelvis with a mural nodule. Findings are consistent with a Meckel diverticulum with ectopic gastric mucosa. Movement of the radiotracer on the later images indicates intraluminal blood. A gut duplication cyst could contain ectopic gastric mucosa but would not communicate with the lumen and cause GI bleeding in the absence of ulceration or a fistula. The lesion is close to the cecal base and could represent an appendiceal mucocele although the solid nodule that is the presumed bleeding source is at the base of the lesion and would not be the cause of appendiceal orifice obstruction. A Meckel diverticulum is the most common congenital anomaly of the gastrointestinal tract present in 2% to 3% of the population. The Meckel diverticulum is located within 100 cm of the ileocecal valve. While most are asymptomatic, up to 40% may develop complications including hemorrhage, obstruction, and diverticulitis. Meckel diverticula are lined with heterotopic tissue in 60% of cases, most commonly gastric mucosa, with pancreatic, duodenal, and Brunner gland foci also found. A 99mTc pertechnetate scan (Meckel scan) can detect the presence of gastric mucosa as the agent behaves in the same manner as halide (e.g., chloride) ions. Hemorrhage is frequently more severe and common in the pediatric population. Obstruction may be secondary to bowel loops trapped by a fibrous band, volvulus of the diverticulum, or intussusception. Diverticulitis may be due to elevated acid secretion by the gastric mucosa or to obstruction due to an enterolith or foreign body."}, {"number": "32c", "stem": "What other anomaly may arise from the same embryologic origin as a Meckel diverticulum?", "options": [{"letter": "A", "text": "Vitelline duct cyst"}, {"letter": "B", "text": "Single umbilical artery"}, {"letter": "C", "text": "Urachal cyst"}, {"letter": "D", "text": "Unicornuate uterus"}], "images": ["assets/q32c_p233_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The omphalomesenteric duct (OMD) or vitelline duct is the embryonic communication between the yolk sac and the developing midgut. The midgut elongates and herniates into the umbilical cord (6th week of embryogenesis) where it rotates 90 degrees counterclockwise around the axis of the superior mesenteric artery. It returns to the abdomen (by the 10th week) and the OMD regresses. If any portion of the OMD does not atrophy, a number of anomalies may develop including an umbilicoileal fistula (complete persistence), a sinus tract, a cyst, or a fibrous connection from the ileum to the umbilicus. The other answer choices do not arise from the same embryologic anlage.\n\nReferences: Elsayes KM, Menias CO, Harvin HJ, et al. Imaging manifestations of Meckel's diverticulum. AJR Am J Roentgenol 2007;189(1):81-88. Levy AD, Hobbs CM. From the archives of the AFIP. Meckel diverticulum: radiologic features with pathologic Correlation. Radiographics 2004;24(2):565-587."}, {"number": "33", "stem": "A 45-year-old female presents with cough, constipation, and substernal chest pain. A barium small bowel follow-through is performed. What is the best diagnosis?", "options": [{"letter": "A", "text": "Gastroesophageal reflux"}, {"letter": "B", "text": "Gastric and small bowel ileus"}, {"letter": "C", "text": "Small bowel obstruction"}, {"letter": "D", "text": "Scleroderma"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The film from the small bowel follow-through demonstrates dilated loops of small bowel with thin folds that are closely spaced together. While both gastroesophageal reflux and an ileus are present, the small bowel fold pattern indicates a more specific diagnosis of scleroderma. Scleroderma (also known as progressive systemic sclerosis) is an autoimmune disease of unknown etiology in which there is widespread collagen deposition in tissues. It affects multiple organ systems with the skin followed by the GI tract being the most commonly involved. The esophagus is affected in 50% to 90% of cases and the small bowel in 50% of cases. Smooth muscle fibrosis in the GI tract leads to hypomotility and stasis. This can cause bacterial overgrowth and malabsorption. The fibrosis also leads to small bowel dilatation and a pseudo- obstruction pattern. As the fibrosis tends to involve the circular muscular layer, this leads to valvular packing and fold compression, the \"hide-bound\" appearance. Significant gastrointestinal involvement with scleroderma has a poor prognosis with a 5-year mortality of over 50%. Esophageal hypomotility (in the distal 2/3 of the esophagus which has smooth muscle) leads to gastroesophageal reflux and dysphagia, which are the most common gastrointestinal manifestations of the disease. Other visceral manifestations of scleroderma include gastric atony, megaduodenum, and wide-mouthed diverticula (more common in the colon). Absent gastrocolic reflex can lead to constipation.\n\nReferences: Domsic R, Fasanella K, Bielefeldt K. Gastrointestinal manifestations of systemic sclerosis. Dig Dis Sci 2008;53(5):1163-1174. Pickhardt PJ. The \"hide-bound\" bowel sign. Radiology 1999;213(3):837-838."}, {"number": "34a", "stem": "Early transient erythema is encountered at what approximate threshold dose?", "options": [{"letter": "A", "text": "0.2 Gy"}, {"letter": "B", "text": "2 Gy"}, {"letter": "C", "text": "20 Gy"}, {"letter": "D", "text": "200 Gy"}], "images": ["assets/q34a_p235_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The maximum dose in fluoroscopic exposure is delivered to the skin surface at which the x-ray beam enters. Most of the cases of documented radiation-induced skin damage have occurred with cardiac catheterization and interventional procedures, not with diagnostic fluoroscopic procedures. Early transient erythema of the skin may be seen hours following doses of more than 2 Gy. This occurs due to changes in capillary permeability. The main erythema reaction occurs about 1.5 weeks after exposure and is seen with doses about 6 Gy. Other significant effects include epilation (hair loss), which may be temporary at doses of about 3 Gy, and permanent when the dose exceeds about 7 Gy. Dry and moist desquamation, secondary ulceration, and late erythema occur several weeks after exposure. Late effects to the skin including dermal atrophy and necrosis develop months to years after exposure to 10 to 18 Gy."}, {"number": "34b", "stem": "For a patient of average build, at what approximate duration of fluoroscopy time does erythematous skin change become a risk?", "options": [{"letter": "A", "text": "5 minutes"}, {"letter": "B", "text": "20 minutes"}, {"letter": "C", "text": "1 hour"}, {"letter": "D", "text": "2 hours"}], "images": ["assets/q34b_p236_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. With skin entrance exposure rates of between 10 and 50 mGy/min (30 mGy/min for a man of medium build), doses can reach a total of 0.6 to 3 Gy after 1 hour of normal (not high dose) fluoroscopy. As noted above, the threshold dose for erythematous skin changes is 2 Gy.\n\nReferences: Hall EJ, Giaccia AJ. Radiobiology for the radiologist, 6th ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2006. Parry RA, Glaze SA, Archer BR. The AAPM/RSNA physics tutorial for residents. Typical patient radiation doses in diagnostic radiology. Radiographics 1999;19(5):1289-1302. Wagner LK, Archer BR. Minimizing risks from fluoroscopic x-rays, 2nd ed. Houston, TX: Partners in Radiation Management, 1998. 35 Answer: D.Fluoroscopic spot image from upper GI study (Figure 14) demonstrates a barium- filled sac within the lumen of the 2nd and 3rd portions of the duodenum, bounded by a thin radiolucent curvilinear line. This is a duodenal windsock sign and compatible with an intraluminal duodenal diverticulum. An intraluminal duodenal diverticulum is a rare congenital anomaly due to failure of normal recanalization of the duodenal lumen during embryogenesis. As a result, a thin web or diaphragm remains in the lumen and elongates slowly over time with continued intestinal peristalsis. The diverticulum can be eccentrically attached to the duodenal wall or circumferentially attached in which case a small diverticular hole must be present to prevent duodenal obstruction. Patients generally present in 3rd decade of life with epigastric pain and vomiting. Complete duodenal obstruction can occur if the orifice is occluded by food debris. Pancreatitis, cholangitis, and ulcer disease have all been reported as rare complications. Treatment is increasingly performed via endoscopy, although surgical techniques can also be applied.\n\nReferences: Materne R. The duodenal wind sock sign. Radiology 2001;218(3):749-750. Schroeder TC, Hartman M, Heller M, et al. Duodenal diverticula: potential complications and common imaging pitfalls. Clin Radiol 2014;69(10):1072-1076."}, {"number": "35", "stem": "A 29-year-old female presents with a progressive history of radiating back pain, nausea, and vomiting. Currently, the patient is only able to eat yogurt and juice consistencies. An upper GI procedure was performed. What is the best diagnosis?", "options": [{"letter": "A", "text": "Duodenal carcinoma"}, {"letter": "B", "text": "Duodenal polyp"}, {"letter": "C", "text": "Duodenal ulcer"}, {"letter": "D", "text": "Duodenal intraluminal diverticulum"}], "images": ["assets/q35_p352_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "35 Answer: D.Fluoroscopic spot image from upper GI study (Figure 14) demonstrates a barium- filled sac within the lumen of the 2nd and 3rd portions of the duodenum, bounded by a thin radiolucent curvilinear line. This is a duodenal windsock sign and compatible with an intraluminal duodenal diverticulum. An intraluminal duodenal diverticulum is a rare congenital anomaly due to failure of normal recanalization of the duodenal lumen during embryogenesis. As a result, a thin web or diaphragm remains in the lumen and elongates slowly over time with continued intestinal peristalsis. The diverticulum can be eccentrically attached to the duodenal wall or circumferentially attached in which case a small diverticular hole must be present to prevent duodenal obstruction. Patients generally present in 3rd decade of life with epigastric pain and vomiting. Complete duodenal obstruction can occur if the orifice is occluded by food debris. Pancreatitis, cholangitis, and ulcer disease have all been reported as rare complications. Treatment is increasingly performed via endoscopy, although surgical techniques can also be applied. References: Materne R. The duodenal wind sock sign. Radiology 2001;218(3):749-750. Schroeder TC, Hartman M, Heller M, et al. Duodenal diverticula: potential complications and common imaging pitfalls. Clin Radiol 2014;69(10):1072-1076."}, {"number": "36", "stem": "A 19-year-old female has a history of intermittent abdominal pain. On physical examination, she is noted to have pigmented lesions on her lips and oral mucosa. An MR enterography is performed. The most likely diagnosis is", "options": [{"letter": "A", "text": "Neurofibromatosis type 1"}, {"letter": "B", "text": "Gardner syndrome"}, {"letter": "C", "text": "Metastatic melanoma"}, {"letter": "D", "text": "Peutz-Jeghers"}], "images": ["assets/q36_p237_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Peutz-Jeghers syndrome is characterized by mucocutaneous pigmented lesions and hamartomas of the gastrointestinal tract. There is no gender predominance. Diagnosis is usually made in childhood or early adulthood. Inheritance is autosomal dominant with variable penetrance although some cases may arise from spontaneous mutations to the serine/threonine kinase 11 tumor suppressor gene on chromosome 19p13. The mucocutaneous pigmentation lesions that are characteristic in Peutz-Jeghers are common in the perioral and periorbital regions. The gastrointestinal polyps of Peutz-Jeghers syndrome are hamartomatous, and the small bowel is the most common site, although they may be found anywhere in the gastrointestinal tract from the stomach to the rectum. Abdominal pain is a common presentation due to small bowel intussusceptions caused by the polyps. Small bowel polyps can ulcerate and bleed. Although the small bowel polyps are hamartomatous, patients with Peutz-Jeghers syndrome have an increased risk of developing gastrointestinal adenocarcinomas. Most of these carcinomas are found in the stomach, duodenum, and colon, with the small bowel the least common site of malignancy. Although hamartomas are not themselves malignant, possible origins are islands of adenomatous epithelium within the hamartomas or adjacent adenomatous polyps. Patients with Peutz-Jeghers are also at risk for other malignancies of the pancreas, breast, thyroid, and ovarian and testis. Overall lifetime risk for intestinal and extraintestinal sources is high, with 1% to 2% risk by age 20 years, over 30% by age 50 years, and more than 80% by age 70 years. Endoscopic surveillance is recommended for malignancy screening, and for polypectomy when possible, to minimize the risk of small bowel obstruction and need for surgical resection. Neurofibromatosis may be associated with skin lesions, but these are not generally pigmented. Gardner syndrome may involve small bowel polyps and other mesenchymal tumors (e.g., desmoids, osteomas) but do not have pigmented skin lesions. Metastatic melanoma may involve pigmented lesions and small bowel polypoid metastases but would be less common in this age group.\n\nReferences: Achatz MI, Porter CC, Brugieres L, et al. Cancer screening recommendations and clinical management of inherited gastrointestinal cancer syndromes in childhood. Clin Cancer Res 2017;23(13):e107-e114. Cho GJ, Bergquist K, Schwartz AM. Peutz-Jeghers syndrome and the hamartomatous polyposis syndromes: radiologic-pathologic correlation. Radiographics 1997;17(3):785-791. Rufener SL, Koujok K, McKenna BJ, et al. Small bowel intussusception secondary to Peutz-Jeghers polyp. Radiographics 2008;28(1):284-288."}, {"number": "37", "stem": "A 24-year-old female with a history of anorexia nervosa presents with abdominal pain and vomiting. A CT scan is obtained. What anatomic factors may be responsible for these findings?", "options": [{"letter": "A", "text": "Presence of a median arcuate ligament"}, {"letter": "B", "text": "Narrowed angle between the superior mesenteric artery and aorta"}, {"letter": "C", "text": "Abnormal position of the ligament of Treitz"}, {"letter": "D", "text": "Retroaortic location of the left renal vein"}], "images": ["assets/q37_p356_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The CT demonstrates marked gastric and duodenal dilatation to the level of the horizontal portion of the duodenum as it crosses over the aorta. Small bowel loops distal to this level are normal in caliber. The aortomesenteric angle (AMA) formed by the superior mesenteric artery (SMA) and the aorta is narrowed with loss of the normal retroperitoneal fat (normal angle is 28 to 65 degrees) and the aortomesenteric distance decreased (normal 10 to 34 mm). This causes compression of the duodenum as it crosses between the aorta and the SMA with gastric and proximal duodenal obstruction, known as the SMA syndrome. The syndrome is controversial as some degree of compression of the horizontal duodenum may be seen in asymptomatic people. However, in normal individuals, the AMA may be not be as fixed as with patients who have little retroperitoneal fat due to rapid weight loss. Similar compression of the horizontal duodenum between the SMA and aorta may be seen in patients who have had surgical repair of scoliosis. Narrowed aortomesenteric angle (AMA). The other choices describe variants that are associated with different types of obstruction. The median arcuate ligament causes compression of the celiac artery. Abnormal position of the ligament of Treitz is seen in malrotation with potential for proximal small bowel obstruction due to fibrous bands (Ladd bands). The left renal vein may be compressed if it passes behind the aorta or between the aorta and the SMA.\n\nReferences: Konen E, Amitai M, Apter S, et al. CT angiography of superior mesenteric artery syndrome. AJR Am J Roentgenol 1998;171(5):1279-1281. Lamba R, Tanner DT, Sekhon S, et al. Multidetector CT of vascular compression syndromes in the abdomen and pelvis. Radiographics 2014;34(1):93-115. or not at all. Patient 1. A 35-year-old male who has recently started a course of immunosuppressive therapy for newly diagnosed Crohn's presents to the emergency department with worsening of abdominal pain for 1 week. On examination, he exhibits right lower quadrant guarding and is found to have a leukocytosis and fever. Patient 2. A 20-year-old female diagnosed at age 15 with Crohn disease with a history of ileal strictures presents with a history of mild postprandial abdominal pain increasing over the past month. Patient 3. A 56-year-old female with long standing history of Crohn disease and history of a prior hysterectomy presents with urinary tract infections and pneumaturia. Patient 4. A 73-year-old male who underwent an ileocolonoscopy for investigation of cramping abdominal pain with findings of mild ileal erosions suspicious for Crohn disease. A. MR enterography B. CT enterography or conventional CT C. Barium small bowel follow-through D. Capsule endoscopy 47 Cavitary mesenteric lymph node syndrome consists of A. Low-attenuation lymph nodes, splenic atrophy, and villous atrophy B. Low-attenuation lymph nodes, small bowel fold thickening, and mycobacterium tuberculosis infection C. Low-attenuation lymph nodes, small bowel fold thickening, and migratory arthralgias D. Low-attenuation lymph nodes, thyroiditis, and myasthenia gravis 48 Extended matching: Each answer may be used only once. 1. Ingestion of sushi 2. Rectal prolapse 3. Iron-deficiency anemia 4. Cholangitis or pancreatitis A. Ascaris B. Trichuris C. Hookworm D. Anisakis"}, {"number": "38", "stem": "A 54-year-old male with chronic cramping abdominal pain undergoes a barium small bowel follow-through. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Jejunal diverticulosis"}, {"letter": "B", "text": "Ischemic small bowel strictures"}, {"letter": "C", "text": "Carcinoid"}, {"letter": "D", "text": "Crohn disease"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The small bowel study demonstrates findings of long segmental strictures in the ileum with pseudosacculations consistent with Crohn disease. The inflammation leads to fibrofatty proliferation causing asymmetric straightening and shortening along the mesenteric side of the bowel, with the uninvolved wall along the antimesenteric side forming redundant saccules. The skip involvement is typical of Crohn disease. Narrowing of the lumen may be due to a combination of spasm, which may not cause significant upstream obstruction, or fibrosis and proliferation of smooth muscle, which is associated with upstream dilatation. Jejunal diverticulosis does not involve luminal narrowing as seen in this case. Small bowel ischemia may resemble acute Crohn disease with smooth fold thickening, but in this case, the folds are effaced due to marked wall thickening. Carcinoid can cause a mesenteric shortening similar to Crohn disease but the luminal narrowing would not cause the long strictures seen in this case and would be fixed, leading to a greater degree of obstructions. The small bowel follow-through demonstrates the findings of Crohn enteritis with excellent mucosal detail and is superior to cross-sectional imaging for evaluation of early disease. It can distinguish between strictures and segments of peristalsis. It is limited in its ability to evaluate extraintestinal manifestations of disease and is not ideal for frequent follow-up due to radiation dosage concerns.\n\nReferences: Boland G. Gastrointestinal imaging: the requisites. Philadelphia, PA: Elsevier, 2014. Gore RM, Levine MS. Textbook of gastrointestinal radiology, 4th ed. Philadelphia, PA: Elsevier/Saunders, 2015."}, {"number": "39", "stem": "A 56-year-old patient presents with a long-standing history of diarrhea (12 months). Colonoscopy was reported as unremarkable. What is the most likely diagnosis on this MR enterography? T2-weighted fat-saturated.Diffusion-weighted.Postcontrast T1-weighted.", "options": [{"letter": "A", "text": "Active Crohn disease"}, {"letter": "B", "text": "Chronic Crohn disease"}, {"letter": "C", "text": "Small bowel lymphoma"}, {"letter": "D", "text": "Acute gastroenteritis"}], "images": ["assets/q39_p279_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. A long segment of ileum demonstrates wall thickening, T2-hyperintense mural signal, restricted diffusion, and mucosal enhancement. These findings are highly suggestive of active Crohn disease, as compared to chronic disease. Note that some enhancement may be seen with fibrotic disease, but the intensity tends to be less than with active disease. Additional findings of active disease not shown in this case include mesenteric vascular engorgement (comb sign), prominent enhancing regional mesenteric lymphadenopathy, mucosal ulcerations, and fistulous disease. With effective treatments available for Crohn disease, the goal is to develop a treat-to-target strategy that will alter the natural history of the disease and prevent irreversible fibrostenotic lesions as well as the penetrating extraintestinal complications. Small bowel lymphoma demonstrates aneurysmal dilatation of bowel loop along with regional lymphadenopathy and would not typically show preferential mucosal enhancement. The patient's chronic symptomatology does not suggest acute gastroenteritis.\n\nReferences: Bruining DH, Bhatnagar G, Rimola J, et al. CT and MR enterography in Crohn's disease: current and future applications. Abdom Imaging 2015;40(5):965-974. Griffin N, Grant LA, Anderson S, et al. Small bowel MR enterography: problem solving in Crohn's disease. Insights Imaging 2012;3(3):251-263."}, {"number": "40", "stem": "A 48-year-old male presents with mild right lower quadrant pain and 2-day history of diarrhea. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Appendicitis"}, {"letter": "B", "text": "Lymphoma"}, {"letter": "C", "text": "Adenocarcinoma"}, {"letter": "D", "text": "Infection"}], "images": ["assets/q40_p280_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The CT demonstrates mild uniform circumferential wall thickening of the terminal ileum. The colon is not fully distended, but the cecum and ascending colon also demonstrates mild wall thickening. There is a small amount of free fluid present. The appendix is not shown, but the abnormality involves the ileum and the ascending colon and is not concentrated at the cecal tip. The wall thickening is regular and mild, not mass-like and therefore unlikely to be neoplastic. Adenocarcinoma of the ileum is annular and constricting, and the lumen is normal in this case. With the relatively mild wall thickening (<1 cm), an infectious or inflammatory etiology is most likely. Crohn disease (not included in the options) could have this appearance. Infections involving the ileum and right colon are usually caused by Yersinia (as in this case), Campylobacter, or Salmonella species. Tuberculous infection also involves this area and may mimic Crohn disease. With infectious ileocecitis, lymphadenopathy (not shown in this case) is commonly present.\n\nReferences: Hoeffel C, Crema MD, Belkacem A, et al. Multi-detector row CT: spectrum of diseases involving the ileocecal area. Radiographics 2006;26(5):1373-1390."}, {"number": "41", "stem": "A 45-year-old male presents with postprandial abdominal bloating. A small bowel follow through is performed. What is the likely diagnosis?", "options": [{"letter": "A", "text": "Normal peristalsis"}, {"letter": "B", "text": "Crohn disease"}, {"letter": "C", "text": "Gastrointestinal stromal tumor"}, {"letter": "D", "text": "Adenocarcinoma"}], "images": ["assets/q41_p281_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The small bowel follow-through demonstrates an annular mass in the jejunum with a \"napkin-ring\" appearance typical for a small bowel tumor, most likely an adenocarcinoma. The lesion is persistent on spot imaging and is not focal peristaltic narrowing. The abrupt and short segment of involvement would be atypical for Crohn disease. Gastrointestinal stromal tumors tend to have an exophytic growth pattern. Small bowel malignancies are rare, accounting for 2% of all GI malignancies. They are 1/50th as common as adenocarcinoma of the colon. Close to two-thirds of small bowel tumors are malignant and 40% of the malignancies are adenocarcinoma. Small bowel adenocarcinomas arise from premalignant adenomas, similar to colon adenocarcinomas. Small bowel adenocarcinomas are more common in the proximal small bowel, with 50% arising from the duodenum, 30% in the jejunum, and 20% in the ileum. The duodenum and jejunum are the first segments of small bowel exposed to ingested toxins and pancreaticobiliary secretions, which may account for the increased frequency in these segments. An annular or polypoid mass are the most common morphologic forms. Increased incidence of small bowel adenocarcinoma is seen with familial adenomatous polyposis, Crohn disease, and hereditary nonpolyposis colorectal cancer.\n\nReferences: Kummar S, Ciesielski TE, Fogarasi MC. Management of small bowel adenocarcinoma. Oncology (Williston Park) 2002;16(10):1364-1369; discussion 1370, 1372-1373. Neugut AI, Marvin MR, Rella VA, et al. An overview of adenocarcinoma of the small intestine. Oncology (Williston Park) 1997;11(4):529-536; discussion 545, 549-550. Vagholkar K, Mathew T. Adenocarcinoma of the small bowel: a surgical dilemma. Saudi J Gastroenterol 2009;15(4):264-267."}, {"number": "42", "stem": "Regarding small bowel gastrointestinal tumors (GST), which of the following is TRUE?", "options": [{"letter": "A", "text": "GST most commonly present with small bowel obstruction."}, {"letter": "B", "text": "The associated lymphadenopathy is typically larger than the primary tumor."}, {"letter": "C", "text": "Cystic transformation is commonly seen with treated metastases."}, {"letter": "D", "text": "The lungs are the second most common site of metastases."}], "images": ["assets/q42_p282_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The CT demonstrates a typical GST tumor with heterogeneous enhancement and a necrotic center. The necrotic portions may communicate with the bowel lumen, and the tumor may also involve the myenteric plexus, leading to an aneurysmal dilatation similar in appearance to lymphoma. Treated liver metastases commonly become almost entirely cystic. GST often have an exophytic growth pattern. Unlike adenocarcinoma, they do not involve the bowel circumferentially and seldom cause obstruction. GST metastasize to liver, the peritoneum, and less commonly the omentum. They are seldom associated with nodal metastases, and if mesenteric masses are present separate from the primary tumor, these are more likely peritoneal metastases. Lung metastases are extremely rare.\n\nReferences: Levy AD, Remotti HE, Thompson WM, et al. Gastrointestinal stromal tumors: radiologic features with pathologic correlation. Radiographics 2003;23(2):283-304, 456; quiz 532. Sandrasegaran K, Rajesh A, Rydberg J, et al. Gastrointestinal stromal tumors: clinical, radiologic, and pathologic features. AJR Am J Roentgenol 2005;184(3):803-811."}, {"number": "43", "stem": "The most common cause for small bowel obstruction in the United States is", "options": [{"letter": "A", "text": "Adhesions"}, {"letter": "B", "text": "Hernias"}, {"letter": "C", "text": "Neoplasm"}, {"letter": "D", "text": "Crohn disease"}], "images": ["assets/q43_p283_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Adhesions account for up to 70% of small bowel obstructions (SBO) in the developed countries. Most patients will have a history of prior surgery; prior episodes of peritonitis may also result in adhesions. Adhesions are usually not directly visualized on imaging but are implied by a sharp transition in bowel caliber from dilated to nondilated without a mass or other cause for obstruction identified. Hernias were formerly the most common cause of SBO in the United States and remain so in many foreign countries. As more cross-sectional imaging is being performed, more hernias are being identified and electively repaired. When neoplasm causes an SBO, it is most commonly due to metastatic disease and peritoneal carcinomatosis. Crohn disease may present acutely as an SBO due to transmural inflammation and extrinsic serosal disease causing obstruction or may be due to chronic cicatricial fibrosing strictures.\n\nReferences: Mullan CP, Siewert B, Eisenberg RL. Small bowel obstruction. AJR Am J Roentgenol 2012;198(2):W105-W117. Silva AC, Pimenta M, Guimaraes LS. Small bowel obstruction: what to look for. Radiographics 2009;29(2):423-439."}, {"number": "44", "stem": "Regarding the CT images below, what is the most common etiology of this condition?", "options": [{"letter": "A", "text": "Herniation"}, {"letter": "B", "text": "Adhesions"}, {"letter": "C", "text": "Congenital bands"}, {"letter": "D", "text": "Peritoneal mass"}], "images": ["assets/q44_p284_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Closed loop obstruction is subtype of small bowel obstruction. Mechanical obstruction occurs at two adjacent points along the course of small bowel adjacent. This creates a narrow pedicle around which the closed loop can rotate creating a small bowel volvulus. As a result, there is high risk for vascular compromise resulting in bowel ischemia and necrosis. The most common cause is adhesions. Other etiologies include internal or external hernias, congenital bands, and malrotation. Imaging findings on CT included the U or C sign, fusiform tapering of the small bowel segment at site of obstruction and convergence of mesenteric vessels at site of obstruction. Findings raising the suspicious for ischemia include bowel wall thickening; increased or decreased bowel enhancement; mesenteric engorgement and free fluid; and pneumatosis or free air. This is considered an emergency due to high mortality rate of up to 35%. Treatment is surgical exploration.\n\nReferences: Martin LC, Merkle EM, Thompson WM. Review of internal hernias: radiographic and clinical findings. AJR Am J Roentgenol 2006;186(3):703-717. Takeyama N, Gokan T, Ohgiya Y, et al. CT of internal hernias. Radiographics 2005;25(4): 997-1015."}, {"number": "45", "stem": "A patient who was a restrained passenger in an MVA has the following CT scan. Which of the following statements is most likely TRUE?", "options": [{"letter": "A", "text": "In blunt trauma, duodenal injuries are commonly associated with other organ injury."}, {"letter": "B", "text": "Duodenal injuries are usually clinically apparent immediately."}, {"letter": "C", "text": "Water-soluble contrast duodenography may help establish the diagnosis of duodenal injury if CT is equivocal."}, {"letter": "D", "text": "Duodenal intramural hematoma requires urgent surgical repair."}], "images": ["assets/q45_p284_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The CT scan demonstrates duodenal wall thickening and areas of discontinuity of the normally enhancing wall in the horizontal portion (arrow). Retroperitoneal fluid and small amounts of air (arrowhead) are present indicating perforation. Isolated duodenal injuries are uncommon in blunt trauma. Usually the result of severe anterior- posterior compression against the spine, as in a lap belt, steering column, or bicycle handlebar injury, other organ injury is common. Pancreatic trauma is often associated, as well as injuries to the left hepatic lobe and spleen. As duodenal injuries may be restricted to the retroperitoneal space, the diagnosis may not be clinically apparent immediately. Delays in diagnosis significantly increase morbidity and mortality, and careful investigation for subtle findings on CT is needed. CT is the primary mode of diagnosis. Findings range from wall thickening and intramural hypodensity indicating contusion or hyperdensity indicating hematoma to evidence of perforation with frank wall disruption and retroperitioneal and possibly intraperitoneal fluid and gas. Duodenography has limited sensitivity for diagnosis of perforation. Duodenal hematoma may be managed conservatively, whereas perforation warrants immediate surgical repair.\n\nReferences: Linsenmaier U, Wirth S, Reiser M, et al. Diagnosis and classification of pancreatic and duodenal injuries in emergency radiology. Radiographics 2008;28(6):1591-1602. Soto JA, Anderson SW. Multidetector CT of blunt abdominal trauma. Radiology 2012;265(3):678-693. 46s Answers Patient 1: B. Given the patient's fever and leukocytosis, concern is raised for extraluminal extension of disease. CT is widely available and the scan time minimal, which is helpful for a patient in significant pain. The examination may be performed as a CT enterography study with an attempt at maximizing bowel distention for optimal wall analysis. If the patient is too ill to tolerate the oral contrast, a standard CT with intravenous contrast will still be sufficient to assess the extraintestinal tissues for complications such as an abscess or fistula. Patient 2: A. Given the patient's age and probable need for recurrent imaging, radiation doses should be minimized. MR enterography involves no ionizing radiation and will be able to assess the bowel wall for thickening and enhancement, evaluate the degree of bowel dilatation in the setting of known strictures, and image the extraintestinal tissues. Patient 3: B. The patient's history raises question of a enterovesical or colovesical fistula. Given her history of a hysterectomy, pelvic loops may be crowded in the pelvis and difficult to separate on a barium small bowel follow-through. Cross-sectional imaging is more appropriate and given the superior spatial resolution of CT over MR, the CT enterography or conventional CT would be the ideal choice. Patient 4: C. With the findings suspicious for early Crohn disease, investigation of the more proximal small bowel to determine extent of involvement is indicated. Cross-sectional imaging with either CT or MR is insensitive for evaluation of early disease. The small bowel follow- through is more sensitive for early changes such as aphthae or erosions. A capsule endoscopy will be the most sensitive for early changes of Crohn's. It should not be attempted as an initial small bowel study in a patient with suspected stricturing disease. In one small study, 15% of patients with suspected Crohn disease retained the capsule.\n\nReferences: Bruining DH, Bhatnagar G, Rimola J, et al. CT and MR enterography in Crohn's disease: current and future applications. Abdom Imaging 2015;40(5):965-974. Lee NM, Eisen GM. 10 years of capsule endoscopy: an update. Expert Rev Gastroenterol Hepatol 2010;4(4):503-512."}, {"number": "46a", "stem": "Match the patient with the optimal imaging choice. Each choice may be used once, more than once, or not at all. Patient 1. A 35-year-old male who has recently started a course of immunosuppressive therapy for newly diagnosed Crohn's presents to the emergency department with worsening of abdominal pain for 1 week. On examination, he exhibits right lower quadrant guarding and is found to have a leukocytosis and fever. Patient 2. A 20-year-old female diagnosed at age 15 with Crohn disease with a history of ileal strictures presents with a history of mild postprandial abdominal pain increasing over the past month. Patient 3. A 56-year-old female with long standing history of Crohn disease and history of a prior hysterectomy presents with urinary tract infections and pneumaturia. Patient 4. A 73-year-old male who underwent an ileocolonoscopy for investigation of cramping abdominal pain with findings of mild ileal erosions suspicious for Crohn disease. Select the optimal imaging choice for Patient 1.", "options": [{"letter": "A", "text": "MR enterography"}, {"letter": "B", "text": "CT enterography or conventional CT"}, {"letter": "C", "text": "Barium small bowel follow-through"}, {"letter": "D", "text": "Capsule endoscopy"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "46s Answers Patient 1: B. Given the patient's fever and leukocytosis, concern is raised for extraluminal extension of disease. CT is widely available and the scan time minimal, which is helpful for a patient in significant pain. 512."}, {"number": "46b", "stem": "Match the patient with the optimal imaging choice. Each choice may be used once, more than once, or not at all. Patient 1. A 35-year-old male who has recently started a course of immunosuppressive therapy for newly diagnosed Crohn's presents to the emergency department with worsening of abdominal pain for 1 week. On examination, he exhibits right lower quadrant guarding and is found to have a leukocytosis and fever. Patient 2. A 20-year-old female diagnosed at age 15 with Crohn disease with a history of ileal strictures presents with a history of mild postprandial abdominal pain increasing over the past month. Patient 3. A 56-year-old female with long standing history of Crohn disease and history of a prior hysterectomy presents with urinary tract infections and pneumaturia. Patient 4. A 73-year-old male who underwent an ileocolonoscopy for investigation of cramping abdominal pain with findings of mild ileal erosions suspicious for Crohn disease. Select the optimal imaging choice for Patient 2.", "options": [{"letter": "A", "text": "MR enterography"}, {"letter": "B", "text": "CT enterography or conventional CT"}, {"letter": "C", "text": "Barium small bowel follow-through"}, {"letter": "D", "text": "Capsule endoscopy"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "46s Answers Patient 1: B. Given the patient's fever and leukocytosis, concern is raised for extraluminal extension of disease. CT is widely available and the scan time minimal, which is helpful for a patient in significant pain. The examination may be performed as a CT enterography study with an attempt at maximizing bowel distention for optimal wall analysis. If the patient is too ill to tolerate the oral contrast, a standard CT with intravenous contrast will still be sufficient to assess the extraintestinal tissues for complications such as an abscess or fistula. Patient 2: A. Given the patient's age and probable need for recurrent imaging, radi     const APP_ID = "gi-imaging-small-bowel-quiz-ch3";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SEED_VERSION = 1;
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID || saved.defaultSeedVersion !== DEFAULT_SEED_VERSION) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        defaultSeedVersion: DEFAULT_SEED_VERSION,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
