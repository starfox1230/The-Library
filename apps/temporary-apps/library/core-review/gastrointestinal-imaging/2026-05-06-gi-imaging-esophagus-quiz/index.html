  <script>
    const QUESTIONS = [{"number": "1", "stem": "A 50-year-old male presents with a 10-year history of intermittent substernal chest pain. An esophagram is performed. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Varices"}, {"letter": "B", "text": "Caustic ingestion"}, {"letter": "C", "text": "Gastroesophageal reflux disease (GERD)"}, {"letter": "D", "text": "Pill esophagitis"}], "images": ["assets/q1_p012_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. On this double-contrast esophagram, the findings are of distal esophageal stricture, shallow ulcerations, mucosal nodularity, and sacculations caused by adjacent scarring. These findings in the distal esophagus are typical for gastroesophageal reflux disease (GERD) with a peptic stricture. Caustic ingestion typically results in a long stricture, and an appropriate history is usually declared. Varices present as irregular serpentine filling defects, not as a stricture. Pill esophagitis typically occurs in the midesophagus due to delay in passage of a pill (e.g., tetracycline, quinidine, potassium chloride) at points of extrinsic compression on the esophagus from the aortic arch or left mainstem bronchus. Gastroesophageal reflux disease (GERD) is the most common gastrointestinal disorder presenting in outpatient visits. Up to 20% of adults in the United States report having experienced chronic heartburn, the classic symptom of GERD. The actual prevalence of GERD is hard to document, because the correlation between symptoms and endoscopic findings of the disease are not perfect; a significant number of people who have endoscopic evidence of Barrett esophagus or esophagitis are asymptomatic.\n\nReferences: Kahrilas PJ, Kim HC, Pandolfino JE. Approaches to the diagnosis and grading of hiatal hernia. Best Pract Res Clin Gastroenterol 2008;22(4):601-616. Shaheen NJ, Hansen RA, Morgan DR, et al. The burden of gastrointestinal and liver diseases, 2006. Am J Gastroenterol 2006;101(9):2128-2138."}, {"number": "2", "stem": "On these barium esophagram studies (A through E), which of the following entities is NOT typically associated with gastroesophageal reflux disease (GERD)?", "options": [{"letter": "A", "text": "Case A"}, {"letter": "B", "text": "Case B"}, {"letter": "C", "text": "Case C"}, {"letter": "D", "text": "Case D"}, {"letter": "E", "text": "Case E"}], "images": ["assets/q2_p013_01.jpg", "assets/q2_p014_01.jpg", "assets/q2_p015_01.jpg", "assets/q2_p016_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. In answer B, the dilated esophagus with a bird's beak configuration of the lower esophageal sphincter (LES) is the classic appearance of achalasia. This condition is associated with failure of the lower esophageal sphincter (LES) to relax; with gastroesophageal reflux, the LES is patulous. Answer A demonstrates esophageal intramural pseudodiverticulosis (EIP), an uncommon finding in which dilated mucous glands are found in association with reflux esophagitis. While Candida may be cultured in a significant number of patients with EIP, this is felt to be more likely a secondary infection. Answer C shows a sliding type I hiatal hernia which is commonly found in patients who have significant GERD. Whether the hiatal hernia causes the gastroesophageal reflux is controversial; inflammation from the gastroesophageal reflux causes longitudinal shortening of the esophagus, which disrupts the anchoring ligaments at the LES and may actually cause the hernia. The intrinsic dysfunction of the LES is the primary determinant of gastroesophageal reflux. Answer D demonstrates the uniform, fine transverse folds that are seen transiently during an esophagram known as \"feline esophagus,\" which have a high association with gastroesophageal reflux. Answer E demonstrates a gastric fold extending into the distal esophagus with a clubbed terminus, known as an inflammatory esophagogastric polyp, or polyp-fold complex. This is a benign regenerative mucosal response to esophagitis, most commonly in the setting of GERD. While it is itself benign, it is a marker of significant reflux esophagitis, for which endoscopic evaluation is warranted.\n\nReferences: Gore RM, Levine MS. Textbook of gastrointestinal radiology, 4th ed. Philadelphia, PA: Elsevier/Saunders, 2015. Levine MS, Rubesin SE. Diseases of the esophagus: diagnosis with esophagography. Radiology 2005;237(2):414-427."}, {"number": "3", "stem": "A 56-year-old male presents with history of chronic substernal chest pain and belching following weight gain over the past 5 years. The following image is obtained. What is the next best step?", "options": [{"letter": "A", "text": "Follow the patient clinically as he is improving on medical therapy."}, {"letter": "B", "text": "Recommend endoscopic evaluation with biopsy."}, {"letter": "C", "text": "Refer to a surgeon for findings concerning for malignancy."}, {"letter": "D", "text": "Obtain a 24-hour pH monitoring test to confirm suspicion of gastroesophageal reflux."}], "images": ["assets/q3_p017_01.jpg", "assets/q3_p018_01.jpg"], "explanationImages": ["assets/a3_p057_01.jpg"], "answer": "B", "explanation": "Answer B. The findings are of a mid-esophageal stricture in the setting of a patulous gastroesophageal junction and a history suggesting GERD. The high location of the strictures is atypical for uncomplicated GERD and should raise concern for Barrett esophagus, a premalignant condition which requires further investigation. The next best step would involve endoscopy with biopsy. A 24-hr pH monitoring for confirmation of reflux is likely redundant at this stage. Surgical consultation may be needed eventually depending upon biopsy results for consideration of esophagectomy or anti-reflux procedure. A mucosal reticular appearance on double-contrast esophagography is a finding more specific for Barrett esophagus, especially in combination with a high stricture. These more specific findings are seen in a minority (5% to 30%) of patients with Barrett esophagus however, with other findings of a hiatal hernia, gastroesophageal reflux, distal esophageal peptic stricture, and ulcerations common in patients with Barrett's but overlapping with uncomplicated GERD. Barrett esophagus represents metaplasia of the normal esophageal squamous epithelium to columnar epithelium. Studies have shown a minority (6% to 12%) of patients with prolonged GERD symptoms have Barrett esophagus, mostly in males >50 years of age. The true prevalence of Barrett esophagus in the general population may be higher, as a significant percentage of patients with Barrett esophagus are asymptomatic. Barrett esophagus may progress from metaplasia through varying degrees of dysplasia to frank adenocarcinoma. The annual risk of developing adenocarcinoma from nondysplastic Barrett esophagus is low (less than 0.4%), but the risk increases with up to 5% annual risk for cancer when high-grade dysplasia is present. For patients with nondysplastic Barrett's, endoscopic screening is recommended every 3 years. Despite screening, 80% to 90% of esophageal adenocarcinoma will occur in patients without Barrett esophagus.\n\nReferences: Hvid-Jensen F, Pedersen L, Drewes AM, et al. Incidence of adenocarcinoma among patients with Barrett's esophagus. N Engl J Med 2011;365(15):1375-1383. Rustgi AK, El-Serag HB. Esophageal carcinoma. N Engl J Med 2014;371(26):2499-2509."}, {"number": "4", "stem": "A 56-year-old female presents with history of gastroesophageal reflux disease. A double-contrast esophagram was performed. What is the correct diagnosis?", "options": [{"letter": "A", "text": "Type I hiatal hernia"}, {"letter": "B", "text": "Type II hiatal hernia"}, {"letter": "C", "text": "Type III hiatal hernia"}, {"letter": "D", "text": "Type IV hiatal hernia"}], "images": ["assets/q4_p019_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Fluoroscopic spot image from a double-contrast esophagram demonstrates upward herniation of the stomach into the chest with superior migration of the gastroesophageal junction. This is compatible with a type I hiatal hernia, also called a sliding hiatal hernia. Type I hiatal hernias account for over 90% of all hiatal hernias and are associated with diffuse weakening of the phrenicoesophageal membrane, which normally acts to fix the distal esophagus near the hiatus. This laxity allows the upward displacement of the gastroesophageal junction and stomach into the chest through the diaphragmatic hiatus. Patients with type I hiatal hernias also can have diminished lower esophageal sphincter tone and therefore often present with symptoms of gastroesophageal reflux. The other types of hernias listed (Types II-IV) are paraesophageal hernias and will be discussed in a later question.\n\nReferences: Abbara S, Kalan MM, Lewicki AM. Intrathoracic stomach revisited. AJR Am J Roentgenol 2003;181(2):403-414. Kahrilas PJ, Kim HC, Pandolfino JE. Approaches to the diagnosis and grading of hiatal hernia. Best Pract Res Clin Gastroenterol 2008;22(4):601-616."}, {"number": "5", "stem": "A 63-year-old female presents with epigastric pain and nausea. A double-contrast upper GI study was performed. What is the correct diagnosis?", "options": [{"letter": "A", "text": "Type I hiatal hernia"}, {"letter": "B", "text": "Type II hiatal hernia"}, {"letter": "C", "text": "Type III hiatal hernia"}, {"letter": "D", "text": "Type IV hiatal hernia"}], "images": ["assets/q5_p020_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Fluoroscopic spot image from double contrast upper GI study demonstrates a normally positioned gastroesophageal junction (image on left) with adjacent herniation of the gastric fundus above the diaphragm (image on the right). This is compatible with a type II paraesophageal hiatal hernia. Paraesophageal hernias result from a focal defect in the phrenicoesophageal membrane that provides a small opening for upward gastric herniation, generally beginning with the gastric fundus. Hiatal hernias are generally classified into two major groups: Type I (sliding or axial) hiatal hernia Types II-IV (paraesophageal hernias) Type II (paraesophageal or rolling hernia) Focal defect in the anterolateral phrenicoesophageal membrane. Gastric cardia and esophagogastric junction remain subdiaphragmatic. Fundus is usually the first portion herniated. Type III (mixed or compound) Most common type of paraesophageal hernia with features of type 1 and 2 Associated with gastric rotation Usually large Type IV Marked widening of the diaphragmatic hiatus containing other organs (colon, omentum, pancreas, small bowel, liver) Type III hiatal hernia (mixed). Type IV hernia coronal. Type IV hernia axial.\n\nReferences: Abbara S, Kalan MM, Lewicki AM. Intrathoracic stomach revisited. AJR Am J Roentgenol 2003;181(2):403-414. Kahrilas PJ, Kim HC, Pandolfino JE. Approaches to the diagnosis and grading of hiatal hernia. Best Pract Res Clin Gastroenterol 2008;22(4):601-616."}, {"number": "6", "stem": "A patient with a history of a Nissan fundoplication 5 years earlier returns with recurrent reflux symptoms. What finding is depicted?", "options": [{"letter": "A", "text": "The fundoplication is intact and normal in position with no recurrent hernia."}, {"letter": "B", "text": "The fundoplication is intact and normal in position with a recurrent hernia."}, {"letter": "C", "text": "The fundoplication is intact with no recurrent hernia but is above the diaphragm."}, {"letter": "D", "text": "The fundoplication is completely disrupted with a recurrent hernia."}], "images": ["assets/q6_p021_01.jpg"], "explanationImages": ["assets/a6_p061_01.jpg"], "answer": "B", "explanation": "Answer B. The fundoplication is intact and normal in position (infradiaphragmatic) but there is a recurrent type I hernia and gastroesophageal reflux is demonstrated. Antireflux surgery is a common and effective treatment for gastroesophageal reflux disease (GERD). Patients who fail medical therapy or have complications of GERD including stricture, Barrett metaplasia, or other changes of significant esophagitis may be considered for a surgical fundoplication. The Nissan fundoplication is the most common anti-reflux procedure performed currently. It consists of reduction of any hiatal hernia and repair of a crural defect if present, return of the distal 3 to 4 cm of esophagus to the abdomen, recreation the esophagogastric angle (angle of His) that acts as an antireflux valve mechanism, and creation of a gastric fundal wrap that encompasses the distal esophagus (360 degrees wrap). For patients with poor esophageal motility, a partial wrap may be preferred, such as a Toupet procedure (270-degree wrap). The procedure has a high success rate, but a small percentage may have complications and need a redo fundoplication.\n\nReferences: Carbo AI, Kim RH, Gates T, et al. Imaging findings of successful and failed fundoplication. Radiographics 2014;34(7):1873-1884. Hinder RA, Perdikis G, Klinger PJ, et al. The surgical option for gastroesophageal reflux disease. Am J Med 1997;103(5A):144S-148S."}, {"number": "7", "stem": "A 56-year-old man presents with dysphagia to solid foods. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Caustic ingestion"}, {"letter": "B", "text": "Esophageal carcinoma"}, {"letter": "C", "text": "Schatzki ring"}, {"letter": "D", "text": "Esophageal web"}], "images": ["assets/q7_p022_01.jpg"], "explanationImages": ["assets/a7_p062_01.jpg"], "answer": "C", "explanation": "Answer C. Images from a barium esophagram shows a large sliding hiatal hernia with focal, concentric narrowing at the esophagogastric junction, consistent with a narrowed lower esophageal B ring. Because the patient is symptomatic, this finding may appropriately be referred to as a Schatzki ring. For comparison, normal lower esophageal B ring is shown below. The abnormal thickening of the Schatzki ring results from chronic inflammation from gastroesophageal reflux; sliding hiatal hernias are a commonly associated finding. Symptoms are generally associated with luminal narrowing <13 mm and are rare with luminal diameter >20 mm. Large food boluses such as poorly chewed meat can lead to impaction and the \"steakhouse syndrome.\" Caustic strictures usually involve a long segment of the esophagus. Esophageal carcinoma usually shows a more asymmetric and irregular contour. Esophageal webs are typically located in the cervical esophagus. Normal B ring. Thickened and narrowed B ring.\n\nReferences: Norton RA, King GD. \"Steakhouse Syndrome\": the symptomatic lower esophageal ring. Lahey Clin Found Bull 1963;13:55-59. Smith MS. Diagnosis and management of esophageal rings and webs. Gastroenterol Hepatol (N Y) 2010;6(11):701-704."}, {"number": "8a", "stem": "Patient with a history of longstanding dysphagia to solids and liquids and regurgitation of undigested food undergoes an esophagram. At fluoroscopy, peristaltic stripping activity is markedly diminished. The most likely diagnosis is", "options": [{"letter": "A", "text": "Achalasia"}, {"letter": "B", "text": "Peptic stricture"}, {"letter": "C", "text": "Progressive systemic sclerosis"}, {"letter": "D", "text": "Esophageal carcinoma"}, {"letter": "E", "text": "Caustic ingestion"}], "images": ["assets/q8a_p023_01.jpg", "assets/q8a_p024_01.jpg"], "explanationImages": ["assets/a8a_p064_01.jpg"], "answer": "A", "explanation": "Answer A. The barium esophagram demonstrates a markedly dilated esophagus with short, smooth tapered narrowing at the gastroesophageal junction, a \"bird's beak\" appearance due to failure of the lower esophageal sphincter to relax. The findings are consistent with classic achalasia. A peptic stricture typically does not cause this degree of dilatation. While dilatation and diminished peristaltic activity may be seen with progressive systemic sclerosis (PSS), also known as scleroderma, the lower esophageal sphincter is widely patulous in PSS as opposed to narrowed (although a secondary peptic stricture may develop with longstanding reflux). The smooth stricture in this case would be atypical for a stricture associated with an esophageal malignancy. Caustic ingestion typically produces a very long stricture. The etiology of primary achalasia is unknown, but the pathogenesis involves degeneration of myenteric ganglia in the esophageal wall. Circulating antibodies to enteric neurons suggest a possible autoimmune etiology. The upper esophageal sphincter also may not relax normally in achalasia, contributing to increased intraluminal pressure which causes dilatation. The onset of the disease is insidious, and patients often experience symptomatology for years before seeking care. The diagnosis is established by esophageal manometry, with findings of elevated LES resting pressure, failure of the LES to relax, and diminished peristalsis in the distal two-thirds of the esophagus. There are variants of achalasia aside from the classic appearance, which is known as type I. Type III involves spastic, nonpropulsive contractions of the body of the esophagus in conjunction with a hypertensive LES (formerly called \"vigorous achalasia\"). Type II has features of both types I and III. Type III achalasia."}, {"number": "8b", "stem": "A 57-year-old male with a history of progressive dysphagia over 3 months is referred to a gastroenterologist. The patient has a presumptive diagnosis of achalasia based upon an initial esophagram. A review of the esophagram is requested. What features of the images suggest an alternate diagnosis?", "options": [{"letter": "A", "text": "Presence of a polypoid mass at the gastroesophageal junction."}, {"letter": "B", "text": "Absence of esophageal dilatation and length of the stricture."}, {"letter": "C", "text": "Presence of a hiatal hernia suggesting a peptic stricture."}, {"letter": "D", "text": "No features suggest an alternative diagnosis, as the appearance is classic for achalasia."}], "images": ["assets/q8b_p025_01.jpg"], "explanationImages": ["assets/a8b_p066_01.jpg"], "answer": "B", "explanation": "Answer B. The images show a distal esophageal stricture with tapering smooth margins. No hiatal hernia or polypoid mass is demonstrated. The appearance superficially resembles classic achalasia, except that the stricture is longer than expected, and there is no dilatation. These features along with the relatively short onset of symptoms does not suggest a long-standing process. Mucosal irregularities if present would also suggest pseudoachalasia. In this case, biopsies of the stricture revealed adenocarcinoma. FDG PET study performed demonstrated elevated activity in the region of the tumor. Secondary achalasia (or sometimes called pseudoachalasia) due to malignancy may be caused by macroscopic tumor infiltration into the wall restricting distensibility or dysfunction of the myenteric neuronal plexus due to microinvasion or paraneoplastic release of tumoral factors. Tumors that produce this appearance include carcinomas of the esophagus, stomach, lung, pancreas as well as lymphoma."}, {"number": "8c", "stem": "A patient from El Salvador presents with findings on esophagram of a markedly dilated, aperistaltic esophagus similar to achalasia. What infectious entity may be responsible?", "options": [{"letter": "A", "text": "Schistosoma mansoni"}, {"letter": "B", "text": "Trichuris trichiura"}, {"letter": "C", "text": "Strongyloides stercoralis"}, {"letter": "D", "text": "Entamoeba histolytica"}, {"letter": "E", "text": "Trypanosoma cruzi"}], "images": ["assets/q8a_p023_01.jpg", "assets/q8a_p024_01.jpg"], "explanationImages": ["assets/a8c_p067_01.jpg"], "answer": "E", "explanation": "Answer E. While all of the listed parasites affect the intestinal tract, the appearance of a dilated esophagus is typical for Chagas disease. Chagas disease (common in South America, Central America, and Mexico) is caused by the flagellate protozoan Trypanosoma cruzi, which is transmitted to humans via an insect vector (reduviid or kissing) bug. Involvement of the enteric nervous system results in radiologic appearance of a megaesophagus similar to achalasia, although lower esophageal sphincter pressure is decreased relative to normal in Chagas disease, in contrast to idiopathic achalasia.\n\nReferences: Boeckxstaens GE, Zaninotto G, Richter JE. Achalasia. Lancet 2014;383(9911):83-93. Goldenberg SP, Burrell M, Fette GG, et al. Classic and vigorous achalasia: a comparison of manometric, radiographic, and clinical findings. Gastroenterology 1991;101(3):743-748. Matsuda NM, Miller SM, Evora PR. The chronic gastrointestinal manifestations of Chagas disease. Clinics (Sao Paulo) 2009;64(12):1219-1224. Woodfield CA, Levine MS, Rubesin SE, et al. Diagnosis of primary versus secondary achalasia: reassessment of clinical and radiographic criteria. AJR Am J Roentgenol 2000;175(3):727-731."}, {"number": "9", "stem": "In classic primary achalasia, what will be the most typical finding on esophageal manometry?", "options": [{"letter": "A", "text": "Hyperperistalsis in the lower two-thirds of the esophagus"}, {"letter": "B", "text": "Abnormally low resting pressure at the lower esophageal sphincter"}, {"letter": "C", "text": "Simultaneous contractions in multiple segments of the esophagus"}, {"letter": "D", "text": "Incomplete relaxation of the lower esophageal sphincter"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The typical manometric features of primary achalasia include absence of primary peristalsis increased or normal resting pressure of the lower esophageal sphincter, and incomplete or absent relaxation in response to a swallow. Variants with atypical manometric findings include vigorous achalasia or Type III achalasia (see discussion for question 8), in which simultaneous, high-amplitude, repetitive contractions are seen (Answer C) and early achalasia, in which primary peristalsis is decreased but LES relaxation is normal. Another motility disorder diffuse esophageal spasm (DES) involves simultaneous nonpropulsive contractions, which may be lumen obliterating, leading to the classic corkscrew appearance on barium studies. Classic DES was thought not to involve the LES, but recent studies have shown a frequent association with LES dysfunction. Some investigators now believe that achalasia and DES represent a spectrum of esophageal motility disorders that are related. Diffuse esophageal spasm (DES).\n\nReferences: Boeckxstaens GE, Zaninotto G, Richter JE. Achalasia. Lancet 2014;383(9911):83-93. Prabhakar A, Levine MS, Rubesin S, et al. Relationship between diffuse esophageal spasm and lower esophageal sphincter dysfunction on barium studies and manometry in 14 patients. AJR Am J Roentgenol 2004;183(2):409-413."}, {"number": "10", "stem": "A 76-year-old male with a history of longstanding dysphagia has an esophagram from 10 years earlier shown below. He presents currently with significantly worsening dysphagia over the past 2 months. What complication is demonstrated on the CT images?", "options": [{"letter": "A", "text": "Food impaction"}, {"letter": "B", "text": "Candida infection"}, {"letter": "C", "text": "Esophageal neoplasm"}, {"letter": "D", "text": "Peptic stricture"}], "images": ["assets/q10_p027_01.jpg", "assets/q10_p028_01.jpg"], "explanationImages": ["assets/a10_p068_01.jpg"], "answer": "C", "explanation": "Answer C. The esophagram from 10 years earlier show a dilated esophagus with a smooth, short tapering narrowing at the gastroesophageal junction consistent with classic achalasia. The current CT images demonstrate a dilated contrast-filled esophagus and a new mid-esophageal mass with abrupt shoulders and luminal narrowing. This mass is not seen above a stricture, which would be expected with impacted food. While candida esophagitis may be present in patients with achalasia, inflammation may cause wall thickening but not a bulky mass. The findings are consistent with an esophageal neoplasm. There is an increased risk for esophageal neoplasm in patients with long-standing achalasia, with both adenocarcinoma and squamous cell carcinoma found. A mid-esophageal location is common. Chronic stasis with inflammation is thought to be responsible for the neoplastic transformation.\n\nReferences: Gore RM, Levine MS, Laufer I. Textbook of gastrointestinal radiology. Philadelphia, PA: W.B. Saunders Co., 1994. Nesteruk K, Spaander MCW, Leeuwenburgh I, et al. Achalasia and associated esophageal cancer risk: what lessons can we learn from the molecular analysis of Barrett's-associated adenocarcinoma? Biochim Biophys Acta Rev Cancer 2019;1872(2):188291."}, {"number": "11a", "stem": "A 45-year-old female presents with dysphagia. An esophagram is performed. What finding is shown on this esophagram?", "options": [{"letter": "A", "text": "Type I hiatal hernia"}, {"letter": "B", "text": "Type II paraesophageal hernia"}, {"letter": "C", "text": "Type III paraesophageal hernia"}, {"letter": "D", "text": "Epiphrenic diverticulum"}], "images": ["assets/q11a_p029_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. There is a large saccular outpouching at the level of the distal esophagus. This closely resembles a type II paraesophageal hernia, especially when the location of the gastroesophageal junction is ambiguous. Evaluation for gastric folds in the sac and identifying the relationship to the gastroesophageal junction are important to determine whether this finding arises from the esophagus or represents a herniated portion of the stomach. In this case, the gastroesophageal junction is below the outpouching, and its smooth contours are absent of gastric folds, establishing the diagnosis of an epiphrenic diverticulum."}, {"number": "11b", "stem": "The most common association of this finding is with", "options": [{"letter": "A", "text": "Esophageal reflux disease"}, {"letter": "B", "text": "Primary motility disorder of the esophagus"}, {"letter": "C", "text": "Chronic granulomatous infection"}, {"letter": "D", "text": "Trauma"}], "images": ["assets/q11a_p029_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Epiphrenic diverticula are pulsion diverticula caused by increased intraluminal pressure. These have a strong association with primary neuromuscular motility disorders of the esophagus such as achalasia. These are pseudodiverticula as they consist only of mucosal and submucosal layers. As they do not have a muscularis layer, they tend to retain ingested material. Other than esophageal motility disorders, esophageal strictures may also be associated with pulsion diverticula. Other diverticular-like outpouchings of the esophageal wall may be caused by adjacent mediastinal inflammation from granulomatous infection such as tuberculosis or histoplasmosis. These tend to occur in the mid esophagus (adjacent to carinal lymph nodes involved by infection) and not the distal esophagus. These post-inflammatory diverticula are caused by traction and tend to have a triangular configuration with a wide base at the esophageal origin narrowing to a pointed apex distant from the lumen. Small pulsion diverticula are usually asymptomatic. Large diverticula may be associated with dysphagia, regurgitation of undigested food, and halitosis. These may perforate (especially with endoscopy or nasogastric tube placement). Rarely these may develop neoplasm, potentially related to stasis and chronic inflammation. Epiphrenic diverticula have a tendency to enlarge and are treated by diverticulotomy which may be performed by surgery or endoscopy.\n\nReferences: Fasano NC, Levine MS, Rubesin SE, et al. Epiphrenic diverticulum: clinical and radiographic findings in 27 patients. Dysphagia 2003;18(1):9-15. Tedesco P, Fisichella PM, Way LW, et al. Cause and treatment of epiphrenic diverticula. Am J Surg 2005;190(6):891-894."}, {"number": "12", "stem": "The most significant risk factors for development of esophageal adenocarcinoma include", "options": [{"letter": "A", "text": "GERD, obesity, cigarette smoking"}, {"letter": "B", "text": "Alcohol, cigarette smoking"}, {"letter": "C", "text": "High fat consumption and alcohol"}, {"letter": "D", "text": "Helicobacter pylori infection, alcohol, and cigarette smoking"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The major risk factors for adenocarcinoma are GERD, obesity, and cigarette smoking. The relationship of GERD and adenocarcinoma, especially in the setting of Barrett esophagus, is well established. Abdominal obesity may lead to increased intragastric pressure, which relaxes the lower esophageal sphincter and may promote gastroesophageal reflux. The risk for adenocarcinoma of the esophagus is twice as high in smokers compared to never smokers, although smoking is a stronger risk factor for squamous cell carcinoma. Alcohol intake does not appear to elevate the risk for adenocarcinoma. Interestingly, the presence of Helicobacter pylori infection is actually associated with a decreased risk for adenocarcinoma, potentially due to the ultimate reduction in acid production seen in patients with H. pylori-induced gastric atrophy from chronic gastritis. Although squamous cell cancer accounts for 90% of esophageal cancers worldwide, the incidence of adenocarcinoma has been increasing rapidly within the past generation and has now surpassed squamous cell cancer in several parts of North America and Europe. The major risk factors for developing squamous cell carcinoma are smoking and alcohol. Additional less common causes include: GERD, head and neck tumors, achalasia, caustic ingestion, radiation, celiac disease, Plummer Vinson syndrome, tylosis, and autoimmune mucocutaneous blistering disease (e.g., bullous pemphigus).\n\nReferences: Levine MS, Rubesin SE. Diseases of the esophagus: diagnosis with esophagography. Radiology 2005;237(2):414-427. Rustgi AK, El-Serag HB. Esophageal carcinoma. N Engl J Med 2014;371(26):2499-2509."}, {"number": "13", "stem": "A 44-year-old female presents with several month history of worsening substernal chest discomfort. A barium esophagram demonstrates loss of the peristaltic stripping wave from the level of the aortic arch inferiorly. The gastroesophageal junction is widely patulous, and free gastroesophageal reflux is noted. What diagnosis may be suggested?", "options": [{"letter": "A", "text": "Progressive systemic sclerosis"}, {"letter": "B", "text": "Achalasia"}, {"letter": "C", "text": "Presbyesophagus"}, {"letter": "D", "text": "Myasthenia gravis"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Progressive systemic sclerosis (scleroderma) is an autoimmune disorder that affects skin, the gastrointestinal system, lungs, and multiple other organs. In the gastrointestinal tract, the esophagus is the most common site of involvement. The condition causes atrophy of smooth muscle, which is located in the distal two-thirds of the esophagus. The gastroesophageal junction is widely patent, and gastroesophageal reflux is common. In severe cases, fibrosis replaces the atrophied smooth muscle and causes esophageal shortening, which may pull a hiatal hernia into the thorax, as seen in this case. Eventually, the patulous gastroesophageal junction may be replaced by a peptic stricture from chronic reflux. Achalasia may demonstrate absent peristalsis, but the lower esophageal sphincter is narrowed with a smooth tapered (\"birds beak\") configuration, rather than appearing patulous. Presbyesophagus may be associated with diminished peristalsis but is a motor dysfunction seen with aging. Myasthenia gravis involves the proximal esophagus and striated muscle.\n\nReferences: Boland, GW. Gastrointestinal imaging: the requisites. Philadelphia, PA: Elsevier Saunders, 2014."}, {"number": "14", "stem": "A 32-year-old male with poorly controlled diabetes and dysphagia has a barium esophagram. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Cytomegalovirus esophagitis"}, {"letter": "B", "text": "Herpes simplex virus esophagitis"}, {"letter": "C", "text": "Glycogenic acanthosis"}, {"letter": "D", "text": "Candida esophagitis"}, {"letter": "E", "text": "Squamous papillomatosis"}], "images": ["assets/q14_p031_01.jpg", "assets/q14_p032_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The esophagram demonstrates multiple filling defects in the esophagus with a background of relatively normal mucosa. Appearance is typical for early candida esophagitis. Candida esophagitis is the most common type of infectious esophagitis and occurs in patients who are immunosuppressed. Early changes involve mucosal plaques; ulcerations develop with more advanced disease, with severe involvement leading to a \"shaggy\" appearance. Cytomegalovirus (CMV) most commonly presents as solitary large ulcers in AIDS patients. Herpes simplex virus (HSV) typically causes shallow ulcers, sometimes linear or stellate with a surrounding halo of edema. Glycogenic acanthosis is a benign degenerative condition in which the epithelial cells accumulate glycogen causing mucosal plaques that may resemble early candidiasis; this condition is found in older asymptomatic patients. Squamous papillomatosis, a premalignant condition, also causes small plaques but is very rare. Shaggy esophagus of late Candida esophagitis.\n\nReferences: Roberts L Jr, Gibbons R, Gibbons G, et al. Adult esophageal candidiasis: a radiographic spectrum. Radiographics 1987;7(2):289-307."}, {"number": "15", "stem": "A 45-year-old man who has undergone allogenic bone marrow transplantation now presents with odynophagia. What is the most likely infectious etiology?", "options": [{"letter": "A", "text": "Cytomegalovirus"}, {"letter": "B", "text": "Herpes simplex virus"}, {"letter": "C", "text": "Candidiasis"}, {"letter": "D", "text": "Epstein-Barr virus"}, {"letter": "E", "text": "Human papillomavirus"}], "images": ["assets/q15_p034_01.jpg", "assets/q15_p035_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Frontal and left-posterior oblique images from a double-contrast esophagram show a large, flat, diamond-shaped ulcer projecting from the posterior wall of the mid-esophagus. The remainder of the visualized mucosa is normal, and there is no associated mass lesion. This imaging appearance is typical for cytomegalovirus (CMV) esophagitis; identical findings may be seen with the human immunodeficiency virus (HIV). Because the treatment for CMV esophagitis (ganciclovir) is fairly toxic, confirmation with brushings, biopsy, or culture obtained by endoscopy will be needed. Herpes simplex virus (HSV) usually results in multiple tiny and superficial ulcers surrounded by a radiolucent halo of edema. Candidal esophagitis manifests as multiple plaques (rather than true ulcers) oriented along the long axis of the esophagus. Epstein-Barr virus (EBV) infection results in deep linear ulcers, as opposed to the flat and ovoid ulcers associated with CMV and HIV esophagitis. Infection with human papillomavirus (HPV) may result in clusters of tiny polypoid lesions.\n\nReferences: Levine MS, Rubesin SE. Diseases of the esophagus: diagnosis with esophagography. Radiology 2005;237(2):414-427."}, {"number": "16", "stem": "A 42-year-old male presents with chest pain after severe vomiting. He undergoes a fluoroscopic esophagram with water-soluble contrast followed by a CT. What portion of the esophagus is typically involved in this syndrome?", "options": [{"letter": "A", "text": "Left posterolateral wall of the mid esophagus"}, {"letter": "B", "text": "Left posterolateral wall of the distal esophagus"}, {"letter": "C", "text": "Right posterolateral wall of the mid esophagus"}, {"letter": "D", "text": "Right posterolateral wall of the distal esophagus"}], "images": ["assets/q16_p036_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Single contrast upper GI shows extraluminal contrast leakage along the right posterolateral aspect of the esophagus. This is confirmed on noncontrast CT with pneumomediastinum surrounding the esophagus. This is a less common location for an esophageal tear in Boerhaave syndrome (spontaneous esophageal perforation), which usually presents with the tear originating from the left posterolateral wall of the distal esophagus. Esophageal perforation is caused by forceful ejection of gastric contents from an unrelaxed esophagus against a closed glottis. The classic clinical presentation is with vomiting, chest pain, and subcutaneous emphysema (Mackler's triad). The transmural tears are typically vertically oriented and 1 to 4 cm in length. Timely detection of a perforation is critical, as mortality is high, and survival rates may fall to 20% after 24 hours. CXR findings are nonspecific but may include pneumomediastinum, pneumothorax, and a pleural effusion. The fluoroscopic esophagram may show the location of the contrast leakage from the distal esophagus into the mediastinum. There is a 10% to 38% false-negative rate for leakage detection on conventional fluoroscopy, so CT is recommended in addition to or in lieu of the fluoroscopic study if the patient is clinically unstable. In addition to detecting subtle pneumomediastinum or a small pneumothorax, CT may show a contained leak missed on fluoroscopy if the tear is small and sealed-off from the lumen.\n\nReferences: Gimenez A, Franquet T, Erasmus JJ, et al. Thoracic complications of esophageal disorders. Radiographics 2002;22(Spec No):S247-S258. Tonolini M, Bianco R. Spontaneous esophageal perforation (Boerhaave syndrome): diagnosis with CT-esophagography. J Emerg Trauma Shock 2013;6(1):58-60."}, {"number": "17a", "stem": "A 40-year-old man suffered blunt trauma to the neck from a cap propelled off a high-pressure gas can. For respiratory distress, endotracheal and right chest tubes were emergently placed. Selected axial images from contrast-enhanced CT are shown. What is the most likely origin of pneumomediastinum in this patient?", "options": [{"letter": "A", "text": "Laryngeal fracture"}, {"letter": "B", "text": "Macklin phenomenon"}, {"letter": "C", "text": "Tracheal rupture"}, {"letter": "D", "text": "Esophageal perforation"}, {"letter": "E", "text": "Traumatic intubation"}], "images": ["assets/q17a_p037_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Esophageal perforation. This patient does have a laryngeal fracture, shown as step-off of the left thyroid cartilage on the upper left image. However, the volume of pneumomediastinum is greater than expected for this finding alone and increases in volume moving inferiorly in the mediastinum. Therefore, other causes of pneumomediastinum must be considered. Indirect findings of esophageal perforation on MDCT include periesophageal air, periesophageal fluid, and esophageal wall thickening, all three of which are present on this scan. A full-thickness laceration of the esophageal wall may be identified on CT (but not in this case), and if administered, oral contrast may leak from the esophagus. The other answer choices are possible causes of pneumomediastinum, but there are no CT signs of tracheal injury; traumatic intubation should not result in the mediastinal findings noted above; and Macklin phenomenon (alveolar rupture leading to pulmonary interstitial emphysema and pneumomediastinum) is a diagnosis of exclusion.\n\nReferences: de Lutio di Castelguidone E, Merola S, Pinto A, et al. Esophageal injuries: spectrum of multidetector row CT findings. Eur J Radiol 2006;59:344-348. Young CA, Menias CO, Bhalla S, et al. CT features of esophageal emergencies. Radiographics 2008;28:1541-1553."}, {"number": "17b", "stem": "The patient subsequently underwent this examination with water-soluble contrast injected via enteric tube. What is the next step?", "options": [{"letter": "A", "text": "Repeat injection with barium contrast"}, {"letter": "B", "text": "Bronchoscopy"}, {"letter": "C", "text": "Diagnostic endoscopy"}, {"letter": "D", "text": "Endoscopic stent placement"}, {"letter": "E", "text": "Thoracotomy"}], "images": ["assets/q17b_p038_01.jpg", "assets/q17b_p040_01.jpg"], "explanationImages": [], "answer": "E", "explanation": "Answer E. The contrast esophagram shows two sites of thoracic esophageal perforation. Free perforation of the esophagus is usually considered a surgical emergency, requiring thoracotomy to repair the esophageal wall defect, debride necrotic tissue, and irrigate the mediastinum and, if necessary, the pleural space. Confirmation of esophageal perforation should be performed with water-soluble contrast only. Barium should only be administered if the examination is negative for perforation after the initial water-soluble contrast portion. Leaked barium in the mediastinum can cause chemical mediastinitis, and retained barium can cause artifact on CT. In this case also bronchoscopy and diagnostic endoscopy are unnecessary for diagnosis of the perforation. Endoscopic stent placement would not allow wash-out of the mediastinal or pleural contamination and is therefore not advised in isolation.\n\nReferences: Nirula R. Esophageal perforation. Surg Clin North Am 2014;94:35-41."}, {"number": "18a", "stem": "A 25-year-old patient presents with reflux symptoms. A barium esophagram is performed followed by a CT of the chest. What is the diagnosis?", "options": [{"letter": "A", "text": "Leiomyoma"}, {"letter": "B", "text": "Double aortic arch"}, {"letter": "C", "text": "Aberrant left subclavian artery"}, {"letter": "D", "text": "Aberrant right subclavian artery"}], "images": ["assets/q18a_p041_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Images from the esophagram demonstrate a smooth extrinsic impression on the posterior thoracic esophagus. An arterial structure extending from the left-sided arch posterior to the esophagus demonstrated on the CT, consistent with an aberrant right subclavian artery. The left aortic arch with aberrant right subclavian artery is the most common anomaly of the aortic arch found in 0.5% to 2% of the population. The right subclavian artery usually arises from the brachiocephalic artery, continuing as the axillary artery after passing the right first rib. The aberrant right subclavian artery arises from the aortic arch distal to the left subclavian artery origin and passes posterior to the esophagus (in 80% of cases) prior to continuing its normal course. Less commonly, the aberrant artery will pass between the esophagus and the trachea (15%) or anterior to the trachea (5%). This anomaly is thought to be caused by abnormal involution of the fourth right aortic arch in embryogenesis. The anomaly is usually sporadic, but it may be associated with Trisomy 21. Most patients are asymptomatic, since the ductus arteriosus is left-sided and a full vascular ring is not formed. Aberrant right subclavian artery."}, {"number": "18b", "stem": "A 78-year-old patient presents with dysphagia to solid foods. A barium esophagram and CT are performed. What is the diagnosis?", "options": [{"letter": "A", "text": "Leiomyoma"}, {"letter": "B", "text": "Double aortic arch"}, {"letter": "C", "text": "Pulmonary sling"}, {"letter": "D", "text": "Aberrant right subclavian artery"}], "images": ["assets/q18b_p041_02.jpg"], "explanationImages": ["assets/a18b_p074_01.jpg"], "answer": "B", "explanation": "Answer B. Images demonstrate both left and right aortic arches which encircle the trachea and esophagus forming a true vascular ring. The double aortic arch (DAA) is the most common symptomatic vascular ring. The dysphagia associated with a vascular ring is known as \"dysphagia lusoria\" (derived from \"lusus naturae\" or \"freak or jest of nature\"). Onset of dysphagia may be in late adulthood with loss of peristalsis with aging and progressive vascular aneurysmal dilatation exacerbating the extrinsic compression of the esophagus. This anomaly is due to persistence of both right and left fourth aortic arches and dorsal aortae during embryonic development. Tracheal and esophageal compression are common in patients with DAA. The double aortic arch may demonstrate posterior and bilateral impressions on the esophagus and the trachea. Double aortic arch.\n\nReferences: Dandelooy J, Coveliers JP, Van Schil PE, et al. Dysphagia lusoria. CMAJ 2009;181(8):498. Etesami M, Ashwath R, Kanne J, et al. Computed tomography in the evaluation of vascular rings and slings. Insights Imaging 2014;5(4):507-521. Li YL, Yam MK, Yu JM. A rare cause of dysphagia. BMJ Case Rep 2017;2017:bcr2017220773."}, {"number": "19a", "stem": "A 36-year-old male with a history of hematemesis and abdominal distention presents for evaluation with a double-contrast upper GI study and contrast-enhanced abdominal MRI. What is the salient finding that may be contributing to his symptoms?", "options": [{"letter": "A", "text": "Esophageal carcinoma"}, {"letter": "B", "text": "Gastroesophageal varices"}, {"letter": "C", "text": "Mediastinal lymphadenopathy"}, {"letter": "D", "text": "Normal examination"}], "images": ["assets/q19a_p043_01.jpg", "assets/q19a_p044_01.jpg"], "explanationImages": ["assets/a19a_p075_01.jpg"], "answer": "B", "explanation": "Answer B. Fluoroscopic spot image from double-contrast upper GI demonstrates serpentine filling defects coursing longitudinally in the distal esophagus. Axial postcontrast T1-weighted MRI image demonstrates numerous enhancing varices in the upper abdomen, including around the gastroesophageal junction. Gastroesophageal varices that occur as a result of portal hypertension are sometimes referred to as uphill varices because of the direction of blood flow away from the abdomen cephalad into the chest. Venous return from the portal vein extends through the left gastric (coronary) vein into the periesophageal venous plexus and then into the azygous vein and superior vena cava (SVC). Downhill varices are much less common and are associated with obstruction of the SVC. These varices involve the venous plexus surrounding the upper and middle third of the esophagus with blood flow in a caudal direction. Blood flows through the azygous system into the SVC downstream of the obstruction. If the azygous or inferior SVC below the level of the azygous entrance is also obstructed the flow must extend into the distal esophageal plexus and enter the portal vein, where it flows into the inferior vena cava. These varices would involve the entire thoracic esophagus. Downhill varices, AP and lateral barium esophagram."}, {"number": "19b", "stem": "When performing an esophagram, which technique will make the varices more apparent?", "options": [{"letter": "A", "text": "Upright double-contrast view"}, {"letter": "B", "text": "Semiprone (right anterior oblique) full column esophagus with full distention"}, {"letter": "C", "text": "Semiprone (right anterior oblique) collapsed esophagus with mucosal relief"}, {"letter": "D", "text": "Upright collapsed esophagus"}], "images": ["assets/q19a_p043_01.jpg", "assets/q19a_p044_01.jpg"], "explanationImages": ["assets/a19b_p077_01.jpg"], "answer": "C", "explanation": "Answer C. Esophageal varices may be difficult to visualize during a barium examination if the right technique is not utilized. In fact, their variable appearance on different positioning may help confirm the diagnosis. Detection is aided by a semiprone (rather than upright) position to increase venous return from the extremities and a collapsed esophageal lumen (rather than full distention). Esophageal varices on RAO prone esophagram with nondistended lumen. Note that some esophageal carcinomas may have a serpentine tubular morphology resembling varices. These will not change with the maneuvers described above. Varicoid carcinoma.\n\nReferences: Levine MS. Radiology of esophagitis: a pattern approach. Radiology 1991;179(1):1-7. Levine MS, Rubesin SE. Diseases of the esophagus: diagnosis with esophagography. Radiology 2005;237(2):414-427."}, {"number": "20a", "stem": "A 67-year-old male with a recent diagnosis of cancer in the midesophagus (squamous cell) on endoscopy undergoes staging studies. What is the main role of CT in the staging of his cancer?", "options": [{"letter": "A", "text": "The CT helps distinguish between invasion of the submucosa and muscularis propria."}, {"letter": "B", "text": "The CT assesses invasion of local mediastinal structures."}, {"letter": "C", "text": "The CT identifies a malignant distal esophageal node."}, {"letter": "D", "text": "The CT identifies a potential percutaneous approach to a nodal biopsy."}], "images": ["assets/q20a_p045_01.jpg", "assets/q20a_p045_02.jpg"], "explanationImages": ["assets/a20a_p079_01.jpg"], "answer": "B", "explanation": "Answer B. CT images demonstrate circumferential thickening of the mid-esophageal wall with an adjacent enlarged subcarinal lymph node (left image). The tumor contacts the aorta involving 180 degrees with loss of intervening fat plane (center image). There is a rounded subcentimeter distal periesophageal lymph node (right image). Surgical resection of esophageal cancer and adjacent malignant lymph nodes offers the only possibility for cure. Accurate staging is essential for determining appropriate treatment. Staging modalities include endoscopic ultrasound, CT, and PET CT. Clinical staging of esophageal cancer is assessed with the TNM system as developed by the AJCC. Endoscopic ultrasound is the primary means for assessing the T stage. It can ascertain depth of tumor invasion into the wall layers and distinguish T1, T2, and T3 disease, which CT or PET CT cannot. In assessment of the primary tumor, CT is most useful for detection of T4 disease (Answer B), with loss of fat planes between the tumor and adjacent mediastinal structures. As demonstrated in this case, aortic involvement is suggested when the tumor contacts 90 degrees or more of the aortic wall (arrowheads) or there is involvement of the fat space between the aorta, esophagus, and the spine (arrow). CT has limited sensitivity and specificity for detecting nodal metastases, given the primary criterion for an abnormal node is size of 1 cm or greater. As with other neoplasms, metastases in small nodes and benign changes in enlarged nodes limit the accuracy of CT for nodal staging. Endoscopic ultrasound is superior to CT for detection of nodal metastases, and fine-needle aspiration is most readily accomplished with endoscopic ultrasound (not percutaneously, as suggested in Answer D)."}, {"number": "20b", "stem": "A PET CT scan was also performed. What is the main role of the PET CT in the staging of his cancer?", "options": [{"letter": "A", "text": "The PET CT identifies uptake in mediastinal nodes adjacent to the primary tumor."}, {"letter": "B", "text": "The PET CT assesses depth of tumor invasion into the wall of the esophagus."}, {"letter": "C", "text": "The PET CT identifies a potential distant metastatic focus in the pleural space."}, {"letter": "D", "text": "The PET CT distinguishes between left gastric and celiac nodal disease."}], "images": ["assets/q20b_p045_02.jpg"], "explanationImages": ["assets/a20b_p080_01.jpg"], "answer": "C", "explanation": "Answer C. The PET CT images demonstrate intense uptake in the primary mid-esophageal tumor (left image), a right paratracheal lymph node and the left pleural space (center image), and in a gastrohepatic/celiac nodal mass (right image). As with standard CT, PET CT does not accurately assess depth of tumor invasion into the wall, unless there is involvement of local structures. Locoregional lymph node involvement may be difficult to detect with PET CT as the intense uptake at the primary tumor may obscure adjacent regional metastases. PET has a high sensitivity for detection of distant nodal and nonnodal metastases. Although in this case, the patient was deemed unresectable by virtue of the aortic involvement, the PET CT demonstrated an area of metastatic involvement (left pleural metastases) that might need future local symptomatic treatment. Distinction between left gastric and celiac axis lymphadenopathy has been traditionally important clinically as the latter was considered to be unresectable. This may be changing as new outcomes data emerge. Due to the close proximity of these nodal stations however, this distinction may be difficult on any imaging study.\n\nReferences: Esophagus and esophagogastric junction. In: Edge, SB, Byrd DR, Compton CC, et.al., eds. AJCC cancer staging manual, 7th ed. New York, NY: Springer, 2010:103-111. Kim TJ, Kim HY, Lee KW, et al. Multimodality assessment of esophageal cancer: preoperative staging and monitoring of response to therapy. Radiographics 2009;29(2):403-421."}, {"number": "21", "stem": "A 57-year-old female patient with a history of breast cancer presents with recent onset solid food dysphagia. Endoscopy reveals a mid-esophageal stricture with normal overlying mucosa with biopsies revealing normal squamous epithelium. A barium esophagram followed by a chest CT is performed. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Peptic stricture"}, {"letter": "B", "text": "Esophageal varices"}, {"letter": "C", "text": "Leiomyoma"}, {"letter": "D", "text": "Metastasis"}, {"letter": "E", "text": "Esophageal carcinoma"}], "images": ["assets/q21_p046_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Esophagram image demonstrates a midesophageal nearly obstructing stricture with relatively smooth mucosal appearances, as was noted on endoscopy. Mucosal changes would be expected findings in a peptic stricture, as well as a malignant stricture due to primary esophageal carcinoma. The annular localized stricture and obstruction would be atypical for a leiomyoma. Varices would not obstruct and are not likely to be confined to a short segment as in this case. In this patient with a history of another primary tumor (breast cancer), the most likely etiology is a metastasis from breast cancer. Metastases to the esophagus from a distant primary are rare. Lung cancer is the most common primary origin for esophageal metastases, but metastases from breast, ovarian, thyroid, pharyngeal, stomach, and other sites have been reported. Most patients have metastatic involvement to other sites. Breast cancer is the most common neoplasm in women and while typically metastasizing to lung, bones, brain, and liver may also involve the gastrointestinal tract (most commonly the stomach).\n\nReferences: Nazareno J, Taves D, Preiksaitis HG. Metastatic breast cancer to the gastrointestinal tract: a case series and review of the literature. World J Gastroenterol 2006;12(38):6219-6224. Simchuk EJ, Low DE. Direct esophageal metastasis from a distant primary tumor is a submucosal process: a review of six cases. Dis Esophagus 2001;14(3-4):247-250."}, {"number": "22", "stem": "A 29-year-old male with a history of dysphagia has a double-contrast barium esophagram. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Granular cell tumor"}, {"letter": "B", "text": "Fibrovascular polyp"}, {"letter": "C", "text": "Gastrointestinal stromal tumor (GIST)"}, {"letter": "D", "text": "Leiomyoma"}], "images": ["assets/q22_p047_01.jpg"], "explanationImages": ["assets/a22_p083_01.jpg"], "answer": "D", "explanation": "Answer D. The double-contrast barium esophagram demonstrates a lesion in the midesophagus with a smooth surface and a right angle interface with the wall, findings typical for a submucosal lesion. Leiomyomas are the most common benign esophageal neoplasm, accounting for 50% of all such tumors. Tumors usually occur in the middle and distal esophagus (corresponding to the segments with smooth muscle). These range in size from 2 to 8 cm in diameter, usually 3 cm or smaller; they rarely ulcerate. Leiomyomas follow muscle signal on MRI (see arrow on MRI below on a different patient), unlike carcinomas which tend to be higher signal on T2 compared to the esophageal wall (see example below on a different patient). They are isoechoic with muscle on endoscopic ultrasound. T2-weighted image MRI mid-esophageal leiomyoma. Diffuse esophageal leiomyomatosis is an unusual form of esophageal leiomyomas, which is histologically identical to the typical localized mass. These may be seen in association with Alport syndrome (glomerulonephritis, hearing loss, various eye diseases, and esophageal and female genital tract leiomyomatosis). Diffuse esophageal leiomyomatosis. Granular cell tumors resemble leiomyomas morphologically but tend to be smaller and are much less common. Originally, they were thought to arise from muscle and were formerly called granular cell myoblastomas, but the correct origin is the Schwann cell. A fibrovascular polyp originates from the cervical esophagus or lower hypopharynx. They are composed of adipose and fibrovascular tissue covered by normal squamous epithelium. They are soft tumors which elongate into an intraluminal mass. Gastrointestinal stromal tumors (GST) are another common mesenchymal tumor of the gastrointestinal tract. The esophagus is the only segment of the gastrointestinal tract where leiomyomas are more common than GISTs.\n\nReferences: Jang KM, Lee KS, Lee SJ, et al. The spectrum of benign esophageal lesions: imaging findings. Korean J Radiol 2002;3(3):199-210. Lewis RB, Mehrotra AK, Rodriguez P, et al. From the radiologic pathology archives: esophageal neoplasms: radiologic-pathologic correlation. Radiographics 2013;33(4): 1083-1108."}, {"number": "23", "stem": "A 22-year-old-male presents with a long history of solid-food dysphagia and occasional food impaction. He undergoes a barium esophagram. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Peptic strictures from GERD"}, {"letter": "B", "text": "Caustic ingestion"}, {"letter": "C", "text": "Pill esophagitis"}, {"letter": "D", "text": "Eosinophilic esophagitis"}], "images": ["assets/q23_p048_01.jpg"], "explanationImages": ["assets/a23_p084_01.jpg"], "answer": "D", "explanation": "Answer D. The findings on the barium enema demonstrate multiple short concentric rings of the esophagus, typical for eosinophilic esophagitis. Eosinophilic esophagitis can present with segmental strictures in the upper, mid, or less commonly distal esophagus, or as a diffusely gracile narrow-caliber esophagus, findings which overlap with those seen in some of the other entities listed. Eosinophilic esophagitis may also present with a unique ringed or corrugated appearance as in this example, not found with the other entities. Eosinophilic esophagitis is an idiopathic chronic inflammatory condition which has been increasingly diagnosed in the past two decades likely both to an increasing prevalence and greater awareness of the entity. It is characterized clinically by symptoms of esophageal dysfunction and histologic findings of eosinophilic-predominant esophageal inflammation. It is seen in the pediatric and adult population and has a high (though not universal) association with food allergies. Patients may have a general atopic history as well, including asthma and seasonal allergies. A seasonal variation in food-induced eosinophilic esophagitis has been described in some patients. Although eosinophilic esophagitis is seen as a distinct entity, eosinophilic infiltrate may also be present in GERD, and understanding of the relationship between eosinophilic esophagitis and GERD is still under evolution. Eosinophilic esophagitis with gracile esophagus.\n\nReferences: Moawad FJ, Veerappan GR, Wong RK. Eosinophilic esophagitis. Dig Dis Sci 2009;54(9):1818-1828. Zimmerman SL, Levine MS, Rubesin SE, et al. Idiopathic eosinophilic esophagitis in adults: the ringed esophagus. Radiology 2005;236(1):159-165."}, {"number": "24", "stem": "A 34-year-old female has an esophagram. What is the most likely etiology for this finding?", "options": [{"letter": "A", "text": "Chronic indwelling nasogastric tube"}, {"letter": "B", "text": "Gastroesophageal reflux and Zollinger-Ellison syndrome"}, {"letter": "C", "text": "Caustic ingestion"}, {"letter": "D", "text": "Eosinophilic esophagitis"}], "images": ["assets/q24_p049_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The barium esophagram demonstrates diffusely severe narrowing of the esophagus and dilatation of the more proximal esophagus. With a severe stricture of this length, the primary consideration is caustic or corrosive ingestion, which is the diagnosis in this case. Pertinent history is usually available prior to the examination. Severe gastroesophageal reflux, most commonly caused by an indwelling nasogastric tube, or rarely by high acid content associated with Zollinger-Ellison syndrome and gastroesophageal reflux may result in severe long strictures. Eosinophilic esophagitis may produce a diffusely gracile esophagus. None of the other conditions is likely to result in as severe a stricture as in this case. Ingestion of a strong alkali agent such as lye (concentrated sodium hydroxide) will cause liquefactive necrosis and a severe ulcerative esophagitis acutely, with a full-thickness injury produced by a 30% sodium hydroxide solution in 1 second. Fibrosis and severe scarring may develop 1 to 3 months later. Injury from acid ingestion tends to be less severe. Aside from causing mechanical obstruction, the injury increases the risk for developing a malignancy by 1,000-fold for 10 to 25 years after the acute event.\n\nReferences: Luedtke P, Levine MS, Rubesin SE, et al. Radiologic diagnosis of benign esophageal strictures: a pattern approach. Radiographics 2003;23(4):897-909.Lupa M, Magne J, Guarisco JL, et al. Update on the diagnosis and treatment of caustic ingestion. Ochsner J 2009;9(2):54-59."}, {"number": "25", "stem": "A 75-year-old male with a history of esophageal cancer treated at an outside institution presents with a history of intermittent painless regurgitation. He undergoes a barium esophagram. What do the images show?", "options": [{"letter": "A", "text": "Marked esophageal dilatation and distal narrowing, likely achalasia"}, {"letter": "B", "text": "Esophagectomy changes with colonic interposition"}, {"letter": "C", "text": "Esophagectomy changes with gastric pull-up"}, {"letter": "D", "text": "Partial gastrectomy with esophagojejunal anastomosis"}, {"letter": "E", "text": "Large hiatal hernia containing most of the stomach"}], "images": ["assets/q25_p050_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The barium esophagram demonstrates absence of most of the normal thoracic esophagus and replacement with a conduit with anastomosis in the upper mediastinum. The conduit can be recognized as a vertically oriented stomach given the presence of rugal folds, continuity with the pylorus and duodenal bulb, and absence of the stomach in the expected infradiaphragmatic location. This procedure is performed for pathology involving the mid and distal esophagus, most commonly esophageal cancer. The stomach is the most common choice for a conduit given the relative ease of preservation of the vascular supply. Less commonly, the colon or jejunum is used as the conduit. Esophagectomy with colonic conduit. The most common operation using a gastric conduit (also known as a gastric pull-up) is the Ivor Lewis procedure. This involves a laparotomy for mobilization of the esophagus and stomach, possible tubulation of the stomach, an abdominal lymphadenectomy, and a possible pyloroplasty or pylorotomy. Through a right thoracotomy, the esophagus is removed en bloc with adjacent tissue, a mediastinal lymphadenectomy is performed, and the stomach is pulled up into the chest and anastomosed with the proximal remaining esophagus. Pulmonary complications (pneumonia, aspiration, acute respiratory distress syndrome, ventilator dependence) and anastomotic leaks are the most common postoperative complications. Delayed gastric emptying due to vagotomy may occur. Gastroesophageal reflux is very common following this procedure.\n\nReferences: Flanagan JC, Batz R, Saboo SS, et al. Esophagectomy and gastric pull-through procedures: surgical techniques, imaging features, and potential complications. Radiographics 2016;36(1):107-121. Huang L, Onaitis M. Minimally invasive and robotic Ivor Lewis esophagectomy. J Thorac Dis 2014;6(Suppl 3):S314-S321."}, {"number": "26", "stem": "A 82-year-old female has symptoms of severe dysphagia to liquids and solids. The patient undergoes a single-contrast esophagram. Which antecedent history may be associated with the findings seen?", "options": [{"letter": "A", "text": "Prolonged ICU stay with indwelling nasogastric tube"}, {"letter": "B", "text": "History of bullous skin disorder"}, {"letter": "C", "text": "Chronic severe GERD"}, {"letter": "D", "text": "Radiation therapy for lymphoma"}, {"letter": "E", "text": "Zollinger-Ellison syndrome"}], "images": ["assets/q26_p051_01.jpg"], "explanationImages": ["assets/a26_p086_01.jpg"], "answer": "B", "explanation": "Answer B. Autoimmune mucocutaneous blistering diseases are a group of conditions which involve bullae and blisters of the skin and mucous membranes. These can also involve the pharynx and the upper esophagus. Rupture and healing of the bullae can lead to strictures and web formation. Bullous pemphigoid is the most common example, typically seen in elderly females, with epidermolysis bullosa a rare related condition. Other conditions including graft versus host disease, toxic epidermal necrolysis, and Stevens-Johnson syndrome that cause desquamation can have similar esophageal involvement with strictures and webs forming in the healing phase. The other answer choices listed are less likely to result in the findings seen. Strictures associated with indwelling nasogastric tubes are long and involve the distal esophagus Zollinger-Ellison syndrome may also produce long strictures of the distal esophagus due to the increased acidity of refluxed material. GERD is unlikely to involve a segment as high as seen in this example. Appropriate ports for radiation of cervical lymphadenopathy should be able to avoid the hypopharynx and esophagus. Other causes of high esophageal web formation include heterotopic gastric mucosa, which may be seen in the cervical esophagus on endoscopy in up to 10% of patients. This is typically asymptomatic but can be associated with scarring and web formation due to acid production. Plummer-Vinson syndrome involves cervical esophageal webs, iron deficiency anemia, and glossitis. Patients have dysphagia related to the webs and are at increased risk for hypopharyngeal and esophageal cancer. Heterotopic gastric mucosa. Plummer-Vinson syndrome.\n\nReferences: Akbayir N, Alkim C, Erdem L, et al. Heterotopic gastric mucosa in the cervical esophagus (inlet patch): endoscopic prevalence, histological and clinical characteristics. J Gastroenterol Hepatol 2004;19(8):891-896. Ergun GA, Lin AN, Dannenberg AJ, et al. Gastrointestinal manifestations of epidermolysis bullosa. A study of 101 patients. Medicine (Baltimore) 1992;71(3):121-127."}, {"number": "27a", "stem": "A patient with a history of a stroke and chronic cough has a videofluoroscopic swallowing study performed. The patient swallows a sip of thin barium with images from the lateral pharyngogram below. What finding is illustrated in this case? Left: Baseline. Right: Post single swallow thin barium.", "options": [{"letter": "A", "text": "Normal"}, {"letter": "B", "text": "Shallow laryngeal penetration"}, {"letter": "C", "text": "Deep laryngeal penetration"}, {"letter": "D", "text": "Aspiration"}], "images": ["assets/q27a_p052_01.jpg"], "explanationImages": ["assets/a27a_p089_01.jpg"], "answer": "C", "explanation": "Answer C. Penetration of ingested material into the upper laryngeal vestibule may be shallow and clear with progression of the swallow (\"flash\" penetration) and can be a normal finding. In this case however, the image demonstrates abnormal deep laryngeal penetration of barium into the lower laryngeal vestibule just above the vocal cords. No subglottic extension of barium is seen in this case, but if the penetrated material is not ejected, this material may be aspirated. Swallowing (deglutition) is a complex process. Aside from structural or anatomic causes, a large number of neuromuscular disorders of the oral cavity and pharynx may affect swallowing. These include oral stasis, delayed swallow initiation, premature spillage into the pharynx, nasopharyngeal reflux, pharyngeal stasis, laryngeal penetration, and aspiration. These disorders may be caused by an abnormality of the central nervous system or peripheral disorders. Central nervous system causes include stroke, Parkinson disease, Alzheimer's and other dementias, cerebral palsy, intracranial trauma, amyotrophic lateral sclerosis, or demyelinating disease. Peripheral causes include myasthenia gravis, striated muscular disorders including muscular dystrophy, polymyositis, and metabolic or hormonal conditions affecting muscle such as thyroid disorders."}, {"number": "27b", "stem": "Which action listed below is not involved in the pharyngeal phase of a normal swallow?", "options": [{"letter": "A", "text": "Elevation of the soft palate"}, {"letter": "B", "text": "Depression of the hyoid bone with posterior and inferior movement of the larynx"}, {"letter": "C", "text": "Epiglottic inversion"}, {"letter": "D", "text": "Adduction of the vocal cords"}, {"letter": "E", "text": "Relaxation of the upper esophageal sphincter"}], "images": ["assets/q27a_p052_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The process of normal deglutition (swallowing) involves complex volitional and reflexive neuromuscular activity. Many conditions, including cognitive impairment, neuromuscular abnormalities (such as stroke or intrinsic muscle weakness), or structural abnormalities (e.g., strictures, diverticula, masses) can interfere with the normal swallowing mechanism. Swallowing is divided into oral, pharyngeal, and esophageal phases. A bolus is created in the oral phase and propelled by the tongue toward the pharynx. The pharyngeal phase involves elevation of the soft palate to seal the nasopharynx, elevation and anterior movement of the hyoid and larynx, adduction and apposition of the vocal cords and laryngeal closure, epiglottic inversion, and upper esophageal sphincter relaxation (hence all actions except that described in answer B are true). The bolus then enters into the esophagus where it is propelled toward the stomach by peristaltic waves.\n\nReferences: Carucci LR, Turner MA. Dysphagia revisited: common and unusual causes. Radiographics 2015;35(1):105-122. Gates J, Hartnell GG, Gramigna GD. Videofluoroscopy and swallowing studies for neurologic disease: a primer. Radiographics 2006;26(1):e22. Harris JA, Bartelt D, Campion M, et al. The use of low-osmolar water-soluble contrast in videofluoroscopic swallowing exams. Dysphagia 2013;28(4):520-527."}, {"number": "28", "stem": "A 85-year-old female presents with a history of dysphagia and regurgitation of undigested material. She undergoes a barium pharyngoesophagram. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Killian-Jamieson diverticulum"}, {"letter": "B", "text": "Lateral pharyngeal pouch"}, {"letter": "C", "text": "Lateral pharyngeal diverticulum"}, {"letter": "D", "text": "Zenker diverticulum"}], "images": ["assets/q28_p053_01.jpg", "assets/q28_p054_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. On a barium pharyngoesophagram, there is a diverticulum originating from the posterior hypopharyngeal wall above a prominent cricopharyngeal muscle, representing a Zenker diverticulum. A Zenker diverticulum is a pulsion pseudodiverticulum that involves herniation of mucosa and submucosa through Killian's dehiscence, a posterior defect between the horizontal and oblique fibers of the inferior constrictor muscle in the region of the cricopharyngeus muscle. The diverticulum extends inferiorly below the level of the cricopharyngeus posterior to the cervical esophagus. When small, the diverticulum may remain midline; as it enlarges, it may extend laterally. The pathogenesis of the diverticulum formation is uncertain, but associated cricopharyngeal spasm or incoordination of upper esophageal sphincter opening with swallowing have been implicated. Gastroesophageal reflux (GERD) disease and esophageal dysmotility are commonly associated with a Zenker diverticulum; GERD is also associated with cricopharyngeal spasm. The patient may present with halitosis and regurgitation of undigested food. Secondary aspiration of diverticulum contents may occur. When large, a palpable neck mass may be found. A Killian-Jamieson diverticulum extends laterally from the cervical esophagus below the cricopharyngeus (through the Killian-Jamieson space, distinct from Killian's dehiscence). Although the example below is large, this diverticulum is usually small and asymptomatic, may be bilateral, and is less common than a Zenker diverticulum. Lateral pharyngeal pouches are focal bulges in the lateral pharyngeal wall in the region of the thyrohyoid membrane; these are usually bilateral. When pharyngeal mucosa herniates through the thyrohyoid membrane, a fixed lateral pharyngeal diverticulum with a narrow neck (usually unilateral) may develop; these may be symptomatic with dysphagia and aspiration. Lateral pharyngeal diverticula are commonly associated with increased intraluminal pressure (e.g., horn players and glass blowers). Killian-Jamieson diverticulum. Lateral pharyngeal pouches.\n\nReferences: Gore RM, Levine MS. Textbook of gastrointestinal radiology, 4th ed. Philadelphia, PA: Elsevier/Saunders, 2015. Rubesin SE, Levine MS. Killian-Jamieson diverticula: radiographic findings in 16 patients. AJR Am J Roentgenol 2001;177(1):85-89."}, {"number": "29", "stem": "A 31-year-old female complains of a sensation of dysphagia in the cervical region. She is otherwise healthy. A pharyngogram is performed, and manometric measurements demonstrate increased upper esophageal sphincter (UES) pressure at rest and failure of the UES to completely relax. What additional condition is likely to be present?", "options": [{"letter": "A", "text": "Zenker diverticulum"}, {"letter": "B", "text": "Gastroesophageal reflux disease"}, {"letter": "C", "text": "Cranial nerve dysfunction"}, {"letter": "D", "text": "Recurrent pneumonias from aspiration"}], "images": ["assets/q29_p055_01.jpg"], "explanationImages": ["assets/a29_p092_01.jpg"], "answer": "B", "explanation": "Answer B. The lateral pharyngogram demonstrates a prominent posterior impression at the junction of the hypopharynx and esophagus at the C5-C6 level consistent with a prominent cricopharyngeus muscle (also called a cricopharyngeal bar). The cricopharyngeus muscle is usually contracted at rest and relaxes with initiation of a swallow. While it may be seen in asymptomatic people, it is commonly related to gastroesophageal reflux disease (GERD). The cricopharyngeus serves as a barrier to prevent retrograde flow of ingested material and stomach acid into the airway and to prevent air entry into the esophagus. Note that cricopharyngeal bars may also be asymptomatic and incidental findings. Increased tone of the muscle at rest may lead to a Zenker diverticulum but is not demonstrated on this examination. A brainstem infarct with lower cranial nerve dysfunction may lead to pharyngeal paresis with an associated cricopharyngeal bar but is not necessarily associated with increased pressure on manometry and would be unlikely in the patient's age group. While cricopharyngeal muscle dysfunction may be associated with aspiration pneumonias, this patient's clinical presentation is not consistent.\n\nReferences: Cook I. Cricopharyngeal bar and Zenker diverticulum. Gastroenterol Hepatol (N Y) 2011;7(8):540. Tao TY, Menias CO, Herman TE, et al. Easier to swallow: pictorial review of structural findings of the pharynx at barium pharyngography. Radiographics 2013;33(7):e189-e208. C. The pseudomass represents the normal side of the pharynx. D. The lesion was missed on endoscopy."}, {"number": "30", "stem": "A 45-year-old male with a long history of heartburn has an esophagram. The following finding is persistent and unchanged on multiple views. What is the appropriate next step in management?", "options": [{"letter": "A", "text": "A CT of the abdomen should be performed to evaluate for evidence of cirrhotic liver disease and portal hypertension."}, {"letter": "B", "text": "The finding is likely benign, the patient should continue acid suppression medical therapy, and no further workup is needed."}, {"letter": "C", "text": "The finding is likely benign, but endoscopic evaluation is still indicated."}, {"letter": "D", "text": "The finding is very concerning for malignancy and endoscopy with polypectomy is warranted."}], "images": ["assets/q30_p095_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The finding is a fixed, thickened gastric fold that terminates in a clubbed or polypoid tip in the distal esophagus or in the region of the gastroesophageal junction. Known as an inflammatory esophagogastric polyp, a polyp-fold complex, or a sentinel polyp, this is typically a benign mucosal regenerative response that is associated with erosive esophagitis, most commonly from gastroesophageal reflux disease. Early reports of this finding suggested that no endoscopy was needed if the polyp were smooth, small (<2.5 cm), and associated with a history of reflux symptoms. However, while this polyp may itself be benign, it is a marker for significan
