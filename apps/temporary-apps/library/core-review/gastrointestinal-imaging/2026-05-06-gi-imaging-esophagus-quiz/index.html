t esophagitis and in adults, this warrants endoscopic surveillance and potential biopsy of the inflamed mucosa independent of the polyp.\n\nReferences: Abraham SC, Singh VK, Yardley JH, et al. Hyperplastic polyps of the esophagus and esophagogastric junction: histologic and clinicopathologic findings. Am J Surg Pathol 2001;25(9):1180-1187. Bleshman MH, Banner MP, Johnson RC, et al. The inflammatory esophagogastric polyp and fold. Radiology 1978;128(3):589-593."}, {"number": "31a", "stem": "A 67-year old man presents with a 10-year history of dysphagia and regurgitation. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Peptic stricture from GERD"}, {"letter": "B", "text": "Achalasia"}, {"letter": "C", "text": "Caustic ingestion"}, {"letter": "D", "text": "Progressive systemic sclerosis"}, {"letter": "E", "text": "Pseudoachalasia from esophageal cancer"}], "images": ["assets/q31a_p096_01.jpg"], "explanationImages": ["assets/a31a_p110_01.jpg"], "answer": "B", "explanation": "Answer B. Frontal chest radiograph shows an elongated heterogeneous density mass projecting over the medial right hemithorax. The accompanying barium esophagram shows marked esophageal dilatation with short smooth tapering at the gastroesophageal junction. The most common cause is achalasia, a condition in which the lower esophageal sphincter (LES) fails to relax normally. This results from the loss of myenteric ganglia (Auerbach plexus), inhibitory neurons that promote LES relaxation. A peptic stricture does not typically cause marked dilatation and would result in more mucosal irregularity (note the smooth folds above the LES in this case). Caustic ingestion typically causes a long esophageal stricture. Progressive systemic sclerosis (scleroderma) usually involves as a patulous gastroesophageal junction, although a secondary peptic stricture may eventually develop. Pseudoachalasia causes narrowing due to malignant involvement of the myenteric plexus (most commonly from carcinoma of the gastric cardia) and is typically longer, eccentric, or more irregular than the narrowing in this case. Pseudoachalasia from GE junction adenocarcinoma"}, {"number": "31b", "stem": "A similar pattern to the findings in the previous example above may be seen in infection with", "options": [{"letter": "A", "text": "Helicobacter pylori"}, {"letter": "B", "text": "Trypanosoma cruzi"}, {"letter": "C", "text": "Treponema pallidum"}, {"letter": "D", "text": "Wuchereria bancrofti"}], "images": ["assets/q31a_p096_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Chagas disease (American trypanosomiasis) is caused by postinfectious damage to nerves in the myenteric plexus and may be identical in appearance and behavior to achalasia. It can also result in a dilated cardiomyopathy and megacolon. It is caused by infection with the protozoan Trypanosoma cruzi, carried by the triatomine (reduviid or kissing) bug. This insect vector is found primarily among rural populations in Latin America, although numbers are increasing in the United States and Europe with immigration. Helicobacter pylori is associated with peptic ulcer disease, gastritis, and gastric cancer. Treponema pallidum is a spirochete, which causes syphilis. Wuchereria bancrofti is a parasitic roundworm that is associated with lymphatic filariasis.\n\nReferences: Boeckxstaens GE, Zaninotto G, Richter JE. Achalasia. Lancet 2014;383(9911):83-93. Francis DL, Katzka DA. Achalasia: update on the disease and its treatment. Gastroenterology 2010;139(2):369-374. Levine MS, Ramchandani P, Rubesin SE. Practical Fluoroscopy of the GI and GU Tracts. New York, NY: Cambridge University Press; 2012:234."}, {"number": "32", "stem": "Which of the following is associated with achalasia?", "options": [{"letter": "A", "text": "Case A"}, {"letter": "B", "text": "Case B"}, {"letter": "C", "text": "Case C"}, {"letter": "D", "text": "Case D"}], "images": ["assets/q32_p097_01.jpg", "assets/q32_p098_01.jpg", "assets/q32_p099_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The barium studies in this group illustrate several types of diverticula or diverticular- like structures. Images from case C illustrate an epiphrenic diverticulum, which is a pulsion-type pseudodiverticulum. These are most commonly associated with motility disorders such as achalasia. The distal narrowing of the esophagus and failure of the lower esophageal sphincter to relax in achalasia leads to elevated intraluminal pressure, which causes the herniation of the mucosa and submucosa through the musculature. Patients with large epiphrenic diverticula may experience dysphagia and chest pain, but reflux symptoms are usually absent. The other choices are not associated with a cause for increased intraluminal pressure in the distal esophagus. Case A depicts a Zenker diverticulum, which may be associated with cricopharyngeal achalasia. Case B represents esophageal intramural pseudodiverticulosis, dilated intramural glands in the esophageal wall. This is associated with GERD, and intraluminal pressures in the distal esophagus are likely to be decreased, not increased. Case D is not a diverticulum but a type II paraesophageal hernia.\n\nReferences: Fasano NC, Levine MS, Rubesin SE, et al. Epiphrenic diverticulum: clinical and radiographic findings in 27 patients. Dysphagia 2003;18(1):9-15. Foltz C, Strum W. Images in clinical medicine. Epiphrenic diverticulum. N Engl J Med 2014;371(26):2510."}, {"number": "33", "stem": "A 40-year-old woman was shot in the neck just above the sternal notch. The wound was explored and a surgical drain placed at the left aspect of the base of the neck. Small bullet fragments in the right neck base were not removed. Spot images from subsequent swallow study are shown below. Which of the following statements is TRUE?", "options": [{"letter": "A", "text": "Esophageal injuries are seen at a rate comparable to vascular injuries following penetrating trauma."}, {"letter": "B", "text": "Gunshot wounds are less common than iatrogenic causes of penetrating esophageal trauma in the neck."}, {"letter": "C", "text": "Contrast swallow studies for intrathoracic esophageal perforation are associated with a 10% false-positive rate."}, {"letter": "D", "text": "The next step would be to rotate the patient 90 degrees to right posterior oblique and repeat the examination with Gastrografin."}, {"letter": "E", "text": "Endoscopic esophageal stent placement is the preferred treatment method for this hemodynamically stable patient."}], "images": ["assets/q33_p100_01.jpg", "assets/q33_p101_01.jpg", "assets/q33_p102_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Gunshot wounds are less common than iatrogenic causes of penetrating esophageal trauma in the neck. Images show persistent esophageal perforation at the thoracic inlet (same level as the surgical drain). There is also contrast within the tracheobronchial tree, which could have been due to aspiration or tracheoesophageal fistula. An iso-osmolar water-soluble contrast, such as Omnipaque or Isovue, should be used in any patient with gastrointestinal tract injury and possible aerodigestive fistula or aspiration. Gastrografin, a high-osmolar water soluble contrast, should not be administered for this reason, as this could cause severe bronchial irritation and pulmonary edema-moreover, the diagnostic question (presence of leak) has already been answered. Iatrogenic causes are reported as the most common sources of esophageal perforation in the cervical and thoracic segments of the esophagus, followed by penetrating injuries. Esophageal injuries are rare compared with vascular injuries. Contrast esophagram, even completed with barium, has a documented false-negative rate of 10% (higher in the cervical esophagus), but the false-positive rate is near 0%. Although some esophageal ruptures can be treated conservatively, most cervical esophageal leaks undergo surgical exploration and drainage; stent placement is not preferred.\n\nReferences: Bryant AS, Cerfolio RJ. Esophageal trauma. Thorac Surg Clin 2007;17(1):63-72. Morcos SK, Oldroyd S, Haylor J. Effect of radiographic contrast media on endothelium derived nitric oxide-dependent renal vasodilatation. Br J Radiol 1997;70:154-159."}, {"number": "34a", "stem": "A 65-year-old female with recent stroke presents with dysphagia. A barium swallow is requested by the clinician, and an esophagram is performed with thin barium. The following spot films obtained after the initial swallow of barium. What do the findings represent?", "options": [{"letter": "A", "text": "High cervical esophageal stricture"}, {"letter": "B", "text": "Cricopharyngeal achalasia"}, {"letter": "C", "text": "Lateral pharyngeal pouches"}, {"letter": "D", "text": "Aspiration"}], "images": ["assets/q34a_p104_01.jpg", "assets/q34a_p105_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. This case illustrates florid aspiration. Note on the lateral view the barium-coated structures are in the anterior neck in the larynx and trachea. The upper esophageal sphincter and esophagus are not delineated; hence, this is not cricopharyngeal achalasia or an esophageal stricture. Lateral pharyngeal pouches, which would extend from the lateral aspect of the hypopharynx, are not demonstrated. Barium is the contrast medium of choice if there is a risk of aspiration, as water-soluble agents may cause a significant chemical pneumonitis. 34b Answers: A. 7. Pyriform sinus B. 4. True cord C. 5. False cord D. 2. Laryngeal ventricle E. 9. Vallecula F. 8. Epiglottis G. 3. Laryngeal vestibule H. 6. Trachea The barium coating in this case emphasizes the anatomy of laryngeal and pharyngeal structures and the proximal trachea. These structures often can be delineated on plain film radiography as well. Aspiration occurs during the pharyngeal phase of swallowing. Abnormal barium passage into the laryngeal vestibule that does not pass below the level of the cords is termed penetration. When the passage of material into the proximal vestibule is transient and cleared spontaneously with pharyngeal contraction, this is termed \"flash\" penetration. Deep laryngeal penetration extends further into the vestibule and is not cleared spontaneously. Patients who have deep penetration are at increased risk for aspiration. In this case, the pyriform sinuses have significant pooling of contrast and may act as reservoirs for aspirated material."}, {"number": "34bA", "stem": "Label the following structures A-H. Each answer may be used once, more than once, or not at all. 1. Esophagus 2. Laryngeal ventricle 3. Laryngeal vestibule 4. True cord 5. False cord 6. Trachea 7. Pyriform sinus 8. Epiglottis 9. Vallecula Identify structure A.", "options": [{"letter": "A", "text": "1. Esophagus"}, {"letter": "B", "text": "2. Laryngeal ventricle"}, {"letter": "C", "text": "3. Laryngeal vestibule"}, {"letter": "D", "text": "4. True cord"}, {"letter": "E", "text": "5. False cord"}, {"letter": "F", "text": "6. Trachea"}, {"letter": "G", "text": "7. Pyriform sinus"}, {"letter": "H", "text": "8. Epiglottis"}, {"letter": "I", "text": "9. Vallecula"}], "images": ["assets/q34bA_34bB_34bC_34bD_34bE_34bF_34bG_34bH_p106_01.jpg", "assets/q34bA_34bB_34bC_34bD_34bE_34bF_34bG_34bH_p107_01.jpg"], "explanationImages": [], "answer": "G", "explanation": "34b Answers: A. 7. Pyriform sinus B. 4. True cord C. 5. False cord D. 2. Laryngeal ventricle E. 9. Vallecula F. 8. Epiglottis G. 3. Laryngeal vestibule H. 6. Trachea The barium coating in this case emphasizes the anatomy of laryngeal and pharyngeal structures and the proximal trachea. These structures often can be delineated on plain film radiography as well. Aspiration occurs during the pharyngeal phase of swallowing. Abnormal barium passage into the laryngeal vestibule that does not pass below the level of the cords is termed penetration. When the passage of material into the proximal vestibule is transient and cleared spontaneously with pharyngeal contraction, this is termed \"flash\" penetration. Deep laryngeal penetration extends further into the vestibule and is not cleared spontaneously. Patients who have deep penetration are at increased risk for aspiration. In this case, the pyriform sinuses have significant pooling of contrast and may act as reservoirs for aspirated material."}, {"number": "34bB", "stem": "Label the following structures A-H. Each answer may be used once, more than once, or not at all. 1. Esophagus 2. Laryngeal ventricle 3. Laryngeal vestibule 4. True cord 5. False cord 6. Trachea 7. Pyriform sinus 8. Epiglottis 9. Vallecula Identify structure B.", "options": [{"letter": "A", "text": "1. Esophagus"}, {"letter": "B", "text": "2. Laryngeal ventricle"}, {"letter": "C", "text": "3. Laryngeal vestibule"}, {"letter": "D", "text": "4. True cord"}, {"letter": "E", "text": "5. False cord"}, {"letter": "F", "text": "6. Trachea"}, {"letter": "G", "text": "7. Pyriform sinus"}, {"letter": "H", "text": "8. Epiglottis"}, {"letter": "I", "text": "9. Vallecula"}], "images": ["assets/q34bA_34bB_34bC_34bD_34bE_34bF_34bG_34bH_p106_01.jpg", "assets/q34bA_34bB_34bC_34bD_34bE_34bF_34bG_34bH_p107_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "34b Answers: A. 7. Pyriform sinus B. 4. True cord C. 5. False cord D. 2. Laryngeal ventricle E. 9. Vallecula F. 8. Epiglottis G. 3. Laryngeal vestibule H. 6. Trachea The barium coating in this case emphasizes the anatomy of laryngeal and pharyngeal structures and the proximal trachea. These structures often can be delineated on plain film radiography as well. Aspiration occurs during the pharyngeal phase of swallowing. Abnormal barium passage into the laryngeal vestibule that does not pass below the level of the cords is termed penetration. When the passage of material into the proximal vestibule is transient and cleared spontaneously with pharyngeal contraction, this is te     const APP_ID = "gi-imaging-esophagus-quiz-ch1";

    function loadState() {

          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        defaultSeedVersion: DEFAULT_SEED_VERSION,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";

      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");

      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);

      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));

        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
