<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Breast Imaging Review Interventional Procedures Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Absolute Breast Imaging Review Interventional Procedures Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>

        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>

      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>

        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":1,"appId":"absolute-breast-imaging-review-interventional-procedures-quiz-ch6",...}'></textarea>

        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>

  <script>
    const QUESTIONS = [{"number": "1a", "stem": "A 55-year-old female presents for new calcifications in the right breast on screening mammogram. A diagnostic mammogram is shown. What is the next best step in management? R MLO R CC", "options": [{"letter": "A", "text": "Ultrasound-guided biopsy."}, {"letter": "B", "text": "Stereotactic biopsy."}, {"letter": "C", "text": "MRI-guided biopsy."}, {"letter": "D", "text": "Surgical excision."}], "images": ["assets/q1a_1b_p249_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Stereotactic biopsy. Magnification views show grouped coarse heterogeneous calcifications. According to BI-RADS fifth edition [1], grouped coarse heterogeneous calcifications are BI-RADS 4b. Category 4b lesions have a 10-50% likelihood of malignancy. As a result, biopsy should be recommended. For suspicious findings seen only on mammography, stereotactic biopsy should be performed to obtain tissue diagnosis."}, {"number": "1b", "stem": "What is the best approach for stereotactic biopsy?", "options": [{"letter": "A", "text": "Medial."}, {"letter": "B", "text": "Lateral."}, {"letter": "C", "text": "Superior."}, {"letter": "D", "text": "Inferior."}], "images": ["assets/q1a_1b_p249_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Medial. Suspicious calcifications are seen in the right breast at 3 o'clock. The biopsy approach should be made based on the projection that provides the best visualization of the finding and the shortest distance from the skin entry site to the target [2, 3]. In this case, the shortest distance for biopsy would be via a medial approach."}, {"number": "1c", "stem": "A stereotactic-guided biopsy was performed. This post-fire diagram of the stereotactic biopsy demonstrates the location of the needle in relation to the biopsy target. What type of error do these diagrams demonstrate?", "options": [{"letter": "A", "text": "None, the needle is in good position."}, {"letter": "B", "text": "X-axis error."}, {"letter": "C", "text": "Y-axis error."}, {"letter": "D", "text": "Z-axis error."}], "images": ["assets/q1c_p250_01.jpg"], "explanationImages": ["assets/a1c_p266_01.jpg"], "answer": "D", "explanation": "d. Z-axis error. For stereotactic biopsies, a scout image demonstrating the target lesion is acquired. Then, two images are acquired at +15 ° and − 15 ° angles to form the stereo pair. Another stereo pair image is acquired after firing the biopsy needle mechanism to confirm needle placement. In this example, the needle and target are aligned on the x-axis and y-axis, however, the needle has not reached the target on the z-axis, consistent with a z-axis error [4, 5]. A z-axis error corresponds to an error in depth positioning. If the needle is too deep to the target, the needle needs to be pulled back and re-imaged to ensure the target is in the trough. If the needle is too shallow to the target, the needle needs to be pushed further in. Z-axis error"}, {"number": "2a", "stem": "An 80-year-old female presents with a palpable abnormality in the left breast. Diagnostic mammogram demonstrates an irregular mass in the left breast. No sonographic correlate is identified on diagnostic breast ultrasound. What is the next best step in management?", "options": [{"letter": "A", "text": "Ultrasound-guided biopsy."}, {"letter": "B", "text": "Stereotactic biopsy."}, {"letter": "C", "text": "Breast MRI."}, {"letter": "D", "text": "Surgical excision."}], "images": ["assets/q2a_2b_p250_02.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Stereotactic biopsy. Given the presence of an irregular mass seen on mammogram, biopsy should be recommended. If no sonographic correlate is identified, stereotactic biopsy should be performed to obtain tissue diagnosis."}, {"number": "2b", "stem": "What is the best approach for stereotactic biopsy?", "options": [{"letter": "A", "text": "Medial."}, {"letter": "B", "text": "Lateral."}, {"letter": "C", "text": "Superior."}, {"letter": "D", "text": "Inferior."}], "images": ["assets/q2a_2b_p250_02.jpg"], "explanationImages": ["assets/a2b_p267_01.jpg"], "answer": "D", "explanation": "d. Inferior. An irregular mass is seen in the left breast at 6 o'clock. The shortest distance for biopsy would be via an inferior approach."}, {"number": "2c", "stem": "A stereotactic guided biopsy was performed. These post-fire images of the stereotactic biopsy demonstrate the location of the needle in relation to the biopsy target. What type of error do these images demonstrate?", "options": [{"letter": "A", "text": "Y-axis and Z-axis error."}, {"letter": "B", "text": "X-axis error."}, {"letter": "C", "text": "Y-axis error."}, {"letter": "D", "text": "Z-axis error."}], "images": ["assets/q2c_p251_01.jpg"], "explanationImages": ["assets/a2c_p268_01.jpg", "assets/a2c_p268_02.jpg"], "answer": "C", "explanation": "c. Y-axis error. In this example, the needle and target are aligned on the x-axis and z-axis, however, the needle is below the target on the y-axis, consistent with a y-axis error [4, 5]. A y-axis error corresponds to an error in vertical positioning, with the needle either below or above the target. Either re-targeting or sampling more above or below the needle can help correct the error. Y-axis error An x-axis error corresponds to an error in horizontal positioning, with the needle either too far to the right side or left side of the target. X-axis error"}, {"number": "3", "stem": "A 53-year-old female has a new left breast mass seen on screening mammogram. Diagnostic mammogram (image on the left) demonstrates a suspicious mass (circled) in the superior breast, and a presumed sonographic correlate was visualized (BI-RADS 4). Ultrasound-guided core needle biopsy was performed and a biopsy microclip was placed. Post-procedure mammogram (image on the right) demonstrates post-biopsy changes and biopsy microclip. The originally seen suspicious mass is circled in both images. What is the next best step?", "options": [{"letter": "A", "text": "Await pathology results as findings are related to clip migration."}, {"letter": "B", "text": "Repeat ultrasound-guided core needle biopsy."}, {"letter": "C", "text": "Perform stereotactic biopsy of the mammographic finding."}, {"letter": "D", "text": "Perform wire localization targeting the microclip."}], "images": ["assets/q3_p252_01.jpg"], "explanationImages": ["assets/a3_p269_01.jpg"], "answer": "C", "explanation": "c. Perform stereotactic biopsy of the mammographic finding. Post-procedure mammogram following ultrasound-guided biopsy is needed to confirm biopsy microclip placement. It is also used to confirm that the biopsied sonographic finding correlates to the original mammographic area of interest. If the sonographic biopsy target does not correlate with the mammographic finding, a re-biopsy using stereotactic guidance should be performed. Note that in the annotated images, the microclip and hematoma (red circle) are located anterior to the biopsy target (yellow circle)."}, {"number": "4a", "stem": "A 48-year-old female underwent diagnostic mammogram and ultrasound for a palpable abnormality in the right breast at 9 o'clock. Diagnostic mammogram demonstrates a spiculated mass, and a correlate mass is seen on diagnostic breast ultrasound. What is the next best step in management?", "options": [{"letter": "A", "text": "Fine-needle aspiration."}, {"letter": "B", "text": "Ultrasound-guided core needle biopsy."}, {"letter": "C", "text": "Stereotactic biopsy."}, {"letter": "D", "text": "Breast MRI."}], "images": ["assets/q4a_4b_p253_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Ultrasound-guided core needle biopsy. When a sonographic correlate is seen for a mammographically detected abnormality, ultrasound-guided core needle biopsy should be performed for tissue diagnosis. Benefits of ultrasound-guided biopsy when compared to stereotactic biopsy include lack of radiation exposure, greater patient comfort and real-time visualization [6, 7]. Although fine-needle aspiration was previously utilized, better specimen quality is obtained with core needle biopsy [2]."}, {"number": "4b", "stem": "What is the best approach for ultrasound-guided biopsy?", "options": [{"letter": "A", "text": "Medial."}, {"letter": "B", "text": "Lateral."}, {"letter": "C", "text": "Superior."}, {"letter": "D", "text": "Inferior."}], "images": ["assets/q4a_4b_p253_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Lateral. The suspicious mass is seen in the right breast at 9 o'clock. A lateral approach would provide the shortest distance to the lesion while avoiding the nipple and interference from the contralateral breast."}, {"number": "4c", "stem": "What area should be targeted at the time of biopsy?", "options": [{"letter": "A", "text": "Blue circle."}, {"letter": "B", "text": "Yellow circle."}, {"letter": "C", "text": "White circle."}, {"letter": "D", "text": "Red circle."}], "images": ["assets/q4c_p253_02.jpg"], "explanationImages": ["assets/a4c_p270_01.jpg"], "answer": "C", "explanation": "c. White circle. When performing an ultrasound-guided biopsy, care should be taken to avoid vascularity [8] surrounding a mass (blue circle) and within the mass (yellow circle). Targeting the central portion of the mass with the least vascularity (white circle) will ensure adequate sampling and decreased bleeding risk."}, {"number": "5a", "stem": "A 28-year-old female presents with a palpable abnormality in the right breast. Diagnostic breast ultrasound demonstrates a complicated cyst. The cyst was aspirated to completion and clear fluid was obtained. What is the next best step?", "options": [{"letter": "A", "text": "Discard fluid."}, {"letter": "B", "text": "Send fluid for culture."}, {"letter": "C", "text": "Place a microclip and send fluid for cytology."}, {"letter": "D", "text": "Perform ultrasound-guided core needle biopsy."}], "images": ["assets/q5a_5b_5c_p254_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Discard fluid. If cyst aspiration yields non-bloody clear fluid and the cyst collapses following the procedure, the fluid may be discarded [2]. Routine follow-up is recommended."}, {"number": "5b", "stem": "If cyst aspiration had yielded bloody fluid, what would be the next best step?", "options": [{"letter": "A", "text": "Nothing."}, {"letter": "B", "text": "Send fluid for culture."}, {"letter": "C", "text": "Place a biopsy microclip and send fluid for cytology."}, {"letter": "D", "text": "Perform ultrasound-guided core needle biopsy."}], "images": ["assets/q5a_5b_5c_p254_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Place a biopsy microclip and send fluid for cytology. If a cyst aspiration yields bloody fluid, the fluid should be sent for cytology in order to rule out occult malignancy [2]. A biopsy microclip should be placed as the lesion will likely resolve following aspiration."}, {"number": "5c", "stem": "If the finding did not fully resolve following aspiration, what would be the next best step?", "options": [{"letter": "A", "text": "Nothing."}, {"letter": "B", "text": "Send fluid for culture."}, {"letter": "C", "text": "Place a microclip and send fluid for cytology."}, {"letter": "D", "text": "Perform ultrasound-guided core needle biopsy."}], "images": ["assets/q5a_5b_5c_p254_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Perform ultrasound-guided core needle biopsy. A failed cyst aspiration suggests that the finding is a solid mass [9]. Given the suspicious imaging features, ultrasound-guided core needle biopsy should be performed to obtain tissue diagnosis."}, {"number": "6a", "stem": "A 32-year-old breastfeeding female with a strong family history of breast cancer presents with 3 days of pain, warmth, and redness of the left breast with an associated palpable abnormality. Diagnostic breast ultrasound was performed. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Invasive ductal carcinoma."}, {"letter": "B", "text": "Breast abscess."}, {"letter": "C", "text": "Complicated cyst."}, {"letter": "D", "text": "Simple cyst."}], "images": ["assets/q6a_6b_6c_p255_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Breast abscess. In a lactating patient, a breast abscess can occur as a complication of mastitis. Patients can present clinically with focal pain, warmth, and redness of the affected breast with associated palpable abnormality, as well as systemic symptoms such as fever [10]. On ultrasound, an abscess can present as a hypoechoic collection with mobile internal debris. Abscesses lack internal color Doppler flow; however, the surrounding soft tissues may appear hyperemic."}, {"number": "6b", "stem": "What is the next best step?", "options": [{"letter": "A", "text": "Ultrasound-guided core-needle biopsy."}, {"letter": "B", "text": "Ultrasound-guided drainage."}, {"letter": "C", "text": "Six-month follow-up ultrasound."}, {"letter": "D", "text": "Clinical follow-up. No follow-up imaging is required."}], "images": ["assets/q6a_6b_6c_p255_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Ultrasound-guided drainage. Patients with mastitis or breast abscesses should be prescribed a course of oral antibiotics. For treatment of breast abscesses, ultrasound-guided percutaneous drainage may be performed using an 18-gauge needle. The material obtained should be sent for cultures in order to determine the pathogen and antibiotic sensitivity. Antibiotics can be adjusted as needed [11]."}, {"number": "6c", "stem": "Following multiple aspirations and several courses of antibiotics, the patient continues to report a painfully palpable abnormality in the left breast. What is the next best step?", "options": [{"letter": "A", "text": "Ultrasound-guided core-needle biopsy and surgical consultation."}, {"letter": "B", "text": "Ultrasound-guided drainage."}, {"letter": "C", "text": "Six-month follow-up ultrasound."}, {"letter": "D", "text": "Clinical follow-up. No follow-up imaging required."}], "images": ["assets/q6a_6b_6c_p255_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Ultrasound-guided core-needle biopsy and surgical consultation. If symptoms of mastitis and/or breast abscess persist despite appropriate management, an ultrasound-guided core needle biopsy or skin punch biopsy should be performed to rule out malignancy, such as inflammatory breast cancer. Surgical consultation is also recommended for patients with breast abscesses that fail to resolve after multiple ultrasound-guided drainages [10, 11]."}, {"number": "7a", "stem": "A 53-year-old female with left breast cancer underwent breast MRI for surgical planning. A focus of enhancement was seen in the lateral right breast (circled). At the time of MRI-guided biopsy, the suspicious focus of enhancement is not seen on post-contrast images. What is the appropriate step to take following nonvisualization of an MRI finding during MRI biopsy? Initial MRI Pre-procedural MRI", "options": [{"letter": "A", "text": "Verify grid positioning."}, {"letter": "B", "text": "Obtain delayed post-contrast images."}, {"letter": "C", "text": "Decrease compression."}, {"letter": "D", "text": "All of the above."}], "images": ["assets/q7a_7b_p256_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. All of the above. Target nonvisualization at time of MRI-guided biopsy occurs in approximately 12% of cases [12]. Grid positioning should be verified in order to ensure that the target is not outside of the field of view. Obtaining delayed post-contrast sequences and decreasing compression of the breast will allow for better vascular perfusion [13]. If there is persistent nonvisualization of the target, hormonal changes in the breast may be the cause of the initial MRI finding."}, {"number": "7b", "stem": "The finding was not visualized after all appropriate steps were taken (as noted in the above question). What is the next best step?", "options": [{"letter": "A", "text": "Return to screening breast MRI."}, {"letter": "B", "text": "Short term interval follow-up breast MRI."}, {"letter": "C", "text": "Decrease compression."}, {"letter": "D", "text": "All of the above."}], "images": ["assets/q7a_7b_p256_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Short-term interval follow-up breast MRI. If nonvisualization of the target occurs at time of MRI-guided biopsy, shortterm follow-up MRI should be performed in order to rule out malignancy [2]. In this case, the focus of enhancement was not seen on the six-month followup MRI."}, {"number": "8", "stem": "A 49-year-old female with left bloody nipple discharge undergoes a ductography. Which of these best describes the finding seen on ductography?", "options": [{"letter": "A", "text": "Normal duct without filling defect."}, {"letter": "B", "text": "Duct ectasia without filling defect."}, {"letter": "C", "text": "Multiple intraductal filling defects."}, {"letter": "D", "text": "Extravasation of contrast."}], "images": ["assets/q8_p257_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Multiple intraductal filling defects. Ductography can be used for evaluation of unilateral spontaneous nipple discharge arising from a single pore. At the time of procedure, discharge is elicited using periareolar pressure. The discharging pore is then cannulated using a 30-gauge blunt-tipped catheter, and 0.2-0.3 mL of iodinated contrast is slowly administered through the catheter via extension tubing. The cannula can then be removed or secured in place using paper tape. Craniocaudal and 90-degree mediolateral magnification views of the subareolar breast are then obtained in order to visualize the contrast-opacified duct [14]."}, {"number": "9a", "stem": "A 58-year-old female underwent stereotactic biopsy of suspicious calcifications in the lower inner quadrant of the left breast, with pathology consistent with invasive ductal carcinoma. A microclip was placed at the time of biopsy (circle). Post-procedure mammogram demonstrated accurate microclip placement without clip migration. Pre-surgery wire-free localization using a reflector device is planned under mammographic guidance. If the microclip is to be targeted at time of wire-free localization, which approach should be taken?", "options": [{"letter": "A", "text": "Medial."}, {"letter": "B", "text": "Lateral."}, {"letter": "C", "text": "Superior."}, {"letter": "D", "text": "Oblique."}], "images": ["assets/q9a_p258_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Medial. The biopsy microclip is in the lower inner quadrant of the left breast. Of the answer choices provided, the shortest distance for pre-surgery localization would be via a medial approach. Although an inferior approach would also provide a short distance to the target, performing the procedure from the inferior breast can be technically challenging for the radiologist."}, {"number": "9b", "stem": "A reflector device is placed from a medial approach. Prior to deployment, a craniocaudal mammogram is performed to confirm position. What is the next best step?", "options": [{"letter": "A", "text": "Deploy the reflector."}, {"letter": "B", "text": "Pull back the deployment device and repeat craniocaudal view mammogram to confirm position."}, {"letter": "C", "text": "Advance the reflector deployment device and repeat craniocaudal view mammogram to confirm position."}, {"letter": "D", "text": "Remove the reflector deployment device and repeat placement via the inferior approach."}], "images": ["assets/q9b_p259_01.jpg"], "explanationImages": ["assets/a9b_p272_01.jpg"], "answer": "B", "explanation": "b. Pull back the deployment device and repeat craniocaudal view mammogram to confirm position. For accurate wire-free localization, the tip of the needle device should be placed at the target prior to deployment. In this image, the tip of the reflector deployment device needs to be pulled back, so that the tip is at the target. A repeat craniocaudal mammogram should be performed to confirm positioning, as was in this case. The reflector was then deployed, with post-deployment craniocaudal mammogram demonstrating appropriate reflector placement."}, {"number": "9c", "stem": "Following surgical excision, a specimen radiograph is obtained. What should be communicated to the surgeon?", "options": [{"letter": "A", "text": "Biopsy microclip is seen within the specimen."}, {"letter": "B", "text": "Reflector is seen within the specimen."}, {"letter": "C", "text": "Both a and b."}, {"letter": "D", "text": "None of the above."}], "images": ["assets/q9c_9d_p260_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Both a and b. Specimen radiographs are obtained following excision to confirm that the target was excised. If a wire localization was performed, the wire and localization target should be seen within the specimen radiograph. If wire-free localization was performed, the wire-free device (in this case a reflector) and target should be seen within the specimen radiograph. Findings should be reported to the operating room as soon as possible in order to confirm adequate surgical excision."}, {"number": "9d", "stem": "What is an advantage of wire-free localization?", "options": [{"letter": "A", "text": "Improved patient experience."}, {"letter": "B", "text": "Device can be placed prior to day of surgery."}, {"letter": "C", "text": "Potential for removal of smaller amount of nontargeted tissue."}, {"letter": "D", "text": "All of the above."}], "images": ["assets/q9c_9d_p260_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. All of the above. Wire localizations are typically performed just prior to surgical excision. Wire-free localization, however, may be performed days to months before the day of surgery. Since there is no need for patients to have a wire protruding from the breast while waiting in the pre-operative area, the overall patient experience is improved and patient anxiety is reduced with wire-free localization. Additionally, the wire-free device allows for continuous intraoperative reorientation in relation to the target, which gives the potential for removal of a smaller amount of nontargeted breast tissue."}, {"number": "10a", "stem": "A 33-year-old female underwent a stereotactic biopsy for an architectural distortion noted on diagnostic mammogram. There was 10-mm lateral migration of the biopsy clip (yellow circle) relative to the architectural distortion (red circle) noted on the post-biopsy mammogram. Pathology demonstrated radial scar. What finding should be targeted at time of pre-surgery wire localization?", "options": [{"letter": "A", "text": "Architectural distortion with associated calcifications."}, {"letter": "B", "text": "Biopsy microclip."}, {"letter": "C", "text": "Biopsy microclip and calcifications."}, {"letter": "D", "text": "None of the above."}], "images": ["assets/q10a_p261_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Architectural distortion with associated calcifications. Following stereotactic biopsy, clip migration may occur due to accordion effect or migration along the biopsy tract. In such cases, the initial biopsy target should be localized rather than the biopsy microclip."}, {"number": "10b", "stem": "The architectural distortion and associated calcification were targeted at time of pre-surgery wire localization. A specimen radiograph is performed following surgical excision. What should be communicated to the operating room?", "options": [{"letter": "A", "text": "The biopsy microclip is seen within the specimen."}, {"letter": "B", "text": "The biopsy microclip is not seen within the specimen and more tissue should be excised in order to remove the target."}, {"letter": "C", "text": "The biopsy microclip is not seen within the specimen, which is expected as the microclip was not the localization target."}], "images": ["assets/q10b_p262_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. The biopsy microclip is not seen within the specimen, which is expected as the microclip was not the localization target. If the biopsy microclip was not targeted at time of pre-surgery localization, the microclip is not expected to be seen within the specimen radiograph."}, {"number": "11a", "stem": "A 71-year-old female underwent stereotactic biopsy for an architectural distortion in the right breast. Post-procedure mammogram demonstrated accurate placement of the biopsy microclip. Pathology demonstrates atypical ductal hyperplasia, and surgical excision is recommended. Pre-surgery needle-wire localization is performed under mammographic guidance. Using the biopsy microclip as a target, needle-wire localization is performed from a medial approach. What are the closest coordinates to the target?", "options": [{"letter": "A", "text": "A14."}, {"letter": "B", "text": "C6."}, {"letter": "C", "text": "F3."}, {"letter": "D", "text": "J10."}], "images": ["assets/q11a_p263_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. C6. The grid overlying the area of localization target is used to determine accurate placement of the localization needle [15]. In this case, using the biopsy microclip as the target, the localization needle should be placed at approximately C6."}, {"number": "11b", "stem": "Using the biopsy microclip as a target, needle-wire localization is performed from a medial approach. What is the next best step?", "options": [{"letter": "A", "text": "Obtain a craniocaudal mammogram to confirm positioning."}, {"letter": "B", "text": "Deploy needle in the current position."}, {"letter": "C", "text": "Remove needle and re-position over the microclip."}, {"letter": "D", "text": "Remove needle and attempt from a superior approach."}], "images": ["assets/q11b_p264_01.jpg"], "explanationImages": ["assets/a11b_p274_01.jpg"], "answer": "C", "explanation": "c. Remove needle and re-position over the microclip. On initial images following needle placement during mammographic localization, the needle should overlap the localization target, which in this case is the biopsy microclip. Once the needle is in appropriate position, an orthogonal view is obtained in order to determine needle position relative to the target. Once positioning is confirmed, the localization wire may be deployed [16]."}, {"number": "12a", "stem": "A 62-year-old female presents with a palpable abnormality in the left breast 1 week after stereotactic biopsy for suspicious calcifications. The lump is located in the area of her recent biopsy. The following finding is seen in the area of concern on diagnostic breast ultrasound. What is the most likely finding?", "options": [{"letter": "A", "text": "Abscess."}, {"letter": "B", "text": "Fibroadenoma."}, {"letter": "C", "text": "Invasive ductal carcinoma."}, {"letter": "D", "text": "Hematoma."}], "images": ["assets/q12a_12b_p265_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Hematoma. A post-biopsy hematoma can present as a hypoechoic fluid collection or as a complex cystic and solid mass, depending on the amount of clotted versus free blood within the cavity [11]. Most hematomas resolve within 2-4 weeks."}, {"number": "12b", "stem": "What steps can be taken if excessive bleeding is noted during image-guided biopsy?", "options": [{"letter": "A", "text": "Administer additional lidocaine with epinephrine."}, {"letter": "B", "text": "Maintain manual compression against a hard surface in the plane of needle insertion for 10-20 minutes."}, {"letter": "C", "text": "Apply a pressure dressing to maintain continuous pressure."}, {"letter": "D", "text": "Obtain surgical consultation if excessive bleeding persists."}, {"letter": "E", "text": "All of the above."}], "images": ["assets/q12a_12b_p265_01.jpg"], "explanationImages": [], "answer": "E", "explanation": "e. All of the above. If excessive bleeding is encountered during image-guided biopsy, additional lidocaine with epinephrine may be administered in order to cause vasoconstriction. Additionally, manual compression should be applied and a pressure dressing may be utilized. If excessive bleeding cannot be controlled, a surgical consultation should be obtained [11]."}];
    const APP_ID = "absolute-breast-imaging-review-interventional-procedures-quiz-ch6";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SEED_VERSION = 1;
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
