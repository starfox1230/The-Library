Staphylococcus aureus. Other bacterial causes include S. pyogenes, S. epidermidis, Peptostreptococcus, and Bacteroides. Less commonly, breast abscesses can occur from fungi, parasites, and mycobacteria, including tuberculosis. Aspirated fluid should be sent for Gram stain and culture."}, {"number": "10a", "stem": "A 35-year-old, non-breastfeeding woman presents with redness and pain in her right breast. Mammogram and ultrasound imaging is shown below. What is the differential diagnosis for this patient?", "options": [{"letter": "A", "text": "Infectious breast abscess."}, {"letter": "B", "text": "Idiopathic granulomatous mastitis."}, {"letter": "C", "text": "Inflammatory breast cancer."}, {"letter": "D", "text": "Diabetic mastitis."}, {"letter": "E", "text": "All of the above."}], "images": ["assets/q10a_p281_01.jpg", "assets/q10a_p281_02.jpg"], "explanationImages": [], "answer": "E", "explanation": "e. All of the above. Common symptoms of breast infection include pain, redness, and warmth. However, it is important to consider the many causes of breast pain and erythema with these imaging findings, especially in non-lactating and older women. The differential includes breast abscess, inflammatory carcinoma, and noninfectious inflammatory processes including diabetic mastopathy, chronic idiopathic granulomatous mastitis, and immunologic diseases such as Churg-Strauss syndrome, amyloidosis, Wegener granulomatosis, and sarcoidosis [10]."}, {"number": "10b", "stem": "Percutaneous aspiration was attempted, and no fluid could be obtained. A biopsy was performed showing idiopathic granulomatous mastitis. Which of the following are true regarding this pathologic diagnosis?", "options": [{"letter": "A", "text": "Most commonly occurs in pre-menopausal women."}, {"letter": "B", "text": "The etiology is unknown."}, {"letter": "C", "text": "Imaging features can mimic malignancy."}, {"letter": "D", "text": "Pathology shows chronic granulomatous inflammation composed of giant cells."}, {"letter": "E", "text": "Has a high recurrence rate."}, {"letter": "F", "text": "All of the above."}], "images": [], "explanationImages": [], "answer": "F", "explanation": "f. All of the above. Granulomatous mastitis is a rare disease that occurs in parous, premenopausal women with a history of lactation and is often associated with hyperprolactinemia. The exact etiology is unknown, but it has been postulated to stem from a local inflammatory response in connective tissue and has been shown to be associated with multiple factors, with established connections to pregnancy, lactation, and hyperprolactinemia. The most common presentation is a tender, palpable mass, with imaging features often mimicking malignancy thus biopsy is frequently performed. On ultrasound, findings include irregular masses, focal regions of inhomogeneity with hypoechoic or tubular/nodular structures, or parenchymal hypoechogenicity with posterior acoustic shadowing. Mammographic findings usually show a focal or global asymmetry, illdefined breast masses, or negative findings; calcifications are rarely seen. Pathology shows noncaseating granulomatous inflammation centered in the lobules, with associated giant cells, leukocytes, macrophages, abscesses, and epithelioid cells. Infection, including mycobacterial and fungal pathogens, should be excluded. Treatment is controversial and varies by institution, ranging from surveillance in mild cases to oral steroid therapy, methotrexate or bromocriptine, and even surgery which is typically reserved for refractory or recurrent disease. Up to 50% of cases will recur, which can be reduced by immunosuppressive treatment until complete remission [ 3, 11]."}, {"number": "11a", "stem": "A 55-year-old woman presented with a growing palpable breast mass. Ultrasound images are shown. Ultrasound core biopsy pathology showed malignant phyllodes tumor. What is your radiology-pathology correlations statement for this lesion?", "options": [{"letter": "A", "text": "Concordantrecommend ultrasound in 6 months."}, {"letter": "B", "text": "Concordant-recommend excision."}, {"letter": "C", "text": "Discordant-recommend excision."}, {"letter": "D", "text": "Discordant-recommend MRI."}], "images": ["assets/q11a_p282_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Concordant-recommendation excision. Phyllodes tumor classically presents as a rapidly enlarging mass in a woman in her fifth decade. It is a high-risk breast lesion and wide surgical excision is the preferred treatment. Incomplete excision of either a benign or malignant phyllodes tumor can result in local recurrence 15% of the time. Approximately 25% of phyllodes tumors are malignant [3]."}, {"number": "11b", "stem": "What is the method of metastasis for phyllodes tumors?", "options": [{"letter": "A", "text": "Hematogenous."}, {"letter": "B", "text": "Lymphangitic."}, {"letter": "C", "text": "Direct extension."}, {"letter": "D", "text": "None of the above. 276 S. H. Chung et al."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "a. Hematogenous. Metastatic disease is common in phyllodes tumors. Metastatic disease has been reported in 13-40% of patients with phyllodes tumors. Unlike most other breast cancers, the method of spread is hematogenous [3]."}, {"number": "11c", "stem": "What is the most common location of metastasis of phyllodes tumor?", "options": [{"letter": "A", "text": "Axillary lymph nodes."}, {"letter": "B", "text": "Bone."}, {"letter": "C", "text": "Lungs."}, {"letter": "D", "text": "None of the above."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. Lungs. The most common location for metastasis to occur from phyllodes tumor is the lungs [12, 13]. 292 S. H. Chung et al."}, {"number": "11d", "stem": "If the pathology was benign phyllodes, what would be your concordance statement?", "options": [{"letter": "A", "text": "Concordant-recommend ultrasound in 6 months."}, {"letter": "B", "text": "Concordant-recommend excision."}, {"letter": "C", "text": "Discordant-recommend excision."}, {"letter": "D", "text": "Discordant-recommend MRI."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. Concordant-recommend excision. Phyllodes tumors of the breast account for 0.3%-1% of all primary breast tumors and constitute 2.5% of fibroepithelial tumors [3]. Phyllodes tumors are graded according to recommendations by the World Health Organization as benign, borderline, or malignant based on the presence of stromal cellularity, atypia, mitotic activity, and stomal overgrowth [14]. Surgical excision is required for all types of phyllodes tumors [3]."}, {"number": "11e", "stem": "What imaging characteristics are used to characterize benign from malignant phyllodes tumors?", "options": [{"letter": "A", "text": "There are no imaging characteristics that differentiate benign from malignant phyllodes."}, {"letter": "B", "text": "Size."}, {"letter": "C", "text": "Margins."}, {"letter": "D", "text": "Internal cystic spaces."}, {"letter": "E", "text": "Interval growth pattern."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "a. There are no imaging characteristics that differentiate benign from malignant phyllodes."}, {"number": "12a", "stem": "A 61-year-old woman presents for biopsy of the mammographic findings below. Her pathology returned as ductal carcinoma in situ. What is the most common mammographic finding if this was high-grade DCIS?", "options": [{"letter": "A", "text": "Non-calcified mass."}, {"letter": "B", "text": "Architectural distortion."}, {"letter": "C", "text": "Skin thickening and nipple retraction."}, {"letter": "D", "text": "Fine pleomorphic or fine linear-branching calcifications."}], "images": ["assets/q12a_12c_p283_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Fine pleomorphic or fine linear-branching calcifications. Microcalcifications are found in 50-75% of DCIS [15]. Low-grade DCIS lesions are more likely than high-grade lesions to demonstrate non-calcified abnormalities on mammography, including asymmetry and mass. Fine pleomorphic or fine linear-branching calcifications have been noted in high-grade DCIS according to the WHO system of classification [15]."}, {"number": "12b", "stem": "What grading system is used to classify DCIS?", "options": [{"letter": "A", "text": "TNM classification."}, {"letter": "B", "text": "Van Nuys classification."}, {"letter": "C", "text": "Luminal Subtype."}, {"letter": "D", "text": "Molecular Subtype."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. Van Nuys classification. The Van Nuys classification system is the simplest and most reproducible classification system for classifying DCIS. It identifies three groups of DCIS lesions, differentiated first according to nuclear grade (low, intermediate, or high grade) and then with presence or absence of necrosis [15]."}, {"number": "12c", "stem": "What is the typical MRI enhancement pattern of this lesion?", "options": [{"letter": "A", "text": "Enhancing mass."}, {"letter": "B", "text": "Focal enhancement in a regional distribution."}, {"letter": "C", "text": "No enhancement."}, {"letter": "D", "text": "Non-mass enhancement in a segmental distribution."}], "images": ["assets/q12a_12c_p283_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Non-mass enhancement in a segmental distribution. Non-mass enhancement is the most common MRI finding of DCIS and is seen in 60-80% of cases [15]. A segmental distribution of this non-mass enhancement is the most common pattern and accounts for 33-77% of cases of DCIS [15]. Ductal, linear or regional distribution of non-mass enhancement are other commonly reported MRI findings. An enhancing mass is seen in 14-34% of cases and focal enhancement is seen in 1-12% [16]."}, {"number": "12d", "stem": "What are the most important risk factors for disease recurrence in DCIS?", "options": [{"letter": "A", "text": "Hormone receptor-positive status."}, {"letter": "B", "text": "Post-excision positive margins and synchronous foci that were not excised."}, {"letter": "C", "text": "Male gender."}, {"letter": "D", "text": "Morphology of the calcifications."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. Post-excision positive margins and synchronous foci that were not excised. In DCIS, the most important risk factors for disease recurrence are post excision positive margins and synchronous foci that were not removed. In the National Surgical Adjuvant Breast Project, B-06 protocol, patients treated with excision followed by radiation therapy had a 6.9% recurrence, whereas those who did not undergo radiation therapy had a 22.7% rate of recurrence [16]. Gender and hormone receptor-positive status are not risk factors for disease recurrence. Adjuvant endocrine therapy has been shown to decrease the rate of recurrence by up to 50% in ER-positive tumors [17]."}, {"number": "13a", "stem": "A 20-year-old pregnant patient presents with a new palpable breast mass. Targeted ultrasound images are below. Which of the following is false regarding the evaluation of palpable breast masses in pregnancy?", "options": [{"letter": "A", "text": "Benign masses are more common than malignant masses."}, {"letter": "B", "text": "Mammogram is contraindicated in pregnancy."}, {"letter": "C", "text": "Most pregnancy-related malignancy is invasive ductal cancer."}, {"letter": "D", "text": "Masses suspicious for malignancy in pregnant/lactating women should be biopsied despite the risk of milk fistula."}], "images": ["assets/q13a_13b_13c_p284_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Mammogram is contraindicated in pregnancy. Most masses that occur in pregnancy are benign and include benign lactational adenoma, fibroadenoma, galactocele, and abscess [3]. According to ACR appropriateness criteria, while ultrasound is the first indicated examination for pregnant and lactating women with palpable concerns, mammography is not contraindicated in pregnancy and the dose to the fetus is negligible (4-view mammogram is <0.03 mGy) [ 18]. NCCN guidelines state that mammogram with shielding can be done safely in pregnant women [18]. As always, discussion of risk and benefit should be performed with the patient prior to proceeding with mammogram. Also, lactation is not a contraindication for mammogram. Mammography in a diagnostic workup is important to identify findings of breast cancer such as microcalcifications. Milk fistula is an uncommon condition that occurs when there is an abnormal connection that forms between the skin surface and the duct in the breast of a lactating woman. This is more commonly associated with surgical intervention than percutaneous biopsy but can occur [19, 20]. However, 3% of breast cancers are coincident with pregnancy or lactation [3]. Therefore, if suspicious image findings are identified, a biopsy should be performed."}, {"number": "13b", "stem": "A biopsy of the above mass results in lactational adenoma. What is your radiology-pathology concordance statement for this biopsy?", "options": [{"letter": "A", "text": "Concordant-recommend sur gical excision."}, {"letter": "B", "text": "Concordant-recommend ultrasound follo w up in 6 months."}, {"letter": "C", "text": "Discordant-recommend MRI."}, {"letter": "D", "text": "Discordant-recommend sur gical excision. 278 S. H. Chung et al."}], "images": ["assets/q13a_13b_13c_p284_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Concordant-recommend ultrasound follow up in 6 months. Benign concordant lesions can be false-negative. For this reason, meticulous radiology-pathology concordance must occur by the radiologist performing the biopsy, with confirmation of appropriate sampling, correlation with clinical symptoms and breast cancer risk, and lesion radiologic features prior to biopsy with correlating pathologic results [3]. Recent studies have indicated routine screening is appropriate if the biopsy is benign and concordant [21]. Imaging follow-up can be performed at the discretion of the radiologist on the same imaging modality that guided the biopsy. This may occur more frequently in younger patients who would not be expected to have routine breast imaging if <40 years or if not on a high-risk screening schedule. If the lesion increases in size at follow-up, repeat biopsy or surgical excision can be considered [21]."}, {"number": "13c", "stem": "Which of the following are false regarding lactational adenomas?", "options": [{"letter": "A", "text": "Usually presents as a palpable mass."}, {"letter": "B", "text": "Ultrasound characteristics are commonly a circumscribed hypoechoic mass."}, {"letter": "C", "text": "Can have imaging characteristics of a fibroadenoma."}, {"letter": "D", "text": "The presence of interval growth during pregnancy necessitates excision."}], "images": ["assets/q13a_13b_13c_p284_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. The presence of interval growth during pregnancy necessitates excision. Lactating adenoma is a solid, benign tumor diagnosed during pregnancy. It typically presents as a firm, painless palpable lump late in pregnancy or during lactation. On ultrasound, it has some similarities to fibroadenoma and appears as a well-circumscribed, hypoechoic mass that may contain echogenic bands (which are fibrotic bands seen on pathology). Interval growth is common and may represent change stimulated by hormonal alterations [3]."}, {"number": "14a", "stem": "A 73-year-old woman was called back for further evaluation from an abnormal screening mammogram. Spot mammogram and ultrasound images are provided below. This mass was biopsied. The pathology results were reported as papilloma with atypia. What is your radiology-pathology correlations statement?", "options": [{"letter": "A", "text": "Concordant-recommend surgical excision."}, {"letter": "B", "text": "Concordant-recommend 6-month follow-up diagnostic mammogram."}, {"letter": "C", "text": "Discordant-recommend MRI."}, {"letter": "D", "text": "Discordant-recommend surgical excision."}], "images": ["assets/q14a_p285_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Concordant-recommend surgical excision. The management of papilloma found on biopsy is controversial. In contrast to central papillomas, papillomas in the periphery of the breast are associated with epithelial proliferation, which can have atypical features. Atypia is thought to increase the risk of malignancy [3]. Papillary lesions without atypia have recently been shown in a prospective study to have an upgrade rate of just 1.7%, below the 2% threshold for probably benign findings and therefore if concordant imaging findings, may be considered safe to follow [22]. It is generally agreed that any papillary lesion with atypia, regardless of location, should undergo excision. 294 S. H. Chung et al."}, {"number": "14b", "stem": "This biopsied lesion underwent wire localization and excision. The excisional biopsy upstaged the pathology to 4 mm low-grade ductal carcinoma in situ, papillary and micropapillary types. No invasive component was identified. All margins were negative. Based on these pathology results, what TNM stage is the patient?", "options": [{"letter": "A", "text": "Stage 0."}, {"letter": "B", "text": "Stage 1A."}, {"letter": "C", "text": "Stage 2A."}, {"letter": "D", "text": "Unable to determine."}], "images": ["assets/q14b_p286_03.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Stage 0. Anatomic stage is based on the extent of cancer using T (extent of tumor), N (nodal disease), and M (distant metastasis) categories. When the primary tumor does not invade the basement membrane and only ductal carcinoma in situ is found, it is stage 0, or Tis, N0M0 [23]."}, {"number": "15a", "stem": "A 59-year-old woman called back for a screening mammogram for architectural distortion in the right breast. MLO and CC tomosynthetic 2D images are below respectively. 280 S. H. Chung et al. No sonographic correlation was identified. BIRADS 4 was given to the diagnostic workup, and a stereotactic core needle biopsy was performed. No specimen radiograph was obtained. Post-procedure mammograms are submitted below. Pathology results showed focal microcalcifications in association with benign ducts. The radiology-pathology correlation for this biopsy is:", "options": [{"letter": "A", "text": "Concordant-recommend mammogram in 6 months."}, {"letter": "B", "text": "Concordant-recommend mammogram and ultrasound in 6 months."}, {"letter": "C", "text": "Discordant-recommend MRI."}, {"letter": "D", "text": "Discordant-recommend surgical excision."}], "images": ["assets/q15a_15b_p286_01.jpg", "assets/q15a_15b_p286_02.jpg", "assets/q15a_15b_p287_01.jpg", "assets/q15a_15b_p287_02.jpg"], "explanationImages": ["assets/a15a_p301_01.jpg"], "answer": "D", "explanation": "d. Discordant-recommend sur gical excision. Architectural distortion is defined as distortion of the normal breast parenchyma architecture with no definite mass. It can be seen in both benign and malignant entities [3]. Architectural distortion has a high positive predictive value for malignancy in both screening and diagnostic 2D mammography, 10-67% and 60-83%, respectively [24]. The pathology of benign ducts does not explain the mammographic findings. Therefore, the radiology-pathology is discordant, and excision should be recommended secondary to the high positive predictive value of architectural distortion [24]."}, {"number": "15b", "stem": "An excisional biopsy was performed showing invasive ductal carcinoma with lobular features. All of the following may explain architectural distortion on mammogram and be considered concordant except?", "options": [{"letter": "A", "text": "Radial scar."}, {"letter": "B", "text": "Lobular carcinoma."}, {"letter": "C", "text": "Post-surgical scar."}, {"letter": "D", "text": "Ductal Carcinoma In situ."}, {"letter": "E", "text": "Papilloma."}], "images": ["assets/q15a_15b_p286_01.jpg", "assets/q15a_15b_p286_02.jpg", "assets/q15a_15b_p287_01.jpg", "assets/q15a_15b_p287_02.jpg"], "explanationImages": [], "answer": "E", "explanation": "e. Papilloma. Architectural distortion can be caused by invasive carcinoma, DCIS, radial scar, sclerosing adenosis, post-surgical scar, and post-radiation change. On mammography, papilloma can demonstrate a markedly dilated duct extending into the breast from the nipple with or without an associated mass. Ultrasound usually shows a solid mass within fluid-filled, dilated ducts. Solitary architectural distortion is not associated with papilloma [3]."}, {"number": "16a", "stem": "A 73-year-old woman was called back from screening mammogram for a new mass in the right breast. Diagnostic mammogram images and ultrasound are provided below. The below diagnostic workup was given a BIRADS 5Highly suspicious and the mass underwent core needle biopsy. Pathology reported invasive lobular carcinoma. Of the mammographic findings below, what is the most common conventional mammographic finding of this pathology?", "options": [{"letter": "A", "text": "Irregular mass."}, {"letter": "B", "text": "Pleomorphic calcifications."}, {"letter": "C", "text": "Course, heterogeneous calcifications."}, {"letter": "D", "text": "Circumscribed mass."}], "images": ["assets/q16a_16b_16c_p288_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Irregular mass. Invasive lobular carcinoma (ILC) most commonly manifests as a mass with spiculated or indistinct margins on mammography (44-65%) [25]. Much less commonly, these cancers will present as round or circumscribed masses (1-3%) [25]. Architectural distortion is the second most common manifestation of invasive lobular carcinoma (10-34%) [25]. Reported microcalcifications associated with invasive lobular carcinoma vary (0-24%), however, is known to be less than with invasive ductal carcinoma [25]."}, {"number": "16b", "stem": "What is the most common ultrasound finding of invasive lobular carcinoma?", "options": [{"letter": "A", "text": "Dermal thickening with an ill-defined heterogeneous echogenicity."}, {"letter": "B", "text": "An anechoic cystic mass with a vascular papillary projection from its wall."}, {"letter": "C", "text": "An irregular mass with angular margins, hypoechoic, heterogeneous internal echoes, and posterior acoustic shadowing."}, {"letter": "D", "text": "A circumscribed, isoechoic mass with no posterior acoustic features."}], "images": ["assets/q16a_16b_16c_p288_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. An irregular mass with angular margins, hypoechoic, heterogenous internal echoes, and posterior acoustic shadowing. Ultrasound is superior to mammography in identifying multicentric and multifocal diseases. The most common ultrasound manifestation of invasive lobular carcinoma is an irregular mass with indistinct, angular or spiculated margins, hypoechoic and heterogeneous internal echoes, and posterior acoustic shadowing. Other less common findings include circumscribed masses, focal shadowing without a discrete mass, and sonographically occultlesions [25]."}, {"number": "16c", "stem": "What is the next best step?", "options": [{"letter": "A", "text": "Lumpectomy with sentinel node biopsy."}, {"letter": "B", "text": "MRI."}, {"letter": "C", "text": "Neoadjuvant therapy. 282 S. H. Chung et al."}], "images": ["assets/q16a_16b_16c_p288_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. MRI. MRI should be performed in biopsy proven invasive-lobular carcinoma because it has been found to affect clinical management in 50% of cases, leading to changes in surgical management in 28% [25]. MRI is able to detect additional ipsilateral disease in 32% of cases and contralateral disease in 7% of cases that were not detected on mammography or ultrasonography [25]."}, {"number": "17", "stem": "Which of the following description and associated BIRADS has the highest likelihood of a discordant pathology?", "options": [{"letter": "A", "text": "A stereotactic biopsy of heterogeneous calcifications (BIRADS 4) with pathology result of fibroadenoma."}, {"letter": "B", "text": "An MRI biopsy of non-mass enhancement (BIRADS 4) with pathology result of DCIS."}, {"letter": "C", "text": "An ultrasound mass with angulated margins (BIRADS 5) with pathology result of fibroadenoma."}, {"letter": "D", "text": "A circumscribed mass on ultrasound (BIRADS 4) with pathology result of medullary carcinoma."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. An ultrasound mass with angulated margins (BIRADS 5) with pathology result of fibroadenoma. Ultrasound findings suggestive of cancer include an irregular shape, noncircumscribed margins (angular, indistinct, microlobulated, and spiculated), thick echogenic rim or halo, duct extension, or surrounding tissue changes, microcalcifications (in or out of a mass or intraductal), non-parallel orientation, or posterior shadowing. These descriptors are included in the ACR BI-RADS ultrasound lexicon. A fibroadenoma should have circumscribed margins without suspicious features [3]."}, {"number": "18", "stem": "Which of the following biomarkers are not routinely tested for on breast cancer biopsy specimens and excision specimens?", "options": [{"letter": "A", "text": "ER."}, {"letter": "B", "text": "PR."}, {"letter": "C", "text": "HER2."}, {"letter": "D", "text": "PD-L1."}, {"letter": "E", "text": "Ki-67 antigen."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "d. PD-L1. ER, PR, HER2, and Ki-67 antigen are biomarkers that are tested consistently in invasive breast carcinoma due to their potential effect on prognosis and clinical management [17]."}, {"number": "19", "stem": "A 45-year-old woman with BRCA1 mutation underwent screening and diagnostic mammogram and screening breast MRI with images shown below. Because of the abnormalities, a stereotactic biopsy was performed. Based on the imaging findings, what is the most likely grade of her cancer?", "options": [{"letter": "A", "text": "Low grade."}, {"letter": "B", "text": "Intermediate grade."}, {"letter": "C", "text": "High grade."}, {"letter": "D", "text": "Benign findings. 28 4 S. H. Chung et al."}], "images": ["assets/q19_p289_01.jpg", "assets/q19_p290_01.jpg", "assets/q19_p290_02.jpg", "assets/q19_p290_03.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. High grade. Linear enhancement is seen on MRI and calcifications on mammography most often correspond to high-grade carcinoma [26]."}, {"number": "20", "stem": "In BRCA 1 and BRCA 2 mutation carriers, what is the lifetime risk of developing breast cancer?", "options": [{"letter": "A", "text": "20%."}, {"letter": "B", "text": "50%."}, {"letter": "C", "text": "85%."}, {"letter": "D", "text": "99%."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. 85%. The lifetime breast cancer risk is as high as 85% for BRCA1 and BRCA2 mutation carriers. They also have a 50% risk of developing breast cancer by the age of 50 years [ 26]. 296 S. H. Chung et al."}, {"number": "21a", "stem": "A 34-year-old female presenting with a new right breast palpable mass. Targeted ultrasound image is below: What proportion of malignant lesions are isoechoic on ultrasound?", "options": [{"letter": "A", "text": "1/8."}, {"letter": "B", "text": "3/4."}, {"letter": "C", "text": "1/2."}, {"letter": "D", "text": "1/3."}], "images": ["assets/q21a_21b_21c_p291_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. 1/3. Isoechogenicity is not classified as a suspicious finding for malignancy but is considered an indeterminate finding. It can be seen in both benign and malignant lesions. About one-third of breast carcinomas are isoechoic on ultrasound. Isoechogenicity can also be seen in usual ductal hyperplasia, atypical ductal hyperplasia, papillary apocrine metaplasia, adenosis, debris/cellularity in fibrocystic and benign proliferative conditions, fibroadenoma, and papilloma. In the above patient, ultrasound-guided core biopsy confirmed fibroadenoma, benign, and concordant [27]."}, {"number": "21b", "stem": "The echogenicity of a lesion on ultrasound is determined relative to what structure in the breast?", "options": [{"letter": "A", "text": "Fat."}, {"letter": "B", "text": "Fibroglandular tissue."}, {"letter": "C", "text": "Surrounding tissue."}, {"letter": "D", "text": "Muscle."}], "images": ["assets/q21a_21b_21c_p291_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Fat. The echogenicity of a mass is assessed by its relationship to the echogenicity of fat in the breast [27]."}, {"number": "21c", "stem": "If a mass in the patient's fatty breast tissue was depicted on mammography but not detected on ultrasound, what is the next best step to assist in ultrasound visualization", "options": [{"letter": "A", "text": "Contrast-enhanced mammography."}, {"letter": "B", "text": "MRI."}, {"letter": "C", "text": "Tissue harmonic imaging."}, {"letter": "D", "text": "Widen the dynamic range on ultrasound."}], "images": ["assets/q21a_21b_21c_p291_01.jpg"], "explanationImages": ["assets/a21c_p303_01.jpg"], "answer": "C", "explanation": "c. Tissue harmonic imaging. When a lesion is seen on mammogram in the fatty tissues but not identified on standard ultrasound, it is likely an isoechoic lesion. Tissue harmonic imaging uses nonlinear sound propagation that allows the processing of only the returned high-frequency harmonic signals and rejects echoes from fundamental frequencies. This technique improves lesion conspicuity on ultrasound by increasing tissue contrast and lateral resolution. Widening the dynamic range on ultrasound is not the next best step because a wide range allows isoechoic lesions to persist and remain undetectable. Contrastenhanced mammography and MRI may be helpful but are not the next best step in evaluation [ 27]. Shown here is an example of the same finding with and without harmonics. No Harmonics Harmonics"}, {"number": "22a", "stem": "A 58-year-old woman who was called back from an abnormal screening mammogram. Diagnostic mammogram and ultrasound images are provided below. Which of the following pathologies can present as a circumscribed mass on imaging?", "options": [{"letter": "A", "text": "Mucinous carcinoma."}, {"letter": "B", "text": "Medullary carcinoma."}, {"letter": "C", "text": "Papillary carcinoma."}, {"letter": "D", "text": "Invasive ductal carcinoma not otherwise specified."}, {"letter": "E", "text": "All of the above. 286 S. H. Chung et al."}], "images": ["assets/q22a_22b_p292_01.jpg"], "explanationImages": [], "answer": "E", "explanation": "e. All of the above. The well-differentiated invasive ductal carcinomas including mucinous, medullary, and papillary, can have a relatively circumscribed appearance on imaging. Invasive ductal carcinoma not otherwise specified can also present as a circumscribed mass, but typically has a poorer prognosis. Other circumscribed cancers of the breast include triple-negative breast cancer adenoid cystic carcinoma and malignant phyllodes tumor [28]."}, {"number": "22b", "stem": "The circumscribed mass above was biopsied and showed a circumscribed carcinoma composed of poorly differentiated cells. If the tumor were to show rapid growth over time, which subtype of circumscribed ductal carcinomas would this most likely be?", "options": [{"letter": "A", "text": "Mucinous carcinoma."}, {"letter": "B", "text": "Medullary carcinoma."}, {"letter": "C", "text": "Papillary carcinoma."}, {"letter": "D", "text": "Invasive ductal carcinoma not otherwise specified."}, {"letter": "E", "text": "None of the above."}], "images": ["assets/q22a_22b_p292_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Medullary carcinoma. Medullary carcinoma accounts for less than 2% of breast cancers [28]. It occurs more frequently in younger women and is characterized by rapid growth, often manifesting clinically with a palpable mass. The other lesions described above grow slowly in comparison to medullary carcinoma [28]."}, {"number": "23a", "stem": "A 45-year-old female presents for screening mammography shown below, which showed a rapidly growing focal asymmetry in the right breast upper outer quadrant. Additional magnification views and ultrasound were performed, as shown below. Which of the following is false regarding hyperechoic breast masses?", "options": [{"letter": "A", "text": "An echogenic breast mass that is radiolucent on mammography is benign and does not need biopsy."}, {"letter": "B", "text": "Most hyperechoic breast masses are benign."}, {"letter": "C", "text": "Hyperechogenicity on ultrasound alone is enough to exclude malignancy."}, {"letter": "D", "text": "The differential for hyperechoic breast masses includes benign and malignant etiologies."}, {"letter": "E", "text": "None of the above. 288 S. H. Chung et al."}], "images": ["assets/q23a_23b_23c_23d_p293_01.jpg", "assets/q23a_23b_23c_23d_p294_01.jpg", "assets/q23a_23b_23c_23d_p294_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Hyperechogenicity on ultrasound alone is enough to exclude malignancy. Echogenic breast masses are defined as a lesion that is hyperechoic in comparison with subcutaneous fat at ultrasound, in accordance with the BI-RADS ultrasound lexicon. On ultrasound, up to 5.6% of breast masses are reported to be echogenic of which most are benign [29]. Both benign and malignant etiologies can be echogenic. If a hyperechoic mass correlates with a well-delineated radiolucent mass at mammography, it does not need biopsy. One large study found that of 1849 lesions that were malignant, 9 (0.5%) were hyperechoic [30]. Therefore, although the vast majority of echogenic breast masses are benign, hyperechogenicity at US alone does not exclude malignancy [29]."}, {"number": "23b", "stem": "Which of the following benign lesions can be hyperechogenic at ultrasound?", "options": [{"letter": "A", "text": "Lipoma."}, {"letter": "B", "text": "Hematoma."}, {"letter": "C", "text": "Silicone granuloma."}, {"letter": "D", "text": "Galactocele."}, {"letter": "E", "text": "Fat necrosis."}, {"letter": "F", "text": "All of the above."}], "images": ["assets/q23a_23b_23c_23d_p293_01.jpg", "assets/q23a_23b_23c_23d_p294_01.jpg", "assets/q23a_23b_23c_23d_p294_02.jpg"], "explanationImages": [], "answer": "F", "explanation": "f. All of the above. The differential for hyperechoic breast masses is extensive. Benign lesions that can be hyperechoic include: Lipoma, angiolipoma, hematoma, seroma, fat necrosis, silicone granuloma, sebaceous or epidermal inclusion cyst, abscess, pseudoangiomatous stromal hyperplasia (PASH), galactocele or lactating adenoma, ductal ectasia, and apocrine metaplasia [29]. Malignant lesions that can be hyperechoic on ultrasound include: Invasive ductal carcinoma, invasive lobular carcinoma, metastasis, lymphoma, and angiosarcoma [29]."}, {"number": "23c", "stem": "Based on the images above, what is the most likely diagnosis", "options": [{"letter": "A", "text": "PASH."}, {"letter": "B", "text": "Phyllodes tumor."}, {"letter": "C", "text": "Hamartoma."}, {"letter": "D", "text": "Fibroadenoma."}], "images": ["assets/q23a_23b_23c_23d_p293_01.jpg", "assets/q23a_23b_23c_23d_p294_01.jpg", "assets/q23a_23b_23c_23d_p294_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. PASH. Pseudoangiomatous stromal hyperplasia (PASH) is a benign breast mass of unknown etiology. It usually presents in pre-menopausal women or postmenopausal women on hormone therapy, and can rapidly grow in size. On ultrasound, it appears as a mixed or hypoechoic mass with ill-defined borders but can also be hyperechoic. Mammography will demonstrate an oval mass, sometimes with wellcircumscribed borders [3]. 298 S. H. Chung et al."}, {"number": "23d", "stem": "The patient underwent biopsy of the lesion, which demonstrated PASH. When performing your radiology-pathology correlation, in which situations would surgical excision be recommended?", "options": [{"letter": "A", "text": "All cases of PASH should be excised."}, {"letter": "B", "text": "PASH with atypia."}, {"letter": "C", "text": "Rapidly growing in size."}, {"letter": "D", "text": "Size greater than 5 cm."}, {"letter": "E", "text": "B and C."}], "images": ["assets/q23a_23b_23c_23d_p293_01.jpg", "assets/q23a_23b_23c_23d_p294_01.jpg", "assets/q23a_23b_23c_23d_p294_02.jpg"], "explanationImages": [], "answer": "E", "explanation": "e. B and C. A histological diagnosis of pseudoangiomatous stromal hyperplasia (PASH) is considered safe to manage conservatively with imaging follow-up. Because low-grade angiosarcoma can mimic PASH on biopsy, surgical excision is recommended in PASH with atypia and in cases of PASH with interval growth [3]."}];
    const APP_ID = "absolute-breast-imaging-review-pathology-quiz-ch7";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SEED_VERSION = 1;
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
