<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Breast Imaging Review BI-RADS Terminology Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Absolute Breast Imaging Review BI-RADS Terminology Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":1,"appId":"absolute-breast-imaging-review-birads-terminology-quiz-ch2",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "Match the following images with the following calcification morphology: vascular, popcorn, rim, rodlike. ab cd", "options": [{"letter": "A", "text": "A-rim; B-rod-like; C-v ascular; D-popcorn."}, {"letter": "B", "text": "A-vascular; B-rim; C-rod-like; D-popcorn."}, {"letter": "C", "text": "A-popcorn; B-rod-like; C-v ascular; D-rim."}, {"letter": "D", "text": "A-popcorn; B-vascular; C-rod-lik e; D-rim."}], "images": ["assets/q1_p047_01.jpg", "assets/q1_p047_02.jpg", "assets/q1_p047_03.jpg", "assets/q1_p047_04.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. A-popcorn; B-vascular; C-rod-like; D-rim. Popcorn calcifications are large, dense, and well-defined produced by involuting fibroadenomas. Vascular calcifications are linear calcifications that form parallel tracks, which are formed within the wall of the blood vessel. Large rod-like calcifications are benign calcifications that are formed within ectatic ducts, and are associated with plasma cell mastitis. They are thick and linear, and may be branching. As opposed to fine linear branching calcifications, they are usually >1 mm in diameter. Rim, or eggshell, calcifications are thin benign calcifications that conform to the shape of an oval or sphere, and contain central lucency. They are usually less than 1 mm in thickness, and are associated with fat necrosis, oil cysts, or simple cysts [2, 3]."}, {"number": "2", "stem": "Match the following images with the following calcification morphology: suture, coarse heterogeneous, round, dystrophic, amorphous. a b c d e", "options": [{"letter": "A", "text": "A-amorphous; B-dystrophic; C-round; D-coarse heterogeneous; E-suture."}, {"letter": "B", "text": "A-round; B-amorphous; C-dystrophic; D-suture; E-coarse heterogeneous."}, {"letter": "C", "text": "A-coarse heterogeneous; B-dystrophic; C-amorphous; D-suture; E-round."}, {"letter": "D", "text": "A-suture; B-round; C-coarse heterogeneous; D-dystrophic; E-amorphous."}], "images": ["assets/q2_p048_01.jpg", "assets/q2_p048_02.jpg", "assets/q2_p048_03.jpg", "assets/q2_p048_04.jpg", "assets/q2_p048_05.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. A-suture; B-round; C-coarse heterogeneous; D-dystrophic; E-amorphous. Suture calcifications are benign, smooth, linear, or curvilinear (often forming loops), which can be seen after breast surgery and radiation if suture material does not fully resorb, forming a nidus for calcification. Coarse heterogeneous calcifications are irregular, conspicuous microcalcifications that are usually 0.5-1 mm. Coarse heterogeneous calcifications can be benign or malignant. Round calcifications are typically benign calcifications formed in the acini of the terminal ductal lobular units, and include punctate calcifications but can also be >0.5 mm. Dystrophic calcifications are benign calcifications with an irregular, coarse, or \"lava-shaped\" appearance and typically >1 mm. They can be seen following trauma or radiation. Amorphous calcifications are small, powdery, indistinct or cloud-like calcifications, which do not conform to a distinct shape [2]."}, {"number": "3", "stem": "Match the following images with the following calcification distribution patterns: grouped, regional, segmental, diffuse, linear. ab c de", "options": [{"letter": "A", "text": "A-diffuse; B-linear; C-grouped; D-regional; E-segmental."}, {"letter": "B", "text": "A-diffuse; B-grouped; C-linear; D-segmental; E-regional."}, {"letter": "C", "text": "A-regional; B-segmental; C-linear; D-diffuse; E-grouped."}, {"letter": "D", "text": "A-regional; B-grouped; C-segmental; D-linear; E-diffuse."}], "images": ["assets/q3_p049_01.jpg", "assets/q3_p049_02.jpg", "assets/q3_p049_03.jpg", "assets/q3_p049_04.jpg", "assets/q3_p049_05.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. A-diffuse; B-grouped; C-linear; D-segmental; E-regional. Grouped distribution is defined as a cluster of at least 5 calcifications within 1 cm from each other, in an area at most 2 cm in greatest linear dimension. Segmental distribution is defined as corresponding to ducts and branches of a segment or lobe. Regional distribution is greater than 2 cm, can occupy greater than one quadrant, and do not correspond with the expected distribution of a ductal unit. Diffuse distribution is defined as scattered randomly throughout the breast. Linear distribution is suggestive of deposition along ducts, and similar to segmental distribution, however, less extensive [2]."}, {"number": "4", "stem": "A patient presents for a diagnostic mammogram for a finding seen on a screening mammogram, shown below. It is present on CC and MLO view. How should this finding be described according to the BI-RADS lexicon?", "options": [{"letter": "A", "text": "Asymmetry."}, {"letter": "B", "text": "Architectural distortion."}, {"letter": "C", "text": "Focal density."}, {"letter": "D", "text": "Geographic abnormality."}], "images": ["assets/q4_p050_01.jpg"], "explanationImages": ["assets/a4_p074_01.jpg"], "answer": "B", "explanation": "b. Architectural distortion. An asymmetry is a discrete area of fibroglandular density that is visible on only one mammographic projection. Architectural distortion is an area of parenchymal distortion (spiculations radiating from a point, focal retraction, or straightening at the edge of the parenchyma), which is not associated with a mass. Architectural distortions are suspicious findings in the absence of trauma or prior surgery. Focal density and geographic abnormality are not terms included in the BI-RADS atlas [2]."}, {"number": "5", "stem": "A patient underwent diagnostic evaluation for a mass seen on screening mammography. On diagnostic evaluation, the mass was assigned a BI-RADS category 4B. What is the likelihood of malignancy corresponding to BI-RADS category 4B?", "options": [{"letter": "A", "text": ">2% to ≤10%."}, {"letter": "B", "text": ">25% to <75%."}, {"letter": "C", "text": ">10% to ≤50%."}, {"letter": "D", "text": ">50% to <95%."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. >10% to ≤50%. A BI-RADS Category 4B corresponds with a moderate level of suspicion for malignancy and has a >10% to ≤50% likelihood of malignancy. BI-RADS Category 4A corresponds with a low level of suspicion for malignancy and has a >2% to ≤10% likelihood of malignancy. BI-RADS Category 4C corresponds with a high level of suspicion for malignancy and has a >50% to <95% likelihood of malignancy [2]."}, {"number": "6", "stem": "Identify the following mass shapes: ab c", "options": [{"letter": "A", "text": "A-irregular; B-oval; C-round."}, {"letter": "B", "text": "A-round; B-ovoid; C-oval."}, {"letter": "C", "text": "A-irregular; B-ovoid; C-round."}, {"letter": "D", "text": "A-irregular; B-round; C-ovoid."}], "images": ["assets/q6_p051_01.jpg", "assets/q6_p051_02.jpg", "assets/q6_p051_03.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. A-irregular; B-oval; C-round. The shape of mass A is irregular, which is a suspicious finding. The shape of mass B is oval. The shape of mass C is round. Ovoid is not a term used in the BI-RADS atlas [2, 4]."}, {"number": "7", "stem": "Match the following images with the following margin types: circumscribed, obscured, microlobulated, and indistinct. ab cd", "options": [{"letter": "A", "text": "A-circumscribed; B-obscured; C-indistinct; D-microlobulated."}, {"letter": "B", "text": "A-circumscribed; B-indistinct; C-microlobulated; D-obscured."}, {"letter": "C", "text": "A-circumscribed; B-indistinct; C-obscured; D-microlobulated."}, {"letter": "D", "text": "A-circumscribed; B-microlobulated; C-indistinct; D-obscured."}], "images": ["assets/q7_p052_01.jpg", "assets/q7_p052_02.jpg", "assets/q7_p052_03.jpg", "assets/q7_p052_04.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. A-circumscribed; B-indistinct; C-microlobulated; D-obscured. The margins of mass A are circumscribed, defined as more than 75% of the circumference being well defined. The margins of mass B are indistinct, defined as none of the circumference being well defined, which is usually a suspicious finding. The margins of mass C are microlobulated, defined as small undulations along the borders, which is usually a suspicious finding. The margins of mass D are obscured, defined as more than 25% of the circumference hidden by adjacent fibroglandular tissue [2]."}, {"number": "8", "stem": "A patient underwent diagnostic evaluation for a palpable mass, shown below. What is the echogenicity of the mass?", "options": [{"letter": "A", "text": "Hypoechoic."}, {"letter": "B", "text": "Hyperechoic."}, {"letter": "C", "text": "Isoechoic."}, {"letter": "D", "text": "Mixed hypoechoic/hyperechoic."}], "images": ["assets/q8_p053_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Hyperechoic. The mass shown is uniformly brighter than the subcutaneous fat, therefore it is hyperechoic [2, 4]."}, {"number": "9", "stem": "What are the margins of the finding seen on the ultrasound image below?", "options": [{"letter": "A", "text": "Circumscribed."}, {"letter": "B", "text": "Indistinct."}, {"letter": "C", "text": "Parallel."}, {"letter": "D", "text": "Spiculated."}], "images": ["assets/q9_p053_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Circumscribed. The finding has circumscribed margins, rather than indistinct or spiculated margins. Parallel is a term used to describe orientation, not margins. The finding is anechoic and circumscribed, consistent with a benign simple cyst [2, 4]."}, {"number": "10", "stem": "What are the margins of the mass seen on the ultrasound image below?", "options": [{"letter": "A", "text": "Circumscribed."}, {"letter": "B", "text": "Indistinct."}, {"letter": "C", "text": "Parallel."}, {"letter": "D", "text": "Spiculated."}], "images": ["assets/q10_p054_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Spiculated. The mass has a stellate appearance, consistent with a spiculated mass [2, 4]."}, {"number": "11a", "stem": "A 40-year-old woman presents for diagnostic work-up of new calcifications seen on baseline screening mammogram. Which is the appropriate term to describe this calcification pattern?", "options": [{"letter": "A", "text": "Fine pleomorphic."}, {"letter": "B", "text": "Milk of calcium."}, {"letter": "C", "text": "Rod like."}, {"letter": "D", "text": "Dystrophic."}], "images": ["assets/q11a_11b_11c_p054_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Fine pleomorphic. Fine pleomorphic calcifications vary in shape and size, and are more conspicuous than amorphous calcifications, with the appearance of \"shards of glass\" or \"crushed stone.\" Pleomorphic calcifications are suspicious for malignancy, but can also be seen with high risk lesions such as atypical ductal hyperplasia or benign etiologies such as fibrocystic change [2]."}, {"number": "11b", "stem": "What is the appropriate BI-RADS category for these calcifications?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}], "images": ["assets/q11a_11b_11c_p054_02.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. BI-RADS Category 4. BI-RADS 4 is the category for findings that are \"suspicious for malignancy\" (2-94% probability of malignancy). The calcifications are finepleomorphic and grouped, and therefore suspicious for malignancy. Biopsy is indicated for the findings [2]."}, {"number": "11c", "stem": "What is the most appropriate next step?", "options": [{"letter": "A", "text": "Return to annual screening mammogram."}, {"letter": "B", "text": "Follow-up in 6 months."}, {"letter": "C", "text": "Stereotactic biopsy."}, {"letter": "D", "text": "Refer to surgery for excisional biopsy."}], "images": ["assets/q11a_11b_11c_p054_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Stereotactic Biopsy. Return to annual screening mammogram and follow-up in 6 months would not be appropriate in this case because the calcifications are suspicious for malignancy. Stereotactic biopsy would be the appropriate next step for further work-up. Excisional biopsy is not indicated for initial tissue sampling, as the calcifications are well visualized on mammogram and can be targeted with stereotactic biopsy [2]."}, {"number": "12a", "stem": "A 55-year-old woman presents for her annual screening mammogram. What is the appropriate description for breast tissue density? [1]", "options": [{"letter": "A", "text": "Almost entirely fatty."}, {"letter": "B", "text": "Scattered areas of fibroglandular density."}, {"letter": "C", "text": "Heterogeneously dense."}, {"letter": "D", "text": "Extremely dense."}], "images": ["assets/q12a_p055_01.jpg"], "explanationImages": ["assets/a12a_p076_01.jpg", "assets/a12a_p076_02.jpg", "assets/a12a_p076_03.jpg", "assets/a12a_p076_04.jpg"], "answer": "B", "explanation": "b. Scattered areas of fibroglandular density. The mammogram demonstrates scattered areas of fibroglandular density. See below for examples of almost entirely fatty, heterogeneously dense, and extremely dense. Heterogeneously dense breasts may obscure small masses, and extremely dense breasts lower the sensitivity of mammography [3]. Scattered areas Heterogeneously Extremely Almost entirely fatty of fibroglandular dense dense density"}, {"number": "12b", "stem": "What is the most appropriate BI-RADS category for the calcifications seen on the screening mammogram?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}], "images": ["assets/q12b_13a_13b_p056_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. BI-RADS Category 2. The calcifications are diffuse, and are seen along the skin surface, consistent with benign dermal calcifications. Additional diagnostic imaging is not needed in this case, and so BI-RADS 2 is the appropriate category [2]."}, {"number": "13a", "stem": "A 50-year-old woman presents for diagnostic evaluation of calcifications detected on screening mammography. Which are the appropriate terms to describe the calcification morphology and distribution on the diagnostic mammogram below?", "options": [{"letter": "A", "text": "Fine linear branching, segmental."}, {"letter": "B", "text": "Popcorn, grouped."}, {"letter": "C", "text": "Large rod-like, linear."}, {"letter": "D", "text": "Ground glass, diffuse."}], "images": ["assets/q12b_13a_13b_p056_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Fine linear branching, segmental. Fine linear branching calcifications are thin (<0.5 mm), linear or curvilinear irregular calcifications associated with filling, or \"casting\" of a duct. Fine linear branching calcifications are suggestive of malignancy. Segmental distribution is defined as corresponding to ducts and branches of a segment or lobe. The calcifications are fine linear branching and segmental, and are suspicious for malignancy [2]. Ground glass is not a BI-RADS term."}, {"number": "13b", "stem": "What is the appropriate BI-RADS category for the above finding?", "options": [{"letter": "A", "text": "BI-RADS Category 2."}, {"letter": "B", "text": "BI-RADS Category 3."}, {"letter": "C", "text": "BI-RADS Category 4."}, {"letter": "D", "text": "BI-RADS Category 6."}], "images": ["assets/q12b_13a_13b_p056_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. BI-RADS Category 4. The calcifications are fine linear branching in a segmental distribution. Both the morphology and the distribution are suspicious for malignancy. Biopsy is indicated (BI-RADS 4) [2]."}, {"number": "14a", "stem": "A 58-year-old woman presents for diagnostic evaluation of a palpable mass in the right breast. The calcifications span over 3 cm. The distribution of these calcifications is best described as:", "options": [{"letter": "A", "text": "Grouped."}, {"letter": "B", "text": "Clumped."}, {"letter": "C", "text": "Regional."}, {"letter": "D", "text": "Extensive."}], "images": ["assets/q14a_p057_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Regional. These fine pleomorphic calcifications are best described as regional from the following choices. Regional distribution describes a large area of calcifications greater than 2 cm. Extensive is not part of the BI-RADS lexicon for calcification distribution. Clumped is an internal enhancement pattern used to describe non-mass enhancement in breast MRI [2]."}, {"number": "14b", "stem": "Breast ultrasound of the palpable mass was obtained, shown below. Which ultrasound descriptors best characterize this mass?", "options": [{"letter": "A", "text": "Circumscribed, posterior enhancement."}, {"letter": "B", "text": "Microlobulated, posterior enhancement."}, {"letter": "C", "text": "Indistinct, posterior shadowing."}, {"letter": "D", "text": "Angular, posterior shadowing."}], "images": ["assets/q14b_p058_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Indistinct, posterior shadowing. The margins of the mass are indistinct, and not clearly demarcated from the surrounding tissue. In addition, the mass is heterogeneous in echogenicity, with punctate calcifications, and posterior acoustic shadowing, all of which are suspicious features [2, 4]."}, {"number": "14c", "stem": "MRI was obtained for further evaluation, shown below. Which of the following best describes the finding and enhancement characteristics?", "options": [{"letter": "A", "text": "Irregular mass, homogenous enhancement."}, {"letter": "B", "text": "Spiculated mass, rim enhancement."}, {"letter": "C", "text": "Focal non-mass enhancement."}, {"letter": "D", "text": "Segmental non-mass enhancement."}], "images": ["assets/q14c_p058_02.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Segmental non-mass enhancement. The MRI demonstrates non-mass enhancement and does not meet criteria for a mass, as there are ill-defined and non-convex borders. Nonmass enhancement is also defined as having areas of intervening fat. The distribution of non-mass enhancement is best characterized as segmental, as it has a triangular or conical appearance with the apex directed toward the nipple, suggestive of ductal involvement. Focal distribution of nonmass enhancement is characterized to an area < 25% of a breast quadrant, and the image is more consistent with segmental distribution [2]."}, {"number": "15a", "stem": "A 42-year-old woman presents with a palpable mass in the left breast. Ultrasound evaluation of the mass was performed, shown below. Which ultrasound descriptors best characterize this mass?", "options": [{"letter": "A", "text": "Indistinct, complex cystic and solid, no posterior features."}, {"letter": "B", "text": "Spiculated, heterogenous, posterior shadowing."}, {"letter": "C", "text": "Circumscribed, anechoic, posterior enhancement."}, {"letter": "D", "text": "Microlobulated, hypoechoic, combined posterior enhancement, and shadowing."}], "images": ["assets/q15a_p059_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Microlobulated, hypoechoic, combined posterior enhancement, and shadowing. Although the shape of this mass is irregular, the margins of the mass would be considered microlobulated rather than spiculated. The mass is predominately hypoechoic, and there is combined posterior shadowing and enhancement. These features increase suspicion for malignancy. A circumscribed, anechoic mass with posterior enhancement would be consistent with a simple cyst. The margins of the mass can be outlined, and are therefore not indistinct [2, 4]."}, {"number": "15b", "stem": "MRI was performed for further evaluation, shown below. Axillary ultrasound showed enlarged lymph nodes. What is the appropriate BI-RADS category?", "options": [{"letter": "A", "text": "BI-RADS Category 2."}, {"letter": "B", "text": "BI-RADS Category 3."}, {"letter": "C", "text": "BI-RADS Category 5."}, {"letter": "D", "text": "BI-RADS Category 6."}], "images": ["assets/q15b_p059_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. BI-RADS Category 5. MRI demonstrates an enhancing irregular mass in the left breast, which makes this mass highly suspicious for malignancy [2]."}, {"number": "16", "stem": "A 45-year-old woman presents for diagnostic tomosynthesis for a palpable abnormality, which revealed a breast mass as shown below. Which of the following features increases suspicion for malignancy in this patient?", "options": [{"letter": "A", "text": "Spiculations."}, {"letter": "B", "text": "Nipple retraction."}, {"letter": "C", "text": "Calcifications."}, {"letter": "D", "text": "Skin thickening."}], "images": ["assets/q16_p060_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Spiculations. The mass demonstrates spiculated margins, or lines radiating from the mass. Spiculations implies a suspicious finding. Although nipple retraction can be associated with malignancy, there is no definite nipple retraction seen here. There are no definite calcifications seen here. The skin in this patient is normal in appearance [2]."}, {"number": "17a", "stem": "A 46-year-old woman presents for diagnostic evaluation for findings on her screening mammogram. Ultrasound evaluation was performed. Which ultrasound descriptors best characterize this mass?", "options": [{"letter": "A", "text": "Parallel, circumscribed."}, {"letter": "B", "text": "Not parallel, angular."}, {"letter": "C", "text": "Parallel, spiculated."}, {"letter": "D", "text": "Not parallel, indistinct."}], "images": ["assets/q17a_p061_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Not parallel, angular. The mass is taller than wide, and is not parallel. The mass has sharp angular margins. These findings are suspicious for malignancy. Parallel masses are wider than tall. Spiculated margins are characterized as having sharp lines that radiate from the mass. Indistinct margins are characterized by having a poorly defined margin which is not clearly demarcated from the surrounding tissue [2, 4]."}, {"number": "17b", "stem": "MRI was obtained for further evaluation, shown below. Which of the following best describes the finding and enhancement characteristics in the right breast?", "options": [{"letter": "A", "text": "Round circumscribed mass with rim enhancement."}, {"letter": "B", "text": "Focal non-mass enhancement."}, {"letter": "C", "text": "Irregular mass with homogeneous enhancement."}, {"letter": "D", "text": "Linear non-mass enhancement."}], "images": ["assets/q17b_p061_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Irregular mass with homogeneous enhancement. The mass in the right breast has irregular margins, and uniform homogeneous internal enhancement. The mass in the right breast is not round and circumscribed. The finding in the right breast would not be considered non-mass enhancement, as it is a space occupying lesion with convex borders [2]."}, {"number": "18a", "stem": "A 27-year-old woman presents for diagnostic evaluation of a palpable abnormality in the right breast. Ultrasound was performed, shown below. Which of the following best characterizes this finding?", "options": [{"letter": "A", "text": "Clustered microcysts."}, {"letter": "B", "text": "Arteriovenous malformation."}, {"letter": "C", "text": "Microlobulated mass."}, {"letter": "D", "text": "Complex cystic and solid mass."}], "images": ["assets/q18a_18b_p062_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Complex cystic and solid mass. The mass has both solid and cystic components, as well as internal vascularity. The margins of this mass are relatively smooth and circumscribed, rather than microlobulated. Clustered microcysts are more cystic than solid, with thin avascular septations. An arteriovenous malformation may have the appearance of a cystic and solid mass on grayscale ultrasound imaging, however, the cystic appearing components would have vascular flow, which is not seen here [2-4]."}, {"number": "18b", "stem": "What is the appropriate BI-RADS category?", "options": [{"letter": "A", "text": "BI-RADS Category 1."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}], "images": ["assets/q18a_18b_p062_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. BI-RADS Category 4. Complex cystic and solid masses are suspicious for malignancy [2]."}, {"number": "19", "stem": "A 51-year-old female presents with a palpable abnormality in the superior aspect of the right breast, indicated by the arrow. Mammogram and ultrasound were performed, shown below. What is the appropriate BI-RADS category?", "options": [{"letter": "A", "text": "BI-RADS Category 2."}, {"letter": "B", "text": "BI-RADS Category 3."}, {"letter": "C", "text": "BI-RADS Category 4a."}, {"letter": "D", "text": "BI-RADS Category 4c."}], "images": ["assets/q19_p063_01.jpg", "assets/q19_p063_02.jpg"], "explanationImages": ["assets/a19_p078_01.jpg", "assets/a19_p078_02.jpg"], "answer": "A", "explanation": "a. BI-RADS Category 2. BI-RADS 2 is the category for benign findings. The finding is a circumscribed, isoechoic mass on ultrasound, which corresponds to a fat containing circumscribed mass on mammogram. The finding is most consistent with a lipoma, which is a benign finding [2]."}, {"number": "20", "stem": "A 60-year-old woman presents for breast MRI for further evaluation of calcifications seen on mammography. Which of the following best describes the finding and enhancement characteristics in the left breast?", "options": [{"letter": "A", "text": "Irregular mass with dark internal septations."}, {"letter": "B", "text": "Regional clumped non-mass enhancement."}, {"letter": "C", "text": "Round mass with heterogenous enhancement."}, {"letter": "D", "text": "Focal non-mass enhancement."}], "images": ["assets/q20_p064_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Regional clumped non-mass enhancement. The finding does not meet criteria for a mass; it is not a space occupying lesion, there are no clear margins, and there are areas of intervening fat. Therefore, it is consistent with non-mass enhancement. Dark internal septations are typically benign and can be seen with fibroadenomas, but the appearance here is more consistent with areas of intervening fat. This finding is most consistent with non-mass enhancement, with a regional distribution. Regional distribution does not conform to a ductal or segmental pattern, but is larger than a focal distribution which is defined as <25% of a quadrant. Clumped non-mass enhancement describes enhancement of varying shapes with some confluent areas, as seen here. Clumped non-mass enhancement is a suspicious finding [2]."}, {"number": "21", "stem": "A 36-year-old woman presents with a palpable mass in the breast. Ultrasound evaluation was performed, shown below. What is the appropriate BI-RADS category for this finding?", "options": [{"letter": "A", "text": "BI-RADS Category 2."}, {"letter": "B", "text": "BI-RADS Category 3."}, {"letter": "C", "text": "BI-RADS Category 4."}, {"letter": "D", "text": "BI-RADS Category 5."}], "images": ["assets/q21_p064_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. BI-RADS Category 2. BI-RADS 2 is the category for benign findings. The ultrasound demonstrates a normal appearing lymph node, with a normal reniform appearance, normal echogenic fatty hilum with normal hilar vascular flow, and normal cortical thickness < 3 mm. Therefore, this is a benign finding [ 2]."}, {"number": "22a", "stem": "A patient presents for diagnostic evaluation for calcifications seen on a screening mammogram. Diagnostic mammogram (CC and ML views) and ultrasound correlate are shown below. Which of the following best describes the calcifications seen on mammogram? CC ML", "options": [{"letter": "A", "text": "Fine linear branching."}, {"letter": "B", "text": "Milk of calcium."}, {"letter": "C", "text": "Rod like."}, {"letter": "D", "text": "Dystrophic."}], "images": ["assets/q22a_p065_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. Milk of calcium. Milk of calcium calcifications are benign calcification deposits within cysts. They often appear round, amorphous, or \"smudged\" on CC views, and crescent or \"tea-cup\" shaped on ML views, as they conform to the shape of cysts with positional changes. The calcifications are crescent shaped on ML view, and are associated with clustered microcysts, therefore consistent with milk of calcium [2]."}, {"number": "22b", "stem": "Which of the following best describes the findings on ultrasound?", "options": [{"letter": "A", "text": "Clustered microcysts."}, {"letter": "B", "text": "Anechoic simple cyst."}, {"letter": "C", "text": "Indistinct hypoechoic mass."}, {"letter": "D", "text": "Spiculated heterogenous mass."}], "images": ["assets/q22b_22c_p065_02.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. Clustered microcysts. Clustered microcysts are clustered anechoic cystic masses, individually <2-3 mm, with thin intervening septations and no discrete solid component. The mass in the image is an example of clustered microcysts, and is also noted to contain punctate echogenic foci which represent calcifications, also seen on mammography [2]."}, {"number": "22c", "stem": "What is the most appropriate BI-RADS category for this finding?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 3."}, {"letter": "C", "text": "BI-RADS Category 5."}, {"letter": "D", "text": "BI-RADS Category 6."}], "images": ["assets/q22b_22c_p065_02.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. BI-RADS Category 3. Clustered microcysts are typically associated with benign findings including fibrocystic change and apocrine metaplasia. They are often assessed as benign (Category 2), or probably benign (Category 3) if new or if there is diagnostic uncertainty [ 2]. If new, especially in a postmenopausal woman, the margins and associated calcifications should be carefully assessed [ 5]."}, {"number": "23", "stem": "A patient underwent CT chest following a motor vehicle collision, and a mass was found in the right breast, shown on coronal projections below. The patient has a large amount of bruising in the area of the mass seen on ultrasound. A follow-up ultrasound was obtained, shown below. What is the appropriate BI-RADS category for this finding?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}], "images": ["assets/q23_p066_01.jpg"], "explanationImages": ["assets/a23_p080_01.jpg"], "answer": "B", "explanation": "b. BI-RADS Category 2. On CT, a mildly hyperattenuating mass is seen. This corresponds to a circumscribed mass with lace-like internal echogenicity on the ultrasound. The cyst is avascular, and internal echoes are in a pattern characteristic of a hematoma. Given the history of trauma and bruising, this mass represents a hematoma. Further imaging is not required for diagnostic evaluation. Hematomas are benign and usually selfresolving, and so BI-RADS 2 is the appropriate category [2]."}, {"number": "24", "stem": "A patient presents for breast MRI for further evaluation of a biopsyproven malignancy in the left breast, shown below. What is the appropriate BI-RADS category for the MRI of the known malignancy shown?", "options": [{"letter": "A", "text": "BI-RADS Category 3."}, {"letter": "B", "text": "BI-RADS Category 4."}, {"letter": "C", "text": "BI-RADS Category 5."}, {"letter": "D", "text": "BI-RADS Category 6."}], "images": ["assets/q24_p067_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. BI-RADS Category 6. BI-RADS 6 is the category for biopsy-proven malignancy, described in the question stem [2]."}, {"number": "25a", "stem": "A 73-year-old woman presents with a palpable abnormality in the left breast, ultrasound is shown below. Which of the following ultrasound features is demonstrated?", "options": [{"letter": "A", "text": "Oval shape."}, {"letter": "B", "text": "Posterior acoustic enhancement."}, {"letter": "C", "text": "Indistinct margins."}, {"letter": "D", "text": "Spiculated margins."}], "images": ["assets/q25a_25b_p067_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Indistinct margins. The mass is round. This mass demonstrates posterior acoustic shadowing, rather than enhancement. Posterior acoustic enhancement can be seen classically with simple cysts. The margins of the mass are indistinct, and demonstrates an echogenic rim or echogenic halo (a white band surrounding the mass). These findings raise suspicion for malignancy. Although these margins are indistinct, there are not clear spiculations arising from the mass [2, 4]."}, {"number": "25b", "stem": "What is the appropriate BI-RADS category for this finding?", "options": [{"letter": "A", "text": "BI-RADS Category 2."}, {"letter": "B", "text": "BI-RADS Category 3."}, {"letter": "C", "text": "BI-RADS Category 4."}, {"letter": "D", "text": "BI-RADS Category 6."}], "images": ["assets/q25a_25b_p067_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. BI-RADS Category 4. BI-RADS 4 is the category for findings that are \"suspicious for malignancy.\" This mass has suspicious features including, round shape, not parallel orientation, indistinct margins with an echogenic rim, posterior shadowing, and internal vascularity. Therefore, it is categorized as a BI-RADS 4 lesion [2]."}, {"number": "26", "stem": "What is one of the advantages of utilizing screening tomosynthesis over screening mammography?", "options": [{"letter": "A", "text": "Screening tomosynthesis can help differentiate cysts from masses."}, {"letter": "B", "text": "Screening tomosynthesis has a higher sensitivity in detecting calcifications."}, {"letter": "C", "text": "Screening tomosynthesis can help differentiate true asymmetries from superimposition of normal breast tissue."}, {"letter": "D", "text": "Screening tomosynthesis can replace the need for further diagnostic workup of calcifications due to improved visualization."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. An asymmetry may represent a true abnormality obscured by isodense fibroglandular tissue, or it may represent superimposition of normal breast tissue. Tomosynthesis slices can help to differentiate overlapping normal breast tissue [6]. a. Although breast tomosynthesis can help delineate mass margins due to removal of superimposed breast tissue, tomosynthesis cannot definitively distinguish masses from cysts. Even masses with circumscribed margins should not be assumed to be benign (unless multiple and bilateral), and still require further evaluation with ultrasound [6]. b. Early studies evaluating the performance of breast tomosynthesis have demonstrated no statistically significant difference in detection of calcifications [6]. d. Calcifications may appear enhanced on tomosynthesis synthetic images, which are designed to preserve high-attenuating voxels. Synthesized images may also contain artifacts which may be mistaken for calcifications. Conversely, calcifications may appear less defined due to the arc pathway of the X-ray tube causing slight blurring of microcalcifications [6]."}, {"number": "27a", "stem": "A 55-year-old woman was recalled for further evaluation of calcifications seen on a screening mammogram (indicated by the arrow on tomosynthesis slice 1/50). Based on the diagnostic mammogram images provided, what is the most appropriate BI-RADS category for the calcifications?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}], "images": ["assets/q27a_27b_p069_01.jpg", "assets/q27a_27b_p069_02.jpg", "assets/q27a_27b_p069_03.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. BI-RADS Category 2. These calcifications appear slightly heterogeneous on the CC and ML magnification views however they are visualized on the first tomosynthesis slice as demonstrated on the tomosynthesis scroll bar therefore they are dermal calcifications. Dermal calcifications are benign and no further evaluation if required. Additional diagnostic imaging is not needed in this case, and so BI-RADS 2 is the appropriate category [2]."}, {"number": "27b", "stem": "What is the most appropriate next step?", "options": [{"letter": "A", "text": "Follow-up in 6 months."}, {"letter": "B", "text": "Stereotactic biopsy."}, {"letter": "C", "text": "Refer to surgery for excisional biopsy."}, {"letter": "D", "text": "Return to routine screening mammogram."}], "images": ["assets/q27a_27b_p069_01.jpg", "assets/q27a_27b_p069_02.jpg", "assets/q27a_27b_p069_03.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. Return to routine screening mammogram. Dermal calcifications are benign, so return to screening mammogram is the appropriate course. Follow-up in 6 months and biopsy are not indicated for benign calcifications [2]."}, {"number": "28", "stem": "Which of the following scenarios should N OT receive BI-RADS assessment category 3?", "options": [{"letter": "A", "text": "Solitary group of punctate calcifications on mammography."}, {"letter": "B", "text": "Indeterminate finding."}, {"letter": "C", "text": "A finding with greater than 0% but ≤2% likelihood of malignancy."}, {"letter": "D", "text": "Oval circumscribed mass with parallel orientation."}, {"letter": "E", "text": "A complicated cyst."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. Indeterminate finding. The BI-RADS atlas specifically states that BI-RADS Category 3 should not be used for indeterminate findings, such as findings where the radiologist cannot decide between BI-RADS Category 2 and BI-RADS Category 4. BI-RADS Category 3 is reserved for specific situations where the likelihood of malignancy is 0-2%, such as a solitary group of punctate calcifications on mammography or an oval circumscribed mass with parallel orientation seen on ultrasound. BI-RADS Category 2 or 3 is appropriate for a complicated cyst seen ultrasound [ 2]."}, {"number": "29", "stem": "What is the recommended length of follow-up for a finding receiving BI-RADS assessment category 3?", "options": [{"letter": "A", "text": "Until the finding decreases in size."}, {"letter": "B", "text": "1-2 years of stability."}, {"letter": "C", "text": "2-3 years of stability or until any time that the radiologist deems it benign."}, {"letter": "D", "text": "2-4 years of stability or until the finding increases in size."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. 2-3 years of stability or until any time that the radiologist deems it benign. The BI-RADS atlas recommends 2-3 years of imaging follow-up for a probably benign finding that has received BI-RADS Category 3. The followup interval is usually every 6 months for the first year, and then can continue every 6 months or be extended to annual follow-up. If, at any time, the interpreting radiologist determines the finding has 0% likelihood of malignancy, the assessment can be changed to BI-RADS Category 2 [2]."}, {"number": "30", "stem": "A screening mammogram is negative for malignancy, however, there is a suggestion of implant rupture and MRI is recommended. What is the appropriate BI-RADS assessment category for the screening mammogram?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. BI-RADS Category 2. The BI-RADS assessment category is intended to describe the likelihood of malignancy. If there is concern for implant rupture but there is no mammographic evidence of malignancy, the correct assessment is BIRADS Category 2, because implant rupture is a benign finding. The interpreting radiologist can then add a sentence recommending MRI to further evaluate the implant [2]."}, {"number": "31", "stem": "You are interpreting a breast MRI for a patient with a known malignancy in the right breast, confirmed by recent ultrasound-guided biopsy. In addition to the known malignancy, the breast MRI demonstrates a suspicious mass in the left breast. What is the final overall BI-RADS assessment category?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}, {"letter": "E", "text": "BI-RADS Category 6."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "d. BI-RADS Category 4. The final BI-RADS assessment category should be determined based on the most actionable item according to the following hierarchy, from lowest to highest: 1, 2, 3, 6, 0, 4, 5. The newly seen suspicious mass in the left breast (BI-RADS Category 4) is the most actionable finding and requires biopsy, and therefore the final overall BI-RADS assessment Category is 4. The known malignancy in the right breast (BI-RADS assessment Category 6) has already been confirmed and is known by the referring physician [2]."}, {"number": "32", "stem": "A patient with known malignancy undergoes MRI following neoadjuvant chemotherapy. The mass seen on the MRI before chemotherapy has now resolved and the MRI does not demonstrate any suspicious mass or area of abnormal enhancement. What is the most appropriate BI-RADS assessment category?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 1."}, {"letter": "C", "text": "BI-RADS Category 2."}, {"letter": "D", "text": "BI-RADS Category 3."}, {"letter": "E", "text": "BI-RADS Category 4."}, {"letter": "F", "text": "BI-RADS Category 6."}], "images": [], "explanationImages": [], "answer": "F", "explanation": "f. BI-RADS Category 6. Even though there is no imaging abnormality on the MRI, the final assessment category should be BI-RADS 6. This situation is an exception to the central BI-RADS principle which states that the final assessment category should be assigned based on the imaging findings. Current practice dictates that even patients with a complete imaging response to therapy proceed with surgery. Therefore, it could cause confusion to the treatment team to provide a final assessment of negative or benign [2]."}, {"number": "33", "stem": "Which of the following terms is used to describe a discrete area of fibroglandular density that is visible on only one mammographic projection?", "options": [{"letter": "A", "text": "Asymmetry."}, {"letter": "B", "text": "Focal asymmetry."}, {"letter": "C", "text": "Mass."}, {"letter": "D", "text": "Architectural distortion."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "a. Asymmetry. An asymmetry is a discrete area of fibroglandular density that is visible on only one mammographic projection [2]."}, {"number": "34", "stem": "Two years ago, a 43-year-old woman underwent diagnostic work-up of an asymmetry seen on prior screening examination, and the finding was determined to be superimposition of normal fibroglandular tissue. She presents again today for screening mammogram. The asymmetry is seen again, and is now larger and more conspicuous than on prior examination. What is the most appropriate BI-RADS category for today's screening examination?", "options": [{"letter": "A", "text": "BI-RADS Category 0."}, {"letter": "B", "text": "BI-RADS Category 2."}, {"letter": "C", "text": "BI-RADS Category 3."}, {"letter": "D", "text": "BI-RADS Category 4."}], "images": ["assets/q34_p071_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. BI-RADS Category 0. BI-RADS Category 0 is the category for imaging that is incomplete or requires additional diagnostic imaging. Although an asymmetry most often reflect summation of normal fibroglandular tissue, when an asymmetry appears larger or more conspicuous than on previous examinations, the likelihood of malignancy is significantly increased. Such finding have been termed \"developing asymmetry.\" Developing asymmetry on screening examination should be worked up further with diagnostic imaging, and so BI-RADS Category 0 is the most appropriate choice [2]."}, {"number": "35", "stem": "A woman presents for her screening mammogram in 2017 which was assigned BI-RADS 1, shown below. She presented 3 years later for screening mammogram, shown below. Which of the following best describes the finding? 2017 2020", "options": [{"letter": "A", "text": "Asymmetry."}, {"letter": "B", "text": "Global asymmetry."}, {"letter": "C", "text": "Developing asymmetry."}, {"letter": "D", "text": "Focal asymmetry."}], "images": ["assets/q35_p072_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. Developing asymmetry. An asymmetry is a term to describe a discrete unilateral fibroglandular density which is seen in one or more projections, and that does not meet criteria for a mass. Asymmetries are further subdivided into the following categories: asymmetry, focal asymmetry, global asymmetry, and developing asymmetry. An asymmetry is seen in only one mammographic projection. A focal asymmetry is seen in two mammographic projections. A global asymmetry is visible in two mammographic projections and involves more than one quadrant. A developing asymmetry is a focal asymmetry that is enlarging or more conspicuous than on prior examinations. The case is an example of a developing asymmetry in the lower inner quadrant of the right breast [2, 3]."}];
    const APP_ID = "absolute-breast-imaging-review-birads-terminology-quiz-ch2";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SEED_VERSION = 1;
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
