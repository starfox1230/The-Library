<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISC Chapter 6: Administrative Regulations, Responsibilities, and Training Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Pediatric Gastrointestinal Tract Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":2,"appId":"risc-2026-administrative-regulations-quiz-ch6",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "Which agency licenses and inspects medical possession and use of byproduct material in a non-Agreement State?", "options": [{"letter": "A", "text": "Food and Drug Administration"}, {"letter": "B", "text": "Nuclear Regulatory Commission"}, {"letter": "C", "text": "Department of Transportation"}, {"letter": "D", "text": "Environmental Protection Agency"}], "answer": "B", "explanation": "The NRC regulates possession and medical use of byproduct material in non-Agreement States through licensing, inspection, and enforcement. The FDA regulates products and manufacturing practices, while the DOT regulates transportation.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "2", "stem": "What is the principal regulatory role of an Agreement State?", "options": [{"letter": "A", "text": "It approves radioactive drugs and devices for interstate marketing after evaluating safety and clinical effectiveness"}, {"letter": "B", "text": "It certifies every Type B shipping package used nationally"}, {"letter": "C", "text": "It assumes specified NRC authority to license and regulate byproduct material within the state"}, {"letter": "D", "text": "It replaces all federal radiation regulations with voluntary guidance"}], "answer": "C", "explanation": "Under an agreement authorized by the Atomic Energy Act, a state assumes portions of the NRC's regulatory authority. Its program remains subject to NRC review for adequacy and compatibility.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "3", "stem": "What does the NRC evaluate through the Integrated Materials Performance Evaluation Program?", "options": [{"letter": "A", "text": "Whether radiopharmaceuticals used in Agreement States remain clinically effective for every approved indication"}, {"letter": "B", "text": "Whether a carrier charged the correct shipping rate"}, {"letter": "C", "text": "Whether a hospital's diagnostic images meet accreditation standards"}, {"letter": "D", "text": "Whether Agreement State radiation-control programs remain adequate and compatible"}], "answer": "D", "explanation": "IMPEP is the NRC's framework for periodically evaluating Agreement State and NRC materials programs for public-health protection and regulatory compatibility. It is not a drug-approval or image-quality program.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "4", "stem": "An associate radiation safety officer is appointed to manage selected tasks. Which responsibility remains with the radiation safety officer?", "options": [{"letter": "A", "text": "Implementing the radiation protection program"}, {"letter": "B", "text": "Performing every daily area survey personally"}, {"letter": "C", "text": "Preparing every patient dose personally"}, {"letter": "D", "text": "Signing every package receipt"}], "answer": "A", "explanation": "The RSO may assign specific duties to an ARSO in writing, but cannot delegate the authority or responsibility for implementing the radiation protection program. Routine tasks may be performed by appropriately trained personnel.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "5", "stem": "Which authority must management provide to the radiation safety officer?", "options": [{"letter": "A", "text": "Authority to approve new radiopharmaceuticals for commercial marketing without separate FDA review"}, {"letter": "B", "text": "Authority to identify problems, initiate corrective action, stop unsafe operations, and verify correction"}, {"letter": "C", "text": "Authority to waive occupational dose limits whenever an authorized user documents clinical necessity"}, {"letter": "D", "text": "Authority to replace the NRC during an inspection"}], "answer": "B", "explanation": "The RSO needs organizational freedom, resources, and authority to identify safety problems, act on them, stop unsafe work, and verify corrective actions. The RSO cannot waive regulations or assume another agency's role.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "6", "stem": "Which individual meets the basic definition of an authorized user?", "options": [{"letter": "A", "text": "Any nuclear medicine technologist who has completed annual safety training and works under general supervision"}, {"letter": "B", "text": "Any pharmacist employed by the hospital"}, {"letter": "C", "text": "A physician, dentist, or podiatrist named on the license for specified medical uses"}, {"letter": "D", "text": "The administrator who signs the radioactive-materials license"}], "answer": "C", "explanation": "An authorized user is a qualified physician, dentist, or podiatrist identified for specified medical uses under the license. Supervised staff may perform delegated tasks but do not thereby become authorized users.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "7", "stem": "Which task may an authorized user or authorized nuclear pharmacist delegate?", "options": [{"letter": "A", "text": "Final responsibility for ensuring that all delegated work complies with the radioactive-materials license"}, {"letter": "B", "text": "Authority to approve a new authorized user without required qualifications"}, {"letter": "C", "text": "Authority to alter an NRC dose limit"}, {"letter": "D", "text": "A specific medical-use or preparation task to a properly instructed and supervised individual"}], "answer": "D", "explanation": "AUs and ANPs may delegate defined tasks when the individual is properly trained and supervised. Delegation of a task does not transfer the authorized individual's regulatory responsibility.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "8", "stem": "Which individual must be named on a license authorizing a gamma stereotactic radiosurgery unit?", "options": [{"letter": "A", "text": "Authorized medical physicist"}, {"letter": "B", "text": "Authorized nuclear pharmacist"}, {"letter": "C", "text": "Radiologic technologist"}, {"letter": "D", "text": "Department of Transportation safety officer"}], "answer": "A", "explanation": "An authorized medical physicist is required for specified device-based uses, including gamma stereotactic radiosurgery, teletherapy, photon-emitting remote afterloaders, and strontium-90 ophthalmic applicators. An authorized nuclear pharmacist prepares radioactive drugs, while an authorized user directs medical administration; neither title automatically substitutes for the AMP role.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "9", "stem": "When is a radiation safety committee required?", "options": [{"letter": "A", "text": "Whenever a facility employs more than two technologists"}, {"letter": "B", "text": "When the license authorizes two or more different types of byproduct-material use"}, {"letter": "C", "text": "Only after a reportable medical event demonstrates that the existing radiation-safety program was inadequate"}, {"letter": "D", "text": "Only for a Type C broad-scope license"}], "answer": "B", "explanation": "A licensee authorized for two or more different types of medical use must have an RSC to oversee the licensed uses. Staffing count and prior events do not determine the requirement.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "10", "stem": "Which person is required on a radiation safety committee?", "options": [{"letter": "A", "text": "A representative from the Department of Transportation"}, {"letter": "B", "text": "Every technologist, nurse, and pharmacist who handles radioactive material anywhere in the institution"}, {"letter": "C", "text": "A management representative who is neither an authorized user nor the radiation safety officer"}, {"letter": "D", "text": "The facility's malpractice insurer"}], "answer": "C", "explanation": "Required membership includes the RSO, an AU for each type of permitted use, a nursing representative, and a management representative who is neither an AU nor the RSO. Other members may be added as appropriate.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "11", "stem": "Which broad-scope license is most typical of a large academic medical center with diverse uses and an RSC?", "options": [{"letter": "A", "text": "Type B"}, {"letter": "B", "text": "Type C"}, {"letter": "C", "text": "Master Materials License"}, {"letter": "D", "text": "Type A"}], "answer": "D", "explanation": "Type A is the broadest broad-scope license and is typical of large academic programs. Type B programs are smaller and less diverse, while Type C programs use smaller quantities and are common in small research or nuclear cardiology settings.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "12", "stem": "Which description best fits a Type C broad-scope license?", "options": [{"letter": "A", "text": "A small program needing flexibility to possess varied materials in limited quantities"}, {"letter": "B", "text": "A large academic program with the broadest range of medical uses"}, {"letter": "C", "text": "A federal organization operating multiple medical and industrial sites under a single NRC oversight structure"}, {"letter": "D", "text": "A commercial carrier transporting Type B packages"}], "answer": "A", "explanation": "Type C broad-scope licenses provide flexibility for smaller programs that do not require large quantities, such as some nuclear cardiology clinics and small research laboratories. Type A is the largest and most diverse broad-scope category, and a Master Materials License applies to a federal organization operating multiple sites.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "13", "stem": "What is a Master Materials License?", "options": [{"letter": "A", "text": "A state license limited to one private nuclear pharmacy"}, {"letter": "B", "text": "An NRC license allowing a federal organization to oversee byproduct-material use at multiple sites"}, {"letter": "C", "text": "An FDA authorization allowing one manufacturer to market all of its radiopharmaceuticals at multiple federal sites"}, {"letter": "D", "text": "A shipping certificate valid for every Type A package"}], "answer": "B", "explanation": "An MML lets a federal organization administer permits, inspections, and enforcement for multiple sites under its jurisdiction, while the NRC retains oversight and inspects the MML program at least every 2 years. It is a regulatory structure, not FDA approval of a manufacturer's products or a state broad-scope license.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "14", "stem": "What is a written directive?", "options": [{"letter": "A", "text": "A technologist's note that a diagnostic study was completed"}, {"letter": "B", "text": "A carrier's record of a package transport index"}, {"letter": "C", "text": "An authorized user's written order for a specified administration to a patient or research subject"}, {"letter": "D", "text": "An annual management statement defining the facility's ALARA goals, investigational levels, and audit schedule"}], "answer": "C", "explanation": "A written directive is the authorized user's written order for administration of byproduct material or radiation from byproduct material to a specific patient or human research subject. It is distinct from routine charting and shipping documentation.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "15", "stem": "Which use of unsealed byproduct material ordinarily does not require a written directive?", "options": [{"letter": "A", "text": "Oral administration of iodine-131 above 30 microcuries"}, {"letter": "B", "text": "Parenteral administration of an alpha-emitting therapeutic drug"}, {"letter": "C", "text": "Administration of a therapeutic activity that requires a written directive"}, {"letter": "D", "text": "An uptake, dilution, or excretion study using an appropriately prepared radioactive drug"}], "answer": "D", "explanation": "Uptake, dilution, and excretion studies ordinarily do not require a written directive. Therapeutic unsealed-material uses and oral iodine-131 above the specified activity do require one.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "16", "stem": "What training is required for an authorized user performing uptake, dilution, and excretion studies under the described pathway?", "options": [{"letter": "A", "text": "60 hours total, including at least 8 hours of classroom and laboratory training"}, {"letter": "B", "text": "80 hours total, all of which must be classroom training"}, {"letter": "C", "text": "700 hours total, including at least 200 classroom hours"}, {"letter": "D", "text": "Only the facility's annual in-service training"}], "answer": "A", "explanation": "The uptake, dilution, and excretion pathway requires 60 hours of training and experience, including at least 8 classroom and laboratory hours, plus supervised work experience, examination, and attestation requirements. The much larger 700-hour pathways apply to imaging/localization or therapeutic written-directive uses.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "17", "stem": "What training is required for the imaging and localization authorized-user pathway?", "options": [{"letter": "A", "text": "60 hours total, including 8 classroom hours"}, {"letter": "B", "text": "700 hours total, including at least 80 hours of classroom and laboratory training"}, {"letter": "C", "text": "700 hours total, including 200 classroom hours"}, {"letter": "D", "text": "80 hours total with no supervised work experience"}], "answer": "B", "explanation": "Imaging and localization require 700 hours of training and experience with at least 80 classroom and laboratory hours. The 200-classroom-hour requirement applies to the broader therapeutic written-directive pathway.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "18", "stem": "Which training requirement applies to use of unsealed byproduct material that requires a written directive?", "options": [{"letter": "A", "text": "700 hours of training and experience, including 80 classroom hours"}, {"letter": "B", "text": "60 hours of training and experience, including 8 classroom hours"}, {"letter": "C", "text": "700 hours of training and experience, including 200 classroom hours"}, {"letter": "D", "text": "Annual safety instruction only"}], "answer": "C", "explanation": "The therapeutic written-directive pathway requires 700 hours, including 200 classroom hours, along with appropriate residency or board pathways, supervised experience, examination, and attestation. Imaging and localization also require 700 total hours but only 80 classroom and laboratory hours, which is the key distinction.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "19", "stem": "For an authorized user seeking approval for a therapeutic administration category, how much case experience is required under the described alternate pathway?", "options": [{"letter": "A", "text": "At least 1 case in any category"}, {"letter": "B", "text": "At least 10 cases total"}, {"letter": "C", "text": "No case experience if an attestation is signed"}, {"letter": "D", "text": "At least 3 cases in each requested category"}], "answer": "D", "explanation": "The individual must have supervised experience with at least three cases in each requested administration category. Written attestation complements rather than replaces the required case experience.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "20", "stem": "A 42-year-old patient is scheduled for therapeutic iodine-131 and has no history of hysterectomy or bilateral tubal ligation. What must be documented?", "options": [{"letter": "A", "text": "A negative serum beta-hCG result obtained within 1 week before therapy"}, {"letter": " l's dose could exceed 100 mrem (1 mSv)"}], "answer": "D", "explanation": "Written ALARA instructions are required if dose to another person could exceed 100 mrem. The 500-mrem value is the upper release criterion, so the instruction threshold is intentionally lower.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "28", "stem": "How must licensed material in a hot lab or imaging area be secured?", "options": [{"letter": "A", "text": "In a locked area or under constant surveillance"}, {"letter": "B", "text": "By posting a radiation sign and maintaining a written inventory even when the area remains unlocked"}, {"letter": "C", "text": "By storing it beside the dose calibrator"}, {"letter": "D", "text": "By documenting it in the annual audit"}], "answer": "A", "explanation": "Licensed material must be protected against unauthorized access, either in locked storage or under constant surveillance. A sign or inventory record alone does not physically secure it.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "29", "stem": "How often must personnel caring for patients who cannot be released receive radiation-safety instruction?", "options": [{"letter": "A", "text": "Every 3 years, coordinated with retention of written-directive and survey records"}, {"letter": "B", "text": "Initially and at least annually"}, {"letter": "C", "text": "Only after an incident or a substantial change in the patient's treatment plan"}, {"letter": "D", "text": "Once at initial employment, with later instruction required only for authorized users"}], "answer": "B", "explanation": "Instruction is required initially and at least annually. It covers patient and visitor control, contamination and waste, and notification of the RSO and authorized user during an emergency or death.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "30", "stem": "Which arrangement is acceptable for a patient who cannot be released after unsealed-material therapy?", "options": [{"letter": "A", "text": "Any semiprivate room if a portable shield separates the patient from an untreated roommate"}, {"letter": "B", "text": "A public waiting area with a portable shield"}, {"letter": "C", "text": "A private room with a private sanitary facility, or a room shared with another unreleasable therapy patient"}, {"letter": "D", "text": "A room shared with an unexposed pediatric patient"}], "answer": "C", "explanation": "The patient should occupy a private room with a private sanitary facility or share only with another patient who received similar therapy and also cannot be released. Room signage and visitor controls are also required.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "31", "stem": "An item is removed from the room of a patient who cannot be released. How should it be handled?", "options": [{"letter": "A", "text": "Release it after wiping it with disinfectant if no visible liquid or patient-identifying material remains"}, {"letter": "B", "text": "Treat it as ordinary waste if it has no visible contamination"}, {"letter": "C", "text": "Store it for exactly 24 hours regardless of radionuclide"}, {"letter": "D", "text": "Survey it and release it only if indistinguishable from background, or manage it as radioactive waste"}], "answer": "D", "explanation": "Items leaving the room must be monitored; if radioactivity is distinguishable from background, they are controlled as radioactive waste. Visual inspection or a fixed waiting period is not a substitute for measurement.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "32", "stem": "What is the maximum molybdenum-99 breakthrough permitted in technetium-99m eluate for human administration?", "options": [{"letter": "A", "text": "0.15 microcurie of molybdenum-99 per millicurie of technetium-99m"}, {"letter": "B", "text": "0.02 microcurie of molybdenum-99 per millicurie of technetium-99m"}, {"letter": "C", "text": "0.2 microcurie of molybdenum-99 per millicurie of technetium-99m"}, {"letter": "D", "text": "1 microcurie of molybdenum-99 per millicurie of technetium-99m"}], "answer": "A", "explanation": "The molybdenum-99 limit is 0.15 microcurie per millicurie of technetium-99m. The 0.02 and 0.2 values apply to strontium-82 and strontium-85 breakthrough, respectively, in rubidium-82 eluate.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "33", "stem": "When should strontium-82 and strontium-85 breakthrough be measured for a rubidium-82 generator?", "options": [{"letter": "A", "text": "After the last patient of the week"}, {"letter": "B", "text": "Before the first patient of the day"}, {"letter": "C", "text": "Only when image quality deteriorates"}, {"letter": "D", "text": "At annual license renewal"}], "answer": "B", "explanation": "Parent and contaminant strontium concentrations are checked before the first patient each day. This prevents administration of eluate that exceeds breakthrough limits. Waiting until the end of the day would allow every patient that day to receive an unverified product.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "34", "stem": "An eluate exceeds an applicable radionuclide breakthrough limit. What reporting is required?", "options": [{"letter": "A", "text": "Telephone reporting by the next calendar day followed by a written report within 15 calendar days"}, {"letter": "B", "text": "A written report at the next annual audit"}, {"letter": "C", "text": "Telephone reporting within 7 calendar days and a written report within 30 calendar days"}, {"letter": "D", "text": "No report if no patient received the eluate"}], "answer": "C", "explanation": "The licensee reports the excessive measurement by telephone within 7 calendar days and submits a written report within 30 days. The written report addresses corrective action, cause, and patient dose assessment when applicable.", "images": [], "explanationImages": l requires telephone reporting, followed by a detailed written report within 30 days describing the material, circumstances, possible exposures, recovery efforts, and preventive measures. An internal incident report alone is insufficient when exposure in unrestricted areas appears possible.", "images": [], "explanationImages": [], "sourceChapter": 6}, {"number": "38", "stem": "A licensee learns that an occupational or public dose limit was exceeded. By when is the written regulatory report required?", "options": [{"letter": "A", "text": "Within 24 hours"}, {"letter": "B", "text": "Within 7 days"}, {"letter": "C", "text": "Within 30 days"}, {"letter": "D", "text": "At the next license renewal"}], "answer": "C", "explanation": "The document requires a written report within 30 days after learning of an excess occupational, fetal, minor, or public dose, as well as specified excessive emissions or area radiation levels. The deadline differs from next-day telephone reporting used for certain medical or fetal events.", "images": [], "explanationImages": [], "sourceChapter": 6}];
    const APP_ID = "risc-2026-administrative-regulations-quiz-ch6";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID + ":bank-2";
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 2,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID || payload.version !== 2) throw new Error("This saved state is for a different quiz version.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
