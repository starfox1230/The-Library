<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISC Chapter 1: Introduction and Radiation Protection Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>RISC Chapter 1: Introduction and Radiation Protection Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":2,"appId":"risc-2026-introduction-radiation-protection-quiz-ch1",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "Approximately how much effective dose does the average person in the United States receive each year from all radiation sources, including background radiation?", "options": [{"letter": "A", "text": "620 mrem (6.2 mSv)"}, {"letter": "B", "text": "62 mrem (0.62 mSv)"}, {"letter": "C", "text": "100 mrem (1 mSv)"}, {"letter": "D", "text": "5 rem (50 mSv)"}], "answer": "A", "explanation": "The 2026 RISC document gives an annual average of about 620 mrem (6.2 mSv) from all sources. The 100 mrem value is the annual public dose limit from licensed operations, not average total exposure. Five rem is the annual whole-body occupational limit for an adult radiation worker.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "2", "stem": "A nuclear medicine service can obtain a diagnostic study using several technically adequate protocols. Which approach best applies the ALARA principle?", "options": [{"letter": "A", "text": "Choose the protocol with the shortest acquisition time regardless of image quality"}, {"letter": "B", "text": "Choose the protocol with the lowest exposure that still provides the required diagnostic information"}, {"letter": "C", "text": "Keep exposure below the occupational limit, even if a lower exposure is readily achievable"}, {"letter": "D", "text": "Avoid all radiation use unless the examination is therapeutic"}], "answer": "B", "explanation": "ALARA means keeping exposure as low as reasonably achievable while still accomplishing the clinical purpose. It is not satisfied merely by remaining below a regulatory limit, and it does not require sacrificing the diagnostic objective. Acquisition time is only one consideration; time, distance, shielding, and protocol design must be considered together.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "3", "stem": "Who is responsible for the required annual review of a facility's ALARA program?", "options": [{"letter": "A", "text": "Authorized user"}, {"letter": "B", "text": "Radiation safety committee chair"}, {"letter": "C", "text": "Radiation safety officer"}, {"letter": "D", "text": "NRC inspector"}], "answer": "C", "explanation": "The radiation safety officer (RSO) performs the annual review of the ALARA program. Authorized users follow the program in clinical practice, and the radiation safety committee provides broader oversight, but the document specifically assigns the annual ALARA review to the RSO.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "4", "stem": "A hospital employee who routinely transports patients but does not work in an imaging department is exposed to radiation from licensed operations. Which annual limit applies to that employee as a member of the public?", "options": [{"letter": "A", "text": "50 mrem (0.5 mSv)"}, {"letter": "B", "text": "500 mrem (5 mSv)"}, {"letter": "C", "text": "5 rem (50 mSv)"}, {"letter": "D", "text": "100 mrem (1 mSv)"}], "answer": "D", "explanation": "Hospital staff outside radiology or imaging are treated as members of the public for this limit. Their dose from licensed operations must not exceed 100 mrem (1 mSv) per year. The 5-rem value is the adult occupational whole-body limit, and 500 mrem is the embryo/fetus limit for a declared pregnant worker.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "5", "stem": "Which set contains the three principal methods for reducing occupational radiation exposure?", "options": [{"letter": "A", "text": "Time, distance, and shielding"}, {"letter": "B", "text": "Collimation, filtration, and magnification"}, {"letter": "C", "text": "Monitoring, reporting, and licensing"}, {"letter": "D", "text": "Containment, ventilation, and decontamination"}], "answer": "A", "explanation": "Time, distance, and shielding are the core exposure-reduction methods. The other choices contain useful practices in selected settings, but they are not the standard three-part radiation-protection framework.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "6", "stem": "When is individual personnel dosimetry required on the basis of expected occupational exposure?", "options": [{"letter": "A", "text": "Whenever any exposure is possible"}, {"letter": "B", "text": "When exposure is expected to exceed 10% of the applicable annual occupational limit"}, {"letter": "C", "text": "Only after a worker exceeds an annual occupational limit"}, {"letter": "D", "text": "When exposure is expected to exceed the annual public limit"}], "answer": "B", "explanation": "Individual monitoring is required when a worker is likely to receive more than 10% of the applicable annual occupational dose limit. The decision is prospective; a facility should not wait for an overexposure. The public limit is not the threshold used to decide whether an occupational worker needs a dosimeter.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "7", "stem": "Which oversight schedule correctly pairs the reviewer with personnel dosimetry records?", "options": [{"letter": "A", "text": "RSO monthly; radiation safety committee annually"}, {"letter": "B", "text": "RSO annually; radiation safety committee quarterly"}, {"letter": "C", "text": "RSO quarterly; radiation safety committee every 3 months"}, {"letter": "D", "text": "RSO every 3 months; radiation safety committee every 12 months"}], "answer": "C", "explanation": "The RSO should review personnel dosimetry records quarterly, and the radiation safety committee reviews them every 3 months. These intervals are equivalent in duration but involve different oversight roles. They should not be confused with the annual ALARA review or the at-least-annual audit.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "8", "stem": "A department is selecting a person to perform its required radiation-protection audit. Which candidate is most appropriate?", "options": [{"letter": "A", "text": "The supervisor who directly manages the audited work"}, {"letter": "B", "text": "Any employee who has worn a dosimeter for at least 1 year"}, {"letter": "C", "text": "Only an NRC employee"}, {"letter": "D", "text": "A trained individual without direct responsibility for the audited department"}], "answer": "D", "explanation": "The audit must be performed by trained personnel who do not have direct responsibility for the department or facility being audited. This independence reduces conflicts of interest. The audit is required at least every 12 months, and its findings and follow-up actions must be documented and reviewed by facility administration.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "9", "stem": "Which activity is most characteristic of a restricted radiation area?", "options": [{"letter": "A", "text": "Preparing and storing radiopharmaceuticals"}, {"letter": "B", "text": "Interpreting studies in a reading room"}, {"letter": "C", "text": "Registering patients at reception"}, {"letter": "D", "text": "Scheduling examinations in an office"}], "answer": "A", "explanation": "Radiopharmaceutical preparation, administration, storage, and imaging commonly occur in restricted areas because radioactive material is present or radiation levels require control. Reception, offices, waiting areas, and reading rooms are typical unrestricted areas.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "10", "stem": "At what measured condition does an area meet the definition of a radiation area?", "options": [{"letter": "A", "text": "More than 2 mrem in 1 hour at 1 meter"}, {"letter": "B", "text": "More than 5 mrem in 1 hour at 30 cm"}, {"letter": "C", "text": "More than 100 mrem in 1 year at 30 cm"}, {"letter": "D", "text": "More than 500 rad in 1 hour at 1 meter"}], "answer": "B", "explanation": "A radiation area is one in which a person could receive more than 5 mrem (0.05 mSv) in 1 hour at 30 cm from the source. The 2-mrem-per-hour value is an unrestricted-area limit. The 500-rad-at-1-meter threshold defines a very high radiation area.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "11", "stem": "A room is classified as a high radiation area. Which additional control is specifically required?", "options": [{"letter": "A", "text": "A written directive for every person entering"}, {"letter": "B", "text": "A sealed-source leak test before each entry"}, {"letter": "C", "text": "A visible or audible alarm to control access"}, {"letter": "D", "text": "A transport index posted at the door"}], "answer": "C", "explanation": "A high radiation area requires a visible or audible alarm or equivalent access control. Written directives govern specified medical administrations, leak tests apply to sealed sources, and transport indices apply to packages rather than rooms.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "12", "stem": "Which condition defines a very high radiation area?", "options": [{"letter": "A", "text": "An absorbed dose that could exceed 5 rad in 1 hour at 30 cm"}, {"letter": "B", "text": "An effective dose that could exceed 100 mrem in 1 hour at 30 cm"}, {"letter": "C", "text": "An annual dose that could exceed 5 rem anywhere in the room"}, {"letter": "D", "text": "An absorbed dose that could exceed 500 rad in 1 hour at 1 meter"}], "answer": "D", "explanation": "A very high radiation area is one in which absorbed dose could exceed 500 rad (5 Gy) in 1 hour at 1 meter from the source or any surface. The other values describe different regulatory concepts and do not meet this definition.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "13", "stem": "What posting is required where licensed radioactive material is routinely used or stored?", "options": [{"letter": "A", "text": "Caution: Radioactive Materials"}, {"letter": "B", "text": "Caution: High Radiation Area"}, {"letter": "C", "text": "Danger: Biohazard"}, {"letter": "D", "text": "No posting is required if staff wear dosimeters"}], "answer": "A", "explanation": "Areas where licensed radioactive material is used or stored require a 'Caution: Radioactive Materials' sign. A high-radiation-area sign is reserved for the corresponding radiation-level classification. Personnel monitoring does not replace required posting.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "14", "stem": "Which pair of limits applies to an unrestricted area, excluding contributions from administered or released patients?", "options": [{"letter": "A", "text": "Less than 5 mrem in any hour and less than 500 mrem per year"}, {"letter": "B", "text": "Less than 2 mrem in any hour and less than 100 mrem per year"}, {"letter": "C", "text": "Less than 20 mrem in any hour and less than 1 rem per year"}, {"letter": "D", "text": "Less than 100 mrem in any hour and less than 5 rem per year"}], "answer": "B", "explanation": "An unrestricted area must remain below 2 mrem (20 uSv) in any 1 hour and below 100 mrem (1 mSv) per year. For this area-classification rule, dose contributions from administered patients and released patients are excluded.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "15", "stem": "A hospitalized patient has received radioactive material and meets the applicable release criteria. What is required for the patient's room solely because the patient remains there?", "options": [{"letter": "A", "text": "A high-radiation-area alarm"}, {"letter": "B", "text": "A caution sign until all activity has physically decayed"}, {"letter": "C", "text": "No caution sign is required on that basis"}, {"letter": "D", "text": "A transport index displayed at the entrance"}], "answer": "C", "explanation": "A room occupied by a patient who meets release criteria does not require a caution sign solely because of the administered radioactive material. This exception does not eliminate other controls that might be required by measured radiation levels or material storage.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "16", "stem": "A sealed source is stored in a room. At 30 cm from its container, the measured radiation level is 5 mrem per hour. Does the source alone require the room to be posted with a caution sign?", "options": [{"letter": "A", "text": "Yes, because any sealed source requires posting"}, {"letter": "B", "text": "Yes, because the threshold is 2 mrem per hour"}, {"letter": "C", "text": "No, because sealed sources never require posting"}, {"letter": "D", "text": "No, because the level does not exceed 5 mrem per hour at 30 cm"}], "answer": "D", "explanation": "A room with a sealed source need not be posted when the radiation level at 30 cm from the source surface, container, or housing does not exceed 5 mrem (0.05 mSv) per hour. This is a limited exception; higher levels or other licensed-material uses may still require posting.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "17", "stem": "Which color combination is acceptable for the standard radiation warning symbol?", "options": [{"letter": "A", "text": "Magenta, purple, or black symbol on a yellow background"}, {"letter": "B", "text": "Red symbol on a white background only"}, {"letter": "C", "text": "Yellow symbol on a black background"}, {"letter": "D", "text": "Green symbol on a white background"}], "answer": "A", "explanation": "The standard radiation symbol may be magenta, purple, or black on a yellow background. The specified contrast is the important requirement; the other combinations are not the standard NRC warning-symbol format.", "images": [], "explanationImages": [], "sourceChapter": 1}, {"number": "18", "stem": "Which labeling statement is correct for a radioactive source holder or device component?", "options": [{"letter": "A", "text": "It must always use a magenta symbol on yellow"}, {"letter": "B", "text": "It may be labeled without a prescribed color requirement"}, {"letter": "C", "text": "It must always use black lettering on white"}, {"letter": "D", "text": "It may be labeled only by the manufacturer"}], "answer": "B", "explanation": "Licensees may label sources, source holders, and other device components without a specific color requirement. That flexibility should not be confused with the color requirements for the standard posted radiation symbol.", "images": [], "explanationImages": [], "sourceChapter": 1}];
    const APP_ID = "risc-2026-introduction-radiation-protection-quiz-ch1";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID + ":bank-2";
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 2,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID || payload.version !== 2) throw new Error("This saved state is for a different quiz version.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
