<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISC Chapter 7: Emergency Procedures and Special Circumstances Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Pediatric Gastrointestinal Tract Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":2,"appId":"risc-2026-emergency-procedures-quiz-ch7",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "Which combination is required for an administration error to meet the general NRC definition of a medical event?", "options": [{"letter": "A", "text": "Any deviation from the prescription, even if clinically insignificant"}, {"letter": "B", "text": "Patient harm is confirmed by an independent consultant and the administered activity differs by at least 5%"}, {"letter": "C", "text": "A specified dose consequence threshold is exceeded and at least one qualifying error criterion is met"}, {"letter": "D", "text": "The authorized user requests that the event be reported"}], "answer": "C", "explanation": "A medical event requires both parts of the definition: the administration must create a specified dose consequence and a qualifying error must also occur, such as a 20% dosage deviation, wrong drug, route, patient, body site, or leaking treatment source. Demonstrated injury is not required.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "2", "stem": "Which dose consequence can satisfy the first part of the medical-event definition?", "options": [{"letter": "A", "text": "More than 100 mrem to any monitored worker"}, {"letter": "B", "text": "Any detectable dose to the skin"}, {"letter": "C", "text": "A transport index greater than 1"}, {"letter": "D", "text": "More than 5 rem effective dose equivalent"}], "answer": "D", "explanation": "The consequence thresholds include more than 5 rem effective dose equivalent, 50 rem to an organ or tissue, or 50 rem shallow dose to skin. Package transport indices and routine worker-monitoring levels are unrelated.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "3", "stem": "An administered dosage differs from the prescribed dosage by 22%, but the resulting dose is below every medical-event consequence threshold. Is it a medical event under the two-part definition?", "options": [{"letter": "A", "text": "No, because the dose consequence threshold and a qualifying error must both be present"}, {"letter": "B", "text": "Yes, because any dosage difference of at least 20% is sufficient even when all dose consequence thresholds remain below the reporting levels"}, {"letter": "C", "text": "Yes, but only if the dosage was too high"}, {"letter": "D", "text": "No, because dosage deviations are never reportable"}], "answer": "A", "explanation": "A deviation of at least 20% is one qualifying error, but it does not by itself satisfy the definition. At least one specified dose consequence threshold must also be exceeded.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "4", "stem": "Which administration error is specifically included among the qualifying medical-event criteria?", "options": [{"letter": "A", "text": "Giving the correct drug by the prescribed route 10 minutes late"}, {"letter": "B", "text": "Giving the radioactive drug to the wrong individual"}, {"letter": "C", "text": "Repeating an image because of patient motion"}, {"letter": "D", "text": "Using a different syringe manufacturer"}], "answer": "B", "explanation": "Administration to the wrong individual is a qualifying criterion. Other listed criteria include wrong drug, wrong route, dosage off by at least 20%, wrong body part with sufficient excess dose, and a leaking treatment source.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "5", "stem": "What does designation as a medical event imply about patient harm?", "options": [{"letter": "A", "text": "It proves that permanent injury occurred"}, {"letter": "B", "text": "It means the patient received no therapeutic benefit"}, {"letter": "C", "text": "It identifies a significant administration or quality-assurance problem but does not by itself prove harm"}, {"letter": "D", "text": "It applies only when an independent medical consultant confirms that the error caused a permanent clinical injury"}], "answer": "C", "explanation": "The designation identifies a regulatory problem in the use of radioactive material. The authorized user must separately evaluate clinical harm, which may arise from excessive dose or from undertreatment; harm is not assumed from the label alone.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "6", "stem": "Which factor is most important when deciding whether a spill should be managed as major or minor?", "options": [{"letter": "A", "text": "The physical size of the wet area, regardless of radionuclide, activity, affected people, or the likelihood of spread"}, {"letter": "B", "text": "Whether the spill occurred during business hours"}, {"letter": "C", "text": "Whether the radionuclide emits visible light"}, {"letter": "D", "text": "Activity and radiotoxicity together with spread, affected people, surfaces, and other hazards"}], "answer": "D", "explanation": "The decision uses isotope-specific activity guidance plus incident context, including radiotoxicity, potential spread, number of people affected, contaminated surfaces, and competing hazards. Area alone is not enough.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "7", "stem": "What may be the safest management for a contained spill of a very short-lived radionuclide when immediate cleanup would increase exposure?", "options": [{"letter": "A", "text": "Restrict access and allow the activity to decay"}, {"letter": "B", "text": "Spread the material over a larger area"}, {"letter": "C", "text": "Dilute it into the sanitary sewer regardless of quantity"}, {"letter": "D", "text": "Remove all shielding to speed physical decay"}], "answer": "A", "explanation": "For selected short-lived spills, isolating the area until decay may produce less exposure and contamination spread than immediate cleanup. Shielding does not alter half-life, and uncontrolled dilution or spreading is inappropriate.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "8", "stem": "What is the first action for a major radioactive spill when there is no immediate medical emergency?", "options": [{"letter": "A", "text": "Begin scrubbing from the center outward"}, {"letter": "B", "text": "Clear uninvolved people from the area"}, {"letter": "C", "text": "Carry contaminated objects to the hot lab"}, {"letter": "D", "text": "Measure every person's dosimeter before restricting access"}], "answer": "B", "explanation": "The major-spill sequence begins by clearing the area, then preventing spread, shielding if safe, securing the room, and calling the RSO. Unsupervised cleanup can spread contamination and increase exposure.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "9", "stem": "After a major spill is covered with absorbent material, what should staff do next?", "options": [{"letter": "A", "text": "Immediately mop the area from the center outward before contamination can dry or move beyond the absorbent paper"}, {"letter": "B", "text": "Remove the absorbent paper to inspect the floor"}, {"letter": "C", "text": "Limit movement of potentially contaminated personnel and secure the room"}, {"letter": "D", "text": "Send everyone home without monitoring"}], "answer": "C", "explanation": "Covering the spill helps prevent spread, but staff should not attempt major-spill cleanup without RSO direction. Movement is limited, the room is secured, and the RSO is notified immediately.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "10", "stem": "How should contaminated skin be decontaminated after a major spill?", "options": [{"letter": "A", "text": "Scrub vigorously with hot water and an abrasive cleanser"}, {"letter": "B", "text": "Apply bleach and cover tightly"}, {"letter": "C", "text": "Wait for physical decay without washing"}, {"letter": "D", "text": "Flush with lukewarm water and wash gently with mild soap"}], "answer": "D", "explanation": "Gentle washing with lukewarm water and mild soap limits skin injury, which could increase uptake. If contamination persists, controlled perspiration under plastic may be used before washing again under expert guidance.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "11", "stem": "Which action belongs in the response to a minor spill?", "options": [{"letter": "A", "text": "Clean with disposable gloves and absorbent material, then survey the area and yourself"}, {"letter": "B", "text": "Evacuate the entire building and leave the spill uncovered until a federal response team arrives"}, {"letter": "C", "text": "Leave the spill uncovered until the RSO arrives"}, {"letter": "D", "text": "Discard contaminated supplies in ordinary trash"}], "answer": "A", "explanation": "For a minor spill, notify nearby people, cover and clean it with disposable materials, bag waste as radioactive, survey the area and personnel, report to the RSO, and document the incident. Unlike a major spill, trained staff may perform this limited cleanup rather than securing the room and waiting for RSO-supervised decontamination.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "12", "stem": "When folding absorbent paper used to clean a minor radioactive spill, which surface should face outward?", "options": [{"letter": "A", "text": "The contaminated surface"}, {"letter": "B", "text": "The clean surface"}, {"letter": "C", "text": "Either surface if gloves are worn"}, {"letter": "D", "text": "The wettest surface"}], "answer": "B", "explanation": "The paper is folded with the clean side outward to contain contamination, then placed with gloves and other disposable materials in a labeled bag for radioactive waste. Folding the contaminated surface outward would spread activity to gloves, the bag exterior, and surrounding surfaces.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "13", "stem": "How is removable surface contamination measured?", "options": [{"letter": "A", "text": "By holding a calibrated exposure-rate survey meter 1 meter above the surface and recording the highest reading"}, {"letter": "B", "text": "By reading the worker's whole-body dosimeter"}, {"letter": "C", "text": "By wiping a defined area and counting the wipe with an instrument of known efficiency"}, {"letter": "D", "text": "By calculating ten physical half-lives"}], "answer": "C", "explanation": "A wipe test samples removable contamination from a known area, commonly 100 square centimeters, and the sample is measured with an appropriate detector whose efficiency is known. A survey-meter reading above the surface measures a radiation field and cannot by itself quantify removable contamination in dpm per area.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "14", "stem": "Which restricted-area removable-contamination limit is paired correctly with the radionuclide group?", "options": [{"letter": "A", "text": "Technetium-99m: 200 dpm per 100 square centimeters"}, {"letter": "B", "text": "Iodine-131: 20,000 dpm per 100 square centimeters"}, {"letter": "C", "text": "Gallium-67: 2,000 dpm per 100 square centimeters"}, {"letter": "D", "text": "Alpha emitters: 200 dpm per 100 square centimeters"}], "answer": "D", "explanation": "The table lists 200 dpm/100 cm2 for alpha emitters, 2,000 for indium-111, iodine-123, iodine-131, lutetium-177, and yttrium-90, and 20,000 for gallium-67, technetium-99m, and thallium-201. The lower alpha limit reflects the greater hazard from alpha contamination, so the numerical groups should not be interchanged.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "15", "stem": "A patient with life-threatening trauma may also be contaminated with radioactive material. What is the first priority?", "options": [{"letter": "A", "text": "Treat the life- or limb-threatening condition while using reasonable contamination controls"}, {"letter": "B", "text": "Complete full-body decontamination and identify the radionuclide before allowing emergency personnel to begin treatment"}, {"letter": "C", "text": "Wait until the radionuclide is identified"}, {"letter": "D", "text": "Transfer the patient only after the dose rate reaches background"}], "answer": "A", "explanation": "Emergency medical care takes priority. Responders should be informed and use practical exposure and contamination controls, but radiation concerns should not delay life- or limb-saving treatment.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "16", "stem": "Which statement best distinguishes a radiological dispersal device from a nuclear weapon?", "options": [{"letter": "A", "text": "An RDD produces a nuclear chain reaction but is designed to limit blast damage while maximizing radioactive fallout"}, {"letter": "B", "text": "An RDD uses a conventional explosive to spread radioactive material and does not create a nuclear detonation"}, {"letter": "C", "text": "An RDD exposes an entire continent to lethal fallout"}, {"letter": "D", "text": "An RDD contains no radioactive material"}], "answer": "B", "explanation": "A dirty bomb or RDD combines conventional explosives with radioactive material. Its likely principal effects are blast injury, localized contamination, disruption, and anxiety, not a nuclear chain-reaction explosion.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "17", "stem": "What most strongly determines the local contamination pattern after an RDD explosion?", "options": [{"letter": "A", "text": "The age, height, and construction materials of nearby buildings, independent of weather or the radioactive source"}, {"letter": "B", "text": "The number of radiation workers in the area"}, {"letter": "C", "text": "Explosive size, radionuclide type and quantity, dispersal method, and weather"}, {"letter": "D", "text": "Whether the material was previously used in medicine"}], "answer": "C", "explanation": "Contamination depends on the explosive, radioactive inventory, dispersal mechanism, and weather. Prompt isotope identification helps authorities select protective actions such as sheltering or evacuation. Building characteristics may influence local deposition, but they cannot replace the source and weather factors in the initial assessment.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "18", "stem": "Which set lists the core protective actions for a radiological emergency?", "options": [{"letter": "A", "text": "Increase time, reduce distance, and remove shielding"}, {"letter": "B", "text": "Rely only on personal dosimeters"}, {"letter": "C", "text": "Wait for symptoms before leaving the area"}, {"letter": "D", "text": "Reduce time, increase distance, and use shielding or respiratory protection as appropriate"}], "answer": "D", "explanation": "Protection follows the familiar time-distance-shielding framework, with respiratory or contamination controls when internal exposure is possible. Dosimeters provide information but do not themselves reduce dose.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "19", "stem": "Which exposure pattern is consistent with acute radiation syndrome?", "options": [{"letter": "A", "text": "An acute dose above about 0.7 Gy delivered rapidly to most of the body by penetrating radiation"}, {"letter": "B", "text": "A small chronic dose limited to one fingertip"}, {"letter": "C", "text": "Internal contamination with no significant absorbed dose"}, {"letter": "D", "text": "A diagnostic chest radiograph"}], "answer": "A", "explanation": "ARS requires a sufficiently high, rapidly delivered, penetrating dose to a large portion of the body, generally more than 70%. Local or low-dose exposures do not produce the classic whole-body syndrome.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "20", "stem": "What is the usual sequence of acute radiation syndrome phases?", "options": [{"letter": "A", "text": "Latent, prodromal, recovery, then manifest illness"}, "letter": "B", "text": "Potassium iodide"}, {"letter": "C", "text": "Prussian blue"}, {"letter": "D", "text": "Calcium gluconate"}], "answer": "A", "explanation": "Filgrastim and pegfilgrastim stimulate neutrophil recovery; sargramostim supports additional marrow lineages. Potassium iodide and Prussian blue are decorporation or blocking agents for selected internal contaminants, not general ARS marrow treatment.", "images": [], "explanationImages": [], "sourceChapter": 7}, {"number": "24", "stem": "Which agent promotes megakaryocyte and platelet recovery in acute radiation syndrome?", "options": [{"letter": "A", "text": "Filgrastim"}, {"letter": "B", "text": "Romiplostim"}, {"letter": "C", "text": "Atropine"}, {"letter": "D", "text": "Naloxone"}], "answer": "B", "explanation": "Romiplostim is a thrombopoietin-receptor agonist that promotes megakaryocytes and platelets. Colony-stimulating factors such as filgrastim primarily support neutrophil recovery. Potassium iodide and Prussian blue address selected internal radionuclide exposures rather than radiation-induced thrombocytopenia.", "images": [], "explanationImages": [], "sourceChapter": 7}];
    const APP_ID = "risc-2026-emergency-procedures-quiz-ch7";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID + ":bank-2";
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 2,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID || payload.version !== 2) throw new Error("This saved state is for a different quiz version.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
