<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISC Chapter 3: Transport and Management of Radioactive Materials Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>RISC Chapter 3: Transport and Management of Radioactive Materials Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>

  <script>
    const QUESTIONS = [{"number": "1", "stem": "Which agency is primarily responsible for certifying radioactive-material package designs, while another agency regulates labeling and routine transport?", "options": [{"letter": "A", "text": "The FDA certifies package designs; the NRC regulates labeling and transport"}, {"letter": "B", "text": "The Department of Transportation certifies package designs; the FDA regulates labeling and transport"}, {"letter": "C", "text": "The NRC certifies package designs; the Department of Transportation regulates labeling and transport"}, {"letter": "D", "text": "The NRC certifies package designs; the EPA regulates labeling and transport"}], "answer": "C", "explanation": "The NRC reviews and certifies package designs for radioactive material. The Department of Transportation regulates transport requirements such as shipping papers, labels, and smaller packages. The FDA and EPA have other radiation-related roles but do not divide these transportation duties in this way.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "2", "stem": "A shipment must withstand severe accident conditions, including impact, puncture, fire, and immersion. Which package type is required?", "options": [{"letter": "A", "text": "Excepted package"}, {"letter": "B", "text": "Industrial package"}, {"letter": "C", "text": "Type A package"}, {"letter": "D", "text": "Type B package"}], "answer": "D", "explanation": "Type B packages are designed for high-activity contents and must withstand severe accident tests. Type A packages are designed for normal transport conditions and minor mishaps, not the full severe-accident sequence.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "3", "stem": "What determines whether a radioactive shipment requires a Type A or Type B package?", "options": [{"letter": "A", "text": "The activity and form of the radioactive contents"}, {"letter": "B", "text": "The measured dose rate at 1 meter"}, {"letter": "C", "text": "The distance the shipment will travel"}, {"letter": "D", "text": "Whether the carrier is a common or private carrier"}], "answer": "A", "explanation": "Package type is based principally on the activity and form of the radioactive material inside. By contrast, the external radiation hazard determines which category of package label is used.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "4", "stem": "How is the transport index assigned to a radioactive package?", "options": [{"letter": "A", "text": "It is the surface dose rate in mrem per hour"}, {"letter": "B", "text": "It is the highest dose rate in mrem per hour measured 1 meter from the package"}, {"letter": "C", "text": "It is the package activity in millicuries divided by 10"}, {"letter": "D", "text": "It is the removable contamination level divided by the surface dose rate"}], "answer": "B", "explanation": "The transport index is the highest radiation level, in mrem per hour, measured 1 meter from the package. It is used for spacing and transport controls. A Radioactive White-I package does not display a transport index.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "5", "stem": "A package measures 0.4 mrem/hour at its surface and 0.2 mrem/hour at 1 meter. Which label is appropriate?", "options": [{"letter": "A", "text": "Radioactive Yellow-II"}, {"letter": "B", "text": "Radioactive Yellow-III"}, {"letter": "C", "text": "Radioactive White-I"}, {"letter": "D", "text": "No radioactive label is permitted"}], "answer": "C", "explanation": "White-I is used when the surface dose rate is no more than 0.5 mrem/hour and the 1-meter dose rate is no more than 0.5 mrem/hour. Yellow-II and Yellow-III identify progressively greater external radiation hazards.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "6", "stem": "A package measures 35 mrem/hour at its surface and has a transport index of 0.8. Which label is appropriate?", "options": [{"letter": "A", "text": "Radioactive White-I"}, {"letter": "B", "text": "Radioactive Yellow-III"}, {"letter": "C", "text": "Excepted quantity"}, {"letter": "D", "text": "Radioactive Yellow-II"}], "answer": "D", "explanation": "Yellow-II applies when the surface dose rate is greater than 0.5 but no more than 50 mrem/hour and the transport index is no more than 1. Yellow-III is required if either the surface dose rate exceeds 50 mrem/hour or the transport index exceeds 1, within the applicable upper limits.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "7", "stem": "A package has a surface dose rate of 40 mrem/hour and a dose rate of 2 mrem/hour at 1 meter. Which label is required?", "options": [{"letter": "A", "text": "Radioactive Yellow-III"}, {"letter": "B", "text": "Radioactive White-I"}, {"letter": "C", "text": "Radioactive Yellow-II"}, {"letter": "D", "text": "The package cannot be transported under any circumstances"}], "answer": "A", "explanation": "Although the surface reading falls within the Yellow-II range, the 1-meter reading produces a transport index of 2. A transport index greater than 1 requires a Yellow-III label. Classification follows the more restrictive measurement.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "8", "stem": "What is the usual maximum transport index for a package carried in a common-carrier vehicle or an open exclusive-use vehicle?", "options": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "10"}, {"letter": "C", "text": "5"}, {"letter": "D", "text": "50"}], "answer": "B", "explanation": "The usual maximum transport index is 10. A package with a transport index greater than 10 may be transported only under exclusive-use controls in a closed vehicle.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "9", "stem": "Which information belongs on a radioactive package label?", "options": [{"letter": "A", "text": "Only the name and address of the recipient"}, {"letter": "B", "text": "The patient's name and medical record number"}, {"letter": "C", "text": "Radionuclide identity, activity, and transport index when applicable"}, {"letter": "D", "text": "The package purchase price and insurance value"}], "answer": "C", "explanation": "Radioactive labels communicate the contents and external hazard, including radionuclide identity, quantity or activity, and transport index for Yellow-II and Yellow-III packages. Patient identifiers and financial information are not package-label requirements.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "10", "stem": "Before an empty, uncontaminated shipping container is discarded as ordinary waste, what must be done?", "options": [{"letter": "A", "text": "The container must be stored for ten physical half-lives"}, {"letter": "B", "text": "The container must be returned to the NRC"}, {"letter": "C", "text": "A transport index of zero must be written on every label"}, {"letter": "D", "text": "All radioactive labels and markings must be removed or defaced"}], "answer": "D", "explanation": "Radioactive labels and markings must be removed or defaced before an empty, uncontaminated package is released for unrestricted use or disposal. This prevents a nonradioactive package from being mistaken for a current radioactive shipment.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "11", "stem": "A radioactive package arrives during normal working hours. By when must the required receipt surveys be completed?", "options": [{"letter": "A", "text": "Within 3 hours of receipt"}, {"letter": "B", "text": "Within 30 minutes"}, {"letter": "C", "text": "By the end of the calendar day"}, {"letter": "D", "text": "Within 24 hours"}], "answer": "A", "explanation": "Required monitoring must be performed as soon as practical, but no later than 3 hours after receipt during working hours. If the package arrives after hours, the 3-hour period begins at the start of the next working day.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "12", "stem": "A package of radioactive material is delivered after the nuclear medicine department has closed. When does the 3-hour monitoring period begin?", "options": [{"letter": "A", "text": "At the time the delivery vehicle enters the property"}, {"letter": "B", "text": "At the beginning of the next working day"}, {"letter": "C", "text": "At midnight"}, {"letter": "D", "text": "When the package is first opened"}], "answer": "B", "explanation": "For an after-hours delivery, required monitoring must be completed within 3 hours after the beginning of the next working day. The clock does not wait until the package is opened.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "13", "stem": "A receiving survey finds radiation or removable contamination above the applicable package limit. What is the appropriate immediate reporting action?", "options": [{"letter": "A", "text": "Notify only the prescribing authorized user within 30 days"}, {"letter": "B", "text": "Return the package without documenting the survey"}, {"letter": "C", "text": "Notify the carrier and the NRC or Agreement State immediately"}, {"letter": "D", "text": "Wait for a confirmatory annual audit before reporting"}], "answer": "C", "explanation": "When package limits are exceeded, the licensee must immediately notify both the final delivery carrier and the NRC or Agreement State. Delayed internal review does not replace prompt external notification.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "14", "stem": "A sealed source has no leak-test certificate documenting a test within the preceding 6 months. What should the licensee do?", "options": [{"letter": "A", "text": "Continue using it until the next annual inventory"}, {"letter": "B", "text": "Use it only for diagnostic procedures"}, {"letter": "C", "text": "Wipe the storage cabinet instead of the source"}, {"letter": "D", "text": "Remove it from use until it is tested"}], "answer": "D", "explanation": "A source subject to leak testing may not be used or stored for use without a certificate showing a test within the preceding 6 months. It must be tested before returning to service.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "15", "stem": "A sealed-source leak test detects 0.006 microcurie of removable contamination. What is required?", "options": [{"letter": "A", "text": "Remove the source from use and report the result within 5 days"}, {"letter": "B", "text": "No action because the result is below 0.01 microcurie"}, {"letter": "C", "text": "Repeat the test at the next 6-month interval"}, {"letter": "D", "text": "Relabel the source as unsealed material and continue using it"}], "answer": "A", "explanation": "A leak-test result of at least 0.005 microcurie (185 Bq) is reportable. The source must be withdrawn from use and the leak reported within 5 days. The result in the scenario exceeds that threshold.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "16", "stem": "How long must records of radiation surveys, instrument calibrations, and sealed-source leak tests generally be retained?", "options": [{"letter": "A", "text": "1 year"}, {"letter": "B", "text": "3 years"}, {"letter": "C", "text": "5 years"}, {"letter": "D", "text": "For the duration of the license in every case"}], "answer": "B", "explanation": "These operational records are generally retained for 3 years. Some other records, including specified individual monitoring and effluent records, have longer retention requirements, so the record category matters.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "17", "stem": "When must an area survey be documented in a location where unsealed material requiring a written directive is prepared or administered?", "options": [{"letter": "A", "text": "Only after a spill"}, {"letter": "B", "text": "Once each calendar quarter"}, {"letter": "C", "text": "At the end of each day the material is used"}, {"letter": "D", "text": "Only when an employee dose exceeds an investigational level"}], "answer": "C", "explanation": "The area must be surveyed at the end of each day on which unsealed byproduct material requiring a written directive is prepared or administered. The record includes the date, results, instrument, and person performing the survey.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "18", "stem": "Which radioactive material may be discharged to a sanitary sewer under the routine disposal provision?", "options": [{"letter": "A", "text": "Any solid source with a half-life under 120 days"}, {"letter": "B", "text": "Any material released from a patient room"}, {"letter": "C", "text": "Only tritium, regardless of annual quantity"}, {"letter": "D", "text": "Material that is soluble or readily dispersible in water and remains within annual activity limits"}], "answer": "D", "explanation": "Sewer disposal is limited to material that is soluble or readily dispersible in water and that remains within radionuclide-specific and total annual limits. Solid sealed sources do not qualify merely because they are short-lived.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "19", "stem": "Which set gives the annual sanitary-sewer limits stated in the RISC document?", "options": [{"letter": "A", "text": "Tritium 5 Ci, carbon-14 1 Ci, and all other radionuclides combined 1 Ci"}, {"letter": "B", "text": "Tritium 1 Ci, carbon-14 5 Ci, and all other radionuclides combined 10 Ci"}, {"letter": "C", "text": "Tritium 10 Ci, carbon-14 10 Ci, and no combined limit for other radionuclides"}, {"letter": "D", "text": "One curie total for all radionuclides, with no isotope-specific limits"}], "answer": "A", "explanation": "The annual limits are 5 Ci of tritium, 1 Ci of carbon-14, and 1 Ci for all other ra  "text": "With a personnel dosimeter placed beside it overnight"}, {"letter": "D", "text": "At the container surface with a sensitive instrument and no intervening shielding"}], "answer": "D", "explanation": "The waste must be surveyed at the surface with an appropriate sensitive instrument, without shielding, and must be indistinguishable from background. A time calculation alone is not sufficient.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "23", "stem": "What additional step is required after decay-in-storage waste is shown to be indistinguishable from background?", "options": [{"letter": "A", "text": "Remove or deface radiation labels before disposal"}, {"letter": "B", "text": "Add a new Radioactive White-I label"}, {"letter": "C", "text": "Send the waste to a low-level waste burial site"}, {"letter": "D", "text": "Retain it for another 120 days"}], "answer": "A", "explanation": "Once the waste passes the required survey, radiation labels and markings must be removed or defaced before ordinary disposal. Survey records must be retained for 3 years.", "images": [], "explanationImages": [], "sourceChapter": 3}, {"number": "24", "stem": "Which statement best distinguishes a sealed source from unsealed radioactive material?", "options": [{"letter": "A", "text": "A sealed source emits only gamma radiation"}, {"letter": "B", "text": "A sealed source is permanently bonded or encapsulated to prevent dispersion under normal use"}, {"letter": "C", "text": "A sealed source contains less than 0.005 microcurie"}, {"letter": "D", "text": "A sealed source never requires inventory or leak testing"}], "answer": "B", "explanation": "A sealed source is constructed so radioactive material remains contained under normal conditions of use. The designation does not depend on radiation type or low activity, and many sealed sources require periodic inventory and leak testing.", "images": [], "explanationImages": [], "sourceChapter": 3}];
    const APP_ID = "risc-2026-transport-management-quiz-ch3";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID + ":bank-2";
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 2,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID || payload.version !== 2) throw new Error("This saved state is for a different quiz version.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
