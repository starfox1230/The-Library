<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISC Chapter 4: Regulatory Exposure Limits Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>RISC Chapter 4: Regulatory Exposure Limits Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":2,"appId":"risc-2026-regulatory-exposure-limits-quiz-ch4",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "Which adult occupational limits apply in a calendar year?", "options": [{"letter": "A", "text": "Whole body 0.5 rem, lens 1.5 rem, and skin or extremity 5 rem"}, {"letter": "B", "text": "Whole body 50 rem, lens 15 rem, and skin or extremity 5 rem"}, {"letter": "C", "text": "Whole body 5 rem, lens 50 rem, and skin or extremity 15 rem"}, {"letter": "D", "text": "Whole body 5 rem, lens 15 rem, and skin or extremity 50 rem"}], "answer": "D", "explanation": "The adult annual limits are 5 rem whole-body effective dose, 15 rem to the lens, and 50 rem to the skin, an extremity, or an individual organ. The second option gives the corresponding 10% limits for minors.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "2", "stem": "What fraction of the adult occupational limits applies to a minor radiation worker?", "options": [{"letter": "A", "text": "One-tenth"}, {"letter": "B", "text": "The same limits"}, {"letter": "C", "text": "One-half"}, {"letter": "D", "text": "One-hundredth"}], "answer": "A", "explanation": "A minor's annual occupational limits are 10% of the adult limits: 0.5 rem whole body, 1.5 rem to the lens, and 5 rem to skin, extremities, or an organ. The limits are not one-half of the adult values, and the ordinary public limit is a separate 0.1 rem per year.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "3", "stem": "An adult radiation worker exceeds the 5-rem whole-body occupational limit in September. What is the consequence for the remainder of the calendar year?", "options": [{"letter": "A", "text": "The worker may continue unrestricted work if a second dosimeter is issued"}, {"letter": "B", "text": "The worker may not enter a radiation zone until the next calendar year"}, {"letter": "C", "text": "The worker's limit automatically increases to 10 rem after RSO approval"}, {"letter": "D", "text": "Only fluoroscopic work is prohibited"}], "answer": "B", "explanation": "After the annual whole-body occupational limit is exceeded, the worker cannot continue entering radiation zones during that calendar year. A new badge or local approval cannot raise a regulatory annual limit.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "4", "stem": "A worker received dose during a planned special exposure. How is that dose handled in future planned special exposures?", "options": [{"letter": "A", "text": "It is ignored because it was authorized"}, {"letter": "B", "text": "It is counted only if it exceeded 5 rem"}, {"letter": "C", "text": "It is subtracted from the cumulative planned-special-exposure allowance"}, {"letter": "D", "text": "It replaces the worker's routine occupational dose record"}], "answer": "C", "explanation": "Dose from a planned special exposure is tracked separately but is subtracted from the applicable lifetime planned-special-exposure allowance. Authorization does not erase the dose. Accident and emergency doses above annual limits are handled similarly when determining remaining planned-special-exposure eligibility.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "5", "stem": "How is deep-dose equivalent assigned when different parts of the body receive different penetrating-radiation doses?", "options": [{"letter": "A", "text": "Use the average of all monitored body locations"}, {"letter": "B", "text": "Use only the reading from the dominant hand"}, {"letter": "C", "text": "Use the lowest reading to avoid double counting"}, {"letter": "D", "text": "Use the highest deep-dose equivalent measured at any monitored body location"}], "answer": "D", "explanation": "For nonuniform exposure, the reported deep-dose equivalent is based on the highest dose to any monitored body location. Shallow dose is evaluated differently, using the highest dose averaged over a contiguous 10-square-centimeter skin area.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "6", "stem": "What is the dose limit to the embryo or fetus of a declared pregnant worker for the entire pregnancy?", "options": [{"letter": "A", "text": "0.5 rem (5 mSv)"}, {"letter": "B", "text": "0.1 rem (1 mSv)"}, {"letter": "C", "text": "1.5 rem (15 mSv)"}, {"letter": "D", "text": "5 rem (50 mSv)"}], "answer": "A", "explanation": "The limit is 0.5 rem (5 mSv) for the entire gestation after pregnancy is declared. This is distinct from the 0.1-rem annual public limit and the 5-rem adult occupational whole-body limit.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "7", "stem": "Which action is required for a pregnancy to be treated as declared for occupational dose control?", "options": [{"letter": "A", "text": "The supervisor must infer pregnancy from scheduling requests"}, {"letter": "B", "text": "The worker must submit a voluntary written declaration that includes the estimated date of conception"}, {"letter": "C", "text": "A positive laboratory result must be sent directly to the NRC"}, {"letter": "D", "text": "The worker must permanently leave all restricted areas"}], "answer": "B", "explanation": "Declaration is voluntary and must be made in writing, including the estimated date of conception. A worker may also withdraw the declaration in writing; the employer should not infer or impose declaration.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "8", "stem": "A worker has two pregnancies at different times while employed by the same licensee. How should declarations be handled?", "options": [{"letter": "A", "text": "The first declaration remains in force for all future pregnancies"}, {"letter": "B", "text": "Only the first pregnancy is subject to the fetal dose limit"}, {"letter": "C", "text": "Each pregnancy requires a separate written declaration"}, {"letter": "D", "text": "The RSO may declare subsequent pregnancies verbally"}], "answer": "C", "explanation": "Each pregnancy is a separate event and requires its own voluntary written declaration. A prior declaration does not automatically carry forward. The worker may choose not to declare or may withdraw a declaration in writing, so a supervisor cannot substitute a verbal declaration.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "9", "stem": "What is the usual annual dose limit to an individual member of the public from licensed operations?", "options": [{"letter": "A", "text": "10 mrem (0.1 mSv)"}, {"letter": "B", "text": "500 mrem (5 mSv)"}, {"letter": "C", "text": "5 rem (50 mSv)"}, {"letter": "D", "text": "100 mrem (1 mSv)"}], "answer": "D", "explanation": "The usual public limit is 100 mrem (1 mSv) per year from licensed operations. It excludes natural background and the person's own medical exposure, among specified exclusions.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "10", "stem": "An authorized user approves a visitor to provide comfort and care to a patient who cannot yet be released. What maximum dose may that visitor receive?", "options": [{"letter": "A", "text": "0.5 rem (5 mSv)"}, {"letter": "B", "text": "0.1 rem (1 mSv)"}, {"letter": "C", "text": "1.5 rem (15 mSv)"}, {"letter": "D", "text": "5 rem (50 mSv)"}], "answer": "A", "explanation": "A visitor providing comfort and care may receive up to 0.5 rem (5 mSv) when the authorized user approves the exposure in advance. This is a specific exception to the ordinary public limit.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "11", "stem": "Which exposure is excluded when determining compliance with the public dose limit from licensed operations?", "options": [{"letter": "A", "text": "Dose from a facility's improperly shielded storage room"}, {"letter": "B", "text": "Natural background radiation"}, {"letter": "C", "text": "Dose to a visitor from handling a package"}, {"letter": "D", "text": "Dose from airborne releases caused by the licensee"}], "answer": "B", "explanation": "Natural background radiation is excluded, as are the individual's own medical exposure and specified patient-related or research exposures. Dose caused by the licensee's operations generally remains part of the compliance calculation.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "12", "stem": "When is occupational monitoring generally required for an adult worker?", "options": [{"letter": "A", "text": "Only after the worker exceeds an annual limit"}, {"letter": "B", "text": "Whenever the worker enters a hospital"}, {"letter": "C", "text": "When the worker is likely to receive more than 10% of an applicable annual occupational limit"}, {"letter": "D", "text": "Only when handling alpha emitters"}], "answer": "C", "explanation": "Adult monitoring is required when an individual is likely to receive more than 10% of an applicable annual occupational limit. Monitoring is preventive and cannot wait until a limit has already been exceeded.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "13", "stem": "Which projected annual dose requires monitoring of a minor?", "options": [{"letter": "A", "text": "More than 25 mrem whole body"}, {"letter": "B", "text": "More than 1.5 rem whole body"}, {"letter": "C", "text": "Any measurable whole-body dose"}, {"letter": "D", "text": "More than 100 mrem whole body"}], "answer": "D", "explanation": "A minor must be monitored when likely to receive more than 100 mrem deep-dose equivalent, more than 150 mrem to the lens, or more than 500 mrem shallow dose to skin or an extremity. These are monitoring triggers, not the minor's annual dose limits, which are higher.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "14", "stem": "When is monitoring required for a declared pregnant worker on the basis of fetal dose?", "options": [{"letter": "A", "text": "When the embryo/fetus is likely to receive more than 100 mrem during the entire pregnancy"}, {"letter": "B", "text": "Only when fetal dose is expected to exceed 500 mrem"}, {"letter": "C", "text": "Whenever the worker remains employed after declaration"}, {"letter": "D", "text": "Only during the first trimester"}], "answer": "A", "explanation": "Monitoring is required if the embryo/fetus is likely to receive more than 100 mrem during the entire pregnancy. The regulatory dose limit is 500 mrem, so the monitoring trigger is intentionally lower.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "15", "stem": "A worker's quarterly occupational dose exceeds 10% of an annual limit. What should the RSO do?", "options": [{"letter": "A", "text": "Wait until the annual report is issued"}, {"letter": "B", "text": "Investigate the exposure, evaluate ALARA practices, and assess dosimeter placement"}, {"letter": "C", "text": "Automatically suspend the worker's license"}, {"letter": "D", "text": "Delete the reading if no symptoms occurred"}], "answer": "B", "explanation": "The RSO should investigate quarterly exposures above 10% of an annual limit, including whether work practices remain ALARA and whether the dosimeter was worn appropriately. The trigger calls for review, not automatic punishment or alteration of the record.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "16", "stem": "Which dose records should be maintained for a declared pregnant worker?", "options": [{"letter": "A", "text": "Only the worker's routine whole-body dose"}, {"letter": "B", "text": "Only an estimated fetal dose at delivery"}, {"letter": "C", "text": "The worker's occupational dose and the dose to the embryo/fetus"}, {"letter": "D", "text": "No records unless the pregnancy limit is exceeded"}], "answer": "C", "explanation": "The licensee maintains the declared worker's occupational dose record and the embryo/fetal dose record, with the fetal record linked to the worker's monitoring record. Recordkeeping begins before an exceedance occurs.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "17", "stem": "Which statement about annual individual dose reports is correct?", "options": [{"letter": "A", "text": "They may omit internal dose whenever external dose is low"}, {"letter": "B", "text": "They are sent only to workers who exceed a limit"}, {"letter": "C", "text": "They replace the licensee's underlying dose records"}, {"letter": "D", "text": "They should preserve privacy while reporting the required monitoring results"}], "answer": "D", "explanation": "Required dose reports must convey the monitored dose while protecting personal information. Reporting does not replace the licensee's duty to retain the underlying records, and it is not limited only to overexposed workers.", "images": [], "explanationImages": [], "sourceChapter": 4}, {"number": "18", "stem": "Which person must be monitored regardless of whether the projected dose is below 10% of the routine annual occupational limit?", "options": [{"letter": "A", "text": "A worker who enters a high or very high radiation area"}, {"letter": "B", "text": "A receptionist outside the restricted area"}, {"letter": "C", "text": "A visitor who remains in an unrestricted hallway"}, {"letter": "D", "text": "A courier carrying an empty, surveyed package"}], "answer": "A", "explanation": "Individuals entering high or very high radiation areas require monitoring because of the potential dose rates. The usual 10% projected-dose trigger is not the only monitoring criterion.", "images": [], "explanationImages": [], "sourceChapter": 4}];
    const APP_ID = "risc-2026-regulatory-exposure-limits-quiz-ch4";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID + ":bank-2";
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 2,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID || payload.version !== 2) throw new Error("This saved state is for a different quiz version.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
