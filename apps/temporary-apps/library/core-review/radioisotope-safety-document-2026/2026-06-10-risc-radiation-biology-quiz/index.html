<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISC Chapter 2: Radiation Biology Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Pediatric Gastrointestinal Tract Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":2,"appId":"risc-2026-radiation-biology-quiz-ch2",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "The mnemonic R-E-A-D represents which four radiation quantities?", "options": [{"letter": "A", "text": "Radiation, emission, attenuation, and decay"}, {"letter": "B", "text": "Radioactivity, exposure, absorbed dose, and dose equivalent"}, {"letter": "C", "text": "Roentgen, effective dose, activity, and dose rate"}, {"letter": "D", "text": "Radioactivity, energy, air kerma, and deterministic effect"}], "answer": "B", "explanation": "R-E-A-D stands for radioactivity, exposure, absorbed dose, and dose equivalent. The mnemonic separates activity of a source from radiation in air, energy deposited in tissue, and biologically weighted dose.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "2", "stem": "Which units measure the activity of a radioactive source?", "options": [{"letter": "A", "text": "Gray and rad"}, {"letter": "B", "text": "Sievert and rem"}, {"letter": "C", "text": "Curie and becquerel"}, {"letter": "D", "text": "Roentgen and coulomb per kilogram"}], "answer": "C", "explanation": "Activity is measured in curies (Ci) or becquerels (Bq), and 1 mCi equals 37 MBq. Gray/rad measure absorbed dose, sievert/rem measure equivalent or effective dose, and roentgen or C/kg measure exposure in air.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "3", "stem": "Which description best characterizes an alpha particle?", "options": [{"letter": "A", "text": "A massless photon with low LET and high penetration"}, {"letter": "B", "text": "An electron that is readily shielded by a few millimeters of plastic"}, {"letter": "C", "text": "A free neutron capable of initiating nuclear reactions"}, {"letter": "D", "text": "A helium nucleus with high LET and a very short tissue range"}], "answer": "D", "explanation": "An alpha particle contains two protons and two neutrons, has high linear energy transfer, and travels only about 10-100 um in tissue. Its short range limits external penetration, but alpha emitters can be highly damaging when inhaled, ingested, or delivered therapeutically.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "4", "stem": "Which material is generally most appropriate for stopping beta particles while limiting bremsstrahlung production?", "options": [{"letter": "A", "text": "Acrylic"}, {"letter": "B", "text": "Lead"}, {"letter": "C", "text": "Tungsten"}, {"letter": "D", "text": "Depleted uranium"}], "answer": "A", "explanation": "A few millimeters of a low-atomic-number material such as acrylic can stop beta particles. High-atomic-number materials such as lead or tungsten promote bremsstrahlung x-ray production when beta particles decelerate near nuclei.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "5", "stem": "What is produced when a positron annihilates with an electron?", "options": [{"letter": "A", "text": "One 1,022-keV photon"}, {"letter": "B", "text": "Two 511-keV photons traveling in opposite directions"}, {"letter": "C", "text": "Two 140-keV photons traveling in the same direction"}, {"letter": "D", "text": "An alpha particle and a neutrino"}], "answer": "B", "explanation": "Positron-electron annihilation produces two 511-keV photons traveling in approximately opposite directions. Coincident detection of these photons is the physical basis of PET imaging. A single 140-keV photon is characteristic of technetium-99m, while beta-minus decay emits an electron rather than an annihilation pair.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "6", "stem": "Which property makes gamma rays useful for general nuclear medicine imaging?", "options": [{"letter": "A", "text": "High LET and a tissue range of only a few micrometers"}, {"letter": "B", "text": "Positive charge and direct ionization density"}, {"letter": "C", "text": "Low LET and relatively high penetration"}, {"letter": "D", "text": "Complete absorption by a few millimeters of plastic"}], "answer": "C", "explanation": "Gamma rays are massless photons with low LET and high penetration, allowing photons emitted within the patient to reach an external detector. Alpha particles have high LET and short range, while plastic shielding is associated with beta particles.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "7", "stem": "Bremsstrahlung x-rays are generated when which event occurs?", "options": [{"letter": "A", "text": "A positron annihilates with an electron"}, {"letter": "B", "text": "An alpha particle captures two electrons"}, {"letter": "C", "text": "A gamma photon undergoes radioactive decay"}, {"letter": "D", "text": "A beta-minus particle is deflected near a high-atomic-number nucleus"}], "answer": "D", "explanation": "Bremsstrahlung results when a beta-minus particle is deflected and decelerated near a nucleus, especially a high-Z nucleus such as lead or tungsten. This is why low-Z materials are preferred as the first layer of beta shielding.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "8", "stem": "Which statement correctly distinguishes physical, biological, and effective half-life?", "options": [{"letter": "A", "text": "Effective half-life accounts for both nuclear decay and biological clearance"}, {"letter": "B", "text": "Physical half-life describes excretion; biological half-life describes nuclear decay"}, {"letter": "C", "text": "Effective half-life is always longer than physical and biological half-life"}, {"letter": "D", "text": "Biological half-life is fixed for a radionuclide regardless of the compound or patient"}], "answer": "A", "explanation": "Physical half-life describes nuclear decay, biological half-life describes removal from the body, and effective half-life combines both processes. Because either process can remove activity, effective half-life is shorter than either component half-life considered alone.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "9", "stem": "A radionuclide has a physical half-life of 6 hours and a biological half-life of 3 hours. What is its effective half-life?", "options": [{"letter": "A", "text": "1 hour"}, {"letter": "B", "text": "2 hours"}, {"letter": "C", "text": "3 hours"}, {"letter": "D", "text": "9 hours"}], "answer": "B", "explanation": "Effective half-life equals (physical half-life x biological half-life) divided by their sum. For 6 and 3 hours, (6 x 3)/(6 + 3) = 2 hours. It must be shorter than both the physical and biological half-lives.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "10", "stem": "Which quantity describes radiation present in air and is measured in roentgen or coulomb per kilogram?", "options": [{"letter": "A", "text": "Activity"}, {"letter": "B", "text": "Absorbed dose"}, {"letter": "C", "text": "Exposure"}, {"letter": "D", "text": "Dose equivalent"}], "answer": "C", "explanation": "Exposure describes radiation in air and is measured in roentgen or C/kg. Activity describes nuclear transformations, absorbed dose describes energy deposited per tissue mass, and dose equivalent incorporates radiation weighting.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "11", "stem": "Approximately what exposure is associated with one chest radiograph in the RISC document?", "options": [{"letter": "A", "text": "1 mR"}, {"letter": "B", "text": "100 mR"}, {"letter": "C", "text": "1 R"}, {"letter": "D", "text": "10 mR"}], "answer": "D", "explanation": "The document uses approximately 10 mR as the exposure equivalent of one chest radiograph. This is an exposure-in-air quantity, not an absorbed or effective patient dose.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "12", "stem": "Which conversion between absorbed-dose units is correct?", "options": [{"letter": "A", "text": "100 rad = 1 Gy"}, {"letter": "B", "text": "1 rad = 100 Gy"}, {"letter": "C", "text": "10 rad = 1 Gy"}, {"letter": "D", "text": "100 rem = 1 Gy"}], "answer": "A", "explanation": "One gray equals 100 rad. Gray and rad are absorbed-dose units; rem is a dose-equivalent unit and cannot be substituted without considering radiation weighting. Roentgen and coulomb per kilogram describe exposure in air, so they are not interchangeable with absorbed-dose units either.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "13", "stem": "The same amount of energy is deposited in a kidney and a liver. Which organ has the greater absorbed dose?", "options": [{"letter": "A", "text": "The liver, because its mass is larger"}, {"letter": "B", "text": "The kidney, because its mass is smaller"}, {"letter": "C", "text": "They are equal because energy is equal"}, {"letter": "D", "text": "It cannot be determined without a radiation weighting factor"}], "answer": "B", "explanation": "Absorbed dose is energy deposited per unit mass. For the same deposited energy, the smaller organ has the greater absorbed dose. Radiation weighting is needed for dose equivalent, not for the basic absorbed-dose comparison.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "14", "stem": "Which radiation types have the highest linear energy transfer among the choices listed?", "options": [{"letter": "A", "text": "Beta particles and x-rays"}, {"letter": "B", "text": "Gamma rays and x-rays"}, {"letter": "C", "text": "Alpha particles and neutrons"}, {"letter": "D", "text": "Positrons and gamma rays"}], "answer": "C", "explanation": "Alpha particles and neutrons have higher LET and produce denser ionization than beta particles, x-rays, or gamma rays. Higher LET is associated with greater biological damage for the same absorbed dose.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "15", "stem": "What radiation weighting factor is assigned to alpha particles in the RISC table?", "options": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "5"}, {"letter": "C", "text": "10"}, {"letter": "D", "text": "20"}], "answer": "D", "explanation": "Alpha particles have a radiation weighting factor of 20. X-rays, gamma rays, and beta particles are assigned 1; slow neutrons are 5 and fast neutrons are 10 in the table.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "16", "stem": "Which radiation type has a weighting factor of 10 in the RISC table?", "options": [{"letter": "A", "text": "Fast neutrons"}, {"letter": "B", "text": "Beta particles"}, {"letter": "C", "text": "Slow neutrons"}, {"letter": "D", "text": "Gamma rays"}], "answer": "A", "explanation": "Fast neutrons have a weighting factor of 10. Slow neutrons are assigned 5, while beta particles and gamma rays are assigned 1. Alpha particles have the largest factor in the table, 20, reflecting their higher linear energy transfer.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "17", "stem": "How is organ or tissue dose equivalent calculated?", "options": [{"letter": "A", "text": "Activity multiplied by tissue mass"}, {"letter": "B", "text": "Absorbed dose multiplied by the radiation weighting factor"}, {"letter": "C", "text": "Exposure divided by physical half-life"}, {"letter": "D", "text": "Absorbed dose multiplied only by the tissue weighting factor"}], "answer": "B", "explanation": "Dose equivalent accounts for radiation quality by multiplying absorbed dose by the radiation weighting factor. Tissue weighting is applied later when calculating effective dose, which accounts for organ sensitivity.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "18", "stem": "Which organs share the highest tissue weighting factor listed in the RISC table?", "options": [{"letter": "A", "text": "Brain, skin, and bone surface"}, {"letter": "B", "text": "Bladder, liver, esophagus, and thyroid"}, {"letter": "C", "text": "Colon, lung, red bone marrow, stomach, and breast"}, {"letter": "D", "text": "Gonads only"}], "answer": "C", "explanation": "Colon, lung, red bone marrow, stomach, and breast each have a tissue weighting factor of 0.12. Gonads are 0.08; bladder, liver, esophagus, and thyroid are 0.04; brain, skin, salivary glands, and bone surface are 0.01.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "19", "stem": "Which tissue weighting factor is assigned to the gonads?", "options": [{"letter": "A", "text": "0.01"}, {"letter": "B", "text": "0.04"}, {"letter": "C", "text": "0.12"}, {"letter": "D", "text": "0.08"}], "answer": "D", "explanation": "The gonadal tissue weighting factor is 0.08. Colon, lung, red marrow, stomach, and breast are higher at 0.12; bladder, liver, esophagus, and thyroid are 0.04; and the lowest listed group is 0.01. These tissue factors describe relative contribution to stochastic risk, not radiation type.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "20", "stem": "What does total effective dose equivalent (TEDE) combine under NRC regulations?", "options": [{"letter": "A", "text": "External effective dose equivalent and committed effective dose equivalent from internal exposure"}, {"letter": "B", "text": "Only shallow dose to skin and extremities"}, {"letter": "C", "text": "Activity administered and activity excreted"}, {"letter": "D", "text": "Physical half-life and biological half-life"}], "answer": "A", "explanation": "TEDE combines effective dose equivalent from external exposure with committed effective dose equivalent from internal exposure. It is intended to account for known internal and external exposure, not activity or half-life.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "21", "stem": "A report lists a value in mCi and another value in mSv. What do these values represent, respectively?", "options": [{"letter": "A", "text": "Absorbed dose and activity"}, {"letter": "B", "text": "Activity and biologically weighted dose"}, {"letter": "C", "text": "Exposure in air and absorbed do ells. Nerve and muscle cells are comparatively radioresistant because they divide infrequently.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "25", "stem": "Why does an oxygen-rich environment increase indirect radiation injury?", "options": [{"letter": "A", "text": "Oxygen prevents ionization of water"}, {"letter": "B", "text": "Reactive oxygen species generated from water can damage DNA, proteins, and lipids"}, {"letter": "C", "text": "Oxygen increases physical half-life"}, {"letter": "D", "text": "Oxygen converts gamma rays into alpha particles"}], "answer": "B", "explanation": "Indirect injury occurs when radiation interacts with water and generates reactive oxygen species. These reactive species damage DNA, proteins, and lipids; oxygen-rich tissues therefore show greater indirect radiation effect.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "26", "stem": "What acute whole-body dose is approximately associated with an LD50/30?", "options": [{"letter": "A", "text": "0.4-0.5 Sv"}, {"letter": "B", "text": "1-2 Sv"}, {"letter": "C", "text": "4-5 Sv"}, {"letter": "D", "text": "40-50 Sv"}], "answer": "C", "explanation": "The RISC document places the LD50/30 at roughly 400-450 rem, or about 4-5 Sv, delivered over a short period. LD50/30 means a dose expected to kill 50% of an exposed population within 30 days.", "images": [], "explanationImages": [], "sourceChapter": 2}, {"number": "27", "stem": "Which statement best describes a deterministic tissue reaction?", "options": [{"letter": "A", "text": "Its probability increases with dose, but severity is independent of dose"}, {"letter": "B", "text": "It has no threshold and is modeled linearly at low dose"}, {"letter": "C", "text": "It is limited to hereditary effects"}, {"letter": "D", "text": "It has a threshold, and severity increases as dose increases above that threshold"}], "answer": "D", "explanation": "Deterministic effects have a threshold below which they ar     const APP_ID = "risc-2026-radiation-biology-quiz-ch2";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID + ":bank-2";
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 2,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID || payload.version !== 2) throw new Error("This saved state is for a different quiz version.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
