<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISC Chapter 5: Radiopharmaceutical Administration Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>Pediatric Gastrointestinal Tract Quiz</h1>
      </div>
      <div class="counter" id="score">0 answered</div>
    </div>
  </header>
  <main>
    <nav aria-label="Question list">
      <div class="nav-head">
        <div class="nav-title">Questions</div>
        <button type="button" id="hideNav">Hide</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>
    </nav>
    <section class="question-panel" aria-live="polite">
      <div class="topline">
        <div>
          <div class="counter" id="questionCounter"></div>
          <button type="button" id="showNav">Show Questions</button>
        </div>
        <div class="tools">
          <div class="mode-switch" aria-label="Study mode">
            <button type="button" id="tutorMode" class="active">Tutor</button>
            <button type="button" id="quizMode">Quiz</button>
          </div>
          <button type="button" id="settingsButton">Settings</button>
        </div>
      </div>
      <div id="imageGrid" class="images"></div>
      <div id="stem" class="stem"></div>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button type="button" class="primary" id="submit">Submit Answer</button>
        <button type="button" id="prev">Previous</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="reviewQuiz">Review Quiz</button>
      </div>
      <div class="result" id="result">
        <div class="feedback-head">
          <div class="status" id="status"></div>
          <div class="feedback-tools">
            <button type="button" id="copyQuestionText">Copy Question Text</button>
            <button type="button" id="copyScreenshot">Copy Screenshot</button>
          </div>
        </div>
        <div id="explanationImageGrid" class="explanation-images"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="review-panel" id="reviewPanel">
        <div class="status" id="reviewStatus"></div>
        <div class="review-meta">Select a question below to review its answer explanation above.</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>
      <div class="notice" id="notice"></div>
    </section>
  </main>
  <div class="lightbox" id="lightbox" role="presentation">
    <img id="lightboxImage" alt="" />
  </div>
  <dialog id="settingsDialog">
    <div class="settings-head">
      <h2>Settings</h2>
      <button type="button" id="closeSettings">Close</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <button type="button" id="copyState">Copy Saved State JSON</button>
        <button type="button" id="downloadState">Download Saved State</button>
        <button type="button" id="resetState">Reset Test</button>
      </div>
      <div class="settings-field">
        <label for="stateImport">Paste saved state JSON from another computer</label>
        <textarea id="stateImport" placeholder='{"version":2,"appId":"risc-2026-radiopharmaceutical-administration-quiz-ch5",...}'></textarea>
      </div>
      <div class="settings-row">
        <button type="button" class="primary" id="importState">Load Pasted State</button>
      </div>
    </div>
  </dialog>
  <textarea id="clipboardScratch"></textarea>
  <script>
    const QUESTIONS = [{"number": "1", "stem": "Why are short-lived radionuclides generally preferred for diagnostic radiopharmaceuticals?", "options": [{"letter": "A", "text": "They provide the needed imaging interval while reducing unnecessary retained activity and dose"}, {"letter": "B", "text": "They eliminate the need to measure administered activity because decay corrects any preparation error"}, {"letter": "C", "text": "They can be administered without FDA oversight"}, {"letter": "D", "text": "They produce only nonionizing radiation"}], "answer": "A", "explanation": "A diagnostic radionuclide should persist long enough to perform the study but decay promptly afterward, limiting unnecessary dose. A short half-life does not eliminate activity measurement, regulatory controls, or ionizing radiation.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "2", "stem": "Which pathway permits routine marketing of a radiopharmaceutical for an approved clinical indication?", "options": [{"letter": "A", "text": "A local radiation safety committee vote alone"}, {"letter": "B", "text": "An FDA-approved new drug application or abbreviated new drug application"}, {"letter": "C", "text": "An investigational new drug application with no FDA involvement"}, {"letter": "D", "text": "A package transport certificate issued by the Department of Transportation"}], "answer": "B", "explanation": "Routine clinical marketing requires an FDA-approved NDA or ANDA. An IND governs investigational use, while a radiation safety committee and transportation regulators address different responsibilities.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "3", "stem": "Which information should appear on a radiopharmaceutical container label?", "options": [{"letter": "A", "text": "Only the radionuclide name and radiation symbol"}, {"letter": "B", "text": "The patient's complete medical history, allergies, prior examinations, and current laboratory results"}, {"letter": "C", "text": "Radionuclide, chemical form, activity with calibration date and time, expiration, and identifying pharmacy information"}, {"letter": "D", "text": "Only the prescribed activity, with no calibration time"}], "answer": "C", "explanation": "The label must identify what the product is, how much activity it contains and when that activity applies, its expiration, and traceable pharmacy or lot information. Activity without a calibration time is incomplete because radioactive decay changes the quantity.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "4", "stem": "Which preparation requires the intended patient's name on the label before delivery?", "options": [{"letter": "A", "text": "A unit dose of technetium-99m intended for a routine diagnostic scan"}, {"letter": "B", "text": "A multidose vial retained in the hot lab"}, {"letter": "C", "text": "A sealed calibration source"}, {"letter": "D", "text": "A radiolabeled blood component prepared for reinjection"}], "answer": "D", "explanation": "Radiolabeled blood components and therapeutic radiopharmaceuticals require patient-specific identification. Diagnostic doses may use a temporary process when the name is not yet available, but the dose must later be associated with the patient.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "5", "stem": "A diagnostic unit dose is prepared before the patient's name is known. How long may the pharmacy use a temporary identifier before associating the dose with the patient?", "options": [{"letter": "A", "text": "72 hours"}, {"letter": "B", "text": "24 hours"}, {"letter": "C", "text": "48 hours"}, {"letter": "D", "text": "7 days"}], "answer": "A", "explanation": "A diagnostic dose may be prepared using a temporary identifier when the patient's name is unavailable, but the patient association must be completed within 72 hours and retained as required. This limited diagnostic exception does not remove the need for traceability or permit patient-specific therapeutic products to remain unidentified.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "6", "stem": "A prescribed activity is 10 mCi. The measured activity at administration is 7.8 mCi, and the authorized user did not revise the prescription. Which statement is correct?", "options": [{"letter": "A", "text": "The activity is acceptable because lower activities have no tolerance requirement"}, {"letter": "B", "text": "The activity is outside the usual plus-or-minus 20% administration range"}, {"letter": "C", "text": "The activity may be given if the technologist documents the difference afterward"}, {"letter": "D", "text": "The activity is within tolerance because 2.2 mCi is less than 20 mCi"}], "answer": "B", "explanation": "A measured activity should generally be within plus or minus 20% of the prescribed amount unless the authorized user revises the prescription beforehand. A dose of 7.8 mCi is 22% below 10 mCi, so it falls outside that range. The percentage is relative to the prescription, not an absolute millicurie difference.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "7", "stem": "When may an authorized user modify a prescribed activity so that the available dose falls within the authorized range?", "options": [{"letter": "A", "text": "Only after administration and only if the dose was too low"}, {"letter": "B", "text": "After administration, by asking the technologist to revise the recorded prescription to match the measured dose"}, {"letter": "C", "text": "Before administration, by revising the prescription or written directive as applicable"}, {"letter": "D", "text": "Never; a prescription cannot be changed"}], "answer": "C", "explanation": "An authorized user may revise the prescription before administration, provided all applicable written-directive requirements are met. Retrospective alteration of a record does not cure an unauthorized administration.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "8", "stem": "Which patient-identification practice is appropriate immediately before radiopharmaceutical administration?", "options": [{"letter": "A", "text": "Use the room number together with the scheduled examination because both are unique during the appointment"}, {"letter": "B", "text": "Ask one staff member who the patient is"}, {"letter": "C", "text": "Use the radiopharmaceutical label as the sole identifier"}, {"letter": "D", "text": "Confirm two approved identifiers, such as full name and date of birth"}], "answer": "D", "explanation": "Two independent patient identifiers are required. Room number, procedure, or staff recognition alone is not sufficiently specific. The administration record and product label must be matched to the identified patient.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "9", "stem": "An unidentified emergency patient requires an urgent radiopharmaceutical study. What is the best approach?", "options": [{"letter": "A", "text": "Use two temporary identifiers and formalize the identity as soon as possible"}, {"letter": "B", "text": "Delay administration until registration supplies a permanent legal name and government-issued identification"}, {"letter": "C", "text": "Use the room number as the only identifier"}, {"letter": "D", "text": "Administer the dose without creating any patient record"}], "answer": "A", "explanation": "Urgent care need not wait for a permanent identity. The facility should assign two distinct temporary identifiers and reconcile them with the formal identity as soon as possible.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "10", "stem": "Which event involving a pregnant patient must be reported under the fetal-dose provision?", "options": [{"letter": "A", "text": "Any diagnostic administration performed during pregnancy"}, {"letter": "B", "text": "An embryo/fetal dose exceeding 5 rem that was not specifically approved in advance"}, {"letter": "C", "text": "A fetal dose exceeding 100 mrem after any approved therapy"}, {"letter": "D", "text": "Any administration to a patient younger than 50 years"}], "answer": "B", "explanation": "An unintended embryo/fetal dose greater than 5 rem is reportable unless the dose was specifically approved in advance as part of the intended medical treatment. Pregnancy alone does not make every administration a reportable event.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "11", "stem": "A reportable dose to an embryo, fetus, or nursing child is discovered. Which reporting sequence is required?", "options": [{"letter": "A", "text": "A written report within 24 hours, with no telephone report"}, {"letter": "B", "text": "Telephone notification within 30 days and a written report within 90 days"}, {"letter": "C", "text": "Telephone notification to the regulator by the next calendar day and a written report within 15 days"}, {"letter": "D", "text": "Notification only during the next license renewal"}], "answer": "C", "explanation": "The regulator is notified by telephone no later than the next calendar day, followed by a written report within 15 days. Patient-identifying information is not included in the regulatory report.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "12", "stem": "How should a reportable fetal or nursing-child exposure affect urgent patient care?", "options": [{"letter": "A", "text": "Treatment must stop until the NRC completes its review"}, {"letter": "B", "text": "Only nonradioactive treatment may continue"}, {"letter": "C", "text": "The patient must be transferred to a federal facility"}, {"letter": "D", "text": "Required reporting and notification should not delay medically necessary care"}], "answer": "D", "explanation": "Regulatory reporting is important, but it must not delay necessary clinical care. The treating clinician should manage the patient while the facility completes the required notifications.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "13", "stem": "A breastfeeding patient is released after radiopharmaceutical administration. What dose criterion protects the nursing child or other individual?", "options": [{"letter": "A", "text": "The expected dose should not exceed 500 mrem (5 mSv)"}, {"letter": "B", "text": "The expected dose should not exceed 5 rem (50 mSv)"}, {"letter": "C", "text": "No dose criterion applies after the patient leaves the facility"}, {"letter": "D", "text": "The expected dose must be zero"}], "answer": "A", "explanation": "Release is permitted when exposure to another individual is not likely to exceed 500 mrem (5 mSv). Written instructions are required when continued breastfeeding could give the child more than 100 mrem (1 mSv).", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "14", "stem": "When are written breastfeeding instructions required?", "options": [{"letter": "A", "text": "Whenever any diagnostic radiopharmaceutical is administered"}, {"letter": "B", "text": "When continued breastfeeding could deliver more than 100 mrem (1 mSv) to the child"}, {"letter": "C", "text": "Only when the expected child dose exceeds 500 mrem"}, {"letter": "D", "text": "Only for technetium-99m studies"}], "answer": "B", "explanation": "Written guidance on interruption or discontinuation is required when the nursing child could receive more than 100 mrem if breastfeeding continued. The 500-mrem value is the broader release-dose criterion, not the instruction trigger.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "15", "stem": "What counseling is appropriate before therapeutic radioiodine for a patient who is breastfeeding?", "options": [{"letter": "A", "text": "Stop breastfeeding only on the morning of therapy"}, {"letter": "B", "text": "Continue breastfeeding with a lead apron over the infant"}, {"letter": "C", "text": "Stop breastfeeding at least 6 weeks before treatment"}, {"letter": "D", "text": "Pump and discard milk for 4 hours, then resume"}], "answer": "C", "explanation": "The RISC guidance calls for cessation of breastfeeding at least 6 weeks before therapeutic radioiodine. This reduces breast uptake and contamination risk; a brief interruption is not adequate.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "16", "stem": "Which radiopharmaceutical requires permanent discontinuation of breastfeeding for the current child?", "options": [{"letter": "A", "text": "Fluorine-18 FDG"}, {"letter": "B", "text": "Technetium-99m sestamibi"}, {"letter": "C", "text": "Nitrogen-13 ammonia"}, {"letter": "D", "text": "Iodine-131 sodium iodide"}], "answer": "D", "explanation": "Iodine-131 requires permanent discontinuation for the current child. Fluorine-18 generally requires a 4-hour interruption, technetium-99m products generally 24 hours, and nitrogen-13 no interruption in the RISC table.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "17", "stem": "Which breastfeeding recommendation is paired correctly with the radiopharmaceutical?", "options": [{"letter": "A", "text": "Fluorine-18: 4-hour interruption"}, {"letter": "B", "text": "Gallium-67: no interruption"}, {"letter": "C", "text": "Technetium-99m: permanent discontinuation"}, {"letter": "D", "text": "Indium-111 labeled leukocytes: 24-hour interruption"}], "answer": "A", "explanation": "The table recommends 4 hours for fluorine-18. Gallium-67 requires a much longer interruption, technetium-99m products generally require 24 hours, and indium-111 labeled leukocytes require several days.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "18", "stem": "Where should a ring dosimeter be worn while preparing radiopharmaceuticals?", "options": [{"letter": "A", "text": "Over the glove on the nondominant hand, detector facing away from the source"}, {"letter": "B", "text": "Under the glove on the hand most likely to receive exposure, detector facing the palm"}, {"letter": "C", "text": "At the wrist outside the lab coat, detector facing the elbow"}, {"letter": "D", "text": "On either hand with the detector orientation ignored"}], "answer": "B", "explanation": "The ring is worn under the glove on the hand expected to receive the greatest exposure, with the detector toward the palm. This position better estimates dose to the most exposed finger while keeping the dosimeter clean.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "19", "stem": "Which syringe shielding is generally preferred when handling positron-emitting radiopharmaceuticals?", "options": [{"letter": "A", "text": "Thin aluminum only"}, {"letter": "B", "text": "Acrylic only"}, {"letter": "C", "text": "Tungsten"}, {"letter": "D", "text": "No shielding because positrons have a short range"}], "answer": "C", "explanation": "High-density tungsten syringe shields are commonly used for positron emitters because annihilation photons require substantial attenuation. Positron range alone does not eliminate external photon exposure.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "20", "stem": "Which material is preferred as the first layer of shielding for a high-energy beta emitter?", "options": [{"letter": "A", "text": "Lead"}, {"letter": "B", "text": "Tungsten"}, {"letter": "C", "text": "Depleted uranium"}, {"letter": "D", "text": "A low-atomic-number material such as acrylic"}], "answer": "D", "explanation": "A low-Z material such as acrylic or aluminum reduces beta energy with less bremsstrahlung production. Dense high-Z lead placed directly against a beta source can increase bremsstrahlung; additional outer shielding may then be used for the secondary photons.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "21", "stem": "Why should a patient be surveyed after administration before leaving the radiopharmacy or injection area?", "options": [{"letter": "A", "text": "To confirm that no contamination is present on the patient or nearby articles"}, {"letter": "B", "text": "To recalculate the physical half-life"}, {"letter": "C", "text": "To determine whether the prescribed activity was FDA approved"}, {"letter": "D", "text": "To replace the preadministration identity check"}], "answer": "A", "explanation": "A postadministration survey can identify contamination on the patient, chair, floor, or supplies so it can be controlled promptly. It complements rather than replaces activity measurement and patient identification.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "22", "stem": "What additional monitoring is associated with handling more than 10 mCi of volatile iodine-131?", "options": [{"letter": "A", "text": "Daily chest radiographs"}, {"letter": "B", "text": "A bioassay program for potentially exposed personnel"}, {"letter": "C", "text": "A second transport index"}, {"letter": "D", "text": "Continuous fetal monitoring"}], "answer": "B", "explanation": "Because volatile iodine can be inhaled and concentrated by the thyroid, personnel handling quantities above the specified threshold require bioassay monitoring. External survey alone may miss internal uptake.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "23", "stem": "Which control is most appropriate when working with a volatile radioiodine preparation?", "options": [{"letter": "A", "text": "Use only a lead apron"}, {"letter": "B", "text": "Open all room doors to improve air circulation"}, {"letter": "C", "text": "Prepare it in a suitable fume hood or containment system"}, {"letter": "D", "text": "Rely on a ring dosimeter as the primary contamination control"}], "answer": "C", "explanation": "A fume hood or appropriate containment controls airborne radioiodine. A lead apron and dosimeter measure or attenuate selected external exposure but do not prevent inhalation or room contamination.", "images": [], "explanationImages": [], "sourceChapter": 5}, {"number": "24", "stem": "What is a key radiation-safety concern after a xenon-133 ventilation study?", "options": [{"letter": "A", "text": "The patient becomes a sealed source for 120 days"}, {"letter": "B", "text": "Bremsstrahlung from the patient's skin is the dominant hazard"}, {"letter": "C", "text": "All room surfaces must be disposed of as low-level waste"}, {"letter": "D", "text": "Exhaled gas and collection-system waste require containment and adequate room-clearance time"}], "answer": "D", "explanation": "Xenon-133 is a radioactive gas, so exhaled activity must be trapped or exhausted appropriately and the room may need a calculated clearance interval. The principal issue is airborne activity, not long-term sealed-source behavior.", "images": [], "explanationImages": [], "sourceChapter": 5}];
    const APP_ID = "risc-2026-radiopharmaceutical-administration-quiz-ch5";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID + ":bank-2";
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: false };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen === true,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 2,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID || payload.version !== 2) throw new Error("This saved state is for a different quiz version.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen === true;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
