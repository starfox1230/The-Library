  <style>

  <script>
    const QUESTIONS = [{"number": "1", "stem": "Which of the following is true regarding the brain perfusion imaging using HMPAO and ECD?", "options": [{"letter": "A", "text": "HMPAO and ECD are lipophilic agents with low first-pass extraction."}, {"letter": "B", "text": "The distribution of HMPAO and that of ECD within the brain parenchyma are identical."}, {"letter": "C", "text": "Images are usually acquired 30 to 60 minutes after the injection."}, {"letter": "D", "text": "Peak brain activity occurs at 15 to 20 minutes after the injection."}], "images": [], "explanationImages": ["assets/a1_p165_01.jpg"], "answer": "C", "explanation": "Answer C. Tc-99m hexamethylpropyleneamine oxime (HMPAO [Ceretec]) and ethyl cysteinate dimer (ECD [Neurolite]) are lipophilic agents with a high first-pass extraction across the blood- brain barrier (see image below for an example of examination with a preserved brain flow and parenchymal perfusion). Peak brain activity occurs within the first few minutes of the injection. Once inside the neuron, both become trapped by metabolic conversion into nondiffusible forms. As such, their distribution on delayed images corresponds to the regional cerebral blood flow at the time of injection. However, in order to allow for an optimal target to background noise ratio, imaging is usually delayed for 30 to 60 minutes for ECD and 30 to 90 minutes for HMPAO after the injection. The distribution of Tc-99m HMPAO differs slightly from that of Tc-99m ECD. HMPAO accumulates more in the frontal lobes, thalami, and cerebellum, while ECD has a high affinity for the parietal and occipital lobes. As such, the same agent should be used for serial examinations, such as those done for seizure evaluation.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:62-63. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:364-367."}, {"number": "2", "stem": "Which of the following is true regarding the localization of seizure focus using SPECT perfusion and F-18 FDG-PET metabolism imaging?", "options": [{"letter": "A", "text": "Interictal studies are more sensitive than ictal studies."}, {"letter": "B", "text": "Interictal perfusion SPECT study is superior to interictal PET."}, {"letter": "C", "text": "Interictal hypometabolism/hypoperfusion is common with extratemporal epilepsy."}, {"letter": "D", "text": "Interictal PET is most helpful in patients with complex partial seizures."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Ictal perfusion SPECT studies are more sensitive than interictal studies for seizure focus localization. Due to seizure-induced increased blood flow, seizure foci present as areas of increased activity on the ictal perfusion SPECT. On the other hand, blood flow in the region of epileptic foci is either normal or reduced soon after or in between seizures. As such, seizure foci are harder to detect on the interictal SPECT images. In this regard, the interictal F-18 FDG-PET is superior to the interictal SPECT perfusion. Specifically, interictal FDG-PET is very sensitive (80%) in localizing refractory complex partial seizures, which typically originate from the temporal lobe. Interictal SPECT or PET is frequently used to increase the specificity of the findings seen on the ictal study.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:71-72. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:365-368."}, {"number": "3", "stem": "Which of the following procedures is most sensitive in diagnosing seizures of extratemporal origin?", "options": [{"letter": "A", "text": "Ictal FDG-PET"}, {"letter": "B", "text": "Interictal FDG-PET"}, {"letter": "C", "text": "Ictal perfusion SPECT"}, {"letter": "D", "text": "Interictal perfusion SPECT"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. While interictal F-18 FDG is very sensitive (80%) in localizing refractory partial complex seizures originating from the temporal lobe, it is not sensitive in the evaluation of extratemporal seizure focus. Ictal perfusion SPECT with ECD or HMPAO is most sensitive when extratemporal seizure focus is expected. Interictal hypometabolism and hypoperfusion are uncommon with extratemporal epilepsy, and interictal SPECT or PET is not ideal for its evaluation. For ictal studies, the patients are taken off their seizure medications, admitted, and continuously monitored for the onset of a seizure. The radiopharmaceutical is kept at the bedside until the seizure occurs. Once the seizure is identified, the radiotracer is injected during or within 20 seconds after the completion of the seizure.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:71-72. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:365-368."}, {"number": "4", "stem": "F-18 FDG hypometabolism in which region helps differentiate dementia with Lewy bodies from Alzheimer disease?", "options": [{"letter": "A", "text": "Basal ganglia"}, {"letter": "B", "text": "Anterior cingulate gyrus"}, {"letter": "C", "text": "Occipital cortex"}, {"letter": "D", "text": "Anterior temporal lobes"}, {"letter": "E", "text": "Frontal lobes"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Dementia with Lewy bodies (DLB) is the second most common type of primary dementia. The pattern of FDG hypometabolism in DLB may be similar to that in Alzheimer disease (AD). However, DLB shows the involvement of the visual cortex, which is spared in AD. Involvement of the visual cortices in DLB may explain visual hallucinations reported by the patients with DLB.\n\nReferences: Bohnen NI, Djang DSW, Herholz K, et al. Effectiveness and safety of 18F-FDG PET in the evaluation of dementia: a review of the recent literature. J Nucl Med 2012;53(1):59-71."}, {"number": "5", "stem": "The following brain death examination was performed using Tc-99m HMPAO in a 16-year-old boy who was found to have dilated and fixed pupils after an ATV accident. Which of the following is the most appropriate conclusion regarding this examination?", "options": [{"letter": "A", "text": "The study is nondiagnostic due to inadequate tracer bolus."}, {"letter": "B", "text": "A conclusion cannot be made without correlation with EEG."}, {"letter": "C", "text": "Hot nose sign is specific for brain death."}, {"letter": "D", "text": "Findings are consistent with brain death."}, {"letter": "E", "text": "Findings are NOT consistent with brain death."}], "images": ["assets/q5_p154_01.jpg", "assets/q5_p155_01.jpg"], "explanationImages": ["assets/a5_6_p166_01.jpg"], "answer": "D", "explanation": "Answer D. Anterior dynamic images of the brain death examination with Tc-99m HMPAO demonstrates termination of the internal carotid artery flow at the skull base with absent cortical uptake on the delayed anterior and lateral perfusion images. The findings are consistent with absent cerebral perfusion and brain death. A blush of increased activity is seen in the nasal region, which is referred to as the \"hot nose\" sign. It is felt to be secondary to the diversion of the intracranial blood flow to the external carotid circulation. However, this sign is nonspecific for brain death as it can be seen in internal carotid artery occlusion without brain death. While dynamic flow images can be obtained with both HMPAO and ECD, unlike for Tc-99m DTPA, they are not necessary as the absence of cerebral uptake on delayed images implies absent blood flow. Lack of intracerebral blood flow is diagnostic of brain death, and radionuclide brain death study alone is sufficient for its diagnosis. The brain death study is usually performed in the setting of an equivocal clinical examination and/or EEG. And unlike EEG, it is not affected by drug intoxication or hypothermia. While the lack of intracerebral blood flow can be demonstrated with four-vessel arteriography, radionuclide brain death study is noninvasive, simple, rapid, and specific.\n\nReferences: Donohoe KJ, Agrawal G, Frey KA, et al. SNM practice guideline for brain death scintigraphy 2.0. J Nucl Med Technol 2012;40:198-203. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:63-65. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:398-399."}, {"number": "6", "stem": "The following coronal interictal (A) and ictal (B) Tc-99m HMPAO SPECT-CT images, as well as axial interictal F-18 FDG-PET (C), images are from a patient with a clinical history of intractable complex partial seizures. What is your conclusion?", "options": [{"letter": "A", "text": "Right mesial temporal sclerosis."}, {"letter": "B", "text": "Left mesial temporal sclerosis."}, {"letter": "C", "text": "Seizure focus cannot be localized."}, {"letter": "D", "text": "Right temporal glioblastoma multiforme."}, {"letter": "E", "text": "Left temporal glioblastoma multiforme."}], "images": ["assets/q6_p156_01.jpg"], "explanationImages": ["assets/a5_6_p166_01.jpg"], "answer": "A", "explanation": "Answer A. The coronal ictal SPECT-CT image (B) demonstrates increased perfusion to the right temporal lobe compared to the left (arrow). Coronal interictal SPECT-CT (A) and axial F-18 FDG-PET (C) images demonstrate relatively decreased perfusion and metabolism to the right temporal lobe compared to the left, respectively (arrowheads). These findings are most compatible with seizure focus within the right temporal lobe, likely from mesial temporal sclerosis. Glioblastoma multiforme is a high-grade primary brain malignancy that would demonstrate increased perfusion and metabolism.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:71-72. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:393, 396-397."}, {"number": "7", "stem": "The following F-18 FDG-PET imaging is from a 65-year-old gentleman with progressive cognitive decline and a normal MRI. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Multi-infarct dementia (MID)"}, {"letter": "B", "text": "Alzheimer disease (AD)"}, {"letter": "C", "text": "Frontotemporal dementia (FTD)"}, {"letter": "D", "text": "Dementia with Lewy bodies (DLB)"}], "images": ["assets/q7_p157_01.jpg"], "explanationImages": ["assets/a7_8_p167_01.jpg"], "answer": "B", "explanation": "Answer B. The axial F-18 FDG-PET images demonstrate moderate to severe, asymmetric hypometabolism involving bilateral posterior parietal and temporal lobes (left greater than right). This pattern of hypometabolism distribution is typically seen with Alzheimer disease (AD). AD is the most common cause of primary dementia representing 50% to 60% of total cases. The addition of FDG-PET to routine clinical information increases the diagnostic accuracy and physician confidence in diagnosing AD. The added diagnostic value of FDG-PET is similar to the information gleaned during a longitudinal clinical follow-up period of about 4 years. In early AD, there is involvement of the posterior cingulate gyrus and superior posterior parietal cortex, which is often asymmetric. As the disease progresses, there is greater involvement of the temporal lobes and frontal cortices. However, there is sparing of the anterior cingulate (involved in frontotemporal dementia), occipital visual cortex (involved in dementia with Lewy bodies), primary sensory and motor cortices, cerebellum, and basal ganglia.\n\nReferences: Bohnen NI, Djang DS, Herholz K, et al. Effectiveness and safety of 18F-FDG-PET in the evaluation of dementia: a review of the recent literature. J Nucl Med 2012;53(1):59-71. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:371-376."}, {"number": "8", "stem": "The following F-18 florbetapir axial imaging is from a patient undergoing evaluation of cognitive dysfunction. Which of the following statements is MOST accurate regarding the amyloid imaging of the brain?", "options": [{"letter": "A", "text": "A positive Amyvid scan establishes the diagnosis of Alzheimer disease."}, {"letter": "B", "text": "Amyvid scan can predict the development of dementia and cognitive decline."}, {"letter": "C", "text": "Amyvid scan can be used for monitoring the treatment response of Alzheimer disease."}, {"letter": "D", "text": "A negative scan reduces the likelihood of Alzheimer disease."}], "images": ["assets/q8_p158_01.jpg"], "explanationImages": ["assets/a7_8_p167_01.jpg"], "answer": "D", "explanation": "Answer D. A single axial image from F-18 florbetapir (Amyvid) shows diffuse uptake throughout the cortical gray matter, with loss of contrast between the white and the gray matter. The findings are in keeping with the presence of moderate to abundant amyloid plaques. A major limitation of Amyvid is that a positive scan does not establish the diagnosis of Alzheimer disease (AD). While this appearance with moderate to abundant amyloid plaques is seen with Alzheimer disease (AD), corroborative clinical evidence is required to establish the diagnosis of AD as a similar pattern may be seen in patients with other types of neurologic conditions as well as older people with normal cognition. On the other hand, a negative Amyvid PET scan (scan from a different patient below) would make it unlikely that the patient's cognitive impairment would be due to AD. Additionally, the safety and effectiveness of Amyvid have not been established for predicting the development of dementia or other neurologic conditions, determining the severity of dementia, or monitoring responses to therapies.\n\nReferences: Amyvid [package insert]. Indianapolis, IN: Lilly USA, LLC, 2013. (www.amyvid.com) Johnson KA, Minoshima S, et al. Appropriate use criteria for amyloid PET: a report of the Amyloid Imaging Task Force, the Society of Nuclear Medicine and Molecular Imaging, and the Alzheimer's Association. J Nucl Med 2013;54(3):476-490."}, {"number": "9a", "stem": "The following examination was performed on a patient with tremors. This radiopharmaceutical is an analog of what naturally occurring substance?", "options": [{"letter": "A", "text": "Dopamine"}, {"letter": "B", "text": "Cocaine"}, {"letter": "C", "text": "Somatostatin"}, {"letter": "D", "text": "Serotonin"}], "images": ["assets/q9a_p158_02.jpg"], "explanationImages": ["assets/a9a_p168_01.jpg"], "answer": "B", "explanation": "Answer B. I-123 ioflupane is an analog of cocaine. It reversibly binds with high affinity to the dopamine transporter (DaT) protein, a marker for presynaptic terminals in dopaminergic nigrostriatal neurons. In patients with parkinsonian syndromes (idiopathic Parkinson disease, progressive supranuclear palsy, and multiple system atrophy), there is destruction of nigrostriatal neurons leading to decreased uptake of the radiopharmaceutical in the striatum. The decreased uptake initially occurs in the posterior striatum (posterior putamen) and then moves anteriorly (anterior putamen and then caudate nucleus). In the United States, DaTscan is approved as an adjunct to other diagnostic evaluations in differentiating tremor secondary to the parkinsonian syndromes from the essential tremor. A normal DaTscan (see image below) in a patient with movement disorder would suggest essential tremor. In this case, delayed images acquired after the IV administration of I-123 ioflupane demonstrate absent radiotracer uptake within the left lentiform nucleus (putamen and globus pallidus, aka posterior striatum) with a mild reduction in radiopharmaceutical uptake within the left caudate nucleus. Relatively normal radiopharmaceutical uptake is noted within the right striatum. In this patient with tremor, the findings are most compatible with parkinsonian syndromes. For comparison purposes, a normal DaTscan is shown below. Stimulants such as cocaine, amphetamines, ephedrine, and methylphenidate severely decrease I- 123 ioflupane uptake. Other medications known to interfere with DaTscan include selective serotonin-reuptake inhibitors (SSRI), which bind to DaT with high affinity and may up-regulate or down-regulate its expression. Anti-Parkinson disease medications such as carbidopa or levodopa act on the postsynaptic dopamine receptors and, therefore, do not interfere with DaTscan and may be continued as prescribed.\n\nReferences: Grosset DG, Tatsch K, Oertel WH, et al. Safety analysis of 10 clinical trials and for 13 years after first approval of ioflupane 123I injection (DaTscan). J Nucl Med 2014;55(8):1281-1287. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:391-395."}, {"number": "9b", "stem": "If this patient had a clinical history of progressive cognitive decline, what would be the most likely cause of this patient's memory impairment?", "options": [{"letter": "A", "text": "Huntington chorea"}, {"letter": "B", "text": "Multi-infarct dementia"}, {"letter": "C", "text": "Alzheimer disease"}, {"letter": "D", "text": "Frontotemporal dementia"}, {"letter": "E", "text": "Dementia with Lewy bodies"}], "images": [], "explanationImages": [], "answer": "E", "explanation": "Answer E. Dementia with Lewy bodies (DLB) is usually accompanied by visual hallucinations, fluctuating mental status, and parkinsonism. F-18 FDG-PET in DLB patients demonstrates hypometabolism in the primary visual cortex, which is spared in Alzheimer disease (AD). In cases where the differentiation between AD and DLB is difficult on FDG-PET, DaTscan may help differentiate between the two. Patients with AD and frontotemporal dementia will have a normal DaTscan, while patients with parkinsonian syndromes and DLB will have abnormal DaTscan. It is important to diagnose DLB because patients with DLB may have improved cognition from acetylcholinesterase inhibition, and their movement disorder may benefit from antiparkinsonian therapy. In Huntington chorea, patients have uncontrollable choreiform movements and dementia. Generally, reduced radiotracer uptake is seen in the caudate nucleus on PET or SPECT imaging, followed by atrophy of the basal ganglia seen on the anatomic imaging.\n\nReferences: Grosset DG, Tatsch K, Oertel WH, et al. Safety analysis of 10 clinical trials and for 13 years after first approval of ioflupane 123I injection (DaTscan). J Nucl Med 2014;55(8):1281-1287. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:391-395."}, {"number": "10", "stem": "Acetazolamide challenge has been used to evaluate cerebrovascular reserve in patients with chronic cerebrovascular diseases such as moyamoya. What is the mechanism by which acetazolamide assesses the cerebrovascular reserve?", "options": [{"letter": "A", "text": "Vasodilatation by binding to adenosine receptors"}, {"letter": "B", "text": "Vasodilatation by blocking adenosine uptake by cells"}, {"letter": "C", "text": "Vasodilatation by increasing nitrous oxide concentration"}, {"letter": "D", "text": "Vasodilatation by increasing carbon dioxide concentration"}, {"letter": "E", "text": "Increased cerebral blood flow by increasing the cardiac output"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Acetazolamide (ACZ) penetrates the blood-brain barrier slowly and causes increased carbon dioxide concentration by inhibiting carbonic anhydrase. The resultant carbonic acidosis causes a significant increase in cerebral blood flow (CBF). A standard dose of 1,000 mg intravenously is used for the ACZ challenge test. Peak CBF augmentation occurs at approximately 10 to 15 minutes after intravenous bolus administration with a 30% to 60% increase in CBF achieved in healthy subjects. Systemic blood pressure, heart rate, respiratory rate, arterial CO2, and arterial pH are unaffected. Adenosine and regadenoson cause vasodilatation by binding to the adenosine receptor, while dipyridamole causes vasodilatation by increasing the adenosine concentration by blocking its uptake by cells. None of these other agents crosses the blood-brain barrier.\n\nReferences: Rogg J, Rutigliano M, et al. The acetazolamide challenge: imaging techniques and designed to evaluate cerebral blood flow reserve. AJR Am J Roentgenol 1989;53:605-612. Vagal AS, Leach JL, Fernandez-Ulloa M, et al. The acetazolamide challenge: techniques and applications in the evaluation of chronic cerebral ischemia. AJNR Am J Neuroradiol 2009;30(5):876-884."}, {"number": "11", "stem": "The following cisternogram images are from a 60-year-old gentleman who has a history of unsteady gait and memory loss. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Alzheimer disease"}, {"letter": "B", "text": "Normal-pressure hydrocephalus"}, {"letter": "C", "text": "Cerebral atrophy"}, {"letter": "D", "text": "CSF leak"}], "images": ["assets/q11_p160_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Anterior immediate, 4-hour, 24-hour, and 48-hour images acquired after the intrathecal administration of In-111 DTPA demonstrate the migration of the radiotracer to the skull base at 4 hours. There is a penetration of the radiopharmaceutical into the ventricular system (ventricular reflux) at 4 hours, which persists at 24 and 48 hours. Also, there is delayed migration of the radiotracer over the cerebral convexities with no significant activity over the cerebral convexity at 24 hours. In a patient with the supplied medical history, the findings are most consistent with normal pressure hydrocephalus (NPH). NPH is a form of communicating hydrocephalus in which the opening CSF pressures are normal. It is caused by impaired absorption of the CSF by the arachnoid granulations. The classic clinical triad includes dementia, gait disturbance, and incontinence. Patients with NPH showing ventricular penetration on cisternogram respond better to ventricular shunt placement when compared to those without. Images from a different patient shown below also show delayed migration of the radiotracer over the cerebral convexity without the presence of ventricular penetration, in keeping with NPH. Normal CSF dynamics demonstrate the migration of intrathecally injected radiopharmaceutical into the basal cisterns of the posterior and middle cranial fossae by 1 to 3 hours. It appears in frontal poles and sylvian fissures by 2 to 6 hours, and cerebral convexities by 12 hours. Images from a different patient below show normal CSF flow dynamics with radiopharmaceutical in between the frontal poles and sylvian fissure at 4 hours and over the cerebral convexity at 24 hours. Due to its long half-life of 2.8 days, In-111 DTPA is used in the evaluation of CSF dynamics and slow CSF leaks resulting in otorrhea and rhinorrhea. In cases where high count statistics are necessary and which do not require longer imaging time (i.e., spinal dural leak, CSF shunt evaluation), Tc-99m DTPA can be used instead. DTPA is ideal for CSF imaging as it does not get metabolized or get absorbed across the ependyma. Once at the cerebral convexity, it gets absorbed through the arachnoid villi and rapidly gets cleared by the kidneys.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 6th ed. Philadelphia, PA: Saunders, 2012:91-96."}, {"number": "12", "stem": "Examination with which of the following radiopharmaceuticals would be most helpful in differentiating between Alzheimer disease and frontotemporal dementia?", "options": [{"letter": "A", "text": "F-18 FDG"}, {"letter": "B", "text": "I-123 ioflupane"}, {"letter": "C", "text": "F-18 florbetapir"}, {"letter": "D", "text": "F-18 flurpiridaz"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Because of the prominent involvement of frontal lobes in advanced Alzheimer disease (AD), differentiation of advanced AD from frontotemporal dementia (FTD) is often difficult. The diagnostic accuracy of F-18 FDG-PET in distinguishing AD patients from normal subjects is >90%, but it has poor specificity in differentiating AD from other causes of primary dementia. Beta-amyloid imaging would be most helpful in differentiating AD from FTD as it would be markedly abnormal in AD but normal in FTD. The first FDA-approved and most widely used radiotracer for in vivo identification of beta-amyloid (AÎ²) plaques was F-18 florbetapir (Amyvid). Other FDA-approved agents for imaging beta-amyloid include F-18 florbetaben (Neuraceq) and F-18 flutemetamol (Vizamyl). A negative beta-amyloid imaging PET scan would show predominant white matter retention, while a positive scan would display increasing gray matter retention. Amyloid imaging demonstrates the earliest abnormality in AD, even before F-18 FDG-PET is abnormal. However, a positive amyloid PET scan in itself is not definitive for AD; the presence of beta-amyloid in the brain serves to increase the clinical certainty of AD diagnosis. A negative scan indicates few or no amyloid plaques, excluding AD. C-11 Pittsburgh compound B (C-11 PIB), a derivative of a fluorescent amyloid dye (thioflavin T), was the first agent with high affinity and specificity for beta-amyloid plaques used in amyloid imaging. However, the use of C- 11 PIB is limited to centers with an on-site cyclotron because of the short 20-minute radioactive half-life of C-11.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:74-77. Rowe CC, Villemagne VL. Brain amyloid imaging. J Nucl Med 2011;52(11):1733-1740. Yang L, Rieves D, Ganley C. Brain amyloid imaging-FDA approval of florbetapir F18 injection. N Engl J Med 2012;367(10):885-887."}, {"number": "13", "stem": "A 60-year-old patient with a history of trauma and positional headaches presents for further evaluation. Based on the supplied planar and SPECT/CT images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "CSF leak"}, {"letter": "B", "text": "Normal-pressure hydrocephalus"}, {"letter": "C", "text": "Meningitis"}, {"letter": "D", "text": "Obstructive hydrocephalus"}, {"letter": "E", "text": "Basal cistern arachnoiditis"}], "images": ["assets/q13_p161_01.jpg", "assets/q13_p161_02.jpg", "assets/q13_p162_01.jpg"], "explanationImages": ["assets/a13_p172_01.jpg"], "answer": "A", "explanation": "Answer A. The anterior and lateral cisternogram images acquired after the intrathecal administration of In-111 DTPA show increased radiotracer accumulation within the region of the left nostril, best visualized on the 4-hour left lateral projection (arrow below). This is confirmed by the SPECT/CT images as well as by measuring the activity within the nasal pledgets. The findings are consistent with a CSF leak in the left nostril. Activity within the colon on the 24-hour delayed image is from swallowed nasal secretions containing the radiotracer from the leak. Approximately 80% of CSF rhinorrhea cases are the result of head trauma, with 16% being iatrogenic and the remaining 4% being spontaneous. Evaluation of CSF leaks should consist of imaging the site of the leak and measuring differential activity in the pledgets placed deep into each nostril or ear, as per history. Pledgets are placed before the intrathecal injection of the radiotracer and are typically removed 4 hours after the placement and counted in a well counter. Simultaneously, blood serum samples should be obtained and counted. The pledget-to-serum ratio of more than 1.5 is interpreted as evidence of the CSF leak. In our patient, the left nostril ratio is significantly higher than 1.5 at 54 in the superior and 45 in the middle left nostril pledgets. It is important to image for a CSF leak at the time the radiotracer reaches the suspected site of the origin of the leak. Apart from images of the thoracic and lumbar spine, head and neck images should be obtained as leaks generally happen near the basilar cisterns. SPECT/CT images provide better anatomic correlation in cases of major leaks. Any position or activity known by the patient to provoke or aggravate the leak of CSF should be accomplished immediately before or during imaging. A delayed image of the abdomen may be obtained to visualize indirect evidence of a CSF leak from swallowed radiotracer activity within bowel loops, such as in this patient. A higher count study with intrathecal injection of Tc-99m DTPA may be better in cases of CSF leak associated with a suspected tear in the spinal cord dura.\n\nReferences: Habibian MR. Nuclear medicine imaging: a teaching file, 2nd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2009:176-177. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 6th ed. Philadelphia, PA: Saunders, 2012:91-96."}, {"number": "14", "stem": "A teenager with mild neurologic impairment complains of worsening headaches. Which of the following radiopharmaceuticals was used to perform this examination?", "options": [{"letter": "A", "text": "Tc-99m pertechnetate"}, {"letter": "B", "text": "Tc-99m HMPAO"}, {"letter": "C", "text": "Tc-99m DTPA"}, {"letter": "D", "text": "Tc-99m sulfur colloid"}], "images": ["assets/q14_p163_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Tc-99m DTPA and In-111 DTPA are the radiopharmaceuticals utilized to evaluate for CSF shunt patency. Tc-99m pertechnetate, Tc-99m sulfur colloid, and Tc-99m HMPAO are not utilized for CSF scintigraphy. In-111-DTPA is the only FDA-approved agent for intrathecal injection. In this examination, Tc-99m DTPA was injected through the reservoir with the distal limb manually occluded to allow the injected tracer to flow into the proximal limb. The images demonstrate prompt flow into the ventricles, followed by spontaneous flow through the distal limb of the shunt catheter into the peritoneal cavity. There is a free distribution of radiopharmaceutical within the peritoneal cavity without pooling of the radiopharmaceutical around the tip of the distal limb. This is a normal CSF shunt evaluation study.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:81-83."}, {"number": "15", "stem": "The following coronal F-18 FDG PET image is from an 85-year-old gentleman with a history of stroke. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Alzheimer dementia"}, {"letter": "B", "text": "Normal-pressure hydrocephalus"}, {"letter": "C", "text": "Pick disease"}, {"letter": "D", "text": "Crossed cerebellar diaschisis"}], "images": ["assets/q15_p164_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. A single coronal PET image demonstrates reduced metabolism in the left cerebral cortex, consistent with a known stroke. There is also a significantly decreased metabolism in the contralateral cerebellum. This finding is consistent with crossed cerebellar diaschisis. Crossed cerebellar diaschisis is defined as a reduction in metabolic activity and blood flow of the cerebellum contralateral to the supratentorial cerebral lesion. Most commonly, the corticopontocerebellar pathway is involved whose origin comes from motor, premotor, parietal association as well as occipital cortices and terminates in the cerebellar gray matter. It can be seen with infarct, supratentorial tumors, epilepsy, or vascular dementia. The cerebellar metabolic and/or perfusion depression is typically asymptomatic. It resolves when occurring with stroke but may persist when associated with brain tumors. It is important to recognize this phenomenon and not to mistake it for a concomitant cerebellar lesion.\n\nReferences: Flores L, Futami S, Hoshi H, et al. Crossed cerebellar diaschisis: analysis of iodine-123-IMP SPECT imaging. J Nucl Med 1995;36(3):399-402. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 6th ed. Philadelphia, PA: Saunders, 2012:91-96."}, {"number": "16", "stem": "Which radiopharmaceutical used in the evaluation of brain death does not cross the blood-brain barrier and, as such, requires an adequate radiotracer bolus?", "options": [{"letter": "A", "text": "Tc-99m DTPA"}, {"letter": "B", "text": "Tc-99m HMPAO"}, {"letter": "C", "text": "Tc-99m ECD"}, {"letter": "D", "text": "Xe-133"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Prior to the advent of HMPAO and ECD, Tc-99m diethylenetriamine pentaacetic acid (DTPA) radionuclide angiography was often used to diagnose brain death because of the rapid clearance of DTPA from the blood. DTPA is a flow agent, which does not cross the blood-brain barrier, and is not retained in the gray matter. As such, DTPA radionuclide angiography requires an optimal technique with a tight bolus, and its interpretation is often difficult. On the other hand, Tc-99m HMPAO and ECD are lipophilic radiopharmaceuticals that readily cross the blood-brain barrier and are retained in the brain parenchyma soon after their injection. While Xe-133 is lipophilic and diffusible, it is not retained in the brain parenchyma as it does not undergo the chemical transformation.\n\nReferences: Catafau AM. Brain SPECT in clinical practice. Part I: perfusion. J Nucl Med 2001;42:259-27. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:66-65. Spieth ME, Ansari EN, Kawada TK, et al. Direct comparison of Tc-99m HMPAO for evaluating brain death. Clin Nucl Med 1994;19:867-872."}, {"number": "17", "stem": "The following interictal F-18 FDG-PET/CT was done for the purpose of seizure focus localization. Which of the following reasons is responsible for the poor diagnostic utility of F-18 FDG during the ictal phase?", "options": [{"letter": "A", "text": "Lower spatial resolution"}, {"letter": "B", "text": "Higher background activity"}, {"letter": "C", "text": "Lower temporal resolution"}, {"letter": "D", "text": "Inability to perform dynamic imaging"}], "images": ["assets/q17_p174_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Coronal and axial F-18 FDG-PET images demonstrate marked, asymmetrically decreased glucose metabolism within the right temporal lobe. If EEG monitoring during the FDG uptake demonstrated no evidence of a seizure, the findings would indicate seizure focus localization within the right temporal lobe. FDG uptake with the brain is gradual, with 95% of the peak uptake occurring around 35 minutes. This is significantly longer than an average seizure focus duration of 1 to 2 minutes. This causes overlap of increased uptake from the ictal phase and relatively decreased uptake during interictal/postictal phases. Because of this lower temporal resolution, F-18 FDG-PET cannot be performed during the ictal phase. Interictal FDG-PET is most helpful in patients with complex partial seizures, which are frequently secondary to mesial temporal lobe epilepsy. Compared to SPECT, FDG-PET has higher spatial resolution and lower background activity. Dynamic PET imaging is possible, and an inability to acquire dynamic images is not the reason why FDG-PET cannot be used for seizure focus evaluation during the ictal phase.\n\nReferences: Kim S, Mountz JM. SPECT imaging of epilepsy: an overview and comparison with F-18 FDG PET. Int J Mol Imaging 2011;2011:813028. Masdeu JC, Arbizu J, Toledo J, et al. [SPECT and PET in neurology]. Neurologia 2006;21(5):219-225. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:71-72."}, {"number": "18", "stem": "The following examination was performed on an 18-year-old for the evaluation of brain death. Which of the following radiopharmaceuticals was most likely injected?", "options": [{"letter": "A", "text": "Tc-99m DTPA"}, {"letter": "B", "text": "Tc-99m DMSA"}, {"letter": "C", "text": "In-111 DTPA"}, {"letter": "D", "text": "Tc-99m HMPAO"}], "images": ["assets/q18_p175_01.jpg"], "explanationImages": ["assets/a18_19_p181_01.jpg"], "answer": "D", "explanation": "Answer D. The supplied images demonstrate the presence of flow in the carotid circulation above the skull base (arrows below) with cortical perfusion seen on delayed images. These findings are consistent with preserved brain perfusion, and diagnosis of brain death CANNOT be made. Retention of the radiopharmaceutical within the brain parenchyma on delayed images suggests that the examination was performed with either HMPAO or ECD. Since HMPAO and ECD remain localized within the brain tissue, they are easier to interpret and are preferred for diagnosing brain death. Planar images are adequate for the purposes of diagnosing brain death, and SPECT is not necessary. Tc-99m DTPA can be used in the evaluation of brain death but would not demonstrate uptake on delayed images as it does not cross the blood-brain barrier. In-111 DTPA is used for the evaluation of CSF dynamics and CSF leaks. Tc-99m DMSA is used for renal cortical imaging.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:63-65. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:398-399."}, {"number": "19", "stem": "The following examination was done in a patient with a clinical history of ataxia, urinary incontinence, and memory loss. What is the half-life of this radiopharmaceutical?", "options": [{"letter": "A", "text": "6 hours"}, {"letter": "B", "text": "13 hours"}, {"letter": "C", "text": "3 days"}, {"letter": "D", "text": "8 days"}], "images": ["assets/q19_p176_01.jpg"], "explanationImages": ["assets/a18_19_p181_01.jpg"], "answer": "C", "explanation": "Answer C. Due to its long half-life of 2.8 days, In-111 DTPA is used in the evaluation of CSF dynamics and slow CSF leaks resulting in otorrhea and rhinorrhea. DTPA is ideal for CSF imaging as it does not get metabolized or get absorbed across the ependyma. Once at the cerebral convexity, it gets absorbed through the arachnoid villi and rapidly gets cleared by the kidneys. In cases when high count statistics are necessary and which do not require longer imaging time (i.e., spinal leak, CSF shunt evaluation), Tc-99m DTPA can be used instead. In this case, the acquired images demonstrate a lack of progression of radiopharmaceutical migration over the cerebral convexities even after 48 hours. In a patient with the supplied clinical history, findings likely represent normal pressure hydrocephalus, a form of communicating hydrocephalus. Normal CSF dynamics demonstrate the migration of intrathecally injected radiopharmaceutical into the basal cisterns by 1-hour, frontal poles and sylvian fissures by 2 to 6 hours, and cerebral convexities by 12 hours. Since the physiologic flow is from the ventricles into the subarachnoid space, normally, there is no reflux of radiopharmaceutical into the ventricular system.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:79-81. Seibyl JP. Imaging studies in movement disorders. Semin Nucl Med 2003;33(2):105-113."}, {"number": "20", "stem": "Based on the below I-123 ioflupane (DaTscan) in a patient with a movement disorder, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Essential tremor"}, {"letter": "B", "text": "Parkinson disease"}, {"letter": "C", "text": "Multisystem atrophy"}, {"letter": "D", "text": "Progressive supranuclear palsy"}], "images": ["assets/q20_p177_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Three-hour delayed axial images acquired after the IV administration of I-123 ioflupane (DaTscan) demonstrate symmetric intense striatal activity with well-delineated borders consistent with a normal examination. A normal DaTscan in a patient with movement disorder would suggest an essential tremor. DaTscan is abnormal in parkinsonian syndromes, which include idiopathic Parkinson disease, progressive supranuclear palsy, and multiple system atrophy.\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:391-395. Seibyl JP. Imaging studies in movement disorders. Semin Nucl Med 2003;33(2):105-113."}, {"number": "21", "stem": "An elderly patient with progressive memory loss underwent the following Tc-99m HMPAO SPECT-CT perfusion imaging. In addition to memory loss, which of the following clinical symptoms would be expected to be present in this patient?", "options": [{"letter": "A", "text": "Seizures"}, {"letter": "B", "text": "Movement disorder"}, {"letter": "C", "text": "Visual hallucinations"}, {"letter": "D", "text": "Ataxia and incontinence"}, {"letter": "E", "text": "Changes in personality and behavior"}], "images": ["assets/q21_p178_01.jpg"], "explanationImages": [], "answer": "E", "explanation": "Answer E. Axial and coronal fused SPECT-CT perfusion brain images demonstrate regional hypometabolism involving bilateral anterior and medial frontal lobes as well as temporal tips. This pattern of abnormality is typically seen with frontotemporal dementia (FTD). Because of the frontal lobe involvement, these patients have an early presentation of changes in personality and behavior. Some patients also present with prominent language changes, such as progressive fluent aphasia. While the overall pattern of distribution in dementias is similar for cerebral perfusion (HMPAO or ECD SPECT) and glucose metabolism (F-18 FDG-PET), FDG-PET has better resolution and sensitivity. Typical areas of hypometabolism in FTD include medial, dorsal lateral, and ventral lateral prefrontal cortex; anterior cingulate gyrus (compared to posterior cingulate gyrus in AD); the tip of the temporal lobes; caudate nuclei; and thalami. Inferior frontal and motor cortices are usually spared. It is important to accurately diagnose FTD because there is no significant cognition benefit of acetylcholinesterase inhibition treatment in these patients, and treatment may actually deteriorate the behavioral changes.\n\nReferences: Bohnen NI, Djang DSW, Herholz K, et al. Effectiveness and safety of 18F-FDG-PET in the evaluation of dementia: a review of the recent literature. J Nucl Med 2012;53(1):59-71. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:77-78. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:380-388."}, {"number": "22", "stem": "A 63-year-old gentleman undergoes chemoradiation therapy for primary head and neck cancer. When is the most optimal time to perform an FDG-PET/CT after completion of the radiation therapy?", "options": [{"letter": "A", "text": "Immediately"}, {"letter": "B", "text": "3 weeks"}, {"letter": "C", "text": "3 months"}, {"letter": "D", "text": "6 months"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. The best sensitivity and specificity for FDG-PET/CT to detect residual/recurrent malignancy in patients receiving combination therapy is 3 to 4 months after the completion of the radiation therapy. Prior to this period, FDG uptake associated with nonspecific inflammatory changes may result in a false-positive examination. Also, false-negative FDG-PET/CT due to stunning of the cancer cells in the first 8 weeks after radiation therapy may result in a false- negative study. A negative FDG-PET 3 to 4 months after the completion of radiation therapy has a very high negative predictive value and is associated with a very good prognosis. Positive FDG- PET findings at this time should be correlated with a direct visual analysis and/or biopsy to exclude recurrent malignancy from a nonspecific uptake. Some studies have suggested that persistent tumor uptake 1 month after radiation therapy is strongly suggestive of residual disease, and early PET scan can alter management due to early detection. However, early evaluation at 1 month after RT may produce high false-negative results.\n\nReferences: Conessa C, Clement P, Foehrenbach H, et al. Value of positron-emission tomography in the post-treatment follow-up of epidermoid carcinoma of the head and neck. Rev Laryngol Otol Rhinol 2001;122:253-258. Greven KM, Williams DW, Keyes JW Jr, et al. Positron emission tomography of patients with head and neck carcinoma before and after high dose irradiation. Cancer 1994;74:1355-1359. Kostakoglu L, Goldsmith SJ. PET in the assessment of therapy response in patients with carcinoma of the head and neck and of the esophagus. J Nucl Med 2004;45(1):56-68."}, {"number": "23", "stem": "The following young patient with moyamoya disease underwent evaluation of cerebrovascular reserve with Tc-99m HMPAO SPECT imaging. What is the most accurate conclusion based on the following baseline (pre-, top) and post-Diamox challenge (post, bottom) perfusion SPECT images?", "options": [{"letter": "A", "text": "The patient will NOT benefit from bypass surgery since there was acetazolamide-induced reduction in the cerebral blood flow."}, {"letter": "B", "text": "The patient will benefit from bypass surgery since there was acetazolamide-induced reduction in cerebral blood flow."}, {"letter": "C", "text": "The role of acetazolamide in evaluating cerebrovascular reserve prior to bypass is not well established."}], "images": ["assets/q23_p179_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Perfusion reserve is one of the more significant prognostic factors in determining the success of extracranial-intracranial (ECIC) bypass surgery in patients with chronic cerebrovascular disease (CVD). Because this surgical procedure has high perioperative morbidity and mortality, careful selection of patients who would benefit from ECIC is important. Rogg et al. classified three types of cerebral blood flow (CBF) responses to acetazolamide (ACZ) using stable xenon-enhanced CT: Type I patients with normal baseline CBF, which increased after the ACZ challenge Type II patients with decreased baseline CBF, which increased after the ACZ challenge Type III patients with normal/decreased CBF at baseline with further paradoxical reduction after ACZ challenge Patients with type III response appear to benefit the most from surgical revascularization. Brain perfusion SPECT with ACZ challenge is the most readily available and widely used technique for the assessment of cerebral hemodynamics to help identify CVD patients who would benefit from ECIC. It has been successfully used in the assessment of brain hemodynamics in patients with chronic cerebrovascular disease before and after bypass surgery.\n\nReferences: Lee H-Y, Paeng JC, Lee DS, et al. Efficacy assessment of cerebral arterial bypass surgery using statistical parametric mapping and probabilistic brain atlas on basal/acetazolamide brain perfusion SPECT. J Nucl Med 2004;45(2):202-206. Rogg J, Rutigliano M, et al. The acetazolamide challenge: imaging techniques and designed to evaluate cerebral blood flow reserve. AJR Am J Roentgenol 1989;53:605-612. Vagal AS, Leach JL, Fernandez-Ulloa M, et al. The acetazolamide challenge: techniques and applications in the evaluation of chronic cerebral ischemia. AJNR Am J Neuroradiol 2009;30(5):876-884."}, {"number": "24", "stem": "With regard to head and neck carcinoma, F-18 FDG-PET/CT is inferior to the conventional imaging (CT/MRI) in which of the following settings?", "options": [{"letter": "A", "text": "Evaluation of response to treatment after definitive chemoradiation therapy"}, {"letter": "B", "text": "Differentiating posttreatment changes from residual/recurrent disease"}, {"letter": "C", "text": "Evaluation of an unknown head and neck primary"}, {"letter": "D", "text": "Initial staging of head and neck primary"}, {"letter": "E", "text": "Evaluation of perineural extension"}], "images": [], "explanationImages": [], "answer": "E", "explanation": "Answer E. FDG-PET/CT is inferior to conventional contrast-enhanced MRI or CT scan in the evaluation of local extent of malignancy and in the evaluation of perineural spread of malignancy. If surgical excision is contemplated, presurgical planning with contrast-enhanced CT or MRI should be considered. However, FDG-PET/CT is superior to conventional imaging in the initial staging of head and neck malignancy, in the evaluation of unknown head and neck primary, and in the evaluation of response to treatment in patients after definitive chemoradiation therapy.\n\nReferences: Al-Ibraheem A, Buck A, Krause BJ, et al. Clinical applications of FDG PET and PET/CT in head and neck cancer. J Oncol 2009;2009:208725."}];
    const APP_ID = "nuclear-medicine-head-neck-quiz-ch4";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
