  <script>
    const QUESTIONS = [{"number": "1", "stem": "Which of the following interventions would LEAST likely help in reducing the abnormal F-18 FDG uptake seen in the following patient?", "options": [{"letter": "A", "text": "Beta-blockers such as propranolol"}, {"letter": "B", "text": "Raising the ambient temperature"}, {"letter": "C", "text": "Phenylephrine"}, {"letter": "D", "text": "Diazepam"}], "images": ["assets/q1_p387_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The supplied images demonstrate intense FDG uptake in bilateral cervical, supraclavicular, subpectoral, and paravertebral regions corresponding to fat attenuation on CT scan. Findings are consistent with physiologic brown adipose tissue (BAT) uptake. BAT is a sympathetically innervated tissue that plays an important role in cold-induced and diet-induced thermogenesis. Physiologic BAT uptake is typically identified in bilateral cervical, supraclavicular, axillary, subpectoral, costovertebral, and retroperitoneal/retrocrural regions. It occurs more commonly in cold weather, young females, and children. Successful strategies to reduce brown fat uptake include preventing exposure to cold temperature, controlling environment temperature prior to and after FDG injection (warm clothing, warm blankets, temperature- controlled rooms at 75Â°F, etc.), avoiding sympathetic stimulants (nicotine, phenylephrine, ephedrine, etc.), pharmacologically by reducing sympathetic activity (beta-blockers such as propranolol), or pharmacologically by using sedatives such as oral or intravenous diazepam. In a study done by Agrawal et al., 40 mg propranolol PO administered 60 minutes prior to F-18 FDG injection resulted in complete resolution of BAT uptake in 90% of patients. Although mixed results have been reported with the success of diazepam in reducing BAT uptake, Rakheja et al. observed a significant reduction in brown fat activity following premedication with 5 mg of diazepam intravenously 10 minutes prior to F-18 FDG administration. Sympathetic stimulants such as phenylephrine are known to cause brown fat activation and increase its FDG uptake.\n\nReferences: Agrawal A, Nair N, Baghel NS. A novel approach for reduction of brown fat uptake on FDG PET. Br J Radiol 2009;82(980):626-631. Garcia C, Bandaru V, Van Nostrand D, et al. Effective reduction of brown fat FDG uptake by controlling environmental temperature prior to PET scan: an expanded case series. Mol Imaging Biol 2010;12(6):652-656. Rakheja R, Ciarallo A, Alabed YZ, et al. Intravenous administration of diazepam significantly reduces brown fat activity on 18F-FDG PET/CT. Am J Nucl Med Mol Imaging 2011;1(1): 29-35."}, {"number": "2", "stem": "With regard to breast cancer, F-18 FDG is LEAST likely to be helpful in which of the following clinical scenarios?", "options": [{"letter": "A", "text": "Initial staging in patients with advanced breast cancer"}, {"letter": "B", "text": "Evaluation of lymph node status in a patient with newly diagnosed breast cancer"}, {"letter": "C", "text": "Evaluating the response to treatment in locally advanced and metastatic breast cancer"}, {"letter": "D", "text": "Staging recurrent or metastatic breast cancer"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Sentinel node localization with Tc-99m sulfur colloid, with or without blue dye, is the preferred method for evaluating nonpalpable lymph nodes in a patient with newly diagnosed breast cancer. Since a negative F-18 FDG-PET scan does not exclude the need for further workup, it has no role in this scenario. Mammography, MRI, and ultrasound are the primary modalities used in screening and diagnosing breast cancer. F-18 FDG-PET is most useful in the initial staging of patients with advanced breast cancer, in monitoring response to therapy, and in the evaluation of patients with suspected recurrence or residual active disease.\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:320-327. Rosen EL, Eubank WB, Mankoff DA. FDG PET, PET/CT, and breast cancer imaging. RadioGraphics 2007;27(suppl 1):S215-S229."}, {"number": "3", "stem": "Which of the following statements is MOST correct regarding the preparation instructions for a patient undergoing F-18 FDG-PET/CT for tumor imaging?", "options": [{"letter": "A", "text": "The patient should fast for at least 12 to 24 hours prior to the examination."}, {"letter": "B", "text": "Hydration with dextrose-containing solutions does not need to be discontinued."}, {"letter": "C", "text": "Diabetic medications should be discontinued for 12 hours prior to the examination."}, {"letter": "D", "text": "Strenuous exercise should be avoided for 24 hours prior to the FDG-PET/CT examination."}, {"letter": "E", "text": "The fasting blood glucose levels should be <250 mg/dL prior to the injection of FDG."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Patient preparation is critical for individuals undergoing evaluation of malignancy by FDG-PET/CT. The goal of patient preparation is to maximize the F-18 FDG uptake by tumor and minimize the normal physiologic uptake in other tissues. The patient should be instructed to fast and not consume beverages, except for water, for at least 4 to 6 hours before the administration of F-18 FDG to decrease physiologic glucose levels and to reduce serum insulin levels. Similarly, IV fluids containing dextrose or parenteral feedings should be withheld for 4 to 6 hours. Since tumor uptake of F-18 FDG is reduced in hyperglycemic states, most institutes reschedule patients if the blood glucose level is >200 mg/dL. Both NCI and ACR recommend avoiding strenuous activities such as jogging, cycling, weight lifting, strenuous housework, and sexual activity for a minimum of 24 hours in order to reduce physiologic muscular uptake. All oral medications, including those for diabetes, can be taken as prescribed. While there are no current guidelines, at our institution patients taking long-acting insulin at night before the study are instructed to take half the dose to avoid an episode of hypoglycemia from a full dose.\n\nReferences: Surasi DS, Bhambhvani P, Baldwin JA, et al. (1)(8)F-FDG PET and PET/CT patient preparation: a review of the literature. J Nucl Med Technol 2014;42(1):5-13."}, {"number": "4", "stem": "The following FDG-PET/CT images were acquired from a patient with a clinical history of head and neck squamous cell carcinoma. What is the most likely etiology for the abnormal intracardiac uptake?", "options": [{"letter": "A", "text": "Atrial thrombus"}, {"letter": "B", "text": "Ventricular thrombus"}, {"letter": "C", "text": "Primary cardiac malignancy"}, {"letter": "D", "text": "Infectious endocarditis"}, {"letter": "E", "text": "Physiologic variant"}, {"letter": "F", "text": "Metastasis"}, {"letter": "G", "text": "Sarcoidosis"}], "images": ["assets/q4_p388_01.jpg"], "explanationImages": ["assets/a4_p409_01.jpg"], "answer": "E", "explanation": "Answer E. Axial fused F-18 FDG-PET/CT and CT images demonstrate a moderate-sized focus of intense FDG uptake corresponding to fat attenuation between left and right atrium (arrow). This is physiologic FDG uptake within lipomatous hypertrophy of the interatrial septum. Lipomatous hypertrophy of the interatrial septum may demonstrate variable degree of FDG uptake. This patient also had significant brown adipose tissue (BAT) uptake elsewhere in the body, and intense uptake within this lipomatous hypertrophy of interatrial septum is likely secondary to BAT within it. A large focus of intense activity in the location of the left ventricle (arrowhead) is physiologic glucose uptake in the anterior wall of the myocardium. Depending on the patient's nutritional status, myocardium can utilize either fatty acids or glucose for metabolism and demonstrate a variable degree of F-18 FDG uptake.\n\nReferences: Rao PM, Woodard PK, Patterson GA, et al. Myocardial metastasis or benign brown fat? Circ Cardiovasc Imaging 2009;2(4):e25-e27."}, {"number": "5", "stem": "F-18 FDG-PET can be false negative in the evaluation of which of the following malignancies?", "options": [{"letter": "A", "text": "Squamous cell carcinoma of the head and neck"}, {"letter": "B", "text": "Squamous cell carcinoma of the lung"}, {"letter": "C", "text": "Esophageal adenocarcinoma"}, {"letter": "D", "text": "Adenocarcinoma of the lung"}, {"letter": "E", "text": "Small cell lung carcinoma"}, {"letter": "F", "text": "Lung carcinoid"}], "images": [], "explanationImages": [], "answer": "F", "explanation": "Answer F. Tumors with low metabolic activity such as bronchioloalveolar carcinoma (adenocarcinoma in situ) and carcinoid tumors can give rise to false-negative FDG-PET results. A well-differentiated lepidic predominant adenocarcinoma and mucinous adenocarcinoma can also be falsely negative on FDG-PET. FDG-PET has been reported to have false-negative results with mucosa-associated lymphoid tissue (MALT), extranodal marginal zone lymphoma, and chronic lymphocytic leukemia (CLL). However, FDG-PET has been found to be useful in the detection of Richter transformation of CLL to large cell lymphoma with a high sensitivity and specificity and negative predictive value. Lesions <1 cm in diameter may be below PET resolution and can be falsely negative on FDG-PET.\n\nReferences: Bruzzi JF, Macapinlac H, Tsimberidou AM, et al. Detection of Richter's transformation of chronic lymphocytic leukemia by PET/CT. J Nucl Med 2006;47(8): 1267-1273. Kostakoglu L, Agress H, Goldsmith SJ. Clinical role of FDG PET in evaluation of cancer patients. RadioGraphics 2003;23(2):315-340. Weiler-Sagie M, Bushelev O, Epelbaum R, et al. (18)F-FDG avidity in lymphoma readdressed: a study of 766 patients. J Nucl Med 2010;51(1):25-30."}, {"number": "6", "stem": "Which of the following is the most likely cause of abnormal findings on the following examination?", "options": [{"letter": "A", "text": "Infection"}, {"letter": "B", "text": "Inflammation"}, {"letter": "C", "text": "Wrong radiopharmaceutical"}, {"letter": "D", "text": "Endogenous or exogenous insulin"}, {"letter": "E", "text": "Exercise"}], "images": ["assets/q6_p389_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. A single anterior MIP image demonstrates the presence of increased FDG uptake diffusely throughout the musculature with intense FDG uptake within the myocardium. Relatively decreased FDG uptake is noted within the brain's gray matter as well as within the liver. This distribution pattern is typically seen with exposure to endogenous or exogenous insulin with resultant uptake of the FDG into the musculature. Causes of endogenous insulin release include recent ingestion of food or beverage containing carbohydrates, IV fluids containing dextrose, and tube feeds. Increased F-18 FDG uptake in the musculature results in decreased availability for tumor uptake, resulting in decreased sensitivity and standard uptake values (SUVs). As such the patients are asked to fast for at least 4 hours, preferably 6 hours prior to F-18 FDG administration. Differential considerations for diffuse muscular uptake include strenuous exercise within 24 hours. However, the FDG uptake would be less diffuse and only involve the muscle groups that were used during the exercise. Also, myocardial uptake would not be as prominent with exercise as with postprandial state. Strenuous exercise causes depletion of muscular glycogen storage, which may result in glucose uptake by the muscle over the next 24 hours. As such, the patients are asked to avoid strenuous exercise for 24 hours prior to the F-18 FDG PET scan.\n\nReferences: Cohade C. Altered biodistribution on FDG-PET with emphasis on brown fat and insulin effect. Semin Nucl Med 2010;40(4):283-293. doi:10.1053/j.semnuclmed.2010.02.001. Review. PubMed PMID: 20513450. Surasi DS, Bhambhvani P, Baldwin JA, et al. (1)(8)F-FDG PET and PET/CT patient preparation: a review of the literature. J Nucl Med Technol 2014;42(1):5-13."}, {"number": "7", "stem": "What degree of FDG uptake is typically observed in low-grade gliomas?", "options": [{"letter": "A", "text": "Higher than normal cortical gray matter"}, {"letter": "B", "text": "Same as normal cortical gray matter"}, {"letter": "C", "text": "Lower than normal cortical gray matter but greater than white matter"}, {"letter": "D", "text": "Similar to the white matter"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Low-grade gliomas typically demonstrate low FDG uptake, similar to or less than that of the white matter. On the other hand, high-grade gliomas such as glioblastoma multiforme demonstrate intense FDG uptake, similar to or slightly less than that of the cortical gray matter. Primary CNS lymphoma typically demonstrates the highest degree of FDG uptake, more than that of the cortical gray matter. A higher degree of FDG uptake is typically associated with a higher grade of malignancy and poorer prognosis. While FDG-PET has been reported to be able to differentiate between radiation necrosis and recurrence, several reports suggest that the ability of FDG-PET to differentiate between radiation necrosis and recurrence is limited.\n\nReferences: Padma MV, Said S, Jacobs M, et al. Prediction of pathology and survival by FDG PET in gliomas. J Neurooncol 2003;64(3):227-237. Ricci PE, Karis JP, Heiserman JE, et al. Differentiating recurrent tumor from radiation necrosis: time for re-evaluation of positron emission tomography? Am J Neuroradiol 1998;19(3):407-413."}, {"number": "8", "stem": "What is the most appropriate next step in this patient with an enlarging pulmonary nodule?", "options": [{"letter": "A", "text": "Follow-up FDG-PET/CT in 1 year"}, {"letter": "B", "text": "No further follow-up necessary"}, {"letter": "C", "text": "Follow-up CT scan in 1 year"}, {"letter": "D", "text": "Image-guided biopsy"}], "images": ["assets/q8_p390_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Axial CT, fused FDG-PET/CT, and MIP images demonstrate the presence of a large noncalcified, non-FDG avid pulmonary nodule within the anteromedial aspect of the left upper lung. Even though benign entities such as pulmonary hamartoma may present similarly, malignancies such as well-differentiated adenocarcinoma, adenocarcinoma in situ, carcinoid, and low-grade lymphoma can be falsely negative on FDG-PET/CT; as such, lack of FDG uptake does not confirm benignancy. In this patient with an enlarging pulmonary nodule, further evaluation with image-guided biopsy would be the most appropriate next step. If this was the initial imaging and prior comparisons were not available, a short-term follow-up CT may be a valid option. Lesions <1 cm may be below the FDG-PET resolution and also be false negative on FDG-PET in which case follow-up chest CT should be considered.\n\nReferences: Chang JM, Lee HJ, Goo JM, et al. False-positive and false-negative FDG-PET scans in various thoracic diseases. Korean J Radiol 2006;7(1):57-69. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:315-320. Ziessman HA, O'Malley JP, Thrall JH. Nuclear medicine: the requisites, 4th ed. Philadelphia, PA: Saunders, 2014:248."}, {"number": "9", "stem": "The following patient with HIV/AIDS presents with a headache. Based on the supplied images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Progressive multifocal leukoencephalopathy"}, {"letter": "B", "text": "Intracerebral abscess"}, {"letter": "C", "text": "Toxoplasmosis"}, {"letter": "D", "text": "Metastasis"}, {"letter": "E", "text": "Lymphoma"}], "images": ["assets/q9_p391_01.jpg"], "explanationImages": [], "answer": "E", "explanation": "Answer E. Axial MRI (FLAIR and T1 postcontrast), PET/CT, and PET images demonstrate markedly hypermetabolic (greater than that of the gray matter), slightly heterogeneously enhancing mass within the subependymal region of the left periventricular white matter (arrows on image below). There is no significant surrounding T2 hyperintensity on FLAIR images. The appearance, location, and marked intense FDG uptake are characteristics of primary CNS lymphoma (PCNSL). PCNSL demonstrates the most pronounced metabolic activity, more than that seen with high-grade gliomas (GBM) or metastasis. Less likely differential for this appearance would include glioblastoma multiforme (GBM). Enhancement with GBM would be typically more heterogeneous, and it would usually demonstrate significant surrounding T2 hyperintensity on FLAIR from tumor infiltration/vasogenic edema. Also, FDG uptake in GBM would be more heterogeneous with the degree of FDG uptake, while intense (equal or slightly less than gray matter), not as intense as PCNSL. An abscess would demonstrate ring enhancement with T2- hypointense rim and surrounding edema on FLAIR. Although toxoplasmosis can produce enhancing brain lesions in a patient with HIV/AIDS, it would not demonstrate significant FDG uptake. Progressive multifocal leukoencephalopathy manifests as T2 hyperintensity without enhancement and typically involves subcortical U fibers and corpus callosum. Metastasis is more common at the gray-white matter junction, and the degree of FDG uptake is usually significantly lower than that of primary CNS lymphoma seen in this case.\n\nReferences: Haldorsen IS, Espeland A, Larsson E-M. Central nervous system lymphoma: characteristic findings on traditional and advanced imaging. Am J Neuroradiol 2011;32(6):984-992."}, {"number": "10", "stem": "The following images are from a 30-year-old male with a clinical history of retroperitoneal lymphoma (arrows) before and after initiation of chemotherapy. Which of the following is the most likely etiology of the abnormal finding on the follow-up FDG-PET scan?", "options": [{"letter": "A", "text": "Malignant"}, {"letter": "B", "text": "Infectious"}, {"letter": "C", "text": "Physiologic"}, {"letter": "D", "text": "Inflammatory"}], "images": ["assets/q10_p392_01.jpg"], "explanationImages": ["assets/a10_p412_01.jpg"], "answer": "C", "explanation": "Answer C. The follow-up positron emission tomography images after chemotherapy demonstrate resolution of intense FDG uptake within the retroperitoneal lymphadenopathy. However, there is now diffuse slightly heterogeneous intense FDG uptake within the axial and proximal appendicular skeleton. These findings are most compatible with physiologic bone marrow hyperplasia (BMH) secondary to granulocyte colony-stimulating factor (G-CSF). Increased splenic activity may also be seen in BMH secondary to extramedullary hematopoiesis. Increased FDG uptake by bone marrow with G-CSF therapy is felt to be secondary to increase in bone marrow metabolism and cellularity in response to the treatment. It is important to recognize this as a physiologic finding and not to misinterpret it as progression of disease. Findings of BMH commonly persist for 2 to 4 weeks after cessation of therapy. BMH has also been reported in G- CSF-producing lung tumors. Similar findings can also be seen in patients with severe anemia.\n\nReferences: Morooka M, Kubota K, Murata Y, et al. (18)F-FDG-PET/CT findings of granulocyte colony stimulating factor (G-CSF)- producing lung tumors. Ann Nucl Med 2008;22(7):635-639. Sugawara Y, Fisher SJ, Zasadny KR, Kison PV, et al. Preclinical and clinical studies of bone marrow uptake of fluorine-1- fluorodeoxyglucose with or without granulocyte colony-stimulating factor during chemotherapy. J Clin Oncol 1998;16(1):173-180."}, {"number": "11", "stem": "The following F-18 FDG-PET/CT images are from a 55-year-old gentleman with newly diagnosed lung cancer. What is the most likely cause of abnormal uptake in the neck marked by the arrow on the MIP image?", "options": [{"letter": "A", "text": "Metastasis"}, {"letter": "B", "text": "Second primary malignancy"}, {"letter": "C", "text": "Physiologic"}, {"letter": "D", "text": "Infection"}, {"letter": "E", "text": "Inflammation"}], "images": ["assets/q11_p393_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. A large intensely FDG-avid mass is present within the medial aspect of the left upper lobe, which invades into the mediastinum at the level of the aortic arch. Abnormal uptake in the neck corresponds to asymmetric intense FDG uptake within the right vocal cord (arrows in image below). No FDG uptake is present within the left vocal cord. Findings are due to physiologic FDG uptake in the right vocal cord with none in the left vocal cord secondary to the left vocal cord paralysis. The left recurrent laryngeal nerve (RLN) branches from the left vagus nerve in the thorax and travels inferior and posterior to the aortic arch before ascending into the neck. As such, any mass in the region of the aortic arch can result in its paralysis. The right RLN branches from the right vagus nerve in the neck anterior to the right subclavian artery at the level of T1-T2 and travels inferior and posterior to the right subclavian artery to ascend in the neck. There is no mass corresponding to the vocal cord on the CT, making second primary malignancy unlikely; slight asymmetry on CT is secondary to paralysis. Metastasis involving vocal cord would be highly unusual. Since there is no significant asymmetry or stranding, infection/inflammation is unlikely likewise.\n\nReferences: Komissarova M, Wong KK, et al. Spectrum of 18F-FDG PET/CT findings in oncology-related recurrent laryngeal nerve palsy. Am J Roentgenol 2009;192(1):288-294."}, {"number": "12", "stem": "The following FDG-PET/CT is from a 67-year-old gentleman with extensive history of smoking and newly diagnosed right upper lobe lung mass. Which of the following is the most likely cause of abnormal FDG uptake within the right parotid gland?", "options": [{"letter": "A", "text": "Infection"}, {"letter": "B", "text": "Metastasis"}, {"letter": "C", "text": "Warthin tumor"}, {"letter": "D", "text": "Adenoid cystic carcinoma"}], "images": ["assets/q12_p393_02.jpg"], "explanationImages": ["assets/a12_p413_01.jpg"], "answer": "C", "explanation": "Answer C. About 80% of parotid tumors are benign, with benign mixed-cell tumors (pleomorphic adenomas) being the most common and Warthin tumor the second most common. Warthin tumor and pleomorphic adenoma are the most common causes of incidental FDG-avid parotid mass. An isolated parotid metastasis from a lung primary is unlikely. While adenoid cystic carcinoma is almost always FDG avid, it is rare. Given the focal nature of the abnormality and lack of surrounding stranding, infection is less likely. According to a recently published study in patients who underwent FDG-PET/CT for an oncologic indication by Makis et al., only 4% of the incidental FDG-positive parotid lesions were malignant. The degree of FDG uptake in the Warthin tumor (SUVmax 10.3) was considerably greater than that of the malignancy (SUVmax 7.4), and degree of FDG uptake did not differentiate benign from malignant lesions.\n\nReferences: Dua SG, Purandare NC, Shah S, et al. Bilateral synchronous and multifocal Warthin's tumor mimicking metastases from lung cancer: a rare cause of false positive flourodeoxy glucose positron emission tomography/computed tomography. Indian J Nucl Med 2012;27(2):139-140. Makis W, Ciarallo A, Gotra A. Clinical significance of parotid gland incidentalomas on F-FDG PET/CT. Clin Imaging 2015;39(4):667-671."}, {"number": "13", "stem": "A 25-year-old gentleman with Hodgkin lymphoma presents for evaluation of response to treatment with F-18 FDG-PET/CT. Based on the pretreatment and posttreatment images provided, what is the most appropriate Deauville score on the posttreatment scan?", "options": [{"letter": "A", "text": "0"}, {"letter": "B", "text": "1"}, {"letter": "C", "text": "2"}, {"letter": "D", "text": "3"}, {"letter": "E", "text": "4"}, {"letter": "F", "text": "5"}], "images": ["assets/q13_p394_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. F-18 FDG-PET/CT plays a crucial role in staging and restaging/treatment response evaluation of patients with Hodgkin and many non-Hodgkin lymphomas. In these patients, change in disease status is more accurately depicted by the changes in F-18 FDG metabolic activity when compared to anatomic measurements on CT or MRI. Deauville Criteria were established to standardize the grading of F-18 FDG metabolic activity, comparing maximal tumor uptake to that of the background structures (i.e., mediastinal blood pool and liver). The scoring is as follows: Pretreatment scan in this patient shows markedly hypermetabolic (Deauville Score 5) lymphadenopathy in bilateral axillae. Posttreatment scan reveals marked interval reduction in the FDG uptake along with marked reduction in the size of the axillary lymph nodes. Residual left axillary lymph nodes show FDG uptake greater than that of the mediastinum but less than or equal to that of the liver (Deauville Score 3). No new FDG-avid lesions are seen on the MIP image. Findings represent complete response to treatment by Lugano criteria for lymphoma response assessment.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:347-349. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:306."}, {"number": "14", "stem": "A 36-year-old gentleman presents with a history of frequent nontraumatic fractures. Based on the following OctreoScan images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Carcinoid"}, {"letter": "B", "text": "Neuroblastoma"}, {"letter": "C", "text": "Infection"}, {"letter": "D", "text": "Oncogenic osteomalacia"}, {"letter": "E", "text": "Metastatic small cell carcinoma"}], "images": ["assets/q14_p396_01.jpg", "assets/q14_p396_02.jpg", "assets/q14_p395_01.jpg"], "explanationImages": ["assets/a14_p414_01.jpg"], "answer": "D", "explanation": "Answer D. The 24-hour anterior and posterior whole-body as well as spot images of bilateral lower extremities demonstrate a moderate-sized focus of intense activity in the medial aspect of the left proximal leg. This corresponds to a T2-hyperintense lesion in the calf muscle on the MRI. Physiologic activity is seen corresponding to the liver, spleen, kidneys, and bladder. In this patient with a clinical history of fragility fractures, the findings are most consistent with oncogenic osteomalacia secondary to mesenchymal tumor in the left calf muscle. Oncogenic osteomalacia is a rare disease, but its awareness is important as it can result in significant morbidity secondary to repeated fractures. Decreased bone strength is secondary to the tumor secreting fibroblast growth factor 23, which inhibits the kidney's ability to absorb phosphate, resulting in tumor-induced hypophosphatemic osteomalacia. This is typically caused by mesenchymal tumors expressing high levels of somatostatin receptors (SSTR), allowing for their detection using In-111 OctreoScan or Ga-68 DOTATATE. Given better imaging characteristics, anatomic resolution, and anatomic localization offered by PET/CT, Ga-68 DOTATATE is now preferred over In-111 OctreoScan. Since osteoblasts express SSTR and increased osteoblastic activity is seen with fragility fractures, healing fractures may appear as areas of increased DOTATATE uptake. These should not be confused as areas of osseous metastasis. Correlation with CT scan characteristics would help differentiate fragility fractures from tumor involvement. While activated lymphocytes express SSTR (i.e., tuberculosis, sarcoidosis), pyogenic infection does not typically show increased activity on OctreoScan. Even though malignancies such as carcinoid, neuroblastoma, and small cell carcinoma express SSTR, they are unlikely given the patient's clinical presentation.\n\nReferences: El-Maouche D, Sadowski SM, Papadakis GZ, et al. 68Ga-DOTATATE for tumor localization in tumor-induced osteomalacia. J Clin Endocrinol Metab 2016;101(10):3575-3581. doi:10.1210/jc.2016-2052 Wuying C, Jiang Y, et al. Performance of 68Ga-DOTA-SST PET/CT, octreoscan SPECT/CT and 18F-FDG PET/CT in the detection of culprit tumors causing osteomalacia: a meta-analysis. Nucl Med Commun 2020;41(4):370-376."}, {"number": "15", "stem": "Lutathera (lutetium-177 DOTATATE) is indicated for the treatment of what type of malignancy?", "options": [{"letter": "A", "text": "Estrogen receptor-positive tumor"}, {"letter": "B", "text": "Somatostatin receptor-positive tumor"}, {"letter": "C", "text": "Prostate-specific membrane antigen receptor-positive tumors"}, {"letter": "D", "text": "Dopamine receptor-positive tumors"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Lu-177 DOTATATE (Lutathera) is a somatostatin analog approved for the treatment of somatostatin receptor-positive neuroendocrine tumors by the FDA in early 2018. Patients receive at least four doses of Lutathera, each dose about two months apart. In patients with normal renal function, approximately 200 mCi of Lu-177 DOTATATE is infused intravenously over 30 minutes. Amino acids are administered intravenously to reduce renal toxicity by decreasing the radiation dose to the kidney. Amino acid infusion begins 30 minutes before Lutathera infusion, continues during the 30-minute Lutathera infusion, and continues for 3 hours after. Severe nausea and vomiting are common side effects of amino acid solution infusion. These are more prominent with solutions containing all or most of the amino acids when compared to solutions containing only lysine and arginine. Pretreatment with an antiemetic is started 30 minutes prior to amino acid infusion to reduce nausea.\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:344. Strosberg J, El-Haddad G, Wolin E, et al. Phase 3 trial of 177 Lu-dotatate for midgut neuroendocrine tumors. NEJM 2017;376(2):125-135."}, {"number": "16", "stem": "What is the most likely cause for the findings shown below in this patient who is undergoing evaluation of metastatic carcinoid with Ga-68 DOTATATE PET/CT?", "options": [{"letter": "A", "text": "Macroadenoma"}, {"letter": "B", "text": "Hypophysitis"}, {"letter": "C", "text": "Meningioma"}, {"letter": "D", "text": "Physiologic"}, {"letter": "E", "text": "Metastatic"}], "images": ["assets/q16_p397_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. As shown on the image below, a normal Ga-68 DOTATATE scan shows highest physiologic activity in the spleen followed by the adrenal glands, kidneys, and pituitary gland. Moderate physiologic activity is seen in the liver, salivary glands, and bowel. Mild to moderate physiologic activity may also be present in the thyroid gland. This biodistribution is due to either specific receptor binding or nonspecific tissue handling of the peptide. While meningioma has high SSTR 2 receptor density and is readily visualized on DOTATATE scan, the location suggests physiologic pituitary uptake. Knowledge of the normal biodistribution of radiotracer distribution is important in its identification in cases of misadministration or altered biodistribution due to quality control, etc.\n\nReferences: Deppen SA, Walker RC, et al. Safety and efficacy of 68Ga-DOTATATE PET/CT for diagnosis, staging, and treatment management of neuroendocrine tumors. J Nucl Med 2016;57(5):708-714."}, {"number": "17", "stem": "Based on the following supplied MIP image from a Ga-68 DOTATATE PET/CT scan, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Metastatic colon cancer"}, {"letter": "B", "text": "Metastatic carcinoid"}, {"letter": "C", "text": "Metastatic ovarian carcinoma"}, {"letter": "D", "text": "Metastatic pancreatic neuroendocrine tumor"}, {"letter": "E", "text": "Splenosis"}], "images": ["assets/q17_p398_01.jpg"], "explanationImages": ["assets/a17_p416_01.jpg", "assets/a17_p417_01.jpg"], "answer": "B", "explanation": "Answer B. The supplied anterior projection MIP image from Ga-68 DOTATATE PET/CT demonstrates a large focus of intense activity within the right lower quadrant (arrow) with a smaller focus of intense activity more superomedial to it (arrowhead). Numerous foci of intense activity are seen within the liver parenchyma. This distribution pattern is most compatible with primary small bowel carcinoid in the right lower quadrant with associated right lower quadrant mesenteric lymph node metastases and numerous DOTATATE avid liver metastases. While a pancreatic neuroendocrine tumor (NET) would demonstrate DOTATATE avidity, the distribution pattern is that of carcinoid as no abnormal activity is seen in the pancreatic bed. While intense physiologic DOTATATE activity is seen in splenic tissue, again the pattern is not that of splenosis. The other mentioned malignancies are not typically DOTATATE avid and do not show a similar distribution pattern. Ga-68 DOTATATE (DOTA-0-Tyr3-Octreotate) and Ga-68 DOTANOC and DOTATOC are PET tracers that bind to somatostatin receptors (SSTR) with high affinity. As such, like In-111 OctreoScan, they are useful in the evaluation of NETs. Compared to In-111 OctreoScan, PET agents have improved pharmacokinetics (faster tumor uptake and rapid clearance), higher sensitivity/resolution, less radiation, and less time (approximately 2 hours compared to 24 to 48 hours). In a study done by Deppen et al., Ga-68 DOTATATE was found to have greater sensitivity, specificity, and accuracy when compared to In-111 OctreoScan. Ga-68 DOTATATE is currently FDA approved for the localization of SSTR-positive NETs in adult and pediatric populations. It has also been proven superior to In-111 OctreoScan in the evaluation of tumor-induced osteomalacia and paraganglioma.\n\nReferences: Deppen SA, Walker RC, et al. Safety and efficacy of 68Ga-DOTATATE PET/CT for diagnosis, staging, and treatment management of neuroendocrine tumors. J Nucl Med 2016;57(5):708-714."}, {"number": "18", "stem": "The following CT, fused F-18 FDG-PET/CT, and PET axial images are from a 68-year-old gentleman with a history of colon cancer. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Physiologic uptake"}, {"letter": "B", "text": "Pituitary adenoma"}, {"letter": "C", "text": "Metastasis"}, {"letter": "D", "text": "Contamination"}, {"letter": "E", "text": "Pituitary melanoma"}], "images": ["assets/q18_p399_01.jpg"], "explanationImages": ["assets/a18_p418_01.jpg"], "answer": "B", "explanation": "Answer B. Axial CT, fused PET/CT, and PET images acquired after the intravenous administration of F-18 FDG reveal intense, focal uptake corresponding to an enlarged pituitary gland. On the CT scan image, widening of the sella is seen. The findings likely represent a pituitary macroadenoma for which further evaluation with contrast-enhanced MRI of the brain should be considered. Incidentally detected increased pituitary 18F-FDG PET uptake is usually associated with benign pituitary tumors such as adenoma. The most common cause of an abnormal pituitary uptake is generally a primary pituitary tumor including micro- and macroadenomas, followed by metastatic malignancy, Langerhans cell histiocytosis (LCH), and inflammatory hypophysitis. C and E are incorrect as metastasis from the colon cancer and a primary pituitary melanoma are both less likely than an adenoma. Under physiologic conditions, the pituitary gland shows FDG uptake less than that of the gray matter and is smaller in size than seen in this patient. Intense physiologic pituitary uptake is generally seen with Ga-68 DOTATATE scan and not F-18 FDG.\n\nReferences: Ju H, Zhou J, Pan Y, et al. Evaluation of pituitary uptake incidentally identified on 18F-FDG PET/CT scan. Oncotarget 2017;8(33):55544-55549."}, {"number": "19", "stem": "What is the most likely cause for the following findings?", "options": [{"letter": "A", "text": "Primary pancreatic neuroendocrine tumor"}, {"letter": "B", "text": "Metastatic carcinoid to the pancreas"}, {"letter": "C", "text": "Metastatic renal cell carcinoma to the pancreas"}, {"letter": "D", "text": "Primary pancreatic adenocarcinoma"}, {"letter": "E", "text": "Physiologic pancreatic activity"}, {"letter": "F", "text": "Bilateral renal involvement by lymphoma with a retroperitoneal lymph node metastasis"}], "images": ["assets/q19_p399_02.jpg"], "explanationImages": [], "answer": "E", "explanation": "Answer E. Radiotracer distribution on the MIP image suggests that this is an image from Ga-68 DOTATATE scan. Fused PET/CT images show intense activity in the pancreatic uncinate process. However, no abnormal enhancement is seen in this region on an early-phase contrast-enhanced CT of the abdomen. No space-occupying lesions are seen in this region on the CT with preservation of fat planes surrounding the pancreatic lobules. As such, this finding is most consistent with physiologic pancreatic uncinate process activity. This is a normal variant and should not be confused with malignancy. Similar but less intense activity can also be seen in the pancreatic tail and has been associated with nonneoplastic islet cell hyperplasia. Careful correlation with patient's clinical history and contrast-enhanced multiphase CT or MRI must be performed to ascertain if the abnormal DOTATATE activity corresponds to any lesion. Image below shows focal intense radiotracer activity corresponding to an enhancing subcentimeter nodule on contrast enhanced CT scan in the anterior inferior aspect of the uncinate process (arrows below); finding is consistent with a primary pancreatic neuroendocrine tumor in the patient below.\n\nReferences: Hofman MS, Lau WF, Hicks RJ. Somatostatin receptor imaging with 68Ga DOTATATE PET/CT: clinical utility, normal patterns, pearls, and pitfalls in interpretation. RadioGraphics 2015;35(2):500-516."}, {"number": "20", "stem": "Which of the following radiopharmaceuticals is a hypoxia imaging agent?", "options": [{"letter": "A", "text": "Cu-144 ATSM"}, {"letter": "B", "text": "F-18 FES"}, {"letter": "C", "text": "C-11 choline"}, {"letter": "D", "text": "F-18 FDG"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Tumor hypoxia is associated with malignant progression, radiotherapy resistance, and poor prognosis. As such, agents have been developed to image tumor hypoxia to assess tumor radiosensitivity and patient prognosis. Cu-144 ATSM and F-18 FMISO are two of the most commonly used agents for hypoxia imaging. The half-life of Cu-144 ATSM (12.7 hours) is well suited for hypoxia imaging. F-18 FES PET/CT influences the staging and management of patients with newly diagnosed estrogen receptor-positive breast cancer. C-11 and F-18 choline have been used in the workup for recurrent prostate cancer.\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:68-70, 67."}, {"number": "21", "stem": "Several adverse reactions are associated with immune checkpoint inhibitors. Most of them are readily reversed by stopping the agent. Which type of immune-related adverse event (irAE) is irreversible?", "options": [{"letter": "A", "text": "Pneumonitis"}, {"letter": "B", "text": "Hypophysitis"}, {"letter": "C", "text": "Colitis"}, {"letter": "D", "text": "Rash"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Immune checkpoint inhibitors are monoclonal antibodies that block immune checkpoints to augment T-cell-mediated tumor destruction. In current clinical practice, they target the following cell surface proteins: programmed cell death protein 1 (PD-1), cytotoxic T- lymphocyte antigen-4 (CTLA-4), or the PD-1 ligand programmed cell death 1 ligand 1 (PD-L1). CTLA-4 and PD-1 are expressed by T cells. Ipilimumab is a monoclonal antibody that attaches to CTLA-4 and inhibits it. This drug was approved by FDA in 2011 for melanoma treatment. Nivolumab and pembrolizumab target PD-1, whereas durvalumab targets PD-L1. Adverse events associated with these agents are due to autoimmunity caused by hyperactivated T cells. These are different from traditional chemotherapy and, in most of the cases, they are mild or moderate. Most common of them are dermatologic manifestations such as rash, erythema, or vitiligo. However, autoimmune pancreatitis, thyroiditis, colitis, and hypophysitis can also be seen. Most of these are readily reversed by stopping the agent and starting corticosteroids. However, endocrinopathies such as hypophysitis, adrenal insufficiency, and thyroid dysfunction are generally irreversible. Colitis and hypophysitis are more commonly seen with ipilimumab, and pneumonitis is seen with PD-1 inhibitors. Nivolumab-induced pneumonitis can have predominantly four CT patterns: Cryptogenic organizing pneumonia (COP), nonspecific interstitial pneumonia, hypersensitivity pneumonitis, and acute interstitial pneumonia (AIP)/acute respiratory distress syndrome (ARDS).\n\nReferences: Nishino M, Ramaiya NH, et al. PD-1 inhibitor-related pneumonitis in advanced cancer patients: radiographic patterns and clinical course. Clin Cancer Res 2016;22(24):6051-6060. Weber JS, Yang JC, Atkins MB, et al. Toxicities of Immunotherapy for the Practitioner. J Clin Oncol 2015;33(18):2092-2099."}, {"number": "22", "stem": "The following images are from a 48-year-old gentleman with a past medical history of small bowel carcinoid status postresection. Which of the following is the most likely diagnosis based on the images provided?", "options": [{"letter": "A", "text": "Primary pancreatic neuroendocrine tumor"}, {"letter": "B", "text": "Pancreatic metastasis from carcinoid"}, {"letter": "C", "text": "Pancreatic adenocarcinoma"}, {"letter": "D", "text": "Ectopic splenic tissue in the pancreas"}, {"letter": "E", "text": "Left adrenal metastasis"}], "images": ["assets/q22_p400_01.jpg", "assets/q22_p400_02.jpg"], "explanationImages": ["assets/a22_p420_01.jpg"], "answer": "D", "explanation": "Answer D. Axial CT and fused PET/CT images show a small focus of intense activity in the pancreatic tail. Early and delayed contrast-enhanced images from MRI demonstrate that the lesion within the pancreatic tail follows the contrast enhancement pattern of the spleen with signal intensity similar to that of the splenic tissue. As such, given the patient's clinical history and the lesion's imaging characteristics, the findings likely represent ectopic splenic tissue in the pancreatic tail. If needed, this can be confirmed with either denatured RBC SPECT-CT or sulfur colloid SPECT-CT. Physiologic pancreatic tail uptake tends to be less intense and less focal with no focal lesion on a dedicated multiphase CT or MRI. Primary pancreatic neuroendocrine tumor and metastatic carcinoid may appear similar on PET/CT, but the characteristic \"tigroid\" enhancement of splenic tissue on early contrast-enhanced phase would not be present. Physiologic DOTATATE activity in the adrenal glands should not be confused with malignant involvement.\n\nReferences: Hofman MS, Lau WF, Hicks RJ. Somatostatin receptor imaging with 68Ga DOTATATE PET/CT: clinical utility, normal patterns, pearls, and pitfalls in interpretation. RadioGraphics 2015;35(2):500-516. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:359-360. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:342."}, {"number": "23", "stem": "Which of the following radiotracers should be considered in the workup of a patient with poorly differentiated neuroendocrine tumors?", "options": [{"letter": "A", "text": "I-123 MIBG"}, {"letter": "B", "text": "Ga-68 PSMA"}, {"letter": "C", "text": "F-18 FDG"}, {"letter": "D", "text": "In-111 pentetreotide"}], "images": [], "explanationImages": ["assets/a23_p421_01.jpg"], "answer": "C", "explanation": "Answer C. Majority of neuroendocrine tumors are well differentiated (G1 and G2 with Ki-67 <5%) and are best visualized by Ga-68 DOTATATE PET/CT as they express somatostatin receptors (SSTR). These tumors are usually not FDG avid, and F-18 FDG-PET/CT is not a preferred modality for their evaluation. However, tumors or lesions that have undergone dedifferentiation are high-grade lesions that lack SSTR. For higher grade lesions with dedifferentiation, F-18 FDG PET/CT demonstrates increased sensitivity and plays a significant clinical role in combination with Ga-68 DOTATATE. Ga-68 PSMA is a prostate-specific antigen- binding agent that is used in the imaging of prostate cancer. In-111 pentetreotide (OctreoScan) is an SSTR-binding agent used for the imaging of well-differentiated neuroendocrine tumor, which has been superseded by DOTATATE due to increased sensitivity. While useful for imaging tumors of neural crest origin such as pheochromocytoma, paraganglioma, or neuroblastoma, I-123 MIBG has no role in the evaluation of the poorly differentiated neuroendocrine tumors. The World Health Organization and the European Neuroendocrine Tumor Society (ENETS) have established grading systems for neuroendocrine tumors that are based on immunohistochemical staining of Ki-67 protein, a marker of cellular proliferation. These grading systems stratify tumors into one of three grades:\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:342-343."}, {"number": "24", "stem": "The mechanism of action for Axumin (fluciclovine F-18) PET scans for the detection of prostate cancer involves which of the following?", "options": [{"letter": "A", "text": "Prostate-specific membrane antigen binding"}, {"letter": "B", "text": "Amino acid transporters"}, {"letter": "C", "text": "Fluorodeoxyglucose metabolism"}, {"letter": "D", "text": "Somatostatin receptor binding"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. F-18 fluciclovine (FACBC, Axumin) was approved by the FDA in 2016 for the diagnosis of suspected recurrent prostate cancer in patients with elevated PSA after initial therapy. It is a radiolabeled amino acid analog that takes advantage of the amino acid transport up- regulation that can be seen in many cancers including prostate cancer. Axumin is a radiolabeled analog of levorotatory leucine, which is an essential amino acid. Like L-leucine, FACBC is taken up via the human L-type amino acid transporter (LAT) and alanine-serine-cysteine (ASC2) transporter systems. Prostate-specific membrane antigen is the binding site for Ga-68 PSMA. PSMA is overexpressed in primary and metastatic adenocarcinomas of the prostate. FDG accumulation is nonspecific and seen in many different tumors. Most prostate cancers demonstrate no or very little FDG metabolism. Ga-68 DOTATATE and In-111 OctreoScan work by binding to the somatostatin receptors. The interpretation of F-18 fluciclovine imaging is based on visual assessment rather than SUV values. A 1-cm or larger lesion/lymph node with avidity greater than or equal to that of bone marrow is suspicious for cancer. Lesion/lymph nodes smaller than 1 cm with avidity greater than that of the blood pool is suspicious for cancer. Pathologic activity in prostate cancer and nodal metastatic disease peaks rapidly, between 4 and 10 minutes, after the radiotracer injection. Because of the rapid influx and efflux of F-18 fluciclovine, imaging is generally obtained within 3 to 5 minutes after the injection rather than 60 minutes typical for the F-18 FDG PET. With Axumin, intense physiologic uptake is seen in the liver and pancreas. Mild diffuse uptake is seen in skeletal muscles. The image above demonstrates interaction of five commonly used radiotracers with prostate cancer cells. F-18 FDG enters through GLUT1 and 3 transporters. C-11 choline enters through choline transporters, while FACBC is transported by LAT and ASCT2 transporters. Out of these three, FACBC is the only one that is free to enter and exit the cells.\n\nReferences: Gusman M, Aminsharifi JA, Peacock JG, et al. Review of 18F-fluciclovine PET for detection of recurrent prostate cancer. RadioGraphics 2019;39(3):822-841. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:360. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:352-353."}, {"number": "25", "stem": "Which of the following is an indication for Ga-68 PSMA PET imaging?", "options": [{"letter": "A", "text": "Sarcoid"}, {"letter": "B", "text": "Prostate cancer"}, {"letter": "C", "text": "Lymphoma"}, {"letter": "D", "text": "Neuroendocrine tumor"}], "images": [], "explanationImages": ["assets/a25_p422_01.jpg"], "answer": "B", "explanation": "Answer B. Prostate-specific membrane antigen (PSMA) is a cell surface protein (glutamate carboxypeptidases, GCP, Type II) that is highly up-regulated in prostate carcinoma cells. Its active enzyme site within the extracellular domain is the target of small molecule radiopharmaceuticals such as Ga-68 PSMA 11 (Glu-NH-CO-NH-Lys-(Ahx)-[Ga-68 HBED-CC]), F-18 DCFPyL, etc. After antigen binding to PSMA on the cell membrane, these agents are internalized by endocytosis, leading to concentration and retention in the cells. This allows for a very high-contrast resolution image and the detection of even small-volume disease. Prostate-specific membrane antigen (PSMA) is overexpressed in the primary and metastatic adenocarcinomas of the prostate. The level of PSMA expression rises with increasing tumor dedifferentiation and in hormone refractory cancers.\n\nReferences: Afshar-Oromieh A, et al. PET imaging with a [68Ga]gallium-labelled PSMA ligand for the diagnosis of prostate cancer: biodistribution in humans and first evaluation of tumour lesions. Eur J Nucl Med Mol Imaging 2013;40(4):486-495. Bois F, Noirot C, Dietemann S, et al. [68Ga]Ga-PSMA-11 in prostate cancer: a comprehensive review. Am J Nucl Med Mol Imaging 2020;10(6):349-374. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:360. O'Malley JP, Ziessman HA,Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:352-353."}, {"number": "26", "stem": "What radiotracer was utilized for generating the following scintimammography image?", "options": [{"letter": "A", "text": "Tc-99m sestamibi"}, {"letter": "B", "text": "Tl-201"}, {"letter": "C", "text": "Tc-99m MDP"}, {"letter": "D", "text": "F-18 FDG"}], "images": ["assets/q26_p402_01.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. A single scintimammography image shows focal uptake in the breast, which is suggestive of a malignancy. In patients with dense breast tissue, this study can be performed to aid in the detection of breast cancer. Generally, 8 to 10 mCi of Tc-99m sestamibi is used. Unfortunately, benign tumors can have increased uptake as well. Detection is not affected by breast density, but sensitivity is decreased for DCIS, cancers <1 cm, and nonpalpable lesions.\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:359."}, {"number": "27", "stem": "Which of the following immune checkpoint inhibitor agents is an anti-CTLA-4 monoclonal antibody?", "options": [{"letter": "A", "text": "Nivolumab"}, {"letter": "B", "text": "Pembrolizumab"}, {"letter": "C", "text": "Ipilimumab"}, {"letter": "D", "text": "Durvalumab"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Immune checkpoint inhibitors are a type of immunotherapy consisting of monoclonal antibodies that block immune checkpoints to augment T-cell-mediated tumor destruction. In current clinical practice, they target cell surface proteins: either programmed cell death protein 1 (PD-1) or cytotoxic T-lymphocyte antigen-4 (CTLA-4) or the PD-1 ligand programmed cell death 1 ligand 1 (PD -L1). CTLA-4 and PD-1 are expressed by T cells. Ipilimumab is a monoclonal antibody that attaches to CTLA-4 and inhibits it. This drug was approved by the FDA in 2011 for melanoma treatment. Nivolumab and pembrolizumab target PD-1, whereas durvalumab targets PD-L1.\n\nReferences: https://www.cancer.gov/about-cancer/treatment/types/immunotherapy/checkpoint-inhibitors Wang G, Kurra V, Gainor J, et al. Immune checkpoint inhibitor cancer therapy: spectrum of imaging findings. RadioGraphics 2017;37:2132-2144."}, {"number": "28", "stem": "Which of the following disease processes can result in a false-positive finding on a Ga-68 DOTATATE scan?", "options": [{"letter": "A", "text": "Meningioma"}, {"letter": "B", "text": "Primitive neuroectodermal tumors (PNET)"}, {"letter": "C", "text": "Ependymoma"}, {"letter": "D", "text": "Astrocytoma"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Meningiomas are one of the many intracranial tumors that overexpress somatostatin receptors and, as such, are intensely avid on DOTATATE PET imaging. Other intracranial lesions with DOTATATE avidity include pituitary adenoma, carcinoid, hemangioblastoma, medulloblastoma, glioma, and metastasis from neuroendocrine tumors. Primitive neuroectodermal tumors (PNET), glioblastoma, and astrocytoma are primary brain tumors that do not have somatostatin receptors. Due to high levels of expression of the somatostatin receptor subtype 2 in meningiomas and a favorable tumor-to-background ratio, Ga-68 DOTATATE is highly effective in the detection of meningioma. A distinct morphology and location differentiate meningioma from other malignancies. Small meningiomas frequently present with excellent visibility due to their high tracer uptake as well as a typical location adjacent to the meninges (see an example below).\n\nReferences: Afshar-Oromieh A, et al. Detection of cranial meningiomas: comparison of 68Ga-DOTATOC PET/CT and contrast- enhanced MRI. Eur J Nucl Med Mol Imaging 2012;39(9):1409-1415. Rachinger W, et al. Increased 68Ga-DOTATATE uptake in PET imaging discriminates meningioma and tumor-free tissue. J Nucl Med 2015;56(3):347-353."}, {"number": "29", "stem": "The following F-18 FDG-PET/CT images are from an 18-year-old female with a history of ulcerative colitis and resulting colon cancer who is status post colectomy as well as chemotherapy. The patient now presents for restaging in the setting of rising CEA levels. The intensely FDG avid presacral mass shown below was subsequently proven to be recurrent colon cancer. What is the most likely explanation for the abnormal findings in the chest?", "options": [{"letter": "A", "text": "Metastatic colon cancer"}, {"letter": "B", "text": "Lymphoma"}, {"letter": "C", "text": "Thymic hyperplasia"}, {"letter": "D", "text": "Teratoma"}], "images": ["assets/q29_p404_01.jpg"], "explanationImages": ["assets/a29_p424_01.jpg"], "answer": "C", "explanation": "Answer C. Axial CT and fused images through the upper mediastinum demonstrate an intensely FDG-avid soft tissue density that conforms to the anterosuperior mediastinal contours and does not exert mass effect on the adjacent structures. Single anterior MIP image demonstrates its characteristic lambda (Î») shape. This appearance is typical for that of thymic hyperplasia. Physiologic uptake of FDG by the thymus is commonly seen in children and young adults. In patients with malignant mediastinal tumors, the thymus may regress during chemotherapy, with possible rebound enlargement after completion of therapy. Metastatic colon cancer, teratoma, and lymphoma do not have the classic appearance of thymic hyperplasia.\n\nReferences: Ferdinand B, Gupta P, Kramer EL. Spectrum of thymic uptake at 18F-FDG PET. RadioGraphics 2004;24(6):1611-1616. Gawande RS, Khurana A, et al. Differentiation of normal thymus from anterior mediastinal lymphoma and lymphoma recurrence at pediatric PET/CT. Radiology 2012;262(2):613-622."}, {"number": "30", "stem": "What is the most likely etiology responsible for the following F-18 FDG PET/CT findings in a 90- year-old patient with a history of pelvic radiation for treatment of malignancy?", "options": [{"letter": "A", "text": "Sacral insufficiency fracture"}, {"letter": "B", "text": "Radiation-induced sarcoma"}, {"letter": "C", "text": "Osseous metastases"}, {"letter": "D", "text": "Paget disease"}], "images": ["assets/q30_p405_01.jpg"], "explanationImages": ["assets/a30_p425_01.jpg"], "answer": "A", "explanation": "Answer A. Axial CT, fused, and PET images through the pelvis demonstrate linear areas of moderate to severely increased FDG uptake in the sacrum, medial to sacroiliac joints. This area of abnormal activity corresponds to linear lucencies on the CT scan in keeping with fracture lines that run parallel to the sacroiliac joint with associated surrounding sclerosis (arrows below). The findings are in keeping with abnormal FDG uptake related to inflammatory changes associated with sacral insufficiency fractures. While radiation-induced sarcoma, metastasis, and active Paget disease may have increased F-18 FDG uptake, the appearance is typical for that of sacral insufficiency fracture. Postradiation sarcoma is generally seen after 10 years of radiation therapy. In Paget disease, cortical thickening and coarsened trabecular pattern are seen with expansion of bone on CT. Sacral insufficiency fractures are commonly seen in elderly female population with osteoporosis without any history of trauma. Other risk factors include pelvic radiation therapy and long-term bisphosphonate use. CT imaging is less sensitive than bone scan and MRI in the diagnosis of sacral insufficiency fractures. A classic Honda sign (uptake in H pattern) on bone scan is diagnostic.\n\nReferences: Fayad L, Cohade C, Wahl R, et al. Sacral fractures: a potential pitfall of fdg positron emission tomography. Am J Roentgenol 2003;181:1239-1243. Tsuchida T, Kosaka N, Sugimoto K, Itoh H. Sacral insufficiency fracture detected by FDG-PET/CT: report of 2 cases. Ann Nucl Med 2006;20(6):445-448."}, {"number": "31", "stem": "A 59-year-old gentleman undergoes F-18 FDG-PET/CT for initial staging of non-small cell lung carcinoma. Based on the following images, what is the most likely stage of this patient's malignancy?", "options": [{"letter": "A", "text": "II"}, {"letter": "B", "text": "IIIA"}, {"letter": "C", "text": "IIIB"}, {"letter": "D", "text": "IV"}], "images": ["assets/q31_p405_02.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Axial fused images, CT images, and a single anterior MIP image show an intensely FDG avid mass in the right lung accompanied by intensely FDG avid ipsilateral and contralateral lymph nodes, suspicious for metastatic malignant involvement. No significant FDG uptake is seen in the small right pleural effusion. Also, there is no evidence of focal nodular pleural involvement shown in these pictures. Presence suspicious contralateral lymph node metastasis makes this stage IIIB. Evaluation of lymph node metastasis is an important step in the staging of lung cancer and helps determine whether the patient is offered surgical resection. Presence of metastasis in the contralateral mediastinal or supraclavicular lymph nodes would put the patient in stage IIIB category. Patients with stage IIIB disease are usually treated with a combination of chemotherapy and radiation therapy, with surgery having a little role. As such, identification of metastatic disease in these regions is crucial. F-18 FDG PET/CT is standard in staging investigation of patients with lung carcinoma and is helpful in detection of nodal and unsuspected distant metastases.\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:315-325."}, {"number": "32", "stem": "What is the most likely reason for intense F-18 fluciclovine uptake in the pancreas for the following patient?", "options": [{"letter": "A", "text": "Physiologic receptor binding"}, {"letter": "B", "text": "Physiologic amino acid metabolism"}, {"letter": "C", "text": "Physiologic fatty acid metabolism"}, {"letter": "D", "text": "Pancreatitis"}], "images": ["assets/q32_p406_01.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. An anterior MIP image demonstrates physiologic distribution of the radiotracer to the pancreas, liver muscle, and the bone marrow. No uptake is seen within the brain, excluding F-18 FDG. This physiologic distribution is seen with F-18 fluciclovine (AxuminÂ®) scan. Fluciclovine is an analog of L-leucine amino acid approved for diagnosis of suspected recurrent prostate cancer based on elevated blood prostate-specific antigen (PSA) levels in patients who have received prior treatment. Normal physiologic amino acid metabolism is responsible for its intense uptake in the pancreas.\n\nReferences: O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:352-353."}, {"number": "33", "stem": "What is the most likely diagnosis in the following 67-year-old patient with a history of prostatectomy and a rising PSA of 2.7?", "options": [{"letter": "A", "text": "Postprandial state"}, {"letter": "B", "text": "Exercise within 24 hours of scan"}, {"letter": "C", "text": "Recurrent prostate cancer"}], "images": ["assets/q33_p407_01.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Physiologic distribution in the pancreas, liver, muscles, and bone marrow indicates that this is an F-18 fluciclovine scan. Two foci of intense activity (above that of the bone marrow) are noted in the right hemipelvis. Axial CT, fused PET/CT, and PET images show one of these foci to correspond to a right external iliac/obturator lymph node. In a patient with a history of prostate cancer and a rising PSA level, the findings are most consistent with a recurrent prostate cancer in locoregional lymph nodes. Increased muscular uptake on F-18 FDG scan would be present in patients with exposure to increased endogenous or exogenous insulin or recent exercise. However, lack of physiologic brain uptake excludes F-18 FDG as the radiotracer. Approximately 20% to 50% of patients with prostate cancer will have biochemical recurrence after initial treatment based on elevated PSA level. The typical sites of nodal recurrence are the pelvic lymph nodes (proximal external iliac, internal iliac and common iliac lymph nodes) and retroperitoneal regions, including para-aortic lymph nodes. For lymph nodes <1 cm in size, the abnormal uptake is defined as that greater than the adjacent blood vessels. For lymph nodes >1 cm in size, the abnormal uptake is defined as that greater than the bone marrow.\n\nReferences: Gusman M, Aminsharifi JA, Peacock JG, et al. Review of 18F-fluciclovine PET for detection of recurrent prostate cancer. RadioGraphics. 2019;39(3):822-841. Savir-Baruch B, Schuster DM, et al. Fluorine-18-labeled fluciclovine PET/CT in clinical practice: factors affecting the rate of detection of recurrent prostate cancer. AJR Am J Roentgenol 2019;213(4):851-858. A. Hydronephrosis B. Bilateral urine leak C. Acute tubular necrosis D. Lymphoma E. Renal cell carcinoma"}, {"number": "34", "stem": "Y-90 ibritumomab tiuxetan (Zevalin) and I-131 tositumomab (Bexxar) are used in the treatment of relapsed, refractory, or transformed lymphoma. What antigen serves as the target for these therapeutic agents?", "options": [{"letter": "A", "text": "CD12"}, {"letter": "B", "text": "CD18"}, {"letter": "C", "text": "CD20"}, {"letter": "D", "text": "CD22"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Y-90 ibritumomab tiuxetan (Zevalin) and I-131 tositumomab (Bexxar) are murine IgG monoclonal antibodies against CD20 antigen. CD20 antigen is present on 90% of the B-cell lymphomas but is not highly expressed on the membranes of normal hematopoietic cells, antibody- producing mature plasma cells, early B-cell precursors, or other lymphoid tissues. Once bound to the antigen, these agents destroy the tumor cells both by recruiting the immune system and by exposing them to high-energy beta radiation.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:324-325. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:359-362."}, {"number": "35", "stem": "Which of the following statements is the LEAST accurate regarding radioimmunotherapy of non- Hodgkin lymphoma using Y-90 ibritumomab tiuxetan (Zevalin) or I-131 tositumomab (Bexxar)?", "options": [{"letter": "A", "text": "The patient must receive SSKI at least 1 day before and continue for 2 weeks after Bexxar therapy."}, {"letter": "B", "text": "Biodistribution scans are not required for Zevalin therapy."}, {"letter": "C", "text": "Bexxar must be stored and administered through heavily shielded equipment."}, {"letter": "D", "text": "Plastic and acrylic materials are appropriate for shielding Zevalin."}, {"letter": "E", "text": "Dose rates for retained activity must be measured with Zevalin prior to discharge."}], "images": [], "explanationImages": [], "answer": "E", "explanation": "Answer E. Since Zevalin is labeled with Y-90, a pure beta emitter, plastic and acrylic materials are appropriate for its shielding. Lead shielding should not be used with Zevalin because it will generate more penetrating bremsstrahlung radiation. Because of the short 5-mm range of the beta particle, the dose to the caretakers treated with Zevalin is <1 mrem. As such, the patient can be discharged immediately after the treatment without the need to measure dose rates or retained activity. While initial Zevalin protocol involved biodistribution scans with In-111-labeled Zevalin, they are no longer mandatory in the United States. Unlike Bexxar, Zevalin is now also approved as a first-line therapy for CD20+ non-Hodgkin lymphoma. Unlike Zevalin, I-131 Bexxar can be imaged using the 364 keV gamma emissions. However, presence of these gamma emissions also requires Bexxar to be stored and administered through heavily shielded equipment. Also, because of this reason, dose rates must be measured and stringent regulations regarding the release of the patient must be followed in order to reduce radiation exposure to others. In order to prevent unwanted thyroid exposure from dissociated radioiodine, the patient must begin SSKI (super saturated potassium iodide) at least 1 day before and continue for 2 weeks after Bexxar treatment.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:324-325. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:359-362."}, {"number": "36", "stem": "Which of the following is a contraindication to radioimmunotherapy using Zevalin?", "options": [{"letter": "A", "text": "20% marrow involvement by lymphoma"}, {"letter": "B", "text": "B-cell histology"}, {"letter": "C", "text": "Platelet count of 160,000/mm3"}, {"letter": "D", "text": "Neutrophil count of 1,300/mm3"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Contraindications to radioimmunotherapy with Zevalin or Bexxar include the following: a. Known hypersensitivity reaction to murine proteins b. More than 25% marrow involvement by lymphoma c. Impaired marrow reserve (i.e., external beam radiation to >25% of marrow and history of myelotoxicity therapies). d. Neutrophil counts <1,500 cells/mm3 e. Platelet counts <100,000 cells/mm3 (100 to 150k may be treated with reduced dose) Treatment of CD20+ B-cell non-Hodgkin lymphoma is actually an indication for Zevalin and not contraindication.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:324-325. O'Malley JP, Ziessman HA, Thrall JH. Nuclear medicine: the requisites, 5th ed. Philadelphia, PA: Saunders, 2020:359-362."}, {"number": "37", "stem": "A 36-year-old lady with an extensive past medical history, including multiple prior cancers, presents for restaging on FDG-PET/CT. Based on the following images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Hydronephrosis"}, {"letter": "B", "text": "Bilateral urine leak"}, {"letter": "C", "text": "Acute tubular necrosis"}, {"letter": "D", "text": "Lymphoma"}, {"letter": "E", "text": "Renal cell carcinoma"}], "images": ["assets/q37_p428_01.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Images demonstrate intense parenchymal uptake in enlarged kidneys bilaterally. This is classic for renal lymphoma. The most common pattern of renal lymphoma is multiple parenchymal masses in both kidneys, which can be seen in 50% to 60% of cases. Renal lymphoma can also present with solitary hypermetabolic lesion, multiple hypermetabolic masses, or hypermetabolic soft tissue in perinephric space surrounding the kidneys. There is no dilatation of the collecting system to suggest obstruction or hydronephrosis. Acute tubular necrosis ATN would not present with enlarged kidneys. Renal cell carcinoma would be more likely to present with focal unilateral involvement and typically demonstrate lower degree FDG uptake on the PET images than what is seen.\n\nReferences: Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 6th ed. Philadelphia, PA: Saunders, 2012:381-390. Mettler FA, Guiberteau MJ. Essentials of nuclear medicine imaging, 7th ed. Philadelphia, PA: Saunders, 2019:347-348. Nicolau C, Sala E, Kumar A, et al. Renal masses detected on FDG PET/CT in patients with lymphoma: imaging features differentiating primary renal cell carcinomas from renal lymphomatous involvement. AJR Am J Roentgenol 2017;208(4):849-853."}];
    const APP_ID = "nuclear-medicine-oncology-quiz-ch11";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
