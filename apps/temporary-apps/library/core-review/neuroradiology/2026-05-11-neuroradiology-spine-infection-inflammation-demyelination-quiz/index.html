  <script>
    const QUESTIONS = [{"number": "1a", "stem": "A 50-year-old female with back pain, fevers, and chills presented to the ER. A contrast-enhanced CT was performed. Key image is shown below. Which of the following can be a possible explanation for the patient's symptoms?", "options": [{"letter": "A", "text": "Mechanical small bowel obstruction"}, {"letter": "B", "text": "Lumbar fusion hardware infection"}, {"letter": "C", "text": "Pyelonephritis"}, {"letter": "D", "text": "Ruptured viscus with abscess formation"}], "images": ["assets/q1a_p002_01.jpg"], "explanationImages": ["assets/a1a_p019_01.jpg", "assets/a1a_1b_p021_01.jpg"], "answer": "B", "explanation": "Answer B. Lumbar fusion hardware infection. Note the soft tissue thickening seen in the right psoas muscle and lucency surrounding the tip of the right pedicle screw."}, {"number": "1b", "stem": "A 50-year-old female with back pain, fevers, and chills presented to the ER. A contrast-enhanced CT was performed. Key image is shown below. To further assess the abnormality, an MRI of the lumbar spine was performed. Key image is shown below. What is the diagnosis?", "options": [{"letter": "A", "text": "Diskitis/osteomyelitis"}, {"letter": "B", "text": "Modic type 1 endplate changes"}, {"letter": "C", "text": "Metastasis"}, {"letter": "D", "text": "Inflammatory spondylitis"}], "images": ["assets/q1b_p003_01.jpg"], "explanationImages": ["assets/a1b_p020_01.jpg", "assets/a1a_1b_p021_01.jpg"], "answer": "A", "explanation": "Answer A. Diskitis/osteomyelitis. This is at the level of hardware as noted on CT and likely to be secondary to hardware infection. Imaging Findings: CT demonstrates soft tissue thickening surrounding the right psoas muscle (arrow in top image) and a lucency along the tip of the right pedicle screw (black circle in top image), concerning for infection. Sagittal STIR images demonstrate edema in the L2 and L3 vertebral bodies (long arrow in bottom image) and within the disk space (short arrow in bottom image), concerning for diskitis/osteomyelitis. Discussion: Diskitis/osteomyelitis with hardware infection. This can be seen in the early postoperative phase, usually 1 to 4 weeks following surgery. The aseptic enhancement sometimes seen along the posterior disk or within the nerve root early on is typically reactive in nature and can be a diagnostic pitfall. Edema and enhancement may also be seen in the vertebral body and disk space in asymptomatic patients early in the postoperative course. Therefore, clinical presentation is key to better understanding early postoperative changes. Presence of osseous erosive changes, soft tissue abscess, or phlegmon formation increases the sensitivity of MRI to hardware infection. The causes of infection may be intraoperative seeding, hematogenous seeding, or metal fretting. The risk of management includes antibiotics and surgical removal of the infected hardware.\n\nReferences: Malhotra A, Kalra VB, Wu X, et al. Imaging of lumbar spinal surgery complications. Insights Imaging. 2015;6(6):579-590. Viola RW, King HA. Delayed infection after elective spinal instrumentation and fusion: a retrospective analysis of eight cases. Spine. 1997;22(20):P2444-P2450."}, {"number": "2a", "stem": "A 42-year-old male with seizures was found down and brought to the ER. Which of the following imaging features seen on this image is highly concerning and warrants further evaluation?", "options": [{"letter": "A", "text": "Sacroiliac joint sclerosis"}, {"letter": "B", "text": "Intraosseous gas"}, {"letter": "C", "text": "Surrounding soft tissue stranding"}, {"letter": "D", "text": "Osteophytosis"}], "images": ["assets/q2a_p004_01.jpg", "assets/q2a_p004_02.jpg"], "explanationImages": ["assets/a2a_2b_p022_01.jpg"], "answer": "B", "explanation": "Answer B. Intraosseous gas. Presence of intraosseous gas raises concern for emphysematous osteomyelitis, particularly given lack of contiguity with the joint space."}, {"number": "2b", "stem": "A 42-year-old male with seizures was found down and brought to the ER. Additional workup included an MRI with contrast. Key images are provided below. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Multifocal bone infarction"}, {"letter": "B", "text": "Intraosseous pneumatocysts"}, {"letter": "C", "text": "Metastasis"}, {"letter": "D", "text": "Emphysematous osteomyelitis"}], "images": ["assets/q2b_p005_01.jpg"], "explanationImages": ["assets/a2a_2b_p022_01.jpg"], "answer": "D", "explanation": "Answer D. Emphysematous osteomyelitis. The abnormal enhancement and intraosseous collections are concerning for emphysematous osteomyelitis. Imaging Findings: Noncontrast CT scan through the pelvis demonstrates intraosseous gas (arrows in images A and B). Postcontrast fat-suppressed axial T1w image shows abnormal soft tissue enhancement and multifocal intraosseous (solid arrows in C) and intramuscular abscesses (dotted arrows in C). The constellation of findings is concerning for emphysematous osteomyelitis. Discussion: Emphysematous osteomyelitis is a rare but severe infection that is characterized by presence of intraosseous gas. The intraosseous gas seen with this entity is not in the typical distribution abutting the endplates as seen with degenerative disease and can involve both the axial and appendicular skeletons. Anaerobic organisms such as Fusobacterium necrophorum and Clostridium septicum and gram-negative Enterobacteriaceae family are typically implicated as common causative organisms. These patients commonly have other comorbidities such as diabetes or malignancy predisposing to this infection. Nearly every bone can be affected; however, most cases affect the vertebra, sacrum, and long bones. Differential Diagnosis: Bone infarction, which usually presents as a serpentine contour of infarction with peripheral enhancement; however, soft tissue involvement will not be seen with this condition as noted in the presented case. Bony infarction is usually associated with steroids, sickle cell disease, pancreatitis, vasculitis, emboli, and caisson disease. Degenerative intraosseous pneumatocysts can be considered; however, those are usually abutting the sacroiliac joint and will also not have associated soft tissue changes.\n\nReferences: Chen JLY, Huang YS. Emphysematous osteomyelitis of spine. QJM. 2016;109(6):427-428. Larson J, Muhlbauer J, Wigger T, et al. Emphysematous osteomyelitis. Lancet Infect Dis. 2015;15(4):486. Answer B. Diskitis/osteomyelitis with a right psoas abscess. There is edema and enhancement 3a involving the endplates of L4 and L5 is suggestive of an infectious process with a focal right psoas abscess. Paravertebral psoas abscesses should prompt a careful search for spinal infections. Infection and abscess formation in the iliopsoas is typically due to spread of infection from contiguous structures, most commonly bone, kidney, bowel, and appendix."}, {"number": "3a", "stem": "A 47-year-old female presented with chronic back pain and right thigh pain. Patient have recently developed fever and has an elevated WBC on initial work up. An MRI was performed. Key images are shown below. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Metastases with right psoas involvement"}, {"letter": "B", "text": "Diskitis/osteomyelitis with a right psoas abscess"}, {"letter": "C", "text": "Modic type 1 endplate changes and right psoas hematoma"}, {"letter": "D", "text": "Retroperitoneal fibrosis and secondary endplate changes"}], "images": ["assets/q3a_3b_p006_01.jpg"], "explanationImages": ["assets/a3a_3b_p023_01.jpg"], "answer": "B", "explanation": "Answer B. Retroperitoneal hematoma. Iliopsoas is the most common site for a spontaneous retroperitoneal hemorrhage secondary to either anticoagulation or a bleeding diathesis. The MR appearance of the hematoma is variable, depending on the age of the hematoma. Imaging Findings: Postcontrast axial images through the lumbar spine demonstrate collection within the right psoas muscle concerning for a soft tissue phlegmon/developing abscess (A). On the sagittal STIR, marrow edema is seen within L4 and L5 vertebral bodies and mild edema along anterior disk and prevertebral soft tissues (dotted arrow). Also note that preexisting Modic type 2/3 (type 2, yellow marrow conversion, and type 3, subchondral sclerosis) endplate changes can often partially obscure the presence of edema. These findings are consistent with diskitis/osteomyelitis with right psoas in the provided clinical context. Discussion: Infection and abscess formation in the iliopsoas are typically secondary to spread of infection from contiguous structures. Common bowel sources of an iliopsoas infection include diverticulitis, Crohn disease, and appendicitis. Renal sources include pyelonephritis or renal/perirenal abscess. It is important to look for secondary features of infection such as fat stranding, blurring of the fat planes, and ectopic gas. Primary infection is rare unless the patient is immunocompromised or a user of intravenous drugs, in which case the infection is usually due to Staphylococcus aureus and mixed gram-negative organisms. Primary neoplasms such as liposarcoma, fibrosarcoma, or hemangiopericytoma rarely originate from the iliopsoas compartment. A psoas abscess can lead to significant morbidity and mortality. Risk factors include advanced age, bacteremia, and inadequate treatment. Differential Diagnosis: The most common differential diagnosis is hematoma, which can have a variable appearance depending on the age of the hematoma. Also abscess can have secondary hemorrhage and blood products can have superimposed infection. Neoplasms such as lymphoma, melanoma, or metastasis can be considered and may involve the psoas compartment. Accurate interpretation of these findings is therefore based on the proper clinical context.\n\nReferences: Chern CH, Hu SC. Psoas abscess: making an early diagnosis in the ED. Am J Emerg Med. 1997;15(1):83- 88. Muckley T, Schutz T, Kirschner M, et al. Psoas abscess: the spine as a primary source of infection. Spine. 2003;28(6):E106-E113."}, {"number": "3b", "stem": "A 47-year-old female presented with chronic back pain and right thigh pain. Patient have recently developed fever and has an elevated WBC on initial work up. An MRI was performed. Key images are shown below. What is the most common pathology in the iliopsoas compartment?", "options": [{"letter": "A", "text": "Primary neoplasm (liposarcoma, fibrosarcoma)"}, {"letter": "B", "text": "Retroperitoneal hematoma"}, {"letter": "C", "text": "Abscess"}, {"letter": "D", "text": "Retroperitoneal fibrosis"}], "images": ["assets/q3a_3b_p006_01.jpg"], "explanationImages": ["assets/a3a_3b_p023_01.jpg"], "answer": "B", "explanation": "Answer B. Retroperitoneal hematoma. Iliopsoas is the most common site for a spontaneous retroperitoneal hemorrhage secondary to either anticoagulation or a bleeding diathesis. The MR appearance of the hematoma is variable, depending on the age of the hematoma. Imaging Findings: Postcontrast axial images through the lumbar spine demonstrate collection within the right psoas muscle concerning for a soft tissue phlegmon/developing abscess (A). On the sagittal STIR, marrow edema is seen within L4 and L5 vertebral bodies and mild edema along anterior disk and prevertebral soft tissues (dotted arrow). Also note that preexisting Modic type 2/3 (type 2, yellow marrow conversion, and type 3, subchondral sclerosis) endplate changes can often partially obscure the presence of edema. These findings are consistent with diskitis/osteomyelitis with right psoas in the provided clinical context. Discussion: Infection and abscess formation in the iliopsoas are typically secondary to spread of infection from contiguous structures. Common bowel sources of an iliopsoas infection include diverticulitis, Crohn disease, and appendicitis. Renal sources include pyelonephritis or renal/perirenal abscess. It is important to look for secondary features of infection such as fat stranding, blurring of the fat planes, and ectopic gas. Primary infection is rare unless the patient is immunocompromised or a user of intravenous drugs, in which case the infection is usually due to Staphylococcus aureus and mixed gram-negative organisms. Primary neoplasms such as liposarcoma, fibrosarcoma, or hemangiopericytoma rarely originate from the iliopsoas compartment. A psoas abscess can lead to significant morbidity and mortality. Risk factors include advanced age, bacteremia, and inadequate treatment. Differential Diagnosis: The most common differential diagnosis is hematoma, which can have a variable appearance depending on the age of the hematoma. Also abscess can have secondary hemorrhage and blood products can have superimposed infection. Neoplasms such as lymphoma, melanoma, or metastasis can be considered and may involve the psoas compartment. Accurate interpretation of these findings is therefore based on the proper clinical context.\n\nReferences: Chern CH, Hu SC. Psoas abscess: making an early diagnosis in the ED. Am J Emerg Med. 1997;15(1):83- 88. Muckley T, Schutz T, Kirschner M, et al. Psoas abscess: the spine as a primary source of infection. Spine. 2003;28(6):E106-E113."}, {"number": "4a", "stem": "A 54-year-old male presents with low-grade fever, sweats, low back pain, and possible new cardiac murmur. What is the most likely diagnosis in the current clinical scenario?", "options": [{"letter": "A", "text": "Rheumatoid arthritis"}, {"letter": "B", "text": "Metastasis"}, {"letter": "C", "text": "Facet joint septic arthritis"}, {"letter": "D", "text": "Modic type 1 degenerative changes"}], "images": ["assets/q4a_4b_p007_01.jpg"], "explanationImages": ["assets/a4a_4b_p024_01.jpg"], "answer": "C", "explanation": "Answer C. Facet joint septic arthritis. Postcontrast T1 and STIR images demonstrate a small collection and increased STIR signal abnormality within the L4-L5 facet joint, consistent with septic facet joint."}, {"number": "4b", "stem": "A 54-year-old male presents with low-grade fever, sweats, low back pain, and possible new cardiac murmur. Which of the following is the most common organism associated with this entity?", "options": [{"letter": "A", "text": "Staphylococcus aureus"}, {"letter": "B", "text": "Streptococcus"}, {"letter": "C", "text": "Clostridium difficile"}, {"letter": "D", "text": "E. coli"}], "images": ["assets/q4a_4b_p007_01.jpg"], "explanationImages": ["assets/a4a_4b_p024_01.jpg"], "answer": "A", "explanation": "Answer A. Staphylococcus aureus. Staphylococcus aureus is the offending organism in a majority of the cases. The next most common organism is Streptococcus. Imaging Findings: Sagittal postcontrast T1w imaging demonstrates a nonenhancing fluid collection seen along the inferior aspect of the L4-L5 facet joint (A). Sagittal STIR demonstrates marrow and periarticular soft tissue edema (solid arrow, B) and paraspinal muscular edema (dotted arrow). Findings are suggestive of septic facet arthritis in the given clinical scenario. Discussion: The most common cause is hematogenous contamination. Otherwise, infection can be acquired through direct inoculation from penetrating trauma, surgical intervention, or diagnostic procedures such as facet joint injections. It is also important to consider pelvic sources such as diverticulitis/appendicitis, or IBD. Predisposing factors include immunosuppression, IVDU, and diabetes. Secondary complications to be aware of are epidural extension of infection resulting in cord compression and neuroforaminal narrowing. Intrathecal spread of infection could lead to meningitis/arachnoiditis. Differential Diagnosis: Facet joint osteoarthritis and rheumatoid arthritis. Particularly, facet joint synovial cyst can often exist in the setting of advanced degenerative changes and pedicle stress reaction. This creates a diagnostic dilemma because of morphologic overlap with septic arthritis; however, findings such as rim enhancement and clinical features of infection favor septic arthritis.\n\nReferences: Heenan SD, Britton J. Septic arthritis in a lumbar facet joint: a rare cause of an epidural abscess. Neuroradiology. 1995;37:462-464. Michel-Batot C, Dintinger H. A particular form of septic arthritis: septic arthritis of the facet joint. Joint Bone Spine. 2008;75(1):78-83."}, {"number": "5a", "stem": "A 61-year-old male, newly immigrated from Brazil, presents with focal back tenderness, weakness, and low-grade fever. A CT of the chest was performed with contrast; key finding is shown above. What is the next best step?", "options": [{"letter": "A", "text": "Bone scan"}, {"letter": "B", "text": "MRI of the spine"}, {"letter": "C", "text": "Antibiotics"}, {"letter": "D", "text": "Surgery"}], "images": ["assets/q5a_5b_p008_01.jpg"], "explanationImages": ["assets/a5a_p026_01.jpg"], "answer": "B", "explanation": "Answer B. MRI of the spine. Given the patient's symptoms and paraspinal soft tissue thickening, it is important to determine intrathecal involvement. An MRI will also provide superior soft tissue detail and assess for osseous involvement."}, {"number": "5b", "stem": "A 61-year-old male, newly immigrated from Brazil, presents with focal back tenderness, weakness, and low-grade fever. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Pyogenic osteomyelitis"}, {"letter": "B", "text": "Tuberculous spondylitis"}, {"letter": "C", "text": "Metastasis"}, {"letter": "D", "text": "Modic type 1 changes"}], "images": ["assets/q5a_5b_p008_01.jpg"], "explanationImages": ["assets/a5b_p027_01.jpg"], "answer": "B", "explanation": "Answer B. Tuberculous spondylitis. Tuberculous spondylitis (TS) often presents with hyperintense marrow, disk, phlegmon/abscess on the STIR, and marrow enhancement. There is usually sparing of the intervertebral disk. Imaging Findings: Postcontrast axial CT scan through the aortic arch demonstrates paraspinal soft tissue thickening (A). Axial postcontrast T1s images shows paravertebral abscess and enhancement (B). Sagittal STIR shows subligamentous phlegmon seen along the anterior cortices (C). Discussion: Tuberculous spondylitis, otherwise known as Pott disease, is one of the oldest known diseases. An inoculum is initially introduced along an anterior vertebral body with spread through lymphatics, commonly from pulmonary origin. It can be distinguished from pyogenic osteomyelitis where the initial infection is in the subchondral bone adjacent to the endplate and the intervertebral disks are typically affected. Furthermore, tuberculous spondylitis is more common in the thoracic spine, likely given its proximity to the pulmonary source. Current treatment modalities are highly effective against TS, particularly in the absence of severe deformity or neurologic deficit. Early diagnosis is essential to prevent significant morbidity due to progressive bone destruction, kyphotic deformity, and risk of developing paraplegia. Differential Diagnosis: Differential diagnosis includes fungal osteomyelitis and brucellar spondylitis, both of which may be indistinguishable from tuberculous spondylitis.\n\nReferences: Kilzilbash QF, Seaworth BJ. Multi-drug resistant tuberculous spondylitis. Ann Thorac Med. 2016;11(4): 233-236. Smith AS, Weinstein MA, Mizushima A, et al. MR imaging characteristics of tuberculous spondylitis vs vertebral osteomyelitis. AJNR Am J Neuroradiol. 1989;10:619-625."}, {"number": "6a", "stem": "A 63-year-old male with history of meningitis/encephalitis presenting with 3 days of progressive numbness and weakness. An MRI of the lumbar spine was performed; key images are shown below. Which of the following key abnormalities is noted on these images?", "options": [{"letter": "A", "text": "Nerve root clumping"}, {"letter": "B", "text": "Normal enhancement"}, {"letter": "C", "text": "Subdural hemorrhage"}, {"letter": "D", "text": "All of the above"}], "images": ["assets/q6a_6b_p009_01.jpg"], "explanationImages": ["assets/a6a_6b_p028_01.jpg"], "answer": "A", "explanation": "Answer A. Nerve root clumping. The images demonstrates nerve root clumping and abnormal enhancement that is often associated with arachnoiditis. This is caused by irritation and inflammation of the arachnoid matter resulting in abnormal adhesions of the nerve roots to each other and to the surface of the thecal sac."}, {"number": "6b", "stem": "A 63-year-old male with history of meningitis/encephalitis presenting with 3 days of progressive numbness and weakness. An MRI of the lumbar spine was performed; key images are shown below. Which of the following is most likely to result in arachnoiditis?", "options": [{"letter": "A", "text": "Tumor"}, {"letter": "B", "text": "Surgery"}, {"letter": "C", "text": "Demyelination"}, {"letter": "D", "text": "Advanced degenerative change"}], "images": ["assets/q6a_6b_p009_01.jpg"], "explanationImages": ["assets/a6a_6b_p028_01.jpg"], "answer": "B", "explanation": "Answer B. Surgery. Historically, arachnoiditis has been associated with trauma and infection. In modern times, however, lumbar spine surgery is the most common cause. Imaging Findings: Sagittal T2 and pre- and postcontrast T1w images (A-C) and two axial T2WI (D, E) of the lumbar spine show abnormal clumping and enhancement of the cauda equina nerve roots. On the more inferior axial image (E), the nerve roots are adherent to the posterior wall of the thecal sac, giving the impression of absent nerve roots, the so-called empty sac sign. Discussion: Arachnoiditis is caused by any process that causes inflammation of the arachnoid layer such as infection, trauma, hemorrhage, or intrathecal injection of some substances. It often results in chronic irreversible clumping and tethering of the nerve roots to each other or the surface of the thecal sac. It can occur anywhere along the spine but is most commonly observed in the lumbar spine with distinctive appearance of the cauda equina nerve roots. Arachnoiditis can also result in the formation of loculated CSF collections that are trapped as a result of adhesions. Restriction of movement and clumping of the nerve roots and leptomeningeal inflammation may present as back or leg pain or less commonly other neurologic deficits such as paresis, paresthesia, or loss of bowel/bladder control. In some cases, the inflammatory changes can calcify leading to \"arachnoiditis ossificans.\" No effective treatment is available. Differential diagnosis includes severe spinal stenosis, carcinomatous meningitis, and some intradural masses.\n\nReferences: Delamarter RB, Ross JS, Masaryk TJ, Modic MT, Bohlman HH. Diagnosis of lumbar arachnoiditis by magnetic resonance imaging. Spine. 1990;15(4):304-310. Ross JS, Masaryk TJ, Modic MT, et al. MR imaging of lumbar arachnoiditis. AJR Am J Roentgenol. 1987;149:1025-1032."}, {"number": "7a", "stem": "A 39-year-old man recently recovered from an upper respiratory tract infection presents with bilateral lower extremity weakness and difficulty breathing. An MRI with contrast was performed. Key images are shown below. What is the most likely diagnosis in the given clinical scenario?", "options": [{"letter": "A", "text": "Lymphoma"}, {"letter": "B", "text": "Metastasis"}, {"letter": "C", "text": "Guillain-Barre syndrome"}, {"letter": "D", "text": "Transverse myelitis"}], "images": ["assets/q7a_7b_p010_01.jpg"], "explanationImages": ["assets/a7a_7b_p029_01.jpg"], "answer": "C", "explanation": "Answer C. Guillain-Barre syndrome. Ascending weakness shortly after a viral illness with imaging features of smooth diffuse nerve root thickening and enhancement is highly suggestive of acute inflammatory demyelinating polyradiculoneuropathy (AIDP) or Guillain-Barre syndrome."}, {"number": "7b", "stem": "A 39-year-old man recently recovered from an upper respiratory tract infection presents with bilateral lower extremity weakness and difficulty breathing. An MRI with contrast was performed. Key images are shown below. Which of the following best describes the underlying pathophysiology for the above entity?", "options": [{"letter": "A", "text": "Autoimmune demyelination"}, {"letter": "B", "text": "Bacterial infection"}, {"letter": "C", "text": "Drop metastases"}, {"letter": "D", "text": "Granulomatous inflammation"}], "images": ["assets/q7a_7b_p010_01.jpg"], "explanationImages": ["assets/a7a_7b_p029_01.jpg"], "answer": "A", "explanation": "Answer A. Autoimmune demyelination. The pathologic mechanism for Guillain-Barre syndrome is thought to be autoimmune and related to cross-reactive antibodies against myelin; hence, the effectiveness of plasma exchange or intravenous immunoglobulin (IVIG) as treatment strategies. Imaging Findings: Sagittal pre- (A) and postcontrast (B) T1WI of the lumbar spine show smooth enhancement of the cauda equina nerve roots. Axial T2WI (C) and postcontrast T1WI (D) of the cauda equina show slight thickening and avid enhancement of all visualized nerve roots. Discussion: Acute inflammatory demyelinating polyradiculoneuropathy (AIDP) or Guillain-Barre syndrome is an autoimmune demyelinating disease that is often triggered by circulating antibodies to a recent infection (most commonly respiratory or gastrointestinal). The affected individuals are typically children or young adults without a gender predilection. The disease presents as ascending weakness and can involve the respiratory muscles and the cranial nerves. In addition to supportive care, plasma exchange and IVIG have been found to be effective therapies. However, the disease has a variable course, and, depending on severity, full recovery might take weeks or months. In a minority of cases, the disease may become chronic. In some severe cases, death has been reported. On imaging of the spine, the most common presentation is mild smooth thickening and enhancement of multiple cauda equina nerve roots and pial enhancement of the conus medullaris. The morphology and signal intensity of the spinal cord are preserved. Although nerve root enhancement is not specific to Guillain-Barre, enhancement of only the anterior nerve roots is strongly suggestive of this disease. Differential Diagnosis: The imaging differential diagnosis includes lymphoma, metastatic disease, infection, chronic polyneuropathies, postradiation effects, etc. Clinical history and lumbar puncture provide valuable information for narrowing the differential spectrum.\n\nReferences: Byun WM, Park WK, Park BH, Ahn SH, Hwang MS, Chang JC. Guillain-Barre syndrome: MR imaging findings of the spine in eight patients. Radiology. 1998;208:137-141. Yuki N, Hartung HP. Guillain-Barre syndrome. N Engl J Med. 2012;366:2294-2304."}, {"number": "8a", "stem": "A 59-year-old woman presenting with new sensory changes in bilateral arms. Patient had a previous similar episode that spontaneously resolved 6 months ago. An MRI was performed; key images are below. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Multiple sclerosis"}, {"letter": "B", "text": "Transverse myelitis"}, {"letter": "C", "text": "Guillain-Barre syndrome"}, {"letter": "D", "text": "Glioma"}], "images": ["assets/q8a_8b_p011_01.jpg"], "explanationImages": ["assets/a8a_8b_p030_01.jpg"], "answer": "A", "explanation": "Answer A. Multiple sclerosis. There are multifocal brain and cord lesions along with an enhancing lesion in the cervical cord, compatible with multiple sclerosis with evidence of dissemination in space (DIS) and time (DIT)."}, {"number": "8b", "stem": "A 59-year-old woman presenting with new sensory changes in bilateral arms. Patient had a previous similar episode that spontaneously resolved 6 months ago. An MRI was performed; key images are below. Which of the following imaging features is compatible with dissemination in space for multiple sclerosis?", "options": [{"letter": "A", "text": "Presence of enhancement"}, {"letter": "B", "text": "Simultaneous periventricular and cord lesions"}, {"letter": "C", "text": "Involvement of the dorsal column cervical cord"}, {"letter": "D", "text": "Multiple lesions perpendicular to the callososeptal junction"}], "images": ["assets/q8a_8b_p011_01.jpg"], "explanationImages": ["assets/a8a_8b_p030_01.jpg"], "answer": "B", "explanation": "Answer B. Simultaneous periventricular and cord lesions. Periventricular and infratentorial or cord lesions are classified as DIS. Although presence of enhancing or new lesion is classified as DIT, it is not a criterion for DIS. Imaging Findings: Sagittal and axial T2WI (A, C) and postcontrast sagittal and axial T1WI (B, D) of the cervical spine demonstrate short-segment mildly expansile cord signal abnormality with superimposed ill-defined rim enhancement. Brain MRI of the same patient demonstrates multiple periventricular white matter FLAIR hyperintense foci, some of which are oriented perpendicular (E). These findings are consistent with multiple sclerosis. Discussion: Multiple sclerosis is a demyelinating disease of the central nervous system. The clinical and imaging criteria for diagnosis revolve around the concept of dissemination of lesions in time and space. The disease typically affects young females more than males, and prognosis depends on the subtype. Clinically the disease manifests as muscle weakness/paralysis, paresthesia, gait disturbance, diplopia, and bladder/bowel dysfunction. The classic MR features of multiple sclerosis plaques when it involves the spine are one or more focal T2 hyperintense lesions that typically involve less than half the cross-sectional area of the cord and are less than two vertebral segments in length. The lesions are typically peripheral and asymmetric and may or may not enhance. Simultaneous presence of brain lesions with evidence of DIS and DIT is highly suggestive of MS. The appearance of the spine lesions alone, however, is nonspecific and often requires correlation with clinical history, lumbar puncture, and brain imaging to arrive at the correct diagnosis. Differential Diagnosis: The differential diagnosis includes neuromyelitis optica, intramedullary neoplasms, subacute infarction, and infection such as syphilis.\n\nReferences: Filippi M, Rocca M. MR imaging of multiple sclerosis. Radiology. 2011;259:659-681."}, {"number": "9a", "stem": "A 43-year-old woman with long-standing wrist pain presents with waxing and waning neck pain. Key images are shown below. Which of the following inflammatory disorders is classically associated with involvement of the atlantoaxial joint?", "options": [{"letter": "A", "text": "Osteoarthritis"}, {"letter": "B", "text": "Rheumatoid arthritis"}, {"letter": "C", "text": "Juvenile idiopathic arthritis"}, {"letter": "D", "text": "Ankylosing spondylitis"}], "images": ["assets/q9a_9b_p012_01.jpg"], "explanationImages": ["assets/a9a_9b_p032_01.jpg"], "answer": "B", "explanation": "Answer B. Rheumatoid arthritis. Rheumatoid disease in the axial skeleton typically manifests in the atlantoaxial joint (C1-C2). Osteoarthritis is a degenerative, rather than primary, inflammatory process that often affects the uncovertebral and facet joints at multiple levels. Juvenile idiopathic arthritis and ankylosing spondylitis are associated with bony overgrowth and fusion at multiple levels."}, {"number": "9b", "stem": "A 43-year-old woman with long-standing wrist pain presents with waxing and waning neck pain. Key images are shown below. Advanced rheumatoid arthritis of the cervical spine is associated with which of the following imaging features?", "options": [{"letter": "A", "text": "Abscess formation"}, {"letter": "B", "text": "Osteophyte formation"}, {"letter": "C", "text": "C1-C2 subluxation"}, {"letter": "D", "text": "Calcification"}], "images": ["assets/q9a_9b_p012_01.jpg"], "explanationImages": ["assets/a9a_9b_p032_01.jpg"], "answer": "C", "explanation": "Answer C. C1-C2 subluxation. Rheumatoid arthritis is a purely erosive inflammatory arthropathy. In advanced cases, erosive changes at the atlantoaxial joint and ligamentous laxity from chronic inflammation result in atlantoaxial subluxation and impaction. Imaging Findings: Sagittal STIR (A) and sagittal postcontrast (B) T1WI of the cervical spine and axial pre- (C) and postcontrast (D) images at C1-C2 demonstrate enhancing soft tissue centered at the atlantoaxial joint. Although no definite erosions are identified, the enhancing soft tissue likely represents early pannus formation in this patient with confirmed long-standing rheumatoid arthritis and no history of trauma. Discussion: Rheumatoid arthritis of the axial skeleton most frequently affects the atlantoaxial (C1-C2) articulation. In advanced disease, extensive inflammatory pannus results in erosion of the odontoid process and the facet joints and ligamentous instability, leading to atlantoaxial subluxation or impaction. The inflammatory pannus is mass-like and by direct extension or through erosion/subluxation can lead to spinal canal compromise and cord compression. On MR imaging, the rheumatoid pannus often shows heterogeneous high and low signal on T2WI and avid enhancement. Erosions appear as defects along the cortex of the bone with adjacent fluid signal on T2WI. Reactive marrow edema is often present in the affected bone. Radiography (plain films or CT) is more sensitive for detecting erosions, whereas MRI is superior in identifying inflammatory pannus and marrow edema, which typically precede frank erosions. Generally, the imaging features have to be combined with clinical information (patient demographics, anatomic distribution and time course of disease, and laboratory tests) to arrive at the correct diagnosis. Differential Diagnosis: The imaging features of rheumatoid arthritis can mimic infection and other seronegative spondyloarthropathies. Correlation with clinical features and involvement of other joints is essential for accurate diagnosis.\n\nReferences: Jurik AG. Imaging the spine in arthritis-a pictorial review. Insights Imaging. 2011;2:177-191. Sommer OF, Kladosek A, Weiler V, Czembirek H, Boeck M, Stiskal M. Rheumatoid arthritis: a practical guide to state-of-the-art imaging, image interpretation, and clinical implications. Radiographics. 2005;25:381-398."}, {"number": "10a", "stem": "A 54-year-old man presenting with progressive sensory loss and urinary incontinence. An MRI of cervical spine was performed with contrast. Key images are shown below. What abnormality is incidentally found on the coronal localizer images for this cervicothoracic spine MRI (image F)?", "options": [{"letter": "A", "text": "Pneumothorax"}, {"letter": "B", "text": "Aortic dissection"}, {"letter": "C", "text": "Hilar lymphadenopathy"}, {"letter": "D", "text": "Liver mass"}], "images": ["assets/q10a_10b_p013_01.jpg"], "explanationImages": ["assets/a10a_10b_p033_01.jpg"], "answer": "C", "explanation": "Answer C. Hilar lymphadenopathy. The localizer images captured bilateral hilar lymphadenopathy that was subsequently verified on chest CT."}, {"number": "10b", "stem": "A 54-year-old man presenting with progressive sensory loss and urinary incontinence. An MRI of cervical spine was performed with contrast. Key images are shown below. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Metastasis"}, {"letter": "B", "text": "Lymphoma"}, {"letter": "C", "text": "Tuberculosis"}, {"letter": "D", "text": "Sarcoidosis"}], "images": ["assets/q10a_10b_p013_01.jpg"], "explanationImages": ["assets/a10a_10b_p033_01.jpg"], "answer": "D", "explanation": "Answer D. Sarcoidosis. Although metastatic disease, infection, and lymphoma are on the differential, the combination of these imaging features and right paratracheal and bilateral hilar lymphadenopathy strongly favors sarcoidosis. Imaging Findings: Sagittal T2WI (A) and sagittal pre- (B) and postcontrast (C) T1WI of the cervical spine and axial T2WI (D) and postcontrast T1WI (E) at C5-C6 demonstrate cord edema from C3 to T1 and superimposed mild cord expansion and nodular intramedullary enhancement centered at C5-C6 that involves the periphery of the cord more than the center. The coronal localizer images are notable for bilateral hilar lymphadenopathy (F). Discussion: Sarcoidosis typically affects young adults (20 to 40), and although the systemic disease has a female predominance, spinal sarcoidosis has a male predilection. Imaging evidence of CNS involvement in sarcoidosis is relatively uncommon (<10%), and spinal intramedullary sarcoidosis is even less common (<1%). The pathology of sarcoidosis is noncaseating granuloma formation in multiple organ systems. A wide spectrum of nonspecific imaging features have contributed to its reputation as one of the \"great mimickers.\" Sarcoidosis of the spine can manifest as a combination of leptomeningeal and intramedullary mass-like enhancement. When intramedullary lesions are present, the cord often appears expanded with focal or diffuse T2 hyperintense signal and variable superimposed nodular intramedullary enhancement that favors the periphery of the cord. This is likely due to spread of leptomeningeal inflammation through perivascular spaces into the cord. Clinical symptoms are variable and include a combination of weakness, paresthesia, and bladder/bowel dysfunction. Corticosteroids and immunosuppressive agents are the mainstay of therapy. Differential Diagnosis: The differential diagnosis for intramedullary lesions of sarcoidosis includes intramedullary neoplasms, lymphoma, subacute infarction, multiple sclerosis, and transverse myelitis. The differential diagnosis for leptomeningeal involvement includes infection, including tuberculosis and lymphoma.\n\nReferences: Ginat DT, Dhillon G, Almast J. Magnetic resonance imaging of neurosarcoidosis. J Clin Imaging Sci. 2011;1:15. Sohn M, Culver DA, Judson MA, Scott TF, Tavee J. Nozaki K Spinal cord neurosarcoidosis. Am J Med Sci. 2014;347:195-198."}, {"number": "11a", "stem": "A 32-year-old woman presenting with 1-week history of gait instability and ataxia. Key images from MRI are shown below. Which of the following best describes the anatomic location of this abnormality?", "options": [{"letter": "A", "text": "Lateral columns"}, {"letter": "B", "text": "Dorsal columns"}, {"letter": "C", "text": "Posterior horn cells"}, {"letter": "D", "text": "Anterior horn cells"}], "images": ["assets/q11a_11b_p014_01.jpg"], "explanationImages": ["assets/a11a_11b_p035_01.jpg"], "answer": "B", "explanation": "Answer B. Dorsal columns. The region of signal abnormality sharply delineated by presence of T2 hyperintense signal on the axial images corresponds to the dorsal/posterior columns of the spinal cord."}, {"number": "11b", "stem": "A 32-year-old woman presenting with 1-week history of gait instability and ataxia. Key images from MRI are shown below. Which of the following best describes the function of dorsal columns?", "options": [{"letter": "A", "text": "Motor-skeletal muscle"}, {"letter": "B", "text": "Sensory-pain"}, {"letter": "C", "text": "Sensory-crude touch"}, {"letter": "D", "text": "Sensory-fine touch, vibration, proprioception"}], "images": ["assets/q11a_11b_p014_01.jpg"], "explanationImages": ["assets/a11a_11b_p035_01.jpg"], "answer": "D", "explanation": "Answer D. Sensory-fine touch, vibration, proprioception. The dorsal column medial lemniscus (DCML) system is responsible for transmission of fine touch, vibration, and proprioception sensory input to the brain. Imaging Findings: Midsagittal STIR images of the cervical and thoracic spine (A, B) and representative axial T2 and postcontrast T1WI (C, D) show nonenhancing signal abnormality in the posterior portion for the entire spinal cord that is limited to the dorsal columns. Discussion: Subacute combined degeneration, generally attributed to vitamin B12 deficiency, results in selective demyelination of the dorsal and sometimes lateral columns of the spinal cord. The presenting symptoms are paresthesia in hands and feet and gait ataxia. The imaging abnormalities initially manifest in the upper thoracic cord but can progress to involve the entire length of the cord and are bilateral. The \"inverted V sign\" on axial T2WI of the spinal cord represents bilateral high signal in the dorsal columns. On sagittal T2/STIR images, the abnormal high signal involves a long segment and although ill defined spares the anterior half of the cord. Enhancement is usually absent. If diagnosed early, the abnormalities resolve and neurologic function improves after correction of B12 deficiency. Differential Diagnosis: The imaging differential diagnosis for subacute combined degeneration includes B12 deficiency, either due to inadequate intake or malabsorption or indirectly as a result of copper deficiency or nitrous oxide anesthesia. Additionally, infections such as syphilis, herpes, or HIV may also have a similar imaging appearance.\n\nReferences: Ravina B, Loevner LA, Bank W. MR findings in subacute combined degeneration of the spinal cord. A case of reversible cervical myelopathy. AJR Am J Roentgenol. 2000;74(3):863-865."}, {"number": "12a", "stem": "A 15-year-old male with distal extremity motor weakness and foot deformity. An MRI was performed; key images are shown below. Which of the following clinical information is useful in understanding the above changes?", "options": [{"letter": "A", "text": "Family history"}, {"letter": "B", "text": "Recent international travel"}, {"letter": "C", "text": "Recent URI"}, {"letter": "D", "text": "Underlying primary malignancy"}], "images": ["assets/q12a_12b_p015_01.jpg"], "explanationImages": ["assets/a12a_12b_p036_01.jpg"], "answer": "A", "explanation": "Answer A. Family history. There is diffuse fusiform enlargement of nerve roots. Many hereditary polyneuropathies can explain the imaging findings and clinical features in this patient. Therefore, a careful clinical history is extremely important."}, {"number": "12b", "stem": "A 15-year-old male with distal extremity motor weakness and foot deformity. An MRI was performed; key images are shown below. Further workup revealed decreased nerve conduction velocity, and contrast-enhanced MRI shows no corresponding abnormal enhancement (images not shown). The most likely diagnosis is which of the following?", "options": [{"letter": "A", "text": "Amyloid polyneuropathy"}, {"letter": "B", "text": "Neurosarcoid"}, {"letter": "C", "text": "Charcot-Marie-Tooth disease"}, {"letter": "D", "text": "Lymphoma"}], "images": ["assets/q12a_12b_p015_01.jpg"], "explanationImages": ["assets/a12a_12b_p036_01.jpg"], "answer": "C", "explanation": "Answer C. Charcot-Marie-Tooth disease. The imaging and clinical features are most compatible with Charcot-Marie-Tooth disease, one of the hereditary motor and sensory neuropathy. Imaging Findings: There is fusiform enlargement of nerve roots with mild intrinsic T2 hyperintensity seen bilaterally in the cervical spine (A and B). Reported lack of contrast enhancement argues against plexiform neurofibromatosis. In the younger age group as in this patient, this finding is most consistent with Charcot-Marie-Tooth disease. Discussion: Charcot-Marie-Tooth disease (CMT) is an autosomal dominant hereditary motor and sensory neuropathy characterized by distal muscle weakness, foot deformities, decreased nerve conduction velocity, and typical onion bulb hypertrophy noted on pathology. On imaging, there is fusiform enlargement of nerve roots diffusely and variable minimal to no enhancement. Differential Diagnosis: There may be cranial nerve involvement associated with CMT, although not as commonly as, with chronic inflammatory demyelinating polyneuropathy (CIDP), which is a differential diagnosis. Overall clinical features, EMG findings, and family history help differentiation with CIDP. Other etiologies such as plexiform neurofibromas, neurosarcoidosis, lymphoma, amyloid polyneuropathy, or inflammatory demyelinating polyneuropathies may also have varying degrees of nerve enlargement; however, many of these also have relatively more enhancement.\n\nReferences: Aho TR, Wallace RC, Pitt AM, et al. Charcot-Marie-Tooth disease: extensive cranial nerve involvement on CT and MR imaging. AJNR Am J Neuroradiol. 2004;25(3):494-497. De Smet K, De Maeseneer M, Talebian Yazdi A, et al. MRI in hypertrophic mono- and polyneuropathies. AJNR Am J Neuroradiol. 2004;25(3):494-497."}, {"number": "13a", "stem": "A 50-year-old male with reduced range of motion, low back pain, and chronic compression fracture noted on radiograph (not shown). An MRI was performed; key images shown below. Based on the above images, which of the following serum abnormalities can be seen in this patient?", "options": [{"letter": "A", "text": "RF positivity"}, {"letter": "B", "text": "ANA positivity"}, {"letter": "C", "text": "CRP elevation"}, {"letter": "D", "text": "Leukocytosis"}], "images": ["assets/q13a_13b_p016_01.jpg"], "explanationImages": ["assets/a13a_13b_p037_01.jpg"], "answer": "C", "explanation": "Answer C. CRP elevation. This is likely ankylosing spondylitis, with presence of fusing syndesmophytes, bilateral sacroiliac joint fusion, and a chronic fracture involving L3 vertebral body. Although nonspecific, CRP has been found to be elevated in AS. Because this is a seronegative spondyloarthropathy, the RF factor is absent. ANA is seen with lupus, and there is no evidence of infection to suggest leukocytosis."}, {"number": "13b", "stem": "A 50-year-old male with reduced range of motion, low back pain, and chronic compression fracture noted on radiograph (not shown). An MRI was performed; key images shown below. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Rheumatoid arthritis"}, {"letter": "B", "text": "Ankylosing spondylitis"}, {"letter": "C", "text": "Diskitis/osteomyelitis"}, {"letter": "D", "text": "Psoriatic arthritis"}], "images": ["assets/q13a_13b_p016_01.jpg"], "explanationImages": ["assets/a13a_13b_p037_01.jpg"], "answer": "B", "explanation": "Answer B. Ankylosing spondylitis. Imaging Findings: Fusing thin smooth syndesmophytes (A) and fusion of bilateral sacroiliac joints (B) are seen on sagittal and axial T1w images. Note a chronic compression fracture of L3 (dotted arrow, A). These findings are compatible with ankylosing spondylitis. Discussion: Ankylosing spondylitis (AS) is a debilitating seronegative spondyloarthropathy, characterized by early onset of symmetric, bilateral sacroiliac joint inflammation. Early in the course of disease, there is subchondral bone resorption along the iliac side of the joint with joint space widening and reactive sclerosis. Later in the course of disease, the joint space is completely ankylosed. The hallmark of vertebral column involvement is formation of fusing syndesmophytes that result from ossification within the outer fibers of the disk annulus fibrosis. Extensive syndesmophyte formation results in fusion across the disk space and an undulating spinal contour, namely, the bamboo spine. The fused spine is rigid and prone to fractures and, as seen in this case, therefore should be suspected in AS patients with acute worsening of pain. Differential Diagnosis: The differential diagnosis is spondylosis deformans due to prominent osteophyte formation; however, those degenerative bony spurs typically arise slightly removed from disk space. Diffuse idiopathic skeletal hyperostosis is typically thick with flowing pattern of ossification along the anterior longitudinal ligament. Additionally, the sacroiliitis is not seen with these latter entities.\n\nReferences: Ostergaard M, Lambert RG. Imaging in ankylosing spondylitis. Ther Adv Musculoskelet Dis. 2012;4(4): 301-311."}, {"number": "14", "stem": "A 25-year-old female presented with rapidly progressive lower extremity weakness and incontinence. An MRI was performed; key image is shown below. Which of the following imaging features differentiates this condition from multiple sclerosis?", "options": [{"letter": "A", "text": "Longitudinally extensive nature"}, {"letter": "B", "text": "Thoracic cord involvement"}, {"letter": "C", "text": "Central cord involvement"}, {"letter": "D", "text": "Lack of cord expansion"}], "images": ["assets/q14_p017_01.jpg"], "explanationImages": ["assets/a14_p039_01.jpg"], "answer": "A", "explanation": "Answer A. Longitudinally extensive nature. The lesion in the thoracic cord spans more than three vertebral segments. Such involvement is relatively unusual with multiple sclerosis. Imaging Findings: There is extensive intrinsic T2 hyperintensity within the thoracic cord spanning greater than three vertebral segments, compatible with longitudinally extensive transverse myelitis (LETM). Discussion: Longitudinally extensive transverse myelitis (LETM) is characterized by intrinsic cord signal intensity abnormality that spans more than three vertebral segments with greater than two-thirds cord cross section involved. There may be associated cord expansion and variable degree of enhancement. Differential Diagnosis: This pattern of abnormality has wide differential considerations, such as demyelinating conditions, collagen vascular disorders, paraneoplastic, radiation changes, and infectious myelitis. Vascular abnormalities including dural AV fistula and cord infarct can also result in such signal changes. Idiopathic TM is a diagnosis of exclusion and accounts for 15% to 30% of acute cases. Clinically, these patients can present with motor, sensory, and autonomic dysfunction. Clinical course and management of LETM rely on the underlying cause. The idiopathic TM prognosis is variable ranging from complete recovery to severe disability.\n\nReferences: Choi KH, Lee KS, Chung SO, et al. Idiopathic transverse myelitis: MR characteristics. AJNR Am J Neuroradiol. 1996;17(6):1151-1160. Mirbagheri S, Eckart Sorte D, Zamora CA, et al. Evaluation and management of longitudinally extensive transverse myelitis: a guide for radiologists. Clin Radiol. 2016;71(10):960-971."}, {"number": "15", "stem": "A 52-year-old male presents with known diskitis/osteomyelitis, on IV antibiotics, now with worsening bilateral lower extremity weakness. Key images from MRI are shown below. What is the next best step in management?", "options": [{"letter": "A", "text": "Biopsy with culture and sensitivity"}, {"letter": "B", "text": "Urgent neurosurgical consultation"}, {"letter": "C", "text": "IV steroid administration"}, {"letter": "D", "text": "Continued follow-up"}], "images": ["assets/q15_p018_01.jpg"], "explanationImages": ["assets/a15_p040_01.jpg"], "answer": "B", "explanation": "Answer B. Urgent neurosurgical consultation. There is diskitis/osteomyelitis and epidural abscess causing cord compression. Urgent neurosurgical consultation is therefore necessary. Imaging Findings: There is a posterior epidural fluid collection with rim enhancement, seen on sagittal T2 (A) and postcontrast sagittal T1w image (C). Note presence of edema and fluid in the disk space and vertebral body (dotted arrow, A). Findings are compatible with diskitis/osteomyelitis with epidural abscess. Discussion: Epidural abscess is a nontraumatic spinal cord emergency. The neurologic deficits are severe and in the absence of timely intervention can become permanent. These can result from hematogenous inoculation or direct contiguous spread from diskitis osteomyelitis. The most common causative organism is Staphylococcus aureus. Other etiologies include Streptococcus, E. coli, or Pseudomonas. IV drug use and immunocompromised state are underlying risk factors. The neurologic deficits are largely due to extrinsic compression from the epidural abscess; occasionally, this may be accompanied by a thrombophlebitis contributing to neurologic compromise. Therefore, urgent neurosurgical consultation for decompression and drainage is warranted for these patients. IV antibiotic alone will not help with the spinal cord decompression.\n\nReferences: Flanagan EP, Pittock SJ. Diagnosis and management of spinal cord emergencies. Handb Clin Neurol. 2017;140:319-335."}];
    const APP_ID = "neuroradiology-spine-infection-inflammation-demyelination-quiz-ch10";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SEED_VERSION = 1;
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID || saved.defaultSeedVersion !== DEFAULT_SEED_VERSION) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        defaultSeedVersion: DEFAULT_SEED_VERSION,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
