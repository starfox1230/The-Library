  <script>
    const QUESTIONS = [{"number": "1", "stem": "What is the least common finding on bronchial artery angiography performed for massive hemoptysis?", "options": [{"letter": "A", "text": "Neovascularity"}, {"letter": "B", "text": "Hypervascularity"}, {"letter": "C", "text": "Arteriovenous shunting"}, {"letter": "D", "text": "Dilated and tortuous bronchial arteries"}, {"letter": "E", "text": "Active bleeding"}], "images": [], "explanationImages": ["assets/a1_p002_01.jpg", "assets/a1_p002_04.jpg"], "answer": "E", "explanation": "Answer E. Massive hemoptysis is a term with varying definitions; however, in practice, it roughly equates to an expelled quantity of at least 300 mL blood in 24 hours. The typical patient has a history of chronic lung disease such as cystic fibrosis or sarcoidosis, chronic infection such as fungal or mycobacterial, or malignancy such as primary lung carcinoma. Although the blood loss from hemoptysis virtually never results in hemodynamic instability, it remains life-threatening because of potential airway and lung parenchyma compromise. Initial management includes airway protection with dependent positioning of the bleeding lung, and often intubation and placement of a bronchial blocker on the affected side. Angiography with embolization has an increasing role among the different strategies to control lung hemorrhage. In the IR suite, catheterization of the bronchial arteries, which often arise from the descending thoracic aorta at level T5-T6, is the primary objective. The arteries may be enlarged and tortuous. Dense networks of neo- and hypervascularity are often seen in the affected lung segments. Frank shunting to the pulmonary veins or arteries may be present and does not represent a contraindication to embolization, although the technique may be adjusted. Active bleeding is virtually never seen angiographically, and embolization should be performed in its absence. Additionally, in patients who have undergone prior embolization or those with long-standing chronic lung diseases, extensive parasitization may occur with feeding arteries emanating from the intercostals, inferior phrenics, internal thoracics, and costo- and thyrocervical trunks, among others. Figure 1-1 Subtracted (left) and unsubtracted (right) angiographic images from right bronchial artery catheterization demonstrate a tortuous and dilated bronchial artery, neovascularity, hypervascularity, and shunting to the superior pulmonary vein (arrow) in the right lung. Note the bronchial blocker in the right mainstem bronchus. The patient has cystic fibrosis and presented with massive hemoptysis. Figure 1-2 Patient with allergic bronchopulmonary aspergillosis and multiple episodes of hemoptysis treated with bronchial artery embolization. Thoracic angiography demonstrated no further filling of bronchial arteries. Angiography from the left inferior phrenic artery showed parasitization to the left lung with neo- and hypervascularity as well as shunting to the left pulmonary artery (arrow). References: Lorenz J, Sheth D, Patel J. Bronchial artery embolization. Semin Intervent Radiol. 2012;29(3):155-160. Yoon W, Kim JK, Kim YH, Chung TW, Kang HK. Bronchial and nonbronchial systemic artery embolization for life-threatening hemoptysis: a comprehensive review. Radiographics. 2002;22(6):1395-1409."}, {"number": "2", "stem": "What is the most commonly used first-line embolic agent in bronchial artery embolization for hemoptysis?", "options": [{"letter": "A", "text": "Coils"}, {"letter": "B", "text": "nBCA (N-butyl cyanoacrylate) glue"}, {"letter": "C", "text": "Gelfoam slurry"}, {"letter": "D", "text": "Permanent particles"}, {"letter": "E", "text": "Amplatzer vascular plug"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Bronchial artery embolization in the setting of hemoptysis relies on selective catheterization of the bronchial arteries, which arise from the descending thoracic aorta. Various anatomic configurations exist including right and left bronchial arteries, and intercostobronchial artery trunks. Once a bronchial artery is selected, the diagnostic catheter, or more often a coaxially introduced microcatheter, is advanced to a stable position to ensure delivery of an embolic agent to the intended territory. Nontarget embolization can occur to the spinal artery if present, as well as to the aorta and its downstream branches. Ideally, the embolic agent produces distal arterial occlusion, but not so distal that tissue devascularization and infarction can occur. Particles are the ideal agent, as they can be sized accordingly, delivered in precise amounts, and mixed with iodinated contrast for visualization. Permanent particles, such as polyvinyl alcohol (PVA) and tris-acryl gelatin microspheres (TAGM), are commonly used. Temporary agents such as gelfoam slurry are less desirable, as early recanalization can occur leading to rebleeding. Because hemoptysis often occurs in the setting of chronic lung diseases, future rebleeding should be anticipated. Coils and plugs are avoided, as they would produce permanent proximal arterial occlusion and eliminate the pathway for future catheterizations if (when) rebleeding occurs. Glue, a liquid embolic, can be difficult to control and can produce such distal occlusion that tissue infarction can occur. References: Lorenz J, Sheth D, Patel J. Bronchial artery embolization. Semin Intervent Radiol. 2012;29(3):155-160. Yoon W, Kim JK, Kim YH, Chung TW, Kang HK. Bronchial and nonbronchial systemic artery embolization for life-threatening hemoptysis: a comprehensive review. Radiographics. 2002;22(6):1395-1409."}, {"number": "3", "stem": "What is the most common cause of pulmonary artery pseudoaneurysm?", "options": [{"letter": "A", "text": "Iatrogenic"}, {"letter": "B", "text": "Penetrating trauma"}, {"letter": "C", "text": "Congenital"}, {"letter": "D", "text": "Infection"}, {"letter": "E", "text": "Collagen vascular disease"}], "images": [], "explanationImages": ["assets/a3_p004_01.jpg"], "answer": "A", "explanation": "Answer A. Pulmonary artery catheterization for the purposes of physiologic monitoring and cardiopulmonary evaluation represents the most common etiology for pulmonary artery pseudoaneurysm. During catheter manipulation, or balloon inflation or deflation, a pulmonary artery branch may develop a contained perforation resulting in a pseudoaneurysm. Endovascular treatment consists of selective catheterization of the feeding pulmonary artery branch, and ideally occlusion of the branch distal and proximal to the pseudoaneurysm, effectively excluding it from the circulation. Coils or plugs work well in this application. Penetrating trauma, congenital, infection, and collagen vascular disease are more rare etiologies. Figure 3-1 Coronal and sagittal MIP CTA images (top) show a right middle lobe pulmonary artery branch with indwelling Swan-Ganz catheter and associated pseudoaneurysm (arrowheads). There is extensive surrounding parenchymal consolidation from episodic hemorrhage. Subsequent selective catheterization and coil embolization (bottom) distal and proximal to the pseudoaneurysm (arrow) is performed, effectively excluding it from the circulation and eliminating the risk of future rupture. Reference: Lafita V, Borge MA, Demos TC. Pulmonary artery pseudoaneurysm: etiology, presentation, diagnosis, and treatment. Semin Intervent Radiol. 2007;24(1):119-123."}, {"number": "4", "stem": "A 48-year-old woman with multiple myeloma and preexisting left chest portacath presents for placement of a dual-lumen tunneled central venous catheter for apheresis. Following placement, the new catheter only aspirates a small amount of clear fluid. The patient complains of chest pain and becomes tachycardic and hypotensive. What are you most concerned about?", "options": [{"letter": "A", "text": "Tension pneumothorax"}, {"letter": "B", "text": "Cardiac tamponade"}, {"letter": "C", "text": "Vena cava laceration with hemorrhagic shock"}, {"letter": "D", "text": "Adverse reaction to intravenous sedation"}], "images": ["assets/q4_p005_01.jpg"], "explanationImages": ["assets/a4_p005_01.jpg"], "answer": "B", "explanation": "Answer B. Placement of central venous catheters is one of the most basic IR procedures; however, complications from the procedure, albeit uncommon, can be fatal. The case image shows a left chest portacath and a larger-caliber tunneled central venous catheter. Note the right lateral course of the tunneled catheter outside the expected region of the superior vena cava, concerning for extravascular position. The completion radiograph shows no large pneumothorax, hemothorax, or widened mediastinum, eliminating choices A and C. Reactions to intravenous sedation more commonly cause slowed breathing with hypoxia, bradycardia, as well as hypotension. One must keep in mind that the pericardial reflections extend well beyond the cardiac chambers, encompassing portions of the superior vena cava, inferior vena cava, main pulmonary artery, ascending aorta, and pulmonary veins. In the case example, a right lateral wall perforation of the lower superior vena cava occurred, allowing blood under venous pressure to fill the pericardial space. Ultimately, the injury was treated using a combination of endovascular balloon tamponade over the SVC perforation as well as a placement of a subxiphoid pericardial drain. References: Gibson F, Bodenham A. Misplaced central venous catheters: applied anatomy and practical management. Br J Anaesth. 2013;110(3):333-346. Mitchell SE, Clark RA. Complications of central venous catheterization. AJR Am J Roentgenol. 1979;133(3):467-476."}, {"number": "5", "stem": "Patients with cardiac tamponade demonstrate which of the following?", "options": [{"letter": "A", "text": "Collapse of the internal jugular vein on physical examination"}, {"letter": "B", "text": "Mediastinal shift to the left on radiography"}, {"letter": "C", "text": "Cardiac chamber collapse on echosonography"}, {"letter": "D", "text": "High-voltage QRS complexes on the electrocardiogram"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. On physical examination, patients in cardiac tamponade often demonstrate jugular venous distention, diminished heart sounds, tachycardia, pulsus paradoxus, and altered mental status. Radiography is often normal or may show an enlarged cardiac silhouette because of the accumulation of pericardial fluid (more common with chronic effusions). On electrocardiogram, sinus tachycardia, electrical alternans, and low-voltage QRS complexes can be seen. On echosonography, pericardial fluid is present in variable quantities depending on the rate of accumulation. Additionally, the cardiac chambers demonstrate impaired diastolic filling and collapse, often the right-sided chambers first, as the pericardial pressure exceeds intracardiac pressure. References: Bayer O, Schummer C, Richter K, Fröber R, Schummer W. Implication of the anatomy of the pericardial reflection on positioning of central venous catheters. J Cardiothorac Vasc Anesth. 2006;20(6):777-780. Spodick DH. Acute cardiac tamponade. N Engl J Med. 2003;349(7):684-690."}, {"number": "6", "stem": "A 38-year-old man is found unconscious by the side of a road, apparently ejected from a nearby vehicle that had crashed into a telephone pole. He is brought to the ED (emergency department) and a CTA (computed tomography angiography) of the chest is performed. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Acute traumatic aortic injury (ATAI)"}, {"letter": "B", "text": "Chronic aortic dissection with aneurysm formation"}, {"letter": "C", "text": "Aortitis"}, {"letter": "D", "text": "Motion artifact"}], "images": ["assets/q6_p006_01.jpg"], "explanationImages": ["assets/a6_p006_01.jpg"], "answer": "A", "explanation": "Answer A. ATAI includes minimal intimal injury (grade I), intramural hematoma (grade II), pseudoaneurysm formation (grade III), and transection with active bleeding (grade IV). ATAIs classically occur at the 3 fixation points: (1) aortic root, (2) aortic isthmus, and (3) diaphragmatic hiatus. Injuries at the isthmus represent the overwhelming majority of those seen in practice, whereas aortic root injuries are rarely encountered because of the high lethality of the injury location. The images in the case mediastinal hematoma. Choices B and C are incorrect given the history, CT appearance, and secondary findings such as periaortic hematoma and pulmonary contusions. References: Lee WA, Matsumura JS, Mitchell RS, et al. Endovascular repair of traumatic thoracic aortic injury: clinical practice guidelines of the Society for Vascular Surgery. J Vasc Surg. 2011;53(1):187-192. Raptis CA, Hammer MM, Raman KG, Mellnick VM, Bhalla S. Acute traumatic aortic injury: practical considerations for the diagnostic radiologist. J Thorac Imaging. 2015;30(3):202-213."}, {"number": "7", "stem": "An adult with a grade III descending thoracic aortic injury due to blunt trauma is admitted to the ICU. The patient is hemodynamically stable. What is the treatment of choice for this type of traumatic aortic injury?", "options": [{"letter": "A", "text": "Immediate surgery with excision and placement of an interposition graft"}, {"letter": "B", "text": "Medical management with blood pressure control"}, {"letter": "C", "text": "Urgent thoracic endovascular aortic repair (TEVAR) before discharge"}, {"letter": "D", "text": "Elective TEVAR after discharge"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Clinical practice guidelines from the Society of Vascular Surgery recommend TEVAR over open surgery and over expectant medical management for aortic injury grades II through IV. Additionally, TEVAR should be performed within 24 hours of diagnosis or before discharge in selected patients. Type I injuries can be managed expectantly with serial cross-sectional imaging. Reference: Lee WA, Matsumura JS, Mitchell RS, et al. Endovascular repair of traumatic thoracic aortic injury: clinical practice guidelines of the Society for Vascular Surgery. J Vasc Surg. 2011;53(1):187-192."}, {"number": "8", "stem": "What best explains the preserved in-line flow to the left upper extremity in this patient immediately after TEVAR for descending thoracic aortic dissection? The image is an LAO (left anterior oblique) thoracic aortogram.", "options": [{"letter": "A", "text": "Normal arterial variant"}, {"letter": "B", "text": "Surgical bypass"}, {"letter": "C", "text": "Arteriovenous fistula"}, {"letter": "D", "text": "In-line flow is not preserved"}], "images": ["assets/q8_p008_01.jpg"], "explanationImages": ["assets/a8_p008_01.jpg", "assets/a8_p009_01.jpg"], "answer": "B", "explanation": "Answer B. The normal branching of the thoracic aorta arch is right brachiocephalic artery, left common carotid artery, and most distal, the left subclavian artery. With thoracic aorta endograft placement, it is sometimes necessary to cover/exclude the left subclavian artery in order to fully treat the pathology and have an adequate landing zone for the device. In the case example, the right brachiocephalic artery and left common carotid artery are visualized; however, the native left subclavian artery is not filling. Instead, a left common carotid to left subclavian arterial bypass with a synthetic graft has been performed with preservation of in- line flow to the left upper extremity. This is easily distinguished from a normal variant, given the orthogonal takeoff of the bypass graft from the left common carotid artery (end-to-side anastomosis), as well as lack of visualized branches off the section of bypass graft. There is no venous filling to indicate an AVF, nor would this preserve flow to the left arm. Figure 8-1 Angiographic appearance of left carotid-subclavian arterial bypass with synthetic graft. Reference: Morgan TA, Steenburg SD, Siegel EL, Mirvis SE. Acute traumatic aortic injuries: posttherapy multidetector CT findings. Radiographics. 2010;30(4):851-867."}, {"number": "9", "stem": "A patient undergoes placement of a single lumen portacath by a local surgeon. She presents for evaluation of chest and neck swelling after receiving a chemotherapy infusion through the portacath. A portacath study with iodinated contrast is performed. What is the diagnosis?", "options": [{"letter": "A", "text": "Fibrin sheath"}, {"letter": "B", "text": "Clotted portacath reservoir"}, {"letter": "C", "text": "Pinch-off syndrome with extravasation"}, {"letter": "D", "text": "Normal portacath"}], "images": ["assets/q9_p009_03.jpg"], "explanationImages": ["assets/a9_p009_03.jpg", "assets/a9_p010_02.jpg", "assets/a9_p011_02.jpg"], "answer": "C", "explanation": "Answer C. The case images show a right axillosubclavian approach single lumen portacath with tip in the superior vena cava. Following injection of contrast through the access needle, there is appropriate opacification of the reservoir and catheter tubing. However, there is a jet of contrast extending laterally in the infraclavicular region that appears to arise from the catheter as it courses by the lateral border of the right first rib (Figure 9-1, red arrow). Figure 9-1 Portacath dye study showing \"pinch-off syndrome\" with catheter perforation and extravasation into the soft tissues (arrow). The findings are consistent with \"pinch-off syndrome.\" This occurs when the vein is accessed medial to the lateral border of the first rib at the time of portacath placement. The catheter becomes trapped between the overlying clavicle and underlying first rib, resulting in repetitive trauma and catheter injury. Findings can vary from subtle kink in the catheter to complete transection with catheter fragment embolization to the right heart chambers and pulmonary arteries. Portacath revision is recommended when pinch-off is identified. Axial CT image from the patient in the case example (Figure 9-2) shows extreme medial venous access in the subclavian vein. In the Instructions for Use (IFU), many manufacturers explicitly state venous access medial to the lateral border of the first rib is contraindicated when placing infraclavicular portacaths. Figure 9-2 Axial CECT (contrast-enhanced computed tomography) image from the patient in the case example shows the venous entry (red arrow) of the catheter quite medial to the lateral border of the first rib (blue arrow). Reference: Hinke DH, Zandt-Stastny DA, Goodman LR, Quebbeman EJ, Krzywda EA, Andris DA. Pinch-off syndrome: a complication of implantable subclavian venous access devices. Radiology. 1990;177(2):353-356."}, {"number": "10", "stem": "A 55-year-old woman on chronic hemodialysis presents for evaluation of a dysfunctional tunneled dialysis catheter. The catheter will flush but not aspirate. The scout image (left) demonstrates appropriate positioning with tip of the catheter at the superior cavoatrial junction. The catheter is freed up and retracted several centimeters. Injection of contrast through the catheter (right) demonstrates what pathology?", "options": [{"letter": "A", "text": "Normal finding"}, {"letter": "B", "text": "Venous perforation with extravasation"}, {"letter": "C", "text": "Fibrin sheath formation"}, {"letter": "D", "text": "Thrombosis of the left innominate vein and superior vena cava"}], "images": ["assets/q10_p012_03.jpg"], "explanationImages": ["assets/a10_p012_03.jpg"], "answer": "C", "explanation": "Answer C. The scout image shows a normally positioned tunneled hemodialysis catheter. Injection of contrast through the retracted catheter shows a long, thin tube filling with contrast extending from the left innominate vein into the superior vena cava, instead of the normal large-caliber central veins. Notice the double density in the caudal segment of the superior vena cava, where there is contrast filling the fibrin sheath and opacifying the normal vessel. Long-term indwelling central venous catheters are prone to the development of a fibrin sheath that forms along the catheter tubing and may ultimately obstruct some or all of the catheter lumens. A clue to its presence is a history of difficulty with aspiration. As negative pressure is applied to the catheter lumen, the fibrin sheath obstructs the end- or sideholes causing obstruction (similar to a one-way valve). Often, the catheter will flush appropriately. Reference: Janne d'Othée B, Tham JC, Sheiman RG. Restoration of patency in failing tunneled hemodialysis catheters: a comparison of catheter exchange, exchange and balloon disruption of the fibrin sheath, and femoral stripping. J Vasc Interv Radiol. 2006;17(6):1011-1015."}, {"number": "11", "stem": "Which of the following is a durable treatment for catheter-associated fibrin sheath formation?", "options": [{"letter": "A", "text": "Balloon fragmentation"}, {"letter": "B", "text": "Anticoagulation"}, {"letter": "C", "text": "Catheter exchange over the wire"}, {"letter": "D", "text": "Reversing the lines during hemodialysis"}], "images": [], "explanationImages": ["assets/a11_p013_04.jpg"], "answer": "A", "explanation": "Answer A. Catheter-associated fibrin sheath formation can be treated in several ways. Studies have shown short-duration tPA infusion through the catheter, catheter stripping, and balloon fragmentation of the sheath to be effective in restoring catheter function. Anticoagulation for 3 months is appropriate treatment for catheter-associated venous thrombosis, but unlikely to affect a fibrin sheath. If the catheter is exchanged over a wire, the new catheter will still reside within the sheath and quickly become dysfunctional. Our patient underwent balloon fragmentation with repeat venogram showing disruption of the sheath with filling of normal central veins (see Figure 11-1). Figure 11-1 Balloon fragmentation of catheter-associated fibrin sheath (see pretreatment image from question 10). The new catheter remained functional for 9 months after this intervention. References: Janne d'Othée B, Tham JC, Sheiman RG. Restoration of patency in failing tunneled hemodialysis catheters: a comparison of catheter exchange, exchange and balloon disruption of the fibrin sheath, and femoral stripping. J Vasc Interv Radiol. 2006;17(6):1011-1015. Savader SJ, Ehrman KO, Porter DJ, Haikal LC, Oteham AC. Treatment of hemodialysis catheter-associated fibrin sheaths by rt-PA infusion: critical analysis of 124 procedures. J Vasc Interv Radiol. 2001;12(6):711-715."}, {"number": "12", "stem": "An 18-year-old woman on oral contraceptive therapy presents to the ED with chest pain and shortness of breath. What is the diagnosis?", "options": [{"letter": "A", "text": "Aortic dissection"}, {"letter": "B", "text": "Pulmonary embolism"}, {"letter": "C", "text": "Pulmonary angiosarcoma"}, {"letter": "D", "text": "Lymphoma"}], "images": ["assets/q12_p013_03.jpg"], "explanationImages": ["assets/a12_p013_03.jpg", "assets/a12_p014_03.jpg"], "answer": "B", "explanation": "Answer B. The CTA images demonstrate a relatively uniform low-density filling defect straddling the main pulmonary artery bifurcation, extending into the right and left pulmonary arteries. The filling defect conforms to the vessel, without extension beyond. There are additional filling defects in the peripheral pulmonary artery branches. The right atrium and ventricle are abnormally dilated, and the left atrium and ventricle appear collapsed. With the patient history provided, the findings are consistent with acute pulmonary embolism (with severe right heart strain). The aorta appears normal. Pulmonary angiosarcoma is a rare tumor, which can arise in the pulmonary artery wall. The tumor is locally aggressive and often produces an irregular, lobulated, avidly enhancing soft tissue mass that fills the pulmonary artery (similar to clot) and can invade adjacent structures. Figure 12-1 Companion case of presumptive pulmonary embolism. Axial CTA image (left) shows a large central filling defect in the main pulmonary artery. Although enhancement of clot is not evident, there are no distal emboli, and MRI is recommended for further evaluation. Axial postcontrast T1 VIBE (middle) shows avid central enhancement (arrow) of the filling defect, which is hyperintense on T2 FS (right). These CT and MRI features are consistent with tumor, and biopsy confirmed pulmonary angiosarcoma. References: Liu M, Luo C, Wang Y, et al. Multiparametric MRI in differentiating pulmonary artery sarcoma and pulmonary thromboembolism: a preliminary experience. Diagn Interv Radiol. 2017;23(1):15-21. Wittram C, Maher MM, Yoo AJ, Kalra MK, Shepard JA, Mcloud TC. CT angiography of pulmonary embolism: diagnostic criteria and causes of misdiagnosis. Radiographics. 2004;24(5):1219-1238."}, {"number": "13", "stem": "What is the minimum RV:LV ratio to diagnose right heart strain in patients with acute pulmonary embolism (PE)?", "options": [{"letter": "A", "text": ">0.5"}, {"letter": "B", "text": ">0.9"}, {"letter": "C", "text": ">1.5"}, {"letter": "D", "text": ">2.0"}], "images": [], "explanationImages": ["assets/a13_p015_01.jpg"], "answer": "B", "explanation": "Answer B. The RV:LV ratio is a comparison of the short-axis diameter measured on an axial or reformatted cross-sectional images. Normal is < 0.9. Anything > 0.9 is considered right heart strain. Figure 13-1 Patient with acute PE and right heart strain. RV:LV ratio of 2.0 measured on an axial CTA image. The measured short axis diameter is the maximum distance from the interventricular septum to the endocardial border perpendicular to the long axis of the heart. References: Kamel EM, Schmidt S, Doenz F, Adler-etechami G, Schnyder P, Qanadli SD. Computed tomographic angiography in acute pulmonary embolism: do we need multiplanar reconstructions to evaluate the right ventricular dysfunction? J Comput Assist Tomogr. 2008;32(3):438-443. Kumamaru KK, George E, Ghosh N, et al. Normal ventricular diameter ratio on CT provides adequate assessment for critical right ventricular strain among patients with acute pulmonary embolism. Int J Cardiovasc Imaging. 2016;32(7):1153-1161."}, {"number": "14", "stem": "A patient presents with a large pulmonary embolus occluding the main left pulmonary artery. There is right heart strain on the CTA. She is tachycardic to 130 bpm, and her blood pressure is 83/48. What is the clinical category of PE in this patient?", "options": [{"letter": "A", "text": "Low-risk PE"}, {"letter": "B", "text": "Intermediate-risk (submassive) PE"}, {"letter": "C", "text": "High-risk (massive) PE"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. The patient from the case example is hemodynamically unstable (hypotension or shock) with acute PE placing her in the high-risk or massive PE category. Hemodynamically stable patients with acute PE, positive biomarkers (troponin or BNP elevation), and/or imaging evidence of right heart strain are considered intermediate-risk or submassive PE. Hemodynamically stable patients with acute PE but no evidence of right heart strain are considered low-risk PE. The quantity and/or location of clot is not typically used in this classification. References: Konstantinides SV, Barco S, Lankeit M, Meyer G. Management of pulmonary embolism: an update. J Am Coll Cardiol. 2016;67(8):976-990. Piazza G, Goldhaber SZ. Management of submassive pulmonary embolism. Circulation. 2010;122(11):1124-1129."}, {"number": "15", "stem": "Which of the following is the most appropriate treatment for a patient with massive PE?", "options": [{"letter": "A", "text": "IVC filter placement"}, {"letter": "B", "text": "Catheter-directed PE intervention"}, {"letter": "C", "text": "Systemic anticoagulation alone"}], "images": [], "explanationImages": ["assets/a15_p016_01.jpg"], "answer": "B", "explanation": "Answer B. Current national guidelines support treatment beyond anticoagulation alone when patients present with high-risk or massive PE. This condition, if left untreated, has a high mortality. Options for treatment include systemic fibrinolysis with intravenous tPA (or its equivalent), catheter-directed intervention, or surgical embolectomy. An IVC filter may be a useful adjunct in this situation when there is extensive residual lower extremity clot; however, it is not primary therapy. Notably, management of intermediate-risk (submassive) PE is in flux with treatment ranging from solely anticoagulation to surgical embolectomy. Figure 15-1 Example of a patient with massive PE. Initial chest CTA (top images) shows a saddle embolus with extensive bilateral lower lobe emboli. The RV:LV ratio is 1.5. He is hypotensive and has a contraindication to systemic tPA. Initial pulmonary angiogram (bottom left) shows the significant embolic burden and overall poor filling of both lungs. He is treated with rotary pigtail catheter clot fragmentation and clot aspiration, and he undergoes 24 hours of low-dose tPA infusion through multi-sidehole catheters draped into each lower lobe pulmonary artery. His hypotension resolves quickly, and repeat pulmonary angiogram the following day (bottom right) shows significant clot resolution and overall markedly improved perfusion to both lungs. References: Kearon C, Akl EA, Comerota AJ, et al. Antithrombotic therapy for VTE disease: antithrombotic therapy and prevention of thrombosis, 9th ed. American College of Chest Physicians Evidence-Based Clinical Practice Guidelines. Chest. 2012;141(2 suppl):e419S-e496S. Xue X, Sista AK. Catheter-directed thrombolysis for pulmonary embolism: the state of practice. Tech Vasc Interv Radiol. 2018;21 (2):78-84."}, {"number": "16", "stem": "A 53-year-old woman with a history of stroke presents to the ED with chest pain. Chest CTA is performed with images given below. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Pulmonary arteriovenous malformation"}, {"letter": "B", "text": "Primary lung carcinoma"}, {"letter": "C", "text": "Pulmonary artery pseudoaneurysm"}, {"letter": "D", "text": "Pulmonary varix"}], "images": ["assets/q16_p017_01.jpg"], "explanationImages": ["assets/a16_p017_01.jpg", "assets/a16_p018_01.jpg"], "answer": "A", "explanation": "Answer A. The axial CTA images demonstrate 2 enlarged vessels in the periphery of the right lower lobe. On the coronal images, there is a tangle of blood vessels clumped together at the right lung base. With the patient's history, this is most consistent with a PAVM. The enlarged vessels represent the hypertrophied feeding pulmonary artery and draining pulmonary vein (slightly larger than the artery), and the tangle of vessels represents the dilated venous sac(s). PAVM represents a right to left shunt, putting the patient at risk for paradoxical embolism, as well as infections such as brain abscess. Pulmonary artery pseudoaneurysm and pulmonary varix, while vascular abnormalities, do not have an enlarged feeding artery and vein, although they may look similar to the venous sac of a PAVM. All pseudoaneurysms should be treated, whereas pulmonary varix is classically asymptomatic and not a danger to the patient. Choice B is a soft tissue tumor, not a vascular abnormality. Figure 16-1 Unsubtracted images from right lower lobe selective pulmonary artery catheterization. Arterial phase image on the left shows single 6 mm feeding pulmonary artery branch coursing inferiorly with filling of lobulated venous sacs. On the delayed image (right), the draining pulmonary vein is visualized. This is a simple type PAVM with single inflow artery, well-formed venous sacs, and single draining vein. PAVMs are characterized as complex when there are multiple feeding arteries and/or draining veins, or when there is more diffuse involvement of a segment or lobe of the lung. Reference: Gill SS, Roddie ME, Shovlin CL, Jackson JE. Pulmonary arteriovenous malformations and their mimics. Clin Radiol. 2015;70(1):96-110."}, {"number": "17", "stem": "What underlying condition is often present in patients with a pulmonary arteriovenous malformation (PAVM)?", "options": [{"letter": "A", "text": "Klippel-Trenaunay"}, {"letter": "B", "text": "Hereditary hemorrhagic telangiectasia"}, {"letter": "C", "text": "Tuberous sclerosis"}, {"letter": "D", "text": "Sturge-Weber"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Hereditary hemorrhagic telangiectasia (HHT) or Osler-Weber-Rendu is an inherited condition, autosomal dominant, characterized by recurrent and spontaneous nosebleeds (from mucosal telangiectasias), multiple telangiectasias on the skin and within the GI tract, and arteriovenous malformations of the internal organs (commonly lung, liver, brain). There are several HHT Centers of Excellence in the United States that specialize in the diagnosis and treatment of patients with HHT. The Curaçao criteria assist practitioners in evaluating patients with suspected HHT. Klippel-Trenaunay is a vascular malformation syndrome characterized by the presence of a capillary malformation, venous malformation, limb growth abnormality, and often a lymphatic malformation. Patients with Klippel-Trenaunay frequently have mutations in the PIK3CA gene. Tuberous sclerosis is a complex genetic disorder (genetic mutation on chromosome 9 or 16) in which affected patients can develop benign tumors and cysts in the central nervous system, skin, lungs, kidneys, heart, eyes, and pancreas. Sturge-Weber is a genetic disorder manifested at or soon after birth by a facial capillary malformation. Associated intracranial leptomeningeal vascular abnormalities result in cerebral ischemia, producing developmental delay, seizures, and other neurologic symptoms. Reference: Faughnan ME, Palda VA, Garcia-tsao G, et al. International guidelines for the diagnosis and management of hereditary haemorrhagic telangiectasia. J Med Genet. 2011;48(2):73-87."}, {"number": "18", "stem": "Which accurately reflects current recommendations for PAVM embolization in adults?", "options": [{"letter": "A", "text": "Treat when PAVM is symptomatic; observe asymptomatic patients"}, {"letter": "B", "text": "Treat when PAVM feeding artery diameter is >5 mm, or when draining vein is >10 mm"}, {"letter": "C", "text": "Treat when PAVM feeding artery diameter is >3 mm, treatment may be appropriate when feeding artery diameter is <3 mm"}], "images": [], "explanationImages": ["assets/a18_p019_03.jpg"], "answer": "A", "explanation": "Answer A. For years, it was accepted practice that only PAVMs with feeding artery size >3 mm needed to be embolized. This guideline was based on limited data, and the technology for embolization has greatly improved in the last few years. Complications from PAVM with smaller feeding arteries have been reported, and successful embolizations are now being performed in this cohort. Current HHT guidelines recommend embolization of PAVMs in adults whether symptomatic or asymptomatic. Selection of a PAVM for embolization continues to be based on feeding artery diameter, with 3 mm as a generally accepted threshold for considering embolization. However, operators may consider embolization when the feeding artery diameter is 2 to 3 mm. References: Narsinh KH, Ramaswamy R, Kinney TB. Management of pulmonary arteriovenous malformations in hereditary hemorrhagic telangiectasia patients. Semin Intervent Radiol. 2013;30(4):408-412. Trerotola SO, Pyeritz RE. PAVM embolization: an update. AJR Am J Roentgenol. 2010;195(4):837-845."}, {"number": "19", "stem": "Which of the following is the preferred embolic agent for the treatment of PAVM?", "options": [{"letter": "A", "text": "Fibered coil"}, {"letter": "B", "text": "Permanent particles"}, {"letter": "C", "text": "nBCA glue"}, {"letter": "D", "text": "Gelfoam slurry"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. As a PAVM represents a right to left shunt, the embolization procedure and selected embolic agent need to be carefully controlled to avoid nontarget embolization to the systemic arteries. Additionally, the embolization should be permanent with low rate of recanalization. Coils (both pushable and detachable) can be delivered through selective diagnostic and microcatheters. Good technique is necessary to minimize the risk of coil migration or maldeployment into the pulmonary venous system. Uncovered (Amplatzer Vascular Plug) and covered (Micro Vascular Plug) detachable plugs have also been used with good success, sometimes with adjunctive coils to reduce future recanalization. Particles are much smaller than the pathologic artery to vein connection of a PAVM, and if used will shunt directly to the pulmonary vein and subsequently the systemic arteries. Glue, a liquid embolic, is difficult to control and also is likely to immediately shunt through to the draining pulmonary vein, which could be catastrophic. Gelfoam slurry is not only considered a temporary embolic agent with relatively fast recanalization, its embolic size is highly variable and shunting to the draining pulmonary vein is assured. Figure 19-1 Unsubtracted images before (left, middle) and after (right) coil embolization of a simple PAVM. Following embolization with multiple pushable and detachable coils, there is no further filling of the venous sacs or draining vein. Factors associated with future recanalization of the coil pack include large feeding artery, use of single coil, coil oversizing, and positioning of coils too far from the venous sac (>1 cm). References: Narsinh KH, Ramaswamy R, Kinney TB. Management of pulmonary arteriovenous malformations in hereditary hemorrhagic telangiectasia patients. Semin Intervent Radiol. 2013;30(4):408-412. Trerotola SO, Pyeritz RE. PAVM embolization: an update. AJR Am J Roentgenol. 2010;195(4):837-845."}, {"number": "20", "stem": "A 43-year-old man with a history of treated lymphoma presents with a 3-day history of dizziness, chest pain, and swelling of the head and neck. A chest radiograph is obtained. Which of the following are you most concerned for?", "options": [{"letter": "A", "text": "Thoracic aortic aneurysm with rupture"}, {"letter": "B", "text": "Pericardial effusion with tamponade"}, {"letter": "C", "text": "Recurrent thoracic lymphoma"}, {"letter": "D", "text": "Occlusion of the superior vena cava (SVC)"}], "images": ["assets/q20_p020_02.jpg"], "explanationImages": ["assets/a20_p020_02.jpg"], "answer": "D", "explanation": "Answer D. The chest radiograph demonstrates a normal cardiac silhouette, and the presence of a right internal jugular vein approach single lumen portacath with catheter tip near the superior cavoatrial junction. With choices A, B, or C you would expect some abnormality such as mediastinal widening, hilar masses, pleural effusion, or enlargement of the cardiac silhouette. The history supports a diagnosis of acute SVC occlusion. References: Rachapalli V, Boucher LM. Superior vena cava syndrome: role of the interventionalist. Can Assoc Radiol J. 2014;65 (2):168-176. Shaikh I, Berg K, Kman N. Thrombogenic catheter-associated superior vena cava syndrome. Case Rep Emerg Med. 2013; 2013:793054."}, {"number": "21", "stem": "Which of the following is the feared complication in this patient?", "options": [{"letter": "A", "text": "Airway compromise"}, {"letter": "B", "text": "Cardiac tamponade"}, {"letter": "C", "text": "Hemomediastinum"}, {"letter": "D", "text": "Stroke"}], "images": ["assets/q21_p021_02.jpg", "assets/q21_p021_04.jpg"], "explanationImages": ["assets/a21_p021_02.jpg", "assets/a21_p021_04.jpg"], "answer": "A", "explanation": "Answer A. The CECT images demonstrate injection of contrast through a left upper extremity peripheral venous access. Note the dense opacification of the left-sided central veins, but also contrast in the right atrium, right ventricle, pulmonary artery, and thoracic aorta. The only structure not opacified is the superior vena cava. The portacath catheter is visualized and surrounded by low attenuation that fills the entire superior vena cava, consistent with an acute thrombus. If the central venous obstruction is severe and sudden, adequate venous collaterals will not have developed and SVC syndrome will occur. The patient will present with marked head, neck, and upper extremity swelling, plethoric facies, and respiratory compromise. The following (Figure 21-1) is an example from a different patient with acute SVC thrombosis who required urgent intubation. Figure 21-1 A young female with a history of sickle cell and an indwelling portacath presents with abrupt onset head and neck swelling. CECT imaging of the neck and chest shows massive retropharyngeal edema (arrow) with airway narrowing, as well as acute left innominate vein and SVC thrombosis (right image). Note the paucity of collateral vein formation. She is intubated for impending airway compromise and successfully treated with catheter-directed intervention over the next 2 days. The treatment for acute catheter-associated thrombosis includes anticoagulation and consideration of removing the inciting catheter. If the patient is significantly symptomatic, more aggressive treatments such as catheter-directed intervention (tPA infusion, suction thrombectomy/aspiration) may be necessary. It is important to distinguish acute thrombosis of the superior vena cava (acute benign SVC syndrome) from malignant obstruction, as the treatment for malignant SVC syndrome is often external radiation therapy, chemotherapy, and/or endovascular recanalization with stenting. Malignant SVC syndrome often results from extrinsic compression of the SVC by lymphadenopathy, or mediastinal invasion from tumors such as bronchogenic carcinoma. In chronic benign occlusion of the SVC, often seen with long-standing hemodialysis catheters, the vessel will be absent/nonopacified with occasional calcification and tremendous collateral vein formation in the neck and chest. Figure 21-2 Example of chronic benign occlusion of the SVC in a patient with ESRD (end-stage renal disease) and multiple prior hemodialysis catheters. In the expected location of the SVC (orange circle), there is no visualized vein. There is compensatory dilation of mediastinal, azygous, and hemiazygous collaterals (arrows) to compensate for the central venous occlusion. References: Rachapalli V, Boucher LM. Superior vena cava syndrome: role of the interventionalist. Can Assoc Radiol J. 2014;65 (2):168-176. Shaikh I, Berg K, Kman N. Thrombogenic catheter-associated superior vena cava syndrome. Case Rep Emerg Med. 2013; 2013:793054."}, {"number": "22", "stem": "A 61-year-old man with a known squamous cell cancer eroding into the left axilla was treated with palliative radiation. He presents with brisk external bleeding from the treated site that is not controlled by a pressure dressing. He is taken emergently to interventional radiology, and diagnostic angiography is performed. Based on the sequential images given below, what is the best endovascular treatment for the abnormality (the pathology is directly from the axillary artery, not from a side-branch)?", "options": [{"letter": "A", "text": "Placement of a covered stent"}, {"letter": "B", "text": "Embolization with coils"}, {"letter": "C", "text": "Embolization with particles"}, {"letter": "D", "text": "Embolization with nBCA glue"}], "images": ["assets/q22_p022_03.jpg"], "explanationImages": ["assets/a22_p022_03.jpg", "assets/a22_p022_04.jpg"], "answer": "A", "explanation": "Answer A. The patient is presenting with \"vascular blowout\" from the left axillary artery. This condition typically affects patients with advanced malignancies that have been previously treated with surgery, radiation, and/or chemotherapy. The involved vessels become friable or frankly invaded by tumor and over time can become exposed putting the patient at risk for catastrophic hemorrhage. The 3 clinical categories of vascular blowout include threatened (vessel exposed, involved with tumor, or pseudoaneurysm), impending (sentinel bleed controlled with local measures), and acute (uncontrolled bleeding). With endovascular treatment of hemorrhage, the operator must consider whether flow preservation is necessary (to prevent end organ damage) or that the bleeding artery can be sacrificed. In this case, if one were to coil embolize the axillary artery across the site of bleeding, the arm would certainly be threatened. Particles such as PVA or TAGM could extravasate at the site of bleeding and treat the injury; however, most of the embolic would travel down the arm and lodge in the distal arteries producing limb ischemia. Glue would have the same issues and likely produce both proximal and distal arterial occlusion resulting in a threatened limb. A covered stent placed across the injury excludes the bleeding arterial rent and also maintains blood flow to the arm. If there is significant exposure of the artery, a potential complication that must be considered is stent infection. In addition to local measures such as pressure dressing, surgical bypass and surgical ligation may be appropriate in certain instances. Figure 22-1 Subtracted and unsubtracted images from placement of a self-expanding covered stent across the actively bleeding left axillary artery from the case example. The stent was slightly oversized compared with the artery in order get a proximal and distal seal. References: Huntress LA, Kogan S, Nagarsheth K, Nassiri N. Palliative endovascular techniques for management of peripheral vascular blowout syndrome in end-stage malignancies. Vasc Endovascular Surg. 2017;51(6):394-399. Mousa A, Chong B, Aburahma AF. Endovascular repair of subclavian/axillary artery injury with a covered stent. A case report and review of literature. Vascular. 2013;21(6):400-404."}, {"number": "23", "stem": "Based on the sequential angiographic images, what is the most likely clinical presentation of this patient?", "options": [{"letter": "A", "text": "Syncope"}, {"letter": "B", "text": "Left arm claudication"}, {"letter": "C", "text": "Ataxia"}, {"letter": "D", "text": "Diplopia"}, {"letter": "E", "text": "Stroke"}], "images": ["assets/q23_p023_03.jpg"], "explanationImages": ["assets/a23_p023_03.jpg"], "answer": "B", "explanation": "Answer B. The case images show the early and delayed phase of an LAO thoracic aortogram. The initial image demonstrates an irregular, moderate to severe narrowing just beyond the origin of the left subclavian artery. On the delayed phase, contrast has washed out the aorta and proximal branch vessels, yet the left vertebral artery is now well opacified. This is due to retrograde filling from the cranial circulation aka subclavian steal. Although this physiology is often asymptomatic, patients can present with chronic left arm claudication, and less commonly posterior circulation symptoms such as syncope, ataxia, and diplopia. Figure 23-1 Treatment of left subclavian artery stenosis with stenting. Once the stenosis (red arrow) is crossed with a wire, a balloon expandable stent is deployed, landing well above and below the lesion. On the completion angiogram, there is now antegrade filling of the left vertebral artery (blue arrow). Interestingly, restoration of antegrade vertebral flow typically occurs at a variable (not immediate) time after treatment. References: Potter BJ, Pinto DS. Subclavian steal syndrome. Circulation. 2014;129(22):2320-2323. Wholey MH, Wholey MH. The supraaortic and vertebral endovascular interventions. Tech Vasc Interv Radiol. 2004;7(4):215-225."}, {"number": "24", "stem": "Which of the following is an indication to treat a left subclavian artery stenosis?", "options": [{"letter": "A", "text": "Reversal of flow in the left vertebral artery"}, {"letter": "B", "text": "Peak systolic velocity > 300 cm/s"}, {"letter": "C", "text": "End diastolic velocity > 140 cm/s"}, {"letter": "D", "text": "Planning for a left coronary artery bypass graft using the internal thoracic artery"}], "images": ["assets/q24_p024_01.jpg"], "explanationImages": ["assets/a24_p024_01.jpg", "assets/a24_p024_02.jpg"], "answer": "D", "explanation": "Answer D. Subclavian steal physiology is often asymptomatic. The reversal of flow in the vertebral artery alone (choice A) is not an indication for intervention. Unlike the carotid arterial system, there are no velocity parameters to act as guidelines for intervention. Symptoms such as arm claudication or vertebrobasilar insufficiency are indications for intervention. Additional indications include planned ipsilateral internal thoracic (mammary) artery to coronary artery bypass or existing bypass, which is adversely affected by the proximal stenosis. References: Ochoa VM, Yeghiazarians Y. Subclavian artery stenosis: a review for the vascular medicine practitioner. Vasc Med. 2011;16(1):29-34. Patel SN, White CJ, Collins TJ, et al. Catheter-based treatment of the subclavian and innominate arteries. Catheter Cardiovasc Interv. 2008;71(7):963-968."}, {"number": "25", "stem": "Which is the optimal catheter tip position for a portacath?", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "D"}], "images": ["assets/q25_p026_01.jpg"], "explanationImages": ["assets/a25_p026_01.jpg", "assets/a25_p027_02.jpg", "assets/a25_p027_04.jpg", "assets/a25_p028_02.jpg", "assets/a25_p028_03.jpg"], "answer": "C", "explanation": "Answer C. There is debate regarding the ideal location of a central venous catheter tip, but it is widely accepted that it should be at or quite near the upper cavoatrial junction. Fluoroscopically, this lies 2 vertebral bodies below the carina. Figure 25-1 Completion fluoroscopic spot image after single lumen portacath placement. The reservoir sits over the second anterior rib in the midclavicular line. The venous access is low in the neck. The catheter tip lies 2 vertebral bodies below the carina. At the authors' institution, this is the desired positioning of a portacath. If the catheter is too short, it can lead to fibrin sheath formation, malposition of the tip, venous stenosis, and/or venous thrombosis. The following (Figures 25-2 and 25-3) are examples of portacaths with the tip positioned in the mid-SVC that became dysfunctional over time. If a catheter is positioned very deep into the right atrium, complications such as dysrhythmia, thrombus formation, and catheter dysfunction can occur (see Figure 25-4). Figure 25-2 Chest CT immediately (left) and 12 months (right) after single lumen portacath placement. The catheter tip was in the mid-SVC, which appeared widely patent at first. Over time, the catheter became dysfunctional, because of progressive stenosis and deformity of the SVC at the catheter tip. The stenosis was treated with balloon angioplasty, and the portacath revised such that the tip was located in the upper right atrium. Figure 25-3 Right subclavian approach single lumen portacath was placed with the catheter tip in the mid-SVC (left). Years later, the patient presented with portacath dysfunction. Venography showed chronic occlusion of the SVC at the level of the catheter tip with retrograde filling of an enlarged azygos vein (right). The occlusion was traversed with a catheter and wire and treated with balloon angioplasty alone. Figure 25-4 Right chest tunneled hemodialysis catheter was placed with the catheter at the lower cavoatrial junction, likely in contact with atrial wall (left). Five months later, the patient presented with acute onset shortness of breath and chest CTA demonstrated extensive pulmonary emboli as well as a large thrombus associated with the catheter tip deep in the atrium (coronal image, middle; sagittal image, right). The patient was treated with systemic anticoagulation and atrial clot removal using a large bore suction catheter system. References: Baskin KM, Jimenez RM, Cahill AM, Jawad AF, Towbin RB. Cavoatrial junction and central venous anatomy: implications for central venous access tip position. J Vasc Interv Radiol. 2008;19(3):359-365. Vesely TM. Central venous catheter tip position: a continuing controversy. J Vasc Interv Radiol. 2003;14(5):527-534."}, {"number": "26", "stem": "Which of the following qualifies a type B thoracic aortic dissection as complicated?", "options": [{"letter": "A", "text": "Compromised kidney perfusion"}, {"letter": "B", "text": "Aortic diameter 3.3 cm"}, {"letter": "C", "text": "Thrombosis of the false lumen"}, {"letter": "D", "text": "False lumen:true lumen ratio > 1.0"}], "images": [], "explanationImages": ["assets/a26_p029_03.jpg"], "answer": "A", "explanation": "Answer A. The management of acute type B aortic dissections continues to evolve. Dissections can be classified as complicated or uncomplicated. Uncomplicated dissections are typically managed medically. Complicated dissections are often managed with an intervention, be it thoracic endovascular aortic repair (TEVAR) with a covered stent or open surgery. Complicated dissections are defined as those with impending rupture or malperfusion of organs such as the spinal cord, viscera, kidneys, or lower extremities. Refractory chest pain is a clinical sign of impending rupture and qualifies as complicated. The in- hospital survival for complicated type B dissection patients is approximately 50%, while about 90% of uncomplicated patients survive until discharge. The remaining choices are features of interest in evaluating a dissection; however, they do not define one as complicated. Figure 26-1 CTA images (arterial, left; delayed, right) of an acute type B aortic dissection with evolving left renal ischemia/infarction. Notice the involvement of the proximal SMA (superior mesenteric artery) as well. This case is in contradistinction to Q35 of noninvasive imaging, whereby a chronic type B dissection causes delayed enhancement of an adequately perfused left kidney (it just takes longer for the contrast to get there). References: Nauta FJ, Trimarchi S, Kamman AV, et al. Update in the management of type B aortic dissection. Vasc Med. 2016;21 (3):251-263. Scott AJ, Bicknell CD. Contemporary management of acute type B dissection. Eur J Vasc Endovasc Surg. 2016;51(3):452-459."}, {"number": "27", "stem": "This artery (arrow) shares watershed territory most directly with which of the following vessels?", "options": [{"letter": "A", "text": "Left inferior epigastric artery"}, {"letter": "B", "text": "Left pulmonary artery"}, {"letter": "C", "text": "Left inferior phrenic artery"}, {"letter": "D", "text": "L2 lumbar artery"}], "images": ["assets/q27_p030_03.jpg"], "explanationImages": ["assets/a27_p030_03.jpg", "assets/a27_p031_03.jpg", "assets/a27_p031_04.jpg"], "answer": "A", "explanation": "Answer A. The catheter is positioned in the origin of the left subclavian artery. The marked vessel is the left internal thoracic (mammary) artery, which is one of the first vessels to arise from the subclavian artery, almost directly opposite the cephalad coursing vertebral artery. The internal thoracic artery descends just lateral to the sternum and continues as the superior epigastric artery, ultimately meeting up with branches of the inferior epigastric artery (which arises from the external iliac artery) in the anterior abdominal wall. This pathway (subclavian >> internal thoracic >> superior epigastric >> inferior epigastric >> external iliac), termed Winslow pathway (see Figure 27-1), can hypertrophy in the setting of aortic occlusive disease, allowing for continued perfusion to the pelvis and lower extremities. Figure 27-1 Coronal MIP (left) and 3D VR (right) CTA images in a male smoker with a chronic infrarenal aortic occlusion and resultant hypertrophy of Winslow pathway. The pathway is also germane to patients with bleeding from the abdominal wall, which is occasionally seen with anticoagulation, after paracentesis, and following surgery or trauma. If the bleeding occurs lower on the abdomen, the inferior epigastric artery can be selected and embolized as close to the injury as possible. In some cases, particularly if the injury is in the watershed territory, bleeding may persist or recur, as collateral pathways from above allow for continued perfusion to the injured vessel. The following case (Figure 27-2) shows continued bleeding in the abdominal wall despite prior embolization of the inferior epigastric artery. Figure 27-2 Patient with an LVAD (left ventricular assist device) on anticoagulation and a large hemoglobin drop. The CECT image shows large left rectus hematoma with active bleeding around the level of the umbilicus. After selection of the left inferior epigastric artery (top images), angiography shows brisk active bleeding (arrowheads) from a distal branch near the watershed territory. The bleed is treated with gelfoam slurry and coil embolization. Two days later, there is further drop in the hemoglobin level. Repeat angiography from above after selection of the left internal thoracic artery (bottom images) shows recurrent bleeding from the same site, being fed from the superior epigastric artery branches. The bleed is treated with gelfoam slurry and coil embolization with no recurrence. Reference: Hardman RL, Lopera JE, Cardan RA, Trimmer CK, Josephs SC. Common and rare collateral pathways in aortoiliac occlusive disease: a pictorial essay. AJR Am J Roentgenol. 2011;197(3):W519-W524."}, {"number": "28", "stem": "Which is the best route for percutaneous core needle biopsy of this lung nodule?", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "D"}], "images": ["assets/q28_p032_01.jpg"], "explanationImages": ["assets/a28_p032_01.jpg"], "answer": "B", "explanation": "Answer B. With percutaneous lung lesion biopsy, there are often several acceptable needle paths. Some approaches have been shown to have a higher complication rate than others. Choice A intersects the internal thoracic artery. It also crosses the pleural surface at an oblique angle, which increases the risk of pneumothorax. Choice C intersects the lateral thoracic artery, crosses the pleural surface at an oblique angle, and would require decubitus positioning. Choice D requires crossing a major fissure and necessitates a long needle tract, both increasing the risk of pneumothorax. Choice B is best as it requires the shortest needle path with no intervening arteries, large pulmonary vessels, or pulmonary fissures. It crosses the pleural surface as close to perpendicular as possible. Other factors shown to increase the risk of postbiopsy pneumothorax are operator inexperience, lesion size <2 cm, and the presence of underlying chronic obstructive pulmonary disease. References: Tsai IC, Tsai WL, Chen MC, et al. CT-guided core biopsy of lung lesions: a primer. AJR Am J Roentgenol. 2009;193 (5):1228-1235. Winokur RS, Pua BB, Sullivan BW, Madoff DC. Percutaneous lung biopsy: technique, efficacy, and complications. Semin Intervent Radiol. 2013;30(2):121-127."}, {"number": "29", "stem": "Which of the following is an indication for chest tube placement for a pneumothorax after a CT-guided lung lesion biopsy?", "options": [{"letter": "A", "text": "Pneumothorax >10% thoracic volume"}, {"letter": "B", "text": "All pneumothoraces, which are large enough to accommodate a tube"}, {"letter": "C", "text": "Patient with shortness of breath"}, {"letter": "D", "text": "Oxygen saturation <94%"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Pneumothorax after percutaneous lung biopsy is the most common complication with rates reported between 17% and 26%. Fortunately, the majority of these will be self-limited and require no invasive treatment. A typical postprocedure regimen includes close clinical monitoring of the patient and a chest X-ray 2 hours postbiopsy. If there is a growing pneumothorax or a symptomatic pneumothorax, a chest tube is indicated. The size or volume of the pneumothorax is often difficult to accurately quantify and not an indication for tube placement. Oxygen saturation could help in the triage of these patients if there is a change in status, but O2 saturation <94% may be the patient's baseline and alone is not a criterion for a chest tube. References: Winokur RS, Pua BB, Sullivan BW, Madoff DC. Percutaneous lung biopsy: technique, efficacy, and complications. Semin Intervent Radiol. 2013;30(2):121-127. Wu CC, Maher MM, Shepard JA. Complications of CT-guided percutaneous needle biopsy of the chest: prevention and management. AJR Am J Roentgenol. 2011;196(6):W678-W682."}, {"number": "30", "stem": "Which is the best approach for IR (interventional radiology) management of an adult with a lung abscess?", "options": [{"letter": "A", "text": "Percutaneous drainage is an option if the patient is not a candidate for surgery"}, {"letter": "B", "text": "Contraindicated, given the high risk of bronchopleural fistula"}, {"letter": "C", "text": "If tube is <10 Fr, it can be placed without concern"}, {"letter": "D", "text": "It is the preferred treatment if there is underlying malignancy"}], "images": [], "explanationImages": ["assets/a30_p034_01.jpg"], "answer": "A", "explanation": "Answer A. Lung abscess is often seen in patients with alcohol dependence, altered mental status, gastroesophageal reflux, and/or poor dentition. Up to 90% can be managed conservatively with antibiotics alone. For refractory cases, intervention is required. Traditionally this has been the realm of thoracic surgery, but recently percutaneous or even endobronchial drainage have become acceptable options. There is a real risk of bronchopleural fistula with percutaneous drainage; therefore preprocedural consultation with thoracic surgery is strongly recommended. The risk does not constitute an absolute contraindication; therefore choice B is incorrect. The size of the percutaneous drain may logically correlate with the risk of bleeding, pneumothorax, or fistula; however, there is no specified size threshold. Additionally, the presence of an underlying malignancy plays no clear role in the treatment algorithm. Choice A is the best option. In addition to improved abscess resolution with percutaneous drainage, an equally important benefit is fluid sampling at the time of catheter placement. Direct fluid sampling has been shown to have a higher rate of culture growth compared with peripheral blood, bronchoscopic or sputum cultures. In one series, the results of direct fluid sampling changed antibiotic management in >50% of patients. Figure 30-1 CT-guided placement of a 10 Fr pigtail drainage catheter into a persistent left lower lobe lung abscess. References: Duncan C, Nadolski GJ, Gade T, Hunt S. Understanding the lung abscess microbiome: outcomes of percutaneous lung parenchymal abscess drainage with microbiologic correlation. Cardiovasc Intervent Radiol. 2017;40(6):902-906. Klein JS, Schultz S, Heffner JE. Interventional radiology of the chest: image-guided percutaneous drainage of pleural effusions, lung abscess, and pneumothorax. AJR Am J Roentgenol. 1995;164(3):581-588."}, {"number": "31", "stem": "A 45-year-old woman presents for bilateral thoracentesis as well as CT-guided drainage catheter placement into 2 separate abdominal fluid collections. As the patient is short of breath at baseline, bilateral thoracentesis is performed first. Bilateral thoracentesis is performed with just over 1 L of fluid removed from each pleural space. The patient is then positioned supine, and a scout CT is performed before abdominal drain placement. Her respiratory status begins to worsen rather than improve, and final CT images are acquired after abdominal drain placement. Which condition explains the changes on imaging and clinical deterioration?", "options": [{"letter": "A", "text": "Acute myocardial infarction"}, {"letter": "B", "text": "Hemothorax"}, {"letter": "C", "text": "Underlying malignancy"}, {"letter": "D", "text": "Reexpansion pulmonary edema"}], "images": ["assets/q31_p034_02.jpg", "assets/q31_p035_02.jpg", "assets/q31_p035_04.jpg"], "explanationImages": ["assets/a31_p034_02.jpg", "assets/a31_p035_02.jpg", "assets/a31_p035_04.jpg"], "answer": "D", "explanation": "Answer D. Reexpansion pulmonary edema is an uncommon complication with a reported incidence of <1% after the drainage of pleural effusions. Unfortunately, the mortality can be as high as 20%. The pathophysiology is not completely understood. Symptoms typically occur within an hour of pleural drainage of either fluid and/or air. There may be a relationship with the volume of fluid/air removed; however, a consensus on volume removal limits does not exist. The images from this case demonstrate dependent ground glass opacities progressing to consolidation, which is typically described. Hemothorax is an accumulation of blood in the pleural space and is not shown in the provided images. Underlying malignancy would not explain the rapid change in CT appearance. An acute myocardial infarction could cause flash pulmonary edema, but this case presentation is temporally associated with bilateral thoracentesis, making choice D most likely. References: Dias OM, Teixeira LR, Vargas FS. Reexpansion pulmonary edema after therapeutic thoracentesis. Clinics (Sao Paulo). 2010;65(12):1387-1389. Verhagen M, Van Buijtenen JM, Geeraedts LM. Reexpansion pulmonary edema after chest drainage for pneumothorax: a case report and literature overview. Respir Med Case Rep. 2015;14:10-12."}, {"number": "32a", "stem": "A 56-year-old man with prior left pacemaker placement has marked left arm enlargement. There is a subtle thrill on palpation of the upper arm and an underlying arteriovenous fistula (AVF) is suspected. Given the findings on the initial upper arm arteriogram, what is the next step in evaluation?", "options": [{"letter": "A", "text": "More selective (distal) catheter position"}, {"letter": "B", "text": "Less selective (proximal) catheter position"}, {"letter": "C", "text": "Carbon dioxide angiography from the same catheter position"}, {"letter": "D", "text": "Give intra-arterial nitroglycerin and then repeat the angiogram"}], "images": ["assets/q32a_p036_02.jpg"], "explanationImages": ["assets/a32a_p036_02.jpg"], "answer": "B", "explanation": "Answer B. In the provided images, the catheter is positioned in the proximal brachial artery and there is opacification of only arteries. There is no early venous filling to indicate an AVF in the upper arm (or distally for that matter). The historical clue of previous pacemaker placement suggests that the pathology may be more centrally located. The catheter is likely positioned beyond the fistula and should be pulled back to a less selective position (choice B). More selective catheter positioning is often helpful in looking for a subtle bleed or identifying the exact feeding branch of an AVF. Carbon dioxide gas angiography is a good technique for ferreting out occult pathology, but often as a last resort, and would not be clearly beneficial in this circumstance. If there was evidence for vasospasm, which might mask the pathology, intra-arterial nitroglycerin can be administered. There is no evidence of spasm on the images. References: Kumins NH, Tober JC, Love CJ, et al. Arteriovenous fistulae complicating cardiac pacemaker lead extraction: recognition, evaluation, and management. J Vasc Surg. 2000;32(6):1225-1228. O'Connor DJ, Gross J, King B, Suggs WD, Gargiulo NJ, Lipsitz EC. Endovascular management of multiple arteriovenous fistulae following failed laser-assisted pacemaker lead extraction. J Vasc Surg. 2010;51(6):1517-1520."}, {"number": "32b", "stem": "The catheter is pulled back into a more proximal position. Based on these sequential images from left subclavian arteriography, what is the diagnosis?", "options": [{"letter": "A", "text": "Arteriovenous fistula"}, {"letter": "B", "text": "Normal variant"}, {"letter": "C", "text": "Tumor vascularity"}, {"letter": "D", "text": "Active extravasation"}], "images": ["assets/q32b_p036_03.jpg"], "explanationImages": ["assets/a32b_p036_03.jpg", "assets/a32b_p037_03.jpg"], "answer": "A", "explanation": "Answer A. With the catheter tip in the left subclavian artery, the angiogram shows initial arterial filling followed immediately by early opacification of the left subclavian and axillary veins due to an AVF. Interestingly, the contrast fills the left arm veins from central to peripheral, which is due to an underlying central venous occlusion at the level of the left innominate vein. This unfortunate combination of a large acquired AVF with concomitant central venous occlusion led to the patient's massive arm swelling. The thoracoacromial arterial trunk was the site of fistula formation, which was occluded with multiple precisely placed coils. Figure 32b-1 DSA images from left subclavian arteriography with arteriovenous fistula (AVF) between the thoracoacromial trunk and the left subclavian vein. Because of the underlying central venous occlusion (CVO), the veins of the arm filled in retrograde fashion. Ultimately, the contrast filled large chest and neck collaterals, which drained back to the superior vena cava (not shown). This combination of vascular complications, both from pacemaker lead placement, was a source of tremendous patient morbidity. Following embolization, the left upper arm circumference went from 58 cm down to 25 cm, with no appreciable asymmetry when compared with the right arm. References: Kumins NH, Tober JC, Love CJ, et al. Arteriovenous fistulae complicating cardiac pacemaker lead extraction: recognition, evaluation, and management. J Vasc Surg. 2000;32(6):1225-1228. O'Connor DJ, Gross J, King B, Suggs WD, Gargiulo NJ, Lipsitz EC. Endovascular management of multiple arteriovenous fistulae following failed laser-assisted pacemaker lead extraction. J Vasc Surg. 2010;51(6):1517-1520."}, {"number": "33", "stem": "In the absence of any recent trauma or intervention, what is the most likely pathology?", "options": [{"letter": "A", "text": "Pulmonary artery active extravasation"}, {"letter": "B", "text": "Pulmonary AVF"}, {"letter": "C", "text": "Pulmonary artery mycotic aneurysm"}, {"letter": "D", "text": "Hypervascular tumor"}], "images": ["assets/q33_p038_03.jpg"], "explanationImages": ["assets/a33_p038_03.jpg"], "answer": "C", "explanation": "Answer C. The CECT images demonstrate an ovoid lesion in the right lower lobe of the lung with similar attenuation to the visualized vasculature. There is surrounding pulmonary consolidation. The pulmonary arteriogram demonstrates a well-defined, ovoid, contrast-filled structure in contiguity with a right pulmonary artery branch, which washes out over time. This appearance is consistent with a mycotic aneurysm (more accurate to call it a pseudoaneurysm). As there is no early filling of a draining pulmonary vein, this does not represent an AVF or AVM. The contrast remains contained in the pseudoaneurysm with delayed washout and no pooling to indicate active extravasation. This patient presented with hemoptysis in the setting of pneumonia. Mycotic aneurysm (pseudoaneurysm) formation is most commonly seen with Staphylococcus and Streptococcus species and develops as the infectious arteritis destroys the arterial wall resulting in contained rupture. They can enlarge rapidly and cause catastrophic hemorrhage. A similar entity with a recent resurgence is a Rasmussen aneurysm, which is a pulmonary artery pseudoaneurysm arising specifically in the setting of a mycobacterial cavitary lesion. Regarding treatment, placing a covered stent would be challenging in this location. The parent artery is small, which limits stent selection and translates to low patency rates. Also, because of the extensive branching nature of the pulmonary arterial system, clean landing zones would be difficult to achieve. The endovascular treatment chosen here was coil embolization. Although it seems to be a large territory of pulmonary artery to embolize, it was tolerated quite well with long-term follow-up imaging demonstrating a small sliver of scar tissue peripherally to the coil pack. References: Keeling AN, Costello R, Lee MJ. Rasmussen's aneurysm: a forgotten entity? Cardiovasc Intervent Radiol. 2008;31 (1):196-200. Lee WK, Mossop PJ, Little AF, et al. Infected (mycotic) aneurysms: spectrum of imaging appearances and management. Radiographics. 2008;28(7):1853-1868."}, {"number": "34", "stem": "A 41-year-old man presents for a percutaneous lung nodule biopsy. Immediately after the biopsy, the patient has large- volume hemoptysis and decreasing oxygen saturation. Which of the following is the best next step in management?", "options": [{"letter": "A", "text": "Place a right chest tube"}, {"letter": "B", "text": "Position the patient right-side down"}, {"letter": "C", "text": "Position the patient in reverse Trendelenburg"}, {"letter": "D", "text": "Transport to IR for immediate embolization"}], "images": ["assets/q34_p039_03.jpg"], "explanationImages": ["assets/a34_p039_03.jpg"], "answer": "B", "explanation": "Answer B. The CT images from the biopsy procedure demonstrate new extensive ground glass in the path of the biopsy needle and surrounding the nodule. This is consistent with pulmonary hemorrhage and explains the onset of hemoptysis. The best initial step is to position the patient biopsy side down. This position will spare the contralateral lung from aspirated blood, which could further compromise lung aeration and gas exchange. As the pathology is intraparenchymal and not intrapleural, a chest tube would not be of use. Reverse Trendelenburg or \"head up\" might help by keeping the hemorrhage dependent; however, it will not optimally protect the unaffected contralateral lung. Immediate embolization is not appropriate. Management of airway and breathing is paramount. If the bleeding does not stop and there is pulmonary compromise, intubation and bronchial blockade may be necessary. Angiography with embolization can then be considered but is rarely necessary in this scenario. Reference: Khankan A, Sirhan S, Aris F. Common complications of nonvascular percutaneous thoracic interventions: diagnosis and management. Semin Intervent Radiol. 2015;32(2):174-181."}, {"number": "35", "stem": "Which of the following is true regarding percutaneous image-guided thermal ablation of lung malignancy?", "options": [{"letter": "A", "text": "Bronchopleural fistula is a frequent complication"}, {"letter": "B", "text": "Percutaneous thermal ablation is preferable to surgery as first-line therapy when possible"}, {"letter": "C", "text": "Microwave (as opposed to radiofrequency or cryo) thermal ablation cannot be used within the lung parenchyma"}, {"letter": "D", "text": "It is an appropriate treatment option for both primary and metastatic lesions"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Surgery is first-line therapy for both primary and oligometastatic lung malignancy, when possible. If surgery is not feasible, options include stereotactic body radiotherapy (SBRT) and percutaneous thermal ablation. Cryo, radiofrequency, and microwave thermal ablation have all been utilized in practice. Complication rates vary, with a pneumothorax being a regular occurrence (10 to 50%). Development of a bronchopleural fistula is relatively uncommon (<1%). Local tumor control correlates inversely with increasing size of the target tumor. References: Egashira Y, Singh S, Bandula S, Illing R. Percutaneous high-energy microwave ablation for the treatment of pulmonary tumors: a retrospective single-center experience. J Vasc Interv Radiol. 2016;27(4):474-479. Healey TT, March BT, Baird G, Dupuy DE. Microwave ablation for lung neoplasms: a retrospective analysis of long-term results. J Vasc Interv Radiol. 2017;28(2):206-211. Mouli SK, Kurilova I, Sofocleous CT, Lewandowski RJ. The role of percutaneous image-guided thermal ablation for the treatment of pulmonary malignancies. AJR Am J Roentgenol. 2017;209(4):740-751. Rose SC, Thistlethwaite PA, Sewell PE, Vance RB. Lung cancer and radiofrequency ablation. J Vasc Interv Radiol. 2006;17 (6):927-951."}, {"number": "36", "stem": "A 57-year-old woman presents for CT-guided biopsy of a right lower lobe lung nodule. Based on the images, what is the patient at risk for?", "options": [{"letter": "A", "text": "Stroke"}, {"letter": "B", "text": "Tumor seeding"}, {"letter": "C", "text": "Cardiac tamponade"}, {"letter": "D", "text": "Empyema"}], "images": ["assets/q36_p040_03.jpg"], "explanationImages": ["assets/a36_p040_03.jpg"], "answer": "A", "explanation": "Answer A. The intraprocedural CT images for this prone patient demonstrate a small right pneumothorax and nondependent air within the left ventricle. The most important step is early recognition of this complication. It is easy to get tunnel vision during the procedure and remain only focused on getting the biopsy needle into the target lesion. The reported incidence of systemic air embolism from percutaneous lung biopsy is 0.02% to 0.07% and can be associated with significant morbidity and mortality. As little as 2 cc air into the cerebral vasculature can be fatal, and 0.5 to 1 cc air in the pulmonary veins can cause cardiac arrest from coronary embolism. Altered mental status is often a presenting symptom. Once recognized, the procedure should be aborted and the needle removed to minimize any further air introduction. Regarding patient positioning, some advocate for Trendelenburg to prevent air embolus to the brain. Right lateral decubitus can theoretically trap the air in the left ventricle apex, but at least one case has been reported where left lateral decubitus was advantageous to trap the air in the left atrium. Flow rates in the left heart may be too fast to reliably trap air with any position. Hyperbaric oxygen therapy is an adjunctive treatment available in so
