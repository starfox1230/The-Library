 characterization of injuries, particularly vascular injuries. Choice C, a common but benign splenic vascular lesion, is often a well-circumscribed mass (es) with gradual centripetal or homogenous enhancement. Figure 29-1 Companion case. Three-phase contrast-enhanced computed tomography (CECT) demonstrating high-grade splenic injury with perisplenic hematoma. Note the subcentimeter focus of contrast in the spleen (arterial phase, left image) that enlarges and extends beyond the parenchymal edge on the portal venous and delayed phase images consistent with active bleeding. References: Boscak A, Shanmuganathan K. Splenic trauma: what is new? Radiol Clin North Am. 2012;50(1):105-122. Melikian R, Goldberg S, Strife BJ, Halvorsen RA. Comparison of MDCT protocols in trauma patients with suspected splenic injury: superior results with protocol that includes arterial and portal venous phase imaging. Diagn Interv Radiol. 2016;22 (5):395-399."}, {"number": "30", "stem": "Which of the following is an appropriate adjunctive treatment for a hemodynamically stable adult patient with blunt splenic injury and intrasplenic pseudoaneurysm formation?", "options": [{"letter": "A", "text": "Distal main splenic artery covered stent"}, {"letter": "B", "text": "Proximal main splenic artery embolization with coils"}, {"letter": "C", "text": "Proximal main splenic artery embolization with particles"}, {"letter": "D", "text": "Distal main splenic artery thrombin injection"}], "images": [], "explanationImages": ["assets/a30_p041_01.jpg"], "answer": "B", "explanation": "Answer B. Current management of blunt splenic injury in adults consists of operative and nonoperative strategies, with splenic arterial embolization (SAE) frequently used as an adjunctive therapy. The technique uses one of 2 methods: proximal or distal SAE. With proximal SAE, the splenic artery is occluded distal to the dorsal pancreatic artery (often the first downgoing branch) with the use of coils or a vascular plug. Diminished arterial pressure beyond the embolization site promotes hemostasis and healing of splenic injuries, whereas collateral arterial pathways (pancreatic and gastric) reconstitute the distal splenic artery, maintaining viable perfusion to the splenic parenchyma. With distal SAE, a peripheral branch(es) of the splenic artery is occluded, frequently with coils, Gelfoam, or other embolic agents. Collateral arterial pathways do not exist this far peripherally, and the splenic injury is effectively treated through feeding artery thrombosis and focal tissue devascularization (infarct). Occasionally, both methods are used in a single procedure. There is no consensus opinion on the appropriate application of the techniques as both provide a high rate of splenic salvage, often 90% or greater, with a low complication rate. In our practice, we use proximal SAE as long as there is no demonstrable active bleeding on angiography. If there is active bleeding, we perform a distal SAE at that site to achieve immediate hemostasis. Choice A is appropriate for cases of main splenic artery injury, not intrasplenic pseudoaneurysm formation. Choices C and D would likely result in total or near total infarction of the spleen. Particles are flow-directed embolics and will lodge in the distal artery/arteriole depending on their size, producing end-organ ischemia. Thrombin injected into a high-flow artery like the splenic will cause immediate thrombosis of the entire vascular territory. Remember, the goals of SAE for trauma are control of the injury AND preservation of the spleen. Figure 30-1 Sample blunt splenic injury protocol. AAST, American Association for the Surgery of Trauma; AB, active bleeding; CECT, contrast-enhanced computed tomography; ICU,intensive care unit; OR, operating room; SAE, splenic arterial embolization; VI, vascular injury. References: Coccolini F, Montori G, Catena F, et al. Splenic trauma: WSES classification and guidelines for adult and pediatric patients. World J Emerg Surg. 2017;12:40. Imbrogno BF, Ray CE. Splenic artery embolization in blunt trauma. Semin Intervent Radiol. 2012;29(2):147-149. Schnüriger B, Inaba K, Konstantinidis A, Lustenberger T, Chan LS, Demetriades D. Outcomes of proximal versus distal splenic artery embolization after trauma: a systematic review and meta-analysis. J Trauma. 2011;70(1):252-260."}, {"number": "31", "stem": "Following a proximal splenic artery embolization for blunt splenic injury with intrasplenic pseudoaneurysm formation, a CECT is performed to reevaluate the injury. Which is the correct interpretation?", "options": [{"letter": "A", "text": "Expected findings after proximal splenic artery embolization"}, {"letter": "B", "text": "Treatment failure with patent splenic artery branches despite embolization"}, {"letter": "C", "text": "Treatment failure with persistent filling of intrasplenic pseudoaneurysm"}], "images": ["assets/q31_p042_01.jpg"], "explanationImages": ["assets/a31_p042_01.jpg"], "answer": "A", "explanation": "Answer A. With proximal embolization, a coil pack or vascular plug is deployed in the proximal to mid splenic artery, ideally just beyond the dorsal pancreatic artery such that pancreatic and short gastric collaterals will reconstitute the distal main splenic artery. It is an expected finding to see contrast opacification in the main splenic artery proximal and distal to the coil pack or plug, as a result of the collateral arterial filling. Additionally, when the procedure is performed in the setting of intrasplenic pseudoaneurysm, it is common to see persistent pseudoaneurysm filling after embolization, particularly on early follow-up examinations. This warrants no further treatment. Naturally, if there are enlarging pseudoaneurysms or evidence of interval splenic rupture despite proximal embolization, surgical splenectomy should be considered. Figure 31-1 Coronal oblique contrast-enhanced computed tomography (CECT) image after proximal splenic artery embolization with a vascular plug. The plug (arrowhead) is clearly seen in the proximal main splenic artery with expected opacification of the artery distal to the plug from collaterals. Reference: Haan JM, Marmery H, Shanmuganathan K, Mirvis SE, Scalea TM. Experience with splenic main coil embolization and significance of new or persistent pseudoaneurysm: reembolize, operate, or observe. J Trauma. 2007;63(3):615-619."}, {"number": "32", "stem": "A patient presents for radioembolization treatment of the left hepatic lobe. Angiography demonstrates an enlarged gastrohepatic trunk with significant tortuosity (arrowhead). A microcatheter is advanced and after several unsuccessful attempts to cross the tortuous segment, a repeat angiogram is performed with early (middle) and delayed (right) phase images. What is the most likely explanation?", "options": [{"letter": "A", "text": "Arterial thrombosis"}, {"letter": "B", "text": "Arterial rupture"}, {"letter": "C", "text": "Arterial dissection"}], "images": ["assets/q32_p043_01.jpg"], "explanationImages": ["assets/a32_p043_01.jpg"], "answer": "C", "explanation": "Answer C. The images obtained after attempted catheterization of the tortuous artery segment demonstrate a discrete terminus to the normal-looking artery, with an abnormal wire-thin lumen beyond. On the delayed phase image, there is contrast retention in a relatively larger distal artery segment. This appearance is classic for an arterial dissection with dyssynchronous filling of the true (smaller) and false (larger) lumen. The images show no extraluminal contrast to indicate vessel rupture and no filling defect or complete occlusion to suggest thrombosis. With dissection, if the false lumen becomes pressurized and expanded (as in this case), it can compress the true lumen with virtually no downstream passage of contrast (or blood). With a little luck, a wire can be passed through the true lumen beyond the site of pathology and subsequently dilated with balloon angioplasty, restoring normal perfusion and hopefully eliminating flow in the false lumen. Figure 32-1 Companion case of arterial dissection treated with angioplasty. Top left image from celiac angiogram with widely patent branches. Top right image after failed attempt to select the proper hepatic artery with a microcatheter demonstrates occlusive dissection just proximal to the takeoff of the gastroduodenal artery (GDA). A wire is skillfully negotiated into the true lumen, and after balloon dilation (bottom left image), there is restoration of flow in both the GDA and proper hepatic artery. As seen in the presented cases, microcatheter navigation through small arteries can be a delicate work. The arteries can be even more fragile after exposure to certain systemic chemotherapeutic agents such as bevacizumab (Avastin). References: Brown DB. Hepatic artery dissection in a patient on bevacizumab resulting in pseudoaneurysm formation. Semin Intervent Radiol. 2011;28(2):142-146. Jung E, Shin JH, Kim JH, Yoon HK, Ko GY, Sung KB. Arterial dissections during transcatheter arterial chemoembolization for hepatocellular carcinoma: a 19-year clinical experience at a single medical institution. Acta Radiol. 2017;58(7):842-848. Sakamoto I, Aso N, Nagaoki K, et al. Complications associated with transcatheter arterial embolization for hepatic tumors. Radiographics. 1998;18(3):605-619."}, {"number": "33", "stem": "What is the most likely pathology being demonstrated in this angiogram of the liver?", "options": [{"letter": "A", "text": "Traumatic injury"}, {"letter": "B", "text": "Hepatocellular carcinoma"}, {"letter": "C", "text": "Hemangioma"}, {"letter": "D", "text": "Cyst"}], "images": ["assets/q33_p044_01.jpg"], "explanationImages": ["assets/a33_p044_01.jpg"], "answer": "B", "explanation": "Answer B. This is a very typical angiogram for hepatocellular cancer (HCC). One of the hallmarks of HCC is early arterial filling of the tumor. Although this is harder to depict on static images, observe the abnormal tumor vessels, which opacify before the normal liver parenchyma. On the more delayed phase image, the round tumor mass seemingly displaces the normal liver vessels. Hypervascularity, neovascularity, and arteriovenous shunting are features commonly seen with HCC. Traumatic injury may present as heterogeneous parenchymal filling, active extravasation, pseudoaneurysm formation, and/or arterioportal shunting. A cyst may demonstrate mass effect but is, by definition, avascular. Similar to the characteristic imaging features on CECT and MRI, liver hemangiomas display discontinuous peripheral nodular contrast accumulation with slow central fill-in. Figure 33-1 Giant liver hemangioma on coronal contrast-enhanced computed tomography (CECT) with corresponding hepatic arteriogram. Note the early (left) discontinuous peripheral nodular enhancement with gradual fill in on the delayed phase (right). References: Fielding L. Current imaging strategies of primary and secondary neoplasms of the liver. Semin Intervent Radiol. 2006;23(1):3-12. Watson RC, Baltaxe HA. The angiographic appearance of primary and secondary tumors of the liver. Radiology. 1971;101 (3):539-548."}, {"number": "34", "stem": "In this patient with a painful left arm mass about to undergo surgical resection and reconstruction, what is the most likely purpose of this endovascular procedure?", "options": [{"letter": "A", "text": "A diagnostic study to establish pathology"}, {"letter": "B", "text": "A diagnostic study to assist with operative planning"}, {"letter": "C", "text": "An interventional procedure to reduce intraoperative bleeding"}, {"letter": "D", "text": "An interventional procedure to reduce postoperative swelling and pain"}], "images": ["assets/q34_p045_01.jpg"], "explanationImages": ["assets/a34_p045_01.jpg", "assets/a34_p046_01.jpg", "assets/a34_p047_01.jpg"], "answer": "C", "explanation": "Answer C. The angiographic images demonstrate an oval hypervascular mass encompassing and replacing the proximal left humerus. Certain cancers such as renal cell carcinoma have a predilection for the bone and can be quite hypervascular. Resection and reconstruction can be a daunting task for the surgeon in this scenario, with significant operative blood loss at stake. Preoperative angiography and embolization, often with particles and sometimes adjunctive coil occlusion of large feeders, can reduce the vascularity of the tumor and reduce operative blood loss. In many locations, treatment must be performed carefully with subsequent selection of direct tumor feeders to prevent nontarget embolization of healthy tissue. In this case, inadvertent administration of particles and/or coils into the brachial artery would be catastrophic and almost certainly result in limb- threatening ischemia. Figure 34-1 Radiograph following preoperative embolization, resection of bony metastasis, and reconstruction of the humerus. Operative blood loss was only 100 mL. References: Chatziioannou AN, Johnson ME, Pneumaticos SG, Lawrence DD, Carrasco CH. Preoperative embolization of bone metastases from renal cell carcinoma. Eur Radiol. 2000;10(4):593-596. Rilling WS, Chen GW. Preoperative embolization. Semin Intervent Radiol. 2004;21(1):3-9."}, {"number": "35", "stem": "Based on North American Symptomatic Carotid Endarterectomy Trial (NASCET) criteria, what percent stenosis is demonstrated on this carotid angiogram?", "options": [{"letter": "A", "text": "60%"}, {"letter": "B", "text": "75%"}, {"letter": "C", "text": "80%"}, {"letter": "D", "text": "90%"}], "images": ["assets/q35_p048_01.jpg"], "explanationImages": ["assets/a35_p048_01.jpg", "assets/a35_p049_03.jpg"], "answer": "B", "explanation": "Answer B. NASCET demonstrated significant benefit to carotid endarterectomy in symptomatic patients with internal carotid artery stenosis measuring 70% to 99%. In this pivotal trial, a specific measurement of stenosis was used, and the method has been used in several additional key studies. The percent stenosis measured on the angiogram was defined as (1 - [internal carotid artery stenosis diameter/internal carotid artery normal diameter]) × 100. In the provided angiogram centered at the carotid arterial bifurcation, the external carotid artery is easily identified by its multiple side branches, whereas the cervical internal carotid artery has none. Based on the measurements provided, the percent stenosis is (1 - [1/4]) × 100 or 75%. Figure 35-1 Completion angiogram following placement of a self-expanding uncovered stent across a severe stenosis in the proximal internal carotid artery (ICA). Note the embolic protection device in the distal segment of the ICA. The stent covers the ostium of the external carotid artery, which stills fills in antegrade fashion. References: Barnett HJM, Taylor DW, Haynes RB, et al. Beneficial effect of carotid endarterectomy in symptomatic patients with high-grade carotid stenosis. N Engl J Med. 1991;325(7):445-453. Cheng EM, Bravata DM, El-Saden S, et al. Carotid artery stenosis: wide variability in reporting formats-a review of 127 veterans affairs medical centers. Radiology. 2013;266(1):289-294."}, {"number": "36", "stem": "An otherwise healthy 65-year-old male presents with a nonhealing right foot ulcer. A CECT of the affected extremity is performed. Based on the images, which of the following is the best treatment plan for this lesion?", "options": [{"letter": "A", "text": "Angioplasty"}, {"letter": "B", "text": "Bare-metal stent"}, {"letter": "C", "text": "Covered stent"}, {"letter": "D", "text": "Surgical consult"}], "images": ["assets/q36_p050_03.jpg"], "explanationImages": ["assets/a36_p050_03.jpg"], "answer": "D", "explanation": "Answer D. While physicians who practice IR as a specialty pride themselves on problem-solving and creative solutions for patient care, one must know the benefits and indications of alternative methods of treatment. This case demonstrates a densely calcified atherosclerotic plaque throughout the proximal to mid common femoral artery that appears occlusive. The endovascular options here are limited, and surgical endarterectomy is the treatment of choice. Guidelines, such as the Trans-Atlantic inter- Society Consensus (TASC) II, exist to help with management decisions in the realm of peripheral arterial disease. Pathology is graded as level A, B, C, and D. For level A disease, endovascular treatment is strongly preferred; for level D disease, surgical treatment is strongly preferred. Reference: Norgren L, Hiatt WR, Dormandy JA, et al. Inter-society consensus for the management of peripheral arterial disease (TASC II). J Vasc Surg. 2007;45(suppl S):S5-S67."}, {"number": "37", "stem": "A 35-year-old male presents for evaluation of an ulcer at the tip of thumb. For diagnostic evaluation, a catheter is placed in the brachial artery and an arteriogram is obtained. Which of the following best explains the findings?", "options": [{"letter": "A", "text": "Buerger disease"}, {"letter": "B", "text": "Septic emboli"}, {"letter": "C", "text": "Atherosclerosis"}, {"letter": "D", "text": "Primary Raynaud disease"}], "images": ["assets/q37_p051_01.jpg"], "explanationImages": ["assets/a37_p051_01.jpg"], "answer": "A", "explanation": "Answer A. The arteriogram of the wrist and hand shows corkscrew collateral formation in the distribution of the first digit, as well as a distal ulnar artery occlusion. Note the intact deep and superficial palmar arches. These findings in a relatively young male are most characteristic of Buerger disease aka thromboangiitis obliterans. Small- and medium-sized arteries and veins of the extremities are most commonly affected. Tobacco use is ubiquitous in these patients, and cessation is arguably the most important treatment strategy. Although corkscrew collaterals are often associated with Buerger disease, they can be seen with other diseases affecting the small arteries of the extremities and have been demonstrated to represent hypertrophied vasa vasorum or vasa nervorum. The appearance of well-formed collateral vessels points to more chronic pathology, making an acute process such as septic emboli less likely. Atherosclerosis would be rare in a young person, and is uncommon peripheral to the subclavian level. A more central atherosclerotic lesion near a great vessel origin can shower atheroemboli, producing downstream short-segment occlusions, often involving the digital arteries (not seen here). Raynaud disease can be primary (no underlying disease) or secondary (associated with underlying diseases such as scleroderma). Primary Raynaud disease often presents with a history of digital pallor or cyanosis with cold exposure or emotional stress followed by a reperfusion hyperemia. With severe Raynaud disease (often secondary), critical digital ischemia can occur and angiography may demonstrate a variety of findings including stenosis, occlusion, and vasospasm. References: Bozlar U, Ogur T, Khaja MS, All J, Norton PT, Hagspiel KD. CT angiography of the upper extremity arterial system: part 2- clinical applications beyond trauma patients. AJR Am J Roentgenol. 2013;201(4):753-763. Dimmick SJ, Goh AC, Cauzza E, et al. Imaging appearances of Buerger's disease complications in the upper and lower limbs. Clin Radiol. 2012;67(12):1207-1211. Kim YH, Ng SW, Seo HS, Chang Ahn H. Classification of Raynaud's disease based on angiographic features. J Plast Reconstr Aesthet Surg. 2011;64(11):1503-1511. Mcmahan ZH, Wigley FM. Raynaud's phenomenon and digital ischemia: a practical approach to risk stratification, diagnosis and management. Int J Clin Rheumtol. 2010;5(3):355-370."}, {"number": "38", "stem": "A CTA is performed in preparation for EVAR of an infrarenal abdominal aortic aneurysm. Which of the following is true?", "options": [{"letter": "A", "text": "Accessory renal arteries are a contraindication to EVAR"}, {"letter": "B", "text": "IMA occlusion increases endoleak risk after EVAR"}, {"letter": "C", "text": "Increased aneurysm neck length is a favorable characteristic for EVAR"}, {"letter": "D", "text": "Angulation at the aneurysm neck reduces endoleak risk after EVAR"}], "images": ["assets/q38_p053_02.jpg"], "explanationImages": ["assets/a38_p053_02.jpg"], "answer": "C", "explanation": "Answer C. An abdominal aortic aneurysm is most commonly defined as aortic diameter >3.0 cm or diameter 1.5x normal. When considering abdominal aortic aneurysm treatment, cross-sectional imaging can evaluate a number of features that may affect the decision to treat with open or endovascular techniques. Aneurysm neck length, diameter, angulation, and atherosclerotic disease The neck is critical for the attachment of the endograft to the aortic wall. A poor proximal seal can result in immediate or delayed type I endoleak, as well as stent graft migration. Accessory renal arteries Although not a contraindication, coverage may infarct part of the kidney and can also provide a path for future endoleak. Small (<7 mm), diseased, and/or tortuous iliofemoral arterial system Difficulty with access and device passage. Aneurysmal common or external iliac arteries Difficulty with achieving a distal seal that may necessitate stent graft extensions. Occluded internal iliac arteries Increased risk of buttock claudication and impotence after EVAR. Preexisting mesenteric arterial disease Increased risk of mesenteric ischemia as IMA will be covered during EVAR. Figure 38-1 Reconstructed image from computed tomography angiography (CTA) performed to evaluate abdominal aortic aneurysm (AAA) demonstrating measurements for the aortic neck angulation (suprarenal angle, A; infrarenal angle, B). For routine endovascular aneurysm repair (EVAR), angle B is most relevant, with angles above 45° to 60° conferring an increased risk of post-EVAR complications. This case demonstrates severe (>60°) aortic neck angulation at both A and B."}];
    const APP_ID = "ir-arterial-interventions-quiz-ch2";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SEED_VERSION = 1;
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID || saved.defaultSeedVersion !== DEFAULT_SEED_VERSION) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        defaultSeedVersion: DEFAULT_SEED_VERSION,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
