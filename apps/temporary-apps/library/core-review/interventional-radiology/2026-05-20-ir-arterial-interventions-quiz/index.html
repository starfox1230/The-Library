<!DOCTYPE html>

<head>

  <title>Interventional Radiology Arterial Interventions Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }

  <script>
    const QUESTIONS = [{"number": "1", "stem": "An 85-year-old male undergoes endovascular aortic repair (EVAR) for a 6 cm abdominal aortic aneurysm. The 6-month follow-up computed tomography angiography (CTA) with arterial (left) and delayed (right) phase images shows what complication?", "options": [{"letter": "A", "text": "Type 1a endoleak"}, {"letter": "B", "text": "Type 2 endoleak"}, {"letter": "C", "text": "Type 3 endoleak"}, {"letter": "D", "text": "No endoleak"}], "images": ["assets/q1_p001_03.jpg"], "explanationImages": ["assets/a1_p002_01.jpg"], "answer": "B", "explanation": "Answer B. The arterial phase images show a patent endograft and faint increased attenuation within the excluded aneurysm sac in the mid segment, where the graft becomes bifurcated. A left lumbar artery is visible coursing toward the aneurysm sac between the vertebral body and the psoas muscle. The delayed phase images show dense contrast accumulation within the aneurysm sac at the lumbar level with visible left lumbar artery as the feeding artery. This is a type 2 endoleak by definition (endoleak types defined in the following question). Other arteries often responsible for a type 2 endoleak include the IMA and median sacral artery. Figure 1-1 Companion case with computed tomography angiography (CTA) following endovascular aortic repair (EVAR) for abdominal aortic aneurysm (AAA) showing high-attenuation foci in the sac (arrows) suspicious for an endoleak. Careful comparison shows these are present before administration of intravenous contrast (left) and unchanged in the arterial (middle) and delayed (right) phases of imaging. These foci represent calcifications in the thrombosed aneurysm sac. References: Chen J, Stavropoulos SW. Management of endoleaks. Semin Intervent Radiol. 2015;32(3):259-264. O'Mara JE, Bersin RM. Endovascular management of abdominal aortic aneurysms: the year in review. Curr Treat Options Cardiovasc Med. 2016;18(8):54."}, {"number": "2", "stem": "After EVAR for a 5.5 cm abdominal aortic aneurysm, a 6 month follow-up CTA shows a type 2 endoleak and growth of the aneurysm sac by 10 mm. What is the next recommended step for this patient?", "options": [{"letter": "A", "text": "Surgical aneurysm repair"}, {"letter": "B", "text": "Continued surveillance imaging"}, {"letter": "C", "text": "Endoleak embolization"}, {"letter": "D", "text": "Place second bifurcated endograft"}], "images": [], "explanationImages": ["assets/a2_p003_01.jpg"], "answer": "C", "explanation": "Answer C. The most accepted indication for the treatment of a type 2 endoleak is the growth of the aneurysm sac by 5 mm. Additional and perhaps more controversial indications include persistent endoleak on follow-up imaging, large feeding or draining artery, and high flow within the aneurysm sac. Percutaneous embolization techniques are first line in the treatment of type 2 endoleaks, with surgery reserved for refractory endoleaks or cases where embolization is not feasible. Surveillance is not appropriate in this case, as the aneurysm sac has grown by 1 cm in 6 months. A growing aneurysm is at risk for rupture. Placing a second endograft within the original endograft will have no effect on a leak that is not occurring at a seal site. Table 2-1 Endoleak Classification Endoleak Type Pathology Risk Management Failure of the stent graft to Immediate fix with balloon 1a achieve a circumferential seal. Continued systemic remodeling and/or additional This can occur at the proximal pressurization of the aneurysm fixation with extension cuff, 1b attachment site (1a) or distal sac can lead to rupture. stents, or other devices. Rarely attachment sites (1b). aneurysm sac embolization. Retrograde collateral arterial Continued variable Elective fix in cases of flow to the aneurysm sac by pressurization of the aneurysm aneurysm sac growth by 5 mm 2 branch vessels. Most commonly sac can result in aneurysm sac on follow-up imaging. First-line the inferior mesenteric artery or enlargement and, ultimately, treatment is embolization of the a lumbar artery. aneurysm rupture. nidus and/or feeding artery. Leak or separation between Continued systemic 3 stent graft components. Less pressurization of the aneurysm Immediate fix with stent grafts. commonly tear or hole in the sac can lead to rupture. stent graft fabric. Graft porosity. Identified Continued variable Resolves on its own once 4 immediately after stent graft pressurization of the aneurysm procedural anticoagulation deployment. sac. wears off. Unknown. By definition, an Continued variable Not clear. Conversion to an 5 enlarging aneurysm sac without pressurization of the aneurysm open repair or second endograft. a demonstrable endoleak. sac. Figure 2-1 Subtracted (left) and unsubtracted (right) images from embolization of type 2 endoleak arising from left lumbar artery as seen in question 1. The operator uses a transseal technique whereby the catheter is advanced from the arterial access in the groin and passed between the wall of the iliac artery and fabric of the iliac limb of the endograft. The catheter courses cephalad in this plane, ultimately reaching the aneurysm sac and endoleak nidus. Note the morphology of contrast accumulation in the sac mirrors the computed tomography (CT) images from question 1, with a large left lumbar artery seen feeding the endoleak. The artery is subsequently embolized with coils, and the nidus is closed with glue. References: Chen J, Stavropoulos SW. Management of endoleaks. Semin Intervent Radiol. 2015;32(3):259-264. O'Mara JE, Bersin RM. Endovascular management of abdominal aortic aneurysms: the year in review. Curr Treat Options Cardiovasc Med. 2016;18(8):54."}, {"number": "3", "stem": "Diagnostic angiography is performed before left lower extremity peripheral artery intervention. Based on the pathology demonstrated in sequential digital subtraction angiographic (DSA) images from the pelvis through the foot, what is the most likely patient presentation?", "options": [{"letter": "A", "text": "Progressive buttock claudication and impotence"}, {"letter": "B", "text": "Intermittent claudication in the left calf"}, {"letter": "C", "text": "Abrupt-onset painful and pulseless left lower extremity"}, {"letter": "D", "text": "Dry gangrene of the left toes"}], "images": ["assets/q3_p004_01.jpg"], "explanationImages": ["assets/a3_p004_01.jpg"], "answer": "B", "explanation": "Answer B. The images show single-level arterial occlusive disease in the left lower extremity. Specifically, there is a long- segment occlusion, chronic in appearance, involving approximately 20 cm of the SFA with reconstitution distally. There is compensatory hypertrophy of the profunda femoris artery with prominent thigh collaterals that have formed because of the chronicity of the arterial obstruction. There is no flow-limiting inflow (iliac) or tibial artery disease. This patient likely presents with intermittent claudication, with reduced ankle-brachial index (ABI) to the range 0.70 to 0.75 (normal ABI 0.9-1.1). Many clinicians use Rutherford's categorization of chronic peripheral arterial disease in their patient assessment. Category 0: Asymptomatic Category 1: Mild claudication Category 2: Moderate claudication Category 3: Severe claudication Category 4: Rest pain Category 5: Minor tissue loss/ulcer Category 6: Major tissue loss/gangrene Regarding the other answer choices: Severe aortoiliac arterial occlusive disease often produces Leriche syndrome, which presents as diminished or absent common femoral artery pulses, buttock claudication, and impotence. An abrupt onset of pain in a pulseless leg is consistent with acute limb-threatening ischemia (ALI). This can be due to in situ disease with thrombosis or distant embolus occluding otherwise normal arteries in the leg. This is not the case in this question, as the images presented show a chronic arterial occlusion with hypertrophied collaterals. Critical limb ischemia (CLI) is the combination of severely reduced ABI (typically < 0.3-0.4) with concomitant rest pain, tissue loss, and/or gangrene. These patients often have severe multilevel arterial occlusive disease, and there is a high associated rate of limb amputation (30% per year) and mortality (25% per year). Reference: Bailey MA, Griffin KJ, Scott DJ. Clinical assessment of patients with peripheral arterial disease. Semin Intervent Radiol. 2014;31(4):292-299."}, {"number": "4", "stem": "Following successful treatment of a chronic superficial femoral artery (SFA) occlusion with arterial recanalization and stenting, the patient returns 9 months later with recurrent claudication. Angiography demonstrates a severe in-stent stenosis in the mid segment of the SFA. Following balloon angioplasty, there is no residual in-stent stenosis. Six months later the stents abruptly occlude. What is the primary-assisted patency of the original SFA recanalization with stenting?", "options": [{"letter": "A", "text": "6 months"}, {"letter": "B", "text": "9 months"}, {"letter": "C", "text": "15 months"}, {"letter": "D", "text": "Not applicable to this case"}], "images": [], "explanationImages": ["assets/a4_p005_01.jpg"], "answer": "C", "explanation": "Answer C. Primary patency is the time from the original intervention performed to restore vessel patency (SFA recanalization with stenting) until the time that a second intervention is required to treat thrombosis or stenosis. Primary-assisted patency is the time from the original intervention performed to restore vessel patency plus additional time gained from a second intervention to keep the vessel patent, such as balloon angioplasty or atherectomy. Secondary patency is the time from the original intervention performed to restore vessel patency plus additional time gained from an intervention to restore patency once the vessel thromboses or occludes, such as catheter-directed fibrinolysis or thrombectomy. Secondary patency concludes when further intervention to restore patency to the vessel is abandoned. Figure 4-1 Graphic representation of primary, primary-assisted, and secondary patency. SFA, superficial femoral artery; tPA, tissue plasminogen activator. Reference: Stoner MC, Calligaro KD, Chaer RA, et al. Reporting standards of the society for vascular surgery for endovascular treatment of chronic lower extremity peripheral artery disease. J Vasc Surg. 2016;64(1):e1-e21."}, {"number": "5", "stem": "A 55-year-old male presents with 2 days of severe pain in the right lower extremity. On physical examination, the pedal pulses are absent. The leg is cool to the touch, pale, and rigid. Sensation and motor function are absent in the distal extremity. An arterial duplex ultrasound of the extremity demonstrates occlusion of the SFA and popliteal artery. What is the preferred treatment?", "options": [{"letter": "A", "text": "Systemic heparinization with close monitoring for progression of right lower extremity limb-threatening ischemia"}, {"letter": "B", "text": "Angiography with placement of tissue plasminogen activator (tPA) infusion catheter in the thrombosed right lower extremity arteries"}, {"letter": "C", "text": "Operative assessment for tissue viability, possible revascularization, fasciotomy, or amputation"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. This patient is presenting with acute limb-threatening ischemia or ALI. This differs from CLI in that there is often not an insidious course of intermittent claudication or known peripheral arterial disease. The etiology is often embolic, from cardiac or aortic pathology, or even paradoxically from the venous system through a right-to-left cardiac shunt. Extensive in situ thrombosis (thrombus formation at the site of preexisting atherosclerotic disease) can also produce ALI. The presentation is abrupt, with a classic progression that is clinically assessed. We use the Rutherford assessment to classify the patient presentation and help with treatment decisions. As noted below, when the sensory and motor function are absent in the affected extremity, irreversible tissue ischemia is present, and operative assessment is warranted. Class Limb Prognosis Sensory Motor Examination Arterial Doppler Venous Doppler Examination I viable Salvageable with Normal Normal Present Present urgent intervention IIa Salvageable with Diminished Normal Absent Present urgent intervention Salvageable with IIb immediate Diminished Diminished Absent Present intervention III Irreversible tissue Absent Absent Absent Absent damage Adapted from Rutherford RB, Baker JD, Ernst C, et al. Recommended standards for reports dealing with lower extremity ischemia: revised version. J Vasc Surg. 1997;26(3):517-538. For patients with Class I, IIa, or IIb presentation, the choice between endovascular and surgical revascularization is dependent on a number of factors including local expertise, resource availability, and type of reconstruction needed among others. References: Bailey MA, Griffin KJ, Scott DJ. Clinical assessment of patients with peripheral arterial disease. Semin Intervent Radiol. 2014;31(4):292-299. Rutherford RB, Baker JD, Ernst C, et al. Recommended standards for reports dealing with lower extremity ischemia: revised version. J Vasc Surg. 1997;26(3):517-538."}, {"number": "6", "stem": "A 79-year-old female with upper gastrointestinal (GI) bleeding undergoes a diagnostic angiogram with selection of the celiac and superior mesenteric arteries (SMA). A week later, CTA is performed for a continued drop in hemoglobin. The images show a saccular pseudoaneurysm of the celiac artery measuring 1.2 cm in diameter. What is the next step in management?", "options": [{"letter": "A", "text": "Anticoagulation to prevent thrombosis of the celiac artery"}, {"letter": "B", "text": "Surgical ligation of the celiac artery followed by arterial bypass"}, {"letter": "C", "text": "Coil embolization of the celiac artery proximal and distal to the neck of the pseudoaneurysm"}, {"letter": "D", "text": "Close follow-up with CTA"}], "images": ["assets/q6_p007_01.jpg"], "explanationImages": ["assets/a6_p007_01.jpg", "assets/a6_p008_01.jpg", "assets/a6_p008_02.jpg"], "answer": "C", "explanation": "Answer C. This is an iatrogenic injury related to the celiac artery catheterization performed 1 week prior. Mesenteric arterial pseudoaneurysms warrant urgent treatment at any size, as there is no way to compress the injury if there is rupture, the surgical treatment is challenging, and the risk of rupture is unpredictable. Pseudoaneurysms are by definition contained ruptures of the parent vessel, with fewer than 3 layers of vessel wall remaining intact. Choice A is inappropriate in a patient with an unexplained dropping hemoglobin level, and there is virtually no risk to the patient if the celiac artery undergoes thrombosis. The SMA is patent and will provide collateral circulation to all 3 celiac artery branches via the pancreaticoduodenal arcade. Similarly, open major surgery with ligation and arterial bypass is unnecessary with an intact SMA, particularly in a 79-year-old. The celiac artery can be sacrificed with an embolization procedure that occludes the artery proximal and distal to the neck of the pseudoaneurysm, also known as isolation technique. A stent graft would also be appropriate if an adequate seal could be achieved to exclude the pseudoaneurysm and prevent further filling. Figure 6-1 Digital subtraction angiography DSA) images from the embolization procedure. Celiac angiogram shows the saccular pseudoaneurysm (black arrow) arising from the mid segment of the artery. Note the narrow neck (red arrow) on the more delayed phase image on the right. CA, celiac artery; CHA, common hepatic artery; LGA, left gastric artery; SA, splenic artery. Figure 6-2 Computed tomography angiography (CTA) images following embolization show metallic artifact from the coil pack within the celiac artery (left) and patent common hepatic and splenic arteries (right), which are filling via collateral circulation off the superior mesenteric artery. There is no evidence of end-organ ischemia on the remaining images. Reference: Hemp JH, Sabri SS. Endovascular management of visceral arterial aneurysms. Tech Vasc Interv Radiol. 2015;18 (1):14-23."}, {"number": "7", "stem": "A 53-year-old female with a history of left common femoral artery to below knee popliteal artery bypass using saphenous vein graft is seen in clinic for routine surveillance. Arterial duplex ultrasound of the extremity is performed with results below. What should be done next? Segment Peak Systolic Velocity (PSV) Proximal common femoral artery 236 cm/s Proximal profunda femoris artery 171 cm/s Graft, proximal anastomosis 239 cm/s Graft, proximal thigh 441 cm/s Graft, mid thigh 47 cm/s Graft, distal thigh 35 cm/s Graft, mid knee 36 cm/s Graft, distal knee 30 cm/s Distal posterior tibial artery 29 cm/s", "options": [{"letter": "A", "text": "Repeat arterial duplex ultrasound in 6 months"}, {"letter": "B", "text": "Endovascular intervention for bypass stenosis"}, {"letter": "C", "text": "Surgical revision of the proximal bypass anastomosis"}, {"letter": "D", "text": "Surgical revision of the distal bypass anastomosis"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. The duplex ultrasound result indicates a flow-limiting stenosis in the proximal segment of the bypass graft (peak systolic velocity, PSV >300 cm/s), with markedly reduced flow beyond the stenosis (graft flow velocity, GFV <45 cm/s). Pursuing surveillance imaging in 6 months (choice A) is too long to wait and may change the intervention from a simple balloon angioplasty of a focal stenosis to a multiday admission to lyse open a thrombosed bypass. Surgical revision at this time is not necessary, as the bypass is still patent and the duplex ultrasound shows a stenosis that certainly warrants attempted endovascular treatment. Table 7-1 Arterial Duplex Ultrasound Surveillance of Lower Extremity Bypass Graft With Guidance-Based Peak Systolic Velocity (PSV) and Graft Flow Velocity (GFV) Risk of Bypass GFV (Avg Over Thrombosis PSV PSV Ratio Consecutive Nonstenotic Management Segments) High >300 cm/s >3.5 <45 cm/s Immediate intervention Intermediate >300 cm/s >3.5 >45 cm/s Elective intervention Low <300 cm/s <2.0 >45 cm/s Continued observation Adapted from Dhanoa D, Baerlocher MO, Benko AJ, et al. Position statement on noninvasive imaging of peripheral arterial disease by the society of interventional radiology and the Canadian Interventional Radiology Association. J Vasc Interv Radiol. 2016;27 (7):947-951. Reference: Dhanoa D, Baerlocher MO, Benko AJ, et al. Position statement on noninvasive imaging of peripheral arterial disease by the society of interventional radiology and the Canadian Interventional Radiology Association. J Vasc Interv Radiol. 2016;27 (7):947-951."}, {"number": "8", "stem": "Which of the following is the most likely diagnosis in this 29-year-old female patient?", "options": [{"letter": "A", "text": "Takayasu arteritis (TA)"}, {"letter": "B", "text": "Atherosclerosis"}, {"letter": "C", "text": "Giant cell arteritis (GCA)"}, {"letter": "D", "text": "Postoperative changes"}], "images": ["assets/q8_p009_01.jpg"], "explanationImages": ["assets/a8_p009_01.jpg", "assets/a8_p010_01.jpg"], "answer": "A", "explanation": "Answer A. The DSA images from selective right and left subclavian arteriography demonstrate symmetric long-segment stenoses of the subclavian, axillary, and visualized brachial artery segments. This appearance is most consistent with a large cell vasculitis. Although there is overlap between TA and GCA, there are some distinguishing features that help narrow down the diagnosis. TA is likely to affect patients under the age of 50 years, whereas GCA often presents after the age of 50 years. TA also has a strong female predominance. The vessels affected can be helpful as well: TA primarily involves the main branches of the aorta whereas GCA often involves the extracranial external carotid arterial branches. Figure 8-1 Three-dimensional volume rendered magnetic resonance angiography (MRA) images in another patient with known Takayasu arteritis (TA). Left anterior oblique (LAO) (left) image demonstrating severe stenosis of the proximal left subclavian artery. Right anterior oblique (RAO) (right) image demonstrating aneurysm formation of the proximal right subclavian artery. Reference: Serra R, Butrico L, Fugetto F, et al. Updates in pathophysiology, diagnosis and management of takayasu arteritis. Ann Vasc Surg. 2016;35:210-225."}, {"number": "9", "stem": "When evaluating a patient with symptomatic arterial blockages from TA, which is the most useful piece of information in determining the next step in treatment?", "options": [{"letter": "A", "text": "Erythrocyte sedimentation rate (ESR)"}, {"letter": "B", "text": "Peak systolic velocity across the arterial stenosis"}, {"letter": "C", "text": "Blood pressure differential between the upper extremities"}, {"letter": "D", "text": "Reversal of flow in the vertebral artery"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. TA is a complex disease process with management including medical, endovascular, and/or surgical treatments. The course of the disease is often phasic with an early or prepulseless phase, a vascular inflammatory phase, and a late quiescent phase. A sequential triphasic pattern is not common, and phases may coexist. Although treatment regimens may vary, a generally agreed upon concept is to avoid any surgical or endovascular treatments during the active inflammatory phase of the disease. Inflammatory activity can be assessed by measuring the ESR. When active inflammation is absent or reduced, invasive treatments can be performed. Reference: Serra R, Butrico L, Fugetto F, et al. Updates in pathophysiology, diagnosis and management of takayasu arteritis. Ann Vasc Surg. 2016;35:210-225."}, {"number": "10", "stem": "A 41-year-old female presents with painful discolored toes in the right lower extremity. Symptoms have been present for approximately 2 weeks. Pedal pulses are present on physical examination. Based on the DSA images, what is the most likely etiology for her condition?", "options": [{"letter": "A", "text": "Vasculitis"}, {"letter": "B", "text": "Vasospasm"}, {"letter": "C", "text": "Thromboangiitis obliterans"}, {"letter": "D", "text": "Atheroemboli"}], "images": ["assets/q10_p011_03.jpg"], "explanationImages": ["assets/a10_p011_03.jpg", "assets/a10_p012_03.jpg", "assets/a10_p013_01.jpg"], "answer": "D", "explanation": "Answer D. This is a classic presentation of blue toe syndrome, for which there are many causes. Embolism is the most common etiology, often from focal shaggy atherosclerotic plaques or underlying aneurysms that thrombose and embolize clot fragments down into the small arteries of toes and feet. As in this case, the pedal pulses can remain palpable as the larger arteries of the leg are unaffected by the emboli. In the first image, there is smooth narrowing of the proximal and mid SFA from early atherosclerotic plaque formation; however, in the distal segment, there is a focal ledge-like filling defect from a bulky eccentric atherosclerotic plaque. Figure 10-1 Magnification image of eccentric plaque (arrow) in the superficial femoral artery (SFA) responsible for distal emboli. Vasculitides can manifest as stenoses, occlusions, and/or aneurysms often affecting more than 1 artery or segment. Vasospasm or vasoconstriction can occur from traumatic injury, shock, medications such as ergots, or exposure to extreme cold. Focal or diffuse smooth narrowing and sometimes occlusion can occur. Thromboangiitis obliterans or Buerger disease typically affects younger patients with a history of heavy smoking and involves the small- to medium-sized arteries and veins of the upper and lower extremities. In the lower extremities, the tibial arteries are often affected with multifocal occlusions and formation of collateral arteries with a characteristic \"corkscrew\" appearance. Figure 10-2 Digital subtraction angiography (DSA) images from upper extremity angiography in a young male with suspected Buerger disease demonstrate occlusion of the distal radial and ulnar arteries, corkscrew collateral formation, and occlusion of the proper digital arteries of the thumb. Reference: Matchett WJ, Mcfarland DR, Eidt JF, Moursi MM. Blue toe syndrome: treatment with intra-arterial stents and review of therapies. J Vasc Interv Radiol. 2000;11(5):585-592."}, {"number": "11", "stem": "A 78-year-old female presents with abdominal pain. Based on the CTA images below, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Retroperitoneal fibrosis"}, {"letter": "B", "text": "Infectious aortitis with abscess formation"}, {"letter": "C", "text": "Abdominal aortic injury with active extravasation"}, {"letter": "D", "text": "Abdominal aortic aneurysm with features of impending rupture"}], "images": ["assets/q11_p014_02.jpg"], "explanationImages": ["assets/a11_p014_02.jpg", "assets/a11_p015_01.jpg", "assets/a11_p015_02.jpg", "assets/a11_p016_01.jpg"], "answer": "D", "explanation": "Answer D. The CTA images demonstrate iodinated contrast filling an irregular infrarenal abdominal aortic lumen. Note the atherosclerotic calcifications displaced both anteriorly and posteriorly in comparison to the aortic lumen, indicating the true aortic diameter is significantly greater than that depicted by the contrast-filled lumen. This appearance is consistent with an abdominal aortic aneurysm with mural thrombus formation. Additionally, on the bottom left image the posterior wall of the aorta is concave and inseparable from the adjacent lumbar vertebral body; a CT sign known as the \"draped aorta sign\" and associated with contained and/or impending rupture of the aneurysm. This high-risk feature should be identified and reported to the referring physician. Two phases of contrast-enhanced imaging are presented, with no periaortic accumulation or change in appearance of the aortic luminal contrast to indicate active extravasation. While retroperitoneal fibrosis often involves the distal abdominal aorta and bifurcation, displaced aortic wall calcifications should not be present. The fibrosis can cause luminal narrowing of the aorta and inferior vena cava and also involve adjacent structures such as the ureters causing medial deviation and obstruction with upstream hydroureteronephrosis. Infectious aortitis is fairly uncommon with the most common offending agents being tuberculosis, syphilis, salmonella, Escherichia coli, and streptococcus. The CT appearance includes aortic wall thickening, periaortic fluid and/or soft tissue, pseudoaneurysm formation (often saccular), and rarely gas formation. Figure 11-1 Companion case of infectious aortitis in 68-year-old female that presented with fevers and back pain. There is ill-defined periaortic low attenuation and stranding. Also note the saccular outpouching of the aortic lumen in the top right image. Figure 11-2 Patient with abdominal aortic aneurysm (AAA) and evidence of rupture. This patient has an AAA with well-seen calcified wall that is surrounded by blood (arrowheads) in the retroperitoneum. Although there is no active bleeding on this 2-phase contrast-enhanced computed tomography (CECT), this is a vascular emergency. Reference: Halliday KE, Al-Kutoubi A. Draped aorta: CT sign of contained leak of aortic aneurysms. Radiology. 1996;199 (1):41-43."}, {"number": "12", "stem": "A 45-year-old female presents for embolization of an intrasplenic arterial pseudoaneurysm due to blunt trauma. The interventional radiology (IR) physician obtains the following angiographic images from the initial selective catheterization. Which is the correct interpretation?", "options": [{"letter": "A", "text": "Celiac artery stenosis"}, {"letter": "B", "text": "SMA stenosis"}, {"letter": "C", "text": "Common origin of the celiac and SMA"}, {"letter": "D", "text": "Arc of Buhler"}], "images": ["assets/q12_p017_01.jpg"], "explanationImages": ["assets/a12_p017_01.jpg"], "answer": "A", "explanation": "Answer A. On the images provided, the catheter has selected the SMA, evidenced by iodinated contrast first filling the SMA. On the subsequent image, the branches of the celiac artery are now filling with contrast. This appearance is classic for underlying celiac artery stenosis with hypertrophy of the pancreaticoduodenal arcade, which retrograde fills the gastroduodenal artery (GDA) and provides inflow to all 3 celiac artery branches. With a common origin, both the celiac and SMA branches will fill simultaneously. The Arc of Buhler is a rare persistent embryonic connection between the celiac and SMA. A visible connecting vessel is seen when this variant is present. Figure 12-1 The celiac artery is subsequently catheterized and digital subtraction angiography (DSA) demonstrates the splenic artery and left gastric artery filling from the injection. There is no opacification of the common hepatic artery due to retrograde flow of nonopacified blood coming from the gastroduodenal artery (GDA). Note the variant anatomy with replaced left hepatic artery off the left gastric artery. Reference: White RD, Weir-Mccall JR, Sullivan CM, et al. The celiac axis revisited: anatomic variants, pathologic features, and implications for modern endovascular management. Radiographics. 2015;35(3):879-898."}, {"number": "13", "stem": "When evaluating a patient with suspected median arcuate ligament syndrome (MALS), which technique will help discern the etiology of the celiac artery stenosis?", "options": [{"letter": "A", "text": "Angiogram with Valsalva"}, {"letter": "B", "text": "Angiogram with carbon dioxide"}, {"letter": "C", "text": "Angiogram in lateral view with separate inspiration and expiration injections"}, {"letter": "D", "text": "Angiogram after eating"}], "images": [], "explanationImages": ["assets/a13_p018_01.jpg"], "answer": "C", "explanation": "Answer C. An intrinsic stenosis of the celiac artery from atherosclerosis should be unaffected on angiography by any provocative maneuver. Median arcuate ligament compression, an extrinsic mass effect on the superior aspect of the celiac artery, can be better demonstrated with inspiration and expiration angiograms in the lateral projection. On inspiration, the diaphragm moves down, displacing the intra-abdominal organs caudally, lessening the effect of the median arcuate ligament on the celiac artery. In expiration, the diaphragm and intra-abdominal organs move cephalad, pulling up on the celiac artery, worsening the effect (and stenosis) of the median arcuate ligament on the celiac artery. Figure 13-1 Digital subtraction angiography (DSA) images from abdominal aortography in the lateral projection. Inspiration image (left) shows widely patent celiac and superior mesenteric arteries. Expiration image (right) shows moderate focal narrowing (arrow) just beyond the origin of the celiac artery due to median arcuate ligament compression. This patient was a healthy 37-year-old female being evaluated as a donor for living donor liver transplantation. Reference: Tracci MC. Median arcuate ligament compression of the mesenteric vasculature. Tech Vasc Interv Radiol. 2015;18 (1):43-50."}, {"number": "14", "stem": "A 60-year-old male presents with bright red blood per rectum. He is hypotensive and placed on pressor support. A CTA is performed to evaluate the source, and active bleeding is identified in the rectum. Surgery and Gastroenterology services decline intervention. The patient is brought to IR for angiography and embolization. A branch of the superior rectal artery is selected with a microcatheter, and active bleeding (arrowhead) is identified and subsequently treated with Gelfoam slurry embolization. Despite a good technical result, the patient continues to have bright red blood per rectum and hypotension in the angiography suite. What should be done next?", "options": [{"letter": "A", "text": "Transfer to the intensive care unit (ICU) as the bleeding will likely stop"}, {"letter": "B", "text": "Refer to surgery for operative intervention"}, {"letter": "C", "text": "Perform additional angiography to evaluate for a bleed at a different location in the bowel"}, {"letter": "D", "text": "Perform additional angiography to evaluate for collateral flow to the rectal bleed"}], "images": ["assets/q14_p018_02.jpg"], "explanationImages": ["assets/a14_p018_02.jpg", "assets/a14_p019_01.jpg"], "answer": "D", "explanation": "Answer D. The angiogram shows selective catheterization of the IMA with subsequent microcatheterization of the superior rectal artery and demonstration of the bleed. Following embolization, the patient continues with overt bleeding from below and hypotension. Following successful embolization at other sites of GI bleeding such as the stomach, small bowel, or colon, patients often continue to have blood and/or melena from below, as they pass residual blood in the bowels. This is an expected finding and not associated with a continued drop in hemoglobin or clinical deterioration (hypotension). In this case, however, as the bleed originated from the rectum, continued blood from below with hypotension is concerning for persistent bleeding despite embolization and warrants further investigation. The rectum receives its blood from the IMA via the superior rectal artery as well as the middle and inferior rectal arteries, which are branches from the anterior division of the internal iliac arteries. Subsequent selection of the left internal iliac artery and anterior division truck demonstrates collateral flow with continued bleeding into the lumen of the rectum (see Figure 14-1). The middle rectal artery is treated with Gelfoam slurry, resulting in immediate cessation of the bleeding and stabilization of the patient. While the majority of GI bleeding is intermittent, the actively bleeding patient with hypotension should be resuscitated and undergo treatment, whether endoscopic, endovascular, or surgical. As the patient was already in the IR suite, transfer back to the ICU or referral to surgery is not appropriate (choices A and B). Multifocal bleeding in the bowel is extremely uncommon, and both the CTA and catheter angiogram confirmed the clinical diagnosis of lower GI bleeding. There is no reason to pursue investigatory angiography in a different segment of bowel (choice C). Figure 14-1 Angiography from the anterior division of the left internal iliac artery demonstrates persistent rectal bleeding (arrowheads) from collateral flow through the middle rectal artery. Reference: Lee JH, Lee KH, Chung WS, Hur J, Won JY, Lee DY. Transcatheter embolization of the middle sacral artery: collateral feeder in recurrent rectal bleeding. AJR Am J Roentgenol. 2004;182(4):1055-1057."}, {"number": "15", "stem": "What is the most likely clinical presentation for this patient?", "options": [{"letter": "A", "text": "Acute abdominal pain and bloody stools"}, {"letter": "B", "text": "Chronic bilateral lower extremity swelling and varicose veins"}, {"letter": "C", "text": "Progressive buttock claudication and impotence"}, {"letter": "D", "text": "Abrupt-onset cold and painful lower extremities"}], "images": ["assets/q15_p020_03.jpg"], "explanationImages": ["assets/a15_p020_03.jpg"], "answer": "C", "explanation": "Answer C. The angiographic images depict occlusion of the distal infrarenal abdominal aorta and bilateral common and external iliac arteries. Note the faint reconstitution of the bilateral common femoral arteries and proximal segments of the profunda femoris artery and SFA on the later phase image. We can confidently state the condition is chronic because of the extensive large and tortuous collaterals that have formed, which circumvent the arterial obstruction and allow for a viable pelvis and lower extremities. Also note the irregular wall of the aorta due to underlying atherosclerotic disease. This is the angiographic picture of Leriche syndrome, which is characterized clinically by diminished common femoral artery pulses, buttock claudication, and impotence. Choices A and D can be excluded based on acuity. Choice B is almost certainly related to venous pathology, which is clearly not depicted here. Reference: Ahmed S, Raman SP, Fishman EK. CT angiography and 3D imaging in aortoiliac occlusive disease: collateral pathways in Leriche syndrome. Abdom Radiol (NY). 2017;42(9):2346-2357."}, {"number": "16", "stem": "What collateral arterial pathway is delineated by the arrowheads?", "options": [{"letter": "A", "text": "Inferior mesenteric artery (IMA) >> superior rectal artery >> middle and inferior rectal arteries >> internal iliac artery"}, {"letter": "B", "text": "Median sacral artery >> iliolumbar artery >> external iliac artery >> internal iliac artery"}, {"letter": "C", "text": "Lumbar artery >> deep circumflex iliac artery >> external iliac artery"}, {"letter": "D", "text": "SMA >> iliocolic artery >> sigmoidal artery >> internal iliac artery"}], "images": ["assets/q16_p021_03.jpg"], "explanationImages": ["assets/a16_p021_03.jpg"], "answer": "A", "explanation": "Answer A. Collateral arterial pathways in aortoiliac occlusive disease are important to recognize and can present diagnostic and therapeutic challenges. A collateral pathway forms to bypass the level of arterial obstruction and provide blood flow to those tissues normally perfused by the involved artery. In the case of aortoiliac occlusive disease or Leriche syndrome, blood flow is compromised to the pelvis and bilateral lower extremities. The DSA image on the left shows the classic appearance of the superior rectal (hemorrhoidal) artery as it descends into the pelvis and gives off right and left lateral branches that appear to drape around the rectum. The DSA image on the right shows tremendous collateral formation in the pelvis near the termination of the superior rectal artery, with filling of internal iliac artery branches (middle and inferior rectal arteries). This pathway brings flow to the retrograde internal iliac artery flow) or via other collaterals (obturator arteries >> upper thigh). Important collateral pathways to be familiar with include the following: 1. Subclavian artery >> internal thoracic artery >> superior epigastric artery >> inferior epigastric artery >> external iliac artery (aka pathway of Winslow) 2. SMA >> IMA >> superior rectal artery >> middle and inferior rectal arteries >> internal iliac artery >> external iliac artery 3. Lumbar, intercostal and subcostal arteries >> deep circumflex iliac artery >> external iliac artery 4. Lumbar, intercostal and subcostal arteries >> lateral sacral and iliolumbar arteries >> internal iliac artery >> external iliac artery Reference: Ahmed S, Raman SP, Fishman EK. CT angiography and 3D imaging in aortoiliac occlusive disease: collateral pathways in Leriche syndrome. Abdom Radiol (NY). 2017;42(9):2346-2357."}, {"number": "17", "stem": "After a diagnostic arteriogram, the common femoral arterial access is closed with manual pressure. Three days later, there is swelling in the right groin. Ultrasound (US) images below. Which of the following is a contraindication to percutaneous thrombin injection?", "options": [{"letter": "A", "text": "Pseudoaneurysm sac diameter <3 cm"}, {"letter": "B", "text": "Pseudoaneurysm with fistula to adjacent deep vein"}, {"letter": "C", "text": "Narrow pseudoaneurysm neck"}, {"letter": "D", "text": "Pseudoaneurysm arising from the common femoral artery"}], "images": ["assets/q17_p022_01.jpg"], "explanationImages": ["assets/a17_p022_01.jpg"], "answer": "B", "explanation": "Answer B. Following arterial access in the groin, complications can occur including pseudoaneurysm formation, hematoma formation, arterial thrombosis, arterial dissection, and arteriovenous fistula (AVF) formation among others. When pseudoaneurysms form, patients most commonly present with a pulsatile groin mass after a recent catheterization procedure. Ultrasound is the modality of choice for evaluation, as it can detect and define virtually all access-related complications. When assessing pseudoaneurysms, it is important to identify the parent artery, arterial patency of the affected extremity, pseudoaneurysm size and neck morphology, and presence or absence of arteriovenous fistula. In the case presented, the color Doppler image demonstrates an oval pseudoaneurysm arising from the common femoral artery measuring approximately 2.5 cm with classic to- and-fro flow (yin-yang sign). On the spectral Doppler image, the common femoral vein is sampled with spectral tracing showing an arterialized vein with continuous diastolic flow, classic for an AVF. Additional images (not shown) demonstrate connection of the adjacent deep vein to the pseudoaneurysm. Once detected, pseudoaneurysms can be observed or treated with ultrasound-guided compression, ultrasound-guided thrombin injection, or surgical repair. Various algorithms for management exist. More complex endovascular interventions can also be used but are beyond the scope of this book. Ultrasound-guided thrombin injection is the most common technique used in current practice. Contraindications to the technique include infection of the overlying skin or tissues, concomitant arteriovenous fistula, inability to visualize the needle, and/or a short wide neck. With an AVF, thrombin can directly enter the systemic venous system leading to venous thromboembolic complications. Pseudoaneurysm size becomes important as many small ones (less than 1 or 2 cm) will spontaneously thrombose without intervention, and operators may choose serial ultrasound over immediate intervention. Notably, thrombin injection of pseudoaneurysms <1 cm increases the risk of parent artery thrombosis. Having a narrow neck and common femoral artery origin are not unfavorable features for thrombin injection. Reference: Stone PA, Campbell JE, Aburahma AF. Femoral pseudoaneurysms after percutaneous access. J Vasc Surg. 2014;60 (5):1359-1366."}, {"number": "18", "stem": "Which arrow denotes the recommended needle tip position for ultrasound-guided thrombin injection of a common femoral artery pseudoaneurysm?", "options": [{"letter": "A", "text": "A"}, {"letter": "B", "text": "B"}, {"letter": "C", "text": "C"}, {"letter": "D", "text": "D"}], "images": ["assets/q18_p023_02.jpg"], "explanationImages": ["assets/a18_p023_02.jpg"], "answer": "D", "explanation": "Answer D. When performing ultrasound-guided percutaneous thrombin injection for groin access pseudoaneurysms, the preferred technique is to place the needle tip into the pseudoaneurysm sac, away from the neck or communication with the parent artery. The injection is typically performed with a small syringe (1 mL) containing reconstituted thrombin in a concentration of 1000 U/mL. Live color and grayscale ultrasound during slow injection demonstrates the echogenic clot forming at the needle tip and ultimately filling the volume of the pseudoaneurysm sac. At completion, there should be no demonstrable flow in the pseudoaneurysm and the parent artery remains patent. Injection near the neck (choice A) can result in accidental parent artery injection (leading the thrombosis and limb ischemia) or incomplete pseudoaneurysm thrombosis. Injection into the parent artery upstream or downstream (choices C and B) from the neck will not effectively deliver thrombin to the pseudoaneurysm and will virtually guarantee parent artery thrombosis. Reference: Stone PA, Campbell JE, Aburahma AF. Femoral pseudoaneurysms after percutaneous access. J Vasc Surg. 2014;60 (5):1359-1366."}, {"number": "19", "stem": "An otherwise healthy 25-year-old male undergoes placement of a stent graft to repair a traumatic pseudoaneurysm of the descending thoracic aorta. Which complication is the patient least at risk of developing?", "options": [{"letter": "A", "text": "Myocardial ischemia"}, {"letter": "B", "text": "Cerebral ischemia"}, {"letter": "C", "text": "Left arm ischemia"}, {"letter": "D", "text": "Spinal cord ischemia"}], "images": ["assets/q19_p024_01.jpg"], "explanationImages": ["assets/a19_p024_01.jpg"], "answer": "A", "explanation": "Answer A. The DSA images depict ongoing thoracic endovascular aortic repair or TEVAR, for a traumatic pseudoaneurysm of the descending thoracic aorta. On the predeployment image (left), the constrained endograft has been advanced into position over a stiff wire, and a flush aortogram in a steep left anterior oblique position demonstrates the normal arch anatomy. After stent graft deployment, repeat flush aortogram (right) shows successful exclusion of the pseudoaneurysm; however, there is nonopacification of the left subclavian artery. A carotid to subclavian arterial bypass is not visualized. The risks to the patient in this scenario are actually quite low but include cerebral ischemia via diminished flow to the ipsilateral vertebral artery, left arm ischemia via diminished flow to the subclavian artery, and spinal cord ischemia via diminished flow to the intercostal and spinal arteries. Notably, acute left arm ischemia is rarely seen despite the somewhat unnerving angiographic appearance due to robust collateral pathways in the neck and shoulder region. Chronic arm ischemia or claudication is more likely to occur. The left internal thoracic artery (mammary) also experiences reduced flow, as it is a branch of the subclavian artery; however, in the absence of prior usage as a bypass conduit for coronary artery disease, low flow or occlusion presents no risk to the patient. Reference: Findeiss LK, Cody ME. Endovascular repair of thoracic aortic aneurysms. Semin Intervent Radiol. 2011;28 (1):107-117."}, {"number": "20", "stem": "To further evaluate a young patient with left calf claudication, a bilateral lower extremity angiogram is performed with DSA images below obtained at the popliteal artery level in the neutral position (left image) and with plantar flexion with resistance (right image). What is the most likely pathology?", "options": [{"letter": "A", "text": "Cystic adventitial disease"}, {"letter": "B", "text": "Aneurysm with mural thrombus"}, {"letter": "C", "text": "Arterial entrapment"}, {"letter": "D", "text": "Atherosclerotic plaque"}], "images": ["assets/q20_p025_01.jpg"], "explanationImages": ["assets/a20_p025_01.jpg", "assets/a20_p026_01.jpg"], "answer": "C", "explanation": "Answer C. DSA images centered about the right and left popliteal arteries demonstrate abnormal medial deviation of both arteries at the level of the knee joint with moderate to severe stenosis on the left, which is worse with plantar flexion against resistance. The history, appearance, and provocative effect are classic for popliteal artery entrapment syndrome (PAES). Popliteal artery entrapment typically occurs secondary to one of several anatomic variants involving the musculotendinous structures of the popliteal fossa. The entrapment can occur bilaterally, and result in stenosis, occlusion, or aneurysmal degeneration of the affected popliteal artery. When symptomatic, treatment is typically surgical reconstruction. Although conventional angiography is an excellent tool for evaluation, dynamic ultrasound, CTA, and magnetic resonance angiography (MRA) have become first-line diagnostic tools in modern practice. Other conditions affecting the popliteal artery (choices A, B, and D) can present as a stenosis, but the medial deviation and provocative effect are unique to PAES. It is important to remember that a significant limitation of angiography is its inability to visualize extraluminal pathology. References: Corneloup L, Labanère C, Chevalier L, et al. Presentation, diagnosis, and management of popliteal artery entrapment syndrome: 11 years of experience with 61 legs. Scand J Med Sci Sports. 2017;00:1-7. Liu Y, Sun Y, He X, et al. Imaging diagnosis and surgical treatment of popliteal artery entrapment syndrome: a single-center experience. Ann Vasc Surg. 2014;28(2):330-337."}, {"number": "21", "stem": "Following ejection from a motor vehicle, a middle-aged female is brought to the emergency room (ER) for blunt trauma evaluation. Chest and pelvic radiographs are quickly obtained, demonstrating multiple rib and complex pelvic fractures. The patient is hypotensive and transported directly to the interventional suite for angiography. Which is the correct interpretation of the pelvic angiogram?", "options": [{"letter": "A", "text": "No evidence of vascular injury, study complete"}, {"letter": "B", "text": "No evidence of vascular injury, additional images needed"}, {"letter": "C", "text": "Evidence of vascular injury, study complete"}, {"letter": "D", "text": "Evidence of vascular injury, additional images needed"}], "images": ["assets/q21_p026_02.jpg"], "explanationImages": ["assets/a21_p026_02.jpg", "assets/a21_p027_01.jpg", "assets/a21_p027_02.jpg"], "answer": "D", "explanation": "Answer D. Pelvic angiography and intervention for trauma is one of the most rewarding aspects of IR. Embolization for pelvic bleeding can truly be lifesaving. In this case, the unsubtracted image demonstrates left sacral ala and bilateral superior rami fractures. The subtracted image demonstrates normal appearance of the visualized infrarenal abdominal aorta, bilateral common iliac, bilateral external iliac, and right internal iliac arteries. Although there is no evidence of active bleeding, there is a clear paucity of left hemipelvis arterial branches. Note the normal right superior gluteal artery (largest branch of the internal iliac artery, posterior division) and absent left superior gluteal artery due to proximal injury with occlusion. Although there is no active bleeding from the vessel stump, embolization is warranted, as the stump may be intermittently bleeding and over time can form a pseudoaneurysm. Figure 21-1 Unsubtracted images from left superior gluteal artery stump embolization with coils (arrowheads). Although there is evidence of vascular injury on the initial angiogram in this case, one should not clear the pelvis with nonselective angiography alone. Bilateral selective internal iliac angiography in multiple obliquities should be performed with quality power injections to completely evaluate the vasculature for injury. Subsequent embolization is carried out with various agents such as Gelfoam slurry, coils, or glue depending on the location and type of injury. Figure 21-2 Companion case of a patient with blunt trauma, pelvic fractures, and hypotension evaluated with angiography. Nonselective right anterior oblique (RAO) pelvic arteriogram shows no evidence of injury. Selective interrogation of the right internal iliac artery is then performed (see Figure 21-3). Figure 21-3 Selective left anterior oblique (LAO) angiography from the right internal iliac artery demonstrates an anterior division injury with vessel stump which is not appreciated by the operator (arrowheads). No embolization performed. Approximately 10 days later, the patient experiences a sudden drop in hemoglobin with associated pelvic pain and a computed tomography angiography (CTA) is obtained (see Figure 21-4). Figure 21-4 Pelvic CTA demonstrates interval development of a large pseudoaneurysm (arrowheads) in the region of the right internal iliac artery with adjacent hematoma. The patient returns to IR and undergoes a lengthy complex embolization to occlude the pseudoaneurysm and an associated arteriovenous fistula arising from the injured anterior division branch artery. Reference: Scemama U, Dabadie A, Varoquaux A, et al. Pelvic trauma and vascular emergencies. Diagn Interv Imaging. 2015;96 (7-8):717-729."}, {"number": "22", "stem": "An elderly female with massive hemoptysis from the left lower lobe of the lung presents for bronchial angiography and embolization. Particle embolization from the demonstrated catheter position may result in nontarget embolization to which territory?", "options": [{"letter": "A", "text": "Spinal cord"}, {"letter": "B", "text": "Esophagus"}, {"letter": "C", "text": "Stomach"}, {"letter": "D", "text": "Diaphragm"}], "images": ["assets/q22_p028_04.jpg"], "explanationImages": ["assets/a22_p028_04.jpg", "assets/a22_p029_03.jpg"], "answer": "A", "explanation": "Answer A. The subtracted and unsubstracted images from a selective arterial catheterization in the thorax demonstrate opacification of 2 left-sided intercostal arteries arising from a common trunk. The diaphragm is visible, localizing the artery to the lower thoracic region. Additionally, there is a medially directed branch that ascends over a short segment, makes a hairpin loop, and descends in the midline over the spinal column. This branch has the classic appearance of the great anterior radiculomedullary artery or artery of Adamkiewicz. This artery ultimately anastomoses with the anterior spinal artery, which provides blood supply to the lower thoracic and lumbar spinal cord. The artery most commonly arises from a left intercostal artery in the lower thoracic region. Particle embolization from the demonstrated catheter position can cause permanent spinal cord ischemia. Operators need to be aware of this uncommonly seen branch to avoid a potentially catastrophic complication. Figure 22-1 Companion case of the anterior spinal artery (arrowheads) with communication to the right L2 lumbar artery. Reference: Yoon W, Kim JK, Kim YH, Chung TW, Kang HK. Bronchial and nonbronchial systemic artery embolization for life- threatening hemoptysis: a comprehensive review. Radiographics. 2002;22(6):1395-1409."}, {"number": "23", "stem": "A 37-year-old construction worker presents with numbness, tingling, and discoloration of the third digit in the right hand. Based on the angiographic images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Normal angiogram"}, {"letter": "B", "text": "Vasculitis"}, {"letter": "C", "text": "Posttraumatic aneurysm with distal embolus"}, {"letter": "D", "text": "Raynaud disease"}], "images": ["assets/q23_p030_01.jpg"], "explanationImages": ["assets/a23_p030_01.jpg", "assets/a23_p031_02.jpg"], "answer": "C", "explanation": "Answer C. The image demonstrates fusiform aneurysmal dilatation of the ulnar artery just proximal to the palmar arch. Moving peripherally, there is a short-segment occlusion of the third digit proper digital artery consistent with an embolus. This is hypothenar hammer syndrome, a classic vascular syndrome characterized by repetitive trauma to the hypothenar region of the hand, where the ulnar artery takes a relatively superficial and unprotected course over the hook of the hamate bone. Over time, intimal injury can lead to hyperplasia, fibrosis, and fusiform aneurysmal dilatation. Partial or complete thrombosis can occur with resultant downstream embolization manifested by signs and symptoms of digital ischemia. Obtaining an accurate occupational history is often the most important first step in diagnosing this condition. A similar condition can occur over the thenar aspect of the palm with injury to the radial artery. Vasculitides can certainly affect the medium and small arteries of the hand but would be expected to demonstrate a more global abnormality involving multiple digits with areas of stenosis, occlusion, collateral formation, and distal embolization. Raynaud disease can present similarly, but the predominant pattern is short-segment stenosis and occlusions that may be fixed or responsive to vasodilator injection. Raynaud disease can be primary or secondary to an underlying condition such as connective tissue disease. Figure 23-1 Right-hand angiogram with partial bony overlay demonstrating fusiform aneurysm of the distal ulnar artery (blue arrowheads), with associated short-segment embolic occlusion of the proper digital artery (black arrowhead). Superficial (green line) and deep (blue line) palmar arterial arches. References: Gardiner GA, Tan A. Repetitive blunt trauma and arterial injury in the hand. Cardiovasc Intervent Radiol. 2017;40 (11):1659-1668. Wong VW, Katz RD, Higgins JP. Interpretation of upper extremity arteriography: vascular anatomy and pathology [corrected]. Hand Clin. 2015;31(1):121-134."}, {"number": "24", "stem": "A lower extremity angiogram is performed to evaluate a patient with acute limb ischemia. An embolus is identified in the dorsalis pedis artery at the level of the ankle and successfully aspirated with restoration of flow to the foot (not shown). Pre- and postintervention images of the tibial runoff below show what complication from the procedure?", "options": [{"letter": "A", "text": "Spasm"}, {"letter": "B", "text": "Thrombosis"}, {"letter": "C", "text": "Rupture"}, {"letter": "D", "text": "Atherosclerosis"}], "images": ["assets/q24_p032_01.jpg"], "explanationImages": ["assets/a24_p032_01.jpg", "assets/a24_p033_01.jpg"], "answer": "A", "explanation": "Answer A. When considering a lower extremity arterial intervention, the entire arterial course from the aortic bifurcation through the foot is routinely studied before any intervention has taken place. Following an intervention, the runoff is often restudied to ensure no complication occurs from the procedure itself. In this case, the patient has an intervention performed in the dorsalis pedis artery, which is the continuation of the anterior tibial artery into the foot. To perform that intervention, a wire and catheter are advanced from the groin (contra- or ipsilateral approach) down the leg, through the popliteal and anterior tibial arteries to reach the embolus in the dorsalis pedis artery. The images presented pre and post intervention are centered about the knee where the popliteal artery gives off the anterior tibial artery. In this patient, there is only single vessel runoff via the anterior tibial artery, due to chronic occlusion of the tibioperoneal trunk, posterior tibial, and peroneal arteries. On the preintervention image, the anterior tibial artery is widely patent without stenosis. On the postintervention image, there are smooth-walled segments of moderate to severe narrowing with intervening more normal caliber artery. Note the preserved flow in the side branches. This is the appearance of arteriospasm and occurred from wire and catheter irritation of the vessel. If severe and persistent, it can lead to diminished distal flow and ultimately arterial thrombosis. This patient was treated with intra-arterial nitroglycerin and repeat angiogram demonstrated complete resolution (see Figure 24-1). Other complications operators should be familiar with include dissection, thrombosis, rupture, and distal embolism, which are discussed elsewhere in this book. Figure 24-1 Pre and post administration of 200 μg intra-arterial nitroglycerin to the left anterior tibial artery with complete relief of arteriospasm (arrowheads). References: Razavi MK. Detection and treatment of acute thromboembolic events in the lower extremities. Tech Vasc Interv Radiol. 2011;14(2):80-85."}, {"number": "25", "stem": "An elderly female undergoes seemingly uneventful renal angiography, angioplasty, and stenting for renovascular hypertension due to left renal artery stenosis. Immediately following the procedure, the patient becomes hypotensive and tachycardic. The case images are quickly reviewed for any clue to the patient's change in status while contrast-enhanced computed tomography (CECT) is rapidly performed. Based on the images presented, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Main renal artery rupture"}, {"letter": "B", "text": "Guidewire perforation of the renal capsule"}, {"letter": "C", "text": "Expected post-procedure change following relief of left renal artery stenosis"}, {"letter": "D", "text": "Access site complication"}, {"letter": "E", "text": "Large left renal infarction"}], "images": ["assets/q25_p034_01.jpg"], "explanationImages": ["assets/a25_p034_01.jpg", "assets/a25_p035_01.jpg"], "answer": "B", "explanation": "Answer B. Renal artery intervention for renovascular hypertension can be a relatively simple and straightforward arterial proximal left renal artery stenosis. Note the operator has collimated in such a way that the entire length of the guidewire is not visible during the intervention, particularly the distal intrarenal segment. The wire used has a visible transition point from proximal stiff (less dense) to distal floppy (more dense) that is visible in the upper right image. On the final images after the stent has been deployed, the transition point is no longer visible, suspicious for inadvertent advancement of the wire. There is no evidence of main renal artery rupture. Following the procedure, shock occurs and CECT demonstrates a large subcapsular hematoma involving the left kidney with small jet of extravasating contrast and dependent pooling. This is due to guidewire perforation of the renal capsule. Expected postprocedure changes on imaging include a normal-appearing kidney and occasionally a striated enhancement pattern. If substantial plaque is encountered during the procedure, distal emboli can occur with the development of wedge-shaped peripheral nonenhancing infarctions. Clinically, patients can develop hypotension in the recovery period due to diminished circulating angiotensin II. Access-site complications such as dissection, thrombosis, and pseudoaneurysm formation do not produce shock. A retroperitoneal hematoma from high (above the inguinal ligament) groin access or posterior artery wall needle transgression could present similarly, but the CECT demonstrates subcapsular hematoma, indicating a renal source. References: Carr TM, Sabri SS, Turba UC, et al. Stenting for atherosclerotic renal artery stenosis. Tech Vasc Interv Radiol. 2010; 13(2):134-145. Morris CS, Bonnevie GJ, Najarian KE. Nonsurgical treatment of acute iatrogenic renal artery injuries occurring after renal artery angioplasty and stenting. AJR Am J Roentgenol. 2001;177(6):1353-1357."}, {"number": "26", "stem": "With respect to fibromuscular dysplasia (FMD), what is the most commonly involved artery?", "options": [{"letter": "A", "text": "Vertebral artery"}, {"letter": "B", "text": "Renal artery"}, {"letter": "C", "text": "Common femoral artery"}, {"letter": "D", "text": "SMA"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. FMD is an uncommon disease of unknown etiology affecting medium-sized arteries in 1 or more vascular territories. The most common site of pathology is the renal arteries, followed by the extracranial carotid arteries. Less common involvement of the vertebral arteries, mesenteric arteries, upper and lower extremity arteries, as well as intracranial carotid arteries has been described. Presentation is dictated by the anatomic site of the disease, with renovascular hypertension as the leading symptom. The majority of the patients are female. On radiologic studies, dissection, stenosis, beading, aneurysm, and occlusion may be identified. There are several different types of FMD based on histology, with medial fibroplasia being most common. Figure 26-1 A 50-year-old female with refractory hypertension studied with angiography. Preintervention digital subtraction angiography (DSA) image on the left shows beading of the mid segment right renal artery consistent with fibromuscular dysplasia (FMD). Following angioplasty alone (right image), there is no residual stenosis. Unlike atherosclerotic lesions in the renal arteries, FMD tends to respond well to angioplasty alone with stenting reserved for complications and refractory lesions. References: Sharma AM, Kline B. The United States registry for fibromuscular dysplasia: new findings and breaking myths. Tech Vasc Interv Radiol. 2014;17(4):258-263. Shivapour DM, Erwin P, Kim ESh. Epidemiology of fibromuscular dysplasia: a review of the literature. Vasc Med. 2016;21 (4):376-381."}, {"number": "27", "stem": "Following an ultrasound-guided paracentesis in the left lower abdomen, a patient becomes hypotensive and develops a large ecchymosis near the access site. What artery should have been assessed with ultrasound at the time of paracentesis?", "options": [{"letter": "A", "text": "Left common femoral artery"}, {"letter": "B", "text": "Left inferior epigastric artery"}, {"letter": "C", "text": "Left internal mammary artery"}, {"letter": "D", "text": "Left hypogastric artery"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. When performing paracentesis in the lower abdominal region off midline, the inferior epigastric arteries can be accidentally traversed. They arise from the distal external iliac arteries, often traveling caudally at first then immediately looping cranial and coursing medially between the posterior rectus sheath and the rectus abdominis muscle. The arteries eventually give off multiple branches that perforate the muscle and spread out over the abdominal wall. The inferior epigastric artery should be identified on ultrasound when planning for paracentesis. Of note, when compared with blind paracentesis, ultrasound guidance is associated with fewer adverse events including bleeding complications. Choice A would be an unacceptable location for paracentesis, below the inguinal ligament; choice C is the cephalad communicating artery via the superior epigastric artery in the thorax. Traversing the hypogastric artery (aka internal iliac artery) during paracentesis would be an egregious complication. References: Patel PA, Ernst FR, Gunnarsson CL. Evaluation of hospital complications and costs associated with using ultrasound guidance during abdominal paracentesis procedures. J Med Econ. 2012;15(1):1-7. Sekiguchi H, Suzuki J, Daniels CE. Making paracentesis safer: a proposal for the use of bedside abdominal and vascular ultrasonography to prevent a fatal complication. Chest. 2013;143(4):1136-1139."}, {"number": "28", "stem": "A hypotensive patient is taken to IR for embolization of a left abdominal wall expanding hematoma. From a right common femoral artery access, a catheter is positioned in the left external iliac artery, and an angiogram is obtained. What artery is indicated by the black arrowheads?", "options": [{"letter": "A", "text": "Obturator artery"}, {"letter": "B", "text": "Lateral circumflex femoral artery"}, {"letter": "C", "text": "Deep circumflex iliac artery"}, {"letter": "D", "text": "Inferior epigastric artery"}], "images": ["assets/q28_p037_01.jpg"], "explanationImages": ["assets/a28_p037_01.jpg", "assets/a28_p038_01.jpg"], "answer": "C", "explanation": "Answer C. The deep circumflex iliac artery is another important artery in the lower abdominal wall that can be traversed during percutaneous procedures such as paracentesis or abscess drainage, especially with a more lateral approach. The artery comes off the distal external iliac artery, coursing cephalad and lateral. The artery pierces the transversus abdominis muscle and ascends between it and the overlying internal oblique muscle. It can often be identified on CECT. The inferior epigastric artery is present on the images; however, it is the more medial artery arising opposite from the deep circumflex iliac artery. These 2 arteries are the vascular landmark for the inguinal ligament demarcating intrapelvic external iliac artery from infrainguinal common femoral artery. The obturator artery is deep within the pelvis typically arising from the anterior division of the internal iliac artery. The lateral circumflex femoral artery arises in the proximal thigh. Figure 28-1 Digital subtraction angiography (DSA) from left external iliac artery injection. CFA, common femoral artery; DCIA, deep circumflex iliac artery; EIA, external iliac artery; IEA, inferior epigastric artery; LCFA, lateral circumflex femoral artery; PFA, profunda femoris artery; SFA, superficial femoral artery. References: Park SW, Ko SY, Yoon SY, et al. Transcatheter arterial embolization for hemoperitoneum: unusual manifestation of iatrogenic injury to abdominal muscular arteries. Abdom Imaging. 2011;36(1):74-78. Satija B, Kumar S, Duggal RK, Kohli S. Deep circumflex iliac artery pseudoaneurysm as a complication of paracentesis. J Clin Imaging Sci. 2012;2:10."}, {"number": "29", "stem": "A 29-year-old female is involved in a motor vehicle accident and sustains significant blunt trauma. A multiphase CECT is performed (arterial phase, top images; portal venous phase, middle images; delayed phase, bottom images). What is the diagnosis?", "options": [{"letter": "A", "text": "Splenic laceration with active bleeding"}, {"letter": "B", "text": "Splenic laceration with pseudoaneurysm formation"}, {"letter": "C", "text": "Splenic hemangioma"}, {"letter": "D", "text": "Normal variation in perfusion"}], "images": ["assets/q29_p039_01.jpg"], "explanationImages": ["assets/a29_p039_01.jpg", "assets/a29_p040_03.jpg"], "answer": "B", "explanation": "Answer B. The arterial phase images show abnormal round and linear contrast enhancement within the splenic parenchyma. On the portal venous and delayed phase images, there is gradual washout without pooling or spreading of the abnormal contrast. These findings are consistent with intrasplenic pseudoaneurysm formation. Note the adjacent linear low-attenuation lacerations best seen on the arterial and portal venous phase images. Active bleeding (choice A) within the spleen is uncommon; however, if present, should show increasing accumulation of extravasated contrast into an expanding intrasplenic hematoma. More commonly, active bleeding from splenic trauma is seen when the laceration extends to the capsule and extravasation into the perisplenic space occurs. As in almost all organ traumas, multiphase imaging helps tremendously with the identification and
