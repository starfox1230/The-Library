"Stage"}, {"letter": "B", "text": "Stage"}, {"letter": "C", "text": "Stage"}, {"letter": "D", "text": "Stage"}], "images": [], "explanationImages": ["assets/a02_p205_1.jpeg"], "answer": "C", "explanation": "This case represents a late healing stage of Perthes disease with dense bone replacing trabecular bone atthe middle pillar of the epiphysis. The initial, stage 1 of avascularity is radiographically occult. A symptomatic childwith normal radiographs may be further evaluated by MRI with a high sensitivity for detecting osteonecrosis, marrowedema, and hip effusion. The figure below represents the different stages of Perthes disease. The earliest radiographicfinding of a relatively dense epiphysis represents stage 2, revascularization. At this time, children are oftenasymptomatic. The \"crescent sign\" that is sometimes seen at stage 2 results from a pathologic, subchondral fractureof the anterosuperior epiphysis (see arrow in A). Stage 4 reveals a chronic, residual deformity of the femoral head,often with collapse, fragmentation, and lateral subluxation. Additional findings during disease progression mayinclude a cystic lucency of the subphyseal, femoral neck (see arrow in B) and coxa magna with a short and widenedfemoral metaphysis. Stages of Legg-CalvÃ©-Perthes (LCP) disease on radiograph. A: 2 months; B: 4 months; C: 7 months; D: 10months.\n\nReferences: Dillman JR, Hernandez RJ. MRI of Legg-CalvÃ©-Perthes disease. AJR Am J Roentgenol 2009;193(5):1394â€“1407. Resnick D. Osteochondroses in diagnosis of bone and joint disorders, 4th ed. New York, NY: WB Saunders and Company,2002:3686â€“3741. Salter RB. In: Textbook of disorders and injuries of the musculoskeletal system, 3rd ed. Baltimore, MD: Williams & Wilkins,1999:339â€“350."}, {"number": 3, "stem": "A 7-year-old male with knee pain presents with an AP radiograph and a coronal image from an MRI of the sameknee. 163 What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Chondroblastoma"}, {"letter": "B", "text": "Osteomyelitis"}, {"letter": "C", "text": "Osteoid osteoma"}, {"letter": "D", "text": "OCD"}], "images": ["assets/q03_p161_1.jpeg", "assets/q03_p162_1.jpeg"], "explanationImages": ["assets/a03_p206_1.jpeg"], "answer": "B", "explanation": "The radiograph reveals a geographic, lytic lesion without sclerotic margins (arrows) involving theepiphysis of the knee, the differential diagnosis of which includes both chondroblastoma and osteomyelitis. However,most chondroblastomas demonstrate a thin sclerotic margin radiographically. Osteoid osteomas classically appear as a central, lucent lesion or nidus that is often cortically based but can occurin subchondral, intra-articular locations. Nonetheless, absent any surrounding cortical hyperostosis, an osteoidosteoma is unlikely. An osteochondral defect (OCD) should have an irregular fracture lucency, often with scleroticmargins abutting a fragment of subchondral bone, all of which are not present in this case. The MRI appearance of a fluid signal, solitary lytic lesion centered at the distal epiphysis and cartilage (arrow)with surrounding reactive marrow signal is highly suggestive of osteomyelitis. Rim enhancement of the lytic lesion(not shown) would then suggest an associated abscess. Chondroblastomas also have surrounding T2 hyperintensemarrow signal. However, the lesion itself is characteristically lobular with internal matrix that is T2isointense/hypointense, not present in this case. Understanding the imaging findings of osteomyelitis is important as the classic clinical history of fever, elevatedwhite blood cell count, and inflammatory markers are not always present.\n\nReferences: Guillerman RP. Osteomyelitis and beyond. Pediatr Radiol 2013;43(1):S193â€“S203. Lyer RS, Chapman T, Chew FS. Pediatric bone imaging: diagnostic imaging of osteoid osteoma. AJR Am J Roentgenol2012;198:1039â€“1052. Weatherall PT, Maale GE, Mendelsohn DB, et al. Chondroblastoma: classic and confusing appearance at MR imaging. Radiology1994;190:467â€“474."}, {"number": 4, "stem": "In what location does osteomyelitis occur most often in children?", "options": [{"letter": "A", "text": "Metaphysis"}, {"letter": "B", "text": "Diaphysis"}, {"letter": "C", "text": "Epiphysis"}, {"letter": "D", "text": "Intra-articular"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "The metaphyses of long bones are the most common sites of hematogenous osteomyelitis in childrenowing to the unique changes in metaphyseal and epiphyseal vascularity with age. In neonates, the epiphysis is at anincreased risk of infection as nutrient vessels cross the physis. However, transphyseal extension of metaphysealosteomyelitis may still occur in children older than 2 years of age despite the theoretic protection of an avascularphysis.\n\nReferences: Gilbertson-Dahdal D, Wright JE, Krupinski E, et al. Transphyseal involvement of pyogenic osteomyelitis isconsiderably more common than classically taught. AJR Am J Roentgenol 2014;203:190â€“195. Guillerman RP. Osteomyelitis and beyond. Pediatr Radiol 2013;43(1):S193â€“S203."}, {"number": 5, "stem": "Osteoarticular osteomyelitis in young children (<4 years of age) involving the epiphyseal cartilage is suggestive ofwhich causative organism?", "options": [{"letter": "A", "text": "Staphylococcus aureus"}, {"letter": "B", "text": "Streptococcus"}, {"letter": "C", "text": "Kingella kingae"}, {"letter": "D", "text": "Pseudomonas"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "The gram-positive cocci (GPC), S. aureus followed by Streptococcus, are considered the most commonpathogens for acute hematogenous osteomyelitis. However, the gram-negative bacillus, K. kingae, has an increasedprevalence in children younger than 4 years of age. MRI is highly sensitive for distinguishing K. kingae from GPC in young children when there is focal epiphyseal(and equivalent) cartilage involvement. There is also a diminished inflammatory response and bone marrow/softtissue reaction with K. kingae compared to GPC. Pseudomonas and Escherichia coli are often associated withosteomyelitis from penetrating trauma, typically within the foot, but this is rare in the intra-articular epiphysis.\n\nReferences: Gilbertson-Dahdal D, Wright JE, Krupinski E, et al. Transphyseal involvement of pyogenic osteomyelitis isconsiderably more common than classically taught. AJR Am J Roentgenol 2014;203:190â€“195. Guillerman RP. Osteomyelitis and beyond. Pediatr Radiol 2013;43(1):S193â€“S203. Kanavaki A, Ceroni D, Tchernin D, et al. Can early MRI distinguish between Kingella kingae and Gram-positive cocci inosteoarticular infections in young children? Pediatr Radiol 2012;42:57â€“62."}, {"number": 6, "stem": "A child presents with a radiograph of the elbow following trauma. 166 What is the diagnosis?", "options": [{"letter": "A", "text": "Lateral condylar fracture"}, {"letter": "B", "text": "Supracondylar fracture"}, {"letter": "C", "text": "Medial condylar fracture"}, {"letter": "D", "text": "Lateral epicondylar fracture"}, {"letter": "E", "text": "Medical epicondylar fracture"}], "images": ["assets/q06_p164_1.jpeg"], "explanationImages": ["assets/a06_p208_1.jpeg"], "answer": "A", "explanation": "The crescentic fracture fragment (arrow) arising from the lateral condyle is the typical location of alateral condylar fracture. This often results from a varus injury to an extended supinated forearm. The more commonsupracondylar fracture is a horizontal fracture located at the distal humeral metaphysis, often involving the coronoidfossa without involvement of the physis.\n\nReferences: Green NE. Fractures and dislocations about the elbow. In: Green NE, Swiontkowski MF. (eds). Skeletal trauma inchildren, 3rd ed. Philadelphia, PA: WB Saunders, 2003:257."}, {"number": 7, "stem": "What is the most common age at which the fracture seen in Question 6 occurs?", "options": [{"letter": "A", "text": "0 to 3 years"}, {"letter": "B", "text": "3 to 6 years"}, {"letter": "C", "text": "5 to 10 years"}, {"letter": "D", "text": "10 to 15 years"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Lateral condylar fractures most commonly occur between the ages of 5 and 10 years.\n\nReferences: Green NE. Fractures and dislocations about the elbow. In: Green NE, Swiontkowski MF (eds). Skeletal trauma inchildren, 3rd ed. Philadelphia, PA: WB Saunders, 2003:257."}, {"number": 8, "stem": "The fracture in Question 6 most commonly represents which Salter-Harris fracture type?", "options": [{"letter": "A", "text": "Salter-Harris II"}, {"letter": "B", "text": "Salter-Harris III"}, {"letter": "C", "text": "Salter-Harris IV"}, {"letter": "D", "text": "Salter-Harris V"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Lateral condylar fractures of the elbow are most commonly Salter-Harris IV fractures. The Milch classification groups lateral condylar fractures into types I and II based on fracture involvement lateralor medial to the capitello-trochlear groove, respectively. A Milch I fracture is lateral to the trochlea and extendsthrough the capitellum. As the capitellum is usually ossified in this age group, it clearly represents a Salter-Harris IVfracture on elbow radiographs. However, the elbow remains stable as the humeroulnar joint is spared. The Milch II fracture spares the capitellum and extends medial to the capitello-trochlear groove. There has beencontroversy classifying this fracture type as Salter-Harris IV when the involved trochlear epiphysis is not yet ossifiedand it appears radiographically as a Salter-Harris II fracture. However, the consensus is that the Milch II fracturepattern is also a Salter-Harris IV fracture as it involves the metaphysis, physis, and unossified trochlear epiphysis. Therefore, nearly all lateral condylar fractures are considered Salter-Harris IV fractures. However, the Milchclassification is more important than the Salter-Harris classification for management because Milch II fractures areunstable and require surgical fixation. This case highlights the more common Milch type II lateral condylar fracture as the metaphyseal fragment(arrow) extends medial to the capitellum. Radiographic evaluation is limited in this age group because of incompleteossification of the trochlea. As a result, surgical management may rely on the degree of displacement of themetaphyseal fragment (>2 mm).\n\nReferences: Bache E. Elbow injuries. In: Johnson KJ, Bache E (eds). Imaging in pediatric skeletal trauma. Berlin: Springer,2008:257â€“270. Green NE. Fractures and dislocations about the elbow. In: Green NE, Swiontkowski MF (eds). Skeletal trauma in children, 3rd ed. Philadelphia, PA: WB Saunders, 2003:257. Letts M, Davidson D. Fractures of the lateral condyle of the humerus in children. Orthopaedic Knowledge Online Journal2002;1(6). http://orthoportal.aaos.org/oko/article.aspx?article=OKO PED007"}, {"number": 9, "stem": "A 2-year-old with history of abnormal knee alignment presents with the following radiograph of the knee. What is the diagnosis?", "options": [{"letter": "A", "text": "Genu varum"}, {"letter": "B", "text": "Blount disease"}, {"letter": "C", "text": "Rickets"}, {"letter": "D", "text": "Epiphyseal dysplasia"}], "images": ["assets/q09_p165_1.jpeg"], "explanationImages": ["assets/a09_p210_1.jpeg"], "answer": "B", "explanation": "Blount disease (tibia vara) is secondary to pathologic stress upon the posteromedial physis of theproximal tibia that results in medial growth suppression and associated tibia vara. As the name tibia vara implies, thelower extremity bowing (varus) is centered at the proximal tibia. The metaphysealâ€“diaphyseal angle is >11 degrees(~20 degrees in this case). This angle is drawn from the metaphyseal beak to a line at the physis that is perpendicularto the lateral cortex of the tibial diaphysis (see angle). Although bilateral in this case, Blount disease is oftenunilateral or asymmetric and has infantile, juvenile, and adolescent presentations. The Langenskiold classificationdescribes six stages of progressive metaphyseal depression, beaking, and fragmentation. Developmental (physiologic) genu varus (bowing) normally resolves within 6 months of walking or by the agetwo. Congenital bowing classically presents as convex posterior and medial bowing of the tibial diaphysis and maybe due to intrauterine positioning or skeletal dysplasia. In both cases, there is a normal medial metaphysis of the tibia. As rickets represents deficient mineralization of the growing physis, radiographs should display symmetric widening,cupping, and fraying of the growth plates of the distal femur and proximal and distal tibia (not present in this case).\n\nReferences: Biko DM, Miller AL, Ho-Fung V, et al. MRI of congenital and developmental abnormalities of the knee. Clin Radiol2012;67:1198â€“1206. Cheema FI, Grissom LE, Harcke T. Radiographic characteristics of lower-extremity bowing in children. Radiographics2003;23:871â€“880."}, {"number": 10, "stem": "Which of the following is an imaging characteristic of the disorder in Question 9?", "options": [{"letter": "A", "text": "Fracture of the distal femoral metaphysis"}, {"letter": "B", "text": "Absence of the cruciate ligaments"}, {"letter": "C", "text": "Tibial hemimelia"}, {"letter": "D", "text": "Hypertrophy of the medial meniscus"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Imaging findings of Blount disease include radiographical findings of depression of the medial tibialmetaphysis. Additional MRI can better evaluate the growth plate demonstrating bony bridging, delayed ossificationof the medial tibial epiphysis, widening of the tibial growth plate, and hypertrophy of the medial meniscus. Thehypertrophy of the medial meniscus is likely compensatory hypertrophy due to abnormal forces within the knee.\n\nReferences: Biko DM, Miller AL, Ho-Fung V, et al. MRI of congenital and developmental abnormalities of the knee. Clin Radiol2012;67:1198â€“1206."}, {"number": 11, "stem": "A 13-year-old boy with subacute hip pain and joint stiffness presents with an MRI of the pelvis and hip. What is the diagnosis?", "options": [{"letter": "A", "text": "Avascular necrosis"}, {"letter": "B", "text": "Osteomyelitis"}, {"letter": "C", "text": "Idiopathic chondrolysis"}, {"letter": "D", "text": "Bone contusion"}], "images": ["assets/q11_p166_1.jpeg", "assets/q11_p167_1.jpeg"], "explanationImages": ["assets/a11_p211_1.jpeg", "assets/a11_p212_1.jpeg"], "answer": "C", "explanation": "Idiopathic chondrolysis (ICH) is a disease of unknown etiology that results in progressive articularcartilage destruction. ICH is often unilateral and presents with spontaneous hip or knee pain with worsening jointstiffness. There are neither systemic symptoms nor abnormal inflammatory biomarkers present. Early radiographs areoften normal and performed to exclude more common acute causes of hip pain such as slipped capital femoralepiphysis. Later radiographs 10 to 12 months from symptom onset often reveal degenerative changes of concentricjoint space loss, protrusio acetabuli, subchondral cysts, and sclerosis. It is important to distinguish ICH fromsecondary causes of cartilage loss from JIA or infection. The MRI findings in this case reveal a geographic pattern of T1/T2 signal prolongation confined to the middle third of the subchondral femoral head to the physis (arrows). Thispattern is characteristic of early MRI findings of ICH. Synovial enhancement is less commonly reported with ICHcompared to JIA. However, this negative finding is not specific. Additional findings of muscle wasting and atrophy are reported with follow-up imaging usually with associated joint contractures. Synovial biopsy is often performedfor pathologic confirmation and to exclude infection. The prognosis is variable from spontaneous resolution tosignificant joint contracture and ankylosis.\n\nReferences: Johnson K, Haigh SF, Ehtisham S, et al. Childhood idiopathic chondrolysis of the hip: MRI features. Pediatr Radiol2003;33:194â€“199. Laor T, Crawford AH. Idiopathic chondrolysis of the hip in children: early MRI findings. AJR Am J Roentgenol2009;192:526â€“531."}, {"number": 12, "stem": "A 12-year-old male with knee pain presents for a whole-body MRI. 170 What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Leukemia"}, {"letter": "B", "text": "Rickets"}, {"letter": "C", "text": "Metastasis"}, {"letter": "D", "text": "Chronic recurrent multifocal osteomyelitis"}], "images": ["assets/q12_p168_1.jpeg", "assets/q12_p169_1.jpeg"], "explanationImages": [], "answer": "D", "explanation": "The imaging findings are most suggestive of chronic recurrent multifocal osteomyelitis (CRMO). CRMO is an idiopathic inflammatory disorder most commonly seen in children and adolescents. This disorder ischaracterized by multiple inflammatory bone lesions that demonstrate a relapsing/remitting pattern. On imaging,these lesions are most often lytic on plain radiographs initially followed by sclerosis in the chronic course. On MRimaging, the lesions demonstrate bone marrow edema and periostitis. CRMO commonly occurs in the long tubularbone and clavicle but can occur anywhere throughout the skeleton.\n\nReferences: Khanna G, Sato TS, Ferguson P. Imaging of chronic recurrent multifocal osteomyelitis. Radiographics2009;29:1159â€“1177."}, {"number": 13, "stem": "What is the most common location of the bone in the disorder in Question 12?", "options": [{"letter": "A", "text": "Epiphysis"}, {"letter": "B", "text": "Metaphysis"}, {"letter": "C", "text": "Diaphysis"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Chronic recurrent multifocal osteomyelitis (CRMO) most commonly involves the metaphysis andmetaphyseal equivalents. This is similar to the distribution of hematogenous spread of osteomyelitis, but CRMO mayinvolve the clavicle.\n\nReferences: Khanna G, Sato TS, Ferguson P. Imaging of chronic recurrent multifocal osteomyelitis. Radiographics2009;29:1159â€“1177. Mandell GA, Contreras SJ, Conrad K, et al. Bone scintigraphy in the detection of chronic recurrent multifocal osteomyelitis. JNucl Med 1998;39:1778â€“1783."}, {"number": 14, "stem": "Which of the following conditions is associated with the disorder in Question 12?", "options": [{"letter": "A", "text": "Autosomal recessive polycystic kidney disease (ARPKD)"}, {"letter": "B", "text": "Wegener granulomatosis"}, {"letter": "C", "text": "Truncus arteriosus"}, {"letter": "D", "text": "Chondroblastoma"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Multiple conditions are associated with chronic recurrent multifocal osteomyelitis (CRMO). Theseinclude dermatologic conditions such as psoriasis and pyoderma gangrenosum, autoinflammatory disorders such as Takayasu arteritis and Wegener granulomatosis, gastrointestinal syndromes such as inflammatory bowel disease, andgenetic syndromes such as Majeed syndrome. CRMO is also associated with SAPHO syndrome (synovitis, acne,pustulosis, hyperostosis, osteitis) and spondyloarthropathies.\n\nReferences: Khanna G, Sato TS, Ferguson P. Imaging of chronic recurrent multifocal osteomyelitis. Radiographics2009;29:1159â€“1177."}, {"number": 15, "stem": "A child with history of a congenital foot abnormality presents with the following radiograph. What is the diagnosis?", "options": [{"letter": "A", "text": "Proteus syndrome"}, {"letter": "B", "text": "Macrodystrophia lipomatosa"}, {"letter": "C", "text": "Neurofibromatosis"}, {"letter": "D", "text": "Hemihypertrophy"}], "images": ["assets/q15_p171_1.jpeg"], "explanationImages": ["assets/a15_p214_1.jpeg"], "answer": "B", "explanation": "Lipomatosis of a nerve with macrodactyly is referred to as macrodystrophia lipomatosa. In thisdisorder, the affected nerve is enlarged by fibrofatty tissue. This can occur without macrodactyly or withmacrodactyly (macrodystrophia lipomatosa). Clinically, this disorder is characterized by a slow-growing mass mostfrequently within the upper extremity. Most cases involve the median nerve in the upper extremity and the medialplantar nerve in the lower extremity. Radiographs of this disorder demonstrate both soft tissue and bony overgrowthin the distribution of a sclerotome (arrows). MRI demonstrates a diffusely enlarged thickened nerve surrounded byadipose tissue.\n\nReferences: Murphey MD, Carroll JF, Flemming DJ, et al. From the archive of the AFIP: benign musculoskeletal lipomatouslesions. Radiographics 2004;24:1433â€“1466. Tripathi SK, Nanda SN, Kumar S, et al. Macrodystrophia lipomatosaâ€”a rare congenital anomaly: a case report and review ofliterature. Ann Int Med Dent Res 2016;2(5):1â€“3."}, {"number": 16, "stem": "The following babygram was performed on a stillborn neonate. What is the diagnosis?", "options": [{"letter": "A", "text": "Achondroplasia"}, {"letter": "B", "text": "Jeune syndrome"}, {"letter": "C", "text": "Thanatophoric dysplasia"}, {"letter": "D", "text": "Osteogenesis imperfecta"}], "images": ["assets/q16_p172_1.jpeg"], "explanationImages": ["assets/a16_p216_1.jpeg"], "answer": "C", "explanation": "Thanatophoric dysplasia is a short-limbed dwarfism caused by a mutation of fibroblast growth factorreceptor 3 gene (FGFR3). It is the most common lethal neonatal skeletal dysplasia. In this disorder, the long bonesare short and may have a curved \"telephone receiver\" appearance (arrowheads). The ribs are shortened. Additionally,the vertebral bodies are flattened and may appear H shaped (arrows). This feature can be used to differentiatethanatophoric dysplasia from the short rib polydactyly syndromes such as Jeune syndrome.\n\nReferences: Miller E, Blaser S, Shannon P, et al. Brain and bone abnormalities of thanatophoric dwarfism. AJR Am J Roentgenol2009;192:48â€“51."}, {"number": 17, "stem": "A central nervous system abnormality associated with the disorder in Question 16 is which of the following?", "options": [{"letter": "A", "text": "Tethered cord"}, {"letter": "B", "text": "Ocular nerve enlargement"}, {"letter": "C", "text": "Megalencephaly"}, {"letter": "D", "text": "Basal ganglia calcification"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "The most common central nervous system manifestations of thanatophoric dysplasia are the cloverleafskull deformity and megalencephaly. Additional central nervous system abnormalities are deep fissures and abnormalsulcation of the temporal lobes, a dysplastic hippocampus, and polymicrogyria.\n\nReferences: Miller E, Blaser S, Shannon P, et al. Brain and bone abnormalities of thanatophoric dwarfism. AJR Am J Roentgenol2009;192:48â€“51."}, {"number": 18, "stem": "An adolescent with elbow pain presents with a frontal radiograph of the elbow and sagittal MR image from afluid-sensitive sequence of the elbow. 176 What is the diagnosis?", "options": [{"letter": "A", "text": "Osteomyelitis"}, {"letter": "B", "text": "Avascular necrosis"}, {"letter": "C", "text": "Osteoid osteoma"}, {"letter": "D", "text": "Osteochondritis dissecans"}], "images": ["assets/q18_p174_1.jpeg", "assets/q18_p175_1.jpeg"], "explanationImages": ["assets/a18_p218_1.jpeg", "assets/a18_p219_1.jpeg"], "answer": "D", "explanation": "Osteochondritis dissecans (OCD) of the capitellum is a focal injury of the articular cartilage andsubchondral bone within the humeral capitellum. It is most commonly seen in this location in throwing athletes and istypically seen in patients between 12 and 17 years old. The suggested etiology of this lesion is repetitivemicrotrauma. OCD is most commonly seen within the knee. On plain radiographs, there is most often a subchondral lucent focus (arrow), but there may be fragmentation orsclerosis. MRI best depicts the OCD where the subchondral abnormality is readily visible (arrowhead). 220\n\nReferences: Cruz AI, Shea KG, Ganley TJ. Pediatric knee osteochondritis dissecans lesions. Orthop Clin N Am 2016;47:763â€“775. Itsubo T, Murakami N, Uemura K, et al. Magnetic resonance imaging staging to evaluate stability of capitella osteochondritisdissecans lesions. Am J Sports Med 2014;42:1972â€“1977. Jarret DY, Walters MM, Kleinman PK. Prevalence of capitellar osteochondritis dissecans in children with chronic radial headsubluxation and dislocation. AJR Am J Roentgenol 2016;206:1329â€“1334."}, {"number": 19, "stem": "The disorder in Question 18 has a high prevalence of which of the following?", "options": [{"letter": "A", "text": "Radial head subluxation"}, {"letter": "B", "text": "Supracondylar fracture"}, {"letter": "C", "text": "Olecranon bursitis"}, {"letter": "D", "text": "Lateral epicondylitis"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "The prevalence of capitellar osteochondritis dissecans (OCD) is increased in children with radial headsubluxation. Capitellar OCD is seen in 32% to 33% of children with chronic radial head subluxation likely because ofabnormal radiocapitellar mechanics.\n\nReferences: Jarret DY, Walters MM, Kleinman PK. Prevalence of capitellar osteochondritis dissecans in children with chronicradial head subluxation and dislocation. AJR Am J Roentgenol 2016;206:1329â€“1334."}, {"number": 20, "stem": "In the diagnosis in Question 18, which of the following is a criterion on MRI to diagnose an unstable lesion?", "options": [{"letter": "A", "text": "Focal defect of 5 mm or more in the meniscus adjacent to the lesion"}, {"letter": "B", "text": "Thin line of hyperintensity within the metaphysis of the bone"}, {"letter": "C", "text": "Small cystic focus of 5 mm or greater in the articular surface of the lesion"}, {"letter": "D", "text": "Low signal extending through the articular cartilage"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "The criteria for unstable osteochondritis dissecans (OCD) on MRI are the following: a. Thin line of high signal intensity 5 mm or greater between the OCD and boneb. Discrete cystic focus 5 mm or greater in diameter beneath the OCDc. Focal defect with a width of 5 mm or greater in the articular surface of the OCDd. High signal intensity line extending through the articular cartilage and subchondral bone into the OCD\n\nReferences: Cruz AI, Shea KG, Ganley TJ. Pediatric knee osteochondritis dissecans lesions. Orthop Clin N Am 2016;47:763â€“775."}, {"number": 21, "stem": "An 8-year-old presents with left hip pain. The following radiograph of the pelvis was performed. What is the diagnosis?", "options": [{"letter": "A", "text": "Avulsion of the anterior inferior iliac spine"}, {"letter": "B", "text": "Avulsion of the anterior superior iliac spine"}, {"letter": "C", "text": "Nondisplaced fracture of the femoral neck"}, {"letter": "D", "text": "Fracture of the anterior column of the acetabulum"}, {"letter": "E", "text": "Fracture of the posterior column of the acetabulum"}], "images": ["assets/q21_p177_1.jpeg"], "explanationImages": ["assets/a21_p221_1.jpeg"], "answer": "B", "explanation": "The image demonstrates a small osseous fragment adjacent to the pelvis consistent with an avulsionfracture of the anterior superior iliac spine (arrow). The anterior superior iliac spine is the attachment point of thesartorius muscle and tensor muscle of the fascia lata. This injury occurs during forceful extension of the hip and iscommonly seen in sprinters. Treatment is activity restriction.\n\nReferences: Stevens MA, El-Khoury GY, Kathol MH, et al. Imaging features of avulsion injuries. Radiographics 1999;19:655â€“672."}, {"number": 22, "stem": "Which of the following is TRUE?", "options": [{"letter": "A", "text": "Avulsion from the anterior superior iliac spine is related to the adductor muscles."}, {"letter": "B", "text": "Avulsion of the anterior inferior iliac spine is related to the hamstrings."}, {"letter": "C", "text": "Avulsion of the greater trochanter is related to the rectus femoris."}, {"letter": "D", "text": "Avulsion of the lesser trochanter is related to the iliopsoas muscle."}], "images": [], "explanationImages": ["assets/a22_p222_1.jpeg"], "answer": "D", "explanation": "The table below lists the common sites for avulsion injuries of the pelvis and the associated muscularattachments.\n\nReferences: Stevens MA, El-Khoury GY, Kathol MH, et al. Imaging features of avulsion injuries. Radiographics 1999;19:655â€“672."}, {"number": 23, "stem": "Frontal and lateral radiographs of the tibia/fibula were performed in an infant who presents with skull fracture. 180 181 182 What is the diagnosis?", "options": [{"letter": "A", "text": "Toddler's fracture"}, {"letter": "B", "text": "Metaphyseal corner fracture"}, {"letter": "C", "text": "Buckle fracture"}, {"letter": "D", "text": "Triplane fracture"}], "images": ["assets/q23_p178_1.jpeg", "assets/q23_p180_1.jpeg"], "explanationImages": ["assets/a23_p223_1.jpeg", "assets/a23_p224_1.jpeg"], "answer": "B", "explanation": "The image demonstrates a metaphyseal corner fracture of the proximal tibia (arrow). This is a disc-shaped fracture though the metaphysis where the fracture line is nearly parallel to the physis. The fracture has beendescribed a corner fracture or bucket handle fracture depending on the orientation of the radiographic projection. Thisfracture has been called a classic metaphyseal lesion (CML) and is common in abused infants particularly <18months of age. CMLs are considered highly specific for infant child abuse. 225\n\nReferences: Kleinman PK. Diagnostic imaging in infant abuse. AJR Am J Roentgenol 1990;155:703â€“712. Lonergan GJ, Baker AM, Morey MK, et al. Child abuse: radiologic-pathologic correlation. Radiographics 2003;23:811â€“845. Thackeray JD, Wannemacher J, Adler BH, et al. The classic metaphyseal lesion and traumatic injury. Pediatr Radiol2016;46:1128â€“1133."}, {"number": 24, "stem": "The mechanism of the fracture in Question 23 is which of the following?", "options": [{"letter": "A", "text": "Direct trauma to the bone"}, {"letter": "B", "text": "Shearing injury"}, {"letter": "C", "text": "Insufficiency fracture"}, {"letter": "D", "text": "Bending injury"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "A metaphyseal corner fracture or classic metaphyseal lesion (CML) occurs because of shearing injury,which causes differential horizontal motion across the metaphysis. This shearing force is caused by to-and-fromovement such as seen in shaking an infant by holding the infant from the feet or hands or shaking an infant whileholding the chest and whiplashing their extremities.\n\nReferences: Lonergan GJ, Baker AM, Morey MK, et al. Child abuse: radiologic-pathologic correlation. Radiographics2003;23:811â€“845. Thackeray JD, Wannemacher J, Adler BH, et al. The classic metaphyseal lesion and traumatic injury. Pediatr Radiol2016;46:1128â€“1133."}, {"number": 25, "stem": "Which of the following imaging findings is commonly associated with nonaccidental injury (child abuse)?", "options": [{"letter": "A", "text": "Buckle fracture of the distal radius"}, {"letter": "B", "text": "Toddler's fracture of the tibia"}, {"letter": "C", "text": "Medial epicondyle avulsion fracture"}, {"letter": "D", "text": "Posterior rib fractures"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Although skeletal injuries without an explanation may be concerning for abuse, skeletal imagingfindings that are associated with infant nonaccidental injury are metaphyseal corner fractures, rib fractures, sternalfractures, vertebral spinous process fractures, and acromion fractures of the scapula. Metaphyseal corner fractures orclassic metaphyseal lesions (CML) are due to shear injury that can be seen with shaking. Rib fractures in infants arerare injuries given the plasticity of the bones. Given this, rib fractures require substantial force but can be seen withsqueezing of the chest. Given the rarity of sternal fractures, vertebral spinous fractures, and acromion fractures of thescapula in infants, these fractures are also concerning for abuse. Skull fracture patterns such as multiple fractures,fractures crossing sutures, and bilateral fractures have also been associated with abusive injury.\n\nReferences: Kleinman PK. Diagnostic imaging in infant abuse. AJR Am J Roentgenol 1990;155:703â€“712. Lonergan GJ, Baker AM, Morey MK, et al. Child abuse: radiologic-pathologic correlation. Radiographics 2003;23:811â€“845."}, {"number": 26, "stem": "The preferred initial imaging evaluation of infants with suspected nonaccidental injury (child abuse) is:", "options": [{"letter": "A", "text": "Radiographical skeletal survey"}, {"letter": "B", "text": "Radiographs at site of suspected injury only"}, {"letter": "C", "text": "Whole-body MRI examination"}, {"letter": "D", "text": "Sonographic skeletal survey"}], "images": [], "explanationImages": ["assets/a26_p225_1.jpeg"], "answer": "A", "explanation": "All infants with suspected abusive injury should undergo a skeletal survey. Additionally, a repeatskeletal survey 10 to 14 days following may identify additional injuries that could not be seen on the initial skeletalsurvey. The recommended views for a skeletal survey of suspected infant abuse are the following:\n\nReferences: Kleinman PK. Diagnostic imaging in infant abuse. AJR Am J Roentgenol 1990;155:703â€“712. Lonergan GJ, Baker AM, Morey MK, et al. Child abuse: radiologic-pathologic correlation. Radiographics 2003;23:811â€“845."}, {"number": 27, "stem": "The following radiograph of the forearm was performed in a patient with a history of an arm deformity. Which of the following is TRUE concerning radial dysplasia?", "options": [{"letter": "A", "text": "It is associated with hypoplasia of the thumb."}, {"letter": "B", "text": "On physical examination, there is ulnar and palmar deviation of the hand."}, {"letter": "C", "text": "Development of the radius occurs between the 10th and 12th week of gestation."}, {"letter": "D", "text": "Bilateral radial dysplasia occurs in <10% of affected children."}], "images": ["assets/q27_p182_1.jpeg"], "explanationImages": ["assets/a27_p226_1.jpeg"], "answer": "A", "explanation": "Radial deficiency or dysplasia is also referred to as clubhand due to failure of development of theradius occurring between the 5th and 6th week of gestation. In this disorder, there are varying degrees of dysplasia,but complete absence of the radius is most common. The trapezium, scaphoid, and thumb are usually absent or deformed. The remainder of the carpal bones and the 2nd through 5th ray are most often normal. Radial dysplasiaoccurs bilaterally in 50% of affected children. On physical examination, there is commonly radial and ulnar deviation of the hand due to the unopposed flexorcarpi ulnaris and brachioradialis.\n\nReferences: Laor T. Congenital malformations of bone. In: Slovis TS (ed). Caffey's pediatric diagnostic imaging. Philadelphia, PA:Elsevier, 2008:2594â€“2612."}, {"number": 28, "stem": "Which of the following syndromes is associated with radial dysplasia?", "options": [{"letter": "A", "text": "Holt-Oram syndrome"}, {"letter": "B", "text": "Trisomy"}, {"letter": "C", "text": "Achondroplasia"}, {"letter": "D", "text": "Ehlers-Danlos syndrome"}], "images": [], "explanationImages": ["assets/a28_p227_1.jpeg"], "answer": "A", "explanation": "The table below lists syndromes associated with radial dysplasia.\n\nReferences: Laor T. Congenital malformations of bone. In: Slovis TS (ed). Caffey's pediatric diagnostic imaging. Philadelphia, PA:Elsevier, 2008:2594â€“2612."}, {"number": 29, "stem": "A teenager presents with right shoulder pain. The following radiograph was obtained. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Chondroblastoma"}, {"letter": "B", "text": "Osteoid osteoma"}, {"letter": "C", "text": "Fibrous dysplasia"}, {"letter": "D", "text": "Rhabdomyosarcoma"}, {"letter": "E", "text": "Osteosarcoma"}], "images": ["assets/q29_p183_1.jpeg"], "explanationImages": ["assets/a29_p228_1.jpeg"], "answer": "E", "explanation": "Osteosarcoma is the most common primary malignant bone tumor of childhood. Osteoblasticosteosarcomas are intramedullary and most commonly occur adjacent to the metaphysis of the long bone. Given thatthere is osteoid, the osteoblastic osteosarcoma is most often sclerotic on plain radiographs (arrow). If theosteosarcoma invades the cortex, it can produce periosteal reaction along with Codman triangles and a \"sunburst\"appearance of the cortex.\n\nReferences: Clayer M. Many faces of osteosarcoma on plain radiographs. ANZ J Surg 2015;85:22â€“26. Murphey MD, Robbin MR, Mc Rae GA, et al. The many faces of osteosarcoma. Radiographics 1997;17:1205â€“1231."}, {"number": 30, "stem": "When imaging the lesion in Question 29, it is important to image the complete long bone from the proximal jointto the distal joint because:", "options": [{"letter": "A", "text": "A malignant joint effusion is common and should be evaluated."}, {"letter": "B", "text": "Skip metastases can be seen in this lesion and should be evaluated."}, {"letter": "C", "text": "Articular dislocations are common and should be evaluated."}, {"letter": "D", "text": "Invasion of the ligaments of the joint are common and should be evaluated."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "In osteosarcoma, skip metastases, which are foci of tumor separate from the primary lesion, can beseen. Because of this, when imaging osteosarcomas, it is important to define the extent of the disease by imagingfrom the proximal to the distal joint. Although the physis is sometimes considered a barrier to extension of tumors, 75% to 88% of metaphysealosteosarcomas extend across the physis to the epiphysis. Joint involvement is seen in nearly 25% of osteosarcomas,but the synovium is not often infiltrated. Malignant joint effusions do occur when the joint is invaded, but this is notthe reason that both the proximal and distal joints need to be imaged.\n\nReferences: Murphey MD, Robbin MR, Mc Rae GA, et al. The many faces of osteosarcoma. Radiographics 1997;17:1205â€“1231."}, {"number": 31, "stem": "Where is the most common site of relapse of the lesion in Question 29?", "options": [{"letter": "A", "text": "Locally within the bone"}, {"letter": "B", "text": "Lung parenchyma"}, {"letter": "C", "text": "Liver"}, {"letter": "D", "text": "Lymph nodes"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Approximately 30% to 40% of patients with localized osteosarcoma will develop recurrence. The mostcommon location for recurrence is within the lung (90%), usually occurring within the first 2 to 3 years. After 5years, relapse of osteosarcoma is rare, occurring in about 2%. Lung metastases may be calcified.\n\nReferences: Luetke A, Meyers PA, Lewis I, et al. Osteosarcoma treatmentâ€”Where do we stand? A state of the art review. Cancer Treat Rev 2014;40:523â€“532."}, {"number": 32, "stem": "An 8-week-old infant presents with an abnormal hip click on physical examination. What imaging examination isrecommended for further evaluation of this infant?", "options": [{"letter": "A", "text": "Radiograph of the hips"}, {"letter": "B", "text": "MRI of the hips"}, {"letter": "C", "text": "Ultrasound of the hips"}, {"letter": "E", "text": "CT of the hips"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "For the evaluation of the hip in patients up to at least 4 months of age, sonographic examination isrecommended. After 4 months, an ultrasound may be attempted, but some advocate a radiograph. Additionally, sonographic evaluation of an infant with risk factor for hip dysplasia should be delayed until 4 to 6weeks of life to avoid normal instability of the hip present during the first 2 weeks of life.\n\nReferences: Gerscovich EO. Infant hip in developmental dysplasia: facts to consider for a successful diagnostic ultrasoundexamination. Appl Radiol 1999;28:18â€“25. Harcke HT. Screening newborns for developmental dysplasia of the hip: the role of sonography. AJR Am J Roentgenol1994;162:395â€“397."}, {"number": 33, "stem": "The following sonographic image of the hip was obtained in an infant. What is the diagnosis?", "options": [{"letter": "A", "text": "Avascular necrosis"}, {"letter": "B", "text": "Developmental hip dysplasia"}, {"letter": "C", "text": "Traumatic dislocation"}, {"letter": "D", "text": "Transient synovitis"}], "images": ["assets/q33_p185_1.jpeg"], "explanationImages": ["assets/a33_p230_1.jpeg"], "answer": "B", "explanation": "In this infant, the femoral head (*) is subluxed and the acetabulum is shallow consistent withdevelopmental dysplasia of the hip. The slope of the acetabulum with respect to the ilium can be evaluatedsonographically (lines). The angle (arrow) formed by these two lines is the alpha angle. An alpha angle of >60degrees is normal. An alpha angle between 50 and 60 degrees may be physiologic during the first 3 months of ageand should be followed up. An alpha angle <50 degrees is abnormal.\n\nReferences: Gerscovich EO. Infant hip in developmental dysplasia: facts to consider for a successful diagnostic ultrasoundexamination. Appl Radiol 1999;28:18â€“25. Harcke HT. Screening newborns for developmental dysplasia of the hip: the role of sonography. AJR Am J Roentgenol1994;162:395â€“397."}, {"number": 34, "stem": "Which of the following is a risk factor for developing the condition in Question 33?", "options": [{"letter": "A", "text": "Congenital heart disease"}, {"letter": "B", "text": "Surfactant deficiency disorder"}, {"letter": "C", "text": "Posterior urethral valves"}, {"letter": "D", "text": "Foot deformity"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "The main risk factors for developmental dysplasia of the hip are breech presentation at birth, familyhistory of hip dysplasia, and postural deformities such as torticollis or a foot deformity. Additionally, physicalexamination findings of hip instability, limited range of motion, or a hip click may indicate underlying hip dysplasia.\n\nReferences: Gerscovich EO. Infant hip in developmental dysplasia: facts to consider for a successful diagnostic ultrasoundexamination. Appl Radiol 1999;28:18â€“25. Harcke HT. Screening newborns for developmental dysplasia of the hip: the role of sonography. AJR Am J Roentgenol1994;162:395â€“397."}, {"number": 35, "stem": "The following frontal radiograph of the thoracolumbar spine was obtained. What is the diagnosis?", "options": [{"letter": "A", "text": "Levoscoliosis of the thoracolumbar spine WITHOUT a vertebral anomaly"}, {"letter": "B", "text": "Levoscoliosis of the thoracolumbar spine WITH a vertebral anomaly"}, {"letter": "C", "text": "Dextroscoliosis of the thoracolumbar spine WITHOUT a vertebral anomaly"}, {"letter": "D", "text": "Dextroscoliosis of the thoracolumbar spine WITH a vertebral anomaly"}], "images": ["assets/q35_p186_1.jpeg"], "explanationImages": ["assets/a35_p231_1.jpeg"], "answer": "D", "explanation": "This frontal radiograph of the thoracolumbar spine demonstrates a dextroscoliosis centered at the levelof T12â€“L1. In a dextroscoliosis, there is a rightward curvature of the spine. In a levoscoliosis, there is a leftwardcurvature of the spine. Additionally, there is a vertebral segmentation anomaly at L1 (arrow). This bifid vertebral body should beidentified with this curve and would be an indication for further imaging with MRI.\n\nReferences: Kim H, Kim HS, Moon ES, et al. Scoliosis imaging: what radiologists should know. Radiographics2010;30:1823â€“1842."}, {"number": 36, "stem": "Which of the following concerning structural and nonstructural scoliotic curves is TRUE?", "options": [{"letter": "A", "text": "A structural curve is correctable with ipsilateral bending."}, {"letter": "B", "text": "A structural curve has vertebral morphologic changes such as wedging and rotation."}, {"letter": "C", "text": "A nonstructural curve never progresses to a structural curve."}, {"letter": "D", "text": "A Cobb angle of 15 degrees or more on ipsilateral side-bending views differentiates a structural curve froma nonstructural curve."}], "images": [], "explanationImages": [], "answer": "B", "explanation": "In a structural scoliotic curve, there are vertebral morphologic changes such as wedging and rotation. The structural curve is not correctable with ipsilateral bending. In a nonstructural curve, there are no vertebralmorphologic changes. Given this, a nonstructural curve is correctable with ipsilateral bending. Although anonstructural curve does not usually progress, it can progress to a structural curve because of ligament shorteningfrom decreased growth on the concave side of the curve. Differentiation of a structural from nonstructural scolioticcurvature is a Cobb angle of 25 degrees or more on ipsilateral side-bending.\n\nReferences: Kim H, Kim HS, Moon ES, et al. Scoliosis imaging: what radiologists should know. Radiographics2010;30:1823â€“1842."}, {"number": 37, "stem": "At what Cobb angle is bracing recommended for treatment of adolescent scoliosis?", "options": [{"letter": "A", "text": "10 to 35 degrees"}, {"letter": "B", "text": "20 to 45 degrees"}, {"letter": "C", "text": "30 to 55 degrees"}, {"letter": "D", "text": "40 to 65 degrees"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "The Cobb angle is the measurement of the angle between two lines, one of which is at the superior endplate of the superior end vertebral body and the other at the inferior end plate of the inferior end vertebral body. Inadolescent idiopathic scoliosis, observation is recommended for a Cobb angle <20 degrees, bracing is recommendedwhen the Cobb angle is between 20 and 45 degrees, and surgery is recommended when the Cobb angle is >45degrees. The greatest factors suggesting the probability of progression of an adolescent idiopathic scoliosis are spinalgrowth velocity and the degree of curvature at presentation.\n\nReferences: Kim H, Kim HS, Moon ES, et al. Scoliosis imaging: what radiologists should know. Radiographics2010;30:1823â€“1842."}, {"number": 38, "stem": "A 3-year-old child presents with a limp. The following frontal and lateral radiographs were performed. 190 What is the diagnosis?", "options": [{"letter": "A", "text": "Toddler's fracture of the tibia"}, {"letter": "B", "text": "Buckle fracture of the proximal tibia"}, {"letter": "C", "text": "Buckle fracture of the distal tibia"}, {"letter": "D", "text": "Avulsion fracture of the medial malleolus of the distal tibia"}], "images": ["assets/q38_p188_1.jpeg", "assets/q38_p189_1.jpeg"], "explanationImages": ["assets/a38_p233_1.jpeg"], "answer": "A", "explanation": "The radiograph demonstrates a lucency extending through the tibial diaphysis (arrow) consistent witha toddler's fracture. This is a nondisplaced fracture of the tibia, which can be radiographically occult. The fracturetypical occurs between 9 months and 3 years of age. The most common presenting symptom is refusal to walk orrefusal to bear weight on the affected leg. These fractures most often heal without treatment.\n\nReferences: Donnelly L. Toddler's fracture of the fibula. AJR Am J Roentgenol 2000;175:922."}, {"number": 39, "stem": "A child presents with a short leg. The following radiograph was performed. What is the diagnosis?", "options": [{"letter": "A", "text": "Achondroplasia"}, {"letter": "B", "text": "Osteonecrosis"}, {"letter": "C", "text": "Rhabdomyosarcoma"}, {"letter": "D", "text": "Proximal focal femoral deficiency disorder"}], "images": ["assets/q39_p190_1.jpeg"], "explanationImages": ["assets/a39_p234_1.jpeg", "assets/a39_p235_1.jpeg"], "answer": "D", "explanation": "In the provided image, there is shortening of the femur with tapering of the proximal femur (arrow) and absence of the femoral head. There is also associated dysplasia of the acetabulum. These findings are consistentwith the diagnosis of proximal focal femoral deficiency disorder (PFFD). PFFD is a rare disorder, which is characterized by failure of development of the proximal femur. In this disorder,there is deficiency of the iliofemoral articulation, limb malrotation, and a leg length discrepancy. The Aitken classification (table) is the most common classification scheme for this disorder.\n\nReferences: Biko DM, Davidson R, Pena A, Jaramillo D. Proximal focal femoral deficiency: evaluation by MR imaging. Pediatr Radiol 2012;42:50â€“56."}, {"number": 40, "stem": "Which of the following is associated with the disorder in Question 39?", "options": [{"letter": "A", "text": "Congenital syringomyelia"}, {"letter": "B", "text": "Neuroblastoma"}, {"letter": "C", "text": "Coxa valgus deformity"}, {"letter": "D", "text": "Absent cruciate ligaments"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "In proximal focal femoral deficiency disorder (PFFD), there is maldevelopment of the proximal femur. The femoral head may be present or absent. A coxa vara deformity is often present. The acetabulum may be normal,dysplastic, or absent. In the knee, there may be flattening of the distal femoral epiphysis, underdevelopment of theintercondylar notch, and absent cruciates.\n\nReferences: Biko DM, Davidson R, Pena A, et al. Proximal focal femoral deficiency: evaluation by MR imaging. Pediatr Radiol2012;42:50â€“56. Biko DM, Mill AL, Ho-Fung V, et al. MRI of congenital and developmental abnormalities of the knee. Clin Radiol2012;67:1198â€“1206."}, {"number": 41, "stem": "Frontal and oblique radiographs of the left foot were obtained in a teenager with chronic foot pain. 194 195 196 What is the diagnosis?", "options": [{"letter": "A", "text": "Cuboid fracture"}, {"letter": "B", "text": "Tarsal coalition"}, {"letter": "C", "text": "Equinovarus foot"}, {"letter": "D", "text": "Plantar fasciitis"}, {"letter": "E", "text": "Septic arthritis"}], "images": ["assets/q41_p192_1.jpeg", "assets/q41_p194_1.jpeg"], "explanationImages": ["assets/a41_p237_1.jpeg"], "answer": "B", "explanation": "A tarsal coalition is an abnormality of the foot where two or more tarsal bones are joined by bone,cartilage, or fibrous tissue. In this case, there is irregular sclerosis at the calcaneonavicular joint with decrease in thecalcaneonavicular gap (arrow) consistent with a calcaneonavicular tarsal coalition. In approximately 10% of cases,there is an osseous bridge between the calcaneus and the navicular. Additional findings of this disorder are anelongated lateral navicular as it approaches the anterior calcaneus on the lateral view and hypoplasia of the lateraltalar head.\n\nReferences: Newman JS, Newberg AH. Congenital tarsal coalition: multimodality evaluation with emphasis on CT and MRimaging. Radiographics 2000;20:321â€“332. Zaw H, Calder JDF. Tarsal coalitions. Foot Ankle Clin N Am 2010;15:349â€“364."}, {"number": 42, "stem": "The condition in Question 41 is bilateral in approximately what percentage of affected individuals?", "options": [{"letter": "A", "text": "20%"}, {"letter": "B", "text": "50%"}, {"letter": "C", "text": "70%"}, {"letter": "D", "text": "90%"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Tarsal coalitions are bilateral in approximately 50% of affected individuals. The prevalence of tarsalcoalitions is approximately 1% to 2% of the population. Ninety percent of tarsal coalitions involve the talocalcanealor calcaneonavicular joints.\n\nReferences: Newman JS, Newberg AH. Congenital tarsal coalition: multimodality evaluation with emphasis on CT and MRimaging. Radiographics 2000;20:321â€“332."}, {"number": 43, "stem": "A child with history of multiple fractures presents with the following radiograph. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Rickets"}, {"letter": "B", "text": "Scurvy"}, {"letter": "C", "text": "Chronic recurrent multifocal osteomyelitis"}, {"letter": "D", "text": "Osteogenesis imperfecta"}], "images": ["assets/q43_p196_1.jpeg"], "explanationImages": ["assets/a43_p239_1.jpeg"], "answer": "D", "explanation": "Osteogenesis imperfecta (OI) is a genetic disorder commonly referred to as brittle bone disease. In thisautosomal dominant inherited disorder, there are abnormalities in type 1 collagen, which leads to fragile, andosteopenic bones. The severity of this disorder is variable depending on the classification (see answer to Question 44 below). Thedisorder is suspected clinically in children who present with repeated or unexplained fractures or fractures with minortrauma. On imaging, patients with OI demonstrate osteopenia, fractures, and bone deformities. The bone deformitiesoccur because of the plasticity of the bones. Other findings include hyperplastic callus formation, ossification of theinterosseous membrane, and \"popcorn\" calcifications. \"Popcorn\" calcifications (arrow) usually occur in themetaphysis and epiphysis of the bone and are believed to result from microtrauma leading to disordered maturation ofthe growth plate.\n\nReferences: Forlino A, Marini JC. Osteogenesis imperfect. Lancet 2016;387:1657â€“1671. Renaud A, Aucourt J, Weill J. Radiographic features of osteogenesis imperfecta. Insights Imaging 2013;4:417â€“429. Trejo P, Rauch F. Osteogenesis imperfecta in children and adolescentsâ€”new developments in diagnosis and treatment. Osteoporosis Int 2016;27:3427â€“3437."}, {"number": 44, "stem": "Which of the following in regard to the diagnosis in Question 43 is the lethal form of the disease due torespiratory insufficiency?", "options": [{"letter": "A", "text": "Type I"}, {"letter": "B", "text": "Type II"}, {"letter": "C", "text": "Type III"}, {"letter": "D", "text": "Type IV"}, {"letter": "E", "text": "Type V"}], "images": [], "explanationImages": ["assets/a44_p240_1.jpeg"], "answer": "B", "explanation": "The table describes the four main types of osteogenesis imperfecta.\n\nReferences: Renaud A, Aucourt J, Weill J. Radiographic features of osteogenesis imperfecta. Insights Imaging 2013;4:417â€“429."}, {"number": 45, "stem": "Following treatment, this patient developed dense metaphyseal lines (arrow) within the long bones and a \"bonewithin a bone pattern\" within the spine and flat bones. What treatment did this patient receive?", "options": [{"letter": "A", "text": "NSAID therapy"}, {"letter": "B", "text": "Metronidazole therapy"}, {"letter": "C", "text": "Calcium therapy"}, {"letter": "D", "text": "Bisphosphonate therapy"}], "images": ["assets/q45_p198_1.jpeg"], "explanationImages": ["assets/a45_p241_1.jpeg"], "answer": "D", "explanation": "Bisphosphonate therapy is the most common medical treatment for children with osteogenesisimperfecta (OI). Bisphosphonate therapy consists of cyclic intravenous infusion. The result of this therapy onimaging is dense metaphyseal lines in the long bones which are parallel to the growth plate (arrow). Each line willcorrespond to the administration of the intravenous bisphosphonate. In the spine and long bones, bisphosphonatetherapy results in a \"bone within a bone\" appearance.\n\nReferences: Renaud A, Aucourt J, Weill J. Radiographic features of osteogenesis imperfecta. Insights Imaging 2013;4:417â€“429. Trejo P, Rauch F. Osteogenesis imperfecta in children and adolescentsâ€”new developments in diagnosis and treatment. Osteoporosis Int 2016;27:3427â€“3437."}, {"number": 46, "stem": "What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Ewing sarcoma"}, {"letter": "B", "text": "Osteosarcoma"}, {"letter": "C", "text": "Fibrous dysplasia"}, {"letter": "D", "text": "Chondroblastoma"}], "images": ["assets/q46_p199_1.jpeg", "assets/q46_p200_1.jpeg"], "explanationImages": ["assets/a46_p242_1.jpeg", "assets/a46_p243_1.jpeg"], "answer": "D", "explanation": "The image demonstrates a well-circumscribed epiphyseal tumor within the distal femur (arrows). Given the age of the patient and the epiphyseal location, the diagnosis is most likely a chondroblastoma. A chondroblastoma is an uncommon benign cartilaginous tumor most often occurring in the epiphysis orapophysis of long bones. It is most commonly seen in the femur. On plain film evaluation, the tumor is a well-defined oval or round lytic lesion located within the epiphysis or apophysis. On MRI, the tumor is lobulated and heterogenouswith associated bone marrow edema. It may have a characteristic thin hypointense rim corresponding to siderosiswithin the tumor.\n\nReferences: De Mattos CBR, Angsanunstsukh C, Akrader A, et al. Chondroblastoma and chondromyxoid fibroma. J Am Acad Orthop Surg 2013;21:225â€“233. Wooten-Gorges SL. MR imaging of primary bone tumors and tumor-like conditions in children. Magn Reson Clin N Am2009;17:469â€“487."}, {"number": 47, "stem": "What is the treatment of the lesion seen in Question 46?", "options": [{"letter": "A", "text": "Chemotherapy followed by above-the-knee amputation (AKA)"}, {"letter": "B", "text": "Chemotherapy followed by local resection"}, {"letter": "C", "text": "Curettage and bone grafting"}, {"letter": "D", "text": "Chemotherapy only"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Curettage and bone grafting is the recommended treatment for a chondroblastoma. Tumors sometimesmay be widely excised when in bones such as the ribs or fibula. Recurrence rates of chondroblastoma are variablewithin the literature ranging from 5% to 40%.\n\nReferences: De Mattos CBR, Angsanunstsukh C, Akrader A, et al. Chondroblastoma and chondromyxoid fibroma. J Am Acad Orthop Surg 2013;21:225â€“233."}, {"number": 48, "stem": "The following sonographic examination was performed of both the right and left hip in an 8-year-old child withhip pain. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Transient synovitis"}, {"letter": "B", "text": "Fracture of the radial neck"}, {"letter": "C", "text": "Slipped capital femoral epiphysis (SCFE)"}, {"letter": "D", "text": "Osteoid osteoma"}], "images": ["assets/q48_p201_1.jpeg"], "explanationImages": ["assets/a48_p244_1.jpeg"], "answer": "A", "explanation": "The image demonstrates an effusion of the right hip (arrow). In a patient of this age with hip pain anda hip effusion, the most likely diagnosis is transient synovitis. Transient synovitis of the hip is an acute but transientinflammation of the synovium of the hip. It typically occurs in patients 3 to 8 years old who present with hip pain,poor joint mobility, and a limp.\n\nReferences: Paruso S, Di Martino A, Tarantino CC, et al. Transient synovitis of the hip: ultrasound appearance. J Ultrasound2011;14:92â€“94."}, {"number": 49, "stem": "A child presents with chronic pain in the left knee. Frontal and lateral radiographs of the left knee wereperformed. 204 What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Sinding-Larsen-Johansson syndrome"}, {"letter": "B", "text": "Osgood-Schlatter disease"}, {"letter": "C", "text": "Patellar sleeve avulsion fracture"}, {"letter": "D", "text": "Bipartite patella"}], "images": ["assets/q49_p202_1.jpeg", "assets/q49_p203_1.jpeg"], "explanationImages": ["assets/a49_p245_1.jpeg"], "answer": "A", "explanation": "Sinding-Larsen-Johansson syndrome is an osteochondrosis of the inferior pole of the patellacommonly seen between the ages of 10 and 14 years of age. It is similar to Osgood-Schlatter disease given that it is aresult of repetitive microtrauma due to stress at the insertion of the patellar tendon on the lower pole of the patella. Imaging findings include fragmentation of the inferior pole of the patella (arrow) along with inflammation in Hoffafat pad (arrowhead). It can be distinguished from patellar sleeve avulsion given the clinical history of chronic kneepain.\n\nReferences: Dupuis CS, Westra SJ, Makris J, et al. Injuries and conditions of the extensor mechanism of the pediatric knee. Radiographics 2009;29:877â€“886. Kuehnast M, Mahomed N, Mistry B. Sinding-Larsen-Johansson syndrome. SAJCH 2012;6:90â€“92."}, {"number": 50, "stem": "Which of the following is TRUE regarding the diagnosis in Question 49?", "options": [{"letter": "A", "text": "It is an osteochondrosis due to traction of the quadriceps tendon."}, {"letter": "B", "text": "It most commonly occurs between the ages of 14 and 18 years."}, {"letter": "C", "text": "On MRI evaluation, bone marrow edema may be seen in the anterior tibial tubercle."}, {"letter": "D", "text": "Initial treatment is rest and nonsteroidal anti-inflammatory drugs (NSAIDs)."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "As noted in Answer 49, Sinding-Larsen-Johansson syndrome is an osteochondrosis of the inferior poleof the patella due to traction of the patellar ligament resulting in microtrauma. It is most commonly seen between theages of 10 and 14 years. On MRI, there is edema of the inferior pole of the patella and proximal patellar tendon. Initial treatment is rest and anti-inflammatory medication such as NSAIDs.\n\nReferences: Dupuis CS, Westra SJ, Makris J, et al. Injuries and conditions of the extensor mechanism of the pediatric knee. Radiographics 2009;29:877â€“886. Kuehnast M, Mahomed N, Mistry B. Sinding-Larsen-Johansson syndrome. SAJCH 2012;6:90â€“92."}];
    const APP_ID = "pediatric-msk-imaging-quiz-ch3";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
