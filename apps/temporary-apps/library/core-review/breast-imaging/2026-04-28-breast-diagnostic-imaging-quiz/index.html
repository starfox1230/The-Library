ext": "Digital breast tomosynthesis"}, {"letter": "E", "text": "Molecular breast imaging"}], "images": ["assets/q90a_115-1.jpg", "assets/q90d_116-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. This is digital breast tomosynthesis (DBT) or 3-D mammography. DBT is a technology that acquires a series of low-dose projection images of the compressed breast at different angles and produces thin slices of the breast, allowing radiologists to step through slices one millimeter at a time. Computer-aided detection (CAD) is not an imaging modality. It is a computer-based process designed to analyze mammographic images for suspicious areas. Contrast-enhanced spectral mammography (CESM) refers to the imaging of an iodinated contrast agent using mammographic imaging equipment. No contrast is seen in provided images. Molecular breast imaging (MBI) is a nuclear medicine study that utilizes sestamibi for detection of breast cancer."}, {"number": "90c", "stem": "Which statement is true regarding digital breast tomosynthesis (DBT)?", "options": [{"letter": "A", "text": "DBT increases false-positive call-back rates as it shows more findings than conventional mammography."}, {"letter": "B", "text": "DBT is more useful in evaluation of calcifications than architectural distortion."}, {"letter": "C", "text": "No prospective DBT trial has shown increase in cancer detection rate."}, {"letter": "D", "text": "Studies have demonstrated improved sensitivity and specificity for breast cancer detection with use of DBT."}, {"letter": "E", "text": "DBT exposes patients to a radiation dose four times more than that of digital mammography."}], "images": ["assets/q90a_115-1.jpg", "assets/q90d_116-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Studies have shown improved accuracy in both screening and diagnostic settings with DBT. Reductions in false-positive call-back rates that range from 6% to 67% have been reported, with slightly increased cancer detection rates. Studies have also demonstrated improved sensitivity and specificity for breast cancer detection with use of combined DBT. Studies of DBT have shown improved conspicuity and characterization of lesions, in part because of reduced obscuration by overlapping breast tissue. In particular, architectural distortion and lesion margins become more apparent at DBT. Calcifications are better characterized with spot magnification views than with DBT. When DBT is used in combination mode with full-field digital mammography (FFDM), the patientâ€™s radiation dose is increased by roughly a factor of two compared with the dose at FFDM alone."}, {"number": "90d", "stem": "An image-guided core needle biopsy of this finding was performed. A postbiopsy marker was placed. Pathology report states papilloma with usual ductal hyperplasia. What is the appropriate radiologic/pathologic recommendation?", "options": [{"letter": "A", "text": "Concordant; recommend routine mammogram in 1 year."}, {"letter": "B", "text": "Concordant; recommend unilateral diagnostic mammogram in 6 months."}, {"letter": "C", "text": "Concordant; recommend surgical excision."}, {"letter": "D", "text": "Discordant; recommend surgical excision."}, {"letter": "E", "text": "Discordant; recommend MRI."}], "images": ["assets/q90d_116-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Differential diagnosis for mammographic architectural distortion includes malignancy, complex sclerosing lesion, sclerosing adenosis, trauma, and postsurgical scar. Papilloma and usual ductal hyperplasia are benign findings, which do not cause architectural distortion. Therefore, a surgical excision should be recommended."}, {"number": "90e", "stem": "Surgical excision was performed following wire localization. Pathology demonstrated complex sclerosing lesion. What is the appropriate radiologic/pathologic correlation?", "options": [{"letter": "A", "text": "Benign; concordant"}, {"letter": "B", "text": "High risk; concordant"}, {"letter": "C", "text": "Malignant; concordant"}, {"letter": "D", "text": "Benign; discordant"}, {"letter": "E", "text": "High risk; discordant"}], "images": ["assets/q90a_115-1.jpg", "assets/q90d_116-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Complex sclerosing lesions or radial scars are not truly scars; instead, they are idiopathic entities unrelated to prior surgery or trauma. Proposed possible causes include localized inflammatory reaction and chronic ischemia with subsequent slow infarction. The reported prevalence of radial scars is 0.1 to 2.0 per 1,000 screening mammograms and 1.7% to 14% of autopsy specimens. Their major clinical significance pertains to an association with atypical ductal hyperplasia and carcinoma that is seen in up to 50% of cases. Excisional biopsy should be performed when imaging findings are consistent with radial scar. Core needle biopsy, fine-needle aspiration, and frozen sectioning are not routinely recommended for definitive diagnosis because the precise pathologic diagnosis of these lesions is difficult.\n\nReferences: Alleva DQ, Smetherman DH, Farr GH, et al. Radial scar of the breast: radiologic-pathologic correlation in 22 cases. RadioGraphics 1999;19(1):S27â€“S35.\n\nPeppard HR, Nicholson BE, Rochman CM, et al. Digital breast tomosynthesis in the diagnostic setting: indications and clinical applications. RadioGraphics 2015;35(4):975â€“990.\n\nRoth RG, Maidment ADA, Weinstein SP, et al. Digital breast tomosynthesis: lessons learned from early clinical implementation. RadioGraphics 2014;34(4):E89â€“E102.\n\nSickles EA, Dâ€™Orsi CJ, Bassett LW, et al. ACR BI-RADSÂ® mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:81â€“95."}, {"number": "91", "stem": "A 54-year-old female presents with a palpable mass following a car accident. A diagnostic mammogram and ultrasound was obtained. According to the fifth edition of BI-RADS, what is the most appropriate BI-RADS assessment?", "options": [{"letter": "A", "text": "BI-RADS 0"}, {"letter": "B", "text": "BI-RADS 1"}, {"letter": "C", "text": "BI-RADS 3"}, {"letter": "D", "text": "BI-RADS 4"}], "images": ["assets/q91_117-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The diagnostic mammogram demonstrates a triangular metallic marker placed over the upper inner quadrant of the left breast indicating the site of the palpable mass, which corresponds to an asymmetry. Targeted ultrasound at 1:00 shows a circumscribed mass of mixed echogenicity. The findings are consistent with a hematoma. If the history and findings are characteristic of a hematoma and no follow-up is needed, then BI-RADS 2 is the most appropriate assessment.\n\nHowever, according to the fifth edition of BI-RADS, a hematoma should be described in the report and the assessment given should be a BI-RADS 4 if follow-up is indicated (rather than a BI-RADS 3). Biopsy should be scheduled at a later time, at which time if there has been resolution of the finding, the biopsy will not be performed and the finding deemed benign.\n\nReference: Dâ€™Orsi C, Sickles EA, Mendelson EB, et al. ACR BI-RADSÂ® atlas mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:151."}, {"number": "92a", "stem": "What underlying malignancy is Paget disease of the breast most commonly associated with?", "options": [{"letter": "A", "text": "Invasive ductal carcinoma (IDC)"}, {"letter": "B", "text": "Ductal carcinoma in situ (DCIS)"}, {"letter": "C", "text": "Invasive lobular carcinoma (ILC)"}, {"letter": "D", "text": "Inflammatory breast carcinoma (IBC)"}], "images": ["assets/q92b_118-1.jpg", "assets/q92c_118-2.jpg"], "explanationImages": ["assets/a92a_165-1.jpg"], "answer": "B", "explanation": "Answer B. Paget disease is characterized by infiltration of the epidermis of the nipple by malignant cells termed â€œPaget cells.â€ More than 95% of cases are associated with an additional underlying breast malignancy in the form of ductal carcinoma in situ (DCIS) or invasive breast cancer; in the absence of a palpable mass, 66% to 93% are due to DCIS, and with a palpable mass, the vast majority are due to IDC. The DCIS is most frequently high grade, comedo, or solid type.\n\nThe MRI image below represents a patient with clinically suspected Paget disease of the right breast. Consistent with clinical findings, there is asymmetric enhancement of the right nippleâ€“areolar complex, skin thickening, and underlying retroareolar nonmass enhancement, which yielded DCIS upon MRI-guided biopsy.\n\nReferences: Berg WA, Birdwell RL, eds. Diagnostic breast imaging: breast. Salt Lake City, UT: Amirsys, 2008:IV:3-10â€“3-13 and IV:2-134â€“IV:2-137.\n\nLim HS, et al. Paget disease of the breast: mammographic, US, and MR imaging findings with pathologic correlation. RadioGraphics 2011;31:1973â€“1987."}, {"number": "92b", "stem": "A 60-year-old patient presents with itching, redness, and eczematous changes of the right nippleâ€“areolar complex. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Invasive ductal carcinoma"}, {"letter": "B", "text": "Invasive lobular carcinoma"}, {"letter": "C", "text": "Paget disease"}, {"letter": "D", "text": "Inflammatory breast cancer"}], "images": ["assets/q92b_118-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Paget disease of the breast is a rare carcinoma in situ involving the nippleâ€“areolar complex that is often associated with an additional underlying in situ or invasive carcinoma in 95% of cases. This malignancy is characterized by infiltration of the nipple epidermis by adenocarcinoma cells, which extend to the nipple surface via the lactiferous ducts. The clinical features of Paget disease are characteristic and should prompt consideration of the diagnosis. These include excoriation and pruritis, which are often associated with a local inflammatory response.\n\nReferences: Berg WA, Birdwell RL, eds. Diagnostic breast imaging: breast. Salt Lake City, UT: Amirsys, 2008:IV:3-10â€“IV:3-13 and IV:2-134â€“IV:2-137.\n\nLim HS, et al. Paget disease of the breast: mammographic, US, and MR imaging findings with pathologic correlation. RadioGraphics 2011;31:1973â€“1987."}, {"number": "92c", "stem": "What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Paget disease"}, {"letter": "B", "text": "Inflammatory breast cancer"}, {"letter": "C", "text": "Mastitis"}, {"letter": "D", "text": "Invasive ductal carcinoma"}], "images": ["assets/q92c_118-2.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. This is a patient with advanced, late-stage Paget disease of the nipple, characterized by extreme excoriation, erythema, inflammation, nipple retraction, and bloody nipple discharge, centered at the nippleâ€“areolar complex. Inflammatory breast cancer is characterized by generalized erythema and warmth of the breast with pitted dimpling of the skin (peau dâ€™orange), rather than ulceration and eczematoid changes. Mastitis usually also presents with erythema and warmth; however, it responds to antibiotic treatment within 1 to 2 weeks. Invasive ductal carcinoma is an infiltrating, malignant proliferation of neoplastic cells arising within the breast tissue, rather than the nipple epidermis. The chart below lists key differentiating features between Paget disease of the nipple and inflammatory breast cancer (IBC), which is one of the main differential diagnoses.\n\nLOCATION\n\nUsually confined to nippleâ€“areolar complex\n\nUsually involves whole breast\n\nCLINICAL\n\nErythema +/âˆ’ eczematoid changes\n\nErythema +/âˆ’ warmth and edema\n\n+/âˆ’ nipple retraction\n\n+/âˆ’ peau dâ€™orange\n\nPATHOLOGY\n\nUnderlying associated malignancy (95%â€“98%)\n\nDiffuse infiltration without discrete mass\n\nHigh-grade DCIS (75%)\n\nPoorly differentiated IDC-NOS\n\nDIAGNOSIS\n\nNipple biopsy (wedge bx preferred over shave or punch bx)\n\nSkin bx reveals tumor emboli in dermal lymphatics\n\nReferences: Berg WA, Birdwell RL, eds. Diagnostic breast imaging: breast. Salt Lake City, UT: Amirsys, 2008:IV:3-10â€“IV:3-13 and IV:2-134â€“IV:3-137.\n\nLim HS, et al. Paget disease of the breast: mammographic, US, and MR imaging findings with pathologic correlation. RadioGraphics 2011;31:1973â€“1987."}, {"number": "93", "stem": "DCIS corresponds to what stage of breast cancer?", "options": [{"letter": "A", "text": "0"}, {"letter": "B", "text": "I"}, {"letter": "C", "text": "II"}, {"letter": "D", "text": "III"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Ductal carcinoma in situ (DCIS) is the proliferation of tumor cells arising within the ductal epithelium of the terminal ductal lobular unit (TDLU) with preservation of the basement membrane. It is a heterogeneous entity that encompasses low-grade lesions, which may not be clinically significant, and high-grade lesions, which may harbor foci of invasive disease. It is classified according to architectural pattern (comedo, solid, cribriform, papillary, micropapillary type) and tumor grade (low, intermediate, and high).\n\nReference: Wang LC, et al. US appearance of ductal carcinoma in situ. RadioGraphics 2013;33(1):213â€“228."}, {"number": "94", "stem": "A 40-year-old patient presents with a palpable area of concern in the right breast. Targeted sonography reveals the following lesion, which is recommended for ultrasound-guided core needle biopsy. Pathology from the biopsy yields cellular fibroepithelial lesion. What is the appropriate recommendation?", "options": [{"letter": "A", "text": "No imaging follow-up and return to screening mammogram"}, {"letter": "B", "text": "6-month unilateral mammogram"}, {"letter": "C", "text": "6-month follow-up right ultrasound"}, {"letter": "D", "text": "Surgical consultation and excision"}], "images": ["assets/q94_119-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Fibroepithelial lesions encompass a heterogeneous group of tumors with the two main prototypes being fibroadenoma and phyllodes. Although fibroadenomas are benign lesions, phyllodes tumors may be benign, borderline, or malignant. Despite overlapping histologic features on core needle biopsy, these lesions exhibit significant differences in their clinical behavior. Lesions that have overlapping histologic features with phyllodes tumor are reported as cellular fibroepithelial lesions. When a cellular fibroepithelial lesion is found upon core needle biopsy that is difficult to categorize as a fibroadenoma, excision is recommended to avoid underestimation of a phyllodes tumor. This lesion was recommended for surgical excision and surgical histopathology yielded low-grade phyllodes.\n\nReferences: Yang X, et al. Fibroepithelial tumors of the breast: pathologic and immunohistochemical and molecular mechanisms. Arch Pathol Lab Med 2014;138:25â€“36.\n\nYasir S, Gamez R, Jenkins S, et al. Significant histological features differentiating cellular fibroadenoma from phyllodes tumor on core needle biopsies. Am J Clin Pathol 2014;142(3):362â€“369."}, {"number": "95a", "stem": "A 34-year-old female presents for diagnostic mammogram as requested by her plastic surgeon prior to bilateral reduction. She is asymptomatic. What is the morphology of and distribution of these calcifications, respectively?", "options": [{"letter": "A", "text": "Coarse heterogeneous and grouped"}, {"letter": "B", "text": "Round and grouped"}, {"letter": "C", "text": "Round and linear"}, {"letter": "D", "text": "Linear and grouped"}], "images": ["assets/q95a_119-2.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The morphology of these calcifications is predominately round, and they are linear in their distribution."}, {"number": "95b", "stem": "What is the appropriate recommendation for this patient?", "options": [{"letter": "A", "text": "Stereotactic biopsy."}, {"letter": "B", "text": "Short-interval follow-up."}, {"letter": "C", "text": "No further follow-up or evaluation. Patient can begin screening at age 40."}, {"letter": "D", "text": "Surgical excision as the calcifications are too close to the nipple to be biopsied using stereotactic technique."}], "images": ["assets/q95a_119-2.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Although the morphologic description of predominately round calcifications is often a probably benign process, it is important to note the distribution of the calcifications. In this case, the calcifications have a linear distribution. Again, it is important to remember in breast imaging that the most suspicious descriptor determines the course of action. Linear distribution of calcifications is a suspicious descriptor and biopsy should be recommended. Although the calcifications are close to the nipple, they can still be safely biopsied by stereotactic technique and attempt should be made to avoid surgical excision. In this case, the pathology proved to be intermediate-grade DCIS.\n\nReference: The ACR Breast Imaging Reporting and Data System (BI-RADS). BI-RADSâ€”mammography. Reston, VA: American College of Radiology, 2013:37â€“80."}, {"number": "96a", "stem": "A 35-year-old female presents for her first bilateral screening breast MRI because of her elevated lifetime risk for breast cancer (axial STIR, upper left; postcontrast subtraction, upper right; maximal intensity projection image with kinetics color overlay, lower left). What is the most likely diagnosis for the mass in the left breast seen here?", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Invasive ductal carcinoma"}, {"letter": "C", "text": "Benign cyst"}, {"letter": "D", "text": "Mucinous carcinoma"}], "images": ["assets/q96a_120-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The best answer is fibroadenoma. This is an oval, circumscribed mass with persistent kinetics as indicated by the blue on the color map image. In addition, there are nonenhancing septations, which are suggestive of a fibroadenoma. This mass was biopsy proven to represent a fibroadenoma."}, {"number": "96b", "stem": "What is the next appropriate step for this patient assuming no other important significant findings?", "options": [{"letter": "A", "text": "Recommend ultrasound evaluation to identify the finding seen on the MRI for the purposes of biopsy."}, {"letter": "B", "text": "Recommend ultrasound evaluation to identify the finding seen on the MRI for the purposes of short-interval follow-up."}, {"letter": "C", "text": "No further intervention or evaluation is needed. Patient may continue with annual screening MRI and mammography."}, {"letter": "D", "text": "Proceed to MRI-guided breast biopsy."}], "images": ["assets/q96a_120-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Although this is very likely to represent a fibroadenoma, some phyllodes tumor can have a similar appearance with regard to the nonenhancing septations, so this mass cannot be assumed to be benign. Therefore, correlating ultrasound should be performed so follow-up can be performed with a less expensive and more easily tolerated exam as opposed to MRI follow-up.\n\nReference: Mahoney MC, Molleran VM. Breast MRI. Philadelphia, PA: Elsevier Mosby, 2013:67â€“68."}, {"number": "97", "stem": "A 62-year-old female with a personal history of breast cancer who is status post right mastectomy. She is obtaining a screening breast MRI of her left breast because of her elevated risk (first image: fat-saturated precontrast T1; second image: accompanying subtraction image of a first-phase, postcontrast sequence).\n\nYou ask the resident what his recommendation for the finding in the subareolar region of the right breast is. He tells you the computer-aided detection (CAD) software is down and cannot make an assessment until he can evaluate the kinetics. What do you say?", "options": [{"letter": "A", "text": "The finding is benign regardless of kinetics. This finding represents proteinaceous debris in a duct."}, {"letter": "B", "text": "Regardless of kinetics, this finding will require biopsy."}, {"letter": "C", "text": "He is correct. Further assessment cannot be made until kinetics data are available."}, {"letter": "D", "text": "Kinetics evaluation can be calculated manually without the aid of a software."}], "images": ["assets/q97_121-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Although the entire exam should be evaluated with the benefit of CAD, the finding in the subareolar region requires biopsy regardless of its kinetics. It is important to remember that in evaluating a finding on breast MRI, morphology is more important than the kinetics of a finding. This is an area of linear, nonmass enhancement. Linear is a suspicious descriptor, and therefore, the finding warrants biopsy. The answer cannot be A as the subtraction sequence confirms there is enhancement rather than intrinsic T1 hyperintensity from proteinaceous debris within a duct. Although kinetics can be calculated manually, the result still will not alter the recommendation. This was found to represent intermediate-grade DCIS.\n\nReference: Mahoney MC, Molleran VM. Breast MRI. Philadelphia, PA: Elsevier Mosby, 2013:24â€“28."}, {"number": "98a", "stem": "A 50-year-old female presents for her annual screening mammogram. Her prior mammograms were performed outside the United States and cannot be located. What is the BI-RADS for this exam?", "options": [{"letter": "A", "text": "0"}, {"letter": "B", "text": "2"}, {"letter": "C", "text": "3"}, {"letter": "D", "text": "4"}], "images": ["assets/q98a_122-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The BI-RADS category assessment is 2."}, {"number": "98b", "stem": "What is the most likely cause for the calcifications in the breasts?", "options": [{"letter": "A", "text": "Bilateral ductal carcinoma in situ"}, {"letter": "B", "text": "Seat belt trauma"}, {"letter": "C", "text": "Fat injections"}, {"letter": "D", "text": "Ruptured silicone implants"}], "images": ["assets/q98a_122-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The diffuse nature of calcifications is compatible with a benign process so DCIS cannot be the correct answer and why the mammogram is a BI-RADS 2. Although trauma from a seat belt injury can cause calcifications, the distribution is unusual for this. Silicone granuloma usually appears as very hyperdense masses commonly larger than the calcifications seen here. The other distinguishing finding is the numerous oil cysts seen in both breasts.\n\nReferences: Margolis NE, Morley C, Lotfi P, et al. Update on imaging of the postsurgical breast. RadioGraphics 2016;36(3):642â€“660.\n\nThe ACR Breast Imaging Reporting and Data System (BI-RADS). BI-RADSâ€”mammography. Reston, VA: American College of Radiology, 2013:37â€“80."}, {"number": "99", "stem": "A 52-year-old female presents for annual high-risk screening breast MRI with this MRI finding. What is the most appropriate BI-RADS descriptor?", "options": [{"letter": "A", "text": "Clumped nonmass enhancement"}, {"letter": "B", "text": "Rim-enhancing nonmass enhancement"}, {"letter": "C", "text": "Clustered ring nonmass enhancement"}, {"letter": "D", "text": "Stippled nonmass enhancement"}], "images": ["assets/q99_122-2.jpg"], "explanationImages": ["assets/a99_168-1.jpg"], "answer": "C", "explanation": "Answer C. Clustered ring nonmass enhancement describes an internal enhancement pattern on breast MRI with thin rings of enhancement clustered together around ducts. The enhancement can be seen in the periductal stroma and can indicate a suspicious finding like ductal carcinoma in situ. Clumped nonmass enhancement (image B) is an internal enhancement pattern descriptor of cobblestone enhancement of varying shapes and sizes with occasionally confluent areas. It may look like grapes if focal areas involved or be beaded like pearls on a string. Rim-enhancing and stippled nonmass enhancement are not BI-RADS descriptor terms for nonmass enhancement.\n\nReference: Morris EA, Comstock CE, Lee CH, et al. ACR BI-RADSÂ® magnetic resonance imaging. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:69â€“71."}, {"number": "100a", "stem": "The technologist comes to you and states a patient is here for a palpable mass in her left breast. She also informs you that the patient stopped breast-feeding approximately 2 weeks ago. She is 28 years old and at average risk for breast cancer. Ultrasound evaluation is eventually performed of the palpable mass below. What is your assessment and recommendation for the sonographic finding?", "options": [{"letter": "A", "text": "BI-RADS 2; benign"}, {"letter": "B", "text": "BI-RADS 3; probably benignâ€”short-interval follow-up"}, {"letter": "C", "text": "BI-RADS 4; suspicious findingâ€”biopsy recommended"}, {"letter": "D", "text": "Assessment cannot be made without mammography"}], "images": ["assets/q100a_123-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. This is a complex, ill-defined mass with vascularity, which is palpable. Biopsy should be performed."}, {"number": "100b", "stem": "You and the patient agree on biopsy. Her husband, a physician, enters the room soon after and adamantly tries to persuade his wife against biopsy as the abnormality is not convincing for cancer and the complication of a milk fistula is a relative contraindication to biopsy. What do you say to the patient and her spouse?", "options": [{"letter": "A", "text": "Recommend ultrasound follow-up as most lesions in patients are found to be benign."}, {"letter": "B", "text": "Milk fistula is a rare complication of percutaneous biopsy, which, if it occurs, often spontaneously resolves."}, {"letter": "C", "text": "Biopsy in a lactating patient should only be performed on BI-RADS 5 lesions."}, {"letter": "D", "text": "Refer the patient to a surgeon for excisional biopsy."}], "images": ["assets/q100a_123-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Milk fistula is a rare complication of percutaneous biopsy but more often a complication of surgical procedures. Though an undesirable complication and despite the fact that most palpable masses in lactating patients are benign, the risk of milk fistula should not preclude the radiologist from performing percutaneous biopsy of findings with suspicious descriptors, as in this case. This mass was found to represent a lactating adenoma. A lactating adenoma is a mass containing distended tubules with an epithelial lining. Ultrasound shows an oval circumscribed hypoechoic mass containing echogenic bands representing fibrotic bands seen on pathology. A lactating adenoma can enlarge rapidly during pregnancy and regress after cessation of lactation.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:405â€“406.\n\nMahoney MC, Ingram AD. Breast emergencies: types, imaging features, and management. AJR Am J Roentgenol 2014;202(4):W390â€“W399."}, {"number": "101", "stem": "With regard to contrast-enhanced breast MRI, the phenomenon of picture framing is related to:", "options": [{"letter": "A", "text": "A suspicious segmental area of nonmass enhancement in the periphery of the breast seen with low-grade DCIS"}, {"letter": "B", "text": "An artifact related to inhomogeneous fat suppression in the periphery of both breasts"}, {"letter": "C", "text": "Peripheral enhancement of the breast parenchyma, which requires short-term follow-up when no comparisons are available to document stability"}, {"letter": "D", "text": "The normal pattern of parenchymal enhancement from the periphery to the central breast"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. This is a normal finding related to the perfusion of the breast parenchyma. This should be interpreted as benign and follow-up is not necessary.\n\nReference: Dontchos BN, Rahbar H, Partridge SC, et al. Are qualitative assessments of background parenchymal enhancement, amount of fibroglandular tissue on MR images, and mammographic density associated with breast cancer risk? Radiology 2015;276(2):371â€“380."}, {"number": "102", "stem": "A 48-year-old female with a screening tomosynthesis mammogram of the left breast in the craniocaudal (image A) and mediolateral oblique (image B) projection. Which is the most appropriate next step in management of this patient?", "options": [{"letter": "A", "text": "Ultrasound"}, {"letter": "B", "text": "Biopsy"}, {"letter": "C", "text": "Mammogram in 1 year"}, {"letter": "D", "text": "Magnification views"}], "images": ["assets/q102_124-1.jpg"], "explanationImages": ["assets/a102_169-1.jpg"], "answer": "A", "explanation": "Answer A. There is a spiculated mass with associated architectural distortion in the left breast at 12 oâ€™clock (see annotated image A and annotated image B). The margins of the mass are well seen as spiculated; therefore, the patient could proceed to ultrasound as the most appropriate next step (answer A) of the answers provided. While the mass is suspicious and the patient will undergo biopsy, an ultrasound should be performed prior to biopsy to evaluate for an ultrasound correlate. The patient should not return to screening mammogram in 1 year as there is a suspicious finding in the left breast. Magnification views would help in evaluation of calcifications, which are not present in this case.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:132â€“136."}, {"number": "103", "stem": "A 48-year-old female with personal history of breast cancer who presents for annual screening MRI. Which of the following would be most helpful in evaluation of this lesion?", "options": [{"letter": "A", "text": "Delayed postcontrast fat-saturated T1-weighted image"}, {"letter": "B", "text": "T1-weighted unenhanced nonâ€“fat-saturated image"}, {"letter": "C", "text": "T2-weighted fat-saturated image"}, {"letter": "D", "text": "T1-weighted unenhanced fat-saturated image"}, {"letter": "E", "text": "Kinetic curve evaluation"}], "images": ["assets/q103_124-2.jpg"], "explanationImages": ["assets/a103_169-2.jpg"], "answer": "B", "explanation": "Answer B. This is a case of postsurgical changes in the left breast with fat necrosis. Fat necrosis on MRI can have a variable appearance. The most common MRI appearance is that of a lipid cyst with a round or oval mass with hypointense T1-weighted signal on fat-saturated images. Rim enhancement of the mass commonly occurs to a varying degree. The key to diagnosis is assessing for internal signal characteristics and enhancement of the mass with fat necrosis isointense to fat signal in the breast. Unenhanced nonâ€“fat-saturated T1-weighted images are particularly helpful in distinguishing fat necrosis from necrotic tumor.\n\nReference: Daly CP, Jaeger B, Sill DS. Variable appearances of fat necrosis on breast MRI. AJR Am J Roentgenol 2008;191:1374â€“1380."}, {"number": "104", "stem": "A 45-year-old female who undergoes recent negative annual mammogram presents for high-risk screening MRI. What is the most appropriate next step in this patientâ€™s management?", "options": [{"letter": "A", "text": "High-risk screening MRI in 1 year"}, {"letter": "B", "text": "Short-term follow-up with MRI in 6 months, probably benign"}, {"letter": "C", "text": "Second-look ultrasound and MRI-guided biopsy if ultrasound negative"}, {"letter": "D", "text": "Antibiotic treatment for 10 days with follow-up MRI in 2 months"}], "images": ["assets/q104_125-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. This is a highly suspicious irregular mass in the left breast in an asymptomatic patient who presented for screening MRI. This is asymmetric and unilateral; therefore, not glandular enhancement and return to high-risk screening MRI are incorrect. This is a BI-RADS category 4 lesion; therefore, returning to screening in 1 year or short-term follow-up is not appropriate (A and B incorrect). A second-look ultrasound should be performed for an ultrasound correlate. If an ultrasound correlate is found, then an ultrasound-guided biopsy can be performed. If there is no ultrasound correlate, then an MRI-guided biopsy should be performed. The patient is asymptomatic; therefore, she should not be treated for mastitis (D is incorrect).\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:57, 270â€“279."}, {"number": "105a", "stem": "A 62-year-old female presents with biopsy-proven right-sided breast cancer and undergoes breast MRI to evaluate for occult malignancy in the left breast. What is the most appropriate BI-RADS for this patientâ€™s MRI?", "options": [{"letter": "A", "text": "BI-RADS 6"}, {"letter": "B", "text": "BI-RADS 4"}, {"letter": "C", "text": "BI-RADS 2"}, {"letter": "D", "text": "BI-RADS 0"}], "images": ["assets/q105a_125-2.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The patient has known right breast cancer. There is an irregular mass in the left breast posterior depth, which is suspicious. While the patient does have known breast cancer, the suspicious mass in the left breast should be evaluated by second-look ultrasound for a possible correlate. If there is no ultrasound correlate, then an MRI-guided biopsy should be performed. Based on the MRI findings, this is a BI-RADS 4: suspicious abnormality requiring biopsy. BI-RADS 0 should rarely be given in MRI reports. An appropriate use of BI-RADS 0 on MRI given in the BI-RADS MRI lexicon would be suspecting an intramammary lymph node on MRI and need a second-look ultrasound for confirmation.\n\nReference: Morris EA, Comstock CE, Lee CH, et al. ACR BI-RADSÂ® magnetic resonance imaging. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013."}, {"number": "105b", "stem": "What is the percentage range of patients with breast cancer that MRI can detect an occult malignancy in the contralateral breast?", "options": [{"letter": "A", "text": "1% to 2%"}, {"letter": "B", "text": "3% to 5%"}, {"letter": "C", "text": "8% to 12%"}, {"letter": "D", "text": "13% to 15%"}, {"letter": "E", "text": "16% to 20%"}], "images": ["assets/q105a_125-2.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The ACRIN 6667 trial was a trial looking at the MRI evaluation of the contralateral breast for occult cancer in women with a recent diagnosis of breast cancer. Within this trial, MRI detected clinically and mammographically occult breast cancer in the contralateral breast in 30 of 969 women who were enrolled in the study (3.1%). Other studies have shown similar results. Per the American College of Radiology, breast MRI indications include screening of the contralateral breast with MRI in patients with a new breast malignancy. Breast MRI can detect occult malignancy in the contralateral breast in at least 3% to 5% of breast cancer patients.\n\nReference: Lehman CD, Gatsonis C, Kuhl CK, et al. MRI evaluation of the contralateral breast in women with recently diagnosed breast cancer. N Engl J Med 2007;356:1295â€“1303."}, {"number": "106", "stem": "Which of the following is a characteristic of molecular breast imaging (MBI) or breast-specific gamma imaging (BSGI)?", "options": [{"letter": "A", "text": "Uses glucose-containing radiopharmaceutical fluorodeoxyglucose (FDG)"}, {"letter": "B", "text": "Affected by breast density"}, {"letter": "C", "text": "Radiation dose less than with a mammogram"}, {"letter": "D", "text": "Uses radiotracer Tc-99m (technetium) sestamibi"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Breast-specific gamma imaging (BSGI) or molecular breast imaging is a nuclear medicine breast scintigraphy study utilizing either a single- or dual-headed small-field-of-view gamma camera and (99m)Tc-sestamibi (Cardiolite) (answer D). The concept is based on increased mitochondrial uptake in cancer cells by sestamibi secondary to increased vascularity of breast tumors. Visualization is not impacted by breast density (answer B is incorrect). One of the concerns with BSGI is the elevated radiation dose, which is more than a mammogram. Positron emission mammography (PEM) requires a PET scanner and injection of 18F-FDG.\n\nReferences: Brem RF, Floerke AC, Rapelyea JA, et al. Breast-specific gamma imaging as an adjunct imaging modality for the diagnosis of breast cancer. Radiology 2008;247(3):651â€“657.\n\nRechtman LR, Lenihan MJ, Lieberman JH, et al. Breast-specific gamma imaging for the detection of breast cancer in dense versus nondense breast. AJR Am J Roentgenol 2014;202(2):293â€“298."}, {"number": "107", "stem": "A 54-year-old female was recalled from a screening tomosynthesis for a possible architectural distortion in the left breast. A diagnostic tomosynthesis compression view demonstrates this finding. An ultrasound is performed, which demonstrates no correlate. What is the most appropriate next step in this patientâ€™s management?", "options": [{"letter": "A", "text": "Return screening mammogram"}, {"letter": "B", "text": "6-month follow-up tomosynthesis"}, {"letter": "C", "text": "Tomosynthesis-guided biopsy"}, {"letter": "D", "text": "Breast MRI"}], "images": ["assets/q107_126-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. This is a case of architectural distortion, which persists on the tomosynthesis compression views. This is a suspicious finding mammographically with a BI-RADS 4 category and biopsy should be performed. An ultrasound is the most appropriate next step to evaluate for an ultrasound correlate. Given the lack of ultrasound correlate in the case scenario, however, the mammographic finding remains suspicious and a tomosynthesis-guided biopsy should be performed. A breast MRI should be limited in utilization for problem-solving purposes.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:57, 132â€“136.\n\nMorris EA, Comstock CE, Lee CH, et al. ACR BI-RADSÂ® mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:79â€“80."}, {"number": "108", "stem": "What is the most appropriate MRI descriptor for the below pattern of enhancement?", "options": [{"letter": "A", "text": "Homogeneous nonmass enhancement"}, {"letter": "B", "text": "Linear nonmass enhancement"}, {"letter": "C", "text": "Clustered ring nonmass enhancement"}, {"letter": "D", "text": "Clumped nonmass enhancement"}], "images": ["assets/q108_127-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C.\n\nâ€¢ Clustered ring nonmass enhancement is rings of enhancement â€œclusteredâ€ together representing periductal stromal enhancement. This is a suspicious finding and biopsy is warranted.\n\nâ€¢ Homogeneous nonmass enhancement demonstrates uniform, confluent enhancement in the area of interest.\n\nâ€¢ Linear nonmass enhancement as the name implies enhances in a linear fashion and is a suspicious finding warranting biopsy.\n\nâ€¢ Clumped nonmass enhancement is likened to â€œcobblestoneâ€ appearance with various shapes and sizes in the area of interest. This is a suspicious finding and biopsy recommendation is warranted.\n\nâ€¢ These descriptors are internal enhancement patterns and can be applied to any distributionâ€”linear, focal, segmental, regional, etc.\n\nReference: Morris EA, Comstock CE, Lee CH, et al. ACR BI-RADSÂ® magnetic resonance imaging. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:65, 67â€“71."}, {"number": "109", "stem": "Based on the morphology of the calcifications shown in the diagnostic magnified image, which BI-RADS assessment should be given in the report?", "options": [{"letter": "A", "text": "BI-RADS 2"}, {"letter": "B", "text": "BI-RADS 3"}, {"letter": "C", "text": "BI-RADS 4a"}, {"letter": "D", "text": "BI-RADS 4b"}, {"letter": "E", "text": "BI-RADS 4c"}], "images": ["assets/q109_127-2.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. These are fine linear and fine-linear branching. Their appearance suggests filling of the lumen of a duct or ducts involved irregularly by breast cancer. Among the suspicious calcifications, fine-linear and fine-linear branching calcifications have the highest PPV (70%). Therefore, these calcifications should be placed in BI-RADS assessment category 4C (PPV range >50% to <95%).\n\nReference: Morris EA, Comstock CE, Lee CH, et al. ACR BI-RADSÂ® mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:68â€“69."}, {"number": "110", "stem": "What is the most likely diagnosis for mass seen on the MRI below?", "options": [{"letter": "A", "text": "Invasive ductal carcinoma"}, {"letter": "B", "text": "Cyst"}, {"letter": "C", "text": "Fibroadenoma"}, {"letter": "D", "text": "Intramammary lymph node"}], "images": ["assets/q110_128-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B.\n\nâ€¢ Findings are consistent with a complicated, inflammatory cyst. The lesion demonstrates benign morphologic features as a circumscribed, round, T2 hypertintense, T1 hypointense mass with a thin rim of peripheral enhancement. An abscess could have a similar appearance but with more surrounding inflammatory changes.\n\nâ€¢ The differentiating factor for the remaining choices, invasive ductal carcinoma, fibroadenoma, and intramammary lymph node is that these entities demonstrate internal enhancement.\n\nâˆ˜ Invasive ductal carcinoma would also likely have more suspicious morphologic features such as an irregular shape and spiculated margins.\n\nâˆ˜ A typical fibroadenoma would have benign morphology similar to this case but would demonstrate homogeneous internal enhancement. Classic MR finding for fibroadenoma is thin, nonenhancing internal septations, although not present in the majority of fibroadenomas.\n\nâˆ˜ The key finding of an intramammary lymph node in addition to homogeneous enhancement is an eccentric or central fatty hilum.\n\nReferences: Molleran V, Mahoney MC. Breast MRI. Philadelphia, PA: Elsevier Saunders, 2014:62â€“65, 67â€“68, 75â€“76, 83.\n\nMorris EA, Comstock CE, Lee CH, et al. ACR BI-RADSÂ® magnetic resonance imaging. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:77â€“78."}, {"number": "111", "stem": "A patient presents with a palpable area of concern. Diagnostic mammography and targeted ultrasound reveal normal fibroglandular parenchyma. Incidentally noted is a separate finding, pictured below. What is the next best step in management?", "options": [{"letter": "A", "text": "As no mammographic or sonographic correlate is identified to correspond with the palpable abnormality, clinical management is recommended. The patient should return to annual mammographyâ€”BI-RADS 2."}, {"letter": "B", "text": "Short-interval 6-month sonographic follow-up should be preformed for the area of palpable concern as well as incidental finding (pictured)â€”BI-RADS 3."}, {"letter": "C", "text": "Clinical management is recommended for the area of concern and percutaneous biopsy if recommended for the incidental findingâ€”BI-RADS 4."}, {"letter": "D", "text": "Oncologic consultation is recommendedâ€”BI-RADS 5."}], "images": ["assets/q111_129-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The incidental finding is a round, hypoechoic mass with microlobulated margins. Even if an incidental finding, this appearance warrants a biopsy (hence, answer choice B is incorrect). Masses assigned a BI-RADS 3 category assessment must be oval in shape, circumscribed, and parallel in orientation. Answer choice A is incorrect as it does not provide an assessment and management recommendation for the incidental finding. Answer choice D is incorrect as oncologic management is not the appropriate recommendation. The mass should first be biopsied.\n\nReference: Morris EA, Comstock CE, Lee CH, et al. ACR BI-RADSÂ® ultrasound. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:44â€“47, 56; 129â€“130."}, {"number": "112", "stem": "A 63-year-old male presents with a palpable abnormality. Targeted ultrasound is preformed (shown below).", "options": [{"letter": "A", "text": "Clinical management as the area of palpable concern corresponds to a cyst with layering debrisâ€”BI-RADS 2."}, {"letter": "B", "text": "Clinical management. Although the area of palpable concern is a benign cyst with debris, aspiration could be performed for symptomatic reliefâ€”BI-RADS 2."}, {"letter": "C", "text": "Ultrasound-guided biopsy should be performed to target the solid component of the massâ€”BI-RADS 4."}, {"letter": "D", "text": "Ultrasound-guided biopsy should be performed to target the transition between normal breast tissue and the edge of the cystic portion of the massâ€”BI-RADS 4."}], "images": ["assets/q112_129-2.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. A simple cyst in a male should be viewed with suspicion and assigned a BI-RADS 4. Men generally do not undergo lobular development, and therefore, benign cystic disease typically does not occur in men. As in women, a complex cystic mass (such as the one pictured) should prompt biopsy. Solid nodules or papillary projections arising along a cyst wall are characteristic of papillary carcinoma (proven at pathology). Choices A and B are incorrect as a cystic mass should be biopsied in men and, although no color image are provided, a portion does not layer to suggest dependent debris. Choice D is incorrect as the solid portion of the mass should be sampled. Sampling the cystic portion may collapse the mass, making it more difficult to visualize during sampling.\n\nReferences: Lattin G, Jesinger R, Mattu R, et al. From the radiologic pathology archives: disease of the male breast: radiologic-pathologic correlation. RadioGraphics 2013;33(2):461â€“490.\n\nNguyen C, Kettler M, Swirsky M, et al. Male breast disease: pictorial review with radiologic-pathologic correlation. RadioGraphics 2013;33(3):763â€“780."}];
    const APP_ID = "breast-diagnostic-imaging-quiz-ch3";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nSource explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text).split("\n");
      paragraphs.forEach(paragraph => {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          y += lineHeight;
          return;
        }
        words.forEach(word => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
        }
        y += Math.round(lineHeight * 0.45);
      });
      return y;
    }

    function textCardDataUrl(title, body) {
      const width = 900;
      const padding = 46;
      const lineHeight = 34;
      const measure = document.createElement("canvas").getContext("2d");
      measure.font = "24px Arial";
      const estimateLines = Math.max(8, Math.ceil(String(body).length / 52) + String(body).split("\n").length * 2);
      const height = Math.min(2600, Math.max(900, 170 + estimateLines * lineHeight));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0f1218";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#17202d";
      ctx.fillRect(18, 18, width - 36, height - 36);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 18, width - 36, height - 36);
      ctx.fillStyle = "#eef2f7";
      ctx.font = "700 34px Arial";
      ctx.fillText(title, padding, 76);
      ctx.fillStyle = "#dbe5f2";
      ctx.font = "24px Arial";
      wrapCanvasText(ctx, body, padding, 130, width - padding * 2, lineHeight);
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
</body>
</html>
