  <style>
    :root {

    }

  <script>
    const QUESTIONS = [{"number": "1", "stem": "Based on this image, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Radial fold"}, {"letter": "B", "text": "Capsular contracture"}, {"letter": "C", "text": "Intracapsular rupture"}, {"letter": "D", "text": "Extracapsular rupture"}], "images": ["assets/q1_70-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The image shown to this question is an example of a reverse double-lumen implant with intracapsular rupture. The outer lumen is silicone (bright signal on the STIR water-saturated sequence) and the inner lumen is saline (dark signal on STIR water-saturated sequence). There is mixing of silicone and saline contents resulting in what has often been called as the â€œsalad oil sign.â€\n\nIntracapsular rupture of a double-lumen breast implant is the disruption or tear of an implant shell in which silicone gel moves outside of the implant shell but stays within the fibrous capsule. Intracapsular rupture is more commonly seen than extracapsular rupture. The image shown to this question is an example of a reverse dual-lumen implant with mixture of silicone (bright signal on the STIR water-saturated sequence) and saline (dark signal on STIR water-saturated sequence) contents that is often described as the â€œsalad oil signâ€ because of the\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:374â€“383.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:141â€“143."}, {"number": "2", "stem": "Which postconservation therapy change on MRI is considered a BI-RADS 4 finding and warrants tissue sampling to exclude recurrence?", "options": [{"letter": "A", "text": "Architectural distortion"}, {"letter": "B", "text": "Edema"}, {"letter": "C", "text": "Mass-like enhancement"}, {"letter": "D", "text": "Signal void or signal flare"}, {"letter": "E", "text": "Skin thickening"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Any mass-like enhancement, new or increasing areas of enhancement, or nonâ€“mass-like enhancement should be considered suspicious. Skin thickening, architectural distortion, resolving edema, signal voids, or signal flare from surgical or biopsy clips or from prior bleeding (hemosiderin) are considered benign postconservation therapy findings. The majority of these findings progressively decrease over time.\n\nReference: Drukteinis JS, Gombos EC, Raza S, et al. MR imaging assessment of the breast after breast conservation therapy: distinguishing benign from malignant lesions. RadioGraphics 2012;32:219â€“234."}, {"number": "3a", "stem": "Based on the following images, the dominant finding is:", "options": [{"letter": "A", "text": "Subareolar region nonâ€“mass-like enhancement"}, {"letter": "B", "text": "Enhancement of the pectoralis muscle"}, {"letter": "C", "text": "Unilateral skin thickening"}, {"letter": "D", "text": "Architectural distortion in the superior right breast"}], "images": ["assets/q3a_71-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The dominant finding in the images is unilateral right breast skin thickening most pronounced medial and lateral to the nipple. Skin thickening can be focal or diffuse and is defined as being >2 mm. However, in the periareolar region and inframammary folds, normal skin thickness may be up to 4 mm."}, {"number": "3b", "stem": "What would be an appropriate differential diagnosis for the previous finding?", "options": [{"letter": "A", "text": "Related to phase of menstrual cycle"}, {"letter": "B", "text": "Mastitis"}, {"letter": "C", "text": "Hormone therapy"}, {"letter": "D", "text": "Renal failure"}], "images": ["assets/q3a_71-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Differential diagnosis for skin thickening includes unilateral edema (focal or diffuse), mastitis, inflammatory carcinoma, postprocedural skin thickening, abscess, and underlying malignancy. Breast parenchymal enhancement may vary with the phase of the menstrual cycle, but skin thickening will not occur.\n\nReferences: Dâ€™Orsi C, Sickles EA, Mendelson EB, et al. ACR BI-RADSÂ® atlas mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:108â€“109.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:188â€“191.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:238."}, {"number": "4", "stem": "A 49-year-old female with no history of prior breast concerns or a family history of breast cancer presents with new-onset right bloody nipple discharge. Based on the ultrasound images below, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Intraductal carcinoma"}, {"letter": "B", "text": "Duct ectasia with debris"}, {"letter": "C", "text": "Fibrocystic change"}, {"letter": "D", "text": "Intraductal papilloma"}], "images": ["assets/q4_71-2.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The ultrasound images show an echogenic intraductal mass. Unilateral, spontaneous, serous, or bloody nipple discharge is a worrisome clinical finding and warrants imaging evaluation. Intraductal papillomas are epithelial proliferations of the duct, which usually have a central vascular stalk. The most common mass producing a bloody nipple discharge is a benign intraductal papilloma, with only 5% of women found to have malignancy at biopsy. The bloody nipple discharge is due to twisting of the papilloma on its fibrovascular stalk with subsequent infarction and bleeding. Some other causes of bloody nipple discharge are duct hyperplasia/ectasia, ductal carcinoma in situ (DCIS) or invasive cancer, and pregnancy because of rapidly proliferating breast tissue.\n\nCauses of nonbloody nipple discharge are:\n\nâ€¢ Clear or creamy color discharge: duct ectasia\n\nâ€¢ Green, white, blue, and black color discharge:\n\nâˆ˜ Cysts\n\nâˆ˜ Duct ectasia\n\nâ€¢ Milky color discharge:\n\nâˆ˜ Physiologic (neonatal)â€”rapid breast growth during adolescence\n\nâˆ˜ Endocrine (lactation, postlactation, pregnancy)\n\nâˆ˜ Tumor (prolactinoma or other prolactin-producing tumor)\n\nâˆ˜ Chronic nipple squeezing\n\nâˆ˜ Drugs (medications acting as dopamine receptor blockers or dopamine-depleting drugs)\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:409â€“419.\n\nStavros AT. Breast ultrasound. Philadelphia, PA: Lippincott Williams & Wilkins, 2004:157â€“160."}, {"number": "5a", "stem": "A 16-year-old female presents with a palpable finding in her right breast. What is the most appropriate imaging test?", "options": [{"letter": "A", "text": "Unilateral right mammogram"}, {"letter": "B", "text": "Bilateral mammogram"}, {"letter": "C", "text": "Unilateral right ultrasound"}, {"letter": "D", "text": "Bilateral ultrasound"}, {"letter": "E", "text": "Unilateral right mammogram and ultrasound"}], "images": ["assets/q5c_72-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The ACR Appropriateness Criteria recommends ultrasound be the initial imaging modality for evaluating palpable abnormalities in women that are breast-feeding, pregnant, and under 40 years of age. The reason for ultrasound as the initial test is that the risk of breast cancer is relatively low for women in their 40s and ultrasound may be more sensitive than mammography for women under age 40.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:206â€“383."}, {"number": "5b", "stem": "Which of the following statements regarding fibroadenomas is correct?", "options": [{"letter": "A", "text": "Giant fibroadenomas are more common in the Asian population."}, {"letter": "B", "text": "Most fibroadenomas in teenagers are adult type."}, {"letter": "C", "text": "Fibroadenomas are more common in postmenopausal women."}, {"letter": "D", "text": "Fibroadenomas can be found equally in males and females."}], "images": ["assets/q5c_72-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Major types of fibroadenomas are adult type and juvenile. Most fibroadenomas in teenagers are of the adult type. Giant fibroadenomas are more common in African American women. Giant fibroadenomas are defined as being >8 cm or larger in size. Fibroadenomas are the most common breast mass in women under 35 years of age. They comprise 10% of breast masses in postmenopausal women. They are present almost exclusively in females."}, {"number": "5c", "stem": "Based on the following image, what would be the most likely diagnosis?", "options": [{"letter": "A", "text": "Fat necrosis"}, {"letter": "B", "text": "Lymph node"}, {"letter": "C", "text": "Hematoma"}, {"letter": "D", "text": "Juvenile fibroadenoma"}], "images": ["assets/q5c_72-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Color Doppler ultrasound demonstrates a solid, hypoechoic, oval, circumscribed, vascular mass with long axis parallel to the skin surface that has an appearance of a fibroadenoma. The most common solid benign tumor in young female is a fibroadenoma. Juvenile fibroadenoma occurs usually between the age of 10 to 20, rare above the age of 45. Because juvenile fibroadenomas can grow to a large size, they can be called a giant fibroadenomas. However, not all giant fibroadenomas are juvenile fibroadenomas. The appearance of fat necrosis on ultrasound evolves over time. The sonographic spectrum can range from anechoic, echogenic, irregular hypoechoic mass and a complex cystic and solid mass. Lymph nodes will have an echogenic central vascular hilum on sonography.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:147â€“149, 199."}, {"number": "6", "stem": "Which benign lesion is most likely to demonstrate a classically malignant characteristic on MRI?", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Fat necrosis"}, {"letter": "C", "text": "Simple cyst"}, {"letter": "D", "text": "Hamartoma"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Like invasive ductal carcinomas, fat necrosis can demonstrate rim enhancement. Heterogeneous enhancement on MRI, including rim enhancement, is more characteristic of a malignant finding. Potential pitfalls for evaluation of rim-enhancing masses include benign entities such as an inflammatory cyst and benign fat necrosis. Invasive ductal carcinoma may exhibit other findings suggestive of malignancy such as nonuniform signal intensity with enhancing septations or central enhancement.\n\nHomogeneous enhancement and lack of enhancement are more suggestive of a benign finding. For example, hyalinized fibroadenomas may be nonenhancing. Another classic finding for fibroadenomas is dark internal septations. Simple cysts also do not demonstrate enhancement. Hamartomas are usually diagnostic mammographically, and MRI is generally not necessary for diagnosis. When imaged on MRI, the glandular elements within hamartomas show slight enhancement.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:292.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:127â€“129."}, {"number": "7a", "stem": "A 28-year-old, 38-week G2P1 female presents with a painful, erythematous mass in the right breast. Which imaging modality is most appropriate for evaluating this patient?", "options": [{"letter": "A", "text": "Mammogram"}, {"letter": "B", "text": "Ultrasound"}, {"letter": "C", "text": "MRI"}, {"letter": "D", "text": "Molecular breast imaging"}], "images": ["assets/q7b_73-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Ultrasound is the best modality for a pregnant female patient under 30 years old."}, {"number": "7b", "stem": "An image from a targeted ultrasound is shown.", "options": [{"letter": "A", "text": "Enlarged duct"}, {"letter": "B", "text": "Abscess"}, {"letter": "C", "text": "Malignancy"}, {"letter": "D", "text": "Hematoma"}], "images": ["assets/q7b_73-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Breast abscess, hematoma, and malignancy can all have similar appearances. The internal echoes and irregular thick walls may represent various entities in each process. History helps distinguish an abscess if there is increased redness, tenderness, warmth to the area, and skin thickening. A common presentation is a post- or peripartum female. A malignancy will likely have vascularity in the soft tissue components of a complex mass. Hematomas may present after a history of trauma to the breast.\n\nIf an abscess is the likely diagnosis, an attempt at aspiration and drainage is reasonable, although it is not entirely possible to determine whether the hypoechoic material can be aspirated or if it is phlegmonous material that cannot be drained through a needle.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:161â€“162.\n\nMahoney MC, et al. Breast emergencies: types, imaging features, and management. AJR Am J Roentgenol 2014;202:W390â€“W399.\n\nTrop I, et al. Breast abscesses: evidence-based algorithms for diagnosis, management and follow-up. RadioGraphics 2011;31:1683â€“1699."}, {"number": "8a", "stem": "Based on the following images, what would be the appropriate BI-RADS category?", "options": [{"letter": "A", "text": "BI-RADS 2"}, {"letter": "B", "text": "BI-RADS 3"}, {"letter": "C", "text": "BI-RADS 4"}, {"letter": "D", "text": "BI-RADS 5"}], "images": ["assets/q8a_73-2.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The images demonstrate round and smudgy calcifications on the CC view that have a curvilinear appearance on the ML view. These are representative of milk of calcium, which are benign. Milk of calcium is sedimented calcium oxalate calcifications within microcysts and dilated lobules."}, {"number": "8b", "stem": "What is the appropriate recommendation?", "options": [{"letter": "A", "text": "Annual screening mammography"}, {"letter": "B", "text": "Short-term follow-up in 6 months"}, {"letter": "C", "text": "Core needle biopsy"}, {"letter": "D", "text": "Surgical excisional biopsy"}], "images": ["assets/q8a_73-2.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Milk of calcium is a benign entity, and therefore, no further workup or intervention is necessary.\n\nReferences: Dâ€™Orsi C, Sickles EA, Mendelson EB, et al. ACR BI-RADSÂ® atlas mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:55â€“57.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:95â€“96."}, {"number": "9", "stem": "A 35-year-old female with a history of a left lumpectomy, radiation therapy, and chemotherapy at age 29 presents for her annual diagnostic mammogram. Based on the magnification images of the lumpectomy site, what is the most appropriate next step?", "options": [{"letter": "A", "text": "6-month follow-up"}, {"letter": "B", "text": "MRI"}, {"letter": "C", "text": "Stereotactic core biopsy"}, {"letter": "D", "text": "Annual screening mammogram"}, {"letter": "E", "text": "Annual diagnostic mammogram"}], "images": ["assets/q9_74-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. On initial review of the images, the pleomorphic microcalcifications near the lumpectomy bed are the most obvious finding. These were new compared to the prior study, and images of the prior study were not provided. The findings are concerning for malignancy; therefore, an annual screening mammogram, annual diagnostic mammogram, and 6-month follow-up are inappropriate. MRI may be beneficial after the biopsy is performed if there is a concern for multicentric disease. Of the answer choices provided, stereotactic core biopsy of the calcifications is the most appropriate answer.\n\nReference: Kopans D. Breast imaging, 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:967â€“969."}, {"number": "10a", "stem": "A 65-year-old female with a history of left mastectomy, contralateral prophylactic mastectomy, and bilateral TRAM flap reconstruction for left breast invasive ductal carcinoma and DCIS presents for surveillance breast MRI. Axial T1-weighted and axial postcontrast subtraction images are provided. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Recurrent invasive ductal carcinoma"}, {"letter": "B", "text": "Fat necrosis"}, {"letter": "C", "text": "Breast abscess"}, {"letter": "D", "text": "Postsurgical seroma"}], "images": ["assets/q10a_74-2.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B."}, {"number": "10b", "stem": "The patientâ€™s left mammogram is also shown. No prior mammogram is available for comparison at this time. What is the most appropriate BI-RADS classification?", "options": [{"letter": "A", "text": "BI-RADS 2, benign"}, {"letter": "B", "text": "BI-RADS 3, probably benign"}, {"letter": "C", "text": "BI-RADS 4, suspicious"}, {"letter": "D", "text": "BI-RADS 6, known malignancy"}], "images": ["assets/q10b_75-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Fat necrosis can have a variety of appearances on breast MRI. The most common is a fat-containing cyst, which may or may not have a fatâ€“fluid level within it. There is usually thin or thick rim enhancement, but this can also be absent. Enhancement can sometimes be seen for many years following surgery and can demonstrate persistent, plateau, or washout kinetics. Overall, an internal signal characteristic consistent with fat is key to diagnosis. Unenhanced T1 fat-saturated images can thus be very helpful. Fat necrosis can also present as a spiculated mass on MRI, mimicking new or recurrent malignancy when the macroscopic fat content is low. In these situations, biopsy may be necessary for diagnosis. On mammogram, fat necrosis can present as calcifications, usually curvilinear or eggshell but can mimic linear pleomorphic calcifications early in development. Fat necrosis can also present on mammography as lipid cysts, focal asymmetries, and spiculated masses.\n\nReferences: Dâ€™Orsi C, Sickles EA, Mendelson EB, et al. ACR BI-RADSÂ® atlas breast MRI. In: ACR BI-RADS Â® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:97â€“98.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:292.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:135â€“137."}, {"number": "11", "stem": "A 29-year-old female, who is 35 weeks pregnant, presents with a palpable lump in the right breast with associated pain. She denies any fevers. No skin erythema is seen on physical examination. Ultrasound images of the palpable lump are provided. No mammogram was performed because of patientâ€™s age and pregnancy. What is the most appropriate next step?", "options": [{"letter": "A", "text": "Probable abscess, treat with antibiotics and short-interval follow-up ultrasound."}, {"letter": "B", "text": "Probable abscess, recommend drainage/aspiration."}, {"letter": "C", "text": "Probably benign, lactating adenoma, or fibroadenoma, recommend short-interval follow-up ultrasound in 6 months."}, {"letter": "D", "text": "Suspicious mass, recommend ultrasound-guided core biopsy."}], "images": ["assets/q11_75-2.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Although this patient is quite young, this mass was indeed invasive ductal carcinoma. Breast cancer is uncommon in women in their 20s but can occur, with an annual risk of developing breast cancer of approximately 1/20,000 (as compared to 1/667 and 1/370 for women in their 40s and 50s, respectively). Breast cancer is one of the more common malignancies diagnosed during pregnancy. Although abscess would be reasonable to consider in a woman of this age, there is no clinical history of fever or breast erythema. In addition, although abscesses may have peripheral rim enhancement because of inflammation, internal flow, such as was seen in this case, should not be present. This mass was an invasive ductal carcinoma. Pregnancy should not prevent or delay workup of a suspicious mass. Excisional and core biopsies under local anesthesia are safe to perform during pregnancy.\n\nReferences: Kopans D. Breast imaging, 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:967â€“969:89, 579â€“603.\n\nLitton JK, Theriault RL, Gonzalez-Angulo AM. Breast cancer diagnosis during pregnancy. Womenâ€™s Health 2009;5(3):243â€“249.\n\nTrop I, Dugas A, David J, et al. Breast abscesses: evidence-based algorithms for diagnosis, management, and follow-up. RadioGraphics 2011;31:1683â€“1699.\n\nVashi R, Hooley R, Butler R, et al. Breast imaging of the pregnant and lactating patient: imaging modalities and pregnancyâ€“associated breast cancer. AJR Am J Roentgenol 2013;200:321â€“328."}, {"number": "12", "stem": "A 51-year-old female presents for a diagnostic mammogram. No prior studies are available for comparison. Based on images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "HIV"}, {"letter": "B", "text": "Tuberculosis"}, {"letter": "C", "text": "Metastases"}, {"letter": "D", "text": "Sarcoidosis"}, {"letter": "E", "text": "Rheumatoid arthritis"}], "images": ["assets/q12_76-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The relevant finding on these images is the unilateral axillary adenopathy on the left MLO image. The differential diagnosis for unilateral adenopathy includes metastases, mastitis, reactive adenopathy from inflammation, or silicone from an implant rupture or leak. The differential diagnosis for bilateral axillary adenopathy includes HIV, lymphoproliferative disorders such as lymphoma or leukemia, rheumatoid arthritis and other collagen vascular diseases, tuberculosis or sarcoidosis, and metastatic disease. This lymph node was biopsied and was consistent with metastases from ovarian carcinoma. The ovarian malignancy was known prior to the mammogram and was the reason this diagnostic mammogram was performed.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:422â€“424."}, {"number": "13a", "stem": "A 70-year-old female presents for breast MRI to assess for possible implant rupture. Bilateral axial T1-weighted and left breast axial T2-weighted STIR water saturation images are provided. What type of implant is present?", "options": [{"letter": "A", "text": "Saline, retroglandular"}, {"letter": "B", "text": "Saline, retropectoral"}, {"letter": "C", "text": "Silicone, prepectoral"}, {"letter": "D", "text": "Silicone, retropectoral"}], "images": ["assets/q13a_76-2.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C."}, {"number": "13b", "stem": "Which statement best describes the finding seen in the axial T2W STIR water-saturated image of the left implant?", "options": [{"letter": "A", "text": "Intact implant with normal radial folds"}, {"letter": "B", "text": "Intracapsular rupture only"}, {"letter": "C", "text": "Intact implant with capsular contracture"}, {"letter": "D", "text": "Intracapsular and extracapsular rupture"}], "images": ["assets/q13a_76-2.jpg", "assets/q13c_77-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. On the axial T1-weighted image, we can see the pectoral muscle clearly, indicating that this is a prepectoral implant. The second image is a water-saturated image, but the implant still has high signal, indicating that this is a silicone implant. The keyhole sign is present, consistent with intracapsular rupture. In addition, silicone is noted outside the implant capsule posterior, indicative of extracapsular rupture as well.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:357â€“384.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:140â€“151.\n\nSeiler SJ, Sharma PB, Hayes JC, et al. Multimodality imaging-based evaluation of single-lumen silicone breast implants for rupture. RadioGraphics 2017;37(2):366â€“382."}, {"number": "13c", "stem": "A 50-year-old female presents with a right breast palpable abnormality at 9 oâ€™clock. Based on the ultrasound image below, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Extracapsular silicone implant rupture"}, {"letter": "B", "text": "Intact silicone implant with a focal bulge"}, {"letter": "C", "text": "Intact saline implant with a focal bulge"}, {"letter": "D", "text": "Intracapsular silicone implant rupture"}, {"letter": "E", "text": "Saline implant rupture"}], "images": ["assets/q13c_77-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The classic appearance of an extracapsular silicone rupture on ultrasound is the snowstorm appearance, in which the extracapsular silicone creates dirty shadowing. The extracapsular silicone can form silicone granulomas, which may present as palpable masses. The presence of extracapsular silicone does imply that there is a simultaneous or preexisting intracapsular rupture, though this may not be visualized by ultrasound. On this single image, the extracapsular silicone is visualized by the dirty shadowing; however, the intracapsular rupture is not visualized.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:373â€“375.\n\nSeiler SJ, Sharma PB, Hayes JC, et al. Multimodality imaging-based evaluation of single-lumen silicone breast implants for rupture. RadioGraphics 2017;37(2):366â€“382."}, {"number": "14", "stem": "What is the protocol for performing a rolled craniocaudal (CC) lateral view?", "options": [{"letter": "A", "text": "Roll the superior portion of the breast toward the axilla and the inferior portion of the breast medially."}, {"letter": "B", "text": "Roll the superior portion of the breast medially and the inferior portion of the breast toward the axilla."}, {"letter": "C", "text": "Roll the medial portion of the breast superior and lateral portion of the breast inferior."}, {"letter": "D", "text": "Roll the lateral portion of the breast inferior and medial portion of the breast superior."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Sometimes, a suspicious finding is seen only on the CC view and not on the MLO or lateral views. Rolled CC views can be useful to determine whether a suspicious finding is real and if so, whether it is located in the upper or lower breast. For the rolled CC lateral (RL) view (top-rolled laterally), the technologist rolls the superior portion of the breast toward the axilla and the inferior portion of the breast medially. An upper breast mass should roll laterally with the rolled upper breast. A lower breast mass should roll medially with the lower breast tissue.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:44, 46â€“47."}, {"number": "15", "stem": "Screening and diagnostic mammograms of a 52-year-old female demonstrate a spiculated mass with a central lucent area. Core biopsy of the mass proved it to be a radial scar. Subsequently, surgical excision was performed. What specific type of breast cancer may coexist with radial scar?", "options": [{"letter": "A", "text": "Infiltrating lobular carcinoma"}, {"letter": "B", "text": "Inflammatory carcinoma"}, {"letter": "C", "text": "Medullary carcinoma"}, {"letter": "D", "text": "Tubular carcinoma"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Radial scar is one of the few benign lesions that can form spiculations that are indistinguishable from those formed by some cancers. Therefore, upon diagnosis, surgical excision is recommended. Tubular carcinoma can coexist with radial scar. Tubular carcinoma is a well-differentiated form of invasive ductal carcinoma. It makes up 0.6% of invasive breast cancers and 6% to 8% of all cancers (invasive plus DCIS). Although it is an invasive cancer, its differentiation results in the production of what appear to be poorly formed ductal structures consisting of haphazardly arranged tubules lined by a single layer of cuboidal epithelium. Although sometimes palpable, the lesions are frequently detected by mammography. They are slow growing and are usually very small when detected. Perhaps because of its differentiation, tubular cancer has a favorable prognosis with a low metastatic potential, and the axillary nodes are rarely involved.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:145â€“146.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:95â€“97."}, {"number": "16", "stem": "A 56-year-old female presents with a palpable mass in the right breast. Following workup and biopsy, pathologic diagnosis of the mass is invasive ductal carcinoma. A PET scan was performed showing no distal metastasis. Based on the subtracted T1-weighted MRI, what is the stage of this disease?", "options": [{"letter": "A", "text": "Stage I"}, {"letter": "B", "text": "Stage IIB"}, {"letter": "C", "text": "Stage IIIB"}, {"letter": "D", "text": "Stage IIIC"}, {"letter": "E", "text": "Stage IV"}], "images": ["assets/q16_78-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The MRI demonstrates an enhancing mass in the upper right axilla extending into the pectoralis muscle. This categorizes this patient as a T4. With no distant metastasis, the stage of this case is Stage IIIB.\n\n0\n\nTis\n\nN0\n\nM0\n\nIA\n\nT1*\n\nN0\n\nM0\n\nIB\n\nT0\n\nN1mi\n\nM0\n\nT1*\n\nN1mi\n\nM0\n\nIIA\n\nT0\n\nN1â€ \n\nM0\n\nT1*\n\nN1â€ \n\nM0\n\nT2\n\nN0\n\nM0\n\nIIB\n\nT2\n\nN1\n\nM0\n\nT3\n\nN0\n\nM0\n\nIIIA\n\nT0\n\nN2\n\nM0\n\nT1*\n\nN2\n\nM0\n\nT2\n\nN2\n\nM0\n\nT3\n\nN1\n\nM0\n\nT3\n\nN2\n\nM0\n\nIIIB\n\nT4\n\nN0\n\nM0\n\nT4\n\nN1\n\nM0\n\nT4\n\nN2\n\nM0\n\nIIIC\n\nAny T\n\nN3\n\nM0\n\nIV\n\nAny T\n\nAny N\n\nM1\n\n*Includes T1mi (microinvasion).\n\nâ€ T0 and T1 tumors with nodal micrometastases only are excluded from stage IIA and are classified as stage IB disease.\n\nTX\n\nPrimary tumor cannot be assessed\n\nT0\n\nNo evidence of primary tumor\n\nTis\n\nCarcinoma in situ (DCIS, LCIS, Paget disease of the nipple not associated with invasive carcinoma or carcinoma in situ in the underlying breast parenchyma)\n\nT1\n\nTumor â‰¤20 mm\n\nT1mi\n\nTumor â‰¤1 mm\n\nT1a\n\nTumor >1 mm but â‰¤5 mm\n\nT1b\n\nTumor >5 mm but â‰¤10 mm\n\nT1c\n\nTumor >10 mm but â‰¤20 mm\n\nT2\n\nTumor >20 mm but â‰¤50 mm\n\nT3\n\nTumor >50 mm\n\nT4\n\nTumor of any size with direct extension to the chest wall and/or to the skin (ulceration or skin nodules)*\n\nT4a\n\nExtension to the chest wallâ€ \n\nT4b\n\nUlceration, ipsilateral satellite nodules, and/or edema of the skin (including peau dâ€™orange)â€¡\n\nT4c\n\nT4a and T4b\n\nT4d\n\nInflammatory carcinoma\n\nDCIS, ductal carcinoma in situ; LCIS, lobular carcinoma in situ.\n\n*Invasion of the dermis alone does not qualify.\n\nâ€ Pectoralis muscle adherence/invasion alone does not qualify.\n\nâ€¡Not meeting the criteria for inflammatory breast cancer (IBC).\n\nNX\n\nRegional lymph nodes cannot be assessed\n\nN0\n\nNo regional lymph node metastases\n\nN1\n\nMetastases to movable ipsilateral level Iâ€“II axillary lymph nodes\n\nN2\n\nMetastases in ipsilateral level Iâ€“II axillary lymph nodes that are clinically â€œfixedâ€ (matted) or in clinically detected* ipsilateral internal mammary nodes in the absence of clinically evident axillary lymph node metastases\n\nN2a\n\nMetastases in ipsilateral level Iâ€“II axillary lymph nodes malted to one another or to other structures\n\nN2b\n\nMetastases only in clinically detected* ipsilateral internal mammary nodes in the absence of clinically evident level Iâ€“II axillary lymph node metastases\n\nN3\n\nMetastases in ipsilateral infraclavicular (level III) lymph nodes with or without level Iâ€“II axillary lymph node involvement, in clinically detected* ipsilateral internal mammary lymph nodes with clinically evident level Iâ€“II axillary lymph node metastases, or in ipsilateral supraclavicular lymph nodes with or without axillary or internal mammary lymph node involvement\n\nN3a\n\nMetastases in ipsilateral infraclavicular lymph nodes\n\nN3b\n\nMetastases in ipsilateral axillary and internal mammary lymph nodes\n\nN3c\n\nMetastases in ipsilateral supraclavicular lymph nodes\n\n*Detected at imaging studies (excluding lymphoscintigraphy) and confirmed with fine-needle aspiration biopsy, core biopsy, or clinical examination, having characteristics that are highly suspicious for malignancy.\n\nM0\n\nNo clinical or radiographic evidence of distant metastases\n\ncM0 (i+)\n\nNo clinical or radiographic evidence of distant metastases, but deposits of molecularly or microscopically detected tumor cells in circulating blood, bone marrow, or other nonregional nodal tissue that are no larger than 0.2 mm in a patient without symptoms or signs of metastases\n\nM1\n\nDistant detectable metastases as determined by classic clinical and radiographic means or histologically proved to be larger than 0.2 mm\n\nReferences: Harvey JA, March DE. Making the diagnosis: a practical guide to breast imaging. Philadelphia, PA: Elsevier, 2013:447â€“452.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:322â€“324.\n\nLee SC, Jain PA, Jethwa SC, et al. Radiologistâ€™s role in breast cancer staging: providing key information for clinicians. RadioGraphics 2014;34(2):330â€“342."}, {"number": "17", "stem": "A 56-year-old woman presents for a screening mammogram. Based on the two standard mammographic views A and B, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Lymph node"}, {"letter": "B", "text": "Invasive ductal carcinoma"}, {"letter": "C", "text": "Radial scar"}, {"letter": "D", "text": "Inframammary fold"}, {"letter": "E", "text": "Sternalis muscle"}], "images": ["assets/q17_78-2.jpg"], "explanationImages": ["assets/a17_137-1.jpg"], "answer": "E", "explanation": "Answer E. The image on the craniocaudal view shows the sternalis muscle (see image below with arrow pointing to the sternalis muscle).\n\nThe sternalis muscle is best seen only on the CC view as a well-defined mass in the posterior medial breast measuring typically 3 to 15 mm with smooth, round, or bulging contours. Depending on the amount of traction placed on the medial breast, it may or may not be seen on prior or subsequent exams. Because the medial breast tissue is a potential blind spot on MLO projection, the sternalis muscle is not identified on the MLO view. It is a thin accessory muscle in the chest that runs in a craniocaudal direction, parallel and adjacent to the sternum. The reported prevalence of the sternalis muscle ranges from 1% to 11% and varies by population. It can be seen bilaterally but more commonly presents unilaterally. The sternalis muscle is a normal variant that can mimic breast pathology. Confirmatory imaging with CT or MRI may corroborate the presence of this muscle.\n\nReferences: Demirpolat G, Oktay A, Bilgen I, et al. Mammographic features of the sternalis muscle. Diagn Interv Radiol 2010;16:276â€“278.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:33â€“36."}, {"number": "18", "stem": "You are shown a standard screening mammogram. What is the most appropriate next step?", "options": [{"letter": "A", "text": "1-year follow-up"}, {"letter": "B", "text": "6-month follow-up"}, {"letter": "C", "text": "Spot magnification views"}, {"letter": "D", "text": "MRI"}], "images": ["assets/q18_79-1.jpg"], "explanationImages": ["assets/a18_138-1.jpg"], "answer": "C", "explanation": "Answer C. There is an area of architectural distortion with associated calcifications in the upper outer quadrant of the right breast at middle to posterior depth that requires further evaluation. Spot compressionâ€“magnification views and targeted ultrasound can further define this finding.\n\nReferences: CardeÃ±osa G. Breast imaging companion, 4th ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2017:67â€“102.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:132â€“136."}, {"number": "19a", "stem": "A 76-year-old male presents with a painless palpable breast lump. Based on the mammograms A and B, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Abscess"}, {"letter": "B", "text": "Hematoma"}, {"letter": "C", "text": "Mastitis"}, {"letter": "D", "text": "Breast carcinoma"}, {"letter": "E", "text": "Gynecomastia"}], "images": ["assets/q19a_79-2.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The mammogram images show an irregular mass at approximately 3 oâ€™clock middle depth of the left breast corresponding to the area of palpable abnormality, indicated by a triangular skin marker. The finding is most suspicious for a breast cancer. The most common presentation of breast cancer in men is a painless or tender palpable breast mass, classically eccentric to the nipple. The subareolar region is the most common site of involvement. Invasive ductal carcinoma is the most common type of cancer in men, accounting for 99% of cases. Imaging findings and staging are the same as in women. Breast cancer in males is rare and accounts for approximately 1% of all breast cancers.\n\nReferences: CardeÃ±osa G. Clinical breast imaging: a patient focused teaching file. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:308â€“309.\n\nWeiss JR, et al. Epidemiology of male breast cancer. Cancer Epidemiol Biomarkers Prev 2005;14:20â€“26."}, {"number": "19b", "stem": "Approximately what percentage of all breast cancers occurs in males?", "options": [{"letter": "A", "text": "1%"}, {"letter": "B", "text": "5%"}, {"letter": "C", "text": "10%"}, {"letter": "D", "text": "15%"}], "images": ["assets/q19a_79-2.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Male breast cancers accounts for <1% of all cancers found in men and is usually diagnosed at or around the age of 60 years old. Most common breast cancer in men is invasive ductal carcinoma. Male breast cancer has the same prognosis as breast cancer in women but is often detected at a higher stage than in women because of a delay in diagnosis. Risk factors for breast cancer are Klinefelter syndrome, high estrogen levels such as from prostate cancer treatment, and development of mumps orchitis at an older age.\n\nReferences: American Cancer Society. Cancer facts & figures 2012. Atlanta, GA: American Cancer Society, 2012.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:397â€“400."}, {"number": "20", "stem": "A 55-year-old patient underwent a bilateral breast MRI screening exam because of strong family history of breast cancer. Based on the subtracted T1-weighted image shown from the study, what is the next best step in management?", "options": [{"letter": "A", "text": "Routine annual screening mammogram"}, {"letter": "B", "text": "Six-month follow-up mammographic imaging"}, {"letter": "C", "text": "Second-look ultrasound with biopsy if finding is seen"}, {"letter": "D", "text": "Surgical consultation"}], "images": ["assets/q20_80-1.jpg"], "explanationImages": ["assets/a20_139-1.jpg"], "answer": "C", "explanation": "Answer C. Second-look ultrasound with biopsy if finding is seen. An enhancing mass is seen in the outer central left breast on a screening MRI.\n\nSecond-look ultrasound is recommended as an additional targeted breast exam to further identify and evaluate a finding seen on breast MRI. Second-look is a term used even when there was no initial ultrasound. Ultrasound biopsy is more accessible and efficient and has less patient discomfort over MRI biopsy; thus, if suspicious lesion initially seen on MRI can be visualized under ultrasound, then an ultrasound-guided core biopsy can be performed.\n\nReference: Park VY, et al. Second-look ultrasound: how to find breast lesions with a suspicious MR imaging appearance. RadioGraphics 2013;33:1361â€“1375."}, {"number": "21", "stem": "A 56-year-old female arrives to the mammography department and tells the technologist that she feels a lump in the right upper outer breast. Upon diagnostic workup, several bilateral masses were visualized. The masses were oval in shape and similar in size, and >80% of the margins were visualized. Upon review of prior studies, similar findings were seen 3 years prior. What is the appropriate BI-RADS category?", "options": [{"letter": "A", "text": "BI-RADS 0"}, {"letter": "B", "text": "BI-RADS 2"}, {"letter": "C", "text": "BI-RADS 3"}, {"letter": "D", "text": "BI-RADS 4"}, {"letter": "E", "text": "BI-RADS 6"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Study is incomplete. Additional imaging evaluation is recommended. Although bilateral similar-appearing masses are considered benign, the patient presented with a palpable lump. Complete diagnostic workup of a palpable lump would include an ultrasound of the palpable area.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:55â€“56.\n\nParikh JR, Bassett LE, Mahoney MC, et al. Expert panel on breast imaging. ACR appropriateness criteria palpable breast masses. Reston, VA: American College of Radiology, 2009."}, {"number": "22", "stem": "Among the choices given below, what is the most common malignancy to metastasize to the breast?", "options": [{"letter": "A", "text": "Lung"}, {"letter": "B", "text": "Ovarian"}, {"letter": "C", "text": "Melanoma"}, {"letter": "D", "text": "Pancreatic"}, {"letter": "E", "text": "Stomach"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Melanoma is the most common nonbreast malignancy to metastasize to the breast. Primary breast malignancy is much more common.\n\nReferences: Arora R, Robinson W. Breast metastases from malignant melanoma. J Surg Oncol 1992;50:27â€“29.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:239."}, {"number": "23", "stem": "A 65-year-old male with history of coronary artery bypass surgery, thyroid disease, and depression presents with painful, tender subareolar masses. What is the best next step, based on the provided mammographic images?", "options": [{"letter": "A", "text": "Ultrasound"}, {"letter": "B", "text": "Breast MRI"}, {"letter": "C", "text": "Obtaining careful drug history"}, {"letter": "D", "text": "Spot compression views"}, {"letter": "E", "text": "Biopsy and cytological analysis"}], "images": ["assets/q23_81-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. This patientâ€™s clinical and mammographic findings are consistent with unilateral gynecomastia in the left breast. Therefore, no further imaging or intervention is needed at this point. The left mediolateral oblique mammograms demonstrate fan- or flame-shaped densities, emanating from nipples and blending into surrounding fat. In a large series by Gunhan-Bilgen et al., gynecomastia was unilateral in 45% ad bilateral in 55%. Broad category of conditions can cause gynecomastia, one of which is drug related. In this patient with multiple comorbidities, obtaining a full past medical and drug history is crucial. This patient was on prednisone, Zoloft, and a tricyclic antidepressant, all of which are listed as causes of drug-induced gynecomastia. Hyper-/hypothyroidism, liver disease, renal failure, COPD, and diabetes are physiologic causes of gynecomastia. Hormonal causes of gynecomastia include estrogen therapy, testicular failure, hypogonadism, and Klinefelter syndrome.\n\nTypes of gynecomastia:\n\nPseudogynecomastiaâ€”fatty proliferation of the breasts without proliferation of glandular tissue that simulates gynecomastia\n\nDendriticâ€”prominent radiating extensions on mammography\n\nNodularâ€”fan-shaped triangular density on mammography\n\nDiffuseâ€”diffuse density on mammography\n\nReferences: Bembo SA, Carlson HE. Gynecomastia: its features, and when and how to treat it. Cleve Clin J Med 2004;71(6):511â€“517.\n\nBerg WA, Birdwell R, Gombos EC, et al. Diagnostic imaging: breast. Salt Lake City, UT: Amirsys, 2006:IV:5-50â€“IV:5-52.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:397â€“402."}, {"number": "24", "stem": "Patient was diagnosed with right breast cancer and elected to undergo bilateral mastectomies with DIEP (deep inferior epigastric perforator) reconstructions. She now presents to her surgeon with persistent right breast skin thickening and heaviness. A bilateral breast MRI with contrast was ordered. Selected images from that examination are shown.", "options": [{"letter": "A", "text": "Postoperative seroma"}, {"letter": "B", "text": "Fat necrosis"}, {"letter": "C", "text": "Recurrent tumor"}, {"letter": "D", "text": "Flap edema"}], "images": ["assets/q24_82-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The right breast demonstrates skin thickening and increased T2 signal consistent with edema. There is no enhancement of the skin or underlying tissues on postcontrast images to suggest recurrence.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:414â€“419.\n\nKang BL, Jung JI, Park C, et al. Breast MRI findings after modified radical mastectomy and transverse rectus abdominis myocutaneous flap in patients with breast cancer. J Magn Reson Imaging 2005;21:784â€“791.\n\nPeng C, Chang CB, Tso HH, et al. MRI appearance of tumor recurrence in myocutaneous flap reconstruction after mastectomy. AJR Am J Roentgenol 2011;196:W471â€“W475."}, {"number": "25", "stem": "Regarding fibrocystic changes, which of the following is a correct statement?", "options": [{"letter": "A", "text": "They are more common in patients younger than 30 years of age."}, {"letter": "B", "text": "These changes enhance homogenously on T1-weighted sequence of breast MRI."}, {"letter": "C", "text": "Thick peripheral enhancement suggests simple cyst."}, {"letter": "D", "text": "Cysts originate from terminal lobules."}, {"letter": "E", "text": "Size of the cysts gets bigger with time."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Fibrocystic change is a common benign breast finding in premenopausal women. The cysts originate from terminal lobules. They appear anechoic on ultrasound and have high T2 signal intensity, and without enhancement or thick peripheral enhancement on MRI. The fluctuation of the size of the cysts is common.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:284."}, {"number": "26a", "stem": "A 31-year-old female presents with a palpable lump in the upper left breast. Her mother was diagnosed with breast cancer at age 46. Targeted ultrasound of the area of palpable abnormality was performed. What is the most likely diagnosis based on the ultrasound finding?", "options": [{"letter": "A", "text": "Complicated cyst"}, {"letter": "B", "text": "Fibroadenoma"}, {"letter": "C", "text": "Invasive ductal carcinoma"}, {"letter": "D", "text": "Phyllodes tumor"}, {"letter": "E", "text": "Simple cyst"}], "images": ["assets/q26a_83-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Typical ultrasound features of a fibroadenoma include circumscribed or gently lobulated oval hypoechoic mass, parallel to skin surface.\n\nA. A complicated cyst is a cyst containing internal echoes and/or thin internal septations on ultrasound. This mass is a solid mass with no cystic features.\n\nC. Invasive ductal carcinoma is a malignant solid lesion, which most commonly presents as a shadowing solid mass with angular or spiculated margins, antiparallel to the chest wall.\n\nD. Phyllodes tumor is usually a large solid mass with low-level internal echoes and small fluid-filled spaces or cysts, which are typically seen in middle-age patients.\n\nE. Simple cysts are anechoic with posterior acoustic enhancement.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:414â€“419.\n\nKopans D. Breast imaging, 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:147â€“149."}, {"number": "26b", "stem": "What are the typical MRI features of this mass, if this patient had a breast MRI done?", "options": [{"letter": "A", "text": "Enhancing mass with nonenhancing internal septations"}, {"letter": "B", "text": "Low T1-weighted and high T2-weighted signal intensity with no enhancement"}, {"letter": "C", "text": "Multiple small fluid intensity components within a heterogeneous mass"}, {"letter": "D", "text": "Type 3 enhancement kinetic curve"}, {"letter": "E", "text": "Signal loss on fat-saturated sequences"}], "images": ["assets/q26a_83-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Fibroadenomas are typically oval circumscribed enhancing masses with variable enhancement and may contain nonenhancing dark internal septations.\n\nB. This choice describes typical MRI appearance of a simple cyst.\n\nC. This choice describes typical MRI appearance of a phyllodes tumor.\n\nD. Type 3 curves with rapid uptake followed by washout correspond with cancer in 87% of lesions.\n\nE. Fat-containing lesions such as fat necrosis demonstrate signal loss on fat-saturated sequences.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:286â€“289."}, {"number": "27a", "stem": "A patient is called back for additional views for a one-view finding on screening mammography in the central breast on the craniocaudal (CC) view. The asymmetry persists on spot compression views but is not seen on either the mediolateral oblique (MLO) or the true lateral projection. What is the next best step?", "options": [{"letter": "A", "text": "Perform ultrasound of the 12:00 and 6:00 positions, as well as the retroareolar plane."}, {"letter": "B", "text": "Request the patient to return for a short-interval follow-up in 6 months."}, {"letter": "C", "text": "Recommend a breast MRI."}, {"letter": "D", "text": "Perform rolled views."}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D."}, {"number": "27b", "stem": "Rolled views were performed. On the CC rolled lateral (CC RL) view, the lesion moves laterally. This indicates that:", "options": [{"letter": "A", "text": "The lesion is in the superior breast."}, {"letter": "B", "text": "The lesion is in the inferior breast."}, {"letter": "C", "text": "The lesion is in the central breast."}, {"letter": "D", "text": "The lesion location cannot be determined based on the information provided."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Rolled views are useful for determining the location of a lesion seen only in the CC projection. The top of the breast can be rolled laterally or medially, and the technologist should label the image appropriately to indicate which way the breast was rolled (CC RL, craniocaudal view rolled lateral, and CC RM, craniocaudal view rolled medial, respectively). If the top of the breast is rolled laterally and the lesion moves laterally, then it can be inferred that it is located in the superior breast. Conversely, if the lesion moves medially on the CC RL view, it can be inferred it is in the inferior breast. Although ultrasound can be performed to locate a one-view finding, it is best to perform the rolled views first to more accurately determine the location to be evaluated sonographically.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:57.\n\nKopans DB. Breast imaging, 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:766â€“772."}, {"number": "28a", "stem": "You are shown a screening mammogram and CC and MLO projection magnification views. What is the most appropriate BI-RADS designation?", "options": [{"letter": "A", "text": "Category 0"}, {"letter": "B", "text": "Category 2"}, {"letter": "C", "text": "Category 3"}, {"letter": "D", "text": "Category 5"}], "images": ["assets/q28a_84-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Mammographic images demonstrate a classic breast hamartoma with a â€œbreast-in-breastâ€ appearance. Hamartomas are benign breast lesions containing fat, fibrous connective tissue, and varying amounts of disorganized glandular tissue. Routine annual mammogram is appropriate, and this should be given a BI-RADS category 2â€”benign finding category assessment. Cancers can develop in a hamartoma because cancer develops in breast epithelial elements and ducts. Biopsy should be performed on hamartomas only if they contain suspicious microcalcifications or masses within them.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:157, 160.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:145â€“146."}, {"number": "28b", "stem": "What is the most likely diagnosis for an encapsulated mass with â€œbreast-within-a-breastâ€ appearance on mammogram?", "options": [{"letter": "A", "text": "Fat necrosis"}, {"letter": "B", "text": "Fibroadenoma"}, {"letter": "C", "text": "Fibroadenolipoma"}, {"letter": "D", "text": "Galactocele"}, {"letter": "E", "text": "Lipoma"}], "images": ["assets/q28a_84-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Fibroadenolipoma or hamartoma of the breast was first described in 1971 as a benign proliferation of fibrous, glandular, and fatty tissue surrounded by a thin capsule of connective tissue. Its appearance has led some to describe it with the key term â€œbreast-within-a-breast.â€ The majority of these lesions occur in women over 35 years of age. At mammography, they are typically well-circumscribed, round to oval masses containing both fat and soft tissue density with a thin, radiopaque pseudocapsule that becomes visible around a portion of the mass when fat is present on both sides. None of the other answer choices fit the described keywords. Be aware that because these lesions are made up of otherwise normal breast tissue, breast cancer of any type can arise in hamartomas.\n\nReferences: CardeÃ±osa G. Clinical breast imaging: a patient focused teaching file. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:200.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:157, 160."}, {"number": "29a", "stem": "A 50-year-old female presents for a screening mammogram.", "options": [{"letter": "A", "text": "Intracapsular rupture"}, {"letter": "B", "text": "Capsular calcification"}, {"letter": "C", "text": "Distortion of the implant contour"}, {"letter": "D", "text": "Free silicone with intracapsular and extracapsular rupture of the implant"}], "images": ["assets/q29a_85-1.jpg"], "explanationImages": ["assets/a29a_142-1.jpg"], "answer": "D", "explanation": "Answer D.\n\nThe high-density material in the breast tissues, outside of the right breast implant, indicates free silicone (shown by the red arrows). The silicone is much more uniformly dense than the surrounding fibroglandular tissue. Free silicone indicates implant compromise and can only occur with both intracapsular and extracapsular rupture. If there was only intracapsular rupture of the implant shell, the silicone would likely have been contained by the fibrous capsule without definitive mammographic evidence of the implant integrity abnormality. Implant contour irregularity is an unreliable sign of rupture.\n\nNo mass is present in this case, although free silicone can eventually lead to a silicone granuloma. Calcifications around the implant can often be seen, although the important finding in this case is the free silicone.\n\nExtracapsular implant rupture may be seen on MR, mammography, and ultrasound."}, {"number": "29b", "stem": "What is the BI-RADS assessment?", "options": [{"letter": "A", "text": "0"}, {"letter": "B", "text": "2"}, {"letter": "C", "text": "3"}, {"letter": "D", "text": "4"}], "images": ["assets/q29a_85-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Although a mammographic abnormality is identified, the ruptured implant with resultant free silicone in the breast tissue does not indicate a malignancy. BI-RADS assessment is for evidence of malignancy, which there is not in this case.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:367â€“371.\n\nJuanpere S, et al. Imaging of breast implantsâ€”a pictorial review. Insights Imaging 2011;2(6):653â€“670."}, {"number": "30", "stem": "Which of the following is a high-risk lesion?", "options": [{"letter": "A", "text": "Phyllodes tumor"}, {"letter": "B", "text": "Diabetic mastopathy"}, {"letter": "C", "text": "Fibroadenolipoma"}, {"letter": "D", "text": "Pseudoangiomatous stromal hyperplasia (PASH)"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. High-risk lesions account for 3% to 9% of all breast core needle biopsies. There is controversy regarding whether some of these lesions require surgical excisional biopsy. There is almost universal agreement that atypical ductal hyperplasia (ADH) and phyllodes tumor require surgical excision. Although most phyllodes tumors are generally benign, there are a small percentage of malignant forms that are diagnosed only by complete histologic examination. Phyllodes tumor tends to recur in the biopsy site and should be completely excised. ADH is a proliferative ductal lesion that typically presents as microcalcifications on mammography and has been associated with a four- to fivefold increased risk of malignancy. ADH has an upgrade rate to DCIS or invasive ductal carcinoma of at least 11.1% to up to 56% in multiple published studies.\n\nDiabetic mastopathy is a benign process with no known malignant potential; therefore, these patients can be followed rather than undergoing surgical excision.\n\nA fibroadenolipoma, also known as a hamartoma, and is a benign mass that contains fat and normal parenchymal fibroglandular tissue. It is not considered a high-risk lesion and a classic hamartoma can usually be left alone. Cancer can develop in a hamartoma because it contains breast epithelial elements and ducts. Biopsy should be performed in a hamartoma if it contains suspicious microcalcifications or masses.\n\nPseudoangiomatous stromal hyperplasia (PASH) is a rare benign cause of an ill-defined noncalcified round or oval breast mass. It occurs in premenopausal or postmenopausal women that are receiving exogenous hormone therapy. Because a low-grade angiosarcoma can mimic PASH on core biopsy, excisional biopsy is recommended if the mass grows.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:156â€“157; 236â€“243; 430."}, {"number": "31", "stem": "A 57-year-old female presents with a new palpable left breast mass that she states has grown rapidly over a period of <4 months. Her last screening mammogram was 6 months ago and interpreted as negative. Images from her most recent left breast diagnostic mammogram and ultrasound are shown.", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Hamartoma"}, {"letter": "C", "text": "Metaplastic carcinoma"}, {"letter": "D", "text": "Tubular adenoma"}], "images": ["assets/q31_86-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The history of a rapidly growing mass in a postmenopausal female with the above imaging characteristics is most likely a metaplastic carcinoma.\n\nReferences: Gunhan-Bilgen I, Aysenur M, Ustun EE, et al. Metaplastic carcinoma of the breast: clinical, mammographic and sonographic findings with histopathologic correlation. AJR Am J Roentgenol 2002;178:1421â€“1425.\n\nIrshad A, Ackerman S, Pope T, et al. Rare breast lesions: correlation of imaging and histologic features with WHO classification. RadioGraphics 2008;28:1399â€“1414.\n\nLeddy R, Irshad I, Rumboldt T, et al. Review of metaplastic carcinoma of the breast: imaging findings and pathologic features. J Clin Imaging Sci 2012;2:21."}, {"number": "32", "stem": "A 45-year-old female with a history of type I diabetes presents with multiple palpable right breast masses that are firm on exam. Diagnostic imaging of the right breast was performed. Mammogram and ultrasound are shown.\n\nAll of the masses were similar in appearance sonographically so a single mass was selected to sample under ultrasound guidance. Pathology demonstrates fibrous stromal proliferation and perivascular lymphocytic infiltrate consistent with diabetic mastopathy. The correct radiologic/pathologic correlation is:", "options": [{"letter": "A", "text": "Concordant; excision recommended"}, {"letter": "B", "text": "Concordant; clinical follow-up recommended"}, {"letter": "C", "text": "Discordant; excision recommended"}, {"letter": "D", "text": "Discordant; repeat biopsy recommended"}], "images": ["assets/q32_87-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The histopathologic findings at core biopsy are consistent with diabetic mastopathy in a patient with a known history of diabetes. Diabetic mastopathy is a benign process with no known malignant potential; therefore, these patients can be followed rather than undergoing surgical excision.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:430.\n\nSakuhara Y, Shinozaki T, Hozumi Y, et al. MR imaging of diabetic mastopathy. AJR Am J Roentgenol 2002;179:1201â€“1203.\n\nWong KT, Tse GMK, Yang WT. Ultrasound and MR imaging of diabetic mastopathy. Clin Radiol 2002;57:730â€“735."}, {"number": "33", "stem": "What is the most common pleural presentation of breast cancer?", "options": [{"letter": "A", "text": "Pleural effusion"}, {"letter": "B", "text": "Pleural-based soft tissue nodules"}, {"letter": "C", "text": "Round atelectasis"}, {"letter": "D", "text": "Pleural and pulmonary metastatic nodules"}, {"letter": "E", "text": "Interstitial reticulonodular changes extending to the pleura"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. The most common pleural presentation of breast cancer is malignant pleural effusion. In fact, thoracentesis with cytology can be performed to help diagnose metastatic disease.\n\nReference: Banerjee AK, Willetts I, Robertson JF, et al. Pleural effusion in breast cancer: a review of the Nottingham experience. Eur J Surg Oncol 1994;20(1):33â€“36."}, {"number": "34", "stem": "Shown below is a targeted ultrasound image of a 48-year-old female with clinical presentation of spontaneous left nipple yellow-colored discharge. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Duct ectasia"}, {"letter": "B", "text": "Ductal carcinoma in situ"}, {"letter": "C", "text": "Papilloma"}, {"letter": "D", "text": "Papillary carcinoma"}, {"letter": "E", "text": "Paget disease of the nipple"}], "images": ["assets/q34_88-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Duct ectasia is nonspecific ectatic dilatation of the major collecting ducts that can be seen by mammography and ultrasound as tubular structures beneath the nipple. Ectatic ducts may be found deeper in the breast as well. The etiology of duct ectasia has not been clearly elucidated. Duct ectasia may present clinically by nipple discharge or bleeding.\n\nB. Ductal carcinoma in situ (DCIS) usually appears as a dilated duct with indistinct walls on ultrasound. Isolated single or multiple dilated duct(s) is an uncommon presentation of DCIS.\n\nC. The most common cause of a unilateral, single-duct discharge is a large duct papilloma. These are benign hyperplastic growths with a fibrovascular core. They have no known predisposition toward malignancy and usually occur within a few centimeters of the nipple, in the large ducts. The discharge from a papilloma may be serous or sanguineous. Although papilloma cases often present with spontaneous bloody nipple discharge, there is no intraductal mass on the presented ultrasound to suggest papilloma.\n\nD. Papillary carcinoma usually presents as a complex cystic and solid mass in elderly patients. No mass is identified in this case.\n\nE. These patients usually present with serous or bloody nipple discharge, with nipple and areolar thickening. Paget disease per se is not identifiable on ultrasound.\n\nReferences: Berg WA, Birdwell RL, eds. Diagnostic Imaging: Breast. Salt Lake City, UT: Amirsys, 2008:IV:1-45â€“IV:1-46.\n\nKopans DB. Breast imaging, 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:792â€“794."}, {"number": "35", "stem": "A 44-year-old female presents for additional views of an abnormality seen on screening mammography. Spot compression CC and MLO views are shown in images A and B. Prior comparison mammogram was negative in this location. Focused ultrasound was performed and demonstrates no sonographic abnormality. What is the most appropriate BI-RADS category given that the finding is not seen on ultrasound?", "options": [{"letter": "A", "text": "0, incomplete, breast MRI recommended"}, {"letter": "B", "text": "2, benign, return to screening in 1 year"}, {"letter": "C", "text": "3, probably benign, 6-month follow-up mammogram recommended"}, {"letter": "D", "text": "4, suspicious, biopsy is recommended"}], "images": ["assets/q35_88-2.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The spot views demonstrate an irregular mass with indistinct margins. Per history, the prior mammogram was negative in this location. The absence of a sonographic correlate should not prevent biopsy of a suspicious finding on mammography. Stereotactic core biopsy can be used to biopsy masses and focal asymmetries in addition to the more common indication of calcifications. This mass was an invasive ductal carcinoma.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:122â€“170."}, {"number": "36", "stem": "What is the diagnosis based on the following images?", "options": [{"letter": "A", "text": "Intracapsular implant rupture"}, {"letter": "B", "text": "Intact implant with radial folds"}, {"letter": "C", "text": "Extracapsular implant rupture"}, {"letter": "D", "text": "Silicone gel bleed"}, {"letter": "E", "text": "Intra- and extracapsular rupture"}], "images": ["assets/q36_89-1.jpg"], "explanationImages": ["assets/a36_145-1.jpg"], "answer": "E", "explanation": "Answer E. The images are both STIR (water- and fat-suppressed) sequences that highlight silicone. The coronal and sagittal STIR sequences both demonstrate intracapsular rupture as evidenced by the presence of the â€œsubcapsular line sign.â€ This is one of the signs of intracapsular rupture. Loss of integrity of the silicone elastomer implant shell has caused silicone to extend outside the implant shell and become located between the fibrous capsule and the implant shell. Another earlier sign of intracapsular rupture is the â€œkeyholeâ€ sign, which is also known as the noose or lasso sign. Keyhole sign results from a mild loss of integrity of the implant shell that results in small amounts of silicone gel to extend outside the implant shell and become trapped within the folds of the implant. Another sign of intracapsular rupture is the â€œlinguineâ€ sign (see image below), which represents more advanced degradation. The implant shell becomes collapsed within the silicone gel and is seen as stacked hypointense lines within the high signal silicone gel. In these examples of intracapsular rupture, the silicone gel is still contained within the fibrous capsule. When silicone extends outside the fibrous capsule, it is known as extracapsular rupture. The provided example demonstrates extracapsular rupture as evidenced by the presence of bright signaled silicone in the breast tissue on the superior aspect of the implant. Answer choices A and C are not correct by themselves, because both of the types of rupture are present. Answer choice B is not correct because the implant is not intact. Subcapsular line sign is present, indicating the presence of intracapsular rupture. A radial fold is a normal infolding (with no intervening silicone gel) of the silicone implant shell in an intact implant. Occasionally, complex radial folds are difficult to distinguish from intracapsular rupture. Actively scrolling through the examination and evaluating the implant in multiple planes can assist with the proper diagnosis. Answer choice D is not correct. Gel bleed is the transudation of microscopic amounts of silicone gel through an intact implant shell.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:368â€“373.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:140â€“151.\n\nSeiler SJ, Sharma PB, Hayes JC, et al. Multimodality imaging-based evaluation of single-lumen silicone breast implants for rupture. RadioGraphics 2017;37(2):366â€“382."}, {"number": "37a", "stem": "Based on the images, what is the appropriate BI-RADS assessment?", "options": [{"letter": "A", "text": "BI-RADS 2"}, {"letter": "B", "text": "BI-RADS 3"}, {"letter": "C", "text": "BI-RADS 4"}, {"letter": "D", "text": "BI-RADS 6"}], "images": ["assets/q37a_89-2.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C."}, {"number": "37b", "stem": "Based on the images, what is the most common diagnosis?", "options": [{"letter": "A", "text": "Intraductal papillary carcinoma"}, {"letter": "B", "text": "Intraductal papilloma"}, {"letter": "C", "text": "Ductal carcinoma in situ"}, {"letter": "D", "text": "Invasive ductal carcinoma"}], "images": ["assets/q37a_89-2.jpg"], "explanationImages": ["assets/a37b_146-1.jpg"], "answer": "B", "explanation": "Answer B. The images show an abrupt filling defect immediate past the tip of the 30-gauge blunt-tipped sialogram needle.\n\nA filling defect, an abrupt duct cutoff, or luminal irregularity and distortion on galactography are considered a positive study, which could be due to:\n\nâ€¢ Intracystic papilloma (most common mass producing a bloody nipple discharge)\n\nâ€¢ Intraductal papillary carcinoma\n\nâ€¢ Blood clot\n\nâ€¢ Inspissated material\n\nâ€¢ Air bubble\n\nThe clinical indications for galactography are single-duct spontaneous bloody, serous, or clear nipple discharge. Procedural steps for galactography are:\n\nâ€¢ Obtain informed written consent.\n\nâ€¢ Breast placed on magnification stand (or patient placed in supine position) with gooseneck light positioned to illuminate the nipple.\n\nâ€¢ Nipple is cleansed.\n\nâ€¢ Duct opening is identified by squeezing nipple to express a small drop of nipple discharge.\n\nâ€¢ The cannula is connected to the tubing and syringe containing 1 to 3 mL of Optiray contrast.\n\nâ€¢ A blunt (27- or 30-gauge), straight or right-angle cannula, connected to tubing and a contrast-filled syringe, is inserted into the duct opening.\n\nâ€¢ The cannula is taped in place to the patientâ€™s breast.\n\nâ€¢ Contrast is injected slowly into the duct until the patient feels fullness in her breast or there is reflux of contrast from the duct.\n\nâ€¢ Special attention is made not to inject air into the duct, as it can mimic a filling defect on mammogram.\n\nâ€¢ If resistance occurs while injecting, it may be the result of the cannula being placed against the wall of the duct or extravasation of contrast outside of the duct. Stop injection, and reposition cannula.\n\nâ€¢ Once contrast has been injected, a magnification craniocaudal and lateral view are obtained.\n\nImages are assessed for a filling defect within the duct or abrupt termination of the duct. Both findings will require biopsy.\n\nGalactography can assess for a mass within or compromising a duct but cannot differentiate benign or malignant etiology.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:409â€“413.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:235."}, {"number": "38a", "stem": "A 55-year-old high-risk patient presents for screening breast MRI. No comparison available. The following contrast-enhanced breast MR images are available:\n\nThe appropriate BI-RADS category is:", "options": [{"letter": "A", "text": "0"}, {"letter": "B", "text": "1"}, {"letter": "C", "text": "2"}, {"letter": "D", "text": "3"}, {"letter": "E", "text": "4"}], "images": ["assets/q38a_90-1.jpg"], "explanationImages": [], "answer": "E", "explanation": "Answer E. This finding is suspicious, BI-RADS category 4. It is a new enhancing irregular mass in a high-risk patient and is therefore considered suspicious by MRI."}, {"number": "38b", "stem": "What is the next most appropriate step?", "options": [{"letter": "A", "text": "6-month follow-up breast MRI"}, {"letter": "B", "text": "Focused ultrasound/mammography"}, {"letter": "C", "text": "Annual screening breast MRI"}, {"letter": "D", "text": "MRI-guided breast biopsy"}, {"letter": "E", "text": "Repeat breast MRI"}], "images": ["assets/q38a_90-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The next most appropriate step is focused ultrasound or mammography. Since the finding is suspicious, a recommendation for 6-month follow-up (A) is not appropriate because this finding has a higher than 2% chance of being breast cancer. A recommendation for annual screening breast MRI (C) is similarly inappropriate. Although the finding may result in an MRI-guided breast biopsy (D), an initial attempt should be made to call the patient back for focused ultrasound or mammography for biopsy planning purposes. This additional â€œsecond-lookâ€ imaging may identify a potential correlate to the MRI finding and the resultant ultrasound or stereotactic breast biopsy is generally a more tolerable biopsy modality. Repeat breast MRI (E) will not be helpful in this instance and is not a sensible use of resources.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:306â€“309."}, {"number": "39", "stem": "A 56-year-old female presents with a palpable finding in the right breast. Patient states she takes Coumadin. Mammogram images A and B and ultrasound image C are given.\n\nWhat is the BI-RADS assessment?", "options": [{"letter": "A", "text": "BI-RADS 1"}, {"letter": "B", "text": "BI-RADS 2"}, {"letter": "C", "text": "BI-RADS 3"}, {"letter": "D", "text": "BI-RADS 4"}, {"letter": "E", "text": "BI-RADS 0"}], "images": ["assets/q39_91-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. This is a hematoma. The images demonstrate classic appearance of hematoma on mammogram and ultrasound. This, along with the appropriate history, is given a BI-RADS assessment of 2. If there is any question of it being a hematoma, then the assessment should be BI-RADS 4 with a recommendation of biopsy.\n\nReference: Sickles EA, Dâ€™Orsi CJ, Bassett LW, et al. ACR BI-RADSÂ® mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:151."}, {"number": "40", "stem": "A 72-year-old female presents with two new groups of suspicious calcifications in the right breast on screening mammogram. A two-site stereotactic core biopsy was performed. Pathology results of the core biopsy of both sites demonstrate atypical ductal hyperplasia (ADH). What is the next best step for management of this patient?", "options": [{"letter": "A", "text": "Return to annual screening."}, {"letter": "B", "text": "Recommend 6-month follow-up mammogram of the right breast."}, {"letter": "C", "text": "Recommend surgical excision of both sites."}, {"letter": "D", "text": "Recommend MRI to evaluate for underlying malignancy."}, {"letter": "E", "text": "Recommend surgical excision of one site."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Atypical ductal hyperplasia (ADH) is considered a high-risk lesion as these lesions are considered along a spectrum of pathology that can develop into intraductal malignancy. Women with a diagnosis of ADH are thought to have a five- to sixfold increased risk of developing breast cancer in 10 years over the normal population. In addition, when ADH is diagnosed at core needle biopsy rather, even with a 9-gauge vacuum-assisted device, excision should be recommended as studies have shown approximately one in five cases of ADH diagnosed at core needle biopsy demonstrate DCIS or invasive malignancy at final excision.\n\nReferences: Eby PR, Oschner JE, DeMartini WB, et al. Frequency and upgrade rates of atypical ductal h
