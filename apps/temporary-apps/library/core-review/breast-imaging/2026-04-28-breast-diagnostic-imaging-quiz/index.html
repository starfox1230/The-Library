yperplasia diagnosed at stereotactic vacuum-assisted core biopsy: 9 versus 11 gauge. AJR Am J Roentgenol 2009;192(1):229â€“234.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:236â€“243."}, {"number": "41", "stem": "In breast MRI, which one of the following is a feature of a malignant finding?", "options": [{"letter": "A", "text": "Lobulated border of a lesion"}, {"letter": "B", "text": "Dark internal septations without significant enhancement"}, {"letter": "C", "text": "Thick rim enhancement"}, {"letter": "D", "text": "A lesion parallels Cooper ligament"}, {"letter": "E", "text": "Microcysts"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Features suggesting malignancy on breast MRI include:\n\nâ€¢ Bright enhancement\n\nâ€¢ Spiculated, very irregular margin\n\nâ€¢ Rim enhancement (beware of fat necrosis and inflamed cyst that can do this)\n\nâ€¢ Heterogeneous enhancement\n\nâ€¢ Linear, linear-branching, or segmental enhancement\n\nâ€¢ Clumped or clustered ring enhancement\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:270â€“273."}, {"number": "42", "stem": "An ultrasound was performed for a persistent focal asymmetry with associated pleomorphic calcifications. Based on the ultrasound image below, what is the next appropriate step in management?", "options": [{"letter": "A", "text": "Ultrasound-guided core biopsy"}, {"letter": "B", "text": "Stereotactic core biopsy"}, {"letter": "C", "text": "MRI"}, {"letter": "D", "text": "6-month follow-up"}, {"letter": "E", "text": "Annual diagnostic mammogram"}], "images": ["assets/q42_92-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The ultrasound images demonstrate an irregular mass with spiculated margins that corresponds to the focal asymmetry seen on mammography. This requires a biopsy and would be easiest for the radiologist and the patient to be performed under ultrasound guidance. The mass was biopsied and the pathology yielded invasive ductal carcinoma.\n\nThe findings are concerning for malignancy; therefore, an annual diagnostic mammogram or 6-month follow-up is inappropriate. MRI may be beneficial after the biopsy is performed if there is concern for multicentric disease, but the ultrasound and subsequent biopsy are more appropriately performed first.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:140â€“156.\n\nStavros AT. Breast ultrasound. Philadelphia, PA: Lippincott Williams & Wilkins, 2004:620â€“626, 838â€“845."}, {"number": "43", "stem": "A 60-year-old female presents for a diagnostic mammogram to workup calcifications in the lower inner quadrant of the left breast seen on recent screening mammogram. Skin calcifications are suspected. What is the most appropriate next step in determining the true nature of the calcifications?", "options": [{"letter": "A", "text": "Spot compression CC"}, {"letter": "B", "text": "True ML"}, {"letter": "C", "text": "Tangential view"}, {"letter": "D", "text": "Repeat MLO"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Tangential view. Although skin calcifications are a frequent finding on mammograms and are generally easily distinguished by their lucent centers, occasionally, the diagnosis can be a difficult one. When unclear, tangential views can confirm the diagnosis of dermal calcifications. The technologist does this generally by placing a grid on the breast in the area of the calcifications, a BB placed over the calcifications, and an image taken with the BB in tangent.\n\nReferences: Andolina VF, Lille SL. Mammographic imaging, a practical guide. Lippincott Williams & Wilkins, 2010:196â€“205.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:84â€“86."}, {"number": "44", "stem": "Breast edema as the result of lymphatic obstruction and the presence of elongated, serpentine, nonductal calcifications on mammography most likely are due to:", "options": [{"letter": "A", "text": "Staphylococcus aureus infection"}, {"letter": "B", "text": "Streptococcus species infection"}, {"letter": "C", "text": "Lymphoma"}, {"letter": "D", "text": "Filariasis"}, {"letter": "E", "text": "Congestive heart failure"}], "images": [], "explanationImages": ["assets/a44_148-1.jpg"], "answer": "D", "explanation": "Answer D. Filariasis is a systemic parasitic infection that is rare in Western countries but endemic in the tropics and parts of Africa. It is caused by the parasite Wuchereria bancrofti. With infiltration, the parasite can cause lymphatic obstruction in the subcutaneous tissues, leading to breast edema. As the parasite dies, it becomes calcified and may be visible on mammography as elongated, serpentine, nonductal calcifications (see images below).\n\nCommon causes of breast infections are Staphylococcus aureus and Streptococcus species. Skin thickening and underlying trabecular thickening may be seen on mammography in Staphylococcus aureus and Streptococcus species infections. A focal abscess can also be identified as a mass on both mammography and ultrasound.\n\nOn mammography, congestive heart failure can appear as bilateral, and sometimes unilateral, breast enlargement with associated skin and trabecular thickening. Distended veins often are visualized as well.\n\nAxillary lymphadenopathy can sometimes result in lymphatic obstruction. On mammography, this can present as diffuse skin and trabecular thickening with overall engorgement of the breast and enlarged dense lymph nodes in the lower axilla on the affected side.\n\nReferences: Mashankar A, Khopkar K, Parihar A, et al. Breast filariasis. Indian J Radiol Imaging 2005;15:203â€“204.\n\nThakur M, Lhamo Y. Breast filariasis. J Surg Case Rep 2014;2014(1):rjt128."}, {"number": "45", "stem": "Which of the following is correct about invasive lobular carcinoma (ILC)?", "options": [{"letter": "A", "text": "Higher false-negative rates are reported with ILC, than with any other forms of cancer."}, {"letter": "B", "text": "ILC most commonly presents as calcifications."}, {"letter": "C", "text": "MR imaging usually does not affect management of patients with ILC."}, {"letter": "D", "text": "ILC has a lesser rate of multiplicity and bilaterality than invasive ductal carcinoma."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Higher false-negative rates (up to 21%) are reported for invasive lobular carcinoma (ILC) than for other invasive cancers at mammography, because ILC is often difficult to diagnose mammographically.\n\nB. ILC most commonly manifests as a mass (44% to 65% of cases), usually with spiculated or ill-defined margins.\n\nC. MR imaging has been shown to affect clinical management in 50% of patients with ILC, leading to changes in surgical management in 28% of cases.\n\nD. ILC is associated with a higher rate of multiplicity and bilaterality than are the usual-type invasive ductal carcinomas.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:141â€“143.\n\nLopez K, Bassett LW. Invasive lobular carcinoma of the breast: spectrum of mammographic, US, and MR imaging findings. RadioGraphics 2009;29:165â€“176."}, {"number": "46", "stem": "A 50-year-old female presented for a screening mammogram, the MLO views of which are shown. What is the diagnosis?", "options": [{"letter": "A", "text": "Neurofibromatosis"}, {"letter": "B", "text": "Steatocystoma multiplex"}, {"letter": "C", "text": "Malignancy"}, {"letter": "D", "text": "Silicone granulomas"}], "images": ["assets/q46_93-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Steatocystoma multiplex is an autosomal dominant inherited condition characterized by multiple bilateral extensive circumscribed radiolucent masses typical of oil cysts on mammography. The oil cysts in steatocystoma multiplex are intradermal in location unlike posttraumatic oil cysts that are intraparenchymal in location. Steatocystoma multiplex oil cysts can be palpable or nonpalpable.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:157â€“159."}, {"number": "47", "stem": "An MRI is shown from a patient with a palpable abnormality in the right breast. Based on the image below, what is the most likely pathologic diagnosis?", "options": [{"letter": "A", "text": "Invasive ductal carcinoma"}, {"letter": "B", "text": "Invasive lobular carcinoma"}, {"letter": "C", "text": "Fibroadenoma"}, {"letter": "D", "text": "Phyllodes tumor"}], "images": ["assets/q47_93-2.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The MR image shows the right breast to be smaller than the left breast with a large diffuse area of nonmass enhancement findings for which of the answer choices is most suggestive for invasive lobular carcinoma (ILC). When ILC is large, the affected breast may appear to be decreasing in size on mammogram and/or MRI; this has been termed the â€œshrinking breast.â€ The â€œshrinking breastâ€ is an imaging and not a clinical finding of ILC. Clinically, the size of the breast is not different; however, the patient may have clinical symptoms, such as skin thickening or a palpable lump.\n\nReferences: Harvey J. Unusual breast cancers: useful clues to expanding the differential diagnosis. Radiology 2007;242:683â€“694.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:295.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:49â€“50."}, {"number": "48", "stem": "Which of the following statements is correct about inflammatory carcinoma of the breast?", "options": [{"letter": "A", "text": "It is considered a stage T1 lesion."}, {"letter": "B", "text": "Most common presentation is skin erythema."}, {"letter": "C", "text": "Majority of patients have axillary nodal involvement at presentation."}, {"letter": "D", "text": "Inflammatory carcinoma accounts for 10% of breast cancers."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Inflammatory carcinoma of the breast is considered a stage T4 lesion. Most common presentation is skin thickening. The vast majority of patients with inflammatory breast carcinoma present with skin thickening. Inflammatory breast cancer accounts for 1% of breast cancers.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:417â€“418.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:115â€“116."}, {"number": "49", "stem": "A 46-year-old female presents with bloody nipple discharge. Additional views and ultrasound were obtained. Based on the images, core biopsy was performed with a pathologic diagnosis of atypical intraductal papilloma. What is the next best step in management?", "options": [{"letter": "A", "text": "Annual screening mammogram"}, {"letter": "B", "text": "Six-month follow-up"}, {"letter": "C", "text": "Repeat core biopsy"}, {"letter": "D", "text": "Surgical excision"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The next best step in management is surgical excision of the core biopsy site. The management of intraductal papillomas has been controversial, with some advocating excision of all intraductal papillomas while others only excise those with atypia. Lesions with atypia found on core biopsy should be excised because the rate of coexistent cancer is high (22% to 67%). Intraductal papillomas without atypia can be managed conservatively.\n\nReferences: Ahmadiyeh N, et al. Management of intraductal papillomas of the breast: an analysis of 129 cases and their outcome. Ann Surg Oncol 2009;16:2264â€“2269.\n\nSwapp R, et al. Management of benign intraductal solitary papilloma diagnosed on core needle biopsy. Ann Surg Oncol 2013;20:1900â€“1905."}, {"number": "50", "stem": "In patients undergoing neoadjuvant chemotherapy, which is the best at assessing response to therapy?", "options": [{"letter": "A", "text": "Clinical exam"}, {"letter": "B", "text": "Mammography"}, {"letter": "C", "text": "Ultrasound"}, {"letter": "D", "text": "MRI"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. One of the roles for breast MRI is monitoring the results of neoadjuvant chemotherapy. Clinical examination was originally used to track tumor response, but several studies have shown that MRI is the best for monitoring response to chemotherapy.\n\nReference: Molleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:118â€“119."}, {"number": "51", "stem": "Which of the following statements is correct about recurrent breast cancer?", "options": [{"letter": "A", "text": "Local recurrence rate after breast conservation therapy is 10% to 20%."}, {"letter": "B", "text": "Most cases of recurrence occur within the first 2 years of treatment."}, {"letter": "C", "text": "MRI offers an advantage over other modalities in assessing recurrence."}, {"letter": "D", "text": "On MRI, physiologic enhancement at the surgical site is seen up to 2 months after surgery."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Local recurrence after breast conservation therapy is 1% to 2%. Most cases of recurrence occur 4 to 6 years after treatment. MR does offer an advantage over other methods in assessing recurrence. On MRI, physiologic enhancement at the surgical site can be seen up to 18 to 24 months.\n\nReference: Macura KF, Ouwerkerk R, Jacobs MA, et al. Patterns of enhancement on breast MR images: interpretation and imaging pitfalls. RadioGraphics 2006;26:1719â€“1734."}, {"number": "52a", "stem": "A 39-year-old female with a strong family history of breast cancer presents for diagnostic mammogram for left breast pain. Based on the images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Transverse rectus abdominis myocutaneous (TRAM) flap reconstruction"}, {"letter": "B", "text": "Poland syndrome"}, {"letter": "C", "text": "Mastectomy"}, {"letter": "D", "text": "Reduction mammoplasty"}], "images": ["assets/q52a_94-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Poland syndrome is a rare congenital anomaly. Patients with Poland syndrome are born with breast and pectoralis musculature hypoplasia or aplasia and often have hypoplasia of the ipsilateral upper extremity. TRAM flap would be an incorrect answer as a TRAM would appear as diffusely fatty breast compared to the contralateral side. Mastectomies are generally not imaged, and reduction mammoplasty appears as symmetric, increased density along the inferior margins of both breasts."}, {"number": "52b", "stem": "What is the inheritance pattern of Poland syndrome?", "options": [{"letter": "A", "text": "Mitochondrial inheritance"}, {"letter": "B", "text": "Autosomal dominant"}, {"letter": "C", "text": "Autosomal recessive"}, {"letter": "D", "text": "X-linked dominant"}, {"letter": "E", "text": "X-linked recessive"}], "images": ["assets/q52a_94-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Poland syndrome is either congenital unilateral hypoplasia or absence of the pectoralis major muscle. The inheritance pattern for Poland syndrome is autosomal recessive.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:434â€“435.\n\nSeyfer AE, Fox JP, Hamilton CG. Poland syndrome: evaluation and treatment of the chest wall in 63 patients. Plast Reconstr Surg 2010;126(3):902â€“911.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:83â€“84."}, {"number": "52c", "stem": "Poland syndrome can be associated with increased incidence of which of the following cancer?", "options": [{"letter": "A", "text": "Hodgkin lymphoma"}, {"letter": "B", "text": "Ovarian cancer"}, {"letter": "C", "text": "Thyroid cancer"}, {"letter": "D", "text": "Breast cancer"}, {"letter": "E", "text": "Hepatocellular cancer"}], "images": ["assets/q52a_94-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Poland syndrome is either congenital unilateral hypoplasia or absence of the pectoralis major muscle.\n\nPoland syndrome is associated with increased incidence of:\n\nâ€¢ Breast cancer\n\nâ€¢ Leukemia\n\nâ€¢ Non-Hodgkin lymphoma\n\nâ€¢ Lung cancer\n\nReference: Shah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:83â€“84."}, {"number": "53", "stem": "The following images from a contrast-enhanced breast MRI are provided. In the central right breast, there is clumped nonmass enhancement. Kinetic assessment of the nonmass enhancement using CAD (computer-aided detection) processing software demonstrates which type of curve?", "options": [{"letter": "A", "text": "Initial slow, delayed washout"}, {"letter": "B", "text": "Initial fast, delayed persistent"}, {"letter": "C", "text": "Initial fast, delayed plateau"}, {"letter": "D", "text": "Initial fast, delayed washout"}, {"letter": "E", "text": "Initial slow, delayed plateau"}], "images": ["assets/q53_95-1.jpg"], "explanationImages": ["assets/a53_151-1.jpg"], "answer": "B", "explanation": "Answer B. Kinetic interrogation of the nonâ€“mass-like enhancement in the central right breast demonstrates initial fast and delayed persistent enhancement kinetics, also known as a type I curve. On this enhancement graph, the vertical axis is the percentage change of enhancement and the horizontal axis indicates time in seconds. Early/initial enhancement is <2 minutes. After 2 minutes, the kinetic curve is in its delayed phase. Several postcontrast scans are performed at early (1 to 2 minutes) and delayed (2 to 5 minutes) phases to provide enhancement behavior of a mass or area of enhancement over time. CAD postprocessing software programs can then be used to create subtraction series and provide kinetic information. The provided kinetic curve demonstrates rapid change in the slope of enhancement of the nonmass enhancement (initial fast enhancement). Therefore, answer choices A and E are incorrect. The delayed component of the enhancement curve is persistent meaning that the percentage change of enhancement continues to increase over time, though at a smaller slope than the initial phase. Therefore, answer choices C and D are incorrect. A delayed plateau kinetic curve is an enhancement pattern that plateaus and does not exhibit percentage change in enhancement in the delayed phase. This type of curve is known as a type II curve. A delayed washout kinetic curve demonstrates a continuous decrease in enhancement in the delayed phase. This type of delayed washout curve is a type III curve; it is classically described in association with breast cancer.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:273â€“275.\n\nMacura KJ, Ouwerkerk R, Jacobs MA, et al. Patterns of enhancement on breast MR images: interpretation and imaging pitfalls. RadioGraphics 2006;26:1719â€“1734.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:25â€“26.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:239, 242."}, {"number": "54", "stem": "The most common malignant breast mass in a pregnant and postpartum patient is:", "options": [{"letter": "A", "text": "Invasive medullary carcinoma"}, {"letter": "B", "text": "Invasive lobular carcinoma"}, {"letter": "C", "text": "Invasive ductal carcinoma"}, {"letter": "D", "text": "Invasive mucinous carcinoma"}, {"letter": "E", "text": "Invasive tubular carcinoma"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Invasive ductal carcinoma of the breast not otherwise specified is the most common type of invasive breast cancer to occur in pregnant and postpartum patients. A few other cancers have been reported but are significantly less frequent.\n\nReferences: Ahn BY, Kim HH, Moon WK, et al. Pregnancy and lactation-associated breast cancer: mammographic and sonographic findings. J Ultrasound Med 2003;22:491â€“497.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:402.\n\nSabate JM, Clotet M, Torrubia S, et al. Radiographic evaluation of breast disorders related to pregnancy and lactation. RadioGraphics 2007;27:S101â€“S124.\n\nYang WT, Dryden MJ, Gwyn K, et al. Imaging of breast cancer diagnosed and treated with chemotherapy during pregnancy. Radiology 2006;239:52â€“60."}, {"number": "55", "stem": "A 55-year-old female was recently diagnosed with an invasive ductal carcinoma of two masses in the left breast. Mass A is 3.1 cm in greatest diameter and is located in the left upper outer quadrant at posterior depth. Mass B is 4 cm in greatest diameter and located in the left lower inner quadrant at middle depth. Which statement is correct?", "options": [{"letter": "A", "text": "The patient is a candidate for whole-breast radiation therapy."}, {"letter": "B", "text": "The patient is a candidate for breast-conserving surgery."}, {"letter": "C", "text": "The findings are consistent with multifocal invasive breast cancer on MRI."}, {"letter": "D", "text": "The findings are consistent with multicentric invasive breast cancer on MRI."}], "images": ["assets/q55_96-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The breast MRI images demonstrate a mass in the left upper outer quadrant at posterior depth and a mass located in the left lower inner quadrant at middle depth, which is consistent for multicentric disease. Multicentric disease refers to more than one lesion in more than one quadrant of the breast. Multifocal disease refers to more than one lesion in a single quadrant of the breast. Because the masses are 3 to 4 cm on opposite sides of the breast, this patient would likely be treated with a mastectomy. Contraindications to whole-breast radiation therapy are:\n\nâ€¢ Pregnancy\n\nâ€¢ Previous breast radiation\n\nâ€¢ Multicentric or diffuse disease\n\nâ€¢ Collagen vascular disease\n\nâ€¢ Poor cosmetic result (relative contraindication)\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:325."}, {"number": "56a", "stem": "A 34-year-old female presents with a palpable lump in her left breast. Based on the mammogram and ultrasound images, which one of the following is the most appropriate BI-RADS category assessment?", "options": [{"letter": "A", "text": "BI-RADS 1"}, {"letter": "B", "text": "BI-RADS 2"}, {"letter": "C", "text": "BI-RADS 3"}, {"letter": "D", "text": "BI-RADS 4"}], "images": ["assets/q56a_97-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B."}, {"number": "56b", "stem": "Based on the ultrasound images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Hamartoma"}, {"letter": "B", "text": "Galactocele"}, {"letter": "C", "text": "Intramammary lymph node"}, {"letter": "D", "text": "Lipoma"}, {"letter": "E", "text": "Fat necrosis"}], "images": ["assets/q56a_97-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. A galactocele is typically seen in lactating or postlactating women. A galactocele is a focal collection of breast milk. On mammography, a galactocele appears as a low- or equal-density mass with a pathognomonic fatâ€“fluid appearance on the horizontal beam imaging (lateral/medial or medial/lateral view). On ultrasound, there can be varying appearances depending on the content of fluid and solid milk components. Pathognomonic appearance on ultrasound is a fluid debris level with the fat rising on top of the galactocele and the milk/fluid layering dependently below. Galactoceles usually resolve spontaneously within a few weeks to months. Aspiration is usually therapeutic.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:406â€“407.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:26â€“28."}, {"number": "56c", "stem": "Based on the images, what is the most appropriate management?", "options": [{"letter": "A", "text": "No further evaluation"}, {"letter": "B", "text": "Cyst aspiration for diagnosis"}, {"letter": "C", "text": "Core needle biopsy"}, {"letter": "D", "text": "Antibiotic therapy"}], "images": ["assets/q56a_97-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. A galactocele is a focal collection of breast milk that is typically seen in a lactating or postlactating woman. On mammography, a galactocele presents as a low- or equal-density mass with a fatâ€“fluid level best appreciated on a lateral view mammogram. On ultrasound, fluid debris is seen with the fat rising to the top of the galactocele and the milk/fluid layering dependently at the bottom. Galactoceles usually spontaneously resolve within a few weeks or months but can be aspirated for symptomatic relief.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:406â€“407.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:26â€“28."}, {"number": "57", "stem": "A 41-year-old female presents with a palpable lump in her left breast. Based on the images, what is the most appropriate management?", "options": [{"letter": "A", "text": "No further evaluation"}, {"letter": "B", "text": "Cyst aspiration for diagnosis"}, {"letter": "C", "text": "Core needle biopsy"}, {"letter": "D", "text": "Antibiotic therapy"}], "images": ["assets/q57_98-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. A simple breast cyst is fluid collection with an epithelial lining. It is the most common breast mass in women. Simple cysts usually have a round, oval, or lobular appearance on mammography but cannot be distinguished from a solid mass without use of ultrasound. On ultrasound, a simple cyst is by definition a mass that is anechoic with imperceptible walls, a sharp back wall, through transmission, and enhanced posterior transmission of sound. A simple cyst can be left alone or can be aspirated if symptomatic.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:193â€“194.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:81â€“82."}, {"number": "58", "stem": "The most common mammographic finding of pregnancy-associated breast cancer is:", "options": [{"letter": "A", "text": "Microcalcifications"}, {"letter": "B", "text": "Edema"}, {"letter": "C", "text": "Architectural distortion"}, {"letter": "D", "text": "Mass"}, {"letter": "E", "text": "Axillary adenopathy"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Several published studies have reported on the mammographic appearance of pregnancy-associated breast cancer, and the most common mammographic finding was a mass with or without calcifications followed by calcifications alone or associated with other findings such as architectural distortion or diffuse increase in breast density.\n\nReference: Sabate JM, Clotet M, Torrubia S, et al. Radiographic evaluation of breast disorders related to pregnancy and lactation. RadioGraphics 2007;27:S101â€“S124."}, {"number": "59", "stem": "A 57-year-old postmenopausal female with a recent breast biopsy diagnosis of focal fibrosis is likely taking which one of the following medications?", "options": [{"letter": "A", "text": "High-dose aspirin"}, {"letter": "B", "text": "Corticosteroids"}, {"letter": "C", "text": "Thyroid replacement therapy"}, {"letter": "D", "text": "Hormone replacement therapy"}, {"letter": "E", "text": "Insulin"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Focal fibrosis, also known as fibrous mastopathy or fibrous tumor, usually occurs in premenopausal women. When focal fibrosis occurs in postmenopausal women, these women are likely taking hormone replacement therapy. When palpable, focal fibrosis clinically manifests as a firm mass. Mammographic features are variable and can present as either an ill-defined or a well-circumscribed mass, asymmetry, or architectural distortion. On ultrasound, a hypoechoic mass usually is seen, although heterogeneous echogenicity also can occur.\n\nReference: Berg WA, Birdwell R, Gombos EC, et al. Diagnostic imaging: breast. Salt Lake City, UT: Amirsys, 2006:IV:2-46â€“IV:2-49."}, {"number": "60", "stem": "Shown is a spot magnification view of axillary lymph nodes along with ultrasound images of the left axillary region also demonstrating the nodes. If this is a new finding in a patient with a history of ipsilateral breast cancer, what is the BI-RADS category assessment?", "options": [{"letter": "A", "text": "BI-RADS 2"}, {"letter": "B", "text": "BI-RADS 3"}, {"letter": "C", "text": "BI-RADS 4"}, {"letter": "D", "text": "BI-RADS 6"}], "images": ["assets/q60_99-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Calcifications in axillary lymph nodes can be because of many reasons. Differential diagnosis includes granulomatous disease and metastatic disease from breast cancer or ovarian cancer. New development of calcifications in axillary lymph nodes should be biopsied to exclude metastatic disease from breast or ovarian cancer.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:422\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:143â€“144."}, {"number": "61", "stem": "Shown is a breast MRI image demonstrating a mass in the right breast at 7 oâ€™clock at a middle depth. The timeâ€“intensity kinetic curve showed a type I curve. Which of the following is the most appropriate next step?", "options": [{"letter": "A", "text": "Recommend a follow-up 6-month breast MRI to document stability."}, {"letter": "B", "text": "The mass should be categorized as BI-RADS 2, and continued risk-appropriate screening should be recommended."}, {"letter": "C", "text": "Biopsy should be performed despite benign kinetics."}, {"letter": "D", "text": "The study is limited because of suboptimal technique and should be repeated."}], "images": ["assets/q61_100-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The breast MRI image shows an irregular breast mass with spiculated margins. If a mass has clear malignant features on morphology assessment, the mass should be biopsied irrespective of a benign kinetic curve.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:325.\n\nMolleran V, Mahoney MC. Breast MRI: expert consult. Philadelphia, PA: Elsevier Saunders, 2014:107â€“108."}, {"number": "62", "stem": "Based on the diagnostic ultrasound images, which one of the following is the most appropriate BI-RADS category assessment?", "options": [{"letter": "A", "text": "BI-RADS 0"}, {"letter": "B", "text": "BI-RADS 2"}, {"letter": "C", "text": "BI-RADS 3"}, {"letter": "D", "text": "BI-RADS 4"}], "images": ["assets/q62_100-2.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Ultrasound images show a superficial oval complicated cystic mass with posterior acoustic enhancement along with a hypoechoic structure extending from the mass to the skin that is characteristic for either a sebaceous cyst (arising from a sebaceous gland) or an epidermal inclusion cyst (obstructed hair follicle). Clinically and on imaging, sebaceous cysts and epidermal inclusion cysts are indistinguishable from each other and usually require no treatment. Excision may be warranted if persistently painful or enlarge. There is no malignant potential for sebaceous cysts, and it is extremely rare in epidermal inclusion cysts. Therefore, a BI-RADS 2 category is the appropriate assessment following diagnostic workup.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:164, 166.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:190â€“191."}, {"number": "63", "stem": "Which condition most commonly causes bilateral breast edema?", "options": [{"letter": "A", "text": "Inflammatory breast cancer"}, {"letter": "B", "text": "Superior vena cava syndrome"}, {"letter": "C", "text": "Mastitis"}, {"letter": "D", "text": "Trauma"}, {"letter": "E", "text": "Coumarin necrosis"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B.\n\nâ€¢ Congestive heart failure\n\nâ€¢ Anasarca\n\nâ€¢ Renal failure\n\nâ€¢ Lymphadenopathy\n\nâ€¢ Superior vena cava syndrome\n\nâ€¢ Liver disease\n\nâ€¢ Mastitis\n\nâ€¢ Staphylococcus aureus (common)\n\nâ€¢ Tuberculosis (rare)\n\nâ€¢ Syphilis (rare)\n\nâ€¢ Hydatid disease (rare)\n\nâ€¢ Molluscum contagiosum\n\nâ€¢ Abscess complicating mastitis\n\nâ€¢ Recurrent subareolar abscess\n\nâ€¢ Inflammatory cancer\n\nâ€¢ Trauma\n\nâ€¢ Coumarin necrosis\n\nâ€¢ Unilateral lymph node obstruction\n\nâ€¢ Radiation therapy\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:414â€“420."}, {"number": "64", "stem": "A 46-year-old female presents with two sets of bilateral screening mammograms that are 2 years apart. Based on the images, what is the appropriate BI-RADS category assessment?", "options": [{"letter": "A", "text": "BI-RADS 0"}, {"letter": "B", "text": "BI-RADS 2"}, {"letter": "C", "text": "BI-RADS 3"}, {"letter": "D", "text": "BI-RADS 4"}, {"letter": "E", "text": "BI-RADS 6"}], "images": ["assets/q64_101-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. There has been interval decrease in size of both breasts on the current screening mammogram as compared to ther 2-year prior screening mammogram. There are swirled areas of architectural distortion in the lower breast bilaterally on the MLO views and centrally on the CC views. There is an oval radiolucent mass in the lower inner right breast that represents fat necrosis. Findings are consistent for bilateral reduction mammoplasty.\n\nOther characteristic mammogram findings seen are:\n\nâ€¢ Elevation of the nipple with more skin inferior than superior\n\nâ€¢ Redistribution of fibroglandular tissue from upper outer quadrant to lower inner quadrant\n\nFat necrosis can be an associated finding seen in reduction mammoplasty.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:390â€“394.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:50â€“51."}, {"number": "65", "stem": "Molecular breast imaging in a 45-year-old woman shows bilateral, extensive, patchy uptake of the isotope. The most likely diagnosis is:", "options": [{"letter": "A", "text": "Active fibroglandular breast tissue"}, {"letter": "B", "text": "Simple breast cysts"}, {"letter": "C", "text": "Fibroadenomas"}, {"letter": "D", "text": "Chronic fat necrosis"}, {"letter": "E", "text": "Postoperative scar tissues"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Unilateral or bilateral patchy isotope uptake frequently corresponds to active fibroglandular tissue or hormonal activity. Therefore, it is preferable to perform the study between day 2 and day 12 of the patientâ€™s menstrual cycle, if possible. If there is diffuse patchy uptake, the test may have to be considered indeterminate.\n\nReferences: Brem R, Fishman M, Rapelyea J. Detection of ductal carcinoma in situ with mammography, breast specific gamma imaging and magnetic resonance imaging: a comparative study. Acad Radiol 2007;14:945â€“950.\n\nBrem R, Ioffe M, Rapelyea J, et al. Invasive lobular carcinoma: detection with mammography, sonography, MRI, and breast-specific gamma imaging. AJR Am J Roentgenol 2009;192:379â€“383."}, {"number": "66", "stem": "Based on the images, what is the correct breast finding?", "options": [{"letter": "A", "text": "Intracapsular rupture of the right breast implant"}, {"letter": "B", "text": "Radial fold of the right breast implant"}, {"letter": "C", "text": "Collapse/rupture of the right breast implant"}, {"letter": "D", "text": "Capsular contracture of the right breast implant"}], "images": ["assets/q66_102-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The images shown are that of bilateral subpectoral saline breast implants. There is a normal subpectoral saline implant in the left breast. When a saline breast implant ruptures, the saline disperses in the breast tissues and the envelope/shell of the implant shrinks back against the chest wall. Radial fold is infolding of the implant envelope/shell that is a normal finding seen in silicone breast implants. Radial folds appear as dark lines on MRI that extend to the periphery of the implant. Capsular contracture occurs when normal scar tissue forms a capsule around the breast implant and tightens/squeezes the breast implant. Capsular contracture may occur several months to years and can result in change in the breast shape, sensation of hardness of the breast, and/or breast pain.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:368â€“373.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:239â€“240."}, {"number": "67-1", "stem": "Match the lymph nodes draining the breast to their location.\n\nPart 1: choose the matching answer choice.", "options": [{"letter": "A", "text": "Behind the pectoralis minor muscle"}, {"letter": "B", "text": "Infralateral to lateral edge of the pectoralis minor muscle"}, {"letter": "C", "text": "Medial to pectoralis muscle"}, {"letter": "D", "text": "Between pectoralis minor and subclavius muscles (Halstead ligament)"}], "images": [], "answer": "B", "explanation": "Part 1: Answer B.\n\nAnswer 1â€“B, 2â€“A, 3â€“D.\n\nI\n\nInfralateral to lateral edge of the pectoralis minor muscle\n\nII\n\nBehind the pectoralis minor muscle\n\nIII\n\nBetween the pectoralis minor and subclavius muscles (Halsted ligament)\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:326â€“327.", "explanationImages": []}, {"number": "67-2", "stem": "Match the lymph nodes draining the breast to their location.\n\nPart 2: choose the matching answer choice.", "options": [{"letter": "A", "text": "Behind the pectoralis minor muscle"}, {"letter": "B", "text": "Infralateral to lateral edge of the pectoralis minor muscle"}, {"letter": "C", "text": "Medial to pectoralis muscle"}, {"letter": "D", "text": "Between pectoralis minor and subclavius muscles (Halstead ligament)"}], "images": [], "answer": "A", "explanation": "Part 2: Answer A.\n\nAnswer 1â€“B, 2â€“A, 3â€“D.\n\nI\n\nInfralateral to lateral edge of the pectoralis minor muscle\n\nII\n\nBehind the pectoralis minor muscle\n\nIII\n\nBetween the pectoralis minor and subclavius muscles (Halsted ligament)\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:326â€“327.", "explanationImages": []}, {"number": "67-3", "stem": "Match the lymph nodes draining the breast to their location.\n\nPart 3: choose the matching answer choice.", "options": [{"letter": "A", "text": "Behind the pectoralis minor muscle"}, {"letter": "B", "text": "Infralateral to lateral edge of the pectoralis minor muscle"}, {"letter": "C", "text": "Medial to pectoralis muscle"}, {"letter": "D", "text": "Between pectoralis minor and subclavius muscles (Halstead ligament)"}], "images": [], "answer": "D", "explanation": "Part 3: Answer D.\n\nAnswer 1â€“B, 2â€“A, 3â€“D.\n\nI\n\nInfralateral to lateral edge of the pectoralis minor muscle\n\nII\n\nBehind the pectoralis minor muscle\n\nIII\n\nBetween the pectoralis minor and subclavius muscles (Halsted ligament)\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:326â€“327.", "explanationImages": []}, {"number": "68a", "stem": "A 48-year-old female complains of a palpable cord-like area in her left breast. Based on the diagnostic mammogram and ultrasound images, what is the appropriate clinical management?", "options": [{"letter": "A", "text": "Refer patient to a breast surgeon for surgical excision and axillary node sampling."}, {"letter": "B", "text": "Ultrasound-guided core biopsy is recommended."}, {"letter": "C", "text": "Assure the patient that the condition is self-limited and will resolve."}, {"letter": "D", "text": "Breast MRI is recommended."}, {"letter": "E", "text": "Wide local excision should be performed."}], "images": ["assets/q68a_103-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Mondor disease is a focal thrombophlebitis of a superficial vein in a breast. It can clinically present as a palpable cord-like mass with associated pain, tenderness, and erythema. Mondor disease is a rare condition that can be associated with trauma, breast surgery, and extreme physical activity. Treatment is not needed as it is self-limited, and the palpable finding resolves in 2 to 12 weeks. Supportive care is the appropriate treatment.\n\nOn mammography, Mondor disease can have negative mammogram or rarely a long tubular structure corresponding to the thrombosed vein.\n\nOn ultrasound, Mondor disease appears as a noncompressible tubular superficial structure with or without color Doppler flow depending on the degree of recanalization.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:427â€“428."}, {"number": "68b", "stem": "Mondor disease of the breast is typified by which of the following statements?", "options": [{"letter": "A", "text": "Easily differentiated from inflammatory breast cancer"}, {"letter": "B", "text": "Common disorder characterized by thrombophlebitis of the subcutaneous veins of the anterolateral chest wall"}, {"letter": "C", "text": "Presents as a tender palpable cord corresponding to a superficial tubular density on mammography and a subcutaneous vessel on ultrasound without Doppler vascular flow"}, {"letter": "D", "text": "Rare malignant breast condition that requires biopsy or excision"}], "images": ["assets/q68a_103-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Mondor disease is a rare benign disorder characterized by thrombophlebitis of the subcutaneous veins of the anterolateral chest wall. A tender palpable cord in the breast corresponding to a superficial tubular density on mammography and a subcutaneous vessel on ultrasound, with or without absent Doppler vascular flow, confirms the diagnosis of Mondor disease of the breast. Awareness of clinical presentation, pathophysiology, and radiological findings of Mondor disease enables accurate diagnosis and avoids the potential pitfall of mistaking this finding for a dilated duct or inflammatory breast carcinoma.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:427â€“428."}, {"number": "69", "stem": "An 87-year-old female presents with a palpable lump (triangular skin marker). Six years ago, she was diagnosed with breast cancer and had a subsequent lumpectomy, followed by radiation therapy. The most likely diagnosis is:", "options": [{"letter": "A", "text": "Intramammary lymph node"}, {"letter": "B", "text": "Hemangioma"}, {"letter": "C", "text": "Lipoma"}, {"letter": "D", "text": "Fat necrosis"}, {"letter": "E", "text": "Hamartoma"}], "images": ["assets/q69_104-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The mammogram findings reveal an oval mass in the area of palpable abnormality in the retroareolar region of the right breast. This mass is of fat density with associated dystrophic calcifications. On ultrasound, there is an oval mass of heterogeneous echogenicity that does not demonstrate internal vascularity. Based on the mammogram findings, ultrasound, and clinical history of lumpectomy surgery, these findings are consistent for an area of fat necrosis.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:145.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:110â€“112.\n\nTaboada JL, Stephens TW, Krishnamurthy S, et al. The many faces of fat necrosis in the breast. AJR Am J Roentgenol 2009;192:815â€“825."}, {"number": "70a", "stem": "A 28-year-old female presents with a palpable abnormality in the left breast. Based on the images, what is the most appropriate management?", "options": [{"letter": "A", "text": "No further management"}, {"letter": "B", "text": "Cyst aspiration"}, {"letter": "C", "text": "Core needle biopsy"}, {"letter": "D", "text": "Antibiotic therapy"}], "images": ["assets/q70a_105-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The images shown are of a benign intramammary lymph node. No further management is warranted. Benign-appearing intramammary lymph nodes can be seen on up to 5% of screening mammograms. Typically, a circumscribed mass measuring <1 cm with reniform shape and a radiolucent hilar notch is seen in the upper outer quadrant on mammography, although less commonly it may be located in other quadrants. On ultrasound, an intramammary lymph node appears as a well-circumscribed mass with gentle lobulations, a hypoechoic cortex, and an echogenic central hilum with central feeding vessels. When intramammary lymph nodes enlarge, there is generalized or focal cortical thickening (>3-mm cortical thickness), or the node becomes rounded with loss of the normal fatty hilum. A core biopsy should be considered if there is suspicion for metastatic involvement in an intramammary lymph node.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:199, 157, 160.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:120â€“122."}, {"number": "70b", "stem": "What is the most common location for an intramammary lymph node?", "options": [{"letter": "A", "text": "Upper outer quadrant"}, {"letter": "B", "text": "Upper inner quadrant"}, {"letter": "C", "text": "Lower outer quadrant"}, {"letter": "D", "text": "Lower inner quadrant"}], "images": ["assets/q70a_105-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The most common location for an intramammary lymph node is in the upper outer quadrant and along blood vessels. Approximately 90% of the intramammary lymph nodes are present in the upper outer quadrant. Intramammary lymph nodes are small (â‰¤5 mm) and are circumscribed oval or kidney beanâ€“shaped masses that have a central fatty hilum. On MRI, intramammary lymph nodes have uniform T2 signal in their cortex and enhance avidly and rapidly with a fast initial enhancement and a late-phase plateau or washout kinetic curve.\n\nReferences: Berg A, Birdwell R, Gombos E. Diagnostic imaging breast. Salt Lake City, UT: Amirsys, 2008:IV:1â€“IV:8.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:374â€“383."}, {"number": "71", "stem": "After lumpectomy and radiation therapy, the enhancement of the postoperative cavity site begins to subside on postcontrast breast MRI after how many months?", "options": [{"letter": "A", "text": "3 to 5 months"}, {"letter": "B", "text": "6 to 7 months"}, {"letter": "C", "text": "8 to 9 months"}, {"letter": "D", "text": "10 to 18 months"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. Up to 9 months after lumpectomy and radiation therapy, there is strong enhancement at the lumpectomy site. From 10 to 18 months after lumpectomy and radiation therapy, the enhancement slowly subsides, with no significant enhancement in 94% of cases.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:332â€“336."}, {"number": "72", "stem": "The statement â€œMultiple, bilateral, circumscribed, noncalcified massesâ€ is given a BI-RADS of:", "options": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "2"}, {"letter": "C", "text": "3"}, {"letter": "D", "text": "4"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Criteria to invoke the â€œrule of multiplicityâ€ and assigning a BI-RADS category 2 assessment on screening mammography are the following:\n\nâ€¢ At least three masses present (at least one mass in each breast).\n\nâ€¢ Circumscribed margins (more than 75% clearly visible).\n\nâˆ˜ No indistinct or spiculated margins can be present.\n\nâ€¢ No suspicious calcifications.\n\nâ€¢ Masses should generally appear similar in shape, size, and density.\n\nâ€¢ Should not be palpable.\n\nMultiple bilateral similar findings suggest a benign etiology. At least three total and at least one in each breast must be present. This excludes palpable findings.\n\nReferences: Kopans D. Breast imaging, 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:487.\n\nLeung JW, Sickles EA. Multiple bilateral masses detected on screening mammography: assessment of need for recall imaging. AJR Am J Roentgenol 2000;175:23â€“29."}, {"number": "73", "stem": "A 78-year-old male presents with a palpable lump in the right breast. Based on the diagnostic mammogram and ultrasound images, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Invasive ductal carcinoma"}, {"letter": "B", "text": "Cyst"}, {"letter": "C", "text": "Lipoma"}, {"letter": "D", "text": "Fibroadenoma"}, {"letter": "E", "text": "Gynecomastia"}], "images": ["assets/q73_106-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The mammogram image reveals a radiolucent (fat density) mass with an apparent fibrous capsule within the right pectoralis major muscle corresponding to the patientâ€™s palpable abnormality as indicated by the triangular skin marker. The ultrasound images reveal an oval circumscribed mass that is nearly isoechoic or slightly hyperechoic to subcutaneous fat. Based on the imaging findings and answer choices, the findings are most likely of the diagnosis of a lipoma.\n\nReferences: Berg WA, Birdwell R, Gombos EC, et al. Diagnostic imaging: breast. Salt Lake City, UT: Amirsys, 2006:IV:2-56â€“IV:2-57.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:157, 162."}, {"number": "74", "stem": "A 2.5 cm malignant mass with metastasis to movable ipsilateral level 1 and level 2 axillary lymph nodes and with no clinical or radiographic evidence of distant metastasis has a TNM staging classification of:", "options": [{"letter": "A", "text": "T1a, N2, M0"}, {"letter": "B", "text": "T2, N1, M0"}, {"letter": "C", "text": "T3, N3, M0"}, {"letter": "D", "text": "T2, N2a, M1"}, {"letter": "E", "text": "T4, N3, M0"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "Answer B. Breast cancers can be staged using the TNM (tumor, lymph node, metastasis) Classification on Breast Cancer from the American Joint Committee on Cancer. The treatment plan is based on this TMN classification, imaging, physical findings, patientâ€™s wishes, and shared decision making between the patient and the treating team. A clinical decision algorithm is available from the National Comprehensive Cancer Network (NCCN) regarding the full spectrum of care.\n\n0\n\nTis\n\nN0\n\nM0\n\nIA\n\nT1*\n\nN0\n\nM0\n\nIB\n\nT0\n\nN1mi\n\nM0\n\nT1*\n\nN1mi\n\nM0\n\nIIA\n\nT0\n\nN1â€ \n\nM0\n\nT1*\n\nN1â€ \n\nM0\n\nT2\n\nN0\n\nM0\n\nIIB\n\nT2\n\nN1\n\nM0\n\nT3\n\nN0\n\nM0\n\nIIIA\n\nT0\n\nN2\n\nM0\n\nT1*\n\nN2\n\nM0\n\nT2\n\nN2\n\nM0\n\nT3\n\nN1\n\nM0\n\nT3\n\nN2\n\nM0\n\nIIIB\n\nT4\n\nN0\n\nM0\n\nT4\n\nN1\n\nM0\n\nT4\n\nN2\n\nM0\n\nIIIC\n\nAny T\n\nN3\n\nM0\n\nIV\n\nAny T\n\nAny N\n\nM1\n\n*Includes T1mi (microinvasion).\n\nâ€  T0 and T1 tumors with nodal micrometastases only are excluded from stage IIA and are classified as stage IB disease.\n\nTX\n\nPrimary tumor cannot be assessed\n\nT0\n\nNo evidence of primary tumor\n\nTis\n\nCarcinoma in situ (DCIS, LCIS, Paget disease of the nipple not associated with invasive carcinoma or carcinoma in situ in the underlying breast parenchyma)\n\nT1\n\nTumor â‰¤20 mm\n\nT1mi\n\nTumor â‰¤1 mm\n\nT1a\n\nTumor >1 mm but â‰¤5 mm\n\nT1b\n\nTumor >5 mm but â‰¤10 mm\n\nT1c\n\nTumor >10 mm but â‰¤20 mm\n\nT2\n\nTumor >20 mm but â‰¤50 mm\n\nT3\n\nTumor >50 mm\n\nT4\n\nTumor of any size with direct extension to the chest wall and/or to the skin (ulceration or skin nodules)*\n\nT4a\n\nExtension to the chest wallâ€ \n\nT4b\n\nUlceration, ipsilateral satellite nodules, and/or edema of the skin (including peau dâ€™orange)â€¡\n\nT4c\n\nT4a and T4b\n\nT4d\n\nInflammatory carcinoma\n\nDCIS, ductal carcinoma in situ; LCIS, lobular carcinoma in situ.\n\n*Invasion of the dermis alone does not qualify.\n\nâ€ Pectoralis muscle adherence/invasion alone does not qualify.\n\nâ€¡Not meeting the criteria for inflammatory breast cancer (IBC).\n\nNX\n\nRegional lymph nodes cannot be assessed\n\nN0\n\nNo regional lymph node metastases\n\nN1\n\nMetastases to movable ipsilateral level Iâ€“II axillary lymph nodes\n\nN2\n\nMetastases in ipsilateral level Iâ€“II axillary lymph nodes that are clinically â€œfixedâ€ (matted) or in clinically detected* ipsilateral internal mammary nodes in the absence of clinically evident axillary lymph node metastases\n\nN2a\n\nMetastases in ipsilateral level Iâ€“II axillary lymph nodes malted to one another or to other structures\n\nN2b\n\nMetastases only in clinically detected* ipsilateral internal mammary nodes in the absence of clinically evident level Iâ€“II axillary lymph node metastases\n\nN3\n\nMetastases in ipsilateral infraclavicular (level III) lymph nodes with or without level Iâ€“II axillary lymph node involvement, in clinically detected* ipsilateral internal mammary lymph nodes with clinically evident level Iâ€“II axillary lymph node metastases, or in ipsilateral supraclavicular lymph nodes with or without axillary or internal mammary lymph node involvement\n\nN3a\n\nMetastases in ipsilateral infraclavicular lymph nodes\n\nN3b\n\nMetastases in ipsilateral axillary and internal mammary lymph nodes\n\nN3c\n\nMetastases in ipsilateral supraclavicular lymph nodes\n\n*Detected at imaging studies (excluding lymphoscintigraphy) and confirmed with fine-needle aspiration biopsy, core biopsy, or clinical examination, having characteristics that are highly suspicious for malignancy.\n\nM0\n\nNo clinical or radiographic evidence of distant metastases\n\ncM0 (i+)\n\nNo clinical or radiographic evidence of distant metastases, but deposits of molecularly or microscopically detected tumor cells in circulating blood, bone marrow, or other nonregional nodal tissue that are no larger than 0.2 mm in a patient without symptoms or signs of metastases\n\nM1\n\nDistant detectable metastases as determined by classic clinical and radiographic means or histologically proved to be larger than 0.2 mm\n\nA 2.5 cm in greatest dimension malignant mass with metastasis to a level 2 movable ipsilateral level 1 axillary lymph node and with no clinical or radiographic evidence of distant metastasis has a TNM staging classification of T2, N1, and M0.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:322â€“324.\n\nLee SC, Jain PA, Jethwa SC, et al. Radiologistâ€™s role in breast cancer staging: providing key information for clinicians. RadioGraphics 2014;34(2):330â€“342."}, {"number": "75", "stem": "Which finding indicates chest wall invasion on MRI?", "options": [{"letter": "A", "text": "Edema of the pectoralis minor"}, {"letter": "B", "text": "Enhancement of the pectoralis major"}, {"letter": "C", "text": "Loss of the intervening fat plane"}, {"letter": "D", "text": "Enhancement of the intercostal muscles"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. The chest wall is composed of the ribs, intercostal muscles, and serratus anterior. A tumor of any size that demonstrates direct extension into the chest wall is a T4 category lesion according to the American Joint Cancer Committee (AJCC) TNM staging system for breast cancer. Although involvement of the pectoralis major or minor muscle is an important finding that should be included in an MRI report, it alone is insufficient to determine chest wall invasion and therefore does not alter the clinical breast cancer stage. Pectoralis muscle involvement may be seen as muscle enhancement with loss of the intervening fat plane between a neoplasm and muscle; however, obliteration of the posterior fat plane alone does not definitively indicate muscle involvement.\n\nReferences: Lee SC, Jain PA, Jethwa SC, et al. Radiologistâ€™s role in breast cancer staging: providing key information for clinicians. RadioGraphics 2014;34(2):330â€“342.\n\nMorris EA, Liberman L. Breast MRI: diagnosis and intervention, New York, NY: Springer, 2005:205."}, {"number": "76", "stem": "The calcifications seen on the mammogram below are dermal in nature. What is the cause?", "options": [{"letter": "A", "text": "Calcium carbonate"}, {"letter": "B", "text": "Methyl salicylate"}, {"letter": "C", "text": "Zinc oxide"}, {"letter": "D", "text": "Glycerol"}], "images": ["assets/q76_107-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. These are â€œpseudocalcificationsâ€ because of the presence of zinc oxide in certain ointments such as Desitin and calamine lotions. The mammogram should be repeated after having the patient wipe her breasts clean.\n\nReference: de Paredes ES. Atlas of mammography (electronic resource), 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007:238â€“240."}, {"number": "77a", "stem": "The first set of mammographic images is from 3 years ago. After this mammogram, asymmetry in the upper outer quadrant was excised demonstrating pseudoangiomatous stromal hyperplasia (PASH). Patient returns for annual screening mammogram. What is the appropriate BI-RADS category assessment?", "options": [{"letter": "A", "text": "0"}, {"letter": "B", "text": "1"}, {"letter": "C", "text": "3"}, {"letter": "D", "text": "4"}], "images": ["assets/q77a_107-2.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. There is an increasing asymmetry in the upper outer quadrant, which needs to be evaluated with additional imaging and ultrasound."}, {"number": "77b", "stem": "Additional views and ultrasound images are given below. What is the next step in management?", "options": [{"letter": "A", "text": "Refer to surgeon for excision"}, {"letter": "B", "text": "Needle core biopsy"}, {"letter": "C", "text": "Return to annual screening"}, {"letter": "D", "text": "Short-term follow-up mammogram in 6 months"}], "images": ["assets/q77b_108-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. Although nothing specific is seen on ultrasound, there is a developing and increasing asymmetry on the mammogram. The cause needs to be determined. The easiest way is to do a needle biopsy under either stereotactic or ultrasound guidance. An excisional biopsy can also be done but is more invasive."}, {"number": "77c", "stem": "Needle core biopsy was performed, and pathology is pseudoangiomatous stromal hyperplasia (PASH). You are asked to do radiologyâ€“pathology correlation. What is your assessment and recommendation?", "options": [{"letter": "A", "text": "Concordant benign radiologyâ€“pathology results. Return to annual screening mammography."}, {"letter": "B", "text": "Concordant benign radiologyâ€“pathology results. Recommend surgical excision."}, {"letter": "C", "text": "Concordant benign radiologyâ€“pathology results. Recommend short-term follow-up mammogram."}, {"letter": "D", "text": "Discordant radiologyâ€“pathology results. Recommend surgical excision."}], "images": ["assets/q77a_107-2.jpg", "assets/q77b_108-1.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. PASH is a benign entity. Wide local excision is indicated if the mass is enlarging, if there are patient concerns over symptomatic mass, or if imaging features are atypical. Local recurrence is common if excision is incomplete.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:156â€“157."}, {"number": "78", "stem": "A 44-year-old woman presents with a palpable finding in the right breast for 2 months. Based on the mammogram and ultrasound images below, what is the most likely diagnosis?", "options": [{"letter": "A", "text": "Fibroadenoma"}, {"letter": "B", "text": "Complicated cyst"}, {"letter": "C", "text": "Mucinous carcinoma"}, {"letter": "D", "text": "Oil cyst"}, {"letter": "E", "text": "Lipoma"}], "images": ["assets/q78_109-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. At the site of the palpable marker is a rim calcification characteristic of an oil cyst/fat necrosis on mammography. Sonographically, they can have a variable appearance ranging from sonolucent masses (like simple cysts) to having internal echoes and posterior acoustic shadowing. Oil cysts are caused by blunt trauma or surgery and appear dark and fatty on mammography before they calcify. Fibroadenoma, complicated cyst, and mucinous carcinoma would all appear dense on mammography.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:92, 94."}, {"number": "79", "stem": "If calcifications that are biopsied are calcium oxalate, how can they be identified by pathology?", "options": [{"letter": "A", "text": "Use hematoxylin and eosin (H&E) staining on the slides."}, {"letter": "B", "text": "Do serial thin sections of the specimen."}, {"letter": "C", "text": "Use polarized light on the slides."}, {"letter": "D", "text": "Radiograph the paraffin block."}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Calcium phosphate calcifications are easily seen on H&E staining. Calcium oxalate is not visualized with H&E staining and requires a special polarized light to show the calcifications. If calcifications are still within the paraffin blocks, then radiographing the blocks will show them. Resectioning of that particular block will show the calcifications.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:252â€“253."}, {"number": "80", "stem": "Based on the images below, what is the assessment and next appropriate step in management?", "options": [{"letter": "A", "text": "BI-RADS 2. Benign. Return to annual screening mammography."}, {"letter": "B", "text": "BI-RADS 3. Probably benign. Short-term follow-up in 6 months."}, {"letter": "C", "text": "BI-RADS 4A. Low suspicion. Recommend biopsy."}, {"letter": "D", "text": "BI-RADS 4C. Moderate suspicion. Recommend biopsy and scan the ipsilateral axilla."}], "images": ["assets/q80_110-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Apocrine cyst cluster is a cluster of tiny anechoic foci, 1 to 7 mm individually with thin intervening septae. No solid components are present. They have a typical appearance on ultrasound. No further intervention/workup is needed. They are in the lobular portion of the terminal ductal lobular unit (TDLU). One may see milk of calcium in microcysts. Short-term follow-up can be done if suboptimally seen or individual microcysts are complicated. Biopsy if solid component is present.\n\nReference: Berg WA, Birdwell R, Gombos EC, et al. Diagnostic imaging: breast. Salt Lake City, UT: Amirsys, 2006:IV:1."}, {"number": "81", "stem": "A 43-year-old female presents with new right breast nipple retraction. What is the appropriate next step in the patientâ€™s management?", "options": [{"letter": "A", "text": "Galactography of the retracted nipple"}, {"letter": "B", "text": "Surgical consultation for duct excision"}, {"letter": "C", "text": "Breast MRI"}, {"letter": "D", "text": "Spot compressionâ€“magnification views of the retracted nipple"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "Answer D. When nipple retraction is new, causes may be due to periductal mastitis, duct ectasia, or a malignancy. Cancers that typically occur in the retroareolar region are invasive ductal carcinoma or invasive lobular carcinoma. Both of these cancers, if close to the nipple, can cause the nipple to retract. The first step in the workup of nipple retraction is diagnostic mammography, including spot compressionâ€“magnification views in the subareolar region.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:413â€“414.\n\nNicholson BT, Harvey JA, Cohen MA. Nipple-areolar complex: normal anatomy and benign and malignant processes. RadioGraphics 2009;29(2):509â€“523."}, {"number": "82", "stem": "Regarding the finding seen on the image below, which of the following statements is correct? The patient was recently in a car accident.", "options": [{"letter": "A", "text": "The trauma that causes this injury can be blunt or penetrating."}, {"letter": "B", "text": "Most common cause of fat necrosis is surgery."}, {"letter": "C", "text": "Usually is seen in the upper inner quadrant on the right when the trauma is sustained by the driver."}, {"letter": "D", "text": "History does not help in diagnosis."}], "images": ["assets/q82_110-2.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The above finding is caused by seat belt injury. This can be seen in any type of injuries to the breast whether caused by blunt or penetrating trauma. Without a history of trauma, developing densities will be suspicious and may require biopsy. An asymmetry is seen on the left side when trauma is sustained by the driver and on the right by the passenger.\n\nReference: Berg WA, Birdwell R, Gombos EC, et al. Diagnostic imaging: breast. Salt Lake City, UT: Amirsys, 2006:IV:5-20â€“IV:5-21."}, {"number": "83a", "stem": "Images below represent a mass in the upper outer quadrant of the left breast. This was biopsied. Pathology results are malignant phyllodes tumor.\n\nWhich of the following statements concerning malignant phyllodes tumor is correct?", "options": [{"letter": "A", "text": "About half of all phyllodes tumors are malignant."}, {"letter": "B", "text": "Most common sites for metastases are axillary lymph nodes."}, {"letter": "C", "text": "There are no hereditary factors associated with these tumors."}, {"letter": "D", "text": "Treatment of choice is neoadjuvant chemotherapy."}], "images": ["assets/q83a_111-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. Phyllodes tumors are uncommon, and most are benign. They usually occur in women in their fifth decade and can be very large when first detected. About 10% of phyllodes tumors are malignant. Most common sites for metastases are the lung and bone. Axillary node metastases are uncommon.\n\nTreatment of choice is wide local excision or mastectomy for very large tumors. Radiation treatment reduces local recurrence. There is no benefit from chemotherapy.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:152, 199."}, {"number": "83b", "stem": "Regarding phyllodes tumor, which one of the following is a correct statement?", "options": [{"letter": "A", "text": "The pathology is usually very different from fibroadenoma."}, {"letter": "B", "text": "It is considered a benign neoplasm, although the size at presentation is usually large and is rapidly growing."}, {"letter": "C", "text": "Complete surgical excision is often curative, but chemotherapy and radiation therapy are usually needed at the same time."}, {"letter": "D", "text": "It is a biphasic neoplasm with double-layered epithelial component surrounded by overgrowing stroma."}, {"letter": "E", "text": "It will not affect the skin as breast cancer does, such as skin ulceration or dimpling."}], "images": ["assets/q83a_111-1.jpg", "assets/q83c_112-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. Phyllodes tumor has a spectrum from benign to borderline to malignant. Typical presentation is large and rapidly growing in size (more than 20% increase in diameter in 6 months). Typically, they do not have calcifications. The median age is 45 to 49 years, with 21% risk of recurrence mostly within the first 2 years of excision. Radiation therapy reduces the risk of recurrence, and surgical excision is usually curative.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:199.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:182â€“183."}, {"number": "83c", "stem": "Shown are diagnostic mammogram and ultrasound images of a 52-year-old female with history of a palpable lump in the left breast. The patient underwent an ultrasound-guided core needle biopsy. Pathology results came back as phyllodes tumor. Based on imaging finding and pathology results, which of the following statement is the most appropriate recommendation?", "options": [{"letter": "A", "text": "Surgical excisional biopsy"}, {"letter": "B", "text": "Molecular breast imaging (MBI)"}, {"letter": "C", "text": "Breast MRI"}, {"letter": "D", "text": "Follow-up diagnostic ultrasound in 6 months"}], "images": ["assets/q83c_112-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. Phyllodes tumors are large, rapidly growing circumscribed masses without associated calcifications. Ten percent of phyllodes tumors are malignant. Phyllodes tumors tend to recur in the biopsy site and therefore should be completely excised by surgery. Therefore, all phyllodes tumors should be excised.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:199, 203.\n\nShah BA, Fundaro GM, Mandava S. Breast imaging review: a quick guide to essential diagnoses, 2nd ed. New York, NY: Springer, 2015:182â€“183."}, {"number": "84", "stem": "Which of the following statements concerning invasive lobular carcinoma (ILC) is correct?", "options": [{"letter": "A", "text": "ILC grows as single-file linear columns of tumor cells with intervening stroma."}, {"letter": "B", "text": "It comprises 60% to 70% of all invasive breast cancers."}, {"letter": "C", "text": "Calcifications are common presenting features."}, {"letter": "D", "text": "It has a lower rate of bilaterality and multifocality than does invasive ductal carcinoma."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Features of invasive lobular carcinoma are the following:\n\nAccounts for <10% of all invasive breast cancers\n\nGrows in single-cell files\n\nHardest tumor to see mammographically (often seen on one view)\n\nHigher rate of bilaterality and multifocality than does invasive ductal carcinoma\n\nCalcifications not a feature\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:141â€“143."}, {"number": "85", "stem": "Which of the following can be a cause for the finding below?", "options": [{"letter": "A", "text": "Implant rupture"}, {"letter": "B", "text": "Lymphoma"}, {"letter": "C", "text": "PASH"}, {"letter": "D", "text": "Mastitis"}], "images": ["assets/q85_113-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. â€œCalcific particlesâ€ in axillary lymph nodes can be caused by a metastatic calcifying cancer and granulomatous infectious-like tuberculosis (TB). Other entities like migrated silicone from implant rupture and gold particles from rheumatoid arthritis therapy may mimic calcifications in lymph nodes. Usually, the clinical history can help with the diagnosis. Microcalcifications in lymph nodes rather than pleomorphic calcifications can suggest tuberculous mastitis, but biopsy is needed to exclude metastatic breast cancer.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:422â€“425."}, {"number": "86", "stem": "A 54-year-old female presents with a history of lymphoma. According to the fifth edition of BI-RADS, what is the most appropriate BI-RADS assessment of the following screening mammogram?", "options": [{"letter": "A", "text": "BI-RADS 0"}, {"letter": "B", "text": "BI-RADS 2"}, {"letter": "C", "text": "BI-RADS 3"}, {"letter": "D", "text": "BI-RADS 4"}, {"letter": "E", "text": "BI-RADS 6"}], "images": ["assets/q86_113-2.jpg"], "explanationImages": [], "answer": "B", "explanation": "Answer B. The screening mammogram demonstrates bilateral enlarged axillary lymph nodes in a patient with known lymphoma. According to the fifth edition of BI-RADS, the axillary adenopathy should be described in the report; however, the assessment should be a BI-RADS 2 in patients who have a known diagnosis of lymphoma, as well as other malignancies not considered to be breast cancers such as metastasis, leukemias, and sarcomas.\n\nReferences: Dâ€™Orsi C, Sickles EA, Mendelson EB, et al. ACR BI-RADSÂ® atlas mammography. In: ACR BI-RADSÂ® atlas, breast imaging reporting and data system. Reston, VA: American College of Radiology, 2013:143, 163.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:422â€“425."}, {"number": "87", "stem": "Which of the following statements concerning neoadjuvant chemotherapy (NAT) for breast cancer is correct?", "options": [{"letter": "A", "text": "Major use is in primary inoperable locally advanced breast cancer (LABC)."}, {"letter": "B", "text": "Primary goal is to shrink tumor for the potential for breast conservation surgery."}, {"letter": "C", "text": "Size of tumor is most accurately determined by ultrasound."}, {"letter": "D", "text": "Accuracy in preoperative size on mammography is best for invasive lobular carcinoma."}], "images": [], "explanationImages": [], "answer": "A", "explanation": "Answer A. Neoadjuvant chemotherapy (NAT) is systemic chemotherapy with or without hormonal treatment of breast cancer prior to definitive breast surgery. Primary goal of NAT is to facilitate clear margins at surgery by clearing skin/chest wall invasion. Size of the tumor is most accurately determined by MRI. Mammography is not very accurate for determining preoperative size of the tumor and is particularly inaccurate for invasive lobular carcinoma.\n\nReference: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:326."}, {"number": "88a", "stem": "Based on the images below, which of the following statements regarding the findings is correct?", "options": [{"letter": "A", "text": "Architectural distortion with associated skin thickening"}, {"letter": "B", "text": "Focal asymmetry with associated skin thickening"}, {"letter": "C", "text": "Trabecular thickening with associated skin thickening"}, {"letter": "D", "text": "Segmental calcifications with associated skin thickening"}], "images": ["assets/q88a_114-1.jpg"], "explanationImages": [], "answer": "C", "explanation": "Answer C. The mammogram demonstrates diffuse increased trabecular thickening and skin thickening of the left breast, which was due to extrinsic compression on the left subclavian vein obstruction from a mediastinal mass."}, {"number": "88b", "stem": "Based on the findings, which of the following diagnoses is the most likely?", "options": [{"letter": "A", "text": "Invasive ductal carcinoma"}, {"letter": "B", "text": "Reduction mammoplasty"}, {"letter": "C", "text": "Seat belt injury/trauma"}, {"letter": "D", "text": "Mastitis"}], "images": ["assets/q88a_114-1.jpg"], "explanationImages": [], "answer": "D", "explanation": "Answer D. The mammogram demonstrates diffuse increased trabecular thickening and skin thickening. Main differential diagnoses for these findings are inflammatory carcinoma and mastitis. Clinical symptoms are the key to diagnosis. Punch biopsy to exclude inflammatory carcinoma. Most common agents for mastitis are Staphylococcus aureus and streptococcal bacteria.\n\nReferences: Berg WA, Birdwell R, Gombos EC, et al. Diagnostic imaging: breast. Salt Lake City, UT: Amirsys, 2006:V:6-10â€“V:6-13.\n\nIkeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:414â€“420."}, {"number": "89", "stem": "Which of the following conditions can lead to skin thickening in the breast?", "options": [{"letter": "A", "text": "Ovarian carcinoma"}, {"letter": "B", "text": "Silicone implant rupture"}, {"letter": "C", "text": "Psoriasis"}, {"letter": "D", "text": "Fibroadenolipoma"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "Answer C. Skin thickening is defined as >2 mm. Thickening of the skin can have many causes. It can be focal or diffuse and unilateral or bilateral. It can occur as a result of tumor invasion, tumor in the dermal lymphatics, or lymphatic congestion by obstruction of lymphatic drainage. Differential diagnosis includes malignancy, infection, nonspecific inflammation, primary skin processes like psoriasis, systemic diseases like scleroderma, dermatomyositis, and causes of vascular obstruction like CHF, superior vena cava syndrome, and anasarca.\n\nReferences: Ikeda DM, Miyake KK. Breast imaging: the requisites, 3rd ed. St. Louis, MO: Elsevier, 2017:188â€“191.\n\nKopans D. Breast imaging, 3rd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2007."}, {"number": "90a", "stem": "Based on the following concurrent images of the same breast, what is the finding?", "options": [{"letter": "A", "text": "Architectural distortion"}, {"letter": "B", "text": "Asymmetry"}, {"letter": "C", "text": "Focal asymmetry"}, {"letter": "D", "text": "Global asymmetry"}, {"letter": "E", "text": "Mass"}], "images": ["assets/q90a_115-1.jpg"], "explanationImages": [], "answer": "A", "explanation": "Answer A. The parenchyma in the superior aspect middle depth is distorted with no visible mass. This is architectural distortion. Asymmetry is an area of fibroglandular-density tissue that is visible on only one mammographic projection. Focal asymmetry is visible on and has a similar shape on different mammographic projections, but it lacks the convexâ€“outward borders and the conspicuity of a mass. Global asymmetry represents a large amount of fibroglandular-density tissue over a substantial portion of the breast (at least one quadrant). A mass is 3-dimesnional and occupies space, seen on two different mammographic projections."}, {"number": "90b", "stem": "The first image is a full-field digital mammogram of the left breast. What modality is the second image?", "options": [{"letter": "A", "text": "Breast thermography"}, {"letter": "B", "text": "Computer-aided detection"}, {"letter": "C", "text": "Contrast-enhanced spectral mammography"}, {"letter": "D", "t
