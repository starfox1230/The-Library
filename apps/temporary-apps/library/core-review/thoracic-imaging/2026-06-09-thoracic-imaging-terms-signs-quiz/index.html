<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Thoracic Imaging: A Core Review Terms and Signs Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --ink: #eef2f7;
      --muted: #9ca7b8;
      --panel: #171c25;
      --panel-2: #10151e;
      --line: #2e3747;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #5ee0a0;
      --bad: #ff8a8a;
      --warn: #f4c76b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #111721;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    h1 { font-size: 1.15rem; margin: 0 0 3px; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    main {
      width: min(1180px, 94vw);
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    main.nav-closed { grid-template-columns: 1fr; }
    nav, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .nav-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .nav-title { font-weight: 800; }
    main.nav-closed nav { display: none; }
    button {
      border: 1px solid var(--line);
      background: #111721;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 10px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #06111a; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); }
    button.icon { min-width: 42px; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button.current { outline: 2px solid var(--accent); }
    button.correct { background: #123326; border-color: #2f8e62; color: var(--good); }
    button.wrong { background: #3a171b; border-color: #9b3f48; color: var(--bad); }
    .question-panel { padding: 18px; }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .counter { color: var(--muted); font-size: 0.92rem; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel-2);
    }
    .mode-switch button {
      border: 0;
      border-radius: 0;
      min-height: 38px;
      background: transparent;
    }
    .mode-switch button.active {
      background: var(--accent);
      color: #06111a;
    }
    .stem {
      font-size: 1.12rem;
      line-height: 1.48;
      margin: 8px 0 16px;
    }
    .images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 8px 0 18px;
    }
    .images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .explanation-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin: 0 0 12px;
    }
    .explanation-images img {
      width: 100%;
      background: #111;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .choices { display: grid; gap: 8px; margin: 14px 0; }
    .choice {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 500;
      line-height: 1.35;
      min-height: 48px;
    }
    .choice .letter {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #243044;
      font-weight: 800;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
      min-height: 1.2em;
    }
    .result {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .result.show { display: block; }
    .review-panel {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 16px;
      display: none;
    }
    .review-panel.show { display: block; }
    .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr)); gap: 6px; margin-top: 12px; }
    .review-meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }
    .status { font-weight: 800; margin-bottom: 10px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    .feedback-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .feedback-head .status { margin-bottom: 0; }
    .feedback-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .explanation {
      white-space: pre-wrap;
      line-height: 1.48;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 360px;
      overflow: auto;
    }
    dialog {
      width: min(720px, 94vw);
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.68); }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.94);
      cursor: zoom-out;
      padding: 0;
    }
    .lightbox.show { display: grid; }
    .lightbox img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    .settings-body { padding: 16px; display: grid; gap: 12px; }
    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .settings-head h2 { margin: 0; font-size: 1.1rem; letter-spacing: 0; }
    .settings-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .settings-field label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .settings-field textarea {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      color: var(--ink);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.9rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    textarea {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
    @media (max-width: 780px) {
      .bar { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; }
      .nav-grid { grid-template-columns: repeat(8, 1fr); }
    }
  </style>

  <script>
    const QUESTIONS = [{"number": "1a", "stem": "A 57-year-old male presents with recent diagnosis of lung cancer and no interval treatment. The arrow in the CT image is identifying which sign?", "options": [{"letter": "A", "text": "Split pleura"}, {"letter": "B", "text": "Juxtaphrenic peak"}, {"letter": "C", "text": "Beaded septum"}, {"letter": "D", "text": "Bulging fissure"}], "images": ["assets/Hobbs2e-ch003-unimage001.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. See related explanation: The beaded septum sign is associated with perilymphatic nodularity where disease is spreading along the lymphatics causing irregular and nodular thickened interlobular septa. First described in the setting of malignancy, the CT evidence of a beaded septum was highly correlative with pulmonary metastases. Histopathologic correlation in the same study confirmed involvement of pulmonary capillaries and lymphatics. Primarily, this finding assists in characterizing a nodular pattern as perilymphatic, or characterizing a septal thickening pattern as nodular. The beaded septum sign can also be seen in other diseases with perilymphatic distribution, particularly sarcoidosis. Other provided options to include pulmonary hemorrhage, pulmonary embolism, and bacterial pneumonia can produce septal thickening and/or poorly defined nodularity but do not manifest with nodular septal thickening like the beaded septum sign. References: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Ren H, et al. Computed tomography of inflation-fixed lungs: the beaded septum sign of pulmonary metastases. J Comput Assist Tomogr 1989; 13 ( 3 ): 411416."}, {"number": "1b", "stem": "In the setting of malignancy, the finding raises concern for which process?", "options": [{"letter": "A", "text": "Pulmonary metastases"}, {"letter": "B", "text": "Pulmonary hemorrhage"}, {"letter": "C", "text": "Pulmonary embolism"}, {"letter": "D", "text": "Bacterial pneumonia"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "a. The beaded septum sign is associated with perilymphatic nodularity where disease is spreading along the lymphatics causing irregular and nodular thickened interlobular septa. First described in the setting of malignancy, the CT evidence of a beaded septum was highly correlative with pulmonary metastases. Histopathologic correlation in the same study confirmed involvement of pulmonary capillaries and lymphatics. Primarily, this finding assists in characterizing a nodular pattern as perilymphatic, or characterizing a septal thickening pattern as nodular. The beaded septum sign can also be seen in other diseases with perilymphatic distribution, particularly sarcoidosis. Other provided options to include pulmonary hemorrhage, pulmonary embolism, and bacterial pneumonia can produce septal thickening and/or poorly defined nodularity but do not manifest with nodular septal thickening like the beaded septum sign. References: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Ren H, et al. Computed tomography of inflation-fixed lungs: the beaded septum sign of pulmonary metastases. J Comput Assist Tomogr 1989; 13 ( 3 ): 411416."}, {"number": "2", "stem": "A 35-year-old male presents with uveitis and mild shortness of breath. Chest radiograph is obtained. What sign best describes the radiograph image provided?", "options": [{"letter": "A", "text": "Galaxy sign"}, {"letter": "B", "text": "Fleischner sign"}, {"letter": "C", "text": "1-2-3 sign"}, {"letter": "D", "text": "Golden S sign"}], "images": ["assets/Hobbs2e-ch003-unimage002.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. In the radiograph provided, the bilateral hila demonstrate symmetric fullness with thickening of the right paratracheal stripe, accounting for the 1 (right hilum), 2 (left hilum), 3 (right paratracheal stripe) sign of lymphadenopathy in the setting of sarcoidosis. While this sign is highly suggestive of sarcoidosis, the differential would include other granulomatous diseases such as silicosis, coal worker's pneumoconiosis, or granulomatous infection. Less likely, but not excluded, would be a neoplastic process such as lymphoma or small cell carcinoma. Reference: Webb WR, Higgins CB. Chapter 15: The pulmonary hila. In: Thoracic imaging: pulmonary and cardiovascular radiology, 2nd ed. Philadelphia, PA: Lippincott Williams & Wilkins, 2011: 466."}, {"number": "3a", "stem": "A 32-year-old female presents with refractory asthma and chronic sinusitis. Prior bronchoscopy had revealed eosinophilia on bronchoscopic alveolar lavage (BAL). What sign is present on this patient's radiograph?", "options": [{"letter": "A", "text": "Tree-in-bud"}, {"letter": "B", "text": "Hilum overlay"}, {"letter": "C", "text": "Air crescent"}, {"letter": "D", "text": "Finger-in-glove"}], "images": ["assets/Hobbs2e-ch003-unimage003.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. See related explanation: Finger-in-glove is a characteristic finding in allergic bronchopulmonary aspergillosis (ABPA), which often presents as refractory asthma. Bronchial atresia or other chronic bronchial obstruction would be alternative considerations, although the clinical history to include bronchial eosinophilia correlates better with ABPA. High density of the bronchial impaction is also characteristic of ABPA caused by the dense collection of Aspergillus in the secretions. In a recent study of 155 patients with diagnosed ABPA, hyperattenuation of the mucoid impaction on CT correlated with greater serologic severity and increased frequency of relapses. Additional imaging findings seen on CT for ABPA would include upper lobe predominant bronchiectasis, bronchial wall thickening, and tree-in-bud opacities. References: Agarwal R, Gupta D, Aggarwal AN, et al. Clinical signi s patient). This air trapping is characteristic of small airways disease such as hypersensitivity pneumonitis, obliterative (constrictive) bronchiolitis, or asthma. Causes of obliterative bronchiolitis include prior infection (especially adenovirus or respiratory syncytial virus), collagen vascular disease (especially rheumatoid arthritis), drug toxicity, industrial toxic inhalation injury, and chronic transplant rejection (both heart/lung and graft versus host disease in bone marrow transplant). Reference: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "4c", "stem": "If this patient had a history of prior toxic fume inhalation injury, which of the following etiologies is most likely?", "options": [{"letter": "A", "text": "Hypersensitivity pneumonitis"}, {"letter": "B", "text": "Asthma"}, {"letter": "C", "text": "Obliterative bronchiolitis"}, {"letter": "D", "text": "Follicular bronchiolitis"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. See related explanation: The inspiratory CT demonstrates geographic areas of mosaic attenuation, defined as patchwork regions of differing attenuation by the Fleischner Society Glossary. Differential considerations include (1) interstitial lung disease, (2) air trapping, and (3) occlusive pulmonary vascular disease. Of these causes, air trapping is accentuated by expiration (as demonstrated on the expiratory images of this patient). This air trapping is characteristic of small airways disease such as hypersensitivity pneumonitis, obliterative (constrictive) bronchiolitis, or asthma. Causes of obliterative bronchiolitis include prior infection (especially adenovirus or respiratory syncytial virus), collagen vascular disease (especially rheumatoid arthritis), drug toxicity, industrial toxic inhalation injury, and chronic transplant rejection (both heart/lung and graft versus host disease in bone marrow transplant). Reference: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "4d", "stem": "Which of the following connective tissue diseases is most highly associated with obliterative bronchiolitis?", "options": [{"letter": "A", "text": "Scleroderma"}, {"letter": "B", "text": "Rheumatoid arthritis"}, {"letter": "C", "text": "Lupus"}, {"letter": "D", "text": "Sjögren syndrome"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. The inspiratory CT demonstrates geographic areas of mosaic attenuation, defined as patchwork regions of differing attenuation by the Fleischner Society Glossary. Differential considerations include (1) interstitial lung disease, (2) air trapping, and (3) occlusive pulmonary vascular disease. Of these causes, air trapping is accentuated by expiration (as demonstrated on the expiratory images of this patient). This air trapping is characteristic of small airways disease such as hypersensitivity pneumonitis, obliterative (constrictive) bronchiolitis, or asthma. Causes of obliterative bronchiolitis include prior infection (especially adenovirus or respiratory syncytial virus), collagen vascular disease (especially rheumatoid arthritis), drug toxicity, industrial toxic inhalation injury, and chronic transplant rejection (both heart/lung and graft versus host disease in bone marrow transplant). Reference: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "5", "stem": "What structure forms the superior border of the aortopulmonary window?", "options": [{"letter": "A", "text": "Left pulmonary artery"}, {"letter": "B", "text": "Aortic arch"}, {"letter": "C", "text": "Ligamentum arteriosum"}, {"letter": "D", "text": "Parietal pleura"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. The aortic arch forms the superior border. The other choices form the inferior (left pulmonary artery), medial (ligamentum arteriosum), and lateral borders (parietal pleura of the left lung). The anterior border is formed by the ascending aorta, and the posterior border is formed by the descending aorta. Reference: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "6", "stem": "Which of the following causes the \"deep sulcus\" sign on supine chest radiograph?", "options": [{"letter": "A", "text": "Lobar collapse"}, {"letter": "B", "text": "Pleural effusion"}, {"letter": "C", "text": "Pneumothorax"}, {"letter": "D", "text": "Emphysema"}], "images": [], "explanationImages": [], "answer": "C", "explanation": "c. Supine positioning of the patient on chest radiograph redistributes a pneumothorax from the typical location along the lung apex inferiorly along the lower lung. Therefore, the deep sulcus sign represents a lucent distention of the sulcus by redistributed pleural air. Pleural effusion increases basilar opacity with layering fluid and may obscure the costophrenic angle. Collapse of a lower pulmonary lobe also increases basilar opacity with nonaerated lung and decreases lung volume. Finally, emphysema hyperinflates the lung and may flatten the diaphragm, but would not accentuate the costophrenic angle on supine imaging. Reference: Kong A. The deep sulcus sign. Radiology 2003;228:415-416."}, {"number": "7", "stem": "Pulmonary infarction most commonly involves which of the following vessels?", "options": [{"letter": "A", "text": "Bronchial arteries"}, {"letter": "B", "text": "Pulmonary arteries"}, {"letter": "C", "text": "Pulmonary veins"}, {"letter": "D", "text": "Intercostal arteries"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. Infarction is the result of pulmonary artery occlusion in almost all cases. Pulmonary vein-related infarction is recognized but extremely uncommon. Ischemic necrosis may or may not be present due to the bronchial arteries remaining patent and serving as a secondary vascular supply. Pulmonary embolism and pulmonary involvement of vasculitis are the most frequent causes. Reference: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "8a", "stem": "Which term best describes the finding?", "options": [{"letter": "A", "text": "Air bronchogram"}, {"letter": "B", "text": "Beaded septum"}, {"letter": "C", "text": "Ring around the artery"}, {"letter": "D", "text": "Air crescent"}], "images": ["assets/Hobbs2e-ch003-unimage007.jpg"], "explanationImages": [], "answer": "A", "explanation": "a. See related explanation: Air bronchograms are air-filled bronchi contrasted by surrounding alveoli filled with blood, pus, cells, water, or other debris. On chest radiograph and computed tomography, this produces a branching black structure with surrounding white lung. In contrast, the beaded septum is a sign describing white nodules tracking along an interlobular septum indicating a perilymphatic pattern. The ring around the artery sign appears as black air tracking around the artery on lateral radiograph related to pneumomediastinum. Finally, an air crescent develops as a crescent-shaped lucency within an early cavitary lesion suggestive of improving immune status in the setting of neutropenic invasive fungal infection. The air bronchogram is a characteristic finding in the setting of consolidation and assists in differentiating this pulmonary opacity from others. Mass, by definition, is a 3-cm rounded pulmonary opacity without air bronchograms. An endobronchial plug, usually caused by mucus, will produce an inverted appearance of a white bronchus outlined by black lung. Fluid trapped within a fissure may appear as a pseudomass and does not contain air bronchograms. Pulmonary infarct generally occurs without air bronchograms as the associated hemorrhage fills the bronchi in the area of the infarct. Streptococcal pneumonia, organizing pneumonia, and pulmonary edema are all classic examples of consolidations with produce air bronchograms on radiograph and CT. So the presence of air bronchograms on noncontrast CT can be helpful in decreasing the likelihood of infarct when evaluating peripheral consolidation. References: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Revel MP, Triki R, Chatellier G, et al. Is it possible to recognize pulmonary infarction on multisection CT images? Radiology 2007; 244 ( 3 ): 875882."}, {"number": "8b", "stem": "This finding is characteristic of which pulmonary opacity?", "options": [{"letter": "A", "text": "Mass"}, {"letter": "B", "text": "Consolidation"}, {"letter": "C", "text": "Endobronchial plug"}, {"letter": "D", "text": "Pseudomass"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. See related explanation: Air bronchograms are air-filled bronchi contrasted by surrounding alveoli filled with blood, pus, cells, water, or other debris. On chest radiograph and computed tomography, this produces a branching black structure with surrounding white lung. In contrast, the beaded septum is a sign describing white nodules tracking along an interlobular septum indicating a perilymphatic pattern. The ring around the artery sign appears as black air tracking around the artery on lateral radiograph related to pneumomediastinum. Finally, an air crescent develops as a crescent-shaped lucency within an early cavitary lesion suggestive of improving immune status in the setting of neutropenic invasive fungal infection. The air bronchogram is a characteristic finding in the setting of consolidation and assists in differentiating this pulmonary opacity from others. Mass, by definition, is a 3-cm rounded pulmonary opacity without air bronchograms. An endobronchial plug, usually caused by mucus, will produce an inverted appearance of a white bronchus outlined by black lung. Fluid trapped within a fissure may appear as a pseudomass and does not contain air bronchograms. Pulmonary infarct generally occurs without air bronchograms as the associated hemorrhage fills the bronchi in the area of the infarct. Streptococcal pneumonia, organizing pneumonia, and pulmonary edema are all classic examples of consolidations with produce air bronchograms on radiograph and CT. So the presence of air bronchograms on noncontrast CT can be helpful in decreasing the likelihood of infarct when evaluating peripheral consolidation. References: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Revel MP, Triki R, Chatellier G, et al. Is it possible to recognize pulmonary infarction on multisection CT images? Radiology 2007; 244 ( 3 ): 875882."}, {"number": "8c", "stem": "Which consolidation correlates highest with an absence of air bronchograms?", "options": [{"letter": "A", "text": "Streptococcal pneumonia"}, {"letter": "B", "text": "Organizing pneumonia"}, {"letter": "C", "text": "Pulmonary edema"}, {"letter": "D", "text": "Pulmonary infarct"}], "images": [], "explanationImages": [], "answer": "D", "explanation": "d. Air bronchograms are air-filled bronchi contrasted by surrounding alveoli filled with blood, pus, cells, water, or other debris. On chest radiograph and computed tomography, this produces a branching black structure with surrounding white lung. In contrast, the beaded septum is a sign describing white nodules tracking along an interlobular septum indicating a perilymphatic pattern. The ring around the artery sign appears as black air tracking around the artery on lateral radiograph related to pneumomediastinum. Finally, an air crescent develops as a crescent-shaped lucency within an early cavitary lesion suggestive of improving immune status in the setting of neutropenic invasive fungal infection. The air bronchogram is a characteristic finding in the setting of consolidation and assists in differentiating this pulmonary opacity from others. Mass, by definition, is a 3-cm rounded pulmonary opacity without air bronchograms. An endobronchial plug, usually caused by mucus, will produce an inverted appearance of a white bronchus outlined by black lung. Fluid trapped within a fissure may appear as a pseudomass and does not contain air bronchograms. Pulmonary infarct generally occurs without air bronchograms as the associated hemorrhage fills the bronchi in the area of the infarct. Streptococcal pneumonia, organizing pneumonia, and pulmonary edema are all classic examples of consolidations with produce air bronchograms on radiograph and CT. So the presence of air bronchograms on noncontrast CT can be helpful in decreasing the likelihood of infarct when evaluating peripheral consolidation. References: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Revel MP, Triki R, Chatellier G, et al. Is it possible to recognize pulmonary infarction on multisection CT images? Radiology 2007; 244 ( 3 ): 875882."}, {"number": "9", "stem": "Tree-in-bud nodules is a combination of branching opacities and what nodule type?", "options": [{"letter": "A", "text": "Centrilobular"}, {"letter": "B", "text": "Perilymphatic"}, {"letter": "C", "text": "Random"}, {"letter": "D", "text": "Subpleural"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "a. The tree-in-bud pattern reflects endobronchial filling of the branching distal airways and as such is a type of centrilobular nodule pattern. The differential diagnosis includes a variety of infectious and inflammatory bronchiolar conditions but most common causes include endobronchial spread of infection and aspiration. In the past, the term tree-in-bud was synonymous with endobronchial spread of tuberculosis, but this is now recognized as a finding present in multiple other diseases. Reference: Nupur V, Jonathan HC, Tan-Lucien HM. Tree-in-bud sign. J Thorac Imaging 2012; 27 ( 2 ): W27."}, {"number": "10", "stem": "The Monod sign indicates what underlying pathology?", "options": [{"letter": "A", "text": "Mycetoma"}, {"letter": "B", "text": "Angioinvasive fungal infection"}, {"letter": "C", "text": "Cavitary neoplasm"}, {"letter": "D", "text": "Granulomatosis with polyangiitis"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "a. The Monod sign reflects a mycetoma mass within a preexisting cavity. Frequently, the mass is gravity dependent and can move with prone or decubitus imaging. The mycetoma itself forms from conglomerate hyphae, mucin, fibrin, and debris. Overlapping appearance with cavitary masses and nodules can sometimes occur, and some use the \"air crescent sign\" (originally reserved for angioinvasive fungal disease with immune reconstitution) to also refer to a mycetoma. Intracavitary hematoma can present similarly as well. References: Ashley N, Peter S, Thomas SL. et al. Monod sign. J Thorac Imaging 2013; 28 ( 6 ): W120. Palla A, Desideri M, Rossi G, et al. Elective surgery for giant bullous emphysema: a 5-year clinical and functional follow-up. Chest 2005; 128: 2043."}, {"number": "11a", "stem": "A 60-year-old male presented 1 week ago with cough, shortness of breath, and negative chest radiographs. Patient is prescribed antibiotics for presumed pneumonia but returns with continued shortness of breath and the chest radiograph below. Which sign best characterizes the radiographic finding?", "options": [{"letter": "A", "text": "Spine sign"}, {"letter": "B", "text": "Flat waist sign"}, {"letter": "C", "text": "Hampton hump"}, {"letter": "D", "text": "Scimitar"}], "images": ["assets/Hobbs2e-ch003-unimage008.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. See related explanation: The peripheral wedge-shaped opacity in the right lower lung is already suspicious for pulmonary infarct, and considering the classic history of shortness of breath with an initial negative chest radiograph, Hampton hump is the primary consideration to be excluded. While a pulmonary infarct could produce a positive spine sign, this sign is a lateral radiograph finding where the radio-opacity of the spine increases from cranial to caudal direction; the opposite of the expected decrease in opacity at the lung base seen on a normal lateral chest radiograph. Atelectasis in the left lower lobe produces the flat waist sign along the left heart border, and a thick curvilinear anomalous pulmonary venous drainage in the medial lower lobe produces the scimitar finding of scimitar (or hypogenetic lung) syndrome, neither of which have the appearance as shown on this chest radiograph. Hampton hump is a radiographic finding, which raises concern for pulmonary embolism resulting in a peripheral consolidation from an infarct, and CT angiogram of the pulmonary arteries is next imaging study favored by the ACR Appropriateness Criteria. The subsequent CTA images provided confirm the presence of central pulmonary embolism (white arrow) associated with the peripheral pulmonary infarct. While neoplasm and atypical infection could have this appearance, the short interval development and clinical presentation makes these considerations only after pulmonary embolism has been excluded. The focal nature of the finding nearly excludes the consideration of pulmonary edema. References: ACR Appropriateness Criteria. Cardiac Section, Topic \"Suspected Pulmonary Embolism\". Available at https://acsearch.acr.org/docs/69404/Narrative/ Pipavath SN, Godwin DJ. Acute pulmonary thromboembolism: a historical perspective. AJR Am J Roentgenol 2008; 191: 639641."}, {"number": "11b", "stem": "Which process is most suggested by this finding?", "options": [{"letter": "A", "text": "Pulmonary edema"}, {"letter": "B", "text": "Bacterial pneumonia"}, {"letter": "C", "text": "Pleural neoplasm"}, {"letter": "D", "text": "Pulmonary embolism"}], "images": [], "explanationImages": ["assets/Hobbs2e-ch003-unimage014.jpg", "assets/Hobbs2e-ch003-unimage015.jpg"], "answer": "D", "explanation": "d. The peripheral wedge-shaped opacity in the right lower lung is already suspicious for pulmonary infarct, and considering the classic history of shortness of breath with an initial negative chest radiograph, Hampton hump is the primary consideration to be excluded. While a pulmonary infarct could produce a positive spine sign, this sign is a lateral radiograph finding where the radio-opacity of the spine increases from cranial to caudal direction; the opposite of the expected decrease in opacity at the lung base seen on a normal lateral chest radiograph. Atelectasis in the left lower lobe produces the flat waist sign along the left heart border, and a thick curvilinear anomalous pulmonary venous drainage in the medial lower lobe produces the scimitar finding of scimitar (or hypogenetic lung) syndrome, neither of which have the appearance as shown on this chest radiograph. Hampton hump is a radiographic finding, which raises concern for pulmonary embolism resulting in a peripheral consolidation from an infarct, and CT angiogram of the pulmonary arteries is next imaging study favored by the ACR Appropriateness Criteria. The subsequent CTA images provided confirm the presence of central pulmonary embolism (white arrow) associated with the peripheral pulmonary infarct. While neoplasm and atypical infection could have this appearance, the short interval development and clinical presentation makes these considerations only after pulmonary embolism has been excluded. The focal nature of the finding nearly excludes the consideration of pulmonary edema. References: ACR Appropriateness Criteria. Cardiac Section, Topic \"Suspected Pulmonary Embolism\". Available at https://acsearch.acr.org/docs/69404/Narrative/ Pipavath SN, Godwin DJ. Acute pulmonary thromboembolism: a historical perspective. AJR Am J Roentgenol 2008; 191: 639641."}, {"number": "12a", "stem": "What term best describes the pattern in the CT image provided?", "options": [{"letter": "A", "text": "Emphysema"}, {"letter": "B", "text": "Honeycombing"}, {"letter": "C", "text": "Mosaic attenuation"}, {"letter": "D", "text": "Air trapping"}], "images": ["assets/Hobbs2e-ch003-unimage009.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. See related explanation: According to the Fleischner Society \"Glossary of Terms for Thoracic Imaging,\" pulmonary fibrotic cystic airspaces with thick walls define honeycombing, and therefore, honeycombing represents fibrotic changes of the lung. Generally peripheral in distribution, honeycombing is a useful finding for consideration of fibrosing interstitial pneumonias. Emphysema can have some overlap in appearance, particularly in the setting of combined pulmonary fibrosis and emphysema (CPFE), although the thicker walls and basilar peripheral distribution are not characteristic of emphysema. Mosaic attenuation and air trapping do not produce well-defined walls but rather distinct areas of variable lung density on inspiratory and expiratory CT imaging, respectively. While any of the diagnoses provided could cause honeycombing at the lung bases, the significant enlargement of the pulmonary artery and the dilated debris-filled esophagus best correlate with scleroderma, also called systemic sclerosis. References: Bhalla M, Silver RM, Shepard JO, et al. Chest CT in patients with scleroderma: prevalence of asymptomatic esophageal dilatation and mediastinal lymphadenopathy. AJR Am J Roentgenol 1993; 161: 269272. Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Solomon JJ, Olson AL, Fischer A, et al. Scleroderma lung disease. Eur Respir Rev 2013; 22 ( 127 ): 619."}, {"number": "12b", "stem": "An additional CT image from the same study is provided below. What is the most likely diagnosis?", "options": [{"letter": "A", "text": "Idiopathic pulmonary fibrosis"}, {"letter": "B", "text": "Hypersensitivity pneumonitis"}, {"letter": "C", "text": "Scleroderma"}, {"letter": "D", "text": "Asbestosis"}], "images": ["assets/Hobbs2e-ch003-unimage010.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. According to the Fleischner Society \"Glossary of Terms for Thoracic Imaging,\" pulmonary fibrotic cystic airspaces with thick walls define honeycombing, and therefore, honeycombing represents fibrotic changes of the lung. Generally peripheral in distribution, honeycombing is a useful finding for consideration of fibrosing interstitial pneumonias. Emphysema can have some overlap in appearance, particularly in the setting of combined pulmonary fibrosis and emphysema (CPFE), although the thicker walls and basilar peripheral distribution are not characteristic of emphysema. Mosaic attenuation and air trapping do not produce well-defined walls but rather distinct areas of variable lung density on inspiratory and expiratory CT imaging, respectively. While any of the diagnoses provided could cause honeycombing at the lung bases, the significant enlargement of the pulmonary artery and the dilated debris-filled esophagus best correlate with scleroderma, also called systemic sclerosis. References: Bhalla M, Silver RM, Shepard JO, et al. Chest CT in patients with scleroderma: prevalence of asymptomatic esophageal dilatation and mediastinal lymphadenopathy. AJR Am J Roentgenol 1993; 161: 269272. Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Solomon JJ, Olson AL, Fischer A, et al. Scleroderma lung disease. Eur Respir Rev 2013; 22 ( 127 ): 619."}, {"number": "13a", "stem": "What is the best descriptor of the pattern of nodule distribution shown?", "options": [{"letter": "A", "text": "Centrilobular"}, {"letter": "B", "text": "Peribronchovascular"}, {"letter": "C", "text": "Miliary"}, {"letter": "D", "text": "Perilymphatic"}], "images": ["assets/Hobbs2e-ch003-unimage011a.jpg", "assets/Hobbs2e-ch003-unimage011b.jpg"], "explanationImages": [], "answer": "C", "explanation": "c. See related explanation: The nodule distribution is miliary. The miliary pattern is characterized by innumerable tiny nodules <3 mm in size diffusely throughout the lungs. It is technically a subclass of randomly distributed nodules, but the random descriptor is generally reserved for larger and less profuse nodules. This distribution implies hematogenous spread of infection or malignancy with common pathogens being tuberculosis, fungal infection (such as histoplasmosis), and thyroid cancer. Sarcoid can present with miliary pattern but is quite unusual by comparison. Centrilobular nodules are generally airway-centered processes such as endobronchial infection, respiratory bronchiolitis, or subacute hypersensitivity pneumonitis. Perilymphatic nodules are a more common presentation for sarcoidosis or pneumoconiosis. This was a case of disseminated histoplasmosis. Reference: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "13b", "stem": "What is the diagnosis for a miliary distribution of nodules?", "options": [{"letter": "A", "text": "Sarcoidosis"}, {"letter": "B", "text": "Disseminated fungal infection"}, {"letter": "C", "text": "Disseminated mycobacterial infection"}, {"letter": "D", "text": "Metastasis"}], "images": [], "explanationImages": [], "answer": "A", "explanation": "a. The nodule distribution is miliary. The miliary pattern is characterized by innumerable tiny nodules <3 mm in size diffusely throughout the lungs. It is technically a subclass of randomly distributed nodules, but the random descriptor is generally reserved for larger and less profuse nodules. This distribution implies hematogenous spread of infection or malignancy with common pathogens being tuberculosis, fungal infection (such as histoplasmosis), and thyroid cancer. Sarcoid can present with miliary pattern but is quite unusual by comparison. Centrilobular nodules are generally airway-centered processes such as endobronchial infection, respiratory bronchiolitis, or subacute hypersensitivity pneumonitis. Perilymphatic nodules are a more common presentation for sarcoidosis or pneumoconiosis. This was a case of disseminated histoplasmosis. Reference: Hansell DM, Bankier AA, MacMahon H, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "14a", "stem": "The nodule is best described by which term?", "options": [{"letter": "A", "text": "Solid"}, {"letter": "B", "text": "Halo lesion"}, {"letter": "C", "text": "Multicystic"}, {"letter": "D", "text": "Ground glass"}], "images": ["assets/Hobbs2e-ch003-unimage012.jpg"], "explanationImages": [], "answer": "D", "explanation": "d. See related explanation: Accurately characterizing the density of a pulmonary opacity on CT is critical to considering the correct differential for the finding. In this case, several surrounding pulmonary vessels as well as vessels internal to the nodule are visually denser that the nodule itself, confirming that it is ground glass in density. A solid nodule will obscure the internal vessels on noncontrast CT and be as dense if not denser than the adjacent vessels. A \"halo\" lesion or nodule is a specific type of part solid nodule defined by a central solid density with surrounding ground-glass opacity, which is not evident here. Nodules with multicystic components are often seen in the setting of solid, part solid, and ground-glass nodules with internal well-defined round lucencies that are the density of air. In addition to visualization of vessels internal to the nodule, ground-glass components of a nodule can be evaluated by switching from lung window to a soft tissue window. Ground-glass portions will disappear, where solid portions will remain visible on the soft tissue window, keeping in mind that vessels can also be visible on soft tissue window. Association of a pleural tail may raise suspicion for malignancy but plays no part in determining the density of the nodule. Air bronchograms are best visualized when a bronchus passes through a solid density such as a solid nodule or consolidation. A transiting airway may or may not be visible in a ground-glass nodule but does not assist in characterizing the lesion as ground glass. Reference: Hansell DM, Bankier AA, MacMahon, et al. Fleischner Society: glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722."}, {"number": "14b", "stem": "Which characteristic of the nodule best defines it as ground glass?", "options": [{"letter": "A", "text": "Association with pleural tail"}, {"letter": "B", "text": "Visible vessels within the nodule"}, {"letter": "C", "text": "Presence of air bronchograms"}, {"letter": "D", "text": "Visible on soft tissue windows"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. Accurately characterizing the density of a pulmonary opacity on CT is critical to considering the correct differential for the finding. In this case, several surrounding pulmonary vessels as well as vessels internal to the nodule are visually denser that the nodule itself, confirming that it is ground glass in density. A solid nodule will obscure the internal vessels on noncontrast CT and be as dense if not denser than the adjacent vessels. A \"halo\" lesion or nodule is a specific type of part solid nodule defined by a central solid density with surrounding ground-glass opacity, which is not evident here. Nodules with multicystic components are often seen in the setting of solid, part solid, and ground-glass nodules with internal well-defined round lucencies that are the density of air. In glossary of terms for thoracic imaging. Radiology 2008; 246 ( 3 ): 697722. Ouellette H. The signet ring sign. Radiology 1999; 212 ( 1 ): 6768."}, {"number": "16a", "stem": "CT of the chest was performed for evaluation of chronic cough. Which of the following terms best describes the salient abnormality?", "options": [{"letter": "A", "text": "Consolidation"}, {"letter": "B", "text": "Crazy-paving pattern"}, {"letter": "C", "text": "Interlobular septal thickening"}, {"letter": "D", "text": "Centrilobular nodules"}], "images": ["assets/Hobbs2e-ch003e-unimage016.jpg"], "explanationImages": [], "answer": "B", "explanation": "b. See related explanation: The CT demonstrates geographic and lobular areas of ground-glass attention and interlobular septal thickening. These findings in combination are referred to as crazy-paving pattern. There are numerous causes of this pattern in both acute and chronic lung disease ranging from infectious, neoplastic, idiopathic, inhalational, and sanguineous disorders. Although rare, pulmonary alveolar proteinosis is specifically associated with this pattern, and alveolar proteinosis is associated with prior silica exposure (in additional to idiopathic causes). Reference: Marshall GB, Farnquist BA, MacGregor JH, et al. Signs in thoracic imaging. J Thorac Imaging 2006; 21: 7690."}, {"number": "16b", "stem": "Given the history of chronic cough and significant occupational inhalational exposure to silica, which of the following causes of crazy-paving pattern is most likely?", "options": [{"letter": "A", "text": "Lipoid pneumonia"}, {"letter": "B", "text": "Pulmonary alveolar proteinosis"}, {"letter": "C", "text": "Pneumocystis jirovecii pneumonia"}, {"letter": "D", "text": "Pulmonary hemorrhage"}], "images": [], "explanationImages": [], "answer": "B", "explanation": "b. The CT demonstrates geographic and lobular areas of ground-glass attention and interlobular septal thickening. These findings in combination are referred to as crazy-paving patt     const APP_ID = "thoracic-imaging-core-review-terms-signs-quiz-ch3";
    const STORAGE_KEY = "temporary-app-state:" + APP_ID;
    const DEFAULT_SELECTED = {};
    const DEFAULT_SEED_VERSION = 1;
    const DEFAULT_SUBMITTED = Object.fromEntries(Object.keys(DEFAULT_SELECTED).map(number => [number, true]));
    const DEFAULT_STATE = { index: 0, selected: DEFAULT_SELECTED, submitted: DEFAULT_SUBMITTED, mode: "tutor", reviewOpen: false, navOpen: true };
    const state = loadState();
    const el = (id) => document.getElementById(id);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || saved.appId !== APP_ID) return { ...DEFAULT_STATE };
        return {
          ...DEFAULT_STATE,
          index: Number.isInteger(saved.index) ? Math.min(Math.max(saved.index, 0), QUESTIONS.length - 1) : 0,
          selected: saved.selected && typeof saved.selected === "object" ? saved.selected : {},
          submitted: saved.submitted && typeof saved.submitted === "object" ? saved.submitted : {},
          mode: saved.mode === "quiz" ? "quiz" : "tutor",
          reviewOpen: !!saved.reviewOpen,
          navOpen: saved.navOpen !== false,
        };
      } catch {
        return { ...DEFAULT_STATE };
      }
    }

    function statePayload() {
      return {
        version: 1,
        appId: APP_ID,
        savedAt: new Date().toISOString(),
        index: state.index,
        selected: state.selected,
        submitted: state.submitted,
        mode: state.mode,
        reviewOpen: state.reviewOpen,
        navOpen: state.navOpen,
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePayload()));
    }

    function applyImportedState(payload) {
      if (!payload || payload.appId !== APP_ID) throw new Error("This saved state is for a different quiz.");
      state.index = Number.isInteger(payload.index) ? Math.min(Math.max(payload.index, 0), QUESTIONS.length - 1) : 0;
      state.selected = payload.selected && typeof payload.selected === "object" ? payload.selected : {};
      state.submitted = payload.submitted && typeof payload.submitted === "object" ? payload.submitted : {};
      state.mode = payload.mode === "quiz" ? "quiz" : "tutor";
      state.reviewOpen = !!payload.reviewOpen;
      state.navOpen = payload.navOpen !== false;
      saveState();
    }

    function flash(message) {
      el("notice").textContent = message;
      window.clearTimeout(flash.timer);
      flash.timer = window.setTimeout(() => { el("notice").textContent = ""; }, 2600);
    }

    function questionText(q) {
      const opts = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      return `Question ${q.number}\n${q.stem}\n\n${opts}`;
    }

    function fullQuestionText(q) {
      const chosen = state.selected[q.number] || "not selected";
      const result = state.submitted[q.number] ? (chosen === q.answer ? "correct" : "incorrect") : "not yet submitted";
      const questionImages = q.images.length ? `\n\nQuestion image files:\n${q.images.join("\n")}` : "";
      const explanationImages = (q.explanationImages || []).length ? `\n\nExplanation image files:\n${q.explanationImages.join("\n")}` : "";
      return `${questionText(q)}${questionImages}\n\nSelected answer: ${chosen}\nCorrect answer: ${q.answer}\nAttempt: ${result}\n\nPDF explanation:\n${q.explanation}${explanationImages}`;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = el("clipboardScratch");
        scratch.value = text;
        scratch.select();
        document.execCommand("copy");
      }
      flash("Copied.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function wrappedCanvasLines(ctx, text, maxWidth) {
      const lines = [];
      for (const paragraph of String(text || "").split("\n")) {
        const words = paragraph.split(/\s+/).filter(Boolean);
        let line = "";
        if (!words.length) {
          lines.push("");
          continue;
        }
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
      }
      return lines;
    }

    function textCardDataUrl(title, body) {
      const width = 1200;
      const padding = 52;
      const lineHeight = 34;
      const canvas = document.createElement("canvas");
      const measure = canvas.getContext("2d");
      measure.font = "24px Arial";
      const lines = wrappedCanvasLines(measure, body, width - padding * 2);
      canvas.width = width;
      canvas.height = Math.max(360, 150 + lines.length * lineHeight);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#11151c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#18202b";
      ctx.fillRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.strokeStyle = "#6ea8ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
      ctx.fillStyle = "#f1f6ff";
      ctx.font = "700 36px Arial";
      ctx.fillText(title, padding, 72);
      ctx.fillStyle = "#dce6f5";
      ctx.font = "24px Arial";
      let y = 120;
      for (const line of lines) {
        if (line) ctx.fillText(line, padding, y);
        y += lineHeight;
      }
      return canvas.toDataURL("image/png");
    }

    async function imageToDataUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext("2d").drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch {
            resolve(src);
          }
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    }

    async function copyScreenshotPack(q) {
      const chosen = state.selected[q.number] || "not selected";
      const options = q.options.map(o => `${o.letter}. ${o.text}`).join("\n");
      const questionCard = textCardDataUrl(`Question ${q.number}`, `${q.stem}\n\n${options}`);
      const explanationCard = textCardDataUrl(`Answer ${q.answer}`, `Selected: ${chosen}\nCorrect: ${q.answer}\n\n${q.explanation}`);
      const questionImages = await Promise.all(q.images.map(src => imageToDataUrl(src)));
      const explanationImages = await Promise.all((q.explanationImages || []).map(src => imageToDataUrl(src)));
      const imageTags = [...questionImages, questionCard, ...explanationImages, explanationCard]
        .map(src => `<p><img src="${src}" style="max-width:900px;width:100%;height:auto;display:block;"></p>`)
        .join("");
      const html = `<div>${imageTags}</div>`;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([fullQuestionText(q)], { type: "text/plain" }),
          })
        ]);
        flash("Copied screenshot pack.");
      } catch {
        await copy(fullQuestionText(q));
        flash("Rich screenshot copy was blocked; copied full text instead.");
      }
    }

    function renderNav() {
      const nav = el("navGrid");
      nav.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.textContent = q.number;
        b.className = i === state.index ? "current" : "";
        if (state.submitted[q.number]) {
          if (state.mode === "tutor" || state.reviewOpen) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        }
        b.addEventListener("click", () => { state.index = i; render(); });
        nav.appendChild(b);
      });
    }

    function render() {
      const q = QUESTIONS[state.index];
      const reveal = state.mode === "tutor" || state.reviewOpen;
      document.querySelector("main").classList.toggle("nav-closed", !state.navOpen);
      el("showNav").style.display = state.navOpen ? "none" : "inline-block";
      el("questionCounter").textContent = `Question ${q.number} of ${QUESTIONS.length}`;
      el("stem").textContent = q.stem;
      el("imageGrid").innerHTML = q.images.map(src => `<img src="${src}" alt="Question ${q.number} image" />`).join("");
      el("imageGrid").querySelectorAll("img").forEach(img => {
        img.addEventListener("click", () => openLightbox(img.src, img.alt));
      });
      const choices = el("choices");
      choices.innerHTML = "";
      q.options.forEach(option => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "choice";
        if (state.selected[q.number] === option.letter) b.classList.add("current");
        if (state.submitted[q.number] && reveal) {
          if (option.letter === q.answer) b.classList.add("correct");
          if (option.letter === state.selected[q.number] && option.letter !== q.answer) b.classList.add("wrong");
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        letter.textContent = option.letter;
        const label = document.createElement("span");
        label.textContent = option.text;
        b.append(letter, label);
        b.addEventListener("click", () => {
          if (!state.submitted[q.number]) state.selected[q.number] = option.letter;
          render();
        });
        choices.appendChild(b);
      });
      const submitted = state.submitted[q.number];
      el("result").classList.toggle("show", !!submitted && reveal);
      if (submitted && reveal) {
        const ok = state.selected[q.number] === q.answer;
        el("status").className = `status ${ok ? "good" : "bad"}`;
        el("status").textContent = ok ? `Correct: ${q.answer}` : `Incorrect. You chose ${state.selected[q.number] || "nothing"}; correct answer: ${q.answer}`;
        el("explanationImageGrid").innerHTML = (q.explanationImages || []).map(src => `<img src="${src}" alt="Question ${q.number} explanation image" />`).join("");
        el("explanationImageGrid").querySelectorAll("img").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.src, img.alt));
        });
        el("explanation").textContent = q.explanation;
      }
      const answered = Object.keys(state.submitted).length;
      const right = QUESTIONS.filter(x => state.submitted[x.number] && state.selected[x.number] === x.answer).length;
      el("score").textContent = state.mode === "quiz" && !state.reviewOpen ? `${answered} of ${QUESTIONS.length} answered` : `${answered} answered | ${right} correct`;
      el("submit").textContent = state.submitted[q.number] ? "Answer Saved" : "Submit Answer";
      el("reviewQuiz").style.display = state.mode === "quiz" ? "inline-block" : "none";
      el("reviewQuiz").disabled = answered !== QUESTIONS.length;
      el("reviewQuiz").textContent = answered === QUESTIONS.length ? "Review Quiz" : `Review unlocks at ${QUESTIONS.length}`;
      el("copyScreenshot").style.display = state.mode === "tutor" || state.reviewOpen ? "inline-block" : "none";
      el("tutorMode").classList.toggle("active", state.mode === "tutor");
      el("quizMode").classList.toggle("active", state.mode === "quiz");
      renderNav();
      renderReview();
      saveState();
    }

    function renderReview() {
      const answered = Object.keys(state.submitted).length;
      const complete = answered === QUESTIONS.length;
      el("reviewPanel").classList.toggle("show", state.mode === "quiz" && state.reviewOpen);
      if (!(state.mode === "quiz" && state.reviewOpen)) return;
      const right = QUESTIONS.filter(q => state.submitted[q.number] && state.selected[q.number] === q.answer).length;
      el("reviewStatus").textContent = complete ? `Quiz complete: ${right} / ${QUESTIONS.length} correct` : `Reviewing ${answered} of ${QUESTIONS.length} answered questions: ${right} correct so far`;
      const grid = el("reviewGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = q.number;
        if (i === state.index) b.classList.add("current");
        if (state.submitted[q.number]) b.classList.add(state.selected[q.number] === q.answer ? "correct" : "wrong");
        b.addEventListener("click", () => {
          state.index = i;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        grid.appendChild(b);
      });
    }

    function openLightbox(src, alt) {
      el("lightboxImage").src = src;
      el("lightboxImage").alt = alt || "Expanded quiz image";
      el("lightbox").classList.add("show");
    }

    function closeLightbox() {
      el("lightbox").classList.remove("show");
      el("lightboxImage").removeAttribute("src");
    }

    el("submit").addEventListener("click", () => {
      const q = QUESTIONS[state.index];
      if (!state.selected[q.number]) return;
      state.submitted[q.number] = true;
      if (state.mode === "quiz" && state.index < QUESTIONS.length - 1) state.index += 1;
      render();
    });
    el("prev").addEventListener("click", () => { state.index = Math.max(0, state.index - 1); render(); });
    el("next").addEventListener("click", () => { state.index = Math.min(QUESTIONS.length - 1, state.index + 1); render(); });
    el("tutorMode").addEventListener("click", () => { state.mode = "tutor"; state.reviewOpen = false; render(); });
    el("quizMode").addEventListener("click", () => { state.mode = "quiz"; state.reviewOpen = false; render(); });
    el("reviewQuiz").addEventListener("click", () => {
      if (Object.keys(state.submitted).length !== QUESTIONS.length) return;
      state.reviewOpen = true;
      render();
    });
    el("hideNav").addEventListener("click", () => { state.navOpen = false; render(); });
    el("showNav").addEventListener("click", () => { state.navOpen = true; render(); });
    el("settingsButton").addEventListener("click", () => {
      el("stateImport").value = JSON.stringify(statePayload(), null, 2);
      el("settingsDialog").showModal();
    });
    el("closeSettings").addEventListener("click", () => el("settingsDialog").close());
    el("copyState").addEventListener("click", () => copy(JSON.stringify(statePayload(), null, 2)));
    el("downloadState").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(statePayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${APP_ID}-state.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("Downloaded saved state.");
    });
    el("resetState").addEventListener("click", () => {
      if (!confirm("Reset all answers and saved progress for this quiz?")) return;
      Object.assign(state, { ...DEFAULT_STATE, selected: {}, submitted: {} });
      localStorage.removeItem(STORAGE_KEY);
      el("settingsDialog").close();
      render();
      flash("Test reset.");
    });
    el("importState").addEventListener("click", () => {
      try {
        applyImportedState(JSON.parse(el("stateImport").value));
        el("settingsDialog").close();
        render();
        flash("Saved state loaded.");
      } catch (error) {
        flash(error.message || "Could not load saved state JSON.");
      }
    });
    el("lightbox").addEventListener("click", closeLightbox);
    el("copyQuestionText").addEventListener("click", () => copy(fullQuestionText(QUESTIONS[state.index])));
    el("copyScreenshot").addEventListener("click", () => copyScreenshotPack(QUESTIONS[state.index]));
    render();
  </script>
