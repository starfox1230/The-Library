<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foundations of CT Pattern Recognition Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-blue: #4a4af5;
            --dim-blue: #3a3a9e;
            --bright-blue: #8a8aff;
            --bg-color: #12121f;
            --font-color: #c0c0fa;
        }

        html, body {
            overscroll-behavior-y: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--font-color);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        button {
            touch-action: manipulation;
        }

        #quizTopControls {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 10000;
            display: flex;
            gap: 10px;
        }

        .top-control-button,
        #reset-quiz-btn {
            padding: 10px 18px;
            background: none;
            border: 1px solid var(--dim-blue);
            color: var(--dim-blue);
            border-radius: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #reset-quiz-btn {
            position: fixed;
            top: 15px;
            left: 15px;
        }

        .top-control-button:hover,
        #reset-quiz-btn:hover {
            background-color: var(--dim-blue);
            color: var(--bg-color);
        }

        .quiz-container {
            background-color: #1a1a2e;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(74, 74, 245, 0.4), 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
            text-align: center;
            border: 1px solid #3a3a5e;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 500px;
            margin-top: 70px;
            position: relative;
        }

        .quiz-content {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--bright-blue);
            margin-bottom: 16px;
            text-shadow: 0 0 8px rgba(138, 138, 255, 0.5);
        }

        .quiz-subtitle {
            color: #c0c0fa;
            line-height: 1.6;
            margin: 0 auto 25px;
            max-width: 640px;
        }

        #question-counter {
            font-size: 0.9em;
            color: #aaaafc;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid transparent;
            transition: all 0.2s;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 4px;
        }

        #question-counter:hover {
            color: #fff;
            border-color: var(--dim-blue);
            background-color: #2a2a4e;
        }

        .favorite-toggle {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            border: 1px solid #4a4a7e;
            background: #202035;
            color: #ffd25a;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .favorite-toggle:hover {
            transform: scale(1.05);
            border-color: #ffd25a;
            box-shadow: 0 0 10px rgba(255, 210, 90, 0.25);
        }

        .favorite-toggle.active {
            background: #2b2430;
        }

        .navigator-overlay {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background-color: #202035;
            border: 1px solid #4a4af5;
            border-radius: 10px;
            padding: 20px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: none;
        }

        .navigator-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .nav-item {
            padding: 10px 0;
            text-align: center;
            background-color: #2a2a4e;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            font-size: 0.9em;
            border: 1px solid #3a3a5e;
            position: relative;
        }

        .nav-item:hover {
            background-color: #3a3a6e;
        }

        .nav-item.current {
            border-color: var(--bright-blue);
            box-shadow: 0 0 5px var(--bright-blue);
        }

        .nav-item.correct {
            background-color: #1f7a3f;
            border-color: #28a745;
        }

        .nav-item.incorrect {
            background-color: #9a2532;
            border-color: #dc3545;
        }

        .nav-favorite-star {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.6em;
            color: #ffd25a;
            text-shadow: 0 0 4px rgba(255, 210, 90, 0.6);
            line-height: 1;
            pointer-events: none;
        }

        .navigator-close {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: none;
            border: 1px solid #4a4a7e;
            color: #aaaafc;
            cursor: pointer;
        }

        #question-text {
            font-size: 1.3em;
            color: #f0f0ff;
            margin-bottom: 30px;
            line-height: 1.6;
            min-height: 60px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        #reveal-choices-btn {
            display: none;
            margin: 0 auto 20px;
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid var(--base-blue);
            background: none;
            color: var(--bright-blue);
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #reveal-choices-btn:hover {
            background-color: var(--base-blue);
            color: #fff;
        }

        .option-button {
            background-color: #2a2a4e;
            color: #d0d0fc;
            border: 1px solid #4a4a7e;
            padding: 12px 15px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.3s ease;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }

        .option-button:hover:not(:disabled) {
            background-color: #3a3a6e;
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(74, 74, 245, 0.3);
        }

        .option-button:active:not(:disabled) {
            transform: translateY(0px);
        }

        .option-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-button.correct {
            background-color: #1f7a3f !important;
            border-color: #28a745 !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.6) !important;
            opacity: 1 !important;
        }

        .option-button.incorrect {
            background-color: #9a2532 !important;
            border-color: #dc3545 !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.6) !important;
            opacity: 1 !important;
        }

        .option-button.reveal-correct {
            background-color: #1c6a39 !important;
            border-color: #258a3c !important;
            color: #ffffff !important;
            box-shadow: 0 0 10px rgba(30, 120, 60, 0.5) !important;
            opacity: 0.9 !important;
        }

        .explanation-container {
            background-color: #202035;
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            font-size: 0.95em;
            line-height: 1.5;
            color: #c0c0fa;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .explanation-container strong {
            color: var(--bright-blue);
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            width: 100%;
            gap: 14px;
        }

        .nav-button,
        .copy-review-btn,
        .filter-btn {
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .nav-button {
            background: linear-gradient(45deg, var(--base-blue), var(--bright-blue));
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            box-shadow: 0 4px 10px rgba(74, 74, 245, 0.3);
            min-width: 120px;
            text-align: center;
        }

        .nav-button:hover:not(:disabled),
        .copy-review-btn:hover:not(:disabled),
        .filter-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(74, 74, 245, 0.5);
        }

        .nav-button:disabled,
        .copy-review-btn:disabled {
            background: #5a5a7e;
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: none;
            transform: none;
        }

        #completion-message {
            display: none;
            flex-direction: column;
            gap: 18px;
            text-align: left;
        }

        .review-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn,
        .copy-review-btn {
            background: none;
            border: 1px solid #4a4a7e;
            color: #d0d0fc;
            padding: 10px 18px;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: linear-gradient(45deg, var(--base-blue), var(--bright-blue));
            border-color: transparent;
            color: #fff;
        }

        .review-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .review-card {
            background-color: #202035;
            border: 1px solid #3a3a5e;
            border-radius: 10px;
            padding: 18px;
        }

        .review-card.correct-card {
            border-left: 4px solid #28a745;
        }

        .review-card.incorrect-card {
            border-left: 4px solid #dc3545;
        }

        .review-q {
            color: #f0f0ff;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .review-ans,
        .review-exp {
            color: #d0d0fc;
            line-height: 1.6;
        }

        .review-ans + .review-ans,
        .review-ans + .review-exp {
            margin-top: 8px;
        }

        .ans-label {
            color: var(--bright-blue);
            font-weight: 600;
        }

        .user-ans-text.correct {
            color: #8ee7ab;
        }

        .user-ans-text.incorrect {
            color: #ff9aa4;
        }

        .favorite-mark {
            color: #ffd25a;
        }

        .panel-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(18, 18, 31, 0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel-content {
            background-color: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #3a3a5e;
            width: 100%;
            max-width: 520px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .panel-content h2 {
            color: var(--bright-blue);
            margin-top: 0;
            font-family: 'Orbitron', sans-serif;
        }

        .close-button-x {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 2rem;
            color: #c0c0fa;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            color: #d0d0fc;
        }

        .settings-row label {
            line-height: 1.5;
            text-align: left;
        }

        .settings-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        .copied-feedback {
            background-color: #1f7a3f !important;
            border-color: #28a745 !important;
            color: #ffffff !important;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 24px 18px;
                width: 100%;
                margin-top: 88px;
            }

            h1 {
                font-size: 1.45em;
                padding-right: 36px;
            }

            #question-text {
                font-size: 1.08em;
            }

            .navigation-buttons {
                flex-direction: column;
            }

            .nav-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="quizTopControls">
        <button id="settings-btn" class="top-control-button">Settings</button>
    </div>
    <button id="reset-quiz-btn" aria-label="Reset quiz progress">Reset</button>

    <div class="quiz-container">
        <button id="favorite-toggle" class="favorite-toggle" aria-pressed="false" title="Save question to favorites">☆</button>

        <div id="navigator-overlay" class="navigator-overlay">
            <div class="navigator-grid" id="navigator-grid"></div>
            <button class="navigator-close" id="view-progress-review-btn">View Answers So Far</button>
            <button class="navigator-close" id="navigator-close">Close Menu</button>
        </div>

        <div class="quiz-content">
            <h1 id="quiz-title">Foundations of CT Pattern Recognition</h1>
            <div id="question-counter" title="Tap to jump to question"></div>
            <div id="question-text">Loading question...</div>
            <button id="reveal-choices-btn" type="button">Reveal Answer Choices</button>
            <div id="answer-options" class="options-container"></div>
            <div id="explanation" class="explanation-container" style="display: none;"></div>
        </div>

        <div id="completion-message">
            <h2 id="final-score">Quiz Complete!</h2>

            <div class="review-controls">
                <button id="back-to-quiz-btn" class="filter-btn" style="display: none;">Back to Quiz</button>
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="correct">Correct</button>
                <button class="filter-btn" data-filter="incorrect">Incorrect</button>
                <button class="filter-btn" data-filter="favorites">Favorites</button>
                <button id="copy-review-btn" class="copy-review-btn">Copy Listed Items</button>
            </div>

            <div id="review-list" class="review-list"></div>
        </div>

        <div class="navigation-buttons">
            <button id="prev-button" class="nav-button">Previous</button>
            <button id="next-button" class="nav-button">Next</button>
        </div>
    </div>

    <div id="settings-panel" class="panel-overlay">
        <div class="panel-content">
            <button class="close-button-x" data-target="settings-panel">&times;</button>
            <h2>Settings</h2>
            <div class="settings-row">
                <label for="reveal-choices-toggle">Hide answer choices until revealed</label>
                <input id="reveal-choices-toggle" type="checkbox">
            </div>
        </div>
    </div>

    <script>
        const QUIZ_SOURCE = {
        "title": "Foundations of CT Pattern Recognition",
        "questions": [
                {
                        "question": "On abdominal CT, which approach is most useful when deciding whether a suspicious hazy region represents abnormal fat rather than a normal variant?",
                        "options": [
                                "Compare the region with fat elsewhere in the same patient",
                                "Assume all intra-abdominal fat should match subcutaneous muscle",
                                "Rely primarily on whether the finding is near the bowel",
                                "Judge the finding only by its size on one axial slice"
                        ],
                        "correctAnswer": "Compare the region with fat elsewhere in the same patient",
                        "explanation": "The source emphasized using the patient's own normal fat as the reference standard, including comparison of intra-abdominal and subcutaneous fat, to recognize abnormal change."
                },
                {
                        "question": "Which CT description best corresponds to fat stranding?",
                        "options": [
                                "Dark fat replaced by hazy streaky increased attenuation",
                                "Bright calcified fat with sharply defined margins",
                                "Homogeneous fluid with a thin smooth wall",
                                "Gas lucency surrounded by cortical destruction"
                        ],
                        "correctAnswer": "Dark fat replaced by hazy streaky increased attenuation",
                        "explanation": "The source defined fat stranding as fat that loses its clean normal appearance and becomes hazy, streaky, or dirty, serving as a marker of inflammation."
                },
                {
                        "question": "In the discussed framework, fat stranding is most closely associated with which process?",
                        "options": [
                                "Inflammation in or around the involved tissue",
                                "Chronic fatty replacement of skeletal muscle",
                                "Normal variation in body habitus",
                                "Arterial enhancement after contrast injection"
                        ],
                        "correctAnswer": "Inflammation in or around the involved tissue",
                        "explanation": "The source stated that fat stranding is basically synonymous with inflammation in practical CT interpretation."
                },
                {
                        "question": "Which imaging finding most strongly supports soft tissue thickening adjacent to a pressure injury?",
                        "options": [
                                "Replacement of expected fat by denser asymmetric soft tissue",
                                "Symmetric low-density fat on both sides of the pelvis",
                                "Linear calcification within an otherwise normal fat plane",
                                "Uniform gas limited to the skin surface only"
                        ],
                        "correctAnswer": "Replacement of expected fat by denser asymmetric soft tissue",
                        "explanation": "The source described soft tissue thickening as areas where normal fat is replaced by more solid-appearing soft tissue, especially when asymmetric relative to the opposite side."
                },
                {
                        "question": "A decubitus ulcer on CT was characterized in the discussion by which combination of findings?",
                        "options": [
                                "Deep ulceration with gas, soft tissue thickening, and adjacent inflammatory change",
                                "Shallow skin defect with isolated calcification and no deep change",
                                "Symmetric subcutaneous edema without gas or focal abnormality",
                                "Well-defined fluid only, without overlying ulcer or bone proximity"
                        ],
                        "correctAnswer": "Deep ulceration with gas, soft tissue thickening, and adjacent inflammatory change",
                        "explanation": "The source described a decubitus ulcer case showing visible ulceration, gas extending toward bone, surrounding soft tissue thickening, and adjacent fat stranding."
                },
                {
                        "question": "Why was side-to-side comparison helpful in evaluating the decubitus ulcer case?",
                        "options": [
                                "It showed that the opposite side preserved normal fat without comparable thickening",
                                "It confirmed that both sides contained the same degree of ulceration",
                                "It demonstrated equal enhancement of both soft tissues after contrast",
                                "It proved that gas at the ulcer site was physiologic rather than pathologic"
                        ],
                        "correctAnswer": "It showed that the opposite side preserved normal fat without comparable thickening",
                        "explanation": "The source stressed comparing the abnormal side to the contralateral side, where normal fat was preserved and the same soft tissue abnormality was absent."
                },
                {
                        "question": "In bone imaging, the term \"moth-eaten\" is most appropriately applied to which pattern?",
                        "options": [
                                "Multiple ill-defined lucencies producing a ragged destructive appearance",
                                "A solitary sharply circumscribed lucent lesion with a sclerotic rim",
                                "Diffuse marrow replacement with no focal cortical change",
                                "Uniform cortical thickening with preserved trabecular pattern"
                        ],
                        "correctAnswer": "Multiple ill-defined lucencies producing a ragged destructive appearance",
                        "explanation": "The source described moth-eaten bone as having focal lucencies more lucent than surrounding bone, with an overall ratty and extensively eroded appearance."
                },
                {
                        "question": "Which feature best separates complicated diverticulitis from uncomplicated diverticulitis in the discussion?",
                        "options": [
                                "Presence of perforation or abscess rather than isolated inflammation",
                                "Presence of any colonic wall thickening rather than normal bowel",
                                "Presence of diverticula rather than a continuous colonic lumen",
                                "Presence of intraluminal contrast rather than oral contrast absence"
                        ],
                        "correctAnswer": "Presence of perforation or abscess rather than isolated inflammation",
                        "explanation": "The source contrasted uncomplicated diverticulitis with complicated diverticulitis by focusing on perforation and abscess formation as key complications."
                },
                {
                        "question": "Why was intravenous contrast considered especially helpful when distinguishing abscess from bowel?",
                        "options": [
                                "It outlines enhancing bowel wall and helps identify a wall defect or separate collection",
                                "It makes all fluid collections become identical in attenuation",
                                "It eliminates motion artifact in the lower abdomen",
                                "It prevents inflamed fat from appearing more attenuating than normal fat"
                        ],
                        "correctAnswer": "It outlines enhancing bowel wall and helps identify a wall defect or separate collection",
                        "explanation": "The source noted that contrast helps show the bowel wall, a possible break in the wall, and whether a suspected collection lacks a normal bowel wall, favoring abscess."
                },
                {
                        "question": "When scrolling through CT images, which behavior most favors an abscess over a bowel loop?",
                        "options": [
                                "The collection appears contained and fails to continue as a smooth tubular structure",
                                "The finding elongates across multiple slices in a continuous predictable course",
                                "The structure demonstrates a consistent wall along its entire visible extent",
                                "The lumen narrows and widens gradually while remaining connected to bowel"
                        ],
                        "correctAnswer": "The collection appears contained and fails to continue as a smooth tubular structure",
                        "explanation": "The source emphasized that bowel should be traceable as a continuous tunnel, whereas an abscess may come into view and disappear without connecting normally to adjacent bowel."
                },
                {
                        "question": "Which teaching point about bowel continuity was used as a practical aid for beginners reviewing CT?",
                        "options": [
                                "Bowel should behave like one continuous tunnel rather than a branching pocket",
                                "Bowel should terminate abruptly whenever diverticula are present",
                                "Bowel usually forms multiple closed chambers within the same segment",
                                "Bowel normally contains side branches that mimic fistulas"
                        ],
                        "correctAnswer": "Bowel should behave like one continuous tunnel rather than a branching pocket",
                        "explanation": "The source used the practical idea that bowel is a continuous tunnel without branch points, so a contained branching-appearing pocket should raise concern for abscess."
                },
                {
                        "question": "In the context of CT with contrast, what is enhancement?",
                        "options": [
                                "An area becoming brighter because contrast is present in vascularized tissue",
                                "An area becoming darker because contrast displaces intraluminal gas",
                                "An area remaining unchanged despite contrast administration",
                                "An area appearing denser only because slice thickness is reduced"
                        ],
                        "correctAnswer": "An area becoming brighter because contrast is present in vascularized tissue",
                        "explanation": "The source defined enhancement as increased brightness on a contrast-enhanced examination due to blood flow or vascularity in the tissue."
                },
                {
                        "question": "Which enhancement pattern was highlighted as a classic clue to abscess?",
                        "options": [
                                "Peripheral rim enhancement around a central fluid collection",
                                "Diffuse homogeneous enhancement throughout the collection",
                                "Central nodular enhancement without surrounding change",
                                "No enhancement in adjacent inflamed soft tissues"
                        ],
                        "correctAnswer": "Peripheral rim enhancement around a central fluid collection",
                        "explanation": "The source specifically pointed to enhancement along the periphery of an abscess as a key clue that a fluid collection represents infection rather than simple sterile fluid."
                },
                {
                        "question": "A postoperative collection adjacent to hardware shows no convincing peripheral enhancement. Based on the discussion, which interpretation is most appropriate?",
                        "options": [
                                "The finding is less specific and could represent seroma or hematoma rather than abscess",
                                "The finding proves the collection is a sterile abscess requiring immediate drainage",
                                "The finding excludes any relationship to surgery or inflammation",
                                "The finding confirms a bowel perforation tracking into the hardware bed"
                        ],
                        "correctAnswer": "The finding is less specific and could represent seroma or hematoma rather than abscess",
                        "explanation": "The source added that near hardware, a non-enhancing collection is less clearly an abscess and may instead represent hematoma or seroma, though this is only a rule of thumb."
                },
                {
                        "question": "Which sequence best reflects the practical CT problem-solving strategy emphasized in the discussion?",
                        "options": [
                                "Identify density, compare with normal tissue, then assess asymmetry and enhancement",
                                "Measure lesion size, assign diagnosis, then review the rest of the scan",
                                "Focus on one abnormal slice, then ignore surrounding fat and soft tissues",
                                "Label every fluid collection as abscess before evaluating bowel continuity"
                        ],
                        "correctAnswer": "Identify density, compare with normal tissue, then assess asymmetry and enhancement",
                        "explanation": "The source repeatedly emphasized starting with density, using the patient's own normal tissues for comparison, and then using asymmetry, surrounding inflammatory change, and enhancement to refine interpretation."
                }
        ]
};

        function shuffleArray(items) {
            const shuffled = [...items];
            for (let i = shuffled.length - 1; i > 0; i -= 1) {
                const swapIndex = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[i]];
            }
            return shuffled;
        }

        function shuffleOptionsAvoidingOriginalCorrectSlot(options, correctAnswer) {
            const originalOptions = Array.isArray(options) ? [...options] : [];
            const originalCorrectIndex = originalOptions.indexOf(correctAnswer);

            if (originalOptions.length < 2 || originalCorrectIndex === -1) {
                return originalOptions;
            }

            let shuffledOptions = shuffleArray(originalOptions);
            let attemptsRemaining = 10;

            while (shuffledOptions.indexOf(correctAnswer) === originalCorrectIndex && attemptsRemaining > 0) {
                shuffledOptions = shuffleArray(originalOptions);
                attemptsRemaining -= 1;
            }

            if (shuffledOptions.indexOf(correctAnswer) === originalCorrectIndex) {
                const swapIndex = originalCorrectIndex === 0 ? 1 : 0;
                [shuffledOptions[originalCorrectIndex], shuffledOptions[swapIndex]] = [shuffledOptions[swapIndex], shuffledOptions[originalCorrectIndex]];
            }

            return shuffledOptions;
        }

        function shuffleQuizQuestionOptions(questions) {
            return questions.map(question => ({
                ...question,
                options: shuffleOptionsAvoidingOriginalCorrectSlot(question.options, question.correctAnswer)
            }));
        }

        const activeSessionData = {
            title: QUIZ_SOURCE.title,
            questions: shuffleQuizQuestionOptions(QUIZ_SOURCE.questions)
        };
        const quizData = activeSessionData.questions;
        document.title = activeSessionData.title;

        const quizTitleEl = document.getElementById('quiz-title');
        const questionCounterElement = document.getElementById('question-counter');
        const questionTextElement = document.getElementById('question-text');
        const revealChoicesButton = document.getElementById('reveal-choices-btn');
        const answerOptionsElement = document.getElementById('answer-options');
        const explanationElement = document.getElementById('explanation');
        const prevButton = document.getElementById('prev-button');
        const nextButton = document.getElementById('next-button');
        const completionMessageElement = document.getElementById('completion-message');
        const quizContentElement = document.querySelector('.quiz-content');
        const navigationButtonsElement = document.querySelector('.navigation-buttons');
        const settingsBtnEl = document.getElementById('settings-btn');
        const settingsPanelEl = document.getElementById('settings-panel');
        const revealChoicesToggleEl = document.getElementById('reveal-choices-toggle');
        const favoriteToggle = document.getElementById('favorite-toggle');
        const resetQuizBtn = document.getElementById('reset-quiz-btn');
        const navigatorOverlay = document.getElementById('navigator-overlay');
        const navigatorGrid = document.getElementById('navigator-grid');
        const navigatorClose = document.getElementById('navigator-close');
        const viewProgressReviewBtn = document.getElementById('view-progress-review-btn');
        const reviewListEl = document.getElementById('review-list');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const copyReviewBtn = document.getElementById('copy-review-btn');
        const backToQuizBtn = document.getElementById('back-to-quiz-btn');

        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let currentFilter = 'all';
        let favoriteQuestions = new Set();
        let isPreviewMode = false;
        const quizProgressKey = `standaloneQuizProgress:${activeSessionData.title}`;
        const quizSettingsKey = `standaloneQuizSettings:${activeSessionData.title}`;
        let userSettings = {
            hideChoicesUntilReveal: true
        };

        function loadUserSettings() {
            const rawSettings = localStorage.getItem(quizSettingsKey);
            if (!rawSettings) return;
            try {
                const parsedSettings = JSON.parse(rawSettings);
                if (typeof parsedSettings.hideChoicesUntilReveal === 'boolean') {
                    userSettings.hideChoicesUntilReveal = parsedSettings.hideChoicesUntilReveal;
                }
            } catch (error) {
                console.warn('Unable to load quiz settings:', error);
            }
        }

        function saveUserSettings() {
            localStorage.setItem(quizSettingsKey, JSON.stringify(userSettings));
        }

        function saveQuizProgress() {
            const payload = {
                currentQuestionIndex,
                userAnswers,
                favoriteQuestions: Array.from(favoriteQuestions)
            };
            localStorage.setItem(quizProgressKey, JSON.stringify(payload));
        }

        function loadQuizProgress() {
            const savedProgress = localStorage.getItem(quizProgressKey);
            if (!savedProgress) return;
            try {
                const parsed = JSON.parse(savedProgress);
                if (Array.isArray(parsed.userAnswers) && parsed.userAnswers.length === quizData.length) {
                    userAnswers = parsed.userAnswers;
                }
                if (Array.isArray(parsed.favoriteQuestions)) {
                    favoriteQuestions = new Set(parsed.favoriteQuestions);
                }
                if (Number.isInteger(parsed.currentQuestionIndex)) {
                    currentQuestionIndex = Math.max(0, Math.min(parsed.currentQuestionIndex, quizData.length));
                }
            } catch (error) {
                console.warn('Unable to load quiz progress:', error);
            }
        }

        function showPanel(panelEl) {
            panelEl.style.display = 'flex';
        }

        function hidePanel(panelEl) {
            panelEl.style.display = 'none';
        }

        function provideCopyFeedback(button) {
            const originalText = button.textContent;
            button.textContent = 'Copied!';
            button.classList.add('copied-feedback');
            button.disabled = true;
            setTimeout(() => {
                button.textContent = originalText;
                button.classList.remove('copied-feedback');
                button.disabled = false;
            }, 1500);
        }

        function updateFavoriteButton() {
            const isFavorite = favoriteQuestions.has(currentQuestionIndex);
            favoriteToggle.classList.toggle('active', isFavorite);
            favoriteToggle.textContent = isFavorite ? '★' : '☆';
            favoriteToggle.setAttribute('aria-pressed', isFavorite);
            favoriteToggle.title = isFavorite ? 'Remove from favorites' : 'Save question to favorites';
            favoriteToggle.removeAttribute('aria-hidden');
            favoriteToggle.style.display = currentQuestionIndex >= quizData.length ? 'none' : 'grid';
        }

        function toggleFavorite() {
            if (currentQuestionIndex >= quizData.length) return;
            if (favoriteQuestions.has(currentQuestionIndex)) favoriteQuestions.delete(currentQuestionIndex);
            else favoriteQuestions.add(currentQuestionIndex);
            updateFavoriteButton();
            if (navigatorOverlay.style.display === 'block') buildNavigatorGrid();
            saveQuizProgress();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                showCompletion();
                return;
            }

            quizContentElement.style.display = 'block';
            navigationButtonsElement.style.display = 'flex';
            completionMessageElement.style.display = 'none';
            navigatorOverlay.style.display = 'none';

            explanationElement.style.display = 'none';
            explanationElement.innerHTML = '';
            answerOptionsElement.innerHTML = '';

            const currentQuestion = quizData[currentQuestionIndex];
            const questionHasAnswer = userAnswers[currentQuestionIndex] !== null;

            questionCounterElement.innerHTML = `Question ${currentQuestionIndex + 1} of ${quizData.length} <small>▼</small>`;
            questionTextElement.textContent = currentQuestion.question;

            const shouldHideChoices = userSettings.hideChoicesUntilReveal && !questionHasAnswer;
            revealChoicesButton.style.display = shouldHideChoices ? 'inline-block' : 'none';
            revealChoicesButton.disabled = false;
            answerOptionsElement.style.display = shouldHideChoices ? 'none' : 'flex';

            currentQuestion.options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.classList.add('option-button');

                if (questionHasAnswer) {
                    button.disabled = true;
                    const savedAnswer = userAnswers[currentQuestionIndex];
                    if (option === savedAnswer.selected) {
                        button.classList.add(savedAnswer.isCorrect ? 'correct' : 'incorrect');
                    }
                    if (option === currentQuestion.correctAnswer && !savedAnswer.isCorrect) {
                        button.classList.add('reveal-correct');
                    }
                } else {
                    button.addEventListener('click', selectAnswer);
                }

                answerOptionsElement.appendChild(button);
            });

            if (questionHasAnswer) {
                explanationElement.innerHTML = `<strong>Explanation:</strong> ${currentQuestion.explanation || 'No explanation provided.'}`;
                explanationElement.style.display = 'block';
            }

            updateFavoriteButton();
            updateNavButtonStates();
        }

        function updateNavButtonStates() {
            prevButton.disabled = currentQuestionIndex === 0;
            nextButton.textContent = currentQuestionIndex === quizData.length - 1 ? 'Finish' : 'Next';
        }

        function selectAnswer(event) {
            if (userAnswers[currentQuestionIndex] !== null) return;

            const selectedButton = event.target;
            const selectedAnswer = selectedButton.textContent;
            const currentQuestion = quizData[currentQuestionIndex];
            const isCorrect = selectedAnswer === currentQuestion.correctAnswer;

            userAnswers[currentQuestionIndex] = { selected: selectedAnswer, isCorrect };

            answerOptionsElement.querySelectorAll('.option-button').forEach(button => {
                button.disabled = true;
                if (button.textContent === selectedAnswer) {
                    button.classList.add(isCorrect ? 'correct' : 'incorrect');
                }
                if (!isCorrect && button.textContent === currentQuestion.correctAnswer) {
                    button.classList.add('reveal-correct');
                }
            });

            explanationElement.innerHTML = `<strong>Explanation:</strong> ${currentQuestion.explanation || 'No explanation provided.'}`;
            explanationElement.style.display = 'block';
            saveQuizProgress();
        }

        function goToNextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex += 1;
                loadQuestion();
            } else if (currentQuestionIndex === quizData.length - 1) {
                currentQuestionIndex += 1;
                showCompletion();
            }
            saveQuizProgress();
        }

        function goToPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex -= 1;
                loadQuestion();
                saveQuizProgress();
            }
        }

        function toggleNavigator() {
            if (navigatorOverlay.style.display === 'block') {
                navigatorOverlay.style.display = 'none';
            } else {
                buildNavigatorGrid();
                navigatorOverlay.style.display = 'block';
            }
        }

        function buildNavigatorGrid() {
            navigatorGrid.innerHTML = '';
            for (let i = 0; i < quizData.length; i += 1) {
                const item = document.createElement('div');
                item.classList.add('nav-item');
                item.textContent = i + 1;

                if (favoriteQuestions.has(i)) {
                    const star = document.createElement('span');
                    star.classList.add('nav-favorite-star');
                    star.textContent = '★';
                    star.setAttribute('aria-hidden', 'true');
                    item.appendChild(star);
                }

                if (i === currentQuestionIndex) item.classList.add('current');

                if (userAnswers[i] !== null) {
                    item.classList.add(userAnswers[i].isCorrect ? 'correct' : 'incorrect');
                }

                item.addEventListener('click', () => {
                    currentQuestionIndex = i;
                    loadQuestion();
                    saveQuizProgress();
                });
                navigatorGrid.appendChild(item);
            }
        }

        function showCompletion(isPreview = false) {
            isPreviewMode = isPreview;
            quizContentElement.style.display = 'none';
            navigationButtonsElement.style.display = 'none';
            completionMessageElement.style.display = 'flex';
            favoriteToggle.style.display = 'none';
            favoriteToggle.setAttribute('aria-hidden', 'true');

            const correctCount = userAnswers.filter(answer => answer && answer.isCorrect).length;
            const answeredCount = userAnswers.filter(answer => answer !== null).length;
            document.getElementById('final-score').textContent = isPreview
                ? `Score So Far: ${correctCount} / ${answeredCount}`
                : `Score: ${correctCount} / ${quizData.length}`;
            backToQuizBtn.style.display = isPreview ? 'inline-block' : 'none';

            renderReviewList('all');
            saveQuizProgress();
        }

        function showQuizFromPreview() {
            isPreviewMode = false;
            backToQuizBtn.style.display = 'none';
            completionMessageElement.style.display = 'none';
            quizContentElement.style.display = 'block';
            navigationButtonsElement.style.display = 'flex';
            favoriteToggle.style.display = 'grid';
            favoriteToggle.setAttribute('aria-hidden', 'false');
            loadQuestion();
        }

        function renderReviewList(filter) {
            currentFilter = filter;
            reviewListEl.innerHTML = '';

            filterBtns.forEach(btn => {
                if (btn.dataset.filter === filter) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            quizData.forEach((q, index) => {
                const ua = userAnswers[index];
                const isCorrect = ua && ua.isCorrect;
                const isAnswered = ua !== null;
                const isFavorite = favoriteQuestions.has(index);

                if (isPreviewMode && !isAnswered) return;
                if (filter === 'correct' && !isCorrect) return;
                if (filter === 'incorrect' && (isCorrect || !isAnswered)) return;
                if (filter === 'favorites' && !isFavorite) return;

                const card = document.createElement('div');
                card.classList.add('review-card');
                if (isCorrect) card.classList.add('correct-card');
                else card.classList.add('incorrect-card');

                let html = `<div class="review-q">${index + 1}. ${q.question}${isFavorite ? ' <span class="favorite-mark" title="Favorited">★</span>' : ''}</div>`;

                if (ua) {
                    html += `<div class="review-ans"><span class="ans-label">Your Answer:</span> <span class="user-ans-text ${isCorrect ? 'correct' : 'incorrect'}">${ua.selected}</span></div>`;
                } else {
                    html += '<div class="review-ans"><span class="ans-label">Your Answer:</span> <span class="user-ans-text incorrect">Skipped</span></div>';
                }

                if (!isCorrect) {
                    html += `<div class="review-ans"><span class="ans-label">Correct Answer:</span> ${q.correctAnswer}</div>`;
                }

                html += `<div class="review-exp">${q.explanation}</div>`;
                card.innerHTML = html;
                reviewListEl.appendChild(card);
            });
        }

        function copyReviewText() {
            let textToCopy = `Quiz Review: ${activeSessionData.title}\nFilter: ${currentFilter.toUpperCase()}\n\n`;
            let count = 0;

            quizData.forEach((q, index) => {
                const ua = userAnswers[index];
                const isCorrect = ua && ua.isCorrect;
                const isAnswered = ua !== null;
                const isFavorite = favoriteQuestions.has(index);

                if (isPreviewMode && !isAnswered) return;
                if (currentFilter === 'correct' && !isCorrect) return;
                if (currentFilter === 'incorrect' && (isCorrect || !isAnswered)) return;
                if (currentFilter === 'favorites' && !isFavorite) return;

                count += 1;
                textToCopy += `Q${index + 1}: ${q.question}${isFavorite ? ' ★' : ''}\n`;
                textToCopy += `Your Answer: ${ua ? ua.selected : 'Skipped'} (${isCorrect ? 'Correct' : 'Incorrect'})\n`;
                if (!isCorrect) textToCopy += `Correct Answer: ${q.correctAnswer}\n`;
                textToCopy += `Explanation: ${q.explanation}\n`;
                textToCopy += '----------------------------------------\n\n';
            });

            if (count === 0) textToCopy += 'No questions match this filter.';

            navigator.clipboard.writeText(textToCopy).then(() => {
                provideCopyFeedback(copyReviewBtn);
            });
        }

        prevButton.addEventListener('click', goToPreviousQuestion);
        nextButton.addEventListener('click', goToNextQuestion);
        favoriteToggle.addEventListener('click', toggleFavorite);
        questionCounterElement.addEventListener('click', toggleNavigator);
        navigatorClose.addEventListener('click', toggleNavigator);
        viewProgressReviewBtn.addEventListener('click', () => {
            toggleNavigator();
            showCompletion(true);
        });
        settingsBtnEl.addEventListener('click', () => showPanel(settingsPanelEl));
        revealChoicesToggleEl.addEventListener('change', event => {
            userSettings.hideChoicesUntilReveal = event.target.checked;
            saveUserSettings();
            loadQuestion();
        });
        revealChoicesButton.addEventListener('click', () => {
            answerOptionsElement.style.display = 'flex';
            revealChoicesButton.style.display = 'none';
        });
        filterBtns.forEach(btn => {
            btn.addEventListener('click', event => renderReviewList(event.target.dataset.filter));
        });
        copyReviewBtn.addEventListener('click', copyReviewText);
        backToQuizBtn.addEventListener('click', showQuizFromPreview);
        resetQuizBtn.addEventListener('click', () => {
            const confirmed = window.confirm('Reset this quiz? This will clear your answers, favorites, and position.');
            if (!confirmed) return;
            userAnswers = new Array(quizData.length).fill(null);
            favoriteQuestions = new Set();
            currentQuestionIndex = 0;
            currentFilter = 'all';
            localStorage.removeItem(quizProgressKey);
            loadQuestion();
        });
        document.querySelectorAll('.panel-overlay').forEach(panel => {
            panel.addEventListener('click', event => {
                if (event.target === panel) hidePanel(panel);
            });
        });
        document.querySelectorAll('.close-button-x').forEach(button => {
            button.addEventListener('click', event => {
                hidePanel(document.getElementById(event.currentTarget.dataset.target));
            });
        });

        quizTitleEl.textContent = activeSessionData.title;
        loadUserSettings();
        revealChoicesToggleEl.checked = userSettings.hideChoicesUntilReveal;
        loadQuizProgress();
        loadQuestion();
    </script>
</body>
</html>
