<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Float</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="ambient-canvas" aria-hidden="true"></canvas>

  <main class="shell" data-mode="focus">
    <header class="titlebar">
      <div class="drag-region">
        <div class="traffic-dot"></div>
        <div>
          <p class="eyebrow">Pomodoro Float</p>
          <h1 id="session-title">Focus</h1>
        </div>
      </div>
      <nav class="window-actions" aria-label="Window controls">
        <button class="icon-button" id="mini-toggle" type="button" title="Mini mode" aria-label="Mini mode">□</button>
        <button class="icon-button" id="hide-window" type="button" title="Hide window" aria-label="Hide window">–</button>
        <button class="icon-button danger" id="quit-app" type="button" title="Quit" aria-label="Quit">×</button>
      </nav>
    </header>

    <section class="timer-stage" aria-live="polite">
      <div class="orb-wrap">
        <svg class="progress-ring" viewBox="0 0 240 240" role="img" aria-label="Session progress">
          <circle class="ring-track" cx="120" cy="120" r="104"></circle>
          <circle class="ring-progress" id="ring-progress" cx="120" cy="120" r="104"></circle>
        </svg>
        <div class="time-readout">
          <span id="time-left">25:00</span>
          <small id="cycle-label">Round 1 of 4</small>
        </div>
      </div>
    </section>

    <section class="mode-tabs" aria-label="Timer mode">
      <button class="tab active" data-mode="focus" type="button">Focus</button>
      <button class="tab" data-mode="short" type="button">Short</button>
      <button class="tab" data-mode="long" type="button">Long</button>
    </section>

    <section class="primary-actions" aria-label="Timer actions">
      <button class="main-button" id="toggle-timer" type="button">Start</button>
      <button class="ghost-button" id="reset-timer" type="button">Reset</button>
      <button class="ghost-button" id="skip-session" type="button">Skip</button>
    </section>

    <section class="stats-row" aria-label="Today stats">
      <div>
        <span id="completed-count">0</span>
        <small>done today</small>
      </div>
      <div>
        <span id="current-streak">0</span>
        <small>streak</small>
      </div>
      <div>
        <span id="next-label">Short break</span>
        <small>next</small>
      </div>
    </section>

    <section class="settings-panel">
      <details open>
        <summary>Session</summary>
        <div class="settings-grid">
          <label>
            Focus
            <input id="focus-minutes" type="number" min="1" max="180" step="1">
          </label>
          <label>
            Short
            <input id="short-minutes" type="number" min="1" max="60" step="1">
          </label>
          <label>
            Long
            <input id="long-minutes" type="number" min="1" max="90" step="1">
          </label>
          <label>
            Rounds
            <input id="rounds" type="number" min="1" max="12" step="1">
          </label>
        </div>
        <label class="toggle-line">
          <span>Auto-start next session</span>
          <input id="auto-start" type="checkbox">
        </label>
      </details>

      <details>
        <summary>Appearance</summary>
        <div class="settings-grid">
          <label>
            Theme
            <select id="theme">
              <option value="aurora">Aurora</option>
              <option value="midnight">Midnight</option>
              <option value="ember">Ember</option>
              <option value="violet">Violet</option>
            </select>
          </label>
          <label>
            Scale
            <input id="scale" type="range" min="0.82" max="1.18" step="0.02">
          </label>
        </div>
        <label class="toggle-line">
          <span>Always on top</span>
          <input id="always-on-top" type="checkbox">
        </label>
        <label class="toggle-line">
          <span>Launch at login</span>
          <input id="launch-at-login" type="checkbox">
        </label>
      </details>
    </section>

    <footer class="hint-line">
      <span>Ctrl Shift P toggles the window</span>
    </footer>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
