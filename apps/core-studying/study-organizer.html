<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core Study Organizer</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --card: #1f2630;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --danger: #f85149;
      --warning: #d29922;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      justify-content: center;
    }
    .page {
      width: min(1000px, 100%);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* -- Header & Plan Manager -- */
    header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    header h1 { margin: 0 0 8px; font-size: 1.5rem; color: var(--accent); }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }

    .plan-manager {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .plan-manager select { flex: 1; min-width: 200px; }

    /* -- General UI -- */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    #day-card {
      scroll-margin-top: 12px;
    }
    .setup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .setup-title { font-weight: 700; }
    .setup-sub { color: var(--muted); font-size: 0.85rem; }
    .setup-content.collapsed { display: none; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.85rem; color: var(--muted); }
    select, input[type="date"] {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #0d1117;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--accent); }
    button {
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      background: var(--accent);
      color: #0d1117;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #21262d; color: var(--accent); border: 1px solid var(--border); }
    button.secondary:hover:not(:disabled) { background: #30363d; }
    button.danger { background: rgba(248, 81, 73, 0.1); color: var(--danger); border: 1px solid rgba(248, 81, 73, 0.4); }
    
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .msg { margin-top: 10px; font-size: 0.9rem; min-height: 1.4em; }
    .msg.error { color: var(--danger); }
    .msg.info { color: var(--accent); }

    /* -- Real Calendar Styles -- */
    .calendar-container {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .month-block { margin-bottom: 24px; }
    .month-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: var(--text); }
    
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-header {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding-bottom: 4px;
      font-weight: bold;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 4px;
      background: #21262d; /* Default empty */
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
      position: relative;
      transition: transform 0.1s;
      overflow: hidden; /* Keeps the sliver inside rounded corners */
    }
    .cal-day:not(.empty):hover { transform: scale(1.1); z-index: 20; border-color: white; }
    .cal-day.active { border: 2px solid white; z-index: 10; }
    .cal-day.empty { background: transparent; border: none; cursor: default; }

    /* The new Bottom Sliver for Relative Load */
    .load-sliver {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 5px;
      z-index: 5;
      pointer-events: none;
    }

    /* -- Day Detail View -- */
    .day-header {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding-bottom: 8px;
    }
    .day-nav { display: flex; gap: 8px; align-items: center; }
    .day-actions { display: flex; align-items: center; gap: 12px; }

    .day-actions button,
    .day-tools button {
      padding: 6px 12px;
      font-size: 0.82rem;
    }

    .day-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    #day-content {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 10px;
    }

    .char-count-badge {
      font-size: 0.85rem;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    
    .section-item {
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-header {
      padding: 12px;
      background: #21262d;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .section-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .section-title { font-weight: 600; font-size: 0.95rem; }
    .section-meta {
      font-size: 0.8rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* Layout Update: Stack Toggles on top of Buttons */
    .section-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    /* Make the button group a single horizontal row */
    .section-actions {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    /* Reset the action row to not interfere with flex layout */
    .section-action-row {
      display: contents; /* Allows children to sit directly in the .section-actions flex container */
    }

    /* Ensure buttons don't shrink too small */
    .section-actions button {
      white-space: nowrap;
      flex: 0 0 auto;
      padding: 6px 12px;
      font-size: 0.82rem;
    }
    .split-btn {
      background: #21262d;
      color: #c084fc;
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    .split-btn:hover:not(:disabled) {
      background: #30363d;
      color: #d8b4fe;
    }

    .checklist-group {
      display: flex;
      gap: 8px;
      /* Remove old background/border if you prefer a cleaner look, 
         or keep it to group them. Let's keep it clean: */
      background: transparent;
      border: none;
      padding: 0;
    }

    .toggle-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 14px;
      border-radius: 20px; /* Pill shape */
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .toggle-btn:hover {
      border-color: #8b949e;
      color: #c9d1d9;
    }

    /* Active States */
    .toggle-btn.active {
      border-color: transparent;
      color: #0d1117; /* Dark text on bright background */
      transform: translateY(-1px);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .toggle-btn.t-listen.active {
      background: #d29922; /* Yellow/Orange for Listen */
    }

    .toggle-btn.t-read.active {
      background: #3fb950; /* Green for Read */
    }

    .toggle-btn.t-anki.active {
      background: #58a6ff; /* Blue for Anki */
    }

    /* Dim Listen if Read is present (handled via JS adding a class or inline style, 
       but we can also just use opacity if we add a class like .dimmed) */
    .toggle-btn.dimmed {
      opacity: 0.4;
      pointer-events: none; /* Optional: prevent clicking if you want to force Read-only */
    }

    .section-content { padding: 12px; overflow-x: auto; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #e6edf3;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .loading-text { color: var(--accent); font-style: italic; padding: 20px; text-align: center; }
    .summary-pills { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .pill {
      background: rgba(88,166,255,0.1);
      border: 1px solid rgba(88,166,255,0.2);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--accent-hover);
    }

    .hidden { display: none !important; }
    
    /* Legend for split calendar */
    .cal-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      justify-content: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-box { width: 12px; height: 12px; border: 1px solid var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="page">
  <!-- Top Bar -->
  <header>
    <h1>Core Study Organizer</h1>

    <div class="plan-manager">
      <select id="saved-plans-select">
        <option value="">-- Load a saved plan --</option>
      </select>
      <button id="load-plan-btn" class="secondary">Load</button>
      <button id="delete-plan-btn" class="danger">Delete</button>
      <div style="flex:1"></div>
      <button id="download-data-btn" class="secondary" title="Backup all data">⬇ Backup</button>
      <button id="upload-data-btn" class="secondary" title="Restore data">⬆ Restore</button>
      <input type="file" id="upload-file" accept=".json" style="display:none">
    </div>
  </header>

  <!-- Setup Card -->
  <div class="card" id="setup-card">
    <div class="setup-header" id="setup-header">
      <div>
        <div class="setup-title">Plan Builder</div>
        <div class="setup-sub" id="setup-sub"></div>
      </div>
      <button id="setup-toggle" class="secondary" aria-expanded="false">Expand</button>
    </div>
    <div id="setup-content" class="setup-content collapsed">
      <div class="grid">
        <div>
          <label for="book-select">Book</label>
          <select id="book-select"><option value="">Loading books...</option></select>
        </div>
        <div>
          <label for="start-section">Start Section</label>
          <select id="start-section" disabled><option>--</option></select>
        </div>
        <div>
          <label for="end-section">End Section</label>
          <select id="end-section" disabled><option>--</option></select>
        </div>
        <div>
          <label for="start-date">Start Date</label>
          <input type="date" id="start-date">
        </div>
        <div>
          <label for="end-date">Target Date</label>
          <input type="date" id="end-date">
        </div>
      </div>
      <div class="actions">
        <button id="generate-btn">Generate Range Plan</button>
        <button id="generate-yt-physics-btn" class="secondary hidden">Generate YT Physics Timestamp Plan</button>
      </div>
      <div id="setup-msg" class="msg"></div>
    </div>
  </div>

  <!-- Plan View (Calendar + Day) -->
  <div id="plan-view" class="hidden">
    <!-- Summary -->
    <div class="card">
      <div class="summary-pills">
        <div class="pill" id="sum-book"></div>
        <div class="pill" id="sum-range"></div>
        <div class="pill" id="sum-counts"></div>
        <div class="pill" id="sum-load"></div>
      </div>
      
      <div style="display:flex; justify-content: space-between; align-items: center;">
        <label style="margin:0;">Progress Calendar</label>
        <button id="toggle-cal-btn" class="secondary" style="padding: 6px 12px; font-size: 0.8rem;">Show Calendar</button>
      </div>

      <div id="calendar-wrapper" class="calendar-container hidden">
        <div id="real-calendar-root"></div>
        <div class="cal-legend">
          <div class="legend-item"><div class="legend-box" style="background: linear-gradient(90deg, #d29922 33%, #d29922 33% 66%, #21262d 66%)"></div> Listen</div>
          <div class="legend-item"><div class="legend-box" style="background: linear-gradient(90deg, #3fb950 33%, #3fb950 33% 66%, #21262d 66%)"></div> Read</div>
          <div class="legend-item"><div class="legend-box" style="background: linear-gradient(90deg, #3fb950 50%, #58a6ff 50%)"></div> Read (2-Col)</div>
          <div class="legend-item"><div class="legend-box" style="background: linear-gradient(90deg, #21262d 50%, #58a6ff 50%)"></div> Anki</div>
        </div>
      </div>
    </div>

    <!-- Day Detail -->
    <div class="card" id="day-card">
      <div class="day-header">
        <div class="day-nav">
          <button id="prev-day" class="secondary">◀</button>
          <select id="day-jumper" style="width: auto; min-width: 140px;"></select>
          <button id="next-day" class="secondary">▶</button>
          <button id="today-btn">Today</button>
        </div>

        <div class="day-actions">
          <button id="copy-day-btn" class="secondary">Copy Full Day</button>
          <button id="split-day-btn" class="split-btn">Split</button>
          <div id="day-char-count" class="char-count-badge">0 chars</div>
        </div>
      </div>

      <div class="day-tools">
        <button id="gpt-read-btn" class="secondary">GPT Read</button>
        <button id="gem-qa-btn" class="secondary">Gem Q&A</button>
        <button id="gem-anki-btn" class="secondary">Gem Anki</button>
        <button id="gem-visual-btn" class="secondary">Gem Visual</button>
        <button id="tts-btn" class="secondary">TTS</button>
      </div>

      <div id="day-content"></div>
    </div>
  </div>
</div>

<script>
/**
 * Core Study Organizer V4.2
 * - Includes Character Count Badge in Day Header
 * - Includes Relative Load "Sliver" in Calendar (Green=Light, Red=Heavy)
 * - Supports nested manifests with sections/intro files
 * - Adds a timestamp-based YT Physics preset planner
 */

const STORAGE_KEY = 'core_study_data_v4';
const YT_PHYSICS_BOOK = 'YT Physics';
const TRANSCRIPT_FALLBACK_CHARS_PER_MINUTE = 950;
let appData = {
  savedPlans: {}, 
  lastActiveId: null
};

let booksData = {};
let currentBookSections = [];
let currentBookPath = '';
let currentPlan = null;
let currentDayIndex = 0;
let runtimeTextCache = {};

const GPT_READ_URL = 'https://chatgpt.com/g/g-p-68d551179e20819199aaa83585b01711-read-to-me-2-0/project';
const GEM_QA_URL = 'https://gemini.google.com/gem/1FxM5xfj9hMAgImyzCFPr02Ly9Ft6H1ZA';
const GEM_ANKI_URL = 'https://gemini.google.com/gem/193-SptQjf_oXHlII9q4-NbK9xTEKD56Y?usp=sharing';
const GEM_VISUAL_URL = 'https://gemini.google.com/gem/1flHRvHULXpHZL1YPAcHlPsSGz_adsafV?usp=sharing';
const TTS_URL = 'https://starfox1230.github.io/TTS/';

// UI Refs
const els = {
  savedSelect: document.getElementById('saved-plans-select'),
  loadBtn: document.getElementById('load-plan-btn'),
  delBtn: document.getElementById('delete-plan-btn'),
  dlBtn: document.getElementById('download-data-btn'),
  ulBtn: document.getElementById('upload-data-btn'),
  ulInput: document.getElementById('upload-file'),
  setupCard: document.getElementById('setup-card'),
  setupHeader: document.getElementById('setup-header'),
  setupSub: document.getElementById('setup-sub'),
  setupToggle: document.getElementById('setup-toggle'),
  setupContent: document.getElementById('setup-content'),
  bookSelect: document.getElementById('book-select'),
  startSec: document.getElementById('start-section'),
  endSec: document.getElementById('end-section'),
  startDate: document.getElementById('start-date'),
  endDate: document.getElementById('end-date'),
  genBtn: document.getElementById('generate-btn'),
  genYtPhysicsBtn: document.getElementById('generate-yt-physics-btn'),
  msg: document.getElementById('setup-msg'),
  planView: document.getElementById('plan-view'),
  sumBook: document.getElementById('sum-book'),
  sumRange: document.getElementById('sum-range'),
  sumCounts: document.getElementById('sum-counts'),
  sumLoad: document.getElementById('sum-load'),
  
  toggleCalBtn: document.getElementById('toggle-cal-btn'),
  calWrapper: document.getElementById('calendar-wrapper'),
  calRoot: document.getElementById('real-calendar-root'),
  
  prevDay: document.getElementById('prev-day'),
  nextDay: document.getElementById('next-day'),
  dayJumper: document.getElementById('day-jumper'),
  todayBtn: document.getElementById('today-btn'),
  copyDayBtn: document.getElementById('copy-day-btn'),
  splitDayBtn: document.getElementById('split-day-btn'),
  dayCharCount: document.getElementById('day-char-count'),
  dayContent: document.getElementById('day-content'),
  dayCard: document.getElementById('day-card'),
  gptReadBtn: document.getElementById('gpt-read-btn'),
  gemQaBtn: document.getElementById('gem-qa-btn'),
  gemAnkiBtn: document.getElementById('gem-anki-btn'),
  gemVisualBtn: document.getElementById('gem-visual-btn'),
  ttsBtn: document.getElementById('tts-btn')
};

async function init() {
  loadData();
  setDefaultDates();
  setSetupCollapsed(true);
  try {
    const res = await fetch('books.json');
    booksData = await res.json();
    populateBooks();
    if (appData.lastActiveId && appData.savedPlans[appData.lastActiveId]) {
      setTimeout(() => loadPlan(appData.lastActiveId), 100);
    }
  } catch (e) {
    showMsg('Error loading books.json: ' + e.message, 'error');
  }
  updateSavedPlansDropdown();
}

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { appData = JSON.parse(raw); } catch(e) { console.error(e); }
  }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  updateSavedPlansDropdown();
}
function setSetupCollapsed(collapsed) {
  if (!els.setupContent) return;
  if (collapsed) {
    els.setupContent.classList.add('collapsed');
    els.setupToggle.textContent = 'Expand';
    els.setupToggle.setAttribute('aria-expanded', 'false');
    els.setupCard.classList.add('is-collapsed');
  } else {
    els.setupContent.classList.remove('collapsed');
    els.setupToggle.textContent = 'Collapse';
    els.setupToggle.setAttribute('aria-expanded', 'true');
    els.setupCard.classList.remove('is-collapsed');
  }
}
function showMsg(txt, type) {
  els.msg.textContent = txt;
  els.msg.className = 'msg ' + type;
  setTimeout(() => els.msg.textContent = '', 4000);
}

function formatLocalISO(date) {
  const tzOffset = date.getTimezoneOffset() * 60000;
  return new Date(date.getTime() - tzOffset).toISOString().split('T')[0];
}

function parseLocalISO(dateStr) {
  if (!dateStr) return new Date(NaN);
  const [datePart] = dateStr.split('T');
  const [y, m, d] = (datePart || '').split('-').map(Number);
  return new Date(y, (m || 1) - 1, d || 1);
}

function roundToTenth(value) {
  return Math.round((value + Number.EPSILON) * 10) / 10;
}

function extractTranscriptMinutes(text) {
  const matches = [...text.matchAll(/^(\d{2}):(\d{2}):(\d{2})\.(\d{3})/gm)];
  if (!matches.length) return null;
  const [, hours, minutes, seconds, millis] = matches[matches.length - 1];
  return (
    Number(hours) * 3600 +
    Number(minutes) * 60 +
    Number(seconds) +
    Number(millis) / 1000
  ) / 60;
}

function estimateTranscriptMinutes(text) {
  const timestampMinutes = extractTranscriptMinutes(text);
  if (timestampMinutes !== null) {
    return { minutes: timestampMinutes, source: 'timestamp' };
  }
  return {
    minutes: text.length / TRANSCRIPT_FALLBACK_CHARS_PER_MINUTE,
    source: 'chars-fallback'
  };
}

function getPlanLoadUnit(plan = currentPlan) {
  return plan?.loadUnit || 'chars';
}

function getSectionLoadValue(section) {
  if (typeof section?.load === 'number') return section.load;
  if (typeof section?.length === 'number') return section.length;
  return 0;
}

function getDayLoadValue(day) {
  return (day?.sections || []).reduce((total, section) => total + getSectionLoadValue(section), 0);
}

function getDayCharCount(day) {
  return (day?.sections || []).reduce((total, section) => total + (section.length || 0), 0);
}

function formatLoadValue(value, unit = 'chars') {
  if (unit === 'minutes') {
    return `${roundToTenth(value).toFixed(1)} min`;
  }
  return `${Math.round(value).toLocaleString()} chars`;
}

function formatDayBadge(day, plan = currentPlan) {
  const unit = getPlanLoadUnit(plan);
  const loadLabel = formatLoadValue(getDayLoadValue(day), unit);
  if (unit === 'minutes') {
    return `${loadLabel} planned | ${getDayCharCount(day).toLocaleString()} chars`;
  }
  return loadLabel;
}

function formatSectionMeta(section, plan = currentPlan) {
  const unit = getPlanLoadUnit(plan);
  if (unit === 'minutes' && typeof section.runtimeMinutes === 'number') {
    const parts = [];
    if ((section.loadFactor || 1) !== 1) {
      parts.push(`${roundToTenth(section.runtimeMinutes).toFixed(1)} min video`);
      parts.push(`${formatLoadValue(getSectionLoadValue(section), 'minutes')} planned`);
      parts.push((section.studyMode || 'review').toUpperCase());
    } else {
      parts.push(`${formatLoadValue(getSectionLoadValue(section), 'minutes')} planned`);
      parts.push((section.studyMode || 'new').toUpperCase());
    }
    if (section.length) {
      parts.push(`${section.length.toLocaleString()} chars`);
    }
    return parts.join(' | ');
  }
  return `${(section.length || 0).toLocaleString()} chars`;
}

function formatPlanDayOption(day, index, plan = currentPlan) {
  const dateLabel = parseLocalISO(day.date).toLocaleDateString();
  const unit = getPlanLoadUnit(plan);
  const loadLabel = formatLoadValue(getDayLoadValue(day), unit);
  return `Day ${index + 1}: ${dateLabel} (${loadLabel})`;
}

function buildRangeLabel(selection) {

function addSectionToFlatList(flat, chapterTitle, sectionKey, sectionValue, sectionTitleOverride = null) {

function flattenManifestLegacy(manifest) {

function flattenManifest(manifest) {
  const chapters = Object.keys(manifest).sort(natCompare);
  const flat = [];
  chapters.forEach(chKey => {
    const ch = manifest[chKey];
    if (!ch || typeof ch !== 'object' || !ch.title) return;

    if (ch.sections && typeof ch.sections === 'object') {
      if (ch.introFile) {
        addSectionToFlatList(
          flat,
          ch.title,
          `${chKey}.intro`,
          { file: ch.introFile, title: ch.introTitle || 'Introduction' },
          ch.introTitle || 'Introduction'
        );
      }

      Object.keys(ch.sections)
        .sort(compareSectionKeys)
        .forEach(secKey => addSectionToFlatList(flat, ch.title, secKey, ch.sections[secKey]));
      return;
    }

    Object.keys(ch)
      .filter(key => !['title', 'introFile', 'introTitle', 'sections'].includes(key))
      .sort(compareSectionKeys)
      .forEach(secKey => addSectionToFlatList(flat, ch.title, secKey, ch[secKey]));
  });
  return flat;
}

async function fetchSectionText(section) {
  const url = encodePath(`${currentBookPath}/${section.file}`);
  const response = await fetch(url);
  if (!response.ok) {
    throw new Error(`Missing: ${section.file}`);
  }
  return response.text();
}

async function hydrateSelection(selection, options = {}) {
  const {
    loadUnit = 'chars',
    studyMode = 'new',
    loadFactor = 1
  } = options;

  const hydrated = [];
  for (const section of selection) {
    const text = await fetchSectionText(section);
    const baseSection = {
      file: section.file,
      chapter: section.chapter,
      sectionKey: section.sectionKey,
      fullTitle: section.fullTitle,
      length: text.length,
      listen: false,
      read: false,
      anki: false,
      studyMode,
      loadFactor
    };

    if (loadUnit === 'minutes') {
      const estimate = estimateTranscriptMinutes(text);
      hydrated.push({
        ...baseSection,
        runtimeMinutes: estimate.minutes,
        runtimeSource: estimate.source,
        load: estimate.minutes * loadFactor
      });
      continue;
    }

    hydrated.push({
      ...baseSection,
      load: text.length
    });
  }

  return hydrated;
}

function buildGreedyDaysFromSections(sections, daysCount, startDate, targetPerDay) {
  const days = [];
  let sectionIndex = 0;

  for (let dayOffset = 0; dayOffset < daysCount; dayOffset++) {
    const dayDate = new Date(startDate);
    dayDate.setDate(dayDate.getDate() + dayOffset);

    const day = { date: formatLocalISO(dayDate), sections: [] };
    let dayLoad = 0;

    while (sectionIndex < sections.length) {
      const section = sections[sectionIndex];
      const sectionLoad = getSectionLoadValue(section);
      const remainingSections = sections.length - sectionIndex;
      const remainingDays = daysCount - dayOffset;

      if (remainingSections <= remainingDays && day.sections.length > 0) break;

      if (!day.sections.length) {
        day.sections.push(section);
        dayLoad += sectionLoad;
        sectionIndex++;
        continue;
      }

      const currentDiff = Math.abs(dayLoad - targetPerDay);
      const nextDiff = Math.abs((dayLoad + sectionLoad) - targetPerDay);
      if (nextDiff < currentDiff || dayLoad < targetPerDay * 0.7) {
        day.sections.push(section);
        dayLoad += sectionLoad;
        sectionIndex++;
      } else {
        break;
      }
    }

    days.push(day);
  }

  while (sectionIndex < sections.length) {
    days[days.length - 1].sections.push(sections[sectionIndex++]);
  }

  return days;
}

function buildTimestampDaysFromUnits(units, daysCount, startDate) {
  if (!units.length) {
    return { days: [], totalLoad: 0, targetPerDay: 0 };
  }

  const totalLoad = units.reduce((sum, unit) => sum + unit.load, 0);
  const targetPerDay = totalLoad / daysCount;
  const unitCount = units.length;
  const workingDays = Math.min(daysCount, unitCount);

  const prefixLoads = [0];
  units.forEach(unit => prefixLoads.push(prefixLoads[prefixLoads.length - 1] + unit.load));

  const dp = Array.from({ length: workingDays + 1 }, () => Array(unitCount + 1).fill(Number.POSITIVE_INFINITY));
  const previous = Array.from({ length: workingDays + 1 }, () => Array(unitCount + 1).fill(-1));
  dp[0][0] = 0;

  for (let dayIndex = 1; dayIndex <= workingDays; dayIndex++) {
    const maxUnitIndex = unitCount - (workingDays - dayIndex);
    for (let endIndex = dayIndex; endIndex <= maxUnitIndex; endIndex++) {
      for (let splitIndex = dayIndex - 1; splitIndex < endIndex; splitIndex++) {
        const segmentLoad = prefixLoads[endIndex] - prefixLoads[splitIndex];
        const candidateCost = dp[dayIndex - 1][splitIndex] + (segmentLoad - targetPerDay) ** 2;
        if (candidateCost < dp[dayIndex][endIndex]) {
          dp[dayIndex][endIndex] = candidateCost;
          previous[dayIndex][endIndex] = splitIndex;
        }
      }
    }
  }

  const partitions = [];
  let cursor = unitCount;
  for (let dayIndex = workingDays; dayIndex >= 1; dayIndex--) {
    const splitIndex = previous[dayIndex][cursor];
    partitions.push(units.slice(splitIndex, cursor));
    cursor = splitIndex;
  }
  partitions.reverse();

  const days = [];
  for (let dayOffset = 0; dayOffset < daysCount; dayOffset++) {
    const dayDate = new Date(startDate);
    dayDate.setDate(dayDate.getDate() + dayOffset);
    const assignedUnits = partitions[dayOffset] || [];
    days.push({
      date: formatLocalISO(dayDate),
      sections: assignedUnits.flatMap(unit => unit.sections)
    });
  }

  return { days, totalLoad, targetPerDay };
}

function getSectionRange(startKey, endKey) {
  return currentBookSections.filter(section =>
    compareSectionKeys(section.sectionKey, startKey) >= 0 &&
    compareSectionKeys(section.sectionKey, endKey) <= 0
  );
}

async function generateYtPhysicsTimestampPlan() {
  const bookName = els.bookSelect.value;
  const startDate = parseLocalISO(els.startDate.value);
  const endDate = parseLocalISO(els.endDate.value);

  if (bookName !== YT_PHYSICS_BOOK) {
    showMsg('Select the YT Physics book to use the timestamp preset.', 'error');
    return;
  }
  if (!startDate || !endDate || Number.isNaN(startDate.valueOf()) || Number.isNaN(endDate.valueOf())) {
    showMsg('Fill in the start and target dates.', 'error');
    return;
  }
  if (endDate < startDate) {
    showMsg('Invalid dates', 'error');
    return;
  }
  if (!currentBookSections.length) {
    await handleBookChange();
  }

  els.genYtPhysicsBtn.disabled = true;
  showMsg('Building timestamp-based YT Physics plan...', 'info');

  try {
    const ultrasoundNew = await hydrateSelection(getSectionRange('04.19', '04.26'), { loadUnit: 'minutes', studyMode: 'new' });
    const xrayReview = await hydrateSelection(getSectionRange('01.01', '01.08'), { loadUnit: 'minutes', studyMode: 'review', loadFactor: 0.5 });
    const xrayNew = await hydrateSelection(getSectionRange('01.09', '01.33'), { loadUnit: 'minutes', studyMode: 'new' });
    const ctNew = await hydrateSelection(getSectionRange('02.01', '02.17'), { loadUnit: 'minutes', studyMode: 'new' });
    const mriReview = await hydrateSelection(getSectionRange('03.01', '03.07'), { loadUnit: 'minutes', studyMode: 'review', loadFactor: 0.5 });
    const mriNew = await hydrateSelection(getSectionRange('03.08', '03.28'), { loadUnit: 'minutes', studyMode: 'new' });

    const planUnits = [
      ...ultrasoundNew.map(section => ({ sections: [section], load: getSectionLoadValue(section) })),
      { sections: xrayReview, load: xrayReview.reduce((sum, section) => sum + getSectionLoadValue(section), 0) },
      ...xrayNew.map(section => ({ sections: [section], load: getSectionLoadValue(section) })),
      ...ctNew.map(section => ({ sections: [section], load: getSectionLoadValue(section) })),
      { sections: mriReview, load: mriReview.reduce((sum, section) => sum + getSectionLoadValue(section), 0) },
      ...mriNew.map(section => ({ sections: [section], load: getSectionLoadValue(section) }))
    ];

    const daysCount = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
    const partitioned = buildTimestampDaysFromUnits(planUnits, daysCount, startDate);
    const totalSections = planUnits.flatMap(unit => unit.sections).length;

    const planId = Date.now().toString();
    const newPlan = {
      id: planId,
      created: Date.now(),
      title: 'YT Physics Timestamp Preset',
      book: bookName,
      planLabel: 'YT Physics timestamp preset',
      range: '04.19 -> 03.28',
      startDate: els.startDate.value,
      endDate: els.endDate.value,
      totalSections,
      loadUnit: 'minutes',
      totalLoad: partitioned.totalLoad,
      targetPerDay: partitioned.targetPerDay,
      days: partitioned.days
    };

    appData.savedPlans[planId] = newPlan;
    appData.lastActiveId = planId;
    saveData();
    showMsg('Timestamp-based YT Physics plan created!', 'info');
    loadPlan(planId);
  } catch (error) {
    showMsg(`Error: ${error.message}`, 'error');
  } finally {
    els.genYtPhysicsBtn.disabled = false;
  }
}

// --- Generation ---
async function generatePlan() {
  const bookName = els.bookSelect.value;
  const startIdx = parseInt(els.startSec.value);
  const endIdx = parseInt(els.endSec.value);
  const sDate = parseLocalISO(els.startDate.value);
  const eDate = parseLocalISO(els.endDate.value);

  if (!bookName || isNaN(startIdx) || isNaN(endIdx) || !sDate || !eDate) {
    showMsg("Fill all fields", 'error'); return;
  }
  if (endIdx < startIdx) { showMsg("Invalid range", 'error'); return; }
  if (eDate < sDate) { showMsg("Invalid dates", 'error'); return; }

  els.genBtn.disabled = true;
  showMsg("Analyzing...", 'info');

  try {
    const selection = currentBookSections.slice(startIdx, endIdx + 1);
    const hydratedSections = await hydrateSelection(selection, { loadUnit: 'chars', studyMode: 'new' });

    const daysCount = Math.floor((eDate - sDate) / (1000 * 60 * 60 * 24)) + 1;
    const totalChars = hydratedSections.reduce((acc, section) => acc + getSectionLoadValue(section), 0);
    const targetPerDay = totalChars / daysCount;
    const days = buildGreedyDaysFromSections(hydratedSections, daysCount, sDate, targetPerDay);

    const planId = Date.now().toString();
    const newPlan = {
      id: planId,
      created: Date.now(),
      book: bookName,
      range: `${selection[0].fullTitle} -> ${selection[selection.length-1].fullTitle.split('·')[1] || 'End'}`,
      startDate: els.startDate.value,
      endDate: els.endDate.value,
      totalSections: selection.length,
      days: days
    };

    appData.savedPlans[planId] = newPlan;
    appData.lastActiveId = planId;
    newPlan.range = buildRangeLabel(selection);
    newPlan.loadUnit = 'chars';
    newPlan.totalLoad = totalChars;
    newPlan.targetPerDay = targetPerDay;
    saveData();
    showMsg("Plan created!", 'info');
    loadPlan(planId);

  } catch(e) { showMsg("Error: " + e.message, 'error'); } 
  finally { els.genBtn.disabled = false; }
}

// --- Real Calendar Logic ---
function renderRealCalendar() {
  els.calRoot.innerHTML = '';
  if (!currentPlan) return;

  // 1. Calculate Load Min/Max for formatting
  let maxLoad = 0;
  let minLoad = Infinity;
  currentPlan.days.forEach(d => {
    const load = getDayLoadValue(d);
    if(load > maxLoad) maxLoad = load;
    if(load < minLoad) minLoad = load;
  });
  // Edge case: if all days are equal, avoid divide by zero
  if (maxLoad === minLoad) { maxLoad++; } 

  const sDate = parseLocalISO(currentPlan.startDate);
  const eDate = parseLocalISO(currentPlan.endDate);
  
  const dateMap = {};
  currentPlan.days.forEach((day, idx) => {
    dateMap[day.date.split('T')[0]] = { day, idx };
  });

  let iter = new Date(sDate.getFullYear(), sDate.getMonth(), 1);
  const finalMonth = new Date(eDate.getFullYear(), eDate.getMonth(), 1);

  while (iter <= finalMonth) {
    const year = iter.getFullYear();
    const month = iter.getMonth();
    
    const monthBlock = document.createElement('div');
    monthBlock.className = 'month-block';
    
    const title = document.createElement('div');
    title.className = 'month-title';
    title.textContent = iter.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    monthBlock.appendChild(title);
    
    const grid = document.createElement('div');
    grid.className = 'cal-grid';
    ['S','M','T','W','T','F','S'].forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const startDay = new Date(year, month, 1).getDay(); 

    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.textContent = d;
      
      if (dateMap[dateStr]) {
        const { day, idx } = dateMap[dateStr];
        updateCalendarCellColor(cell, day);
        
        // --- Add Sliver ---
        const dayLoad = getDayLoadValue(day);
        // Ratio 0 to 1
        const ratio = (dayLoad - minLoad) / (maxLoad - minLoad);
        const sliver = document.createElement('div');
        sliver.className = 'load-sliver';
        // Green(Light) to Red(Heavy). 
        // My getGradientColor is Red(0)->Green(1).
        // So for Light Load (low char count) -> we want Green (1).
        // For Heavy Load (high char count) -> we want Red (0).
        // Input should be: 1 - ratio.
        sliver.style.background = getGradientColor(1 - ratio);
        cell.appendChild(sliver);
        // ------------------

        cell.onclick = () => setDay(idx, true);
        if (idx === currentDayIndex) cell.classList.add('active');
        cell.title = formatLoadValue(dayLoad, getPlanLoadUnit(currentPlan));
        cell.dataset.planIdx = idx; 
      } else {
        cell.classList.add('empty');
        cell.style.opacity = '0.3';
      }
      
      grid.appendChild(cell);
    }

    monthBlock.appendChild(grid);
    els.calRoot.appendChild(monthBlock);
    iter.setMonth(iter.getMonth() + 1);
  }
}

// --- Split Color Gradient Logic ---
function updateCalendarCellColor(cell, day) {
  if (!day.sections || day.sections.length === 0) {
    cell.style.background = '#21262d'; 
    return;
  }
  
  const total = day.sections.length;
  
  // 1. Calculate Basic Counts
  const readCount = day.sections.filter(s => s.read).length;
  const ankiCount = day.sections.filter(s => s.anki).length;
  
  // 2. Calculate "Listen" Relevance
  // Listen is only required for sections that are NOT read.
  const sectionsNeedingListen = total - readCount;
  
  // Count how many of those specific sections were actually listened to.
  // We exclude sections that are already read to avoid double counting visual progress.
  const relevantListenCount = day.sections.filter(s => s.listen && !s.read).length;

  // 3. Calculate Widths
  // If 100% read -> Listen Width = 0%.
  // If 0% read -> Listen Width = 33.33%.
  const listenWidthPct = (sectionsNeedingListen / total) * 33.33;
  
  // The remaining space is split equally between Read and Anki
  const remainder = 100 - listenWidthPct;
  const readWidthPct = remainder / 2;
  
  // 4. Calculate Colors (Status)
  let listenPct = 0;
  if (sectionsNeedingListen > 0) {
    listenPct = relevantListenCount / sectionsNeedingListen;
  }
  
  const readPct = readCount / total;
  const ankiPct = ankiCount / total;

  const cListen = getGradientColor(listenPct);
  const cRead = getGradientColor(readPct);
  const cAnki = getGradientColor(ankiPct);

  // Gradient Stops
  const stop1 = listenWidthPct; 
  const stop2 = listenWidthPct + readWidthPct;
  
  cell.style.background = `linear-gradient(90deg, 
    ${cListen} ${stop1}%, 
    ${cRead} ${stop1}% ${stop2}%, 
    ${cAnki} ${stop2}%
  )`;
  
  cell.style.textShadow = '0 1px 2px rgba(0,0,0,0.8)';
}

function getGradientColor(pct) {
  // Red (0) -> Yellow (0.5) -> Green (1)
  let r, g, b = 85; 
  if (pct < 0.5) {
    // Red to Yellow
    // Red: 248, 81, 73 (#f85149)
    // Yellow: 210, 153, 34 (#d29922)
    const ratio = pct * 2;
    r = 248 + (210 - 248) * ratio;
    g = 81 + (153 - 81) * ratio;
    b = 73 + (34 - 73) * ratio;
  } else {
    // Yellow to Green
    // Yellow (#d29922) to Green (#3fb950)
    const ratio = (pct - 0.5) * 2;
    r = 210 + (63 - 210) * ratio;
    g = 153 + (185 - 153) * ratio;
    b = 34 + (80 - 34) * ratio;
  }
  if (pct === 0) return 'rgba(33, 38, 45, 1)';
  return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
}

  currentDayIndex = idx;
  els.dayJumper.value = idx;

  if (scrollToDay && els.dayCard) {
    scrollToDayTop();
  }

  document.querySelectorAll('.cal-day').forEach(el => {
    if (el.dataset.planIdx == idx) el.classList.add('active');
    else el.classList.remove('active');
  });

  const day = currentPlan.days[idx];
  els.dayContent.innerHTML = '';

  // Update workload badge
  els.dayCharCount.textContent = formatDayBadge(day, currentPlan);

  if (day.sections.length === 0) {
    els.dayContent.innerHTML = '<div style="padding:20px; text-align:center; color:var(--muted)">Rest Day</div>';
    return;
  }

  els.dayContent.innerHTML = '<div class="loading-text">Fetching content...</div>';

  try {
    const sectionPromises = day.sections.map(async (sec) => {
      const cacheKey = currentPlan.book + '_' + sec.file;
      if (runtimeTextCache[cacheKey]) return { ...sec, text: runtimeTextCache[cacheKey] };
      const url = encodePath(`${currentBookPath}/${sec.file}`);
      const res = await fetch(url);
      if (!res.ok) return { ...sec, text: "Error loading text." };
      const txt = await res.text();
      runtimeTextCache[cacheKey] = txt;
      return { ...sec, text: txt };
    });

    const richSections = await Promise.all(sectionPromises);
    els.dayContent.innerHTML = '';

    richSections.forEach((sec, sIdx) => {
      const item = document.createElement('div');
      item.className = 'section-item';
      
      const head = document.createElement('div');
      head.className = 'section-header';

      const headerTop = document.createElement('div');
      headerTop.className = 'section-top';
      headerTop.innerHTML = `<div class="section-title">${sec.fullTitle}</div><div class="section-meta">${formatSectionMeta(sec, currentPlan)}</div>`;
      
      const grp = document.createElement('div');
      grp.className = 'checklist-group';

      // Helper to create a toggle button
      const createToggle = (label, type, isChecked, onClick) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `toggle-btn t-${type} ${isChecked ? 'active' : ''}`;
        btn.textContent = label;
        btn.onclick = (e) => {
          e.stopPropagation();
          btn.classList.toggle('active');
          onClick();
        };
        return btn;
      };

      // 1. LISTEN Toggle
      const isListen = day.sections[sIdx].listen || false;
      const btnListen = createToggle('Listen', 'listen', isListen, () => {
        const current = day.sections[sIdx].listen || false;
        toggleCheck(idx, sIdx, 'listen', !current);
      });

      // 2. READ Toggle
      const isRead = day.sections[sIdx].read || false;
      const btnRead = createToggle('Read', 'read', isRead, () => {
        const current = day.sections[sIdx].read || false;
        toggleCheck(idx, sIdx, 'read', !current);
        // Re-render day to apply "dimming" logic to Listen button
        setDay(idx, false); 
      });

      // 3. ANKI Toggle
      const isAnki = day.sections[sIdx].anki || false;
      const btnAnki = createToggle('Anki', 'anki', isAnki, () => {
        const current = day.sections[sIdx].anki || false;
        toggleCheck(idx, sIdx, 'anki', !current);
      });

      // Dimming Logic: If Read is active, dim Listen
      if (isRead) {
        btnListen.classList.add('dimmed');
        btnListen.title = "Read implies Listen";
      }

      grp.append(btnListen, btnRead, btnAnki);

      // --- Buttons Row ---
      const actionStack = document.createElement('div');
      actionStack.className = 'section-actions';

      // 1. Copy
      const cpBtn = document.createElement('button');
      cpBtn.className = 'secondary';
      cpBtn.textContent = 'Copy';
      cpBtn.onclick = (e) => copyText(sec.text, e.target);

      // 2. Split
      const splitBtn = document.createElement('button');
      splitBtn.className = 'split-btn';
      splitBtn.textContent = 'Split';
      splitBtn.onclick = async () => {
        await copyText(sec.text, splitBtn);
        window.open('../text-splitter/index.html', '_blank');
      };

      // 3. GPT Read
      const sectionGptBtn = document.createElement('button');
      sectionGptBtn.className = 'secondary';
      sectionGptBtn.textContent = 'GPT Read';
      sectionGptBtn.onclick = () => copyAndOpen(() => sec.text, sectionGptBtn, GPT_READ_URL);

      // 4. Gem Q&A
      const sectionGemBtn = document.createElement('button');
      sectionGemBtn.className = 'secondary';
      sectionGemBtn.textContent = 'Gem Q&A';
      sectionGemBtn.onclick = () => copyAndOpen(() => sec.text, sectionGemBtn, GEM_QA_URL);

      // 5. Gem Anki
      const sectionGemAnkiBtn = document.createElement('button');
      sectionGemAnkiBtn.className = 'secondary';
      sectionGemAnkiBtn.textContent = 'Gem Anki';
      sectionGemAnkiBtn.onclick = () => copyAndOpen(() => sec.text, sectionGemAnkiBtn, GEM_ANKI_URL);

      // 6. Gem Visual
      const sectionGemVisualBtn = document.createElement('button');
      sectionGemVisualBtn.className = 'secondary';
      sectionGemVisualBtn.textContent = 'Gem Visual';
      sectionGemVisualBtn.onclick = () => copyAndOpen(() => sec.text, sectionGemVisualBtn, GEM_VISUAL_URL);

      // Append all to the single row container
      actionStack.append(cpBtn, splitBtn, sectionGptBtn, sectionGemBtn, sectionGemAnkiBtn, sectionGemVisualBtn);

      const controls = document.createElement('div');
      controls.className = 'section-controls';
      controls.append(grp, actionStack); // Toggles on top, Buttons below

      head.append(headerTop, controls);
      
      const content = document.createElement('div');
      content.className = 'section-content';
      const pre = document.createElement('pre');
      pre.textContent = sec.text;
      content.appendChild(pre);
      
      item.append(head, content);
      els.dayContent.appendChild(item);
    });

  } catch (err) { els.dayContent.innerHTML = `<div class="msg error">${err.message}</div>`; }
}

function toggleCheck(dayIdx, secIdx, type, isChecked) {
  currentPlan.days[dayIdx].sections[secIdx][type] = isChecked;
  saveData();
  const cells = document.querySelectorAll('.cal-day');
  cells.forEach(c => {
    if (c.dataset.planIdx == dayIdx) {
      updateCalendarCellColor(c, currentPlan.days[dayIdx]);
    }
  });
}

// --- Utils ---
async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent; btn.textContent = "Copied!"; btn.classList.add('success');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 1500);
  } catch (e) { console.error(e); }
}

async function getFullDayText() {
  const day = currentPlan.days[currentDayIndex];
  if (!day || !day.sections.length) return '';
  let full = "";
  for (const sec of day.sections) {
    const k = currentPlan.book + '_' + sec.file;
    let txt = runtimeTextCache[k];
    if (!txt) {
       const url = encodePath(`${currentBookPath}/${sec.file}`);
       const res = await fetch(url);
       txt = await res.text();
       runtimeTextCache[k] = txt;
    }
    full += `# ${sec.fullTitle}\n${txt}\n\n`;
  }
  return full;
}

async function copyFullDay() {
  const day = currentPlan.days[currentDayIndex];
  if (!day || !day.sections.length) return;
  const orig = els.copyDayBtn.textContent; els.copyDayBtn.textContent = "Gathering...";
  try {
    const full = await getFullDayText();
    await navigator.clipboard.writeText(full);
    els.copyDayBtn.textContent = "Copied!"; els.copyDayBtn.classList.add('success');
    setTimeout(() => { els.copyDayBtn.textContent = orig; els.copyDayBtn.classList.remove('success'); }, 1500);
  } catch (e) { els.copyDayBtn.textContent = "Error"; }
}

async function copyAndOpen(getTextFn, btn, url) {
  if (!btn || !getTextFn) return;
  const original = btn.textContent;
  btn.textContent = 'Copying...';
  btn.disabled = true;
  
  try {
    // 1. Perform Copy
    const text = await getTextFn();
    if (!text) throw new Error('No text');
    await navigator.clipboard.writeText(text);
    
    // 2. Open Immediately
    // We do not wait for a "loading" state. We just pop the URL.
    // This allows mobile devices to recognize the link intent (e.g. opening the ChatGPT app)
    window.open(url, '_blank');
    
    btn.textContent = 'Opened!';
  } catch (e) {
    console.error(e);
    btn.textContent = 'Error';
  } finally {
    setTimeout(() => {
      btn.textContent = original;
      btn.disabled = false;
    }, 1200);
  }
}

async function splitFullDay() {
  const day = currentPlan.days[currentDayIndex];
  if (!day || !day.sections.length) return;
  const btn = els.splitDayBtn;
  const orig = btn.textContent;
  btn.textContent = "Preparing...";
  btn.disabled = true;
  try {
    const full = await getFullDayText();
    await navigator.clipboard.writeText(full);
    btn.textContent = "Copied!"; btn.classList.add('success');
    window.open('../text-splitter/index.html', '_blank');
  } catch (e) {
    btn.textContent = "Error";
  } finally {
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('success');
      btn.disabled = false;
    }, 1500);
  }
}

function getTodayIndex() {
  if (!currentPlan) return 0;
  const now = new Date(); now.setHours(0,0,0,0);
  const start = parseLocalISO(currentPlan.startDate); start.setHours(0,0,0,0);
  const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  if (diff < 0) return 0; if (diff >= currentPlan.days.length) return currentPlan.days.length - 1;
  return diff;
}
function setDefaultDates() {
  const t = new Date(); els.startDate.value = formatLocalISO(t);
  t.setDate(t.getDate() + 14); els.endDate.value = formatLocalISO(t);
}

els.toggleCalBtn.addEventListener('click', () => {
  els.calWrapper.classList.toggle('hidden');
  els.toggleCalBtn.textContent = els.calWrapper.classList.contains('hidden') ? "Show Calendar" : "Hide Calendar";
});

const natCompare = (a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
const compareSectionKeys = (a, b) => {
  const nA = a.split('.').map(Number); const nB = b.split('.').map(Number);
  for (let i = 0; i < Math.max(nA.length, nB.length); i++) {
    if ((nA[i]||0) !== (nB[i]||0)) return (nA[i]||0) - (nB[i]||0);
  } return 0;
};
const encodePath = (p) => p.split('/').map(encodeURIComponent).join('/');

function toggleSetupPanel() {
  const isCollapsed = els.setupContent.classList.contains('collapsed');
  setSetupCollapsed(!isCollapsed);
}

els.bookSelect.addEventListener('change', handleBookChange);
els.genBtn.addEventListener('click', generatePlan);
els.genYtPhysicsBtn.addEventListener('click', generateYtPhysicsTimestampPlan);
els.loadBtn.addEventListener('click', loadPlanFromDropdown);
els.delBtn.addEventListener('click', deletePlan);
els.dlBtn.addEventListener('click', exportData);
els.ulBtn.addEventListener('click', () => els.ulInput.click());
els.ulInput.addEventListener('change', importData);
els.dayJumper.addEventListener('change', (e) => setDay(parseInt(e.target.value)));
els.prevDay.addEventListener('click', () => setDay(currentDayIndex - 1));
els.nextDay.addEventListener('click', () => setDay(currentDayIndex + 1));
els.todayBtn.addEventListener('click', () => setDay(getTodayIndex(), true));
els.copyDayBtn.addEventListener('click', copyFullDay);
els.splitDayBtn.addEventListener('click', splitFullDay);
els.gptReadBtn.addEventListener('click', () => copyAndOpen(getFullDayText, els.gptReadBtn, GPT_READ_URL));

els.gemQaBtn.addEventListener('click', () => copyAndOpen(getFullDayText, els.gemQaBtn, GEM_QA_URL));

els.gemAnkiBtn.addEventListener('click', () => copyAndOpen(getFullDayText, els.gemAnkiBtn, GEM_ANKI_URL));

els.gemVisualBtn.addEventListener('click', () => copyAndOpen(getFullDayText, els.gemVisualBtn, GEM_VISUAL_URL));

els.ttsBtn.addEventListener('click', () => {
  window.open(TTS_URL, '_blank');
});
els.setupHeader.addEventListener('click', toggleSetupPanel);
els.setupToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleSetupPanel(); });

init();
</script>
