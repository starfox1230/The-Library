<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Prometheus Ultrasound Fill-in Quiz</title>
<style>
:root {
  --bg: #080914;
  --panel: #121426;
  --panel2: #191b33;
  --text: #eef0ff;
  --muted: #a7add8;
  --accent: #7c7cff;
  --accent2: #34d6ff;
  --good: #31d07b;
  --bad: #ff5d73;
  --warn: #ffd166;
  --line: #2d3158;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at top left, rgba(124,124,255,0.18), transparent 35%),
    radial-gradient(circle at bottom right, rgba(52,214,255,0.10), transparent 38%),
    var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  padding: 18px;
}

button, input {
  font: inherit;
}

.app {
  max-width: 980px;
  margin: 0 auto;
}

.topbar {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.titleBlock h1 {
  margin: 0 0 4px;
  font-size: clamp(1.25rem, 3vw, 2rem);
  letter-spacing: 0.02em;
}

.subtitle {
  color: var(--muted);
  font-size: 0.95rem;
}

.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  border: 1px solid var(--line);
  color: var(--text);
  background: linear-gradient(180deg, #202344, #15172b);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
}

.btn:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
}

.btn.primary {
  background: linear-gradient(135deg, var(--accent), #4b7dff);
  border-color: transparent;
  color: white;
}

.btn.ghost {
  background: transparent;
}

.btn.good {
  border-color: rgba(49,208,123,0.55);
}

.btn.bad {
  border-color: rgba(255,93,115,0.55);
}

.card {
  background: rgba(18,20,38,0.92);
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: 0 20px 70px rgba(0,0,0,0.45), 0 0 30px rgba(124,124,255,0.08);
  padding: clamp(18px, 4vw, 34px);
}

.progressRow {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
}

.progressText {
  color: var(--muted);
  font-size: 0.95rem;
}

.progressBar {
  grid-column: 1 / -1;
  height: 10px;
  background: #080914;
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
}

.progressFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.25s ease;
}

.question {
  font-size: clamp(1.25rem, 3vw, 2rem);
  line-height: 1.45;
  margin: 12px 0 22px;
}

.blank {
  display: inline-block;
  min-width: 120px;
  border-bottom: 3px solid var(--accent2);
  color: var(--accent2);
  text-align: center;
  padding: 0 8px;
}

.answerBox {
  display: flex;
  gap: 10px;
  margin: 16px 0 12px;
}

#answerInput {
  flex: 1;
  min-width: 0;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #090b18;
  color: var(--text);
  outline: none;
}

#answerInput:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(52,214,255,0.12);
}

.feedback {
  min-height: 86px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: rgba(25,27,51,0.7);
  padding: 14px;
  color: var(--muted);
  line-height: 1.5;
}

.feedback.correct {
  border-color: rgba(49,208,123,0.65);
  color: #dfffee;
}

.feedback.incorrect {
  border-color: rgba(255,93,115,0.65);
  color: #ffe4e8;
}

.answerReveal {
  margin-top: 8px;
  color: var(--text);
}

.answerReveal strong {
  color: var(--accent2);
}

.navRow {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 18px;
  flex-wrap: wrap;
}

details.progressMenu {
  margin-top: 16px;
  background: rgba(18,20,38,0.7);
  border: 1px solid var(--line);
  border-radius: 18px;
  overflow: hidden;
}

details.progressMenu summary {
  cursor: pointer;
  padding: 14px 16px;
  color: var(--text);
  list-style: none;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

details.progressMenu summary::-webkit-details-marker {
  display: none;
}

.menuContent {
  border-top: 1px solid var(--line);
  padding: 12px;
  max-height: 50vh;
  overflow: auto;
}

.menuTools {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  gap: 8px;
}

.jump {
  padding: 9px 0;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: #14172d;
  color: var(--muted);
  cursor: pointer;
  position: relative;
}

.jump.current {
  outline: 2px solid var(--accent2);
  color: var(--text);
}

.jump.answered {
  background: #202344;
  color: var(--text);
}

.jump.correct {
  border-color: rgba(49,208,123,0.75);
}

.jump.incorrect {
  border-color: rgba(255,93,115,0.75);
}

.jump.revealed::after {
  content: "👁";
  position: absolute;
  top: -7px;
  right: -4px;
  font-size: 0.7rem;
}

.reviewPanel {
  margin-top: 18px;
  display: none;
}

.reviewPanel.show {
  display: block;
}

.reviewItem {
  border: 1px solid var(--line);
  background: rgba(25,27,51,0.75);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
}

.reviewItem.correct {
  border-left: 4px solid var(--good);
}

.reviewItem.incorrect {
  border-left: 4px solid var(--bad);
}

.reviewItem.unanswered {
  border-left: 4px solid var(--warn);
}

.reviewQ {
  color: var(--text);
  margin-bottom: 8px;
}

.reviewA {
  color: var(--muted);
  line-height: 1.45;
  font-size: 0.95rem;
}

.small {
  color: var(--muted);
  font-size: 0.88rem;
}

kbd {
  border: 1px solid var(--line);
  border-bottom-width: 3px;
  border-radius: 6px;
  padding: 1px 6px;
  background: #090b18;
  color: var(--muted);
}

@media (max-width: 650px) {
  body { padding: 12px; }
  .answerBox { flex-direction: column; }
  .answerBox .btn { width: 100%; }
  .progressRow { grid-template-columns: 1fr; }
  .controls { width: 100%; }
  .controls .btn { flex: 1; }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="titleBlock">
      <h1>Prometheus Ultrasound Fill-in Quiz</h1>
      <div class="subtitle">573 fill-in-the-blank questions. Progress saves automatically in this browser.</div>
    </div>
    <div class="controls">
      <button class="btn ghost" id="reviewBtn">Review</button>
      <button class="btn ghost" id="resetBtn">Reset</button>
    </div>
  </div>

  <main class="card">
    <div class="progressRow">
      <div class="progressText" id="progressText">Loading...</div>
      <div class="small" id="scoreText"></div>
      <div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
    </div>

    <section id="quizArea">
      <div class="small" id="sectionText"></div>
      <div class="question" id="questionText"></div>

      <div class="answerBox">
        <input id="answerInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type the missing word or phrase..." />
        <button class="btn primary" id="checkBtn">Check</button>
      </div>

      <div class="controls" style="margin-bottom:12px;">
        <button class="btn" id="showBtn">Show Answer</button>
        <button class="btn good" id="markCorrectBtn">Mark Correct</button>
        <button class="btn bad" id="markWrongBtn">Mark Wrong</button>
      </div>

      <div class="feedback" id="feedback">Tip: press <kbd>Enter</kbd> to check. The answer matching is forgiving about capitalization, punctuation, and extra spaces.</div>

      <div class="navRow">
        <button class="btn" id="prevBtn">Previous</button>
        <button class="btn primary" id="nextBtn">Next</button>
      </div>
    </section>

    <details class="progressMenu" id="progressMenu">
      <summary>
        <span>Progress dropdown</span>
        <span id="dropdownStats">0 / 573 answered</span>
      </summary>
      <div class="menuContent">
        <div class="menuTools">
          <button class="btn" id="firstUnansweredBtn">First unanswered</button>
          <button class="btn" id="missedBtn">First missed</button>
          <button class="btn" id="copyMissedBtn">Copy missed</button>
        </div>
        <div class="grid" id="jumpGrid"></div>
      </div>
    </details>

    <section class="reviewPanel" id="reviewPanel">
      <h2>Answer Progression</h2>
      <div class="menuTools">
        <button class="btn" data-filter="all">All</button>
        <button class="btn" data-filter="incorrect">Missed</button>
        <button class="btn" data-filter="correct">Correct</button>
        <button class="btn" data-filter="unanswered">Unanswered</button>
        <button class="btn" data-filter="revealed">Revealed</button>
      </div>
      <div id="reviewList"></div>
    </section>
  </main>
</div>

function parseFacts(text) {
  return text.trim().split("\n").map(line => {
    const m = line.match(/^(\d+)\.\s+(.*)$/);
    return m ? { number: Number(m[1]), fact: m[2].trim() } : null;
  }).filter(Boolean);
}

const facts = parseFacts(FACTS_TEXT);

function sectionForNumber(n) {
  let current = SECTIONS[0][1];
  for (const [start, name] of SECTIONS) {
    if (n >= start) current = name;
    else break;
  }
  return current;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function chooseBlank(fact) {
  const rules = [
    /\bcalled\s+(.+?)\.$/i,
    /\babbreviated\s+(.+?)\.$/i,
    /\bmeasured in\s+(.+?)\.$/i,
    /\bexpressed in\s+(.+?)\.$/i,
    /\bmeans\s+(.+?)\.$/i,
    /\bequals\s+(.+?)\.$/i,
    /\bdepends on\s+(.+?)\.$/i,
    /\bdepends strongly on\s+(.+?)\.$/i,
    /\bproduces?\s+(.+?)\.$/i,
    /\bcauses?\s+(.+?)\.$/i,
    /\bimproves?\s+(.+?)\.$/i,
    /\breduces?\s+(.+?)\.$/i,
    /\bviolates?\s+(.+?)\.$/i,
    /\boccurs when\s+(.+?)\.$/i,
    /\boccurs at\s+(.+?)\.$/i,
    /\boccurs because\s+(.+?)\.$/i,
    /\bresults from\s+(.+?)\.$/i,
    /\bused for\s+(.+?)\.$/i,
    /\buseful for\s+(.+?)\.$/i,
    /\bcan be improved by\s+(.+?)\.$/i,
    /\bcan be reduced by\s+(.+?)\.$/i,
    /\bcan determine\s+(.+?)\.$/i,
    /\bcan make\s+(.+?)\.$/i,
    /\bcan cause\s+(.+?)\.$/i,
    /\bis based on\s+(.+?)\.$/i,
    /\bis proportional to\s+(.+?)\.$/i,
    /\bis the\s+(.+?)\.$/i,
    /\bis a\s+(.+?)\.$/i,
    /\bis an\s+(.+?)\.$/i,
    /\bis\s+(.+?)\.$/i,
    /\bare\s+(.+?)\.$/i,
    /\bhas\s+(.+?)\.$/i,
    /\bhave\s+(.+?)\.$/i
  ];

  for (const rule of rules) {
    const match = fact.match(rule);
    if (match && match[1] && match[1].length <= 90) {
      return match[1].trim();
    }
  }

  const words = fact.replace(/\.$/, "").split(/\s+/);
  const take = Math.min(4, Math.max(1, Math.ceil(words.length / 4)));
  return words.slice(-take).join(" ");
}

function makeQuestion(f) {
  const answer = chooseBlank(f.fact);
  const re = new RegExp(escapeRegex(answer), "i");
  const prompt = f.fact.replace(re, "____");
  return {
    number: f.number,
    section: sectionForNumber(f.number),
    prompt,
    answer,
    fact: f.fact
  };
}

const questions = facts.map(makeQuestion);
const STORAGE_KEY = "prometheus_ultrasound_fill_blank_573_v1";

let state = {
  index: 0,
  answers: Array(questions.length).fill(null)
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved && Array.isArray(saved.answers) && saved.answers.length === questions.length) {
      state = saved;
      state.index = Math.min(Math.max(0, state.index || 0), questions.length - 1);
    }
  } catch {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

const el = {
  progressText: document.getElementById("progressText"),
  scoreText: document.getElementById("scoreText"),
  progressFill: document.getElementById("progressFill"),
  sectionText: document.getElementById("sectionText"),
  questionText: document.getElementById("questionText"),
  answerInput: document.getElementById("answerInput"),
  checkBtn: document.getElementById("checkBtn"),
  showBtn: document.getElementById("showBtn"),
  markCorrectBtn: document.getElementById("markCorrectBtn"),
  markWrongBtn: document.getElementById("markWrongBtn"),
  feedback: document.getElementById("feedback"),
  prevBtn: document.getElementById("prevBtn"),
  nextBtn: document.getElementById("nextBtn"),
  resetBtn: document.getElementById("resetBtn"),
  jumpGrid: document.getElementById("jumpGrid"),
  dropdownStats: document.getElementById("dropdownStats"),
  firstUnansweredBtn: document.getElementById("firstUnansweredBtn"),
  missedBtn: document.getElementById("missedBtn"),
  copyMissedBtn: document.getElementById("copyMissedBtn"),
  reviewBtn: document.getElementById("reviewBtn"),
  reviewPanel: document.getElementById("reviewPanel"),
  reviewList: document.getElementById("reviewList")
};

function normalize(s) {
  return String(s || "")
    .toLowerCase()
    .replace(/→/g, " ")
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/[-–—/]/g, " ")
    .replace(/[^a-z0-9.%μµ+\s]/g, "")
    .replace(/\bm\s*\/\s*s\b/g, "m s")
    .replace(/\s+/g, " ")
    .trim();
}

function isAnswerCorrect(user, answer) {
  const u = normalize(user);
  const a = normalize(answer);
  if (!u || !a) return false;
  if (u === a) return true;

  const answerParts = a.split(/\s+or\s+|\s+and\s+|,/).map(x => x.trim()).filter(Boolean);
  if (answerParts.some(p => p.length > 2 && u === p)) return true;

  if (a.length >= 12 && (u.includes(a) || a.includes(u))) return true;

  return false;
}

function getCounts() {
  const answered = state.answers.filter(Boolean).length;
  const correct = state.answers.filter(a => a && a.status === "correct").length;
  const incorrect = state.answers.filter(a => a && a.status === "incorrect").length;
  const revealed = state.answers.filter(a => a && a.revealed).length;
  return { answered, correct, incorrect, revealed };
}

function render() {
  const q = questions[state.index];
  const a = state.answers[state.index];
  const counts = getCounts();

  el.progressText.textContent = `Question ${state.index + 1} of ${questions.length}`;
  el.scoreText.textContent = `${counts.correct} correct · ${counts.incorrect} missed · ${counts.revealed} revealed`;
  el.dropdownStats.textContent = `${counts.answered} / ${questions.length} answered`;
  el.progressFill.style.width = `${Math.round((counts.answered / questions.length) * 100)}%`;

  el.sectionText.textContent = `Section: ${q.section}`;
  el.questionText.innerHTML = q.prompt.replace("____", '<span class="blank">____</span>');
  el.answerInput.value = a ? a.userAnswer || "" : "";
  el.answerInput.disabled = !!a;
  el.checkBtn.disabled = !!a;

  if (a) {
    el.feedback.className = "feedback " + (a.status === "correct" ? "correct" : "incorrect");
    const label = a.status === "correct" ? "Correct." : (a.revealed ? "Answer revealed." : "Missed.");
    el.feedback.innerHTML = `
      <div>${label}</div>
      <div class="answerReveal"><strong>Answer:</strong> ${q.answer}</div>
      <div class="answerReveal"><strong>Full fact:</strong> ${q.fact}</div>
    `;
  } else {
    el.feedback.className = "feedback";
    el.feedback.innerHTML = 'Tip: press <kbd>Enter</kbd> to check. The answer matching is forgiving about capitalization, punctuation, and extra spaces.';
  }

  el.prevBtn.disabled = state.index === 0;
  el.nextBtn.textContent = state.index === questions.length - 1 ? "Finish" : "Next";

  renderGrid();
  if (el.reviewPanel.classList.contains("show")) renderReview();
  saveState();

  setTimeout(() => {
    if (!state.answers[state.index]) el.answerInput.focus();
  }, 0);
}

function checkAnswer() {
  const q = questions[state.index];
  const userAnswer = el.answerInput.value.trim();
  if (!userAnswer) return;

  const correct = isAnswerCorrect(userAnswer, q.answer);
  state.answers[state.index] = {
    userAnswer,
    status: correct ? "correct" : "incorrect",
    revealed: false,
    timestamp: Date.now()
  };
  render();
}

function showAnswer() {
  const q = questions[state.index];
  state.answers[state.index] = {
    userAnswer: el.answerInput.value.trim(),
    status: "incorrect",
    revealed: true,
    timestamp: Date.now()
  };
  render();
}

function manualMark(status) {
  state.answers[state.index] = {
    userAnswer: el.answerInput.value.trim(),
    status,
    revealed: false,
    timestamp: Date.now()
  };
  render();
}

function go(delta) {
  state.index = Math.min(Math.max(0, state.index + delta), questions.length - 1);
  render();
}

function renderGrid() {
  el.jumpGrid.innerHTML = "";
  questions.forEach((q, i) => {
    const b = document.createElement("button");
    b.className = "jump";
    b.textContent = q.number;
    if (i === state.index) b.classList.add("current");
    const ans = state.answers[i];
    if (ans) {
      b.classList.add("answered", ans.status);
      if (ans.revealed) b.classList.add("revealed");
      b.title = `${q.number}. ${ans.status}${ans.revealed ? " · revealed" : ""}`;
    } else {
      b.title = `${q.number}. unanswered`;
    }
    b.addEventListener("click", () => {
      state.index = i;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    el.jumpGrid.appendChild(b);
  });
}

function renderReview(filter = "all") {
  el.reviewList.innerHTML = "";
  questions.forEach((q, i) => {
    const ans = state.answers[i];
    const status = ans ? ans.status : "unanswered";
    const revealed = !!(ans && ans.revealed);

    if (filter === "correct" && status !== "correct") return;
    if (filter === "incorrect" && status !== "incorrect") return;
    if (filter === "unanswered" && status !== "unanswered") return;
    if (filter === "revealed" && !revealed) return;

    const item = document.createElement("div");
    item.className = `reviewItem ${status}`;
    item.innerHTML = `
      <div class="reviewQ"><strong>${q.number}.</strong> ${q.prompt}</div>
      <div class="reviewA"><strong>Status:</strong> ${status}${revealed ? " · revealed" : ""}</div>
      <div class="reviewA"><strong>Your answer:</strong> ${ans && ans.userAnswer ? ans.userAnswer : "—"}</div>
      <div class="reviewA"><strong>Correct answer:</strong> ${q.answer}</div>
      <div class="reviewA"><strong>Full fact:</strong> ${q.fact}</div>
    `;
    item.addEventListener("click", () => {
      state.index = i;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    el.reviewList.appendChild(item);
  });

  if (!el.reviewList.children.length) {
    el.reviewList.innerHTML = `<div class="small">No items match this filter.</div>`;
  }
}

function jumpToFirstUnanswered() {
  const idx = state.answers.findIndex(a => !a);
  if (idx >= 0) {
    state.index = idx;
    render();
  }
}

function jumpToFirstMissed() {
  const idx = state.answers.findIndex(a => a && a.status === "incorrect");
  if (idx >= 0) {
    state.index = idx;
    render();
  }
}

function copyMissed() {
  const missed = questions
    .map((q, i) => ({ q, a: state.answers[i] }))
    .filter(x => x.a && x.a.status === "incorrect")
    .map(x => `${x.q.number}. ${x.q.prompt}\nCorrect answer: ${x.q.answer}\nFull fact: ${x.q.fact}\nYour answer: ${x.a.userAnswer || "—"}\n`)
    .join("\n");

  navigator.clipboard.writeText(missed || "No missed questions yet.");
  el.copyMissedBtn.textContent = "Copied";
  setTimeout(() => el.copyMissedBtn.textContent = "Copy missed", 1000);
}

function resetQuiz() {
  const ok = confirm("Reset all saved progress for this quiz?");
  if (!ok) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { index: 0, answers: Array(questions.length).fill(null) };
  render();
}

el.checkBtn.addEventListener("click", checkAnswer);
el.answerInput.addEventListener("keydown", e => {
  if (e.key === "Enter") checkAnswer();
});
el.showBtn.addEventListener("click", showAnswer);
el.markCorrectBtn.addEventListener("click", () => manualMark("correct"));
el.markWrongBtn.addEventListener("click", () => manualMark("incorrect"));
el.prevBtn.addEventListener("click", () => go(-1));
el.nextBtn.addEventListener("click", () => go(1));
el.resetBtn.addEventListener("click", resetQuiz);
el.firstUnansweredBtn.addEventListener("click", jumpToFirstUnanswered);
el.missedBtn.addEventListener("click", jumpToFirstMissed);
el.copyMissedBtn.addEventListener("click", copyMissed);

el.reviewBtn.addEventListener("click", () => {
  el.reviewPanel.classList.toggle("show");
  renderReview("all");
});

document.querySelectorAll("[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => renderReview(btn.dataset.filter));
});

document.addEventListener("keydown", e => {
  if (e.altKey && e.key === "ArrowRight") go(1);
  if (e.altKey && e.key === "ArrowLeft") go(-1);
});

loadState();
render();
</script>
</body>
</html>
