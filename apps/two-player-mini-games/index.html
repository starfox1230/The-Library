<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two-Player Mini-Games</title>
  <style>
    :root {
      --bg: #10141c;
      --panel: #181f2b;
      --panel-2: #0e1118;
      --text: #edf2f7;
      --muted: #a7b0bf;
      --accent: #24d3ee;
      --accent-2: #f6c453;
      --border: #2b3545;
      --success: #6ee7b7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(36, 211, 238, 0.16), transparent 34rem),
        linear-gradient(145deg, #0b0f16, var(--bg));
      color: var(--text);
    }

    .container {
      width: min(1100px, 94vw);
      margin: 2rem auto 3rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .back-link,
    .game-card a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 800;
    }

    .back-link:hover,
    .game-card a:hover {
      color: var(--accent-2);
      text-decoration: underline;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(2rem, 4vw, 3.4rem);
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      max-width: 720px;
      line-height: 1.5;
    }

    .panel {
      background: rgba(24, 31, 43, 0.9);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(170px, auto);
      gap: 0.75rem;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .field input,
    .field select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.7rem;
    }

    .game-list {
      display: grid;
      gap: 0.85rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .game-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.8rem;
      align-items: center;
      background: rgba(14, 17, 24, 0.84);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .game-card a {
      font-size: 1.08rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.85rem;
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .tag {
      color: #06251c;
      background: var(--success);
      border-radius: 999px;
      font-size: 0.73rem;
      padding: 0.22rem 0.5rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 1rem;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    @media (max-width: 650px) {
      .topbar,
      .controls,
      .game-card {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1>Two-Player Mini-Games</h1>
        <p class="subtitle">A small arcade shelf for couch/controller-friendly two-player games with fixed keyboard lineups.</p>
      </div>
      <a class="back-link" href="../../index.html">Back to Main Library</a>
    </div>

    <section class="panel controls" aria-label="Filters">
      <div class="field">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="text" placeholder="Name, controls, or description" />
      </div>
      <div class="field">
        <label for="sortSelect">Sort</label>
        <select id="sortSelect">
          <option value="name-asc">Name (A-Z)</option>
          <option value="created-desc">Created (newest first)</option>
          <option value="created-asc">Created (oldest first)</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <ul id="gamesList" class="game-list" aria-live="polite"></ul>
    </section>
  </main>

  <script>
    const MINI_GAMES = [
      {
        name: "Which One Is It?",
        path: "library/2026-05-08-which-one-is-it/index.html",
        createdAt: "2026-05-08",
        controls: "Player 1: A/D/W. Player 2: Arrow Left/Arrow Right/Arrow Up.",
        description: "A content-driven educational comparison game where children choose which side matches a prompt, then review key distinguishing characteristics.",
      },
      {
        name: "Neon Dual Breakout",
        path: "library/2026-03-21-neon-dual-breakout/index.html",
        createdAt: "2026-03-21",
        controls: "Player 1: WASD. Player 2: IJKL.",
        description: "A two-player split-screen breakout challenge with independent boards, join keys, and neon-styled controls matching the other arcade entries.",
      },
      {
        name: "Neon Dual Orb Feast",
        path: "library/2026-03-21-neon-dual-orb-feast/index.html",
        createdAt: "2026-03-21",
        controls: "Player 1: WASD. Player 2: IJKL.",
        description: "A split-screen two-player orb-eating game with faster blue balls, full palette swaps, and a one-sided eject-and-shrink restart animation.",
      },
      {
        name: "Neon Dual Pac Maze",
        path: "library/2026-03-21-neon-dual-pac-maze/index.html",
        createdAt: "2026-03-21",
        controls: "Player 1: WASD. Player 2: IJKL.",
        description: "A two-player split-screen Pac-style game with independent mazes, join keys, and per-player controls matching the dual snake setup.",
      },
      {
        name: "Neon Dual Snake Arena",
        path: "library/2026-03-21-neon-dual-snake/index.html",
        createdAt: "2026-03-21",
        controls: "Player 1: WASD. Player 2: IJKL.",
        description: "A stylish split-screen two-player experience with independent snake runs, neon visuals, and dedicated controls for each player.",
      },
    ];

    const $search = document.getElementById("searchInput");
    const $sort = document.getElementById("sortSelect");
    const $gamesList = document.getElementById("gamesList");

    function renderGames() {
      const query = $search.value.trim().toLowerCase();
      let items = MINI_GAMES.filter((game) => {
        const haystack = `${game.name} ${game.controls} ${game.description}`.toLowerCase();
        return !query || haystack.includes(query);
      });

      if ($sort.value === "created-desc") {
        items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt) || a.name.localeCompare(b.name));
      } else if ($sort.value === "created-asc") {
        items.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt) || a.name.localeCompare(b.name));
      } else {
        items.sort((a, b) => a.name.localeCompare(b.name));
      }

      if (!items.length) {
        $gamesList.innerHTML = '<li class="empty">No mini-games match your current filter.</li>';
        return;
      }

      $gamesList.innerHTML = items
        .map((game) => `
          <li class="game-card">
            <div>
              <a href="${game.path}">${game.name}</a>
              <div class="meta">
                <span>${game.controls}</span>
                <span>${game.description}</span>
              </div>
            </div>
            <span class="tag">2 players</span>
          </li>
        `)
        .join("");
    }

    [$search, $sort].forEach((element) => {
      element.addEventListener("input", renderGames);
      element.addEventListener("change", renderGames);
    });

    renderGames();
  </script>
</body>
</html>
