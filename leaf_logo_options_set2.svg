<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Leaf logo options set two</title>
  <desc id="desc">Ten additional single-leaf logo options inspired by modern open-source icon styles.</desc>
  <defs>
    <style>
      .sheet { fill: #0f1726; }
      .card { fill: #172131; stroke: rgba(255,255,255,0.09); stroke-width: 1.5; }
      .ring { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1.2; }
      .num { fill: #d8e3f4; font: 700 18px "Segoe UI", sans-serif; }
      .label { fill: #97abc9; font: 600 13px "Segoe UI", sans-serif; }
      .fill { fill: #ddf7e7; }
      .fill2 { fill: #d1f2dd; }
      .stroke { fill: none; stroke: #ddf7e7; stroke-width: 4.6; stroke-linecap: round; stroke-linejoin: round; }
      .stroke2 { fill: none; stroke: #ddf7e7; stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; }
      .vein { fill: none; stroke: #8fd3aa; stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; opacity: 0.94; }
      .vein2 { fill: none; stroke: #9eddb7; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; opacity: 0.88; }
    </style>
    <g id="card">
      <rect class="card" x="0" y="0" width="248" height="252" rx="26"/>
      <circle class="ring" cx="124" cy="108" r="62"/>
