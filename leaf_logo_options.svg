<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Single leaf logo options</title>
  <desc id="desc">Ten single-leaf logo variations shown on a dark contact sheet, labeled 1 through 10.</desc>
  <defs>
    <style>
      .sheet { fill: #111827; }
      .card { fill: #182233; stroke: rgba(255,255,255,0.09); stroke-width: 1.5; }
      .ring { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1.2; }
      .num { fill: #d8e3f4; font: 700 18px "Segoe UI", sans-serif; }
      .label { fill: #96a9c9; font: 600 13px "Segoe UI", sans-serif; }
      .fill { fill: #dff8e8; }
      .fill-soft { fill: #cbf1d7; }
      .stroke { fill: none; stroke: #dff8e8; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .vein { fill: none; stroke: #8dd3a8; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.95; }
      .vein-soft { fill: none; stroke: #9eddb5; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
    </style>

    <g id="option-card">
      <rect class="card" x="0" y="0" width="248" height="252" rx="26"/>
      <circle class="ring" cx="124" cy="108" r="62"/>
    </g>
  </defs>

  <rect class="sheet" width="1400" height="620" rx="28"/>

  <g transform="translate(26 24)">
    <g transform="translate(0 0)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">1</text>
      <text class="label" x="24" y="226">Rounded teardrop</text>
      <g transform="translate(124 108)">
        <path class="fill" d="M0 -44C28 -42 47 -21 47 7C47 37 24 55 0 60C-25 55 -47 37 -47 7C-47 -21 -28 -42 0 -44Z"/>
        <path class="vein" d="M0 44C-2 23 -2 1 0 -28"/>
      </g>
    </g>

    <g transform="translate(270 0)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">2</text>
      <text class="label" x="24" y="226">Slim almond</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M0 -48C20 -39 34 -16 34 11C34 34 17 51 0 58C-17 51 -34 34 -34 11C-34 -16 -20 -39 0 -48Z"/>
        <path class="vein-soft" d="M0 42V-32"/>
      </g>
    </g>

    <g transform="translate(540 0)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">3</text>
      <text class="label" x="24" y="226">Soft heart leaf</text>
      <g transform="translate(124 108)">
        <path class="fill-soft" d="M0 60C-33 46 -49 18 -43 -9C-39 -26 -25 -37 -9 -36C2 -36 10 -29 15 -22C20 -29 28 -36 39 -36C55 -37 69 -26 73 -9C79 18 63 46 30 60C18 65 12 66 0 68C-12 66 -18 65 -30 60Z" transform="scale(.72)"/>
        <path class="vein-soft" d="M0 42C0 15 2 -2 9 -22"/>
      </g>
    </g>

    <g transform="translate(810 0)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">4</text>
      <text class="label" x="24" y="226">Pointed spear</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M0 -52C18 -39 28 -17 28 10C28 35 15 52 0 61C-15 52 -28 35 -28 10C-28 -17 -18 -39 0 -52Z"/>
        <path class="vein" d="M0 46C1 26 1 2 0 -34"/>
      </g>
    </g>

    <g transform="translate(1080 0)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">5</text>
      <text class="label" x="24" y="226">Asym leaf</text>
      <g transform="translate(124 108)">
        <path class="fill" d="M8 -46C33 -37 49 -15 48 12C47 37 29 55 1 61C-26 54 -46 35 -48 9C-49 -18 -31 -39 -4 -45C-2 -36 1 -28 8 -22C13 -18 20 -15 26 -13C16 -19 10 -30 8 -46Z"/>
        <path class="vein" d="M-2 44C0 24 4 3 12 -30"/>
      </g>
    </g>

    <g transform="translate(0 274)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">6</text>
      <text class="label" x="24" y="226">Fan leaf</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M0 58C-27 48 -43 25 -43 -1C-43 -23 -27 -40 0 -50C27 -40 43 -23 43 -1C43 25 27 48 0 58Z"/>
        <path class="vein-soft" d="M0 44V-33"/>
        <path class="vein-soft" d="M0 -8C-9 -14 -18 -20 -28 -26"/>
        <path class="vein-soft" d="M0 -8C9 -14 18 -20 28 -26"/>
      </g>
    </g>

    <g transform="translate(270 274)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">7</text>
      <text class="label" x="24" y="226">Geometric drop</text>
      <g transform="translate(124 108)">
        <path class="fill-soft" d="M0 -50L32 -18L24 30L0 58L-24 30L-32 -18Z"/>
        <path class="vein-soft" d="M0 42V-28"/>
      </g>
    </g>

    <g transform="translate(540 274)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">8</text>
      <text class="label" x="24" y="226">Curled edge</text>
      <g transform="translate(124 108)">
        <path class="fill" d="M-6 -46C18 -46 41 -31 49 -5C58 26 39 53 7 60C-22 55 -45 35 -47 8C-48 -19 -30 -42 -6 -46Z"/>
        <path d="M13 -31C28 -20 34 -5 31 12C28 26 19 37 6 44C21 29 24 8 13 -31Z" fill="#111827" opacity="0.34"/>
        <path class="vein" d="M-1 44C1 25 3 4 9 -24"/>
      </g>
    </g>

    <g transform="translate(810 274)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">9</text>
      <text class="label" x="24" y="226">Oval notch</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M4 -45C28 -42 46 -19 46 8C46 35 25 55 -1 60C-28 53 -47 33 -47 5C-47 -21 -29 -42 -4 -45"/>
        <path class="vein-soft" d="M-1 41C-1 20 0 -1 4 -28"/>
      </g>
    </g>

    <g transform="translate(1080 274)">
      <use href="#option-card"/>
      <text class="num" x="24" y="34">10</text>
      <text class="label" x="24" y="226">Shield leaf</text>
      <g transform="translate(124 108)">
        <path class="fill-soft" d="M0 -49C26 -43 45 -18 45 11C45 37 25 56 0 63C-25 56 -45 37 -45 11C-45 -18 -26 -43 0 -49Z"/>
        <path class="vein" d="M0 47C0 27 1 5 0 -30"/>
        <path class="vein-soft" d="M0 -3C-11 -10 -21 -16 -31 -21"/>
      </g>
    </g>
  </g>
</svg>
