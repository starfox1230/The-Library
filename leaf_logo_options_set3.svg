<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Leaf logo options set three</title>
  <desc id="desc">Ten subtle variations on the Tabler-inspired single leaf icon, with different contour and fill approaches.</desc>
  <defs>
    <style>
      .sheet { fill: #0f1726; }
      .card { fill: #172131; stroke: rgba(255,255,255,0.09); stroke-width: 1.5; }
      .ring { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1.2; }
      .num { fill: #d8e3f4; font: 700 18px "Segoe UI", sans-serif; }
      .label { fill: #97abc9; font: 600 13px "Segoe UI", sans-serif; }
      .stroke { fill: none; stroke: #ddf7e7; stroke-width: 4.8; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-soft { fill: none; stroke: #ddf7e7; stroke-width: 4.2; stroke-linecap: round; stroke-linejoin: round; }
      .vein { fill: none; stroke: #8fd3aa; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; opacity: 0.94; }
      .fill { fill: #ddf7e7; }
      .fill-soft { fill: #d1f2dd; }
      .fill-muted { fill: rgba(221,247,231,0.88); }
      .cut { fill: #172131; }
    </style>
    <g id="card">
      <rect class="card" x="0" y="0" width="248" height="252" rx="26"/>
      <circle class="ring" cx="124" cy="108" r="62"/>
    </g>
  </defs>

  <rect class="sheet" width="1400" height="620" rx="28"/>

  <g transform="translate(26 24)">
    <g transform="translate(0 0)">
      <use href="#card"/>
      <text class="num" x="24" y="34">1</text>
      <text class="label" x="24" y="226">Original</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M-40 48C-36 18 -22 -5 7 -18"/>
        <path class="stroke" d="M-7 35C29 35 51 14 53 -34V-42H26C-21 -42 -36 -21 -36 5C-36 16 -33 25 -27 31H-8"/>
      </g>
    </g>

    <g transform="translate(270 0)">
      <use href="#card"/>
      <text class="num" x="24" y="34">2</text>
      <text class="label" x="24" y="226">Rounder top</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M-38 48C-34 19 -20 -3 9 -17"/>
        <path class="stroke" d="M-7 36C28 36 50 15 52 -28C53 -36 53 -41 53 -42H27C-19 -42 -35 -22 -35 4C-35 16 -32 25 -25 31H-8"/>
      </g>
    </g>

    <g transform="translate(540 0)">
      <use href="#card"/>
      <text class="num" x="24" y="34">3</text>
      <text class="label" x="24" y="226">Shorter stem</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M-33 46C-28 20 -16 0 7 -13"/>
        <path class="stroke" d="M-5 35C30 35 50 14 53 -33V-42H27C-18 -42 -34 -22 -34 3C-34 15 -31 24 -24 30H-7"/>
      </g>
    </g>

    <g transform="translate(810 0)">
      <use href="#card"/>
      <text class="num" x="24" y="34">4</text>
      <text class="label" x="24" y="226">Softer bend</text>
      <g transform="translate(124 108)">
        <path class="stroke-soft" d="M-39 48C-34 23 -22 4 3 -11"/>
        <path class="stroke-soft" d="M-7 35C27 35 49 13 52 -31V-42H27C-17 -42 -34 -23 -34 2C-34 16 -29 27 -20 32H-7"/>
      </g>
    </g>

    <g transform="translate(1080 0)">
      <use href="#card"/>
      <text class="num" x="24" y="34">5</text>
      <text class="label" x="24" y="226">Open tail</text>
      <g transform="translate(124 108)">
        <path class="stroke" d="M-41 49C-37 22 -24 0 6 -16"/>
        <path class="stroke" d="M-4 35C30 35 51 13 53 -33V-42H26C-20 -42 -36 -22 -36 4C-36 15 -33 23 -28 28"/>
      </g>
    </g>

    <g transform="translate(0 274)">
      <use href="#card"/>
      <text class="num" x="24" y="34">6</text>
      <text class="label" x="24" y="226">Outline + soft fill</text>
      <g transform="translate(124 108)">
        <path class="fill-muted" d="M24 -39C-14 -39 -29 -20 -29 4C-29 14 -26 22 -21 28H-7C22 28 41 10 44 -28V-39Z"/>
        <path class="stroke-soft" d="M-40 48C-36 18 -22 -5 7 -18"/>
        <path class="stroke-soft" d="M-7 35C29 35 51 14 53 -34V-42H26C-21 -42 -36 -21 -36 5C-36 16 -33 25 -27 31H-8"/>
      </g>
    </g>

    <g transform="translate(270 274)">
      <use href="#card"/>
      <text class="num" x="24" y="34">7</text>
      <text class="label" x="24" y="226">Filled body</text>
      <g transform="translate(124 108)">
        <path class="fill" d="M-7 35C29 35 51 14 53 -34V-42H26C-21 -42 -36 -21 -36 5C-36 16 -33 25 -27 31H-8C-17 20 -20 8 -20 -2C-20 -19 -11 -30 8 -31H38C35 5 19 24 -7 35Z"/>
        <path class="vein" d="M-39 48C-35 20 -21 -3 7 -17"/>
      </g>
    </g>

    <g transform="translate(540 274)">
      <use href="#card"/>
      <text class="num" x="24" y="34">8</text>
      <text class="label" x="24" y="226">Filled with cut vein</text>
      <g transform="translate(124 108)">
        <path class="fill-soft" d="M-6 35C29 35 51 14 53 -34V-42H27C-20 -42 -36 -21 -36 5C-36 16 -32 25 -26 31H-8C-18 22 -21 8 -21 -3C-21 -20 -11 -31 8 -32H38C35 5 19 24 -6 35Z"/>
        <path class="cut" d="M-41 47C-38 44 -35 40 -32 35C-29 29 -26 23 -22 17C-18 11 -14 5 -9 1C-4 -4 2 -8 10 -12L13 -7C6 -3 0 2 -5 7C-9 11 -13 17 -17 23C-20 29 -23 35 -27 41C-30 45 -34 49 -38 52Z"/>
      </g>
    </g>

    <g transform="translate(810 274)">
      <use href="#card"/>
      <text class="num" x="24" y="34">9</text>
      <text class="label" x="24" y="226">Inset fill</text>
      <g transform="translate(124 108)">
        <path class="stroke-soft" d="M-40 48C-36 18 -22 -5 7 -18"/>
        <path class="stroke-soft" d="M-7 35C29 35 51 14 53 -34V-42H26C-21 -42 -36 -21 -36 5C-36 16 -33 25 -27 31H-8"/>
        <path class="fill-muted" d="M23 -35C-13 -35 -28 -19 -28 4C-28 12 -26 19 -22 24H-6C19 24 37 8 40 -25V-35Z"/>
      </g>
    </g>

    <g transform="translate(1080 274)">
      <use href="#card"/>
      <text class="num" x="24" y="34">10</text>
      <text class="label" x="24" y="226">Heavy fill</text>
      <g transform="translate(124 108)">
        <path class="fill" d="M-6 35C29 35 51 14 53 -34V-42H25C-20 -42 -36 -20 -36 6C-36 18 -31 27 -22 31H-8C-19 25 -24 13 -24 0C-24 -20 -11 -31 8 -31H41C39 7 21 26 -6 35Z"/>
        <path class="vein" d="M-39 47C-35 21 -21 -1 6 -16"/>
      </g>
    </g>
  </g>
</svg>
